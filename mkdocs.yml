site_name: עמית טק
site_url: https://amitpinchasi.github.io/amittech/
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: docs/overrides
  logo: amittech.png
  favicon: favicon.ico
  direction: rtl
  language: he
  palette:
    - scheme: default
      primary: white
      accent: indigo
  font:
    text: Heebo
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang: he
  - roamlinks
  - awesome-pages:
      order: asc
      sort_type: natural
  - exclude:
      glob:
        - "*.pdf"

markdown_extensions:
  - nl2br
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js
  - javascripts/progress.js
  - javascripts/tabs-dropdown.js
