site_name: עמית טק
site_url: https://amittech.dev/
site_description: קורסי סייבר, תכנות, IT ומחשבים בחינם בעברית - מעל 2000 שעות לימוד עם תרגול מעשי. מתאים למתחילים ולמתקדמים.
site_author: עמית פנחסי
docs_dir: docs
site_dir: site

hooks:
  - hooks/build_nav_categories.py

theme:
  name: material
  custom_dir: docs/overrides
  logo: amittech.png
  favicon: favicon.ico
  direction: rtl
  language: he
  font:
    text: Heebo
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.prune
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang: he
  - roamlinks
  - awesome-pages:
      order: asc
      sort_type: natural
  - exclude:
      glob:
        - "*.pdf"
  - blog:
      blog_dir: blog
      post_date_format: long
      archive_date_format: yyyy
      post_url_format: "{date}/{slug}"
      archive: true
      categories: false
  - tags:
      tags_file: tags.md
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - tags
  - social
  - git-revision-date-localized:
      type: iso_datetime
      timezone: UTC
      fallback_to_build_date: true
  - redirects:
      redirect_maps:
        "blog/posts/8200 מול גאמא סייבר- מה ההבדל בין המונחים.md": "blog/posts/8200 וגאמא סייבר- מה ההבדל, איך נכנסים, ומה תנאי הקבלה.md"
        "blog/posts/איך נכנסים ל-8200.md": "blog/posts/8200 וגאמא סייבר- מה ההבדל, איך נכנסים, ומה תנאי הקבלה.md"
        "blog/posts/תנאי קבלה ל-8200.md": "blog/posts/8200 וגאמא סייבר- מה ההבדל, איך נכנסים, ומה תנאי הקבלה.md"
        "blog/posts/תנאי הקבלה לגאמא סייבר- דפר פרופיל ובגרות.md": "blog/posts/8200 וגאמא סייבר- מה ההבדל, איך נכנסים, ומה תנאי הקבלה.md"
        "blog/posts/גאמא סייבר.md": "blog/posts/8200 וגאמא סייבר- מה ההבדל, איך נכנסים, ומה תנאי הקבלה.md"
        "blog/posts/שלבי המיון של גאמא סייבר מא ועד ת.md": "blog/posts/שלבי המיון של 8200 וגאמא סייבר- המדריך המלא.md"
        "blog/posts/מבחני המיון של 8200- איך זה נראה בפועל.md": "blog/posts/שלבי המיון של 8200 וגאמא סייבר- המדריך המלא.md"
        "blog/posts/כמה זמן לוקח תהליך המיון של 8200.md": "blog/posts/שלבי המיון של 8200 וגאמא סייבר- המדריך המלא.md"
        "blog/posts/שאלון הקבלה ל-8200- מה שואלים ומה חשוב לדעת.md": "blog/posts/שלבי המיון של 8200 וגאמא סייבר- המדריך המלא.md"
        "blog/posts/מבחן הדפר להתקבלות ל-8200 מוסבר.md": "blog/posts/שלבי המיון של 8200 וגאמא סייבר- המדריך המלא.md"
        "blog/posts/מבחן 300 בגאמא סייבר- מה זה ואיך מתכוננים.md": "blog/posts/שלבי המיון של 8200 וגאמא סייבר- המדריך המלא.md"
        "blog/posts/הראיון האישי במיוני 8200- איך מתכוננים.md": "blog/posts/ראיונות ותחקיר במיוני 8200- איך באמת מתכוננים.md"
        "blog/posts/הראיון הטכני בגאמא סייבר- למה מתכוננים.md": "blog/posts/ראיונות ותחקיר במיוני 8200- איך באמת מתכוננים.md"
        "blog/posts/מה קורה בתחקיר הביטחוני של גאמא סייבר.md": "blog/posts/ראיונות ותחקיר במיוני 8200- איך באמת מתכוננים.md"
        "blog/posts/הטעויות הכי נפוצות של מועמדים לגאמא סייבר.md": "blog/posts/ראיונות ותחקיר במיוני 8200- איך באמת מתכוננים.md"
        "blog/posts/דגלים אדומים בקורסי הכנה ל-8200.md": "blog/posts/קורסי הכנה ל-8200- דגלים אדומים והאם שווה לשלם.md"
        "blog/posts/האם אפשר להתקבל ל-8200 בלי קורס הכנה בתשלום.md": "blog/posts/קורסי הכנה ל-8200- דגלים אדומים והאם שווה לשלם.md"
        "blog/posts/קורס הכנה 8200- האם זה שווה את הכסף.md": "blog/posts/קורסי הכנה ל-8200- דגלים אדומים והאם שווה לשלם.md"
        "blog/posts/מה עושים ביחידת 8200- הסבר כללי לבני נוער.md": "blog/posts/מה עושים ב-8200- תפקידים, מסלולים ומיתוסים נפוצים.md"
        "blog/posts/מה ההבדל בין מסלול טכנולוגי למסלול קרבי בסייבר.md": "blog/posts/מה עושים ב-8200- תפקידים, מסלולים ומיתוסים נפוצים.md"
        "blog/posts/מיתוסים נפוצים על יחידות הטכנולוגיה של הצבא.md": "blog/posts/מה עושים ב-8200- תפקידים, מסלולים ומיתוסים נפוצים.md"
        "blog/posts/השוואה בין יחידות הטכנולוגיה של צהל- 8200 81 9900 וממרם.md": "blog/posts/מה עושים ב-8200- תפקידים, מסלולים ומיתוסים נפוצים.md"
        "blog/posts/ההבדל בין 8200 ל81 ולמצוב.md": "blog/posts/מה עושים ב-8200- תפקידים, מסלולים ומיתוסים נפוצים.md"

markdown_extensions:
  - meta
  - nl2br
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
  - stylesheets/themes.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js
  - javascripts/progress.js
  - javascripts/tabs-dropdown.js
  - javascripts/theme-switcher.js
