<rect class="n-box shp" x="45.4" y="102.0" width="195.9" height="46.0" rx="8"/>
<text class="t" x="143.3" y="130.0" text-anchor="middle" style="direction:ltr">Recursive Resolver</text>
</g>
<g id="el-root">
<rect class="n-box shp" x="69.3" y="188.0" width="148.2" height="46.0" rx="8"/>
<text class="t" x="143.3" y="216.0" text-anchor="middle" style="direction:ltr">Root Server .</text>
</g>
<g id="el-tld">
<rect class="n-box shp" x="58.8" y="274.0" width="169.0" height="46.0" rx="8"/>
<text class="t" x="143.3" y="302.0" text-anchor="middle" style="direction:ltr">TLD Server com.</text>
</g>
<g id="el-auth">
<rect class="n-box shp" x="22.4" y="360.0" width="241.9" height="46.0" rx="8"/>
<text class="t" x="143.3" y="388.0" text-anchor="middle" style="direction:ltr">Authoritative google.com</text>
</g>
<g id="el-answer">
