<g id="el-client">
<rect class="n-box shp" x="16.0" y="16.0" width="254.7" height="46.0" rx="8"/>
<text class="t" x="143.3" y="44.0" text-anchor="middle">הלקוח מבקש www.google.com</text>
</g>
