<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 413 260" width="413" role="img" aria-label="מצביע הקובץ: אחרי write המצביע נמצא בסוף הקובץ, ולכן צריך seek(0) לפני read">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
