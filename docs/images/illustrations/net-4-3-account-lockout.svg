.dyn-state-3{opacity:0;}
@keyframes k-dyn-state-3{0.00%{opacity:0;}47.03%{opacity:0;}50.50%{opacity:1;}67.33%{opacity:1;}70.79%{opacity:0;}100.00%{opacity:0;}}
