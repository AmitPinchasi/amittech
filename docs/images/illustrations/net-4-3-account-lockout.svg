.dyn-counter-0{animation-name:k-dyn-counter-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-counter-1{opacity:0;}
@keyframes k-dyn-counter-1{0.00%{opacity:0;}13.37%{opacity:0;}16.83%{opacity:1;}33.66%{opacity:1;}37.13%{opacity:0;}100.00%{opacity:0;}}
.dyn-counter-1{animation-name:k-dyn-counter-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-counter-2{opacity:0;}
@keyframes k-dyn-counter-2{0.00%{opacity:0;}30.20%{opacity:0;}33.66%{opacity:1;}50.50%{opacity:1;}53.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-counter-2{animation-name:k-dyn-counter-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-counter-3{opacity:0;}
@keyframes k-dyn-counter-3{0.00%{opacity:0;}47.03%{opacity:0;}50.50%{opacity:1;}67.33%{opacity:1;}70.79%{opacity:0;}100.00%{opacity:0;}}
.dyn-counter-3{animation-name:k-dyn-counter-3;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-counter-4{opacity:1;}
@keyframes k-dyn-counter-4{0.00%{opacity:0;}63.86%{opacity:0;}67.33%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-counter-4{animation-name:k-dyn-counter-4;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-cap">
<text class="small" x="330.2" y="29.0" text-anchor="middle">מדיניות נעילת חשבון קובעת סף - כאן 3 - שבו החשבון ננעל לאחר ניסיונות כניסה כושלים רצופים</text>
</g>
<g id="el-state">
<rect class="n-box shp" x="169.0" y="74.0" width="322.5" height="44.0" rx="8"/>
<text class="t-b dyn-state-0" x="330.2" y="101.0" text-anchor="middle">מצב החשבון: פתוח</text>
<text class="t-b dyn-state-1" x="330.2" y="101.0" text-anchor="middle">ניסיון כניסה כושל 1</text>
<text class="t-b dyn-state-2" x="330.2" y="101.0" text-anchor="middle">ניסיון כניסה כושל 2</text>
<text class="t-b dyn-state-3" x="330.2" y="101.0" text-anchor="middle">ניסיון כניסה כושל 3 - הסף הושג</text>
<text class="t-b dyn-state-4" x="330.2" y="101.0" text-anchor="middle">מצב החשבון: נעול</text>
</g>
<g id="el-counter">
<rect class="n-box shp" x="157.0" y="158.0" width="346.5" height="44.0" rx="8"/>
<text class="t-b dyn-counter-0" x="330.2" y="185.0" text-anchor="middle">מונה כשלים = 0</text>
<text class="t-b dyn-counter-1" x="330.2" y="185.0" text-anchor="middle">מונה כשלים = 1</text>
<text class="t-b dyn-counter-2" x="330.2" y="185.0" text-anchor="middle">מונה כשלים = 2</text>
<text class="t-b dyn-counter-3" x="330.2" y="185.0" text-anchor="middle">מונה כשלים = 3</text>
<text class="t-b dyn-counter-4" x="330.2" y="185.0" text-anchor="middle">החשבון ננעל עד שחרור על ידי מנהל</text>
</g>
<g id="el-note">
<text class="small" x="330.2" y="255.0" text-anchor="middle">הנעילה חוסמת ניסיונות ניחוש סיסמה, ומונה הכשלים מתאפס לאחר הזמן שהוגדר במדיניות</text>
</g>
