<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 805 623" width="805" role="img" aria-label="תרשים הדרך של קריאה לפונקציה מ-libc: הקוד שלנו קורא לפונקציה בספרייה, הספרייה מבצעת קריאת מערכת, והקרנל מבצע את הפעולה בפועל">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-app{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-app .shp{animation-name:k-app;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-libc{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}27.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-libc .shp{animation-name:k-libc;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-check{0.00%{stroke-width:1.5;}22.89%{stroke-width:1.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-check .shp{animation-name:k-check;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ret{0.00%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}53.17%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ret .shp{animation-name:k-ret;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sys{0.00%{stroke-width:1.5;}48.24%{stroke-width:1.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sys .shp{animation-name:k-sys;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-kern{0.00%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-kern .shp{animation-name:k-kern;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.21%{stroke-width:1.6;}12.68%{stroke:var(--pink);stroke-width:2.4;}25.35%{stroke:var(--pink);stroke-width:2.4;}27.82%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.89%{stroke-width:1.6;}25.35%{stroke:var(--pink);stroke-width:2.4;}38.03%{stroke:var(--pink);stroke-width:2.4;}40.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}35.56%{stroke-width:1.6;}38.03%{stroke:var(--pink);stroke-width:2.4;}50.70%{stroke:var(--pink);stroke-width:2.4;}53.17%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}48.24%{stroke-width:1.6;}50.70%{stroke:var(--pink);stroke-width:2.4;}63.38%{stroke:var(--pink);stroke-width:2.4;}65.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}60.92%{stroke-width:1.6;}63.38%{stroke:var(--pink);stroke-width:2.4;}76.06%{stroke:var(--pink);stroke-width:2.4;}78.52%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="216.9,54.0 216.9,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="216.9,140.0 216.9,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="385.7,264.4 451.7,264.4" marker-end="url(#arr)"/>
<text class="lbl" x="418.7" y="252.4" text-anchor="middle">לא</text>
<polyline id="edge-3" class="edge" points="216.9,348.8 216.9,388.8" marker-end="url(#arr)"/>
<text class="lbl" x="230.9" y="372.8" text-anchor="end">כן</text>
<polyline id="edge-4" class="edge" points="216.9,434.8 216.9,474.8" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="216.9,520.8 216.9,560.8" marker-end="url(#arr)"/>
<g id="el-app">
<rect class="n-code-bg shp" x="117.7" y="16.0" width="198.5" height="38.0" rx="7"/>
<text class="code" x="216.9" y="43.0" text-anchor="middle">printf("hello\n");</text>
</g>
<g id="el-libc">
<rect class="n-box shp" x="16.0" y="94.0" width="401.8" height="46.0" rx="8"/>
<text class="t" x="216.9" y="122.0" text-anchor="middle">הפונקציה printf בתוך libc בונה את המחרוזת</text>
</g>
<g id="el-check">
<polygon class="n-dia shp" points="216.9,180.0 385.7,264.4 216.9,348.8 48.1,264.4"/>
<text class="code" x="216.9" y="269.4" text-anchor="middle">needs the kernel?</text>
</g>
<g id="el-ret">
<rect class="n-box shp" x="451.7" y="241.4" width="337.0" height="46.0" rx="8"/>
<text class="t" x="620.2" y="269.4" text-anchor="middle">הספרייה מסיימת לבד ומחזירה תשובה</text>
</g>
<g id="el-sys">
<rect class="n-box shp" x="56.7" y="388.8" width="320.5" height="46.0" rx="8"/>
<text class="t" x="216.9" y="416.8" text-anchor="middle">הספרייה מבצעת קריאת מערכת write</text>
</g>
<g id="el-kern">
<rect class="n-box shp" x="60.9" y="474.8" width="312.1" height="46.0" rx="8"/>
<text class="t" x="216.9" y="502.8" text-anchor="middle">הקרנל כותב את הבתים ל-fd מספר 1</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="131.4" y="560.8" width="171.0" height="46.0" rx="8"/>
<text class="t" x="216.9" y="588.8" text-anchor="middle">הפלט מגיע למסך</text>
</g>
</svg>
