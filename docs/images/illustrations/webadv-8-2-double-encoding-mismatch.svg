.dyn-app-0{opacity:0;}
@keyframes k-dyn-app-0{0.00%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-app-0{animation-name:k-dyn-app-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-app-1{opacity:1;}
