<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 476 344" width="476" role="img" aria-label="רשימה גלובלית שמחזיקה מצביעים לאובייקטים מונעת מאיסוף הזבל למחוק אותם">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="238.0,98.0 238.0,138.0" marker-end="url(#arr)"/>
<text class="lbl" x="250.0" y="122.0" text-anchor="end">כל אויב שנמצא נוסף לרשימה</text>
<g id="el-code">
<rect class="n-code-bg shp" x="30.4" y="16.0" width="415.1" height="82.0" rx="7"/>
<text class="code" x="238.0" y="43.0" text-anchor="middle">game_entities = []</text>
<text class="code" x="238.0" y="65.0" text-anchor="middle">for tile in game_map:</text>
<text class="code" x="238.0" y="87.0" text-anchor="middle">    game_entities.append(tile.get_enemy())</text>
</g>
<g id="el-lst">
<rect id="el-lst-c0" class="n-cell shp" x="364.0" y="138.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="412.0" y="166.0" text-anchor="middle">אויב 1</text>
<rect id="el-lst-c1" class="n-cell shp" x="248.0" y="138.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="296.0" y="166.0" text-anchor="middle">אויב 2</text>
<rect id="el-lst-c2" class="n-cell shp" x="132.0" y="138.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.0" y="166.0" text-anchor="middle">אויב 3</text>
<rect id="el-lst-c3" class="n-cell shp" x="16.0" y="138.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="64.0" y="166.0" text-anchor="middle" style="direction:ltr">...</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="58.9" y="224.0" width="358.2" height="46.0" rx="8"/>
<text class="t" x="238.0" y="252.0" text-anchor="middle">כל עוד הרשימה בסקופ, אף אויב לא נמחק</text>
</g>
<g id="el-cap">
<text class="small" x="238.0" y="323.0" text-anchor="middle">הזכרון רק גדל - וזה memory leak</text>
</g>
</svg>
