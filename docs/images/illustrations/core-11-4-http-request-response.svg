<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-cli">
<rect class="n-code-bg shp" x="201.5" y="16.0" width="270.7" height="38.0" rx="7"/>
<text class="code dyn-cli-0" x="336.9" y="43.0" text-anchor="middle">GET /index.html HTTP/1.1</text>
<text class="code dyn-cli-1" x="336.9" y="43.0" text-anchor="middle">Host: www.example.com</text>
<text class="code dyn-cli-2" x="336.9" y="43.0" text-anchor="middle">Connection: close</text>
<text class="code dyn-cli-3" x="336.9" y="43.0" text-anchor="middle">CRLF CRLF - end of headers</text>
</g>
<g id="el-dir">
<rect class="n-box shp" x="197.7" y="94.0" width="278.4" height="44.0" rx="8"/>
<text class="t-b dyn-dir-0" x="336.9" y="121.0" text-anchor="middle">הבקשה נשלחת מהלקוח לשרת</text>
<text class="t-b dyn-dir-1" x="336.9" y="121.0" text-anchor="middle">השרת מעבד את הבקשה</text>
<text class="t-b dyn-dir-2" x="336.9" y="121.0" text-anchor="middle">התשובה חוזרת מהשרת ללקוח</text>
</g>
<g id="el-srv">
<rect class="n-code-bg shp" x="133.8" y="178.0" width="406.1" height="38.0" rx="7"/>
<text class="code dyn-srv-0" x="336.9" y="205.0" text-anchor="middle">waiting for request</text>
<text class="code dyn-srv-1" x="336.9" y="205.0" text-anchor="middle">HTTP/1.1 200 OK</text>
<text class="code dyn-srv-2" x="336.9" y="205.0" text-anchor="middle">Content-Type: text/html</text>
<text class="code dyn-srv-3" x="336.9" y="205.0" text-anchor="middle">Content-Length: 44</text>
<text class="code dyn-srv-4" x="336.9" y="205.0" text-anchor="middle">&lt;html&gt;&lt;body&gt;&lt;h1&gt;Hello!&lt;/h1&gt;&lt;/body&gt;&lt;/html&gt;</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="256.0" width="641.7" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="336.9" y="284.0" text-anchor="middle">השורה הראשונה מכילה מתודה, נתיב, וגרסה</text>
<text class="t dyn-note-1" x="336.9" y="284.0" text-anchor="middle">הכותרת Host מחייבת בגרסה אחת נקודה אחת ומזהה לאיזה אתר הבקשה מיועדת</text>
<text class="t dyn-note-2" x="336.9" y="284.0" text-anchor="middle">שורה ריקה מסמנת שהכותרות נגמרו ושמתחיל הגוף</text>
<text class="t dyn-note-3" x="336.9" y="284.0" text-anchor="middle">השרת מפרסר את שורת הבקשה ומחליט מה להחזיר</text>
<text class="t dyn-note-4" x="336.9" y="284.0" text-anchor="middle">שורת המצב מכילה את הגרסה, את קוד המצב, ואת תיאור הסיבה</text>
<text class="t dyn-note-5" x="336.9" y="284.0" text-anchor="middle">הכותרת Content-Length מלמדת את הלקוח כמה בתים לקרוא בגוף</text>
</g>
<g id="el-cap">
<text class="small" x="336.9" y="355.0" text-anchor="middle">הפרוטוקול כולו הוא טקסט פשוט, ולכן אפשר לשלוח בקשה ידנית דרך סוקט TCP רגיל</text>
</g>
</svg>
