<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 674 376" width="674" role="img" aria-label="חילופי הודעות HTTP מעל חיבור TCP: הלקוח שולח בקשה טקסטואלית והשרת מחזיר שורת מצב, כותרות וגוף">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
