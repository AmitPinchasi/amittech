<polyline id="edge-4" class="edge" points="119.8,352.4 119.8,501.4 317.0,501.4" marker-end="url(#arr)"/>
<text class="lbl" x="133.8" y="426.9" text-anchor="end">רק אחרי רינדור JS</text>
<g id="el-bot">
<rect class="n-box shp" x="292.4" y="16.0" width="239.6" height="46.0" rx="8"/>
<text class="t" x="412.2" y="44.0" text-anchor="middle">הבוט מבקש את הדף מהשרת</text>
</g>
