<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 435 212" width="435" role="img" aria-label="הפניית פלט בבאש: כברירת מחדל הפלט למסך, האופרטור גדול-מ שולח אותו לקובץ, ו-2 גדול-מ שולח שגיאות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cmd{0.00%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-cmd .shp{animation-name:k-cmd;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dst{0.00%{stroke-width:1.5;}20.71%{stroke-width:1.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-dst .shp{animation-name:k-dst;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}20.71%{stroke-width:1.6;}25.71%{stroke:var(--pink);stroke-width:2.4;}77.14%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-0{animation-name:k-edge-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmd-0{opacity:0;}
@keyframes k-dyn-cmd-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-cmd-0{animation-name:k-dyn-cmd-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmd-1{opacity:0;}
@keyframes k-dyn-cmd-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-cmd-1{animation-name:k-dyn-cmd-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmd-2{opacity:1;}
@keyframes k-dyn-cmd-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-cmd-2{animation-name:k-dyn-cmd-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-dst-0{opacity:0;}
@keyframes k-dyn-dst-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-dst-0{animation-name:k-dyn-dst-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-dst-1{opacity:0;}
@keyframes k-dyn-dst-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-dst-1{animation-name:k-dyn-dst-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-dst-2{opacity:1;}
@keyframes k-dyn-dst-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-dst-2{animation-name:k-dyn-dst-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="217.4,54.0 217.4,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="229.4" y="78.0" text-anchor="end">מפנה את הפלט</text>
<g id="el-cmd">
<rect class="n-code-bg shp" x="118.2" y="16.0" width="198.5" height="38.0" rx="7"/>
<text class="code dyn-cmd-0" x="217.4" y="43.0" text-anchor="middle">ls -la</text>
<text class="code dyn-cmd-1" x="217.4" y="43.0" text-anchor="middle">ls -la &gt; files.txt</text>
<text class="code dyn-cmd-2" x="217.4" y="43.0" text-anchor="middle">ls bad 2&gt; err.txt</text>
</g>
<g id="el-dst">
<rect class="n-box shp" x="89.7" y="94.0" width="255.5" height="44.0" rx="8"/>
<text class="t-b dyn-dst-0" x="217.4" y="121.0" text-anchor="middle">הפלט מודפס למסך</text>
<text class="t-b dyn-dst-1" x="217.4" y="121.0" text-anchor="middle">הפלט נכתב אל files.txt</text>
<text class="t-b dyn-dst-2" x="217.4" y="121.0" text-anchor="middle">השגיאה נכתבת אל err.txt</text>
</g>
<g id="el-note">
<text class="small" x="217.4" y="191.0" text-anchor="middle">פלט רגיל ושגיאות הם שני זרמים שאפשר להפנות לקבצים שונים</text>
</g>
</svg>
