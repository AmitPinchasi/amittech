<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 379 290" width="379" role="img" aria-label="השורה x = x + 1 מחשבת את הערך הישן ועוד אחד ושומרת את התוצאה בחזרה ב-x">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-c1{0.00%{stroke:var(--pink);stroke-width:2.5;}24.59%{stroke:var(--pink);stroke-width:2.5;}30.33%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-c1 .shp{animation-name:k-c1;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-c2{0.00%{stroke-width:1.5;}18.85%{stroke-width:1.5;}24.59%{stroke:var(--pink);stroke-width:2.5;}49.18%{stroke:var(--pink);stroke-width:2.5;}54.92%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-c2 .shp{animation-name:k-c2;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-val{0.00%{stroke-width:1.5;}43.44%{stroke-width:1.5;}49.18%{stroke:var(--pink);stroke-width:2.5;}73.77%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-val .shp{animation-name:k-val;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}18.85%{stroke-width:1.6;}24.59%{stroke:var(--pink);stroke-width:2.4;}49.18%{stroke:var(--pink);stroke-width:2.4;}54.92%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}43.44%{stroke-width:1.6;}49.18%{stroke:var(--pink);stroke-width:2.4;}73.77%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:0;}
@keyframes k-dyn-val-1{0.00%{opacity:1;}24.59%{opacity:1;}30.33%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-2{opacity:0;}
@keyframes k-dyn-val-2{0.00%{opacity:0;}18.85%{opacity:0;}24.59%{opacity:1;}49.18%{opacity:1;}54.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-2{animation-name:k-dyn-val-2;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-3{opacity:1;}
@keyframes k-dyn-val-3{0.00%{opacity:0;}43.44%{opacity:0;}49.18%{opacity:1;}73.77%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-3{animation-name:k-dyn-val-3;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="189.6,54.0 189.6,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="189.6,132.0 189.6,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="201.6" y="156.0" text-anchor="end">הערך של x</text>
<g id="el-c1">
<rect class="n-code-bg shp" x="141.6" y="16.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="189.6" y="43.0" text-anchor="middle">x = 5</text>
</g>
<g id="el-c2">
<rect class="n-code-bg shp" x="131.0" y="94.0" width="117.2" height="38.0" rx="7"/>
<text class="code" x="189.6" y="121.0" text-anchor="middle">x = x + 1</text>
</g>
<g id="el-val">
<rect class="n-box shp" x="134.8" y="172.0" width="109.6" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="189.6" y="199.0" text-anchor="middle" style="direction:ltr">x</text>
<text class="t-b dyn-val-1" x="189.6" y="199.0" text-anchor="middle" style="direction:ltr">x = 5</text>
<text class="t-b dyn-val-2" x="189.6" y="199.0" text-anchor="middle" style="direction:ltr">x = 5 + 1</text>
<text class="t-b dyn-val-3" x="189.6" y="199.0" text-anchor="middle" style="direction:ltr">x = 6</text>
</g>
<g id="el-note">
<text class="small" x="189.6" y="269.0" text-anchor="middle">הביטוי מימין לסימן השווה מחושב עם הערך הישן של x</text>
</g>
</svg>
