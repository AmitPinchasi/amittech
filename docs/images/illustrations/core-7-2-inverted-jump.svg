<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 363 495" width="363" role="img" aria-label="התנאי באסמבלי הפוך מהתנאי בשפת C: התנאי x &gt; 5 מתורגם לקפיצה jle שמדלגת אל ה-else כאשר x קטן או שווה לחמש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
