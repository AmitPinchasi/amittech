<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 671 484" width="671" role="img" aria-label="פונקציית login זורקת שגיאה ופונקציית safe_login תופסת אותה, כך שהמשתמש לא רואה את השגיאה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-safe{0.00%{stroke:var(--pink);stroke-width:2.5;}10.00%{stroke:var(--pink);stroke-width:2.5;}12.19%{stroke-width:1.5;}37.81%{stroke-width:1.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}52.19%{stroke-width:1.5;}77.81%{stroke-width:1.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}90.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-safe .shp{animation-name:k-safe;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-login{0.00%{stroke-width:1.5;}7.81%{stroke-width:1.5;}10.00%{stroke:var(--pink);stroke-width:2.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}22.19%{stroke-width:1.5;}47.81%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}62.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-login .shp{animation-name:k-login;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}17.81%{stroke-width:1.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}30.00%{stroke:var(--pink);stroke-width:2.5;}32.19%{stroke-width:1.5;}57.81%{stroke-width:1.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}70.00%{stroke:var(--pink);stroke-width:2.5;}72.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ok{0.00%{stroke-width:1.5;}27.81%{stroke-width:1.5;}30.00%{stroke:var(--pink);stroke-width:2.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}42.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ok .shp{animation-name:k-ok;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-err{0.00%{stroke-width:1.5;}67.81%{stroke-width:1.5;}70.00%{stroke:var(--pink);stroke-width:2.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}82.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-err .shp{animation-name:k-err;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}7.81%{stroke-width:1.6;}10.00%{stroke:var(--pink);stroke-width:2.4;}20.00%{stroke:var(--pink);stroke-width:2.4;}22.19%{stroke-width:1.6;}47.81%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}60.00%{stroke:var(--pink);stroke-width:2.4;}62.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}17.81%{stroke-width:1.6;}20.00%{stroke:var(--pink);stroke-width:2.4;}30.00%{stroke:var(--pink);stroke-width:2.4;}32.19%{stroke-width:1.6;}57.81%{stroke-width:1.6;}60.00%{stroke:var(--pink);stroke-width:2.4;}70.00%{stroke:var(--pink);stroke-width:2.4;}72.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}27.81%{stroke-width:1.6;}30.00%{stroke:var(--pink);stroke-width:2.4;}40.00%{stroke:var(--pink);stroke-width:2.4;}42.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}67.81%{stroke-width:1.6;}70.00%{stroke:var(--pink);stroke-width:2.4;}80.00%{stroke:var(--pink);stroke-width:2.4;}82.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}77.81%{stroke-width:1.6;}80.00%{stroke:var(--pink);stroke-width:2.4;}90.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-safe-0{opacity:0;}
@keyframes k-dyn-safe-0{0.00%{opacity:1;}80.00%{opacity:1;}82.19%{opacity:0;}100.00%{opacity:0;}}
.dyn-safe-0{animation-name:k-dyn-safe-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-safe-1{opacity:1;}
@keyframes k-dyn-safe-1{0.00%{opacity:0;}77.81%{opacity:0;}80.00%{opacity:1;}90.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-safe-1{animation-name:k-dyn-safe-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-login-0{opacity:0;}
@keyframes k-dyn-login-0{0.00%{opacity:1;}50.00%{opacity:1;}52.19%{opacity:0;}100.00%{opacity:0;}}
.dyn-login-0{animation-name:k-dyn-login-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-login-1{opacity:1;}
@keyframes k-dyn-login-1{0.00%{opacity:0;}47.81%{opacity:0;}50.00%{opacity:1;}90.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-login-1{animation-name:k-dyn-login-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="277.1,65.0 277.1,105.0" marker-end="url(#arr)"/>
<text class="lbl" x="291.1" y="89.0" text-anchor="end" style="direction:ltr">try</text>
<polyline id="edge-1" class="edge" points="277.1,143.0 277.1,183.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="426.1,257.5 492.1,257.5" marker-end="url(#arr)"/>
<text class="lbl" x="459.1" y="245.5" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="277.1,331.9 277.1,371.9" marker-end="url(#arr)"/>
<text class="lbl" x="291.1" y="355.9" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="128.2,390.9 20.4,390.9 20.4,42.0 100.4,42.0" marker-end="url(#arr)"/>
<text class="small" x="60.4" y="30.0" text-anchor="middle">השגיאה עולה</text>
<g id="el-safe">
<rect class="n-box shp" x="100.4" y="19.0" width="353.5" height="46.0" rx="8"/>
<text class="t dyn-safe-0" x="277.1" y="47.0" text-anchor="middle">הפונקציה safe_login קוראת בתוך try</text>
<text class="t dyn-safe-1" x="277.1" y="47.0" text-anchor="middle">ה-except של safe_login תופס את השגיאה</text>
</g>
<g id="el-login">
<rect class="n-code-bg shp" x="159.8" y="105.0" width="234.6" height="38.0" rx="7"/>
<text class="code dyn-login-0" x="277.1" y="132.0" text-anchor="middle">login("dana", "1234")</text>
<text class="code dyn-login-1" x="277.1" y="132.0" text-anchor="middle">login("dana", "wrong")</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="277.1,183.0 426.1,257.5 277.1,331.9 128.2,257.5"/>
<text class="code" x="277.1" y="262.5" text-anchor="middle">check_password?</text>
</g>
<g id="el-ok">
<rect class="n-box shp" x="492.1" y="234.5" width="162.9" height="46.0" rx="8"/>
<text class="t" x="573.6" y="262.5" text-anchor="middle" style="direction:ltr">session.start()</text>
</g>
<g id="el-err">
<rect class="n-code-bg shp" x="128.2" y="371.9" width="297.8" height="38.0" rx="7"/>
<text class="code" x="277.1" y="398.9" text-anchor="middle">raise AuthenticationException</text>
</g>
<g id="el-note">
<text class="small" x="277.1" y="462.9" text-anchor="middle">המשתמש אף פעם לא רואה את השגיאה עצמה</text>
</g>
</svg>
