<polyline id="edge-6" class="edge" points="369.2,575.2 369.2,615.2" marker-end="url(#arr)"/>
<polyline id="edge-7" class="edge" points="142.2,638.2 16.0,638.2 16.0,117.0 167.4,117.0" marker-end="url(#arr)"/>
<text class="small" x="91.7" y="105.0" text-anchor="middle">ניסיון נוסף</text>
<g id="el-code">
<rect class="n-code-bg shp" x="256.4" y="16.0" width="225.6" height="38.0" rx="7"/>
<text class="code" x="369.2" y="43.0" text-anchor="middle">mov eax, [0x00500000]</text>
</g>
<g id="el-walk">
<rect class="n-box shp" x="167.4" y="94.0" width="403.5" height="46.0" rx="8"/>
<text class="t" x="369.2" y="122.0" text-anchor="middle">המעבד מתרגם את הכתובת דרך טבלאות ה-paging</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="369.2,180.0 478.4,234.6 369.2,289.2 259.9,234.6"/>
<text class="code dyn-cond-0" x="369.2" y="239.6" text-anchor="middle">Present ?</text>
<text class="code dyn-cond-1" x="369.2" y="239.6" text-anchor="middle">Present = 0</text>
<text class="code dyn-cond-2" x="369.2" y="239.6" text-anchor="middle">Present = 1</text>
</g>
<g id="el-ok">
<rect class="n-box shp" x="544.4" y="211.6" width="188.8" height="46.0" rx="8"/>
<text class="t" x="638.8" y="239.6" text-anchor="middle">הערך נקרא מה-RAM</text>
</g>
<g id="el-fault">
<rect class="n-box shp" x="96.0" y="329.2" width="546.3" height="46.0" rx="8"/>
<text class="t" x="369.2" y="357.2" text-anchor="middle">המעבד מפעיל את הפסיקה int 14h ושומר את הכתובת ברגיסטר cr2</text>
</g>
<g id="el-cr2">
<rect class="n-code-bg shp" x="278.9" y="415.2" width="180.4" height="38.0" rx="7"/>
<text class="code" x="369.2" y="442.2" text-anchor="middle">CR2 = 0x00500000</text>
</g>
<g id="el-alloc">
<rect class="n-code-bg shp" x="251.9" y="493.2" width="234.6" height="82.0" rx="7"/>
<text class="code" x="369.2" y="520.2" text-anchor="middle">call allocate_frame</text>
<text class="code" x="369.2" y="542.2" text-anchor="middle">or eax, 0x7</text>
<text class="code" x="369.2" y="564.2" text-anchor="middle">mov [edx + ebx*4], eax</text>
</g>
<g id="el-iret">
<rect class="n-box shp" x="142.2" y="615.2" width="453.9" height="46.0" rx="8"/>
<text class="t" x="369.2" y="643.2" text-anchor="middle">הפקודה iret מחזירה את התוכנה לאותה הוראה בדיוק</text>
</g>
</svg>
