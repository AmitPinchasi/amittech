<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="369.2,54.0 369.2,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="369.2,140.0 369.2,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="478.4,234.6 544.4,234.6" marker-end="url(#arr)"/>
