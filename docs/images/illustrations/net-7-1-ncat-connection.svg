<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 291 334" width="291" role="img" aria-label="מודל החיבור של ncat: צד אחד מאזין לפורט, הצד השני מתחבר אליו, ואז המלל שנכתב בכל צד עובר לצד השני מעל TCP">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-srv{0.00%{stroke:var(--pink);stroke-width:2.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}24.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-srv .shp{animation-name:k-srv;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cli{0.00%{stroke-width:1.5;}15.62%{stroke-width:1.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}44.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cli .shp{animation-name:k-cli;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-conn{0.00%{stroke-width:1.5;}35.62%{stroke-width:1.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}64.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-conn .shp{animation-name:k-conn;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-msg{0.00%{stroke-width:1.5;}55.62%{stroke-width:1.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-msg .shp{animation-name:k-msg;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}15.62%{stroke-width:1.6;}20.00%{stroke:var(--pink);stroke-width:2.4;}40.00%{stroke:var(--pink);stroke-width:2.4;}44.38%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}35.62%{stroke-width:1.6;}40.00%{stroke:var(--pink);stroke-width:2.4;}60.00%{stroke:var(--pink);stroke-width:2.4;}64.38%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}55.62%{stroke-width:1.6;}60.00%{stroke:var(--pink);stroke-width:2.4;}80.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-msg-0{opacity:0;}
@keyframes k-dyn-msg-0{0.00%{opacity:1;}60.00%{opacity:1;}64.38%{opacity:0;}100.00%{opacity:0;}}
.dyn-msg-0{animation-name:k-dyn-msg-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-msg-1{opacity:1;}
@keyframes k-dyn-msg-1{0.00%{opacity:0;}55.62%{opacity:0;}60.00%{opacity:1;}80.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-msg-1{animation-name:k-dyn-msg-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="145.7,62.0 145.7,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="159.7" y="86.0" text-anchor="end">הלקוח מתחבר</text>
<polyline id="edge-1" class="edge" points="145.7,148.0 145.7,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="159.7" y="172.0" text-anchor="end">החיבור נוצר</text>
<polyline id="edge-2" class="edge" points="145.7,234.0 145.7,274.0" marker-end="url(#arr)"/>
<g id="el-srv">
<rect class="n-box shp" x="39.0" y="16.0" width="213.3" height="46.0" rx="8"/>
<text class="t" x="145.7" y="44.0" text-anchor="middle">השרת: ncat -l -p 1234</text>
</g>
<g id="el-cli">
<rect class="n-box shp" x="16.0" y="102.0" width="259.4" height="46.0" rx="8"/>
<text class="t" x="145.7" y="130.0" text-anchor="middle">הלקוח: ncat 10.0.0.5 1234</text>
</g>
<g id="el-conn">
<rect class="n-box shp" x="36.7" y="188.0" width="218.0" height="46.0" rx="8"/>
<text class="t" x="145.7" y="216.0" text-anchor="middle">חיבור TCP דו-כיווני</text>
</g>
<g id="el-msg">
<rect class="n-box shp" x="37.7" y="274.0" width="216.0" height="44.0" rx="8"/>
<text class="t-b dyn-msg-0" x="145.7" y="301.0" text-anchor="middle">מלל נכתב בצד אחד</text>
<text class="t-b dyn-msg-1" x="145.7" y="301.0" text-anchor="middle">המלל מגיע לצד השני</text>
</g>
</svg>
