<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 298" width="400" role="img" aria-label="אנימציה של הזזת ביטים שמאלה: כל הזזה מזיזה את הביטים צעד אחד שמאלה ומכפילה את הערך בשתיים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-instr{0.00%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-instr .shp{animation-name:k-instr;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-bits{0.00%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-bits .shp{animation-name:k-bits;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-instr-0{opacity:0;}
@keyframes k-dyn-instr-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-instr-0{animation-name:k-dyn-instr-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-instr-1{opacity:0;}
@keyframes k-dyn-instr-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-instr-1{animation-name:k-dyn-instr-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-instr-2{opacity:1;}
@keyframes k-dyn-instr-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-instr-2{animation-name:k-dyn-instr-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bits-0{opacity:0;}
@keyframes k-dyn-bits-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-bits-0{animation-name:k-dyn-bits-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bits-1{opacity:0;}
@keyframes k-dyn-bits-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-bits-1{animation-name:k-dyn-bits-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bits-2{opacity:1;}
@keyframes k-dyn-bits-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-bits-2{animation-name:k-dyn-bits-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:1;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-instr">
<rect class="n-code-bg shp" x="141.6" y="16.0" width="117.2" height="38.0" rx="7"/>
<text class="code dyn-instr-0" x="200.2" y="43.0" text-anchor="middle">mov al, 3</text>
<text class="code dyn-instr-1" x="200.2" y="43.0" text-anchor="middle">shl al, 1</text>
<text class="code dyn-instr-2" x="200.2" y="43.0" text-anchor="middle">shl al, 1</text>
</g>
<g id="el-bits">
<rect class="n-box shp" x="89.9" y="94.0" width="220.7" height="44.0" rx="8"/>
<text class="t-b dyn-bits-0" x="200.2" y="121.0" text-anchor="middle" style="direction:ltr">AL = 00000011b = 3</text>
<text class="t-b dyn-bits-1" x="200.2" y="121.0" text-anchor="middle" style="direction:ltr">AL = 00000110b = 6</text>
<text class="t-b dyn-bits-2" x="200.2" y="121.0" text-anchor="middle" style="direction:ltr">AL = 00001100b = 12</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="40.8" y="178.0" width="318.8" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="200.2" y="206.0" text-anchor="middle">הערך ההתחלתי הוא 3</text>
<text class="t dyn-note-1" x="200.2" y="206.0" text-anchor="middle">הביטים זזו שמאלה, והערך הוכפל</text>
<text class="t dyn-note-2" x="200.2" y="206.0" text-anchor="middle">עוד הזזה שמאלה, והערך הוכפל שוב</text>
</g>
<g id="el-cap">
<text class="small" x="200.2" y="277.0" text-anchor="middle">הזזה שמאלה מכפילה בשתיים, והזזה ימינה מחלקת בשתיים</text>
</g>
</svg>
