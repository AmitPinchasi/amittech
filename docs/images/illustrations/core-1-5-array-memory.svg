<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 596 318" width="596" role="img" aria-label="אנימציה של מערך בזיכרון: כל איבר יושב בכתובת עוקבת, והכתובת שלו היא כתובת הבסיס ועוד האינדקס">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
