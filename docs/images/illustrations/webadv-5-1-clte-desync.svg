<text class="code" x="261.6" y="43.0" text-anchor="middle">POST / HTTP/1.1</text>
<text class="code" x="261.6" y="65.0" text-anchor="middle">Content-Length: 13</text>
<text class="code" x="261.6" y="87.0" text-anchor="middle">Transfer-Encoding: chunked</text>
<text class="code" x="261.6" y="109.0" text-anchor="middle"></text>
<text class="code" x="261.6" y="131.0" text-anchor="middle">0</text>
<text class="code" x="261.6" y="153.0" text-anchor="middle"></text>
<text class="code" x="261.6" y="175.0" text-anchor="middle">SMUGGLED</text>
</g>
<g id="el-fe">
<rect class="n-box shp" x="25.2" y="226.0" width="472.7" height="46.0" rx="8"/>
<text class="t dyn-fe-0" x="261.6" y="254.0" text-anchor="middle">שרת חזיתי</text>
<text class="t dyn-fe-1" x="261.6" y="254.0" text-anchor="middle">שרת חזיתי: Content-Length=13, מעביר את כל 13 הבתים</text>
</g>
<g id="el-be">
<rect class="n-box shp" x="16.0" y="312.0" width="491.2" height="46.0" rx="8"/>
<text class="t dyn-be-0" x="261.6" y="340.0" text-anchor="middle">שרת אחורי</text>
<text class="t dyn-be-1" x="261.6" y="340.0" text-anchor="middle">שרת אחורי: Transfer-Encoding, חלק בגודל 0 = סוף הבקשה</text>
</g>
<g id="el-out">
