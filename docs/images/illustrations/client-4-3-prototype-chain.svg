<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 359 414" width="359" role="img" aria-label="חיפוש property בשרשרת הפרוטוטייפ: אם לא נמצא על האובייקט עצמו, JavaScript עולה ל-prototype וכך הלאה עד null">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}20.31%{stroke-width:1.5;}46.35%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}70.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dog{0.00%{stroke-width:1.5;}13.02%{stroke-width:1.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}36.98%{stroke-width:1.5;}63.02%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-dog .shp{animation-name:k-dog;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-animal{0.00%{stroke-width:1.5;}29.69%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}53.65%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-animal .shp{animation-name:k-animal;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.02%{stroke-width:1.6;}16.67%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}36.98%{stroke-width:1.6;}63.02%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}83.33%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.69%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}53.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-0{opacity:0;}
@keyframes k-dyn-call-0{0.00%{opacity:1;}50.00%{opacity:1;}53.65%{opacity:0;}100.00%{opacity:0;}}
.dyn-call-0{animation-name:k-dyn-call-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-1{opacity:1;}
@keyframes k-dyn-call-1{0.00%{opacity:0;}46.35%{opacity:0;}50.00%{opacity:1;}83.33%{opacity:1;}100.00%{opacity:1;}}
.dyn-call-1{animation-name:k-dyn-call-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="134.6,54.0 134.6,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="148.6" y="78.0" text-anchor="end">מחפשים כאן קודם</text>
<polyline id="edge-1" class="edge" points="134.6,140.0 134.6,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="148.6" y="164.0" text-anchor="end">לא נמצא - עולים ל-prototype</text>
<polyline id="edge-2" class="edge" points="134.6,226.0 134.6,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="148.6" y="250.0" text-anchor="end">רק אם עדיין לא נמצא</text>
<polyline id="edge-3" class="edge" points="134.6,312.0 134.6,352.0" marker-end="url(#arr)"/>
<g id="el-call">
<rect class="n-code-bg shp" x="48.9" y="16.0" width="171.4" height="38.0" rx="7"/>
<text class="code dyn-call-0" x="134.6" y="43.0" text-anchor="middle">dog.makeSound()</text>
<text class="code dyn-call-1" x="134.6" y="43.0" text-anchor="middle">dog.name</text>
</g>
<g id="el-dog">
<rect class="n-box shp" x="28.6" y="94.0" width="212.0" height="46.0" rx="8"/>
<text class="t" x="134.6" y="122.0" text-anchor="middle">dog - יש בו name בלבד</text>
</g>
<g id="el-animal">
<rect class="n-box shp" x="16.0" y="180.0" width="237.2" height="46.0" rx="8"/>
<text class="t" x="134.6" y="208.0" text-anchor="middle">animal - יש בו makeSound</text>
</g>
<g id="el-objproto">
<rect class="n-box shp" x="45.6" y="266.0" width="178.1" height="46.0" rx="8"/>
<text class="t" x="134.6" y="294.0" text-anchor="middle" style="direction:ltr">Object.prototype</text>
</g>
<g id="el-null">
<rect class="n-box shp" x="41.4" y="352.0" width="186.5" height="46.0" rx="8"/>
<text class="t" x="134.6" y="380.0" text-anchor="middle">null - סוף השרשרת</text>
</g>
</svg>
