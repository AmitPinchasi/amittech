<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 364 506" width="364" role="img" aria-label="השלבים מהקלדת כתובת בדפדפן ועד הצגת הדף: חיפוש DNS, חיבור TCP, בקשת HTTP, תשובה ורינדור">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-url{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-url .shp{animation-name:k-url;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dns{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-dns .shp{animation-name:k-dns;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tcp{0.00%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}53.17%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-tcp .shp{animation-name:k-tcp;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-req{0.00%{stroke-width:1.5;}48.24%{stroke-width:1.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-resp{0.00%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-resp .shp{animation-name:k-resp;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-render{0.00%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-render .shp{animation-name:k-render;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.21%{stroke-width:1.6;}12.68%{stroke:var(--pink);stroke-width:2.4;}25.35%{stroke:var(--pink);stroke-width:2.4;}27.82%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}35.56%{stroke-width:1.6;}38.03%{stroke:var(--pink);stroke-width:2.4;}50.70%{stroke:var(--pink);stroke-width:2.4;}53.17%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}48.24%{stroke-width:1.6;}50.70%{stroke:var(--pink);stroke-width:2.4;}63.38%{stroke:var(--pink);stroke-width:2.4;}65.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}60.92%{stroke-width:1.6;}63.38%{stroke:var(--pink);stroke-width:2.4;}76.06%{stroke:var(--pink);stroke-width:2.4;}78.52%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-dns-0{opacity:0;}
@keyframes k-dyn-dns-0{0.00%{opacity:1;}25.35%{opacity:1;}27.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-dns-0{animation-name:k-dyn-dns-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-dns-1{opacity:1;}
@keyframes k-dyn-dns-1{0.00%{opacity:0;}22.89%{opacity:0;}25.35%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-dns-1{animation-name:k-dyn-dns-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="182.0,54.0 182.0,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="196.0" y="78.0" text-anchor="end">לחיצה על Enter</text>
<polyline id="edge-1" class="edge" points="182.0,140.0 182.0,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="182.0,226.0 182.0,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="196.0" y="250.0" text-anchor="end">שליחת הבקשה</text>
<polyline id="edge-3" class="edge" points="182.0,304.0 182.0,344.0" marker-end="url(#arr)"/>
<text class="lbl" x="196.0" y="328.0" text-anchor="end">השרת עונה</text>
<polyline id="edge-4" class="edge" points="182.0,404.0 182.0,444.0" marker-end="url(#arr)"/>
<g id="el-url">
<rect class="n-code-bg shp" x="64.7" y="16.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="182.0" y="43.0" text-anchor="middle">https://www.google.com</text>
</g>
<g id="el-dns">
<rect class="n-box shp" x="16.0" y="94.0" width="332.0" height="46.0" rx="8"/>
<text class="t dyn-dns-0" x="182.0" y="122.0" text-anchor="middle">חיפוש DNS - מה הכתובת של הדומיין?</text>
<text class="t dyn-dns-1" x="182.0" y="122.0" text-anchor="middle">התשובה: 142.250.185.206</text>
</g>
<g id="el-tcp">
<rect class="n-box shp" x="41.7" y="180.0" width="280.5" height="46.0" rx="8"/>
<text class="t" x="182.0" y="208.0" text-anchor="middle">יצירת חיבור TCP מוצפן לשרת</text>
</g>
<g id="el-req">
<rect class="n-code-bg shp" x="100.8" y="266.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="182.0" y="293.0" text-anchor="middle">GET / HTTP/1.1</text>
</g>
<g id="el-resp">
<rect class="n-code-bg shp" x="82.7" y="344.0" width="198.5" height="60.0" rx="7"/>
<text class="code" x="182.0" y="371.0" text-anchor="middle">HTTP/1.1 200 OK</text>
<text class="code" x="182.0" y="393.0" text-anchor="middle">&lt;!DOCTYPE html&gt;...</text>
</g>
<g id="el-render">
<rect class="n-box shp" x="40.2" y="444.0" width="283.6" height="46.0" rx="8"/>
<text class="t" x="182.0" y="472.0" text-anchor="middle">הדפדפן מרנדר את הדף על המסך</text>
</g>
</svg>
