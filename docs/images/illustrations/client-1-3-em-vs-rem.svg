<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 587 368" width="587" role="img" aria-label="ההבדל בין em ל-rem: חישוב גודל פונט יחסי להורה מול יחסי לשורש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-root{0.00%{stroke:var(--pink);stroke-width:2.5;}17.24%{stroke:var(--pink);stroke-width:2.5;}20.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-root .shp{animation-name:k-root;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-parent{0.00%{stroke-width:1.5;}14.22%{stroke-width:1.5;}17.24%{stroke:var(--pink);stroke-width:2.5;}34.48%{stroke:var(--pink);stroke-width:2.5;}37.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-parent .shp{animation-name:k-parent;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-size{0.00%{stroke-width:1.5;}14.22%{stroke-width:1.5;}17.24%{stroke:var(--pink);stroke-width:2.5;}51.72%{stroke:var(--pink);stroke-width:2.5;}54.74%{stroke-width:1.5;}65.95%{stroke-width:1.5;}68.97%{stroke:var(--pink);stroke-width:2.5;}86.21%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-size .shp{animation-name:k-size;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-child{0.00%{stroke-width:1.5;}31.47%{stroke-width:1.5;}34.48%{stroke:var(--pink);stroke-width:2.5;}86.21%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-child .shp{animation-name:k-child;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-child-0{opacity:0;}
@keyframes k-dyn-child-0{0.00%{opacity:1;}51.72%{opacity:1;}54.74%{opacity:0;}100.00%{opacity:0;}}
.dyn-child-0{animation-name:k-dyn-child-0;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-child-1{opacity:1;}
@keyframes k-dyn-child-1{0.00%{opacity:0;}48.71%{opacity:0;}51.72%{opacity:1;}86.21%{opacity:1;}100.00%{opacity:1;}}
.dyn-child-1{animation-name:k-dyn-child-1;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-size-0{opacity:0;}
@keyframes k-dyn-size-0{0.00%{opacity:1;}34.48%{opacity:1;}37.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-size-0{animation-name:k-dyn-size-0;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-size-1{opacity:0;}
@keyframes k-dyn-size-1{0.00%{opacity:0;}31.47%{opacity:0;}34.48%{opacity:1;}68.97%{opacity:1;}71.98%{opacity:0;}100.00%{opacity:0;}}
.dyn-size-1{animation-name:k-dyn-size-1;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-size-2{opacity:1;}
@keyframes k-dyn-size-2{0.00%{opacity:0;}65.95%{opacity:0;}68.97%{opacity:1;}86.21%{opacity:1;}100.00%{opacity:1;}}
.dyn-size-2{animation-name:k-dyn-size-2;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-root">
<rect class="n-code-bg shp" x="167.0" y="16.0" width="252.7" height="38.0" rx="7"/>
<text class="code" x="293.4" y="43.0" text-anchor="middle">html { font-size: 16px }</text>
</g>
<g id="el-parent">
<rect class="n-code-bg shp" x="149.0" y="94.0" width="288.8" height="38.0" rx="7"/>
<text class="code" x="293.4" y="121.0" text-anchor="middle">.parent { font-size: 1.5em }</text>
</g>
<g id="el-child">
<rect class="n-code-bg shp" x="149.0" y="172.0" width="288.8" height="38.0" rx="7"/>
<text class="code dyn-child-0" x="293.4" y="199.0" text-anchor="middle">.child { font-size: 1.5em }</text>
<text class="code dyn-child-1" x="293.4" y="199.0" text-anchor="middle">.child { font-size: 1.5rem }</text>
</g>
<g id="el-size">
<rect class="n-box shp" x="175.9" y="250.0" width="235.0" height="44.0" rx="8"/>
<text class="t-b dyn-size-0" x="293.4" y="277.0" text-anchor="middle" style="direction:ltr">parent: 16 * 1.5 = 24px</text>
<text class="t-b dyn-size-1" x="293.4" y="277.0" text-anchor="middle" style="direction:ltr">em: 24 * 1.5 = 36px</text>
<text class="t-b dyn-size-2" x="293.4" y="277.0" text-anchor="middle" style="direction:ltr">rem: 16 * 1.5 = 24px</text>
</g>
<g id="el-note">
<text class="small" x="293.4" y="347.0" text-anchor="middle">היחידה em מוכפלת בגודל ההורה ומצטברת בקינון, בעוד rem מחושבת תמיד מגודל השורש</text>
</g>
</svg>
