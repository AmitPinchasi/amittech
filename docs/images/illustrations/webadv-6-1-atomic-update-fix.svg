<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 561 428" width="561" role="img" aria-label="הגנה בפעולה אטומית: כשהבדיקה והעדכון הם משפט UPDATE יחיד עם תנאי על היתרה, הבקשה הראשונה מורידה את היתרה לאפס והבקשה השנייה מוצאת אפס שורות ונדחית">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-q{0.00%{stroke:var(--pink);stroke-width:2.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}30.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-q .shp{animation-name:k-q;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-reqA{0.00%{stroke-width:1.5;}21.23%{stroke-width:1.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}56.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-reqA .shp{animation-name:k-reqA;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-shared{0.00%{stroke-width:1.5;}21.23%{stroke-width:1.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}56.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-shared .shp{animation-name:k-shared;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-reqB{0.00%{stroke-width:1.5;}47.26%{stroke-width:1.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}78.08%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-reqB .shp{animation-name:k-reqB;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}21.23%{stroke-width:1.6;}26.03%{stroke:var(--pink);stroke-width:2.4;}52.05%{stroke:var(--pink);stroke-width:2.4;}56.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.26%{stroke-width:1.6;}52.05%{stroke:var(--pink);stroke-width:2.4;}78.08%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-reqA-0{opacity:0;}
@keyframes k-dyn-reqA-0{0.00%{opacity:1;}26.03%{opacity:1;}30.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-reqA-0{animation-name:k-dyn-reqA-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-reqA-1{opacity:1;}
@keyframes k-dyn-reqA-1{0.00%{opacity:0;}21.23%{opacity:0;}26.03%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-reqA-1{animation-name:k-dyn-reqA-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-reqB-0{opacity:0;}
@keyframes k-dyn-reqB-0{0.00%{opacity:1;}52.05%{opacity:1;}56.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-reqB-0{animation-name:k-dyn-reqB-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-reqB-1{opacity:1;}
@keyframes k-dyn-reqB-1{0.00%{opacity:0;}47.26%{opacity:0;}52.05%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-reqB-1{animation-name:k-dyn-reqB-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-shared-0{opacity:0;}
@keyframes k-dyn-shared-0{0.00%{opacity:1;}26.03%{opacity:1;}30.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-shared-0{animation-name:k-dyn-shared-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-shared-1{opacity:1;}
@keyframes k-dyn-shared-1{0.00%{opacity:0;}21.23%{opacity:0;}26.03%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-shared-1{animation-name:k-dyn-shared-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="280.5,98.0 280.5,138.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="280.5,184.0 280.5,224.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="280.5,270.0 280.5,310.0" marker-end="url(#arr)"/>
<g id="el-q">
<rect class="n-code-bg shp" x="140.6" y="16.0" width="279.7" height="82.0" rx="7"/>
<text class="code" x="280.5" y="43.0" text-anchor="middle">UPDATE accounts</text>
<text class="code" x="280.5" y="65.0" text-anchor="middle">SET balance = balance - 100</text>
<text class="code" x="280.5" y="87.0" text-anchor="middle">WHERE balance &gt;= 100</text>
</g>
<g id="el-reqA">
<rect class="n-box shp" x="160.4" y="138.0" width="240.2" height="46.0" rx="8"/>
<text class="t dyn-reqA-0" x="280.5" y="166.0" text-anchor="middle">בקשה A</text>
<text class="t dyn-reqA-1" x="280.5" y="166.0" text-anchor="middle">בקשה A מעדכנת שורה אחת</text>
</g>
<g id="el-reqB">
<rect class="n-box shp" x="152.5" y="224.0" width="256.0" height="46.0" rx="8"/>
<text class="t dyn-reqB-0" x="280.5" y="252.0" text-anchor="middle">בקשה B</text>
<text class="t dyn-reqB-1" x="280.5" y="252.0" text-anchor="middle">בקשה B: אפס שורות הושפעו</text>
</g>
<g id="el-shared">
<rect class="n-box shp" x="201.8" y="310.0" width="157.3" height="44.0" rx="8"/>
<text class="t-b dyn-shared-0" x="280.5" y="337.0" text-anchor="middle" style="direction:ltr">balance = 100</text>
<text class="t-b dyn-shared-1" x="280.5" y="337.0" text-anchor="middle" style="direction:ltr">balance = 0</text>
</g>
<g id="el-note">
<text class="small" x="280.5" y="407.0" text-anchor="middle">הבדיקה והעדכון הם פעולה אטומית אחת, ולכן הבקשה השנייה לא מוצאת יתרה מספקת</text>
</g>
</svg>
