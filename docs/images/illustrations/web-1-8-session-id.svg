<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 361 358" width="361" role="img" aria-label="כיצד עובד Session: הלקוח מחזיק רק מזהה בעוגייה, והשרת שולף לפיו את הנתונים האמיתיים שנשמרים אצלו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cookie{0.00%{stroke:var(--pink);stroke-width:2.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}30.71%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cookie .shp{animation-name:k-cookie;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lookup{0.00%{stroke-width:1.5;}20.71%{stroke-width:1.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}56.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lookup .shp{animation-name:k-lookup;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-store{0.00%{stroke-width:1.5;}46.43%{stroke-width:1.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-store .shp{animation-name:k-store;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}20.71%{stroke-width:1.6;}25.71%{stroke:var(--pink);stroke-width:2.4;}51.43%{stroke:var(--pink);stroke-width:2.4;}56.43%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}46.43%{stroke-width:1.6;}51.43%{stroke:var(--pink);stroke-width:2.4;}77.14%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="180.7,54.0 180.7,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="194.7" y="78.0" text-anchor="end">רק המזהה נשלח</text>
<polyline id="edge-1" class="edge" points="180.7,140.0 180.7,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="194.7" y="164.0" text-anchor="end">שליפת הנתונים</text>
<g id="el-cookie">
<rect class="n-code-bg shp" x="54.4" y="16.0" width="252.7" height="38.0" rx="7"/>
<text class="code" x="180.7" y="43.0" text-anchor="middle">Cookie: PHPSESSID=abc123</text>
</g>
<g id="el-lookup">
<rect class="n-box shp" x="73.2" y="94.0" width="215.0" height="46.0" rx="8"/>
<text class="t" x="180.7" y="122.0" text-anchor="middle">השרת מחפש לפי המזהה</text>
</g>
<g id="el-store">
<rect class="n-code-bg shp" x="77.0" y="180.0" width="207.5" height="104.0" rx="7"/>
<text class="code" x="180.7" y="207.0" text-anchor="middle">session[abc123] = {</text>
<text class="code" x="180.7" y="229.0" text-anchor="middle">  username: 'john',</text>
<text class="code" x="180.7" y="251.0" text-anchor="middle">  cart: [1, 2]</text>
<text class="code" x="180.7" y="273.0" text-anchor="middle">}</text>
</g>
<g id="el-note">
<text class="small" x="180.7" y="337.0" text-anchor="middle">הלקוח מחזיק רק מזהה, הנתונים עצמם נשמרים בשרת</text>
</g>
</svg>
