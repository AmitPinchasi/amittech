<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 459 431" width="459" role="img" aria-label="מחזור פיתוח מונחה טסטים: כותבים טסט, כותבים קוד, מריצים את הטסטים וחוזרים לתקן עד שהכל עובר">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-test{0.00%{stroke:var(--pink);stroke-width:2.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}17.41%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-test .shp{animation-name:k-test;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-code{0.00%{stroke-width:1.5;}11.16%{stroke-width:1.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}31.70%{stroke-width:1.5;}39.73%{stroke-width:1.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}60.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-run{0.00%{stroke-width:1.5;}25.45%{stroke-width:1.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}45.98%{stroke-width:1.5;}54.02%{stroke-width:1.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}74.55%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-run .shp{animation-name:k-run;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-done{0.00%{stroke-width:1.5;}68.30%{stroke-width:1.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}85.71%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-done .shp{animation-name:k-done;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.16%{stroke-width:1.6;}14.29%{stroke:var(--pink);stroke-width:2.4;}28.57%{stroke:var(--pink);stroke-width:2.4;}31.70%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.45%{stroke-width:1.6;}28.57%{stroke:var(--pink);stroke-width:2.4;}42.86%{stroke:var(--pink);stroke-width:2.4;}45.98%{stroke-width:1.6;}54.02%{stroke-width:1.6;}57.14%{stroke:var(--pink);stroke-width:2.4;}71.43%{stroke:var(--pink);stroke-width:2.4;}74.55%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}39.73%{stroke-width:1.6;}42.86%{stroke:var(--pink);stroke-width:2.4;}57.14%{stroke:var(--pink);stroke-width:2.4;}60.27%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}68.30%{stroke-width:1.6;}71.43%{stroke:var(--pink);stroke-width:2.4;}85.71%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="271.5,62.0 271.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="271.5,148.0 271.5,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="285.5" y="172.0" text-anchor="end">הרץ את הטסטים</text>
<polyline id="edge-2" class="edge" points="130.6,258.4 19.4,258.4 19.4,125.0 123.8,125.0" marker-end="url(#arr)"/>
<text class="small" x="71.6" y="113.0" text-anchor="middle">לא, תקן את הקוד</text>
<polyline id="edge-3" class="edge" points="271.5,328.8 271.5,368.8" marker-end="url(#arr)"/>
<text class="lbl" x="285.5" y="352.8" text-anchor="end">כן</text>
<g id="el-test">
<rect class="n-box shp" x="167.8" y="16.0" width="207.3" height="46.0" rx="8"/>
<text class="t" x="271.5" y="44.0" text-anchor="middle">שלב 1: כתוב טסט חדש</text>
</g>
<g id="el-code">
<rect class="n-box shp" x="123.8" y="102.0" width="295.3" height="46.0" rx="8"/>
<text class="t" x="271.5" y="130.0" text-anchor="middle">שלב 2: כתוב קוד שעובר את הטסט</text>
</g>
<g id="el-run">
<polygon class="n-dia shp" points="271.5,188.0 412.3,258.4 271.5,328.8 130.6,258.4"/>
<text class="t" x="271.5" y="263.4" text-anchor="middle">הטסטים עוברים?</text>
</g>
<g id="el-done">
<rect class="n-box shp" x="99.4" y="368.8" width="344.0" height="46.0" rx="8"/>
<text class="t" x="271.5" y="396.8" text-anchor="middle">שלב 3: הוסף לפרויקט ועבור לטסט הבא</text>
</g>
</svg>
