<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 874 484" width="874" role="img" aria-label="מנגנון command injection מול הגנת escapeshellarg: קלט עם ; whoami שמוזרק לתוך פקודת system, וכיצד עטיפת הקלט במרכאות מונעת את הפרשנות כמפריד פקודות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-input{0.00%{stroke:var(--pink);stroke-width:2.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}15.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-input .shp{animation-name:k-input;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-check{0.00%{stroke-width:1.5;}10.00%{stroke-width:1.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}27.78%{stroke-width:1.5;}35.19%{stroke-width:1.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}52.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-check .shp{animation-name:k-check;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-safeCmd{0.00%{stroke-width:1.5;}22.59%{stroke-width:1.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}40.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-safeCmd .shp{animation-name:k-safeCmd;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-rawCmd{0.00%{stroke-width:1.5;}47.78%{stroke-width:1.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}78.15%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-rawCmd .shp{animation-name:k-rawCmd;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-leak{0.00%{stroke-width:1.5;}72.96%{stroke-width:1.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}88.15%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-leak .shp{animation-name:k-leak;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.00%{stroke-width:1.6;}12.59%{stroke:var(--pink);stroke-width:2.4;}25.19%{stroke:var(--pink);stroke-width:2.4;}27.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}22.59%{stroke-width:1.6;}25.19%{stroke:var(--pink);stroke-width:2.4;}37.78%{stroke:var(--pink);stroke-width:2.4;}40.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}47.78%{stroke-width:1.6;}50.37%{stroke:var(--pink);stroke-width:2.4;}62.96%{stroke:var(--pink);stroke-width:2.4;}65.56%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}72.96%{stroke-width:1.6;}75.56%{stroke:var(--pink);stroke-width:2.4;}88.15%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rawCmd-0{opacity:0;}
@keyframes k-dyn-rawCmd-0{0.00%{opacity:1;}62.96%{opacity:1;}65.56%{opacity:0;}100.00%{opacity:0;}}
.dyn-rawCmd-0{animation-name:k-dyn-rawCmd-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rawCmd-1{opacity:1;}
@keyframes k-dyn-rawCmd-1{0.00%{opacity:0;}60.37%{opacity:0;}62.96%{opacity:1;}88.15%{opacity:1;}100.00%{opacity:1;}}
.dyn-rawCmd-1{animation-name:k-dyn-rawCmd-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="217.8,62.0 217.8,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="217.8,303.8 217.8,343.8" marker-end="url(#arr)"/>
<text class="lbl" x="231.8" y="327.8" text-anchor="end">לא</text>
<polyline id="edge-2" class="edge" points="217.8,381.8 217.8,421.8" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="419.6,202.9 485.6,202.9" marker-end="url(#arr)"/>
<text class="lbl" x="452.6" y="190.9" text-anchor="middle">כן</text>
<g id="el-input">
<rect class="n-box shp" x="104.6" y="16.0" width="226.4" height="46.0" rx="8"/>
<text class="t" x="217.8" y="44.0" text-anchor="middle">קלט: 127.0.0.1; whoami</text>
</g>
<g id="el-check">
<polygon class="n-dia shp" points="217.8,102.0 419.6,202.9 217.8,303.8 16.0,202.9"/>
<text class="t" x="217.8" y="207.9" text-anchor="middle">עטוף ב-escapeshellarg?</text>
</g>
<g id="el-rawCmd">
<rect class="n-code-bg shp" x="77.9" y="343.8" width="279.7" height="38.0" rx="7"/>
<text class="code dyn-rawCmd-0" x="217.8" y="370.8" text-anchor="middle">system("ping -c 4 " . $ip)</text>
<text class="code dyn-rawCmd-1" x="217.8" y="370.8" text-anchor="middle">ping -c 4 127.0.0.1; whoami</text>
</g>
<g id="el-leak">
<rect class="n-box shp" x="34.9" y="421.8" width="365.9" height="46.0" rx="8"/>
<text class="t" x="217.8" y="449.8" text-anchor="middle">; מפריד פקודות - whoami חושף משתמש שרת</text>
</g>
<g id="el-safeCmd">
<rect class="n-box shp" x="485.6" y="179.9" width="372.6" height="46.0" rx="8"/>
<text class="t" x="671.9" y="207.9" text-anchor="middle">מרכאות מקיפות הקלט - הפקודה רצה בבטחה</text>
</g>
</svg>
