<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="69.6" y="16.0" width="532.5" height="38.0" rx="7"/>
<text class="code dyn-code-0" x="335.8" y="43.0" text-anchor="middle">read(fd, buf, size);</text>
<text class="code dyn-code-1" x="335.8" y="43.0" text-anchor="middle">epoll_wait(...); read(fd, buf, size);</text>
<text class="code dyn-code-2" x="335.8" y="43.0" text-anchor="middle">io_uring_submit(&amp;ring); io_uring_wait_cqe(&amp;ring, &amp;cqe);</text>
<text class="code dyn-code-3" x="335.8" y="43.0" text-anchor="middle">SQPOLL: write sqe to the shared ring</text>
</g>
<g id="el-n">
<rect class="n-box shp" x="131.2" y="94.0" width="409.2" height="44.0" rx="8"/>
<text class="t-b dyn-n-0" x="335.8" y="121.0" text-anchor="middle" style="direction:ltr">syscalls per operation = 1</text>
<text class="t-b dyn-n-1" x="335.8" y="121.0" text-anchor="middle" style="direction:ltr">syscalls per operation = 2</text>
<text class="t-b dyn-n-2" x="335.8" y="121.0" text-anchor="middle" style="direction:ltr">syscalls per operation = 1 for a whole batch</text>
<text class="t-b dyn-n-3" x="335.8" y="121.0" text-anchor="middle" style="direction:ltr">syscalls per operation = 0</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="22.9" y="178.0" width="626.0" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="335.8" y="206.0" text-anchor="middle">קריאה חוסמת עולה מעבר אחד לקרנל, אבל היא עוצרת את התהליכון</text>
<text class="t dyn-note-1" x="335.8" y="206.0" text-anchor="middle">בגישת epoll משלמים גם על ההמתנה לאירוע וגם על הפעולה עצמה</text>
<text class="t dyn-note-2" x="335.8" y="206.0" text-anchor="middle">בio_uring אפשר לצבור הרבה בקשות ולהגיש את כולן בקריאה אחת</text>
<text class="t dyn-note-3" x="335.8" y="206.0" text-anchor="middle">במצב SQPOLL תהליכון קרנל סורק את הטבעת, ולכן אין קריאת מערכת בכלל</text>
</g>
<g id="el-cap">
<text class="small" x="335.8" y="277.0" text-anchor="middle">כל קריאת מערכת עולה מעבר בין מצבי הרצה, ולכן חיסכון בקריאות הוא החיסכון המרכזי של io_uring</text>
</g>
</svg>
