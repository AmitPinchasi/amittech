<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 346 420" width="346" role="img" aria-label="הצפנה א-סימטרית: השולח מצפין את ההודעה הגלויה עם המפתח הציבורי של הנמען, והנמען מפענח אותה בעזרת המפתח הפרטי שלו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-plain{0.00%{stroke:var(--pink);stroke-width:2.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}20.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-plain .shp{animation-name:k-plain;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-enc{0.00%{stroke-width:1.5;}13.37%{stroke-width:1.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}37.13%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-enc .shp{animation-name:k-enc;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cipher{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cipher .shp{animation-name:k-cipher;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dec{0.00%{stroke-width:1.5;}47.03%{stroke-width:1.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}70.79%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-dec .shp{animation-name:k-dec;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}63.86%{stroke-width:1.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.37%{stroke-width:1.6;}16.83%{stroke:var(--pink);stroke-width:2.4;}33.66%{stroke:var(--pink);stroke-width:2.4;}37.13%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.20%{stroke-width:1.6;}33.66%{stroke:var(--pink);stroke-width:2.4;}50.50%{stroke:var(--pink);stroke-width:2.4;}53.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.03%{stroke-width:1.6;}50.50%{stroke:var(--pink);stroke-width:2.4;}67.33%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}63.86%{stroke-width:1.6;}67.33%{stroke:var(--pink);stroke-width:2.4;}84.16%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cipher-0{opacity:0;}
@keyframes k-dyn-cipher-0{0.00%{opacity:1;}33.66%{opacity:1;}37.13%{opacity:0;}100.00%{opacity:0;}}
.dyn-cipher-0{animation-name:k-dyn-cipher-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cipher-1{opacity:1;}
@keyframes k-dyn-cipher-1{0.00%{opacity:0;}30.20%{opacity:0;}33.66%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-cipher-1{animation-name:k-dyn-cipher-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="173.1,62.0 173.1,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="173.1,148.0 173.1,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="173.1,232.0 173.1,272.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="173.1,318.0 173.1,358.0" marker-end="url(#arr)"/>
<g id="el-plain">
<rect class="n-box shp" x="69.8" y="16.0" width="206.6" height="46.0" rx="8"/>
<text class="t" x="173.1" y="44.0" text-anchor="middle">הודעה גלויה - Hello</text>
</g>
<g id="el-enc">
<rect class="n-box shp" x="50.9" y="102.0" width="244.3" height="46.0" rx="8"/>
<text class="t" x="173.1" y="130.0" text-anchor="middle">הצפנה עם המפתח הציבורי</text>
</g>
<g id="el-cipher">
<rect class="n-box shp" x="62.5" y="188.0" width="221.0" height="44.0" rx="8"/>
<text class="t-b dyn-cipher-0" x="173.1" y="215.0" text-anchor="middle">ההודעה עדיין גלויה</text>
<text class="t-b dyn-cipher-1" x="173.1" y="215.0" text-anchor="middle">טקסט מוצפן - X7f@k2</text>
</g>
<g id="el-dec">
<rect class="n-box shp" x="60.7" y="272.0" width="224.8" height="46.0" rx="8"/>
<text class="t" x="173.1" y="300.0" text-anchor="middle">פענוח עם המפתח הפרטי</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="16.0" y="358.0" width="314.1" height="46.0" rx="8"/>
<text class="t" x="173.1" y="386.0" text-anchor="middle">ההודעה חזרה להיות גלויה - Hello</text>
</g>
</svg>
