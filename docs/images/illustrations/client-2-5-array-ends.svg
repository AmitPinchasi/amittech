<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 212" width="375" role="img" aria-label="המתודות push, pop, unshift ו-shift: מצב המערך אחרי כל פעולה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-op{0.00%{stroke:var(--pink);stroke-width:2.5;}20.12%{stroke:var(--pink);stroke-width:2.5;}22.19%{stroke-width:1.5;}28.11%{stroke-width:1.5;}30.18%{stroke:var(--pink);stroke-width:2.5;}40.24%{stroke:var(--pink);stroke-width:2.5;}42.31%{stroke-width:1.5;}48.22%{stroke-width:1.5;}50.30%{stroke:var(--pink);stroke-width:2.5;}60.36%{stroke:var(--pink);stroke-width:2.5;}62.43%{stroke-width:1.5;}68.34%{stroke-width:1.5;}70.41%{stroke:var(--pink);stroke-width:2.5;}80.47%{stroke:var(--pink);stroke-width:2.5;}82.54%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-op .shp{animation-name:k-op;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-arr{0.00%{stroke-width:1.5;}18.05%{stroke-width:1.5;}20.12%{stroke:var(--pink);stroke-width:2.5;}30.18%{stroke:var(--pink);stroke-width:2.5;}32.25%{stroke-width:1.5;}38.17%{stroke-width:1.5;}40.24%{stroke:var(--pink);stroke-width:2.5;}50.30%{stroke:var(--pink);stroke-width:2.5;}52.37%{stroke-width:1.5;}58.28%{stroke-width:1.5;}60.36%{stroke:var(--pink);stroke-width:2.5;}70.41%{stroke:var(--pink);stroke-width:2.5;}72.49%{stroke-width:1.5;}78.40%{stroke-width:1.5;}80.47%{stroke:var(--pink);stroke-width:2.5;}90.53%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-arr .shp{animation-name:k-arr;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}18.05%{stroke-width:1.6;}20.12%{stroke:var(--pink);stroke-width:2.4;}30.18%{stroke:var(--pink);stroke-width:2.4;}32.25%{stroke-width:1.6;}38.17%{stroke-width:1.6;}40.24%{stroke:var(--pink);stroke-width:2.4;}50.30%{stroke:var(--pink);stroke-width:2.4;}52.37%{stroke-width:1.6;}58.28%{stroke-width:1.6;}60.36%{stroke:var(--pink);stroke-width:2.4;}70.41%{stroke:var(--pink);stroke-width:2.4;}72.49%{stroke-width:1.6;}78.40%{stroke-width:1.6;}80.47%{stroke:var(--pink);stroke-width:2.4;}90.53%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-0{opacity:0;}
@keyframes k-dyn-op-0{0.00%{opacity:1;}10.06%{opacity:1;}12.13%{opacity:0;}100.00%{opacity:0;}}
.dyn-op-0{animation-name:k-dyn-op-0;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-1{opacity:0;}
@keyframes k-dyn-op-1{0.00%{opacity:0;}7.99%{opacity:0;}10.06%{opacity:1;}30.18%{opacity:1;}32.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-op-1{animation-name:k-dyn-op-1;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-2{opacity:0;}
@keyframes k-dyn-op-2{0.00%{opacity:0;}28.11%{opacity:0;}30.18%{opacity:1;}50.30%{opacity:1;}52.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-op-2{animation-name:k-dyn-op-2;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-3{opacity:0;}
@keyframes k-dyn-op-3{0.00%{opacity:0;}48.22%{opacity:0;}50.30%{opacity:1;}70.41%{opacity:1;}72.49%{opacity:0;}100.00%{opacity:0;}}
.dyn-op-3{animation-name:k-dyn-op-3;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-4{opacity:1;}
@keyframes k-dyn-op-4{0.00%{opacity:0;}68.34%{opacity:0;}70.41%{opacity:1;}90.53%{opacity:1;}100.00%{opacity:1;}}
.dyn-op-4{animation-name:k-dyn-op-4;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-arr-0{opacity:0;}
@keyframes k-dyn-arr-0{0.00%{opacity:1;}20.12%{opacity:1;}22.19%{opacity:0;}100.00%{opacity:0;}}
.dyn-arr-0{animation-name:k-dyn-arr-0;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-arr-1{opacity:0;}
@keyframes k-dyn-arr-1{0.00%{opacity:0;}18.05%{opacity:0;}20.12%{opacity:1;}40.24%{opacity:1;}42.31%{opacity:0;}100.00%{opacity:0;}}
.dyn-arr-1{animation-name:k-dyn-arr-1;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-arr-2{opacity:0;}
@keyframes k-dyn-arr-2{0.00%{opacity:0;}38.17%{opacity:0;}40.24%{opacity:1;}60.36%{opacity:1;}62.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-arr-2{animation-name:k-dyn-arr-2;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-arr-3{opacity:0;}
@keyframes k-dyn-arr-3{0.00%{opacity:0;}58.28%{opacity:0;}60.36%{opacity:1;}80.47%{opacity:1;}82.54%{opacity:0;}100.00%{opacity:0;}}
.dyn-arr-3{animation-name:k-dyn-arr-3;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-arr-4{opacity:1;}
@keyframes k-dyn-arr-4{0.00%{opacity:0;}78.40%{opacity:0;}80.47%{opacity:1;}90.53%{opacity:1;}100.00%{opacity:1;}}
.dyn-arr-4{animation-name:k-dyn-arr-4;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="187.5,54.0 187.5,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="199.5" y="78.0" text-anchor="end">מצב המערך</text>
<g id="el-op">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="342.9" height="38.0" rx="7"/>
<text class="code dyn-op-0" x="187.5" y="43.0" text-anchor="middle">const fruits = ["apple", "banana"]</text>
<text class="code dyn-op-1" x="187.5" y="43.0" text-anchor="middle">fruits.push("cherry")</text>
<text class="code dyn-op-2" x="187.5" y="43.0" text-anchor="middle">fruits.pop()</text>
<text class="code dyn-op-3" x="187.5" y="43.0" text-anchor="middle">fruits.unshift("mango")</text>
<text class="code dyn-op-4" x="187.5" y="43.0" text-anchor="middle">fruits.shift()</text>
</g>
<g id="el-arr">
<rect class="n-box shp" x="51.7" y="94.0" width="271.6" height="44.0" rx="8"/>
<text class="t-b dyn-arr-0" x="187.5" y="121.0" text-anchor="middle" style="direction:ltr">["apple", "banana"]</text>
<text class="t-b dyn-arr-1" x="187.5" y="121.0" text-anchor="middle" style="direction:ltr">["apple", "banana", "cherry"]</text>
<text class="t-b dyn-arr-2" x="187.5" y="121.0" text-anchor="middle" style="direction:ltr">["apple", "banana"]</text>
<text class="t-b dyn-arr-3" x="187.5" y="121.0" text-anchor="middle" style="direction:ltr">["mango", "apple", "banana"]</text>
<text class="t-b dyn-arr-4" x="187.5" y="121.0" text-anchor="middle" style="direction:ltr">["apple", "banana"]</text>
</g>
<g id="el-note">
<text class="small" x="187.5" y="191.0" text-anchor="middle">הסוף של המערך: push ו-pop, ההתחלה: unshift ו-shift</text>
</g>
</svg>
