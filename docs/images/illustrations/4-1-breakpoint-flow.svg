<text class="t dyn-ins-1" x="251.1" y="219.0" text-anchor="middle" style="direction:ltr">x = 5</text>
<text class="t dyn-ins-2" x="251.1" y="219.0" text-anchor="middle" style="direction:ltr">x = 6</text>
