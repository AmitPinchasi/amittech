<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 719 545" width="719" role="img" aria-label="טרנזקציה ב-MySQL: פותחים טרנזקציה, בודקים מלאי, ואם יש מספיק מבצעים commit אחרת rollback שמבטל הכל">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-begin{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-begin .shp{animation-name:k-begin;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-check{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}27.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-check .shp{animation-name:k-check;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}22.89%{stroke-width:1.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-apply{0.00%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}53.17%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-apply .shp{animation-name:k-apply;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-commit{0.00%{stroke-width:1.5;}48.24%{stroke-width:1.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-commit .shp{animation-name:k-commit;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-rollback{0.00%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-rollback .shp{animation-name:k-rollback;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.21%{stroke-width:1.6;}12.68%{stroke:var(--pink);stroke-width:2.4;}25.35%{stroke:var(--pink);stroke-width:2.4;}27.82%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.89%{stroke-width:1.6;}25.35%{stroke:var(--pink);stroke-width:2.4;}38.03%{stroke:var(--pink);stroke-width:2.4;}40.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}35.56%{stroke-width:1.6;}38.03%{stroke:var(--pink);stroke-width:2.4;}50.70%{stroke:var(--pink);stroke-width:2.4;}53.17%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}48.24%{stroke-width:1.6;}50.70%{stroke:var(--pink);stroke-width:2.4;}63.38%{stroke:var(--pink);stroke-width:2.4;}65.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="184.8,62.0 184.8,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="184.8,148.0 184.8,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="184.8,356.8 184.8,396.8" marker-end="url(#arr)"/>
<text class="lbl" x="198.8" y="380.8" text-anchor="end">מלאי מספיק</text>
<polyline id="edge-3" class="edge" points="184.8,442.8 184.8,482.8" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="353.6,272.4 419.6,272.4" marker-end="url(#arr)"/>
<text class="lbl" x="386.6" y="260.4" text-anchor="middle">אין מלאי</text>
<g id="el-begin">
<rect class="n-box shp" x="18.7" y="16.0" width="332.3" height="46.0" rx="8"/>
<text class="t" x="184.8" y="44.0" text-anchor="middle">begin_transaction - התחלת טרנזקציה</text>
</g>
<g id="el-check">
<rect class="n-box shp" x="84.7" y="102.0" width="200.2" height="46.0" rx="8"/>
<text class="t" x="184.8" y="130.0" text-anchor="middle">בדיקת המלאי הקיים</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="184.8,188.0 353.6,272.4 184.8,356.8 16.0,272.4"/>
<text class="code" x="184.8" y="277.4" text-anchor="middle">stock &gt;= quantity</text>
</g>
<g id="el-apply">
<rect class="n-box shp" x="48.1" y="396.8" width="273.5" height="46.0" rx="8"/>
<text class="t" x="184.8" y="424.8" text-anchor="middle">יצירת ההזמנה ועדכון המלאי</text>
</g>
<g id="el-commit">
<rect class="n-box shp" x="63.7" y="482.8" width="242.2" height="46.0" rx="8"/>
<text class="t" x="184.8" y="510.8" text-anchor="middle">commit - שמירת השינויים</text>
</g>
<g id="el-rollback">
<rect class="n-box shp" x="419.6" y="249.4" width="283.6" height="46.0" rx="8"/>
<text class="t" x="561.4" y="277.4" text-anchor="middle">rollback - ביטול כל השינויים</text>
</g>
</svg>
