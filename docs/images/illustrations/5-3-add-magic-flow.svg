<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 356 290" width="356" role="img" aria-label="האופרטור פלוס מפעיל מאחורי הקלעים את מתודת הקסם __add__ ויוצר אובייקט חדש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-magic{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-magic .shp{animation-name:k-magic;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-res{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-res .shp{animation-name:k-res;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}40.91%{stroke:var(--pink);stroke-width:2.4;}44.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.93%{stroke-width:1.6;}40.91%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-1{opacity:0;}
@keyframes k-dyn-res-1{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-2{opacity:1;}
@keyframes k-dyn-res-2{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-2{animation-name:k-dyn-res-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="152.9,54.0 152.9,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="166.9" y="78.0" text-anchor="end">פייתון מתרגם את החיבור</text>
<polyline id="edge-1" class="edge" points="152.9,132.0 152.9,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="166.9" y="156.0" text-anchor="end">נוצר אובייקט חדש</text>
<g id="el-call">
<rect class="n-code-bg shp" x="62.7" y="16.0" width="180.4" height="38.0" rx="7"/>
<text class="code" x="152.9" y="43.0" text-anchor="middle">result = p1 + p2</text>
</g>
<g id="el-magic">
<rect class="n-code-bg shp" x="71.7" y="94.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="152.9" y="121.0" text-anchor="middle">p1.__add__(p2)</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="55.7" y="172.0" width="194.5" height="44.0" rx="8"/>
<text class="t-b dyn-res-0" x="152.9" y="199.0" text-anchor="middle" style="direction:ltr">result</text>
<text class="t-b dyn-res-1" x="152.9" y="199.0" text-anchor="middle" style="direction:ltr">Point(1 + 3, 2 + 4)</text>
<text class="t-b dyn-res-2" x="152.9" y="199.0" text-anchor="middle" style="direction:ltr">Point(4, 6)</text>
</g>
<g id="el-note">
<text class="small" x="152.9" y="269.0" text-anchor="middle">לכל אופרטור בפייתון יש מתודת קסם משלו</text>
</g>
</svg>
