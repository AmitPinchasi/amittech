@keyframes k-s2{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-s2 .shp{animation-name:k-s2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-s3{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
