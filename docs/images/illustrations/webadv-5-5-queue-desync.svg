<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 465 422" width="465" role="img" aria-label="הרעלת תור תגובות: השרת החזיתי סופר שתי בקשות אך השרת האחורי מייצר שלוש תגובות, ולכן כל תור התגובות מוזז והקורבן מקבל תגובה שאינה שלו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-fe{0.00%{stroke:var(--pink);stroke-width:2.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}20.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fe .shp{animation-name:k-fe;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-be{0.00%{stroke-width:1.5;}13.96%{stroke-width:1.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}37.39%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-be .shp{animation-name:k-be;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-shift{0.00%{stroke-width:1.5;}31.08%{stroke-width:1.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}54.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-shift .shp{animation-name:k-shift;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-vic{0.00%{stroke-width:1.5;}48.20%{stroke-width:1.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}71.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-vic .shp{animation-name:k-vic;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-atk{0.00%{stroke-width:1.5;}65.32%{stroke-width:1.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-atk .shp{animation-name:k-atk;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.96%{stroke-width:1.6;}17.12%{stroke:var(--pink);stroke-width:2.4;}34.23%{stroke:var(--pink);stroke-width:2.4;}37.39%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}31.08%{stroke-width:1.6;}34.23%{stroke:var(--pink);stroke-width:2.4;}51.35%{stroke:var(--pink);stroke-width:2.4;}54.50%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}48.20%{stroke-width:1.6;}51.35%{stroke:var(--pink);stroke-width:2.4;}68.47%{stroke:var(--pink);stroke-width:2.4;}71.62%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}65.32%{stroke-width:1.6;}68.47%{stroke:var(--pink);stroke-width:2.4;}85.59%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="232.5,62.0 232.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="232.5,148.0 232.5,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="232.5,234.0 232.5,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="232.5,320.0 232.5,360.0" marker-end="url(#arr)"/>
<g id="el-fe">
<rect class="n-box shp" x="57.5" y="16.0" width="350.1" height="46.0" rx="8"/>
<text class="t" x="232.5" y="44.0" text-anchor="middle">שרת חזיתי רואה 2 בקשות: תוקף, קורבן</text>
</g>
<g id="el-be">
<rect class="n-box shp" x="16.0" y="102.0" width="433.1" height="46.0" rx="8"/>
<text class="t" x="232.5" y="130.0" text-anchor="middle">שרת אחורי מייצר 3 תגובות (ההברחה מוסיפה אחת)</text>
</g>
<g id="el-shift">
<rect class="n-box shp" x="125.0" y="188.0" width="215.0" height="46.0" rx="8"/>
<text class="t" x="232.5" y="216.0" text-anchor="middle">התור מוזז בעמדה אחת</text>
</g>
<g id="el-vic">
<rect class="n-box shp" x="48.1" y="274.0" width="368.9" height="46.0" rx="8"/>
<text class="t" x="232.5" y="302.0" text-anchor="middle">קורבן מקבל את התגובה המוברחת (לא שלו)</text>
</g>
<g id="el-atk">
<rect class="n-box shp" x="41.2" y="360.0" width="382.7" height="46.0" rx="8"/>
<text class="t" x="232.5" y="388.0" text-anchor="middle">תוקף מקבל את תגובת הקורבן, כולל session</text>
</g>
</svg>
