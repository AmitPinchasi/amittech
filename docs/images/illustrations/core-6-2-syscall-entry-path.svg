<rect class="n-code-bg shp" x="255.2" y="16.0" width="225.6" height="38.0" rx="7"/>
<text class="code" x="368.0" y="43.0" text-anchor="middle">write(1, "hello", 5);</text>
</g>
<g id="el-regs">
<rect class="n-code-bg shp" x="309.3" y="94.0" width="117.2" height="104.0" rx="7"/>
<text class="code" x="368.0" y="121.0" text-anchor="middle">rax = 1</text>
<text class="code" x="368.0" y="143.0" text-anchor="middle">rdi = 1</text>
<text class="code" x="368.0" y="165.0" text-anchor="middle">rsi = ptr</text>
<text class="code" x="368.0" y="187.0" text-anchor="middle">rdx = 5</text>
</g>
