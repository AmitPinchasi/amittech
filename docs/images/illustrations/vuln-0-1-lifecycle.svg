<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 566" width="410" role="img" aria-label="מחזור החיים של חולשה: מרגע הגילוי, דרך מיון, ניתוח שורש ופיתוח אקספלויט, ועד גילוי אחראי ליצרן ותיקון, כאשר לפני התיקון החולשה היא 0-day ואחריו n-day">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-disc{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-disc .shp{animation-name:k-disc;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-triage{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-triage .shp{animation-name:k-triage;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-root{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-root .shp{animation-name:k-root;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-exp{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-exp .shp{animation-name:k-exp;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-report{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-report .shp{animation-name:k-report;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-patch{0.00%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-patch .shp{animation-name:k-patch;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}40.73%{stroke-width:1.6;}43.55%{stroke:var(--pink);stroke-width:2.4;}58.06%{stroke:var(--pink);stroke-width:2.4;}60.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}55.24%{stroke-width:1.6;}58.06%{stroke:var(--pink);stroke-width:2.4;}72.58%{stroke:var(--pink);stroke-width:2.4;}75.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="205.1,62.0 205.1,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="219.1" y="86.0" text-anchor="end">האם ניתן לניצול</text>
<polyline id="edge-1" class="edge" points="205.1,148.0 205.1,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="219.1" y="172.0" text-anchor="end">מה נשבר ואיפה</text>
<polyline id="edge-2" class="edge" points="205.1,234.0 205.1,274.0" marker-end="url(#arr)"/>
<text class="lbl" x="219.1" y="258.0" text-anchor="end">בונים הוכחה</text>
<polyline id="edge-3" class="edge" points="205.1,320.0 205.1,360.0" marker-end="url(#arr)"/>
<text class="lbl" x="219.1" y="344.0" text-anchor="end">מדווחים ליצרן</text>
<polyline id="edge-4" class="edge" points="205.1,406.0 205.1,446.0" marker-end="url(#arr)"/>
<text class="lbl" x="219.1" y="430.0" text-anchor="end">היצרן מתקן</text>
<g id="el-disc">
<rect class="n-box shp" x="112.8" y="16.0" width="184.4" height="46.0" rx="8"/>
<text class="t" x="205.1" y="44.0" text-anchor="middle">גילוי - discovery</text>
</g>
<g id="el-triage">
<rect class="n-box shp" x="130.3" y="102.0" width="149.5" height="46.0" rx="8"/>
<text class="t" x="205.1" y="130.0" text-anchor="middle">מיון - triage</text>
</g>
<g id="el-root">
<rect class="n-box shp" x="88.3" y="188.0" width="233.5" height="46.0" rx="8"/>
<text class="t" x="205.1" y="216.0" text-anchor="middle">ניתוח שורש - root cause</text>
</g>
<g id="el-exp">
<rect class="n-box shp" x="64.6" y="274.0" width="280.9" height="46.0" rx="8"/>
<text class="t" x="205.1" y="302.0" text-anchor="middle">פיתוח אקספלויט - exploit dev</text>
</g>
<g id="el-report">
<rect class="n-box shp" x="81.8" y="360.0" width="246.6" height="46.0" rx="8"/>
<text class="t" x="205.1" y="388.0" text-anchor="middle">גילוי אחראי - disclosure</text>
</g>
<g id="el-patch">
<rect class="n-box shp" x="129.6" y="446.0" width="150.8" height="46.0" rx="8"/>
<text class="t" x="205.1" y="474.0" text-anchor="middle">תיקון - patch</text>
</g>
<g id="el-note">
<text class="small" x="205.1" y="545.0" text-anchor="middle">לפני התיקון החולשה היא zero-day, אחרי התיקון היא n-day</text>
</g>
</svg>
