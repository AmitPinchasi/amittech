<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 386 296" width="386" role="img" aria-label="שדה סטטי שמור על המחלקה עצמה ואפשר לגשת אליו ולשנות אותו בלי ליצור אובייקט">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-acc{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-acc .shp{animation-name:k-acc;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-res{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-res .shp{animation-name:k-res;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cls{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cls .shp{animation-name:k-cls;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke:var(--pink);stroke-width:2.4;}16.98%{stroke:var(--pink);stroke-width:2.4;}20.28%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-acc-0{opacity:0;}
@keyframes k-dyn-acc-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-acc-0{animation-name:k-dyn-acc-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-acc-1{opacity:0;}
@keyframes k-dyn-acc-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-acc-1{animation-name:k-dyn-acc-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-acc-2{opacity:1;}
@keyframes k-dyn-acc-2{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-acc-2{animation-name:k-dyn-acc-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cls-0{opacity:0;}
@keyframes k-dyn-cls-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-cls-0{animation-name:k-dyn-cls-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cls-1{opacity:1;}
@keyframes k-dyn-cls-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-cls-1{animation-name:k-dyn-cls-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-1{opacity:0;}
@keyframes k-dyn-res-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-2{opacity:1;}
@keyframes k-dyn-res-2{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-2{animation-name:k-dyn-res-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="190.6,54.0 190.6,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="204.6" y="78.0" text-anchor="end">גישה ישירה דרך המחלקה</text>
<polyline id="edge-1" class="edge" points="190.6,138.0 190.6,178.0" marker-end="url(#arr)"/>
<text class="lbl" x="204.6" y="162.0" text-anchor="end">הערך חוזר</text>
<g id="el-acc">
<rect class="n-code-bg shp" x="95.8" y="16.0" width="189.5" height="38.0" rx="7"/>
<text class="code dyn-acc-0" x="190.6" y="43.0" text-anchor="middle">print(Dog.legs)</text>
<text class="code dyn-acc-1" x="190.6" y="43.0" text-anchor="middle">Dog.legs = 5</text>
<text class="code dyn-acc-2" x="190.6" y="43.0" text-anchor="middle">my_dog.get_legs()</text>
</g>
<g id="el-cls">
<rect class="n-box shp" x="116.0" y="94.0" width="149.0" height="44.0" rx="8"/>
<text class="t-b dyn-cls-0" x="190.6" y="121.0" text-anchor="middle" style="direction:ltr">Dog: legs = 4</text>
<text class="t-b dyn-cls-1" x="190.6" y="121.0" text-anchor="middle" style="direction:ltr">Dog: legs = 5</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="125.9" y="178.0" width="129.3" height="44.0" rx="8"/>
<text class="t-b dyn-res-0" x="190.6" y="205.0" text-anchor="middle">התוצאה</text>
<text class="t-b dyn-res-1" x="190.6" y="205.0" text-anchor="middle">התוצאה: 4</text>
<text class="t-b dyn-res-2" x="190.6" y="205.0" text-anchor="middle">התוצאה: 5</text>
</g>
<g id="el-note">
<text class="small" x="190.6" y="275.0" text-anchor="middle">השדה הסטטי שמור על המחלקה עצמה, לא על האובייקטים</text>
</g>
</svg>
