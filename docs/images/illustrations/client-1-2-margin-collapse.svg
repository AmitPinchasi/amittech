<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 491 306" width="491" role="img" aria-label="קריסת שוליים אנכיים: השוליים לא מתחברים אלא הגדול בולע את הקטן">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-boxa{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-boxa .shp{animation-name:k-boxa;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-boxb{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-boxb .shp{animation-name:k-boxb;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-gap{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-gap .shp{animation-name:k-gap;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-gap-0{opacity:0;}
@keyframes k-dyn-gap-0{0.00%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-gap-0{animation-name:k-dyn-gap-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-gap-1{opacity:1;}
@keyframes k-dyn-gap-1{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-gap-1{animation-name:k-dyn-gap-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-boxa">
<rect class="n-box shp" x="105.3" y="16.0" width="279.9" height="46.0" rx="8"/>
<text class="t" x="245.3" y="44.0" text-anchor="middle">קופסה A - margin-bottom: 30px</text>
</g>
<g id="el-gap">
<rect class="n-box shp" x="137.4" y="102.0" width="215.7" height="44.0" rx="8"/>
<text class="t-b dyn-gap-0" x="245.3" y="129.0" text-anchor="middle" style="direction:ltr">30 + 20 = 50 ?</text>
<text class="t-b dyn-gap-1" x="245.3" y="129.0" text-anchor="middle">המרווח בפועל: 30px</text>
</g>
<g id="el-boxb">
<rect class="n-box shp" x="117.9" y="186.0" width="254.7" height="46.0" rx="8"/>
<text class="t" x="245.3" y="214.0" text-anchor="middle">קופסה B - margin-top: 20px</text>
</g>
<g id="el-note">
<text class="small" x="245.3" y="285.0" text-anchor="middle">שוליים אנכיים שנפגשים קורסים - הגדול מבין השניים קובע את המרווח</text>
</g>
</svg>
