<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 581 598" width="581" role="img" aria-label="כשהזיה של המודל הופכת לפעולה: רשת ביטחון של בקרת ביניים עוצרת אותה לפני נזק, ובלעדיה המחיקה מתבצעת והנזק כבר קרה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="151.6,62.0 151.6,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="287.3,169.8 353.3,169.8" marker-end="url(#arr)"/>
<text class="lbl" x="320.3" y="157.8" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="151.6,237.6 151.6,277.6" marker-end="url(#arr)"/>
<text class="lbl" x="165.6" y="261.6" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="151.6,323.6 151.6,363.6" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="151.6,409.6 151.6,449.6" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="151.6,495.6 151.6,535.6" marker-end="url(#arr)"/>
<g id="el-halluc">
<rect class="n-box shp" x="29.5" y="16.0" width="244.3" height="46.0" rx="8"/>
<text class="t" x="151.6" y="44.0" text-anchor="middle">המודל מסיק מסקנה שגויה</text>
</g>
<g id="el-gate">
<polygon class="n-dia shp" points="151.6,102.0 287.3,169.8 151.6,237.6 16.0,169.8"/>
<text class="t" x="151.6" y="174.8" text-anchor="middle">יש רשת ביטחון?</text>
</g>
<g id="el-caught">
<rect class="n-box shp" x="353.3" y="146.8" width="211.3" height="46.0" rx="8"/>
<text class="t" x="459.0" y="174.8" text-anchor="middle">עצירה לאישור - נתפס</text>
</g>
<g id="el-act">
<rect class="n-box shp" x="46.7" y="277.6" width="210.0" height="46.0" rx="8"/>
<text class="t" x="151.6" y="305.6" text-anchor="middle">פעולה אוטומטית מיד</text>
</g>
<g id="el-delete">
<rect class="n-box shp" x="61.3" y="363.6" width="180.8" height="46.0" rx="8"/>
<text class="t" x="151.6" y="391.6" text-anchor="middle">מחיקה שלא נבדקה</text>
</g>
<g id="el-next">
<rect class="n-box shp" x="66.1" y="449.6" width="171.0" height="46.0" rx="8"/>
<text class="t" x="151.6" y="477.6" text-anchor="middle">צעד הבא בלולאה</text>
</g>
<g id="el-damage">
<rect class="n-box shp" x="75.9" y="535.6" width="151.5" height="46.0" rx="8"/>
<text class="t" x="151.6" y="563.6" text-anchor="middle">הנזק כבר קרה</text>
</g>
</svg>
