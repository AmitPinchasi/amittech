<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 748 635" width="748" role="img" aria-label="תרשים זרימה של התקפת CSRF: אתר זדוני שולח טופס נסתר לבנק, והגדרת SameSite קובעת אם העוגייה תצורף וההעברה תתבצע">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-login{0.00%{stroke:var(--pink);stroke-width:2.5;}11.03%{stroke:var(--pink);stroke-width:2.5;}13.60%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-login .shp{animation-name:k-login;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-evil{0.00%{stroke-width:1.5;}8.46%{stroke-width:1.5;}11.03%{stroke:var(--pink);stroke-width:2.5;}22.06%{stroke:var(--pink);stroke-width:2.5;}24.63%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-evil .shp{animation-name:k-evil;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-form{0.00%{stroke-width:1.5;}19.49%{stroke-width:1.5;}22.06%{stroke:var(--pink);stroke-width:2.5;}33.09%{stroke:var(--pink);stroke-width:2.5;}35.66%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-form .shp{animation-name:k-form;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-same{0.00%{stroke-width:1.5;}30.51%{stroke-width:1.5;}33.09%{stroke:var(--pink);stroke-width:2.5;}44.12%{stroke:var(--pink);stroke-width:2.5;}46.69%{stroke-width:1.5;}63.60%{stroke-width:1.5;}66.18%{stroke:var(--pink);stroke-width:2.5;}77.21%{stroke:var(--pink);stroke-width:2.5;}79.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-same .shp{animation-name:k-same;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sent{0.00%{stroke-width:1.5;}41.54%{stroke-width:1.5;}44.12%{stroke:var(--pink);stroke-width:2.5;}55.15%{stroke:var(--pink);stroke-width:2.5;}57.72%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sent .shp{animation-name:k-sent;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-transfer{0.00%{stroke-width:1.5;}52.57%{stroke-width:1.5;}55.15%{stroke:var(--pink);stroke-width:2.5;}66.18%{stroke:var(--pink);stroke-width:2.5;}68.75%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-transfer .shp{animation-name:k-transfer;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-blocked{0.00%{stroke-width:1.5;}74.63%{stroke-width:1.5;}77.21%{stroke:var(--pink);stroke-width:2.5;}88.24%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-blocked .shp{animation-name:k-blocked;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.46%{stroke-width:1.6;}11.03%{stroke:var(--pink);stroke-width:2.4;}22.06%{stroke:var(--pink);stroke-width:2.4;}24.63%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}19.49%{stroke-width:1.6;}22.06%{stroke:var(--pink);stroke-width:2.4;}33.09%{stroke:var(--pink);stroke-width:2.4;}35.66%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.51%{stroke-width:1.6;}33.09%{stroke:var(--pink);stroke-width:2.4;}44.12%{stroke:var(--pink);stroke-width:2.4;}46.69%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}41.54%{stroke-width:1.6;}44.12%{stroke:var(--pink);stroke-width:2.4;}55.15%{stroke:var(--pink);stroke-width:2.4;}57.72%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}52.57%{stroke-width:1.6;}55.15%{stroke:var(--pink);stroke-width:2.4;}66.18%{stroke:var(--pink);stroke-width:2.4;}68.75%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}74.63%{stroke-width:1.6;}77.21%{stroke:var(--pink);stroke-width:2.4;}88.24%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="197.6,62.0 197.6,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="197.6,148.0 197.6,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="211.6" y="172.0" text-anchor="end">טופס נסתר נשלח אוטומטית</text>
<polyline id="edge-2" class="edge" points="197.6,248.0 197.6,288.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="197.6,446.9 197.6,486.9" marker-end="url(#arr)"/>
<text class="lbl" x="211.6" y="470.9" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="197.6,532.9 197.6,572.9" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="356.5,367.4 422.5,367.4" marker-end="url(#arr)"/>
<text class="lbl" x="389.5" y="355.4" text-anchor="middle">כן</text>
<g id="el-login">
<rect class="n-box shp" x="16.0" y="16.0" width="363.2" height="46.0" rx="8"/>
<text class="t" x="197.6" y="44.0" text-anchor="middle">המשתמש מחובר לבנק - יש עוגיית session</text>
</g>
<g id="el-evil">
<rect class="n-box shp" x="75.5" y="102.0" width="244.3" height="46.0" rx="8"/>
<text class="t" x="197.6" y="130.0" text-anchor="middle">המשתמש גולש לאתר זדוני</text>
</g>
<g id="el-form">
<rect class="n-code-bg shp" x="80.3" y="188.0" width="234.6" height="60.0" rx="7"/>
<text class="code" x="197.6" y="215.0" text-anchor="middle">POST bank.com/transfer</text>
<text class="code" x="197.6" y="237.0" text-anchor="middle">amount=10000</text>
</g>
<g id="el-same">
<polygon class="n-dia shp" points="197.6,288.0 356.5,367.4 197.6,446.9 38.7,367.4"/>
<text class="code" x="197.6" y="372.4" text-anchor="middle">SameSite=Strict?</text>
</g>
<g id="el-sent">
<rect class="n-box shp" x="75.5" y="486.9" width="244.3" height="46.0" rx="8"/>
<text class="t" x="197.6" y="514.9" text-anchor="middle">הדפדפן מצרף את העוגייה</text>
</g>
<g id="el-transfer">
<rect class="n-box shp" x="65.7" y="572.9" width="263.7" height="46.0" rx="8"/>
<text class="t" x="197.6" y="600.9" text-anchor="middle">ההעברה מתבצעת בשם המשתמש</text>
</g>
<g id="el-blocked">
<rect class="n-box shp" x="422.5" y="344.4" width="309.1" height="46.0" rx="8"/>
<text class="t" x="577.0" y="372.4" text-anchor="middle">העוגייה לא נשלחת - הבקשה נדחית</text>
</g>
</svg>
