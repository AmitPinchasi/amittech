<text class="t" x="528.0" y="122.0" text-anchor="middle" style="direction:ltr">B8</text>
<rect id="el-before-c1" class="n-cell shp" x="364.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="412.0" y="122.0" text-anchor="middle" style="direction:ltr">05</text>
<rect id="el-before-c2" class="n-cell shp" x="248.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="296.0" y="122.0" text-anchor="middle" style="direction:ltr">00</text>
<rect id="el-before-c3" class="n-cell shp" x="132.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.0" y="122.0" text-anchor="middle" style="direction:ltr">00</text>
<rect id="el-before-c4" class="n-cell shp" x="16.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="64.0" y="122.0" text-anchor="middle" style="direction:ltr">00</text>
</g>
<g id="el-arrow">
<text class="small" x="296.0" y="193.0" text-anchor="middle">הדיבאגר מחליף את הבית הראשון</text>
</g>
<g id="el-after">
<rect id="el-after-c0" class="n-hl shp" x="480.0" y="238.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="528.0" y="266.0" text-anchor="middle" style="direction:ltr">CC</text>
<rect id="el-after-c1" class="n-cell shp" x="364.0" y="238.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="412.0" y="266.0" text-anchor="middle" style="direction:ltr">05</text>
<rect id="el-after-c2" class="n-cell shp" x="248.0" y="238.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="296.0" y="266.0" text-anchor="middle" style="direction:ltr">00</text>
<rect id="el-after-c3" class="n-cell shp" x="132.0" y="238.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.0" y="266.0" text-anchor="middle" style="direction:ltr">00</text>
<rect id="el-after-c4" class="n-cell shp" x="16.0" y="238.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="64.0" y="266.0" text-anchor="middle" style="direction:ltr">00</text>
</g>
<g id="el-trap">
<rect class="n-box shp" x="166.5" y="324.0" width="259.0" height="44.0" rx="8"/>
<text class="t-b dyn-trap-0" x="296.0" y="351.0" text-anchor="middle">המעבד ממשיך רגיל</text>
<text class="t-b dyn-trap-1" x="296.0" y="351.0" text-anchor="middle">int3 -&gt; SIGTRAP -&gt; עצירה</text>
</g>
</svg>
