<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 687 550" width="687" role="img" aria-label="תרשים חלוקת הטיפול בפסיקה לחצי עליון קצר שרץ כשהפסיקות חסומות ולחצי תחתון שמבצע את העיבוד הכבד אחרי שהפסיקות נפתחו מחדש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-irq{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-irq .shp{animation-name:k-irq;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-save{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}27.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-save .shp{animation-name:k-save;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-flag{0.00%{stroke-width:1.5;}22.89%{stroke-width:1.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-flag .shp{animation-name:k-flag;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-top{0.00%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}53.17%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-top .shp{animation-name:k-top;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-iret{0.00%{stroke-width:1.5;}48.24%{stroke-width:1.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-iret .shp{animation-name:k-iret;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-bottom{0.00%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-bottom .shp{animation-name:k-bottom;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.21%{stroke-width:1.6;}12.68%{stroke:var(--pink);stroke-width:2.4;}25.35%{stroke:var(--pink);stroke-width:2.4;}27.82%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.89%{stroke-width:1.6;}25.35%{stroke:var(--pink);stroke-width:2.4;}38.03%{stroke:var(--pink);stroke-width:2.4;}40.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}35.56%{stroke-width:1.6;}38.03%{stroke:var(--pink);stroke-width:2.4;}50.70%{stroke:var(--pink);stroke-width:2.4;}53.17%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}48.24%{stroke-width:1.6;}50.70%{stroke:var(--pink);stroke-width:2.4;}63.38%{stroke:var(--pink);stroke-width:2.4;}65.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-flag-0{opacity:0;}
@keyframes k-dyn-flag-0{0.00%{opacity:1;}25.35%{opacity:1;}27.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-flag-0{animation-name:k-dyn-flag-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-flag-1{opacity:0;}
@keyframes k-dyn-flag-1{0.00%{opacity:0;}22.89%{opacity:0;}25.35%{opacity:1;}63.38%{opacity:1;}65.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-flag-1{animation-name:k-dyn-flag-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-flag-2{opacity:1;}
@keyframes k-dyn-flag-2{0.00%{opacity:0;}60.92%{opacity:0;}63.38%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-flag-2{animation-name:k-dyn-flag-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="343.5,62.0 343.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="343.5,148.0 343.5,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="343.5,226.0 343.5,266.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="343.5,312.0 343.5,352.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="343.5,390.0 343.5,430.0" marker-end="url(#arr)"/>
<g id="el-irq">
<rect class="n-box shp" x="154.3" y="16.0" width="378.3" height="46.0" rx="8"/>
<text class="t" x="343.5" y="44.0" text-anchor="middle">כרטיס הרשת מקבל חבילה ושולח IRQ למעבד</text>
</g>
<g id="el-save">
<rect class="n-box shp" x="78.1" y="102.0" width="530.9" height="46.0" rx="8"/>
<text class="t" x="343.5" y="130.0" text-anchor="middle">המעבד שומר RFLAGS, CS ו-RIP וקופץ לכניסה המתאימה ב-IDT</text>
</g>
<g id="el-flag">
<rect class="n-code-bg shp" x="295.5" y="188.0" width="96.0" height="38.0" rx="7"/>
<text class="code dyn-flag-0" x="343.5" y="215.0" text-anchor="middle">IF = 1</text>
<text class="code dyn-flag-1" x="343.5" y="215.0" text-anchor="middle">IF = 0</text>
<text class="code dyn-flag-2" x="343.5" y="215.0" text-anchor="middle">IF = 1</text>
</g>
<g id="el-top">
<rect class="n-box shp" x="24.6" y="266.0" width="637.7" height="46.0" rx="8"/>
<text class="t" x="343.5" y="294.0" text-anchor="middle">החצי העליון מאשר לחומרה, שומר את החבילה בתור, ומתזמן את החצי התחתון</text>
</g>
<g id="el-iret">
<rect class="n-code-bg shp" x="295.5" y="352.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="343.5" y="379.0" text-anchor="middle">iretq</text>
</g>
<g id="el-bottom">
<rect class="n-box shp" x="73.2" y="430.0" width="540.6" height="46.0" rx="8"/>
<text class="t" x="343.5" y="458.0" text-anchor="middle">החצי התחתון בודק headers ומעביר את החבילה ל-socket המתאים</text>
</g>
<g id="el-note">
<text class="small" x="343.5" y="529.0" text-anchor="middle">החצי העליון חייב להסתיים במיקרו-שניות ואסור לו לישון, כי כל עוד הוא רץ פסיקות נוספות חסומות</text>
</g>
</svg>
