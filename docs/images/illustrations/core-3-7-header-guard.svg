<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 431" width="595" role="img" aria-label="הגנת קובץ header: בהכללה הראשונה הסימבול מוגדר וההצהרות נכנסות, ובהכללה השנייה הפרה-פרוססור מדלג עליהן">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-inc{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}53.17%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inc .shp{animation-name:k-inc;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}27.82%{stroke-width:1.5;}48.24%{stroke-width:1.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-def{0.00%{stroke-width:1.5;}22.89%{stroke-width:1.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-def .shp{animation-name:k-def;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-skip{0.00%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-skip .shp{animation-name:k-skip;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-end{0.00%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-end .shp{animation-name:k-end;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.21%{stroke-width:1.6;}12.68%{stroke:var(--pink);stroke-width:2.4;}25.35%{stroke:var(--pink);stroke-width:2.4;}27.82%{stroke-width:1.6;}48.24%{stroke-width:1.6;}50.70%{stroke:var(--pink);stroke-width:2.4;}63.38%{stroke:var(--pink);stroke-width:2.4;}65.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.89%{stroke-width:1.6;}25.35%{stroke:var(--pink);stroke-width:2.4;}38.03%{stroke:var(--pink);stroke-width:2.4;}40.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}60.92%{stroke-width:1.6;}63.38%{stroke:var(--pink);stroke-width:2.4;}76.06%{stroke:var(--pink);stroke-width:2.4;}78.52%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-inc-0{opacity:0;}
@keyframes k-dyn-inc-0{0.00%{opacity:1;}38.03%{opacity:1;}40.49%{opacity:0;}100.00%{opacity:0;}}
.dyn-inc-0{animation-name:k-dyn-inc-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-inc-1{opacity:1;}
@keyframes k-dyn-inc-1{0.00%{opacity:0;}35.56%{opacity:0;}38.03%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-inc-1{animation-name:k-dyn-inc-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="191.9,62.0 191.9,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="191.9,242.8 191.9,282.8" marker-end="url(#arr)"/>
<text class="lbl" x="205.9" y="266.8" text-anchor="end">עדיין לא</text>
<polyline id="edge-2" class="edge" points="191.9,328.8 191.9,368.8" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="332.7,172.4 398.7,172.4" marker-end="url(#arr)"/>
<text class="lbl" x="365.7" y="160.4" text-anchor="middle">כבר כן</text>
<g id="el-inc">
<rect class="n-box shp" x="74.6" y="16.0" width="234.5" height="46.0" rx="8"/>
<text class="t dyn-inc-0" x="191.9" y="44.0" text-anchor="middle">הכללה ראשונה של הקובץ</text>
<text class="t dyn-inc-1" x="191.9" y="44.0" text-anchor="middle">הכללה שנייה של הקובץ</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="191.9,102.0 332.7,172.4 191.9,242.8 51.1,172.4"/>
<text class="t" x="191.9" y="177.4" text-anchor="middle">הסימבול מוגדר?</text>
</g>
<g id="el-def">
<rect class="n-box shp" x="16.0" y="282.8" width="351.8" height="46.0" rx="8"/>
<text class="t" x="191.9" y="310.8" text-anchor="middle">מגדיר את הסימבול ומכניס את ההצהרות</text>
</g>
<g id="el-end">
<rect class="n-box shp" x="84.4" y="368.8" width="215.0" height="46.0" rx="8"/>
<text class="t" x="191.9" y="396.8" text-anchor="middle">הצהרה אחת בלבד בקוד</text>
</g>
<g id="el-skip">
<rect class="n-box shp" x="398.7" y="149.4" width="180.8" height="46.0" rx="8"/>
<text class="t" x="489.1" y="177.4" text-anchor="middle">מדלג על ההצהרות</text>
</g>
</svg>
