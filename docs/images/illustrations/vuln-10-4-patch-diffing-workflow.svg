<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 496 472" width="496" role="img" aria-label="שיטת עבודה של patch diffing: בחירת מסלול לפי זמינות קוד מקור ואיתור שורת השינוי">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cve{0.00%{stroke:var(--pink);stroke-width:2.5;}12.40%{stroke:var(--pink);stroke-width:2.5;}15.29%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cve .shp{animation-name:k-cve;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dec{0.00%{stroke-width:1.5;}9.50%{stroke-width:1.5;}12.40%{stroke:var(--pink);stroke-width:2.5;}24.79%{stroke:var(--pink);stroke-width:2.5;}27.69%{stroke-width:1.5;}46.69%{stroke-width:1.5;}49.59%{stroke:var(--pink);stroke-width:2.5;}61.98%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-dec .shp{animation-name:k-dec;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-bindiff{0.00%{stroke-width:1.5;}21.90%{stroke-width:1.5;}24.79%{stroke:var(--pink);stroke-width:2.5;}37.19%{stroke:var(--pink);stroke-width:2.5;}40.08%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-bindiff .shp{animation-name:k-bindiff;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-found{0.00%{stroke-width:1.5;}34.30%{stroke-width:1.5;}37.19%{stroke:var(--pink);stroke-width:2.5;}49.59%{stroke:var(--pink);stroke-width:2.5;}52.48%{stroke-width:1.5;}71.49%{stroke-width:1.5;}74.38%{stroke:var(--pink);stroke-width:2.5;}86.78%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-found .shp{animation-name:k-found;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-srcdiff{0.00%{stroke-width:1.5;}59.09%{stroke-width:1.5;}61.98%{stroke:var(--pink);stroke-width:2.5;}74.38%{stroke:var(--pink);stroke-width:2.5;}77.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-srcdiff .shp{animation-name:k-srcdiff;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.50%{stroke-width:1.6;}12.40%{stroke:var(--pink);stroke-width:2.4;}24.79%{stroke:var(--pink);stroke-width:2.4;}27.69%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}21.90%{stroke-width:1.6;}24.79%{stroke:var(--pink);stroke-width:2.4;}37.19%{stroke:var(--pink);stroke-width:2.4;}40.08%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}34.30%{stroke-width:1.6;}37.19%{stroke:var(--pink);stroke-width:2.4;}49.59%{stroke:var(--pink);stroke-width:2.4;}52.48%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}59.09%{stroke-width:1.6;}61.98%{stroke:var(--pink);stroke-width:2.4;}74.38%{stroke:var(--pink);stroke-width:2.4;}77.27%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}71.49%{stroke-width:1.6;}74.38%{stroke:var(--pink);stroke-width:2.4;}86.78%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="165.7,62.0 165.7,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="165.7,237.6 165.7,323.6" marker-end="url(#arr)"/>
<text class="lbl" x="179.7" y="284.6" text-anchor="end">לא</text>
<polyline id="edge-2" class="edge" points="301.3,169.8 389.3,169.8 389.3,237.6" marker-end="url(#arr)"/>
<text class="lbl" x="345.3" y="157.8" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="165.7,369.6 165.7,409.6" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="389.3,283.6 389.3,432.6 315.4,432.6" marker-end="url(#arr)"/>
<g id="el-cve">
<rect class="n-box shp" x="54.8" y="16.0" width="221.7" height="46.0" rx="8"/>
<text class="t" x="165.7" y="44.0" text-anchor="middle">רשומת CVE ואדבייזרי</text>
</g>
<g id="el-dec">
<polygon class="n-dia shp" points="165.7,102.0 301.3,169.8 165.7,237.6 30.0,169.8"/>
<text class="t" x="165.7" y="174.8" text-anchor="middle">קוד מקור זמין?</text>
</g>
<g id="el-bindiff">
<rect class="n-box shp" x="73.0" y="323.6" width="185.5" height="46.0" rx="8"/>
<text class="t" x="165.7" y="351.6" text-anchor="middle">השוואת בינאריים</text>
</g>
<g id="el-found">
<rect class="n-box shp" x="16.0" y="409.6" width="299.4" height="46.0" rx="8"/>
<text class="t" x="165.7" y="437.6" text-anchor="middle">איתור שורת השינוי - שורש הבאג</text>
</g>
<g id="el-srcdiff">
