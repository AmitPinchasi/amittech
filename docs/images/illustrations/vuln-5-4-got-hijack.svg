<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 475 332" width="475" role="img" aria-label="אנימציה של חטיפת זרימה על ידי דריסת GOT - הקריאה עוברת דרך PLT אל תא ה-GOT בעקיפין, כתיבה שרירותית דורסת את הכתובת שבתא, והקריאה הבאה לאותה פונקציה קופצת לקוד הניצחון במקום ל-libc">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}30.71%{stroke-width:1.5;}46.43%{stroke-width:1.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-call .shp{animation-name:k-call;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-plt{0.00%{stroke:var(--pink);stroke-width:2.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}30.71%{stroke-width:1.5;}46.43%{stroke-width:1.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-plt .shp{animation-name:k-plt;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-got{0.00%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-got .shp{animation-name:k-got;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-target{0.00%{stroke:var(--pink);stroke-width:2.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}30.71%{stroke-width:1.5;}46.43%{stroke-width:1.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-target .shp{animation-name:k-target;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-got-0{opacity:0;}
@keyframes k-dyn-got-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-got-0{animation-name:k-dyn-got-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-got-1{opacity:1;}
@keyframes k-dyn-got-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-got-1{animation-name:k-dyn-got-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-target-0{opacity:0;}
@keyframes k-dyn-target-0{0.00%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-target-0{animation-name:k-dyn-target-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-target-1{opacity:1;}
@keyframes k-dyn-target-1{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-target-1{animation-name:k-dyn-target-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="237.4,62.0 237.4,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="237.4,148.0 237.4,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="237.4,232.0 237.4,272.0" marker-end="url(#arr)"/>
<g id="el-call">
<rect class="n-box shp" x="122.7" y="16.0" width="229.5" height="46.0" rx="8"/>
<text class="t" x="237.4" y="44.0" text-anchor="middle">הקוד קורא ל-printf@plt</text>
</g>
<g id="el-plt">
<rect class="n-box shp" x="109.1" y="102.0" width="256.7" height="46.0" rx="8"/>
<text class="t" x="237.4" y="130.0" text-anchor="middle" style="direction:ltr">PLT stub - jmp *[GOT entry]</text>
</g>
<g id="el-got">
<rect class="n-box shp" x="43.1" y="188.0" width="388.8" height="44.0" rx="8"/>
<text class="t-b dyn-got-0" x="237.4" y="215.0" text-anchor="middle">תא ה-GOT מצביע על printf האמיתי ב-libc</text>
<text class="t-b dyn-got-1" x="237.4" y="215.0" text-anchor="middle">תא ה-GOT נדרס עם %n - מצביע כעת על win</text>
</g>
<g id="el-target">
<rect class="n-box shp" x="16.0" y="272.0" width="442.9" height="44.0" rx="8"/>
<text class="t-b dyn-target-0" x="237.4" y="299.0" text-anchor="middle">הזרימה הרגילה - printf רץ</text>
<text class="t-b dyn-target-1" x="237.4" y="299.0" text-anchor="middle">הקוד שדרסנו רץ - win() קורא ל-system("/bin/sh")</text>
</g>
</svg>
