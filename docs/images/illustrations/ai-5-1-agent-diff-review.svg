<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 383 460" width="383" role="img" aria-label="לולאת מצב agent ב-Cursor: נותנים משימה, הagent עורך כמה קבצים, כל שינוי מוצג כ-diff צבעוני ומחכה לאישור, ורק שינוי מאושר נכנס לפרויקט - שינוי שנדחה חוזר לagent לתיקון">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-task{0.00%{stroke:var(--pink);stroke-width:2.5;}11.18%{stroke:var(--pink);stroke-width:2.5;}13.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-task .shp{animation-name:k-task;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-work{0.00%{stroke-width:1.5;}8.88%{stroke-width:1.5;}11.18%{stroke:var(--pink);stroke-width:2.5;}22.37%{stroke:var(--pink);stroke-width:2.5;}24.67%{stroke-width:1.5;}42.43%{stroke-width:1.5;}44.74%{stroke:var(--pink);stroke-width:2.5;}55.92%{stroke:var(--pink);stroke-width:2.5;}58.22%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-work .shp{animation-name:k-work;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-diff{0.00%{stroke-width:1.5;}20.07%{stroke-width:1.5;}22.37%{stroke:var(--pink);stroke-width:2.5;}33.55%{stroke:var(--pink);stroke-width:2.5;}35.86%{stroke-width:1.5;}53.62%{stroke-width:1.5;}55.92%{stroke:var(--pink);stroke-width:2.5;}67.11%{stroke:var(--pink);stroke-width:2.5;}69.41%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-diff .shp{animation-name:k-diff;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-approve{0.00%{stroke-width:1.5;}31.25%{stroke-width:1.5;}33.55%{stroke:var(--pink);stroke-width:2.5;}44.74%{stroke:var(--pink);stroke-width:2.5;}47.04%{stroke-width:1.5;}64.80%{stroke-width:1.5;}67.11%{stroke:var(--pink);stroke-width:2.5;}78.29%{stroke:var(--pink);stroke-width:2.5;}80.59%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-approve .shp{animation-name:k-approve;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-enter{0.00%{stroke-width:1.5;}75.99%{stroke-width:1.5;}78.29%{stroke:var(--pink);stroke-width:2.5;}89.47%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-enter .shp{animation-name:k-enter;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.88%{stroke-width:1.6;}11.18%{stroke:var(--pink);stroke-width:2.4;}22.37%{stroke:var(--pink);stroke-width:2.4;}24.67%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}20.07%{stroke-width:1.6;}22.37%{stroke:var(--pink);stroke-width:2.4;}33.55%{stroke:var(--pink);stroke-width:2.4;}35.86%{stroke-width:1.6;}53.62%{stroke-width:1.6;}55.92%{stroke:var(--pink);stroke-width:2.4;}67.11%{stroke:var(--pink);stroke-width:2.4;}69.41%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}31.25%{stroke-width:1.6;}33.55%{stroke:var(--pink);stroke-width:2.4;}44.74%{stroke:var(--pink);stroke-width:2.4;}47.04%{stroke-width:1.6;}64.80%{stroke-width:1.6;}67.11%{stroke:var(--pink);stroke-width:2.4;}78.29%{stroke:var(--pink);stroke-width:2.4;}80.59%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}42.43%{stroke-width:1.6;}44.74%{stroke:var(--pink);stroke-width:2.4;}55.92%{stroke:var(--pink);stroke-width:2.4;}58.22%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}75.99%{stroke-width:1.6;}78.29%{stroke:var(--pink);stroke-width:2.4;}89.47%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="232.5,62.0 232.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="232.5,148.0 232.5,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="232.5,234.0 232.5,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="232.5,358.0 232.5,398.0" marker-end="url(#arr)"/>
<text class="lbl" x="246.5" y="382.0" text-anchor="end">מאשר</text>
<polyline id="edge-4" class="edge" points="152.5,316.0 17.8,316.0 17.8,125.0 107.4,125.0" marker-end="url(#arr)"/>
<text class="small" x="62.6" y="113.0" text-anchor="middle">דוחה או עורך</text>
<g id="el-task">
<rect class="n-box shp" x="140.6" y="16.0" width="183.8" height="46.0" rx="8"/>
<text class="t" x="232.5" y="44.0" text-anchor="middle">משימה במצב agent</text>
</g>
<g id="el-work">
<rect class="n-box shp" x="107.4" y="102.0" width="250.3" height="46.0" rx="8"/>
<text class="t" x="232.5" y="130.0" text-anchor="middle">קורא, כותב ומריץ פקודות</text>
</g>
<g id="el-diff">
<rect class="n-box shp" x="97.8" y="188.0" width="269.5" height="46.0" rx="8"/>
<text class="t" x="232.5" y="216.0" text-anchor="middle">diff צבעוני, קובץ אחר קובץ</text>
</g>
<g id="el-approve">
<polygon class="n-dia shp" points="232.5,274.0 312.5,316.0 232.5,358.0 152.5,316.0"/>
<text class="t" x="232.5" y="321.0" text-anchor="middle">לאשר?</text>
</g>
<g id="el-enter">
<rect class="n-box shp" x="154.4" y="398.0" width="156.2" height="46.0" rx="8"/>
<text class="t" x="232.5" y="426.0" text-anchor="middle">נכנס לפרויקט</text>
</g>
</svg>
