<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 762 550" width="762" role="img" aria-label="עץ ההחלטה של Speed of Light: מסווגים את הצוואר לפי Compute ו-Memory ומטפלים בו בהתאם - Tensor Cores, coalescing או CUDA Graphs">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="300.5,62.0 300.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="429.6,166.5 495.6,166.5" marker-end="url(#arr)"/>
<text class="lbl" x="462.6" y="154.5" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="300.5,231.1 300.5,271.1" marker-end="url(#arr)"/>
<text class="lbl" x="314.5" y="255.1" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="419.7,330.7 485.7,330.7" marker-end="url(#arr)"/>
<text class="lbl" x="452.7" y="318.7" text-anchor="middle">כן</text>
<polyline id="edge-4" class="edge" points="300.5,390.2 300.5,430.2" marker-end="url(#arr)"/>
<text class="lbl" x="314.5" y="414.2" text-anchor="end">לא</text>
<g id="el-sol">
<rect class="n-box shp" x="182.7" y="16.0" width="235.5" height="46.0" rx="8"/>
<text class="t" x="300.5" y="44.0" text-anchor="middle">דוח Speed of Light (ncu)</text>
</g>
<g id="el-c1">
<polygon class="n-dia shp" points="300.5,102.0 429.6,166.5 300.5,231.1 171.4,166.5"/>
<text class="code" x="300.5" y="171.5" text-anchor="middle">Compute% high</text>
</g>
<g id="el-cbound">
<rect class="n-box shp" x="495.6" y="143.5" width="250.3" height="46.0" rx="8"/>
<text class="t" x="620.7" y="171.5" text-anchor="middle">חסום-חישוב: Tensor Cores</text>
</g>
<g id="el-c2">
<polygon class="n-dia shp" points="300.5,271.1 419.7,330.7 300.5,390.2 181.3,330.7"/>
<text class="code" x="300.5" y="335.7" text-anchor="middle">Memory% high</text>
</g>
<g id="el-mbound">
<rect class="n-box shp" x="485.7" y="307.7" width="242.6" height="46.0" rx="8"/>
<text class="t" x="606.9" y="335.7" text-anchor="middle">חסום-זיכרון: coalescing</text>
</g>
<g id="el-over">
<rect class="n-box shp" x="167.3" y="430.2" width="266.4" height="46.0" rx="8"/>
<text class="t" x="300.5" y="458.2" text-anchor="middle">חסום-overhead: CUDA Graphs</text>
</g>
<g id="el-note">
<text class="small" x="300.5" y="529.2" text-anchor="middle">שניהם נמוכים = חסום-overhead שאינו מופיע על ה-roofline; מטפלים בצוואר האמיתי בלבד</text>
</g>
</svg>
