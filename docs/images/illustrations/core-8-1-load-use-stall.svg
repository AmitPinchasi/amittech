<g id="el-note">
<rect class="n-box shp" x="16.0" y="356.0" width="631.7" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="331.8" y="384.0" text-anchor="middle">הוראת ה-load נכנסת לצינור וקוראת ערך מהזכרון אל eax</text>
<text class="t dyn-note-1" x="331.8" y="384.0" text-anchor="middle">הוראת החיסור נכנסת לשלב IF מיד אחריה</text>
<text class="t dyn-note-2" x="331.8" y="384.0" text-anchor="middle">החיסור מגיע ל-ID וצריך לקרוא את eax, אבל הערך עדיין לא קיים</text>
<text class="t dyn-note-3" x="331.8" y="384.0" text-anchor="middle">הצינור מכניס בועה: החיסור עוצר בזמן שה-load נמצא בשלב MEM</text>
<text class="t dyn-note-4" x="331.8" y="384.0" text-anchor="middle">הערך שנקרא מהזכרון מועבר ישירות לחיסור, והוא יוצא לביצוע</text>
<text class="t dyn-note-5" x="331.8" y="384.0" text-anchor="middle">החיסור ממשיך בצינור בפיגור של מחזור אחד</text>
<text class="t dyn-note-6" x="331.8" y="384.0" text-anchor="middle">מחזור אחד אבד, ולכן כדאי להרחיק בקוד בין קריאה מהזכרון לשימוש בערך</text>
</g>
<g id="el-cap">
<text class="small" x="331.8" y="455.0" text-anchor="middle">העברה ישירה בחומרה פותרת תלות בין שתי הוראות חישוב, אך אחרי קריאה מהזכרון היא לא מספיקה</text>
</g>
