<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 481 250" width="481" role="img" aria-label="מודל האחריות בעבודה עם agent: אתם נותנים את הכוונה, הagent מבצע את השלבים הטכניים, ואתם סוקרים ומאשרים או מבקשים תיקון">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="280.8,62.0 280.8,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="294.8" y="86.0" text-anchor="end">משימה בשפה טבעית</text>
<polyline id="edge-1" class="edge" points="280.8,148.0 280.8,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="294.8" y="172.0" text-anchor="end">דיווח על מה שנעשה</text>
<polyline id="edge-2" class="edge" points="180.0,211.0 16.2,211.0 16.2,125.0 96.2,125.0" marker-end="url(#arr)"/>
<text class="small" x="56.2" y="113.0" text-anchor="middle">בקשת תיקון</text>
<g id="el-you1">
<rect class="n-box shp" x="170.3" y="16.0" width="221.1" height="46.0" rx="8"/>
<text class="t" x="280.8" y="44.0" text-anchor="middle">אתם - הכוונה והמשימה</text>
</g>
<g id="el-agent">
<rect class="n-box shp" x="96.2" y="102.0" width="369.2" height="46.0" rx="8"/>
<text class="t" x="280.8" y="130.0" text-anchor="middle">הagent מבצע: קריאה, עריכה, הרצה, בדיקה</text>
</g>
<g id="el-you2">
<rect class="n-box shp" x="180.0" y="188.0" width="201.6" height="46.0" rx="8"/>
<text class="t" x="280.8" y="216.0" text-anchor="middle">אתם - סקירה ואישור</text>
</g>
</svg>
