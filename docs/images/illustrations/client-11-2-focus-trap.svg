<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 618 220" width="618" role="img" aria-label="מלכודת פוקוס במודל: המקש Tab מעביר את הפוקוס בין האלמנטים, ומהאלמנט האחרון הפוקוס חוזר לראשון במקום לברוח לרקע">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-lst-0{0.00%{stroke:var(--pink);stroke-width:2.5;}16.48%{stroke:var(--pink);stroke-width:2.5;}20.33%{stroke-width:1.5;}62.09%{stroke-width:1.5;}65.93%{stroke:var(--pink);stroke-width:2.5;}82.42%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-lst-c0{animation-name:k-lst-0;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-1{0.00%{stroke-width:1.5;}12.64%{stroke-width:1.5;}16.48%{stroke:var(--pink);stroke-width:2.5;}32.97%{stroke:var(--pink);stroke-width:2.5;}36.81%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c1{animation-name:k-lst-1;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-2{0.00%{stroke-width:1.5;}29.12%{stroke-width:1.5;}32.97%{stroke:var(--pink);stroke-width:2.5;}49.45%{stroke:var(--pink);stroke-width:2.5;}53.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c2{animation-name:k-lst-2;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-3{0.00%{stroke-width:1.5;}45.60%{stroke-width:1.5;}49.45%{stroke:var(--pink);stroke-width:2.5;}65.93%{stroke:var(--pink);stroke-width:2.5;}69.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c3{animation-name:k-lst-3;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}12.64%{transform:translateX(0.0px);}16.48%{transform:translateX(-116.0px);}29.12%{transform:translateX(-116.0px);}32.97%{transform:translateX(-232.0px);}45.60%{transform:translateX(-232.0px);}49.45%{transform:translateX(-348.0px);}62.09%{transform:translateX(-348.0px);}65.93%{transform:translateX(0.0px);}78.57%{transform:translateX(0.0px);}100.00%{transform:translateX(0.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-focus-0{opacity:0;}
@keyframes k-dyn-focus-0{0.00%{opacity:1;}16.48%{opacity:1;}20.33%{opacity:0;}100.00%{opacity:0;}}
.dyn-focus-0{animation-name:k-dyn-focus-0;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-focus-1{opacity:0;}
@keyframes k-dyn-focus-1{0.00%{opacity:0;}12.64%{opacity:0;}16.48%{opacity:1;}65.93%{opacity:1;}69.78%{opacity:0;}100.00%{opacity:0;}}
.dyn-focus-1{animation-name:k-dyn-focus-1;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-focus-2{opacity:1;}
@keyframes k-dyn-focus-2{0.00%{opacity:0;}62.09%{opacity:0;}65.93%{opacity:1;}82.42%{opacity:1;}100.00%{opacity:1;}}
.dyn-focus-2{animation-name:k-dyn-focus-2;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-lst">
<rect id="el-lst-c0" class="n-cell shp" x="364.0" y="16.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="412.0" y="44.0" text-anchor="middle">שם</text>
<rect id="el-lst-c1" class="n-cell shp" x="248.0" y="16.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="296.0" y="44.0" text-anchor="middle">אימייל</text>
<rect id="el-lst-c2" class="n-cell shp" x="132.0" y="16.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.0" y="44.0" text-anchor="middle">שלח</text>
<rect id="el-lst-c3" class="n-cell shp" x="16.0" y="16.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="64.0" y="44.0" text-anchor="middle">ביטול</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="412.0,62.0 412.0,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="424.0" y="86.0" text-anchor="end">הפוקוס</text>
<g id="el-focus">
<rect class="n-box shp" x="221.7" y="102.0" width="380.5" height="44.0" rx="8"/>
<text class="t-b dyn-focus-0" x="412.0" y="129.0" text-anchor="middle">הפוקוס על האלמנט הראשון</text>
<text class="t-b dyn-focus-1" x="412.0" y="129.0" text-anchor="middle">לחיצה על Tab - הפוקוס מתקדם</text>
<text class="t-b dyn-focus-2" x="412.0" y="129.0" text-anchor="middle">המקש Tab באלמנט האחרון מחזיר לראשון</text>
</g>
</g>
<g id="el-note">
<text class="small" x="238.0" y="199.0" text-anchor="middle">כל עוד המודל פתוח, הפוקוס נע במעגל סגור ולא בורח לדף שמאחור</text>
</g>
</svg>
