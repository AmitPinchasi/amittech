<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 439 308" width="439" role="img" aria-label="מבנה מערכת הקבצים: אזור המטא שומר את שם הקובץ, גודלו והכתובת שלו, והכתובת מצביעה לאזור הנתונים שבו נשמר תוכן הקובץ">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="219.4,62.0 219.4,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="233.4" y="86.0" text-anchor="end">רשומת קובץ</text>
<polyline id="edge-1" class="edge" points="219.4,148.0 219.4,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="233.4" y="172.0" text-anchor="end">הכתובת מצביעה לנתונים</text>
<g id="el-meta">
<rect class="n-box shp" x="97.2" y="16.0" width="244.6" height="46.0" rx="8"/>
<text class="t" x="219.4" y="44.0" text-anchor="middle">מטא (Meta) - טבלת הקבצים</text>
</g>
<g id="el-entry">
<rect id="el-entry-c0" class="n-cell shp" x="294.3" y="102.0" width="109.6" height="46.0" rx="6"/>
<text class="t" x="349.1" y="130.0" text-anchor="middle" style="direction:ltr">report.txt</text>
<rect id="el-entry-c1" class="n-hl shp" x="164.6" y="102.0" width="109.6" height="46.0" rx="6"/>
<text class="t" x="219.4" y="130.0" text-anchor="middle" style="direction:ltr">0x40</text>
<rect id="el-entry-c2" class="n-cell shp" x="35.0" y="102.0" width="109.6" height="46.0" rx="6"/>
<text class="t" x="89.8" y="130.0" text-anchor="middle" style="direction:ltr">12KB</text>
</g>
<g id="el-data">
<rect id="el-data-c0" class="n-cell shp" x="287.4" y="188.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="335.4" y="216.0" text-anchor="middle" style="direction:ltr">0x20</text>
<rect id="el-data-c1" class="n-hl shp" x="171.4" y="188.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="219.4" y="216.0" text-anchor="middle" style="direction:ltr">0x40</text>
<rect id="el-data-c2" class="n-cell shp" x="55.4" y="188.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="103.4" y="216.0" text-anchor="middle" style="direction:ltr">0x60</text>
</g>
<g id="el-note">
<text class="small" x="219.4" y="287.0" text-anchor="middle">בלי הרשומה במטא לא נוכל לאתר את תוכן הקובץ באזור הנתונים</text>
</g>
</svg>
