<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 707 717" width="707" role="img" aria-label="תרשים המראה כיצד כתיבה אחרי fork גורמת ל-page fault, וכיצד הקרנל מקצה עותק פרטי של ה-page במנגנון העתקה בכתיבה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-fork{0.00%{stroke:var(--pink);stroke-width:2.5;}11.25%{stroke:var(--pink);stroke-width:2.5;}13.44%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fork .shp{animation-name:k-fork;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-share{0.00%{stroke-width:1.5;}9.06%{stroke-width:1.5;}11.25%{stroke:var(--pink);stroke-width:2.5;}22.50%{stroke:var(--pink);stroke-width:2.5;}24.69%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-share .shp{animation-name:k-share;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-write{0.00%{stroke-width:1.5;}20.31%{stroke-width:1.5;}22.50%{stroke:var(--pink);stroke-width:2.5;}33.75%{stroke:var(--pink);stroke-width:2.5;}35.94%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-write .shp{animation-name:k-write;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fault{0.00%{stroke-width:1.5;}31.56%{stroke-width:1.5;}33.75%{stroke:var(--pink);stroke-width:2.5;}45.00%{stroke:var(--pink);stroke-width:2.5;}47.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fault .shp{animation-name:k-fault;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}42.81%{stroke-width:1.5;}45.00%{stroke:var(--pink);stroke-width:2.5;}56.25%{stroke:var(--pink);stroke-width:2.5;}58.44%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-copy{0.00%{stroke-width:1.5;}54.06%{stroke-width:1.5;}56.25%{stroke:var(--pink);stroke-width:2.5;}67.50%{stroke:var(--pink);stroke-width:2.5;}69.69%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-copy .shp{animation-name:k-copy;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-update{0.00%{stroke-width:1.5;}65.31%{stroke-width:1.5;}67.50%{stroke:var(--pink);stroke-width:2.5;}78.75%{stroke:var(--pink);stroke-width:2.5;}80.94%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-update .shp{animation-name:k-update;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-done{0.00%{stroke-width:1.5;}76.56%{stroke-width:1.5;}78.75%{stroke:var(--pink);stroke-width:2.5;}90.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-done .shp{animation-name:k-done;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.06%{stroke-width:1.6;}11.25%{stroke:var(--pink);stroke-width:2.4;}22.50%{stroke:var(--pink);stroke-width:2.4;}24.69%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}20.31%{stroke-width:1.6;}22.50%{stroke:var(--pink);stroke-width:2.4;}33.75%{stroke:var(--pink);stroke-width:2.4;}35.94%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}31.56%{stroke-width:1.6;}33.75%{stroke:var(--pink);stroke-width:2.4;}45.00%{stroke:var(--pink);stroke-width:2.4;}47.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}42.81%{stroke-width:1.6;}45.00%{stroke:var(--pink);stroke-width:2.4;}56.25%{stroke:var(--pink);stroke-width:2.4;}58.44%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}54.06%{stroke-width:1.6;}56.25%{stroke:var(--pink);stroke-width:2.4;}67.50%{stroke:var(--pink);stroke-width:2.4;}69.69%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-5{animation-name:k-edge-5;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-6{0.00%{stroke-width:1.6;}65.31%{stroke-width:1.6;}67.50%{stroke:var(--pink);stroke-width:2.4;}78.75%{stroke:var(--pink);stroke-width:2.4;}80.94%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-6{animation-name:k-edge-6;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-7{0.00%{stroke-width:1.6;}76.56%{stroke-width:1.6;}78.75%{stroke:var(--pink);stroke-width:2.4;}90.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-7{animation-name:k-edge-7;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}45.00%{opacity:1;}47.19%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:1;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}42.81%{opacity:0;}45.00%{opacity:1;}90.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="311.2,54.0 311.2,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="311.2,140.0 311.2,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="311.2,218.0 311.2,258.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="311.2,304.0 311.2,344.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="410.5,393.6 476.5,393.6" marker-end="url(#arr)"/>
<text class="lbl" x="443.5" y="381.6" text-anchor="middle">לא</text>
<polyline id="edge-5" class="edge" points="311.2,443.3 311.2,483.3" marker-end="url(#arr)"/>
<text class="lbl" x="325.2" y="467.3" text-anchor="end">כן</text>
<polyline id="edge-6" class="edge" points="311.2,529.3 311.2,569.3" marker-end="url(#arr)"/>
<polyline id="edge-7" class="edge" points="311.2,615.3 311.2,655.3" marker-end="url(#arr)"/>
<g id="el-fork">
<rect class="n-code-bg shp" x="234.5" y="16.0" width="153.4" height="38.0" rx="7"/>
<text class="code" x="311.2" y="43.0" text-anchor="middle">pid = fork();</text>
</g>
<g id="el-share">
<rect class="n-box shp" x="16.0" y="94.0" width="590.3" height="46.0" rx="8"/>
<text class="t" x="311.2" y="122.0" text-anchor="middle">שני התהליכים מצביעים לאותם pages פיזיים, שמסומנים לקריאה בלבד</text>
</g>
<g id="el-write">
<rect class="n-code-bg shp" x="234.5" y="180.0" width="153.4" height="38.0" rx="7"/>
<text class="code" x="311.2" y="207.0" text-anchor="middle">buf[0] = 'A';</text>
</g>
<g id="el-fault">
<rect class="n-box shp" x="75.0" y="258.0" width="472.4" height="46.0" rx="8"/>
<text class="t" x="311.2" y="286.0" text-anchor="middle">המעבד מייצר page fault כי ה-page מסומן לקריאה בלבד</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="311.2,344.0 410.5,393.6 311.2,443.3 211.9,393.6"/>
<text class="code dyn-cond-0" x="311.2" y="398.6" text-anchor="middle">COW page ?</text>
<text class="code dyn-cond-1" x="311.2" y="398.6" text-anchor="middle">COW = yes</text>
</g>
<g id="el-segv">
<rect class="n-box shp" x="476.5" y="370.6" width="214.7" height="46.0" rx="8"/>
<text class="t" x="583.8" y="398.6" text-anchor="middle">הקרנל שולח SIGSEGV</text>
</g>
<g id="el-copy">
<rect class="n-box shp" x="91.4" y="483.3" width="439.5" height="46.0" rx="8"/>
<text class="t" x="311.2" y="511.3" text-anchor="middle">הקרנל מקצה page פיזי חדש ומעתיק אליו את התוכן</text>
</g>
<g id="el-update">
<rect class="n-box shp" x="47.9" y="569.3" width="526.5" height="46.0" rx="8"/>
<text class="t" x="311.2" y="597.3" text-anchor="middle">טבלת ה-paging של הכותב מצביעה ל-page החדש עם הרשאת כתיבה</text>
</g>
<g id="el-done">
<rect class="n-box shp" x="85.6" y="655.3" width="451.2" height="46.0" rx="8"/>
<text class="t" x="311.2" y="683.3" text-anchor="middle">הכתיבה מתבצעת, ולתהליך השני נשאר ה-page המקורי</text>
</g>
</svg>
