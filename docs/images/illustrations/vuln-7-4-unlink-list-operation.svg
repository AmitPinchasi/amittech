<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="424.3,65.0 424.3,105.0" marker-end="url(#arr)"/>
<text class="lbl" x="438.3" y="89.0" text-anchor="end" style="direction:ltr">fd</text>
<polyline id="edge-1" class="edge" points="424.3,151.0 424.3,191.0" marker-end="url(#arr)"/>
<text class="lbl" x="438.3" y="175.0" text-anchor="end" style="direction:ltr">fd</text>
<polyline id="edge-2" class="edge" points="373.5,128.0 16.0,128.0 16.0,42.0 373.5,42.0" marker-end="url(#arr)"/>
<text class="small" x="194.8" y="30.0" text-anchor="middle" style="direction:ltr">bk</text>
<polyline id="edge-3" class="edge" points="373.5,214.0 16.0,214.0 16.0,128.0 373.5,128.0" marker-end="url(#arr)"/>
<text class="small" x="194.8" y="116.0" text-anchor="middle" style="direction:ltr">bk</text>
<g id="el-A">
<rect class="n-box shp" x="373.5" y="19.0" width="101.5" height="46.0" rx="8"/>
<text class="t" x="424.3" y="47.0" text-anchor="middle" style="direction:ltr">chunk A</text>
</g>
<g id="el-B">
<rect class="n-box shp" x="373.5" y="105.0" width="101.5" height="46.0" rx="8"/>
<text class="t" x="424.3" y="133.0" text-anchor="middle" style="direction:ltr">chunk B</text>
</g>
<g id="el-C">
<rect class="n-box shp" x="373.5" y="191.0" width="101.5" height="46.0" rx="8"/>
<text class="t" x="424.3" y="219.0" text-anchor="middle" style="direction:ltr">chunk C</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="96.0" y="277.0" width="656.5" height="44.0" rx="8"/>
<text class="t-b dyn-note-0" x="424.3" y="304.0" text-anchor="middle">המבנה: A &lt;-&gt; B &lt;-&gt; C, כל chunk מצביע לשכנים דרך fd ו-bk</text>
<text class="t-b dyn-note-1" x="424.3" y="304.0" text-anchor="middle">מוציאים את B: FD = B.fd = C , BK = B.bk = A</text>
<text class="t-b dyn-note-2" x="424.3" y="304.0" text-anchor="middle">כתיבה ראשונה: FD.bk = BK, כלומר שדה ה-bk של C מקבל את A</text>
<text class="t-b dyn-note-3" x="424.3" y="304.0" text-anchor="middle">כתיבה שנייה: BK.fd = FD, כלומר שדה ה-fd של A מקבל את C - B נעקף לגמרי</text>
</g>
</svg>
