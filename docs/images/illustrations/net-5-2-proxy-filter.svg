<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 667 469" width="667" role="img" aria-label="תרשים זרימה של Transparent Proxy: בקשת HTTP מהעובד נבדקת, אם היעד זדוני או חסום הגישה נדחית, אחרת הבקשה מועברת לאתר">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}24.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-proxy{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-proxy .shp{animation-name:k-proxy;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-check{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-check .shp{animation-name:k-check;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fwd{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-fwd .shp{animation-name:k-fwd;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.07%{stroke-width:1.6;}20.24%{stroke:var(--pink);stroke-width:2.4;}40.48%{stroke:var(--pink);stroke-width:2.4;}44.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.31%{stroke-width:1.6;}40.48%{stroke:var(--pink);stroke-width:2.4;}60.71%{stroke:var(--pink);stroke-width:2.4;}64.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}56.55%{stroke-width:1.6;}60.71%{stroke:var(--pink);stroke-width:2.4;}80.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="194.9,62.0 194.9,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="194.9,148.0 194.9,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="373.8,277.4 439.8,277.4" marker-end="url(#arr)"/>
<text class="lbl" x="406.8" y="265.4" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="194.9,366.9 194.9,406.9" marker-end="url(#arr)"/>
<text class="lbl" x="208.9" y="390.9" text-anchor="end">לא</text>
<g id="el-req">
<rect class="n-box shp" x="98.3" y="16.0" width="193.2" height="46.0" rx="8"/>
<text class="t" x="194.9" y="44.0" text-anchor="middle">בקשת HTTP מהעובד</text>
</g>
<g id="el-proxy">
<rect class="n-box shp" x="79.1" y="102.0" width="231.5" height="46.0" rx="8"/>
<text class="t" x="194.9" y="130.0" text-anchor="middle">Transparent Proxy בודק</text>
</g>
<g id="el-check">
<polygon class="n-dia shp" points="194.9,188.0 373.8,277.4 194.9,366.9 16.0,277.4"/>
<text class="t" x="194.9" y="282.4" text-anchor="middle">יעד זדוני או חסום ?</text>
</g>
<g id="el-block">
<rect class="n-box shp" x="439.8" y="254.4" width="211.3" height="46.0" rx="8"/>
<text class="t" x="545.4" y="282.4" text-anchor="middle">חסימה - הגישה נדחית</text>
</g>
<g id="el-fwd">
<rect class="n-box shp" x="94.8" y="406.9" width="200.2" height="46.0" rx="8"/>
<text class="t" x="194.9" y="434.9" text-anchor="middle">העברה לאתר המבוקש</text>
</g>
</svg>
