<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 553 661" width="553" role="img" aria-label="מחזור החיים של סשן: פתיחה, שאלות הבנה, בקשת שינוי, אישור או דחיית diff, אימות, commit ויציאה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="209.5,62.0 209.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="209.5,148.0 209.5,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="209.5,234.0 209.5,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="322.9,330.7 388.9,330.7" marker-end="url(#arr)"/>
<text class="lbl" x="355.9" y="318.7" text-anchor="middle">לא</text>
<polyline id="edge-4" class="edge" points="388.9,330.7 16.0,330.7 16.0,211.0 109.3,211.0" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="209.5,387.5 209.5,427.5" marker-end="url(#arr)"/>
<text class="lbl" x="223.5" y="411.5" text-anchor="end">כן</text>
<polyline id="edge-6" class="edge" points="209.5,473.5 209.5,513.5" marker-end="url(#arr)"/>
<polyline id="edge-7" class="edge" points="209.5,559.5 209.5,599.5" marker-end="url(#arr)"/>
<g id="el-start">
<rect class="n-box shp" x="97.6" y="16.0" width="223.8" height="46.0" rx="8"/>
<text class="t" x="209.5" y="44.0" text-anchor="middle">cd לפרויקט ואז claude</text>
</g>
<g id="el-understand">
<rect class="n-box shp" x="141.1" y="102.0" width="136.7" height="46.0" rx="8"/>
<text class="t" x="209.5" y="130.0" text-anchor="middle">שאלות הבנה</text>
</g>
<g id="el-request">
<rect class="n-box shp" x="109.3" y="188.0" width="200.2" height="46.0" rx="8"/>
<text class="t" x="209.5" y="216.0" text-anchor="middle">בקשת שינוי מוגדרת</text>
</g>
<g id="el-diff">
<polygon class="n-dia shp" points="209.5,274.0 322.9,330.7 209.5,387.5 96.0,330.7"/>
<text class="t" x="209.5" y="335.7" text-anchor="middle">מאשרים diff?</text>
</g>
<g id="el-reject">
<rect class="n-box shp" x="388.9" y="307.7" width="147.8" height="46.0" rx="8"/>
<text class="t" x="462.8" y="335.7" text-anchor="middle">דחייה + הסבר</text>
</g>
<g id="el-verify">
<rect class="n-box shp" x="103.8" y="427.5" width="211.3" height="46.0" rx="8"/>
<text class="t" x="209.5" y="455.5" text-anchor="middle">אימות - הרצת בדיקות</text>
</g>
<g id="el-commit">
<rect class="n-box shp" x="161.5" y="513.5" width="96.0" height="46.0" rx="8"/>
<text class="t" x="209.5" y="541.5" text-anchor="middle" style="direction:ltr">commit</text>
</g>
<g id="el-exit">
<rect class="n-box shp" x="161.5" y="599.5" width="96.0" height="46.0" rx="8"/>
<text class="t" x="209.5" y="627.5" text-anchor="middle">יציאה</text>
</g>
</svg>
