<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 503 428" width="503" role="img" aria-label="אנימציה של הפונקציה strcat: היא מוצאת את תו הסיום של המחרוזת הראשונה, מעתיקה לשם את השנייה, וכותבת תו סיום חדש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-buf{0.00%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-buf .shp{animation-name:k-buf;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-step{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-step .shp{animation-name:k-step;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-warn{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-warn .shp{animation-name:k-warn;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-buf-0{opacity:0;}
@keyframes k-dyn-buf-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-buf-0{animation-name:k-dyn-buf-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-buf-1{opacity:0;}
@keyframes k-dyn-buf-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-buf-1{animation-name:k-dyn-buf-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-buf-2{opacity:0;}
@keyframes k-dyn-buf-2{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-buf-2{animation-name:k-dyn-buf-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-buf-3{opacity:1;}
@keyframes k-dyn-buf-3{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-buf-3{animation-name:k-dyn-buf-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-step-0{opacity:0;}
@keyframes k-dyn-step-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-step-0{animation-name:k-dyn-step-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-step-1{opacity:0;}
@keyframes k-dyn-step-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-step-1{animation-name:k-dyn-step-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-step-2{opacity:0;}
@keyframes k-dyn-step-2{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-step-2{animation-name:k-dyn-step-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-step-3{opacity:1;}
@keyframes k-dyn-step-3{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-step-3{animation-name:k-dyn-step-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="116.0" y="16.0" width="270.7" height="82.0" rx="7"/>
<text class="code" x="251.4" y="43.0" text-anchor="middle">char str1[100] = "hello ";</text>
<text class="code" x="251.4" y="65.0" text-anchor="middle">char str2[] = "world";</text>
<text class="code" x="251.4" y="87.0" text-anchor="middle">strcat(str1, str2);</text>
</g>
<g id="el-buf">
<rect class="n-box shp" x="151.0" y="138.0" width="200.6" height="44.0" rx="8"/>
<text class="t-b dyn-buf-0" x="251.4" y="165.0" text-anchor="middle" style="direction:ltr">str1 = hello _</text>
<text class="t-b dyn-buf-1" x="251.4" y="165.0" text-anchor="middle" style="direction:ltr">str1 = hello w_</text>
<text class="t-b dyn-buf-2" x="251.4" y="165.0" text-anchor="middle" style="direction:ltr">str1 = hello wor_</text>
<text class="t-b dyn-buf-3" x="251.4" y="165.0" text-anchor="middle" style="direction:ltr">str1 = hello world_</text>
</g>
<g id="el-step">
<rect class="n-box shp" x="46.1" y="222.0" width="410.6" height="46.0" rx="8"/>
<text class="t dyn-step-0" x="251.4" y="250.0" text-anchor="middle">הפונקציה מחפשת את תו הסיום של str1</text>
<text class="t dyn-step-1" x="251.4" y="250.0" text-anchor="middle">היא מתחילה להעתיק את str2 החל מאותו מקום</text>
<text class="t dyn-step-2" x="251.4" y="250.0" text-anchor="middle">ההעתקה ממשיכה תו אחרי תו</text>
<text class="t dyn-step-3" x="251.4" y="250.0" text-anchor="middle">בסוף נכתב תו סיום חדש אחרי המילה שהתווספה</text>
</g>
<g id="el-cap">
<text class="small" x="251.4" y="321.0" text-anchor="middle">הסימן קו תחתון מסמן כאן את תו הסיום של המחרוזת</text>
</g>
<g id="el-warn">
<rect class="n-box shp" x="16.0" y="366.0" width="470.7" height="46.0" rx="8"/>
<text class="t" x="251.4" y="394.0" text-anchor="middle">אם str1 קטנה מדי ההעתקה תחרוג מהזיכרון שהוקצה לה</text>
</g>
</svg>
