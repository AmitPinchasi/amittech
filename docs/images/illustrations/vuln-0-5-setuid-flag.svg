<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 555 394" width="555" role="img" aria-label="כיצד ביט ה-setuid מגשר אל הדגל: המשתמש החלש fd מריץ בינארי בבעלות fd_pwn שרץ בהרשאות הבעלים, ולכן הבינארי יכול לקרוא את קובץ flag שבהרשאה 400 ולהחזיר לנו את תוכנו, למרות שהמשתמש fd אינו יכול לקרוא אותו ישירות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="277.4,62.0 277.4,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="291.4" y="86.0" text-anchor="end">מריץ ./fd</text>
<polyline id="edge-1" class="edge" points="277.4,148.0 277.4,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="291.4" y="172.0" text-anchor="end">קורא בהרשאות fd_pwn</text>
<polyline id="edge-2" class="edge" points="277.4,234.0 277.4,274.0" marker-end="url(#arr)"/>
<text class="lbl" x="291.4" y="258.0" text-anchor="end">מחזיר את התוכן</text>
<g id="el-user">
<rect class="n-box shp" x="192.5" y="16.0" width="169.7" height="46.0" rx="8"/>
<text class="t" x="277.4" y="44.0" text-anchor="middle">המשתמש fd - חלש</text>
</g>
<g id="el-bin">
<rect class="n-box shp" x="59.2" y="102.0" width="436.4" height="46.0" rx="8"/>
<text class="t" x="277.4" y="130.0" text-anchor="middle">בינארי setuid בבעלות fd_pwn - רץ בהרשאות fd_pwn</text>
</g>
<g id="el-flag">
<rect class="n-box shp" x="107.7" y="188.0" width="339.3" height="46.0" rx="8"/>
<text class="t" x="277.4" y="216.0" text-anchor="middle">קובץ flag - הרשאה 400 בבעלות fd_pwn</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="182.1" y="274.0" width="190.5" height="46.0" rx="8"/>
<text class="t" x="277.4" y="302.0" text-anchor="middle">הדגל מודפס אליכם</text>
</g>
<g id="el-note">
<text class="small" x="277.4" y="373.0" text-anchor="middle">המשתמש fd אינו יכול לקרוא את flag ישירות - הבינארי המיוחס הוא הגשר אל הדגל</text>
</g>
</svg>
