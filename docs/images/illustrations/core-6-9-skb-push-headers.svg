<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-op">
<rect class="n-code-bg shp" x="216.9" y="16.0" width="288.8" height="38.0" rx="7"/>
<text class="code dyn-op-0" x="361.2" y="43.0" text-anchor="middle">send(sockfd, "Hello!", 6, 0)</text>
<text class="code dyn-op-1" x="361.2" y="43.0" text-anchor="middle">skb_push(skb, 20)</text>
<text class="code dyn-op-2" x="361.2" y="43.0" text-anchor="middle">skb_push(skb, 20)</text>
<text class="code dyn-op-3" x="361.2" y="43.0" text-anchor="middle">skb_push(skb, 14)</text>
</g>
<g id="el-head">
<rect class="n-code-bg shp" x="253.0" y="94.0" width="216.5" height="38.0" rx="7"/>
<text class="code dyn-head-0" x="361.2" y="121.0" text-anchor="middle">headroom = 128 bytes</text>
<text class="code dyn-head-1" x="361.2" y="121.0" text-anchor="middle">headroom = 108 bytes</text>
<text class="code dyn-head-2" x="361.2" y="121.0" text-anchor="middle">headroom = 88 bytes</text>
<text class="code dyn-head-3" x="361.2" y="121.0" text-anchor="middle">headroom = 74 bytes</text>
</g>
<g id="el-len">
<rect class="n-code-bg shp" x="266.5" y="172.0" width="189.5" height="38.0" rx="7"/>
<text class="code dyn-len-0" x="361.2" y="199.0" text-anchor="middle">packet = 6 bytes</text>
<text class="code dyn-len-1" x="361.2" y="199.0" text-anchor="middle">packet = 26 bytes</text>
<text class="code dyn-len-2" x="361.2" y="199.0" text-anchor="middle">packet = 46 bytes</text>
<text class="code dyn-len-3" x="361.2" y="199.0" text-anchor="middle">packet = 60 bytes</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="250.0" width="690.5" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="361.2" y="278.0" text-anchor="middle">הנתונים מועתקים מהיוזר ל-sk_buff, ולפניהם נשמר מקום פנוי עבור ה-headers</text>
<text class="t dyn-note-1" x="361.2" y="278.0" text-anchor="middle">שכבת ה-TCP מזיזה את המצביע data אחורה וכותבת בשטח שהתפנה את ה-header שלה</text>
<text class="t dyn-note-2" x="361.2" y="278.0" text-anchor="middle">שכבת ה-IP מזיזה את data שוב אחורה וכותבת את ה-header שלה לפני זה של TCP</text>
<text class="t dyn-note-3" x="361.2" y="278.0" text-anchor="middle">שכבת ה-Ethernet מוסיפה את ה-header האחרון, וכל זה בלי להעתיק בתים של נתונים</text>
</g>
<g id="el-cap">
<text class="small" x="361.2" y="349.0" text-anchor="middle">בקבלת חבילה התהליך הפוך: הפונקציה skb_pull מזיזה את המצביע קדימה ומסירה header אחרי header</text>
</g>
</svg>
