<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 563" width="680" role="img" aria-label="לוגיקת ההחלטה של CSP: הדפדפן מריץ סקריפט אם ה-nonce מאשר או שהמקור מורשה, ואם אף תנאי לא מתקיים הסקריפט נחסם ונשלח דיווח">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-meet{0.00%{stroke:var(--pink);stroke-width:2.5;}11.18%{stroke:var(--pink);stroke-width:2.5;}13.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-meet .shp{animation-name:k-meet;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-nonceq{0.00%{stroke-width:1.5;}8.88%{stroke-width:1.5;}11.18%{stroke:var(--pink);stroke-width:2.5;}22.37%{stroke:var(--pink);stroke-width:2.5;}24.67%{stroke-width:1.5;}31.25%{stroke-width:1.5;}33.55%{stroke:var(--pink);stroke-width:2.5;}44.74%{stroke:var(--pink);stroke-width:2.5;}47.04%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-nonceq .shp{animation-name:k-nonceq;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-runN{0.00%{stroke-width:1.5;}20.07%{stroke-width:1.5;}22.37%{stroke:var(--pink);stroke-width:2.5;}33.55%{stroke:var(--pink);stroke-width:2.5;}35.86%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-runN .shp{animation-name:k-runN;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-srcq{0.00%{stroke-width:1.5;}42.43%{stroke-width:1.5;}44.74%{stroke:var(--pink);stroke-width:2.5;}55.92%{stroke:var(--pink);stroke-width:2.5;}58.22%{stroke-width:1.5;}64.80%{stroke-width:1.5;}67.11%{stroke:var(--pink);stroke-width:2.5;}78.29%{stroke:var(--pink);stroke-width:2.5;}80.59%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-srcq .shp{animation-name:k-srcq;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-runS{0.00%{stroke-width:1.5;}53.62%{stroke-width:1.5;}55.92%{stroke:var(--pink);stroke-width:2.5;}67.11%{stroke:var(--pink);stroke-width:2.5;}69.41%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-runS .shp{animation-name:k-runS;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-block{0.00%{stroke-width:1.5;}75.99%{stroke-width:1.5;}78.29%{stroke:var(--pink);stroke-width:2.5;}89.47%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-block .shp{animation-name:k-block;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.88%{stroke-width:1.6;}11.18%{stroke:var(--pink);stroke-width:2.4;}22.37%{stroke:var(--pink);stroke-width:2.4;}24.67%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}20.07%{stroke-width:1.6;}22.37%{stroke:var(--pink);stroke-width:2.4;}33.55%{stroke:var(--pink);stroke-width:2.4;}35.86%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}42.43%{stroke-width:1.6;}44.74%{stroke:var(--pink);stroke-width:2.4;}55.92%{stroke:var(--pink);stroke-width:2.4;}58.22%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}53.62%{stroke-width:1.6;}55.92%{stroke:var(--pink);stroke-width:2.4;}67.11%{stroke:var(--pink);stroke-width:2.4;}69.41%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}75.99%{stroke-width:1.6;}78.29%{stroke:var(--pink);stroke-width:2.4;}89.47%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="216.0,62.0 216.0,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="216.0,220.6 216.0,260.6" marker-end="url(#arr)"/>
<text class="lbl" x="230.0" y="244.6" text-anchor="end">לא</text>
<polyline id="edge-2" class="edge" points="334.6,161.3 400.6,161.3" marker-end="url(#arr)"/>
<text class="lbl" x="367.6" y="149.3" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="216.0,460.6 216.0,500.6" marker-end="url(#arr)"/>
<text class="lbl" x="230.0" y="484.6" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="415.9,360.6 481.9,360.6" marker-end="url(#arr)"/>
<text class="lbl" x="448.9" y="348.6" text-anchor="middle">כן</text>
<g id="el-meet">
<rect class="n-box shp" x="93.0" y="16.0" width="245.9" height="46.0" rx="8"/>
<text class="t" x="216.0" y="44.0" text-anchor="middle">הדפדפן פוגש תגית script</text>
</g>
<g id="el-nonceq">
<polygon class="n-dia shp" points="216.0,102.0 334.6,161.3 216.0,220.6 97.3,161.3"/>
<text class="t" x="216.0" y="166.3" text-anchor="middle">ה-nonce תואם?</text>
</g>
<g id="el-srcq">
<polygon class="n-dia shp" points="216.0,260.6 415.9,360.6 216.0,460.6 16.0,360.6"/>
<text class="t" x="216.0" y="365.6" text-anchor="middle">המקור ברשימה המותרת?</text>
</g>
<g id="el-runN">
<rect class="n-box shp" x="400.6" y="138.3" width="181.4" height="46.0" rx="8"/>
<text class="t" x="491.3" y="166.3" text-anchor="middle">רץ - ה-nonce מאשר</text>
</g>
<g id="el-runS">
