</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="259.7,54.0 259.7,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="259.7,132.0 259.7,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="273.7" y="156.0" text-anchor="end">מה שנשמר בפועל</text>
<polyline id="edge-2" class="edge" points="259.7,218.0 259.7,258.0" marker-end="url(#arr)"/>
<g id="el-obj">
<rect class="n-code-bg shp" x="83.7" y="16.0" width="352.0" height="38.0" rx="7"/>
<text class="code" x="259.7" y="43.0" text-anchor="middle">let user = { name: "Dan", age: 25 }</text>
</g>
<g id="el-save">
<rect class="n-code-bg shp" x="16.0" y="94.0" width="487.4" height="38.0" rx="7"/>
<text class="code dyn-save-0" x="259.7" y="121.0" text-anchor="middle">localStorage.setItem("user", user)</text>
<text class="code dyn-save-1" x="259.7" y="121.0" text-anchor="middle">localStorage.setItem("user", JSON.stringify(user))</text>
</g>
<g id="el-stored">
<rect class="n-box shp" x="151.0" y="172.0" width="217.4" height="46.0" rx="8"/>
<text class="t dyn-stored-0" x="259.7" y="200.0" text-anchor="middle" style="direction:ltr">"[object Object]"</text>
<text class="t dyn-stored-1" x="259.7" y="200.0" text-anchor="middle" style="direction:ltr">{"name":"Dan","age":25}</text>
</g>
<g id="el-back">
<rect class="n-box shp" x="68.2" y="258.0" width="383.0" height="46.0" rx="8"/>
<text class="t dyn-back-0" x="259.7" y="286.0" text-anchor="middle">המידע אבד - אי אפשר לשחזר את האובייקט</text>
<text class="t dyn-back-1" x="259.7" y="286.0" text-anchor="middle">קריאה עם JSON.parse מחזירה את האובייקט</text>
