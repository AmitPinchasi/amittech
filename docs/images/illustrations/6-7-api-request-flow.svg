<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 398" width="330" role="img" aria-label="מסלול של בקשת GET לנקודת API: הקוד שולח בקשה, השרת מחזיר תשובה בפורמט JSON, והתשובה הופכת למילון פייתון">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}16.48%{stroke:var(--pink);stroke-width:2.5;}20.33%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-server{0.00%{stroke-width:1.5;}12.64%{stroke-width:1.5;}16.48%{stroke:var(--pink);stroke-width:2.5;}32.97%{stroke:var(--pink);stroke-width:2.5;}36.81%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-server .shp{animation-name:k-server;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-raw{0.00%{stroke-width:1.5;}29.12%{stroke-width:1.5;}32.97%{stroke:var(--pink);stroke-width:2.5;}49.45%{stroke:var(--pink);stroke-width:2.5;}53.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-raw .shp{animation-name:k-raw;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-parse{0.00%{stroke-width:1.5;}45.60%{stroke-width:1.5;}49.45%{stroke:var(--pink);stroke-width:2.5;}65.93%{stroke:var(--pink);stroke-width:2.5;}69.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-parse .shp{animation-name:k-parse;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dict{0.00%{stroke-width:1.5;}62.09%{stroke-width:1.5;}65.93%{stroke:var(--pink);stroke-width:2.5;}82.42%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-dict .shp{animation-name:k-dict;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}12.64%{stroke-width:1.6;}16.48%{stroke:var(--pink);stroke-width:2.4;}32.97%{stroke:var(--pink);stroke-width:2.4;}36.81%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.12%{stroke-width:1.6;}32.97%{stroke:var(--pink);stroke-width:2.4;}49.45%{stroke:var(--pink);stroke-width:2.4;}53.30%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}45.60%{stroke-width:1.6;}49.45%{stroke:var(--pink);stroke-width:2.4;}65.93%{stroke:var(--pink);stroke-width:2.4;}69.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}62.09%{stroke-width:1.6;}65.93%{stroke:var(--pink);stroke-width:2.4;}82.42%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="164.9,54.0 164.9,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="178.9" y="78.0" text-anchor="end">בקשת GET</text>
<polyline id="edge-1" class="edge" points="164.9,140.0 164.9,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="178.9" y="164.0" text-anchor="end">מחזיר תשובה</text>
<polyline id="edge-2" class="edge" points="164.9,218.0 164.9,258.0" marker-end="url(#arr)"/>
<text class="lbl" x="178.9" y="242.0" text-anchor="end">טקסט בפורמט JSON</text>
<polyline id="edge-3" class="edge" points="164.9,296.0 164.9,336.0" marker-end="url(#arr)"/>
<text class="lbl" x="178.9" y="320.0" text-anchor="end">הפך למילון</text>
<g id="el-req">
<rect class="n-code-bg shp" x="52.1" y="16.0" width="225.6" height="38.0" rx="7"/>
<text class="code" x="164.9" y="43.0" text-anchor="middle">requests.get(api_url)</text>
</g>
<g id="el-server">
<rect class="n-box shp" x="58.2" y="94.0" width="213.3" height="46.0" rx="8"/>
<text class="t" x="164.9" y="122.0" text-anchor="middle">נקודת ה-API של האתר</text>
</g>
<g id="el-raw">
<rect class="n-code-bg shp" x="16.0" y="180.0" width="297.8" height="38.0" rx="7"/>
<text class="code" x="164.9" y="207.0" text-anchor="middle">{"title": "foo", "userId": 1}</text>
</g>
<g id="el-parse">
<rect class="n-code-bg shp" x="79.2" y="258.0" width="171.4" height="38.0" rx="7"/>
<text class="code" x="164.9" y="285.0" text-anchor="middle">response.json()</text>
</g>
<g id="el-dict">
<rect class="n-box shp" x="47.6" y="336.0" width="234.5" height="46.0" rx="8"/>
<text class="t" x="164.9" y="364.0" text-anchor="middle">מילון פייתון עם המידע</text>
</g>
</svg>
