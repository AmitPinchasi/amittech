<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 538 331" width="538" role="img" aria-label="תרשים זרימה של תנאי if else: בדיקת גיל עם ערך קלט אמיתי">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-input{0.00%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-input .shp{animation-name:k-input;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-yes{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-yes .shp{animation-name:k-yes;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-end{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-end .shp{animation-name:k-end;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-input-0{opacity:0;}
@keyframes k-dyn-input-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-input-0{animation-name:k-dyn-input-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-input-1{opacity:1;}
@keyframes k-dyn-input-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-input-1{animation-name:k-dyn-input-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:1;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="271.5,54.0 271.5,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="360.9,138.7 448.9,138.7 448.9,183.4" marker-end="url(#arr)"/>
<text class="lbl" x="404.9" y="126.7" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="182.1,138.7 94.1,138.7 94.1,183.4" marker-end="url(#arr)"/>
<text class="lbl" x="138.1" y="126.7" text-anchor="middle">לא</text>
<polyline id="edge-3" class="edge" points="448.9,229.4 448.9,292.4 349.6,292.4" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="94.1,229.4 94.1,292.4 193.4,292.4" marker-end="url(#arr)"/>
<g id="el-input">
<rect class="n-code-bg shp" x="172.2" y="16.0" width="198.5" height="38.0" rx="7"/>
<text class="code dyn-input-0" x="271.5" y="43.0" text-anchor="middle">age = int(input())</text>
<text class="code dyn-input-1" x="271.5" y="43.0" text-anchor="middle">age = 25</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="271.5,94.0 360.9,138.7 271.5,183.4 182.1,138.7"/>
<text class="code dyn-cond-0" x="271.5" y="143.7" text-anchor="middle">age &gt;= 18</text>
<text class="code dyn-cond-1" x="271.5" y="143.7" text-anchor="middle">25 &gt;= 18</text>
</g>
<g id="el-yes">
<rect class="n-box shp" x="375.6" y="183.4" width="146.5" height="46.0" rx="8"/>
<text class="t" x="448.9" y="211.4" text-anchor="middle">מותר להיכנס</text>
</g>
<g id="el-no">
<rect class="n-box shp" x="16.0" y="183.4" width="156.2" height="46.0" rx="8"/>
<text class="t" x="94.1" y="211.4" text-anchor="middle">הכניסה נדחתה</text>
</g>
<g id="el-end">
<rect class="n-box shp" x="193.4" y="269.4" width="156.2" height="46.0" rx="8"/>
<text class="t" x="271.5" y="297.4" text-anchor="middle">המשך התוכנית</text>
</g>
</svg>
