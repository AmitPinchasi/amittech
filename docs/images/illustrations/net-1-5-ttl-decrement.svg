<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 218" width="590" role="img" aria-label="אנימציה של שדה ה-TTL בפרוטוקול IP: המחשב השולח קובע TTL של 4, כל נתב בדרך מוריד את הערך ב-1, וכשהוא מגיע ל-0 הנתב זורק את הפקטה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-hop{0.00%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-hop .shp{animation-name:k-hop;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ttl{0.00%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-ttl .shp{animation-name:k-ttl;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-hop-0{opacity:0;}
@keyframes k-dyn-hop-0{0.00%{opacity:1;}16.83%{opacity:1;}20.30%{opacity:0;}100.00%{opacity:0;}}
.dyn-hop-0{animation-name:k-dyn-hop-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-hop-1{opacity:0;}
@keyframes k-dyn-hop-1{0.00%{opacity:0;}13.37%{opacity:0;}16.83%{opacity:1;}33.66%{opacity:1;}37.13%{opacity:0;}100.00%{opacity:0;}}
.dyn-hop-1{animation-name:k-dyn-hop-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-hop-2{opacity:0;}
@keyframes k-dyn-hop-2{0.00%{opacity:0;}30.20%{opacity:0;}33.66%{opacity:1;}50.50%{opacity:1;}53.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-hop-2{animation-name:k-dyn-hop-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-hop-3{opacity:0;}
@keyframes k-dyn-hop-3{0.00%{opacity:0;}47.03%{opacity:0;}50.50%{opacity:1;}67.33%{opacity:1;}70.79%{opacity:0;}100.00%{opacity:0;}}
.dyn-hop-3{animation-name:k-dyn-hop-3;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-hop-4{opacity:1;}
@keyframes k-dyn-hop-4{0.00%{opacity:0;}63.86%{opacity:0;}67.33%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-hop-4{animation-name:k-dyn-hop-4;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ttl-0{opacity:0;}
@keyframes k-dyn-ttl-0{0.00%{opacity:1;}16.83%{opacity:1;}20.30%{opacity:0;}100.00%{opacity:0;}}
.dyn-ttl-0{animation-name:k-dyn-ttl-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ttl-1{opacity:0;}
@keyframes k-dyn-ttl-1{0.00%{opacity:0;}13.37%{opacity:0;}16.83%{opacity:1;}33.66%{opacity:1;}37.13%{opacity:0;}100.00%{opacity:0;}}
.dyn-ttl-1{animation-name:k-dyn-ttl-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ttl-2{opacity:0;}
@keyframes k-dyn-ttl-2{0.00%{opacity:0;}30.20%{opacity:0;}33.66%{opacity:1;}50.50%{opacity:1;}53.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-ttl-2{animation-name:k-dyn-ttl-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ttl-3{opacity:0;}
@keyframes k-dyn-ttl-3{0.00%{opacity:0;}47.03%{opacity:0;}50.50%{opacity:1;}67.33%{opacity:1;}70.79%{opacity:0;}100.00%{opacity:0;}}
.dyn-ttl-3{animation-name:k-dyn-ttl-3;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ttl-4{opacity:1;}
@keyframes k-dyn-ttl-4{0.00%{opacity:0;}63.86%{opacity:0;}67.33%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-ttl-4{animation-name:k-dyn-ttl-4;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-hop">
<rect class="n-box shp" x="145.2" y="16.0" width="299.9" height="44.0" rx="8"/>
<text class="t-b dyn-hop-0" x="295.1" y="43.0" text-anchor="middle">מחשב שולח - קובע TTL</text>
<text class="t-b dyn-hop-1" x="295.1" y="43.0" text-anchor="middle">נתב 1 מוריד ב-1</text>
<text class="t-b dyn-hop-2" x="295.1" y="43.0" text-anchor="middle">נתב 2 מוריד ב-1</text>
<text class="t-b dyn-hop-3" x="295.1" y="43.0" text-anchor="middle">נתב 3 מוריד ב-1</text>
<text class="t-b dyn-hop-4" x="295.1" y="43.0" text-anchor="middle">נתב 4 - TTL אפס, הפקטה נזרקת</text>
</g>
<g id="el-ttl">
<rect class="n-box shp" x="224.0" y="100.0" width="142.2" height="44.0" rx="8"/>
<text class="t-b dyn-ttl-0" x="295.1" y="127.0" text-anchor="middle">ערך TTL = 4</text>
<text class="t-b dyn-ttl-1" x="295.1" y="127.0" text-anchor="middle">ערך TTL = 3</text>
<text class="t-b dyn-ttl-2" x="295.1" y="127.0" text-anchor="middle">ערך TTL = 2</text>
<text class="t-b dyn-ttl-3" x="295.1" y="127.0" text-anchor="middle">ערך TTL = 1</text>
<text class="t-b dyn-ttl-4" x="295.1" y="127.0" text-anchor="middle">ערך TTL = 0</text>
</g>
<g id="el-note">
<text class="small" x="295.1" y="197.0" text-anchor="middle">כל נתב בדרך מוריד את ה-TTL ב-1, וכשהוא מגיע ל-0 הפקטה נזרקת כדי שלא תסתובב לנצח</text>
</g>
</svg>
