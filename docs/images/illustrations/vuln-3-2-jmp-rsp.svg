<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 348 320" width="348" role="img" aria-label="טרמפולינה עם jmp rsp: ברגע ה-ret של הפונקציה הפגיעה מצביע המחסנית rsp מצביע בדיוק על ה-shellcode שיושב מיד אחרי כתובת החזרה, ולכן קופצים לגאדג'ט קבוע jmp rsp שבבינארי, והוא מקפיץ אל ה-shellcode בלי לדעת בכלל את כתובת המחסנית">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-ret{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ret .shp{animation-name:k-ret;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-gadget{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-gadget .shp{animation-name:k-gadget;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sc{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sc .shp{animation-name:k-sc;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-shell{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-shell .shp{animation-name:k-shell;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}40.91%{stroke:var(--pink);stroke-width:2.4;}44.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.93%{stroke-width:1.6;}40.91%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="174.2,54.0 174.2,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="188.2" y="78.0" text-anchor="end">שולף כתובת גאדג'ט</text>
<polyline id="edge-1" class="edge" points="174.2,132.0 174.2,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="188.2" y="156.0" text-anchor="end">rsp מצביע לכאן</text>
<polyline id="edge-2" class="edge" points="174.2,218.0 174.2,258.0" marker-end="url(#arr)"/>
<text class="lbl" x="188.2" y="242.0" text-anchor="end">רץ</text>
<g id="el-ret">
<rect class="n-code-bg shp" x="93.1" y="16.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="174.2" y="43.0" text-anchor="middle">ret  (של vuln)</text>
</g>
<g id="el-gadget">
<rect class="n-code-bg shp" x="56.9" y="94.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="174.2" y="121.0" text-anchor="middle">jmp rsp  (גאדג'ט קבוע)</text>
</g>
<g id="el-sc">
<rect class="n-box shp" x="16.0" y="172.0" width="316.5" height="46.0" rx="8"/>
<text class="t" x="174.2" y="200.0" text-anchor="middle">shellcode - מיד אחרי כתובת החזרה</text>
</g>
<g id="el-shell">
<rect class="n-box shp" x="126.2" y="258.0" width="96.0" height="46.0" rx="8"/>
<text class="t" x="174.2" y="286.0" text-anchor="middle" style="direction:ltr">shell</text>
</g>
</svg>
