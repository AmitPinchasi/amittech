<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 507 493" width="507" role="img" aria-label="כשהcontext מתקרב לגבול Claude Code קודם מנקה פלטים ישנים של tools ורק אם צריך עוד מקום מסכם את השיחה, וכך מתפנה מקום להמשך העבודה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-gauge{0.00%{stroke:var(--pink);stroke-width:2.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}20.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-gauge .shp{animation-name:k-gauge;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-clear_tools{0.00%{stroke-width:1.5;}13.37%{stroke-width:1.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}37.13%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-clear_tools .shp{animation-name:k-clear_tools;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-check{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-check .shp{animation-name:k-check;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-summarize{0.00%{stroke-width:1.5;}47.03%{stroke-width:1.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}70.79%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-summarize .shp{animation-name:k-summarize;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-done{0.00%{stroke-width:1.5;}63.86%{stroke-width:1.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-done .shp{animation-name:k-done;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.37%{stroke-width:1.6;}16.83%{stroke:var(--pink);stroke-width:2.4;}33.66%{stroke:var(--pink);stroke-width:2.4;}37.13%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.20%{stroke-width:1.6;}33.66%{stroke:var(--pink);stroke-width:2.4;}50.50%{stroke:var(--pink);stroke-width:2.4;}53.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.03%{stroke-width:1.6;}50.50%{stroke:var(--pink);stroke-width:2.4;}67.33%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}63.86%{stroke-width:1.6;}67.33%{stroke:var(--pink);stroke-width:2.4;}84.16%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-gauge-0{opacity:0;}
@keyframes k-dyn-gauge-0{0.00%{opacity:1;}33.66%{opacity:1;}37.13%{opacity:0;}100.00%{opacity:0;}}
.dyn-gauge-0{animation-name:k-dyn-gauge-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-gauge-1{opacity:0;}
@keyframes k-dyn-gauge-1{0.00%{opacity:0;}30.20%{opacity:0;}33.66%{opacity:1;}67.33%{opacity:1;}70.79%{opacity:0;}100.00%{opacity:0;}}
.dyn-gauge-1{animation-name:k-dyn-gauge-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-gauge-2{opacity:1;}
@keyframes k-dyn-gauge-2{0.00%{opacity:0;}63.86%{opacity:0;}67.33%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-gauge-2{animation-name:k-dyn-gauge-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="173.1,62.0 173.1,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="173.1,148.0 173.1,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="330.2,266.5 418.2,266.5 418.2,345.1" marker-end="url(#arr)"/>
<text class="lbl" x="374.2" y="254.5" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="173.1,345.1 173.1,431.1" marker-end="url(#arr)"/>
<text class="lbl" x="187.1" y="392.1" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="418.2,391.1 418.2,454.1 266.5,454.1" marker-end="url(#arr)"/>
<g id="el-gauge">
<rect class="n-box shp" x="101.4" y="16.0" width="143.5" height="46.0" rx="8"/>
<text class="t dyn-gauge-0" x="173.1" y="44.0" text-anchor="middle" style="direction:ltr">195K / 200K</text>
<text class="t dyn-gauge-1" x="173.1" y="44.0" text-anchor="middle" style="direction:ltr">150K / 200K</text>
<text class="t dyn-gauge-2" x="173.1" y="44.0" text-anchor="middle" style="direction:ltr">95K / 200K</text>
</g>
<g id="el-clear_tools">
<rect class="n-box shp" x="54.3" y="102.0" width="237.5" height="46.0" rx="8"/>
<text class="t" x="173.1" y="130.0" text-anchor="middle">ניקוי פלטי tools ישנים</text>
</g>
<g id="el-check">
<polygon class="n-dia shp" points="173.1,188.0 330.2,266.5 173.1,345.1 16.0,266.5"/>
<text class="t" x="173.1" y="271.5" text-anchor="middle">עדיין צריך מקום?</text>
</g>
<g id="el-summarize">
<rect class="n-box shp" x="344.9" y="345.1" width="146.5" height="46.0" rx="8"/>
<text class="t" x="418.2" y="373.1" text-anchor="middle">סיכום השיחה</text>
</g>
<g id="el-done">
<rect class="n-box shp" x="79.7" y="431.1" width="186.8" height="46.0" rx="8"/>
<text class="t" x="173.1" y="459.1" text-anchor="middle">יש מקום, ממשיכים</text>
</g>
</svg>
