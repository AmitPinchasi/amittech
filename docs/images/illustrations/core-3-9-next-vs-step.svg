<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 652 383" width="652" role="img" aria-label="ההבדל בין next ל-step בדיבאגר: הפקודה next מריצה את הקריאה לפונקציה כיחידה אחת, והפקודה step נכנסת לתוכה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-line{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-line .shp{animation-name:k-line;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-over{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-over .shp{animation-name:k-over;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-into{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-into .shp{animation-name:k-into;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-inside{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-inside .shp{animation-name:k-inside;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="158.1,54.0 158.1,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="172.1" y="78.0" text-anchor="end">עוצרים על השורה</text>
<polyline id="edge-1" class="edge" points="158.1,202.7 158.1,242.7" marker-end="url(#arr)"/>
<text class="lbl" x="172.1" y="226.7" text-anchor="end" style="direction:ltr">step</text>
<polyline id="edge-2" class="edge" points="158.1,288.7 158.1,328.7" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="266.8,148.3 332.8,148.3" marker-end="url(#arr)"/>
<text class="lbl" x="299.8" y="136.3" text-anchor="middle" style="direction:ltr">next</text>
<g id="el-line">
<rect class="n-code-bg shp" x="58.9" y="16.0" width="198.5" height="38.0" rx="7"/>
<text class="code" x="158.1" y="43.0" text-anchor="middle">int s = add(3, 4);</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="158.1,94.0 266.8,148.3 158.1,202.7 49.5,148.3"/>
<text class="t" x="158.1" y="153.3" text-anchor="middle">איזו פקודה?</text>
</g>
<g id="el-into">
<rect class="n-box shp" x="16.0" y="242.7" width="284.2" height="46.0" rx="8"/>
<text class="t" x="158.1" y="270.7" text-anchor="middle">נכנס לשורה הראשונה בתוך add</text>
</g>
<g id="el-inside">
<rect class="n-code-bg shp" x="81.4" y="328.7" width="153.4" height="38.0" rx="7"/>
<text class="code" x="158.1" y="355.7" text-anchor="middle">return a + b;</text>
</g>
<g id="el-over">
<rect class="n-box shp" x="332.8" y="125.3" width="303.1" height="46.0" rx="8"/>
<text class="t" x="484.3" y="153.3" text-anchor="middle">רצה עד סוף הפונקציה בלי עצירה</text>
</g>
</svg>
