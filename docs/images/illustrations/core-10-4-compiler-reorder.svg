<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 613 462" width="613" role="img" aria-label="סידור מחדש של הקומפיילר הופך את סדר הכתיבות, וthread אחר רואה את b מעודכן לפני a">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-t1{0.00%{stroke:var(--pink);stroke-width:2.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}20.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-t1 .shp{animation-name:k-t1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-order{0.00%{stroke-width:1.5;}13.96%{stroke-width:1.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}37.39%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-order .shp{animation-name:k-order;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-state{0.00%{stroke-width:1.5;}31.08%{stroke-width:1.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}54.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-state .shp{animation-name:k-state;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-t2{0.00%{stroke-width:1.5;}48.20%{stroke-width:1.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}71.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-t2 .shp{animation-name:k-t2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-res{0.00%{stroke-width:1.5;}65.32%{stroke-width:1.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-res .shp{animation-name:k-res;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-t1-0{opacity:0;}
@keyframes k-dyn-t1-0{0.00%{opacity:1;}17.12%{opacity:1;}20.27%{opacity:0;}100.00%{opacity:0;}}
.dyn-t1-0{animation-name:k-dyn-t1-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-t1-1{opacity:1;}
@keyframes k-dyn-t1-1{0.00%{opacity:0;}13.96%{opacity:0;}17.12%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-t1-1{animation-name:k-dyn-t1-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-order-0{opacity:0;}
@keyframes k-dyn-order-0{0.00%{opacity:1;}17.12%{opacity:1;}20.27%{opacity:0;}100.00%{opacity:0;}}
.dyn-order-0{animation-name:k-dyn-order-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-order-1{opacity:1;}
@keyframes k-dyn-order-1{0.00%{opacity:0;}13.96%{opacity:0;}17.12%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-order-1{animation-name:k-dyn-order-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-0{opacity:0;}
@keyframes k-dyn-state-0{0.00%{opacity:1;}34.23%{opacity:1;}37.39%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-0{animation-name:k-dyn-state-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-1{opacity:1;}
@keyframes k-dyn-state-1{0.00%{opacity:0;}31.08%{opacity:0;}34.23%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-state-1{animation-name:k-dyn-state-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}68.47%{opacity:1;}71.62%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-1{opacity:1;}
@keyframes k-dyn-res-1{0.00%{opacity:0;}65.32%{opacity:0;}68.47%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-t1">
<rect class="n-code-bg shp" x="220.8" y="16.0" width="171.4" height="38.0" rx="7"/>
<text class="code dyn-t1-0" x="306.5" y="43.0" text-anchor="middle">a = 1;   b = 1;</text>
<text class="code dyn-t1-1" x="306.5" y="43.0" text-anchor="middle">b = 1;   a = 1;</text>
</g>
<g id="el-order">
<rect class="n-box shp" x="135.5" y="94.0" width="342.0" height="46.0" rx="8"/>
<text class="t dyn-order-0" x="306.5" y="122.0" text-anchor="middle">הסדר שכתבנו בקוד</text>
<text class="t dyn-order-1" x="306.5" y="122.0" text-anchor="middle">הסדר אחרי סידור מחדש של הקומפיילר</text>
</g>
<g id="el-state">
<rect class="n-box shp" x="241.4" y="180.0" width="130.4" height="44.0" rx="8"/>
<text class="t-b dyn-state-0" x="306.5" y="207.0" text-anchor="middle" style="direction:ltr">a = 0, b = 0</text>
<text class="t-b dyn-state-1" x="306.5" y="207.0" text-anchor="middle" style="direction:ltr">a = 0, b = 1</text>
</g>
<g id="el-t2">
<rect class="n-code-bg shp" x="166.7" y="264.0" width="279.7" height="38.0" rx="7"/>
<text class="code" x="306.5" y="291.0" text-anchor="middle">if (b == 1) assert(a == 1);</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="174.8" y="342.0" width="263.4" height="46.0" rx="8"/>
<text class="t dyn-res-0" x="306.5" y="370.0" text-anchor="middle">הבדיקה עדיין לא רצה</text>
<text class="t dyn-res-1" x="306.5" y="370.0" text-anchor="middle">הבדיקה נכשלת כי a עדיין 0</text>
</g>
<g id="el-note">
<text class="small" x="306.5" y="441.0" text-anchor="middle">מנקודת המבט של thread בודד אין הבדל בין הסדרים, ולכן הקומפיילר רשאי להחליף ביניהם</text>
</g>
</svg>
