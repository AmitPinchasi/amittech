<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="141.9" y="16.0" width="352.0" height="38.0" rx="7"/>
<text class="code dyn-code-0" x="317.8" y="43.0" text-anchor="middle">client_fd = accept(server_fd, ...);</text>
<text class="code dyn-code-1" x="317.8" y="43.0" text-anchor="middle">pid = fork();</text>
<text class="code dyn-code-2" x="317.8" y="43.0" text-anchor="middle">parent: close(client_fd);</text>
<text class="code dyn-code-3" x="317.8" y="43.0" text-anchor="middle">child: handle_client(); exit(0);</text>
</g>
<g id="el-par">
<rect class="n-box shp" x="151.8" y="94.0" width="332.2" height="44.0" rx="8"/>
<text class="t-b dyn-par-0" x="317.8" y="121.0" text-anchor="middle" style="direction:ltr">parent: fd 3 = listen, fd 4 = client</text>
<text class="t-b dyn-par-1" x="317.8" y="121.0" text-anchor="middle" style="direction:ltr">parent: fd 3 = listen</text>
</g>
<g id="el-chi">
<rect class="n-box shp" x="156.2" y="178.0" width="323.2" height="44.0" rx="8"/>
<text class="t-b dyn-chi-0" x="317.8" y="205.0" text-anchor="middle" style="direction:ltr">child: none</text>
<text class="t-b dyn-chi-1" x="317.8" y="205.0" text-anchor="middle" style="direction:ltr">child: fd 3 = listen, fd 4 = client</text>
<text class="t-b dyn-chi-2" x="317.8" y="205.0" text-anchor="middle" style="direction:ltr">child: fd 4 = client</text>
<text class="t-b dyn-chi-3" x="317.8" y="205.0" text-anchor="middle" style="direction:ltr">child: exit(0)</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="22.0" y="262.0" width="591.7" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="317.8" y="290.0" text-anchor="middle">האב קיבל חיבור חדש ומחזיק גם את הסוקט המאזין וגם את סוקט הלקוח</text>
<text class="t dyn-note-1" x="317.8" y="290.0" text-anchor="middle">הפעולה fork משכפלת לילד את כל מתארי הקבצים של האב</text>
<text class="t dyn-note-2" x="317.8" y="290.0" text-anchor="middle">האב סוגר את סוקט הלקוח וחוזר מיד לaccept</text>
<text class="t dyn-note-3" x="317.8" y="290.0" text-anchor="middle">הילד סוגר את הסוקט המאזין, מטפל בלקוח, ומסיים</text>
</g>
<g id="el-cap">
<text class="small" x="317.8" y="361.0" text-anchor="middle">כל צד סוגר את המתאר שהוא לא צריך, אחרת החיבור לא ייסגר באמת גם כשאחד הצדדים סוגר אותו</text>
</g>
</svg>
