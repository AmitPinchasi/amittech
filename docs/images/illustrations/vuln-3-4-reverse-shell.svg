<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 303 422" width="303" role="img" aria-label="מעטפת הפוכה נבנית משרשרת של ארבע קריאות מערכת: socket יוצר סוקט ומחזיר fd, connect מתחבר חזרה למחשב התוקף, dup2 מפנה את הקלט והפלט הסטנדרטיים אל הסוקט, ו-execve מריץ shell שכל התקשורת שלו עוברת דרך החיבור ברשת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-sock{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sock .shp{animation-name:k-sock;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-conn{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-conn .shp{animation-name:k-conn;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dup{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-dup .shp{animation-name:k-dup;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-exec{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-exec .shp{animation-name:k-exec;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="151.6,62.0 151.6,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="165.6" y="86.0" text-anchor="end" style="direction:ltr">fd</text>
<polyline id="edge-1" class="edge" points="151.6,148.0 151.6,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="165.6" y="172.0" text-anchor="end">מתחבר החוצה</text>
<polyline id="edge-2" class="edge" points="151.6,234.0 151.6,274.0" marker-end="url(#arr)"/>
<text class="lbl" x="165.6" y="258.0" text-anchor="end">מפנה קלט ופלט</text>
<polyline id="edge-3" class="edge" points="151.6,320.0 151.6,360.0" marker-end="url(#arr)"/>
<text class="lbl" x="165.6" y="344.0" text-anchor="end">shell דרך הרשת</text>
<g id="el-sock">
<rect class="n-box shp" x="55.0" y="16.0" width="193.2" height="46.0" rx="8"/>
<text class="t" x="151.6" y="44.0" text-anchor="middle">socket() - fd לסוקט</text>
</g>
<g id="el-conn">
<rect class="n-box shp" x="16.0" y="102.0" width="271.1" height="46.0" rx="8"/>
<text class="t" x="151.6" y="130.0" text-anchor="middle" style="direction:ltr">connect(fd, 127.0.0.1:4444)</text>
</g>
<g id="el-dup">
<rect class="n-box shp" x="70.1" y="188.0" width="162.9" height="46.0" rx="8"/>
<text class="t" x="151.6" y="216.0" text-anchor="middle" style="direction:ltr">dup2(fd, 0/1/2)</text>
</g>
<g id="el-exec">
<rect class="n-box shp" x="40.7" y="274.0" width="221.7" height="46.0" rx="8"/>
<text class="t" x="151.6" y="302.0" text-anchor="middle" style="direction:ltr">execve("/bin//sh", 0, 0)</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="64.6" y="360.0" width="174.0" height="46.0" rx="8"/>
<text class="t" x="151.6" y="388.0" text-anchor="middle">shell מעל הסוקט</text>
</g>
</svg>
