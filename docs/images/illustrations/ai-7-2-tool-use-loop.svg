<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 373 422" width="373" role="img" aria-label="לולאת השימוש בכלים: המודל מבקש קריאת tool, אנחנו מריצים את הפונקציה בקוד ומחזירים tool_result, והמודל ממשיך לבקש קריאות עד שהוא מסיים ומחזיר תשובה סופית למשתמש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-msg{0.00%{stroke:var(--pink);stroke-width:2.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}13.54%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-msg .shp{animation-name:k-msg;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-model{0.00%{stroke-width:1.5;}8.68%{stroke-width:1.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}24.65%{stroke-width:1.5;}42.01%{stroke-width:1.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}57.99%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-model .shp{animation-name:k-model;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-run{0.00%{stroke-width:1.5;}19.79%{stroke-width:1.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}35.76%{stroke-width:1.5;}53.13%{stroke-width:1.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}69.10%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-run .shp{animation-name:k-run;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-result{0.00%{stroke-width:1.5;}30.90%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}46.88%{stroke-width:1.5;}64.24%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}80.21%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-result .shp{animation-name:k-result;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-final{0.00%{stroke-width:1.5;}75.35%{stroke-width:1.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}88.89%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-final .shp{animation-name:k-final;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.68%{stroke-width:1.6;}11.11%{stroke:var(--pink);stroke-width:2.4;}22.22%{stroke:var(--pink);stroke-width:2.4;}24.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}19.79%{stroke-width:1.6;}22.22%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}35.76%{stroke-width:1.6;}53.13%{stroke-width:1.6;}55.56%{stroke:var(--pink);stroke-width:2.4;}66.67%{stroke:var(--pink);stroke-width:2.4;}69.10%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.90%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}44.44%{stroke:var(--pink);stroke-width:2.4;}46.88%{stroke-width:1.6;}64.24%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}77.78%{stroke:var(--pink);stroke-width:2.4;}80.21%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}42.01%{stroke-width:1.6;}44.44%{stroke:var(--pink);stroke-width:2.4;}55.56%{stroke:var(--pink);stroke-width:2.4;}57.99%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}75.35%{stroke-width:1.6;}77.78%{stroke:var(--pink);stroke-width:2.4;}88.89%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="226.5,62.0 226.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="226.5,148.0 226.5,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="240.5" y="172.0" text-anchor="end" style="direction:ltr">tool_use</text>
<polyline id="edge-2" class="edge" points="226.5,234.0 226.5,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="96.0,297.0 16.0,297.0 16.0,125.0 119.0,125.0" marker-end="url(#arr)"/>
<text class="small" x="67.5" y="113.0" text-anchor="middle">עוד קריאה</text>
<polyline id="edge-4" class="edge" points="226.5,320.0 226.5,360.0" marker-end="url(#arr)"/>
<text class="lbl" x="240.5" y="344.0" text-anchor="end" style="direction:ltr">end_turn</text>
<g id="el-msg">
<rect class="n-box shp" x="97.3" y="16.0" width="258.4" height="46.0" rx="8"/>
<text class="t" x="226.5" y="44.0" text-anchor="middle">הודעת משתמש + רשימת tools</text>
</g>
<g id="el-model">
<rect class="n-box shp" x="119.0" y="102.0" width="215.0" height="46.0" rx="8"/>
<text class="t" x="226.5" y="130.0" text-anchor="middle">המודל מעבד את השיחה</text>
</g>
<g id="el-run">
<rect class="n-box shp" x="99.5" y="188.0" width="254.0" height="46.0" rx="8"/>
<text class="t" x="226.5" y="216.0" text-anchor="middle">מריצים את הפונקציה בקוד</text>
</g>
<g id="el-result">
<rect class="n-box shp" x="96.0" y="274.0" width="261.1" height="46.0" rx="8"/>
<text class="t" x="226.5" y="302.0" text-anchor="middle">מחזירים tool_result למודל</text>
</g>
<g id="el-final">
<rect class="n-box shp" x="121.5" y="360.0" width="210.0" height="46.0" rx="8"/>
<text class="t" x="226.5" y="388.0" text-anchor="middle">תשובה סופית למשתמש</text>
</g>
</svg>
