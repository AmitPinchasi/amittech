<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 306" width="520" role="img" aria-label="ריבוי שירותים על כתובת IP אחת: כל שירות מאזין בפורט אחר - SSH בפורט 22, אתר HTTP בפורט 80 ואתר HTTPS בפורט 443 - והפורט הוא שמפנה את הלקוח לשירות הנכון">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-ports-0{0.00%{stroke:var(--pink);stroke-width:2.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}30.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ports-c0{animation-name:k-ports-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ports-1{0.00%{stroke-width:1.5;}21.23%{stroke-width:1.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}56.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ports-c1{animation-name:k-ports-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ports-2{0.00%{stroke-width:1.5;}47.26%{stroke-width:1.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}78.08%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-ports-c2{animation-name:k-ports-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}21.23%{transform:translateX(0.0px);}26.03%{transform:translateX(-123.3px);}47.26%{transform:translateX(-123.3px);}52.05%{transform:translateX(-246.5px);}73.29%{transform:translateX(-246.5px);}100.00%{transform:translateX(-246.5px);}}
#eg-0{animation-name:k-mv-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-svc-0{opacity:0;}
@keyframes k-dyn-svc-0{0.00%{opacity:1;}26.03%{opacity:1;}30.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-svc-0{animation-name:k-dyn-svc-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-svc-1{opacity:0;}
@keyframes k-dyn-svc-1{0.00%{opacity:0;}21.23%{opacity:0;}26.03%{opacity:1;}52.05%{opacity:1;}56.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-svc-1{animation-name:k-dyn-svc-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-svc-2{opacity:1;}
@keyframes k-dyn-svc-2{0.00%{opacity:0;}47.26%{opacity:0;}52.05%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-svc-2{animation-name:k-dyn-svc-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-host">
<rect class="n-box shp" x="118.9" y="16.0" width="242.2" height="46.0" rx="8"/>
<text class="t" x="240.0" y="44.0" text-anchor="middle">שרת יחיד - כתובת IP אחת</text>
</g>
<g id="el-ports">
<rect id="el-ports-c0" class="n-cell shp" x="311.6" y="102.0" width="103.3" height="46.0" rx="6"/>
<text class="t" x="363.3" y="130.0" text-anchor="middle">פורט 22</text>
<rect id="el-ports-c1" class="n-cell shp" x="188.4" y="102.0" width="103.3" height="46.0" rx="6"/>
<text class="t" x="240.0" y="130.0" text-anchor="middle">פורט 80</text>
<rect id="el-ports-c2" class="n-cell shp" x="65.1" y="102.0" width="103.3" height="46.0" rx="6"/>
<text class="t" x="116.7" y="130.0" text-anchor="middle">פורט 443</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="363.3,148.0 363.3,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="375.3" y="172.0" text-anchor="end">הפורט הנבחר</text>
<g id="el-svc">
<rect class="n-box shp" x="222.3" y="188.0" width="282.0" height="44.0" rx="8"/>
<text class="t-b dyn-svc-0" x="363.3" y="215.0" text-anchor="middle">שירות SSH - התחברות מרחוק</text>
<text class="t-b dyn-svc-1" x="363.3" y="215.0" text-anchor="middle">שירות HTTP - אתר אינטרנט</text>
<text class="t-b dyn-svc-2" x="363.3" y="215.0" text-anchor="middle">שירות HTTPS - אתר מאובטח</text>
</g>
</g>
<g id="el-note">
<text class="small" x="240.0" y="285.0" text-anchor="middle">כמה שירותים חיים על אותו IP, והפורט הוא שמפריד ומפנה לכל שירות</text>
</g>
</svg>
