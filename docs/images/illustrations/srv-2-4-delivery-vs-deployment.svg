<text class="t" x="156.8" y="427.4" text-anchor="middle">הפצה אוטומטית?</text>
</g>
<g id="el-deploy">
<rect class="n-box shp" x="69.0" y="578.8" width="175.7" height="46.0" rx="8"/>
<text class="t" x="156.8" y="606.8" text-anchor="middle">פריסה לפרודקשן</text>
</g>
<g id="el-manual">
<rect class="n-box shp" x="278.1" y="492.8" width="215.0" height="46.0" rx="8"/>
<text class="t" x="385.6" y="520.8" text-anchor="middle">אישור ידני של המפתח</text>
