<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 509 641" width="509" role="img" aria-label="ההבדל בין Continuous Delivery ל-Continuous Deployment: אותו pipeline מריץ טסטים ובונה image, ובשער ההפצה הקוד או נפרס אוטומטית או ממתין לאישור ידני לפני הפריסה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-commit{0.00%{stroke:var(--pink);stroke-width:2.5;}10.00%{stroke:var(--pink);stroke-width:2.5;}12.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-commit .shp{animation-name:k-commit;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tests{0.00%{stroke-width:1.5;}7.81%{stroke-width:1.5;}10.00%{stroke:var(--pink);stroke-width:2.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}22.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-tests .shp{animation-name:k-tests;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-build{0.00%{stroke-width:1.5;}17.81%{stroke-width:1.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}30.00%{stroke:var(--pink);stroke-width:2.5;}32.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-build .shp{animation-name:k-build;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-registry{0.00%{stroke-width:1.5;}27.81%{stroke-width:1.5;}30.00%{stroke:var(--pink);stroke-width:2.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}42.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-registry .shp{animation-name:k-registry;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-gate{0.00%{stroke-width:1.5;}37.81%{stroke-width:1.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}52.19%{stroke-width:1.5;}67.81%{stroke-width:1.5;}70.00%{stroke:var(--pink);stroke-width:2.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}82.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-gate .shp{animation-name:k-gate;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-manual{0.00%{stroke-width:1.5;}47.81%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}62.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-manual .shp{animation-name:k-manual;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-deploy{0.00%{stroke-width:1.5;}57.81%{stroke-width:1.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}70.00%{stroke:var(--pink);stroke-width:2.5;}72.19%{stroke-width:1.5;}77.81%{stroke-width:1.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}90.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-deploy .shp{animation-name:k-deploy;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}7.81%{stroke-width:1.6;}10.00%{stroke:var(--pink);stroke-width:2.4;}20.00%{stroke:var(--pink);stroke-width:2.4;}22.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}17.81%{stroke-width:1.6;}20.00%{stroke:var(--pink);stroke-width:2.4;}30.00%{stroke:var(--pink);stroke-width:2.4;}32.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}27.81%{stroke-width:1.6;}30.00%{stroke:var(--pink);stroke-width:2.4;}40.00%{stroke:var(--pink);stroke-width:2.4;}42.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}37.81%{stroke-width:1.6;}40.00%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}52.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}47.81%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}60.00%{stroke:var(--pink);stroke-width:2.4;}62.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-5{animation-name:k-edge-5;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-6{0.00%{stroke-width:1.6;}57.81%{stroke-width:1.6;}60.00%{stroke:var(--pink);stroke-width:2.4;}70.00%{stroke:var(--pink);stroke-width:2.4;}72.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-6{animation-name:k-edge-6;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}77.81%{stroke-width:1.6;}80.00%{stroke:var(--pink);stroke-width:2.4;}90.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="156.8,62.0 156.8,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="156.8,140.0 156.8,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="156.8,226.0 156.8,266.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="156.8,312.0 156.8,352.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="156.8,492.8 156.8,578.8" marker-end="url(#arr)"/>
<text class="lbl" x="170.8" y="539.8" text-anchor="end">כן - Deployment</text>
<polyline id="edge-5" class="edge" points="297.6,422.4 385.6,422.4 385.6,492.8" marker-end="url(#arr)"/>
<text class="lbl" x="341.6" y="410.4" text-anchor="middle">לא - Delivery</text>
<polyline id="edge-6" class="edge" points="385.6,538.8 385.6,601.8 244.7,601.8" marker-end="url(#arr)"/>
<g id="el-commit">
<rect class="n-box shp" x="55.5" y="16.0" width="202.6" height="46.0" rx="8"/>
<text class="t" x="156.8" y="44.0" text-anchor="middle">דחיפת commit ל-main</text>
</g>
<g id="el-tests">
<rect class="n-code-bg shp" x="84.7" y="102.0" width="144.3" height="38.0" rx="7"/>
<text class="code" x="156.8" y="129.0" text-anchor="middle">tests + lint</text>
</g>
<g id="el-build">
<rect class="n-box shp" x="58.2" y="180.0" width="197.2" height="46.0" rx="8"/>
<text class="t" x="156.8" y="208.0" text-anchor="middle">בניית Docker image</text>
</g>
<g id="el-registry">
<rect class="n-box shp" x="65.4" y="266.0" width="182.8" height="46.0" rx="8"/>
<text class="t" x="156.8" y="294.0" text-anchor="middle">דחיפה ל-Registry</text>
</g>
<g id="el-gate">
