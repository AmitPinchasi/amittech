.dyn-obj-1{opacity:1;}
@keyframes k-dyn-obj-1{0.00%{opacity:0;}48.24%{opacity:0;}50.70%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-obj-1{animation-name:k-dyn-obj-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-slot-0{opacity:0;}
@keyframes k-dyn-slot-0{0.00%{opacity:1;}63.38%{opacity:1;}65.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-slot-0{animation-name:k-dyn-slot-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-slot-1{opacity:1;}
@keyframes k-dyn-slot-1{0.00%{opacity:0;}60.92%{opacity:0;}63.38%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-slot-1{animation-name:k-dyn-slot-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-0{opacity:0;}
@keyframes k-dyn-out-0{0.00%{opacity:1;}76.06%{opacity:1;}78.52%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-0{animation-name:k-dyn-out-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-1{opacity:1;}
@keyframes k-dyn-out-1{0.00%{opacity:0;}73.59%{opacity:0;}76.06%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-out-1{animation-name:k-dyn-out-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="200.5,54.0 200.5,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="214.5" y="78.0" text-anchor="end">קוראים דרך המופע</text>
<polyline id="edge-1" class="edge" points="200.5,140.0 200.5,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="214.5" y="164.0" text-anchor="end">שולפים את המצביע</text>
<polyline id="edge-2" class="edge" points="200.5,218.0 200.5,258.0" marker-end="url(#arr)"/>
<text class="lbl" x="214.5" y="242.0" text-anchor="end">קופצים לפונקציה</text>
<g id="el-call">
<rect class="n-code-bg shp" x="47.1" y="16.0" width="306.8" height="38.0" rx="7"/>
<text class="code dyn-call-0" x="200.5" y="43.0" text-anchor="middle">animals[0].speak(&amp;animals[0]);</text>
<text class="code dyn-call-1" x="200.5" y="43.0" text-anchor="middle">animals[1].speak(&amp;animals[1]);</text>
</g>
<g id="el-obj">
<rect class="n-box shp" x="79.9" y="94.0" width="241.2" height="46.0" rx="8"/>
<text class="t dyn-obj-0" x="200.5" y="122.0" text-anchor="middle">המופע Rex מסוג dog</text>
<text class="t dyn-obj-1" x="200.5" y="122.0" text-anchor="middle">המופע Whiskers מסוג cat</text>
</g>
<g id="el-slot">
<rect class="n-code-bg shp" x="105.8" y="180.0" width="189.5" height="38.0" rx="7"/>
<text class="code dyn-slot-0" x="200.5" y="207.0" text-anchor="middle">speak = dog_speak</text>
<text class="code dyn-slot-1" x="200.5" y="207.0" text-anchor="middle">speak = cat_speak</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="98.2" y="258.0" width="204.6" height="46.0" rx="8"/>
<text class="t dyn-out-0" x="200.5" y="286.0" text-anchor="middle" style="direction:ltr">Rex says: Woof!</text>
<text class="t dyn-out-1" x="200.5" y="286.0" text-anchor="middle" style="direction:ltr">Whiskers says: Meow!</text>
</g>
<g id="el-note">
<text class="small" x="200.5" y="357.0" text-anchor="middle">הדפוס הזה הוא הבסיס לfile_operations בקרנל של לינוקס</text>
