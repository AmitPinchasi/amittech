<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 339" width="512" role="img" aria-label="מבנה קריאת ה-Messages API: הבקשה נשלחת עם המודל וההודעות, השרת מעבד את השיחה ומחזיר תשובה עם content ו-stop_reason ו-usage, ובכל תור חדש שולחים שוב את כל ההיסטוריה כי ה-API חסר מצב">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="305.6,65.0 305.6,105.0" marker-end="url(#arr)"/>
<text class="lbl" x="319.6" y="89.0" text-anchor="end">בקשת HTTP</text>
<polyline id="edge-1" class="edge" points="305.6,151.0 305.6,191.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="305.6,237.0 305.6,277.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="141.1,300.0 35.3,300.0 35.3,42.0 115.3,42.0" marker-end="url(#arr)"/>
<text class="small" x="75.3" y="30.0" text-anchor="middle">שולחים הכל מחדש</text>
<g id="el-req">
<rect class="n-box shp" x="115.3" y="19.0" width="380.7" height="46.0" rx="8"/>
<text class="t" x="305.6" y="47.0" text-anchor="middle">בקשה: model, max_tokens, system, messages[]</text>
</g>
<g id="el-api">
<rect class="n-box shp" x="211.2" y="105.0" width="188.8" height="46.0" rx="8"/>
<text class="t" x="305.6" y="133.0" text-anchor="middle" style="direction:ltr">POST /v1/messages</text>
</g>
<g id="el-model">
<rect class="n-box shp" x="198.1" y="191.0" width="215.0" height="46.0" rx="8"/>
<text class="t" x="305.6" y="219.0" text-anchor="middle">המודל מעבד את השיחה</text>
</g>
<g id="el-resp">
<rect class="n-box shp" x="141.1" y="277.0" width="328.9" height="46.0" rx="8"/>
<text class="t" x="305.6" y="305.0" text-anchor="middle">תשובה: content[], stop_reason, usage</text>
</g>
</svg>
