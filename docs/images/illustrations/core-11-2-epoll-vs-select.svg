<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-call">
<rect class="n-code-bg shp" x="96.6" y="16.0" width="469.3" height="38.0" rx="7"/>
<text class="code dyn-call-0" x="331.3" y="43.0" text-anchor="middle">select(max_fd + 1, &amp;read_fds, NULL, NULL, NULL);</text>
<text class="code dyn-call-1" x="331.3" y="43.0" text-anchor="middle">epoll_wait(epoll_fd, events, 64, -1);</text>
</g>
<g id="el-scan">
<rect class="n-box shp" x="199.4" y="94.0" width="263.7" height="44.0" rx="8"/>
<text class="t-b dyn-scan-0" x="331.3" y="121.0" text-anchor="middle" style="direction:ltr">scanned = 0 of 10000</text>
<text class="t-b dyn-scan-1" x="331.3" y="121.0" text-anchor="middle" style="direction:ltr">scanned = 5000 of 10000</text>
<text class="t-b dyn-scan-2" x="331.3" y="121.0" text-anchor="middle" style="direction:ltr">scanned = 10000 of 10000</text>
<text class="t-b dyn-scan-3" x="331.3" y="121.0" text-anchor="middle" style="direction:ltr">scanned = 0 of 10000</text>
</g>
<g id="el-ready">
<rect class="n-box shp" x="272.7" y="178.0" width="117.1" height="44.0" rx="8"/>
<text class="t-b dyn-ready-0" x="331.3" y="205.0" text-anchor="middle" style="direction:ltr">ready = 0</text>
<text class="t-b dyn-ready-1" x="331.3" y="205.0" text-anchor="middle" style="direction:ltr">ready = 3</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="44.8" y="262.0" width="572.9" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="331.3" y="290.0" text-anchor="middle">עשרת אלפים חיבורים פתוחים, ורק שלושה מהם באמת מוכנים לקריאה</text>
<text class="t dyn-note-1" x="331.3" y="290.0" text-anchor="middle">הקרנל סורק את כל המתארים בקבוצה כדי לגלות מי מוכן</text>
<text class="t dyn-note-2" x="331.3" y="290.0" text-anchor="middle">הסריקה הסתיימה אחרי עשרת אלפים בדיקות, וזו עלות לכל קריאה</text>
<text class="t dyn-note-3" x="331.3" y="290.0" text-anchor="middle">הepoll מחזיק רשימת מוכנים פנימית ומחזיר אותה בלי לסרוק כלום</text>
</g>
<g id="el-cap">
<text class="small" x="331.3" y="361.0" text-anchor="middle">העלות של select גדלה עם מספר החיבורים, ואילו העלות של epoll תלויה רק במספר האירועים בפועל</text>
</g>
</svg>
