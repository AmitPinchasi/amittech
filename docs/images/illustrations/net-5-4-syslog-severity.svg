<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 308" width="640" role="img" aria-label="תרשים ריכוז Syslog: נתבים, Switches ושרתים שולחים הודעות לשרת Syslog מרכזי, שממיין אותן לפי רמות חומרה מ-Debug ועד Emergency">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="320.0,62.0 320.0,102.0" marker-end="url(#arr)"/>
<g id="el-devices">
<rect class="n-box shp" x="201.8" y="16.0" width="236.5" height="46.0" rx="8"/>
<text class="t" x="320.0" y="44.0" text-anchor="middle">נתבים, Switches ושרתים</text>
</g>
<g id="el-server">
<rect class="n-box shp" x="227.8" y="102.0" width="184.4" height="46.0" rx="8"/>
<text class="t" x="320.0" y="130.0" text-anchor="middle">שרת Syslog מרכזי</text>
</g>
<g id="el-sev">
<rect id="el-sev-c0" class="n-cell shp" x="518.5" y="188.0" width="105.6" height="46.0" rx="6"/>
<text class="t" x="571.3" y="216.0" text-anchor="middle" style="direction:ltr">Debug</text>
<rect id="el-sev-c1" class="n-cell shp" x="392.8" y="188.0" width="105.6" height="46.0" rx="6"/>
<text class="t" x="445.7" y="216.0" text-anchor="middle" style="direction:ltr">Info</text>
<rect id="el-sev-c2" class="n-cell shp" x="267.2" y="188.0" width="105.6" height="46.0" rx="6"/>
<text class="t" x="320.0" y="216.0" text-anchor="middle" style="direction:ltr">Warning</text>
<rect id="el-sev-c3" class="n-cell shp" x="141.6" y="188.0" width="105.6" height="46.0" rx="6"/>
<text class="t" x="194.4" y="216.0" text-anchor="middle" style="direction:ltr">Error</text>
<rect id="el-sev-c4" class="n-hl shp" x="16.0" y="188.0" width="105.6" height="46.0" rx="6"/>
<text class="t" x="68.8" y="216.0" text-anchor="middle" style="direction:ltr">Emergency</text>
</g>
<g id="el-note">
<text class="small" x="320.0" y="287.0" text-anchor="middle">רמות חומרה מ-Debug - מידע - ועד Emergency - דחוף</text>
</g>
</svg>
