<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 392 480" width="392" role="img" aria-label="חילוץ out-of-band ב-XXE עיוור: השרת הפגיע קורא קובץ מקומי ושולח את תוכנו לשרת התוקף">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="196.1,62.0 196.1,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="196.1,148.0 196.1,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="196.1,234.0 196.1,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="196.1,320.0 196.1,360.0" marker-end="url(#arr)"/>
<g id="el-payload">
<rect class="n-box shp" x="16.0" y="16.0" width="360.2" height="46.0" rx="8"/>
<text class="t" x="196.1" y="44.0" text-anchor="middle">שולחים payload עם הפניה ל-DTD חיצוני</text>
</g>
<g id="el-load">
<rect class="n-box shp" x="26.8" y="102.0" width="338.7" height="46.0" rx="8"/>
<text class="t" x="196.1" y="130.0" text-anchor="middle">השרת הפגיע טוען את evil.dtd מהתוקף</text>
</g>
<g id="el-readf">
<rect class="n-box shp" x="35.7" y="188.0" width="320.9" height="46.0" rx="8"/>
<text class="t" x="196.1" y="216.0" text-anchor="middle">ה-DTD קורא קובץ מקומי רגיש בשרת</text>
</g>
<g id="el-send">
<rect class="n-box shp" x="40.5" y="274.0" width="311.1" height="46.0" rx="8"/>
<text class="t" x="196.1" y="302.0" text-anchor="middle">ה-DTD שולח את התוכן לשרת התוקף</text>
</g>
<g id="el-collect">
<rect class="n-box shp" x="49.4" y="360.0" width="293.3" height="46.0" rx="8"/>
<text class="t" x="196.1" y="388.0" text-anchor="middle">התוקף מקבל את הקובץ בלוג שלו</text>
</g>
<g id="el-note">
<text class="small" x="196.1" y="459.0" text-anchor="middle">הגנה: לנטרל DTD ו-external entities בפרסר ה-XML</text>
</g>
</svg>
