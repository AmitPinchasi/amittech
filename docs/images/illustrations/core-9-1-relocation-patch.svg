<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 488 398" width="488" role="img" aria-label="איור מילוי רשומת relocation: האסמבלר משאיר אפסים במקום הכתובת, והלינקר מחליף אותם בכתובת הסופית">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-src{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-src .shp{animation-name:k-src;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-asm{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-asm .shp{animation-name:k-asm;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-obj{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-obj .shp{animation-name:k-obj;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-rela{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-rela .shp{animation-name:k-rela;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ld{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ld .shp{animation-name:k-ld;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}40.73%{stroke-width:1.6;}43.55%{stroke:var(--pink);stroke-width:2.4;}58.06%{stroke:var(--pink);stroke-width:2.4;}60.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}55.24%{stroke-width:1.6;}58.06%{stroke:var(--pink);stroke-width:2.4;}72.58%{stroke:var(--pink);stroke-width:2.4;}75.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj-0{opacity:0;}
@keyframes k-dyn-obj-0{0.00%{opacity:1;}72.58%{opacity:1;}75.40%{opacity:0;}100.00%{opacity:0;}}
.dyn-obj-0{animation-name:k-dyn-obj-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj-1{opacity:1;}
@keyframes k-dyn-obj-1{0.00%{opacity:0;}69.76%{opacity:0;}72.58%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-obj-1{animation-name:k-dyn-obj-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="284.2,54.0 284.2,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="284.2,140.0 284.2,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="298.2" y="164.0" text-anchor="end">כתובת זמנית</text>
<polyline id="edge-2" class="edge" points="284.2,218.0 284.2,258.0" marker-end="url(#arr)"/>
<text class="lbl" x="298.2" y="242.0" text-anchor="end">נרשם חור למילוי</text>
<polyline id="edge-3" class="edge" points="284.2,296.0 284.2,336.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="96.0,359.0 16.0,359.0 16.0,199.0 198.4,199.0" marker-end="url(#arr)"/>
<text class="small" x="107.2" y="187.0" text-anchor="middle">מילוי החור</text>
<g id="el-src">
<rect class="n-code-bg shp" x="216.5" y="16.0" width="135.3" height="38.0" rx="7"/>
<text class="code" x="284.2" y="43.0" text-anchor="middle">call printf</text>
</g>
<g id="el-asm">
<rect class="n-box shp" x="109.8" y="94.0" width="348.8" height="46.0" rx="8"/>
<text class="t" x="284.2" y="122.0" text-anchor="middle">האסמבלר לא יודע את הכתובת של printf</text>
</g>
<g id="el-obj">
<rect class="n-code-bg shp" x="198.4" y="180.0" width="171.4" height="38.0" rx="7"/>
<text class="code dyn-obj-0" x="284.2" y="207.0" text-anchor="middle">call 0x00000000</text>
<text class="code dyn-obj-1" x="284.2" y="207.0" text-anchor="middle">call 0x00401050</text>
</g>
<g id="el-rela">
<rect class="n-code-bg shp" x="108.2" y="258.0" width="352.0" height="38.0" rx="7"/>
<text class="code" x="284.2" y="285.0" text-anchor="middle">.rela.text: offset 0x20, sym printf</text>
</g>
<g id="el-ld">
<rect class="n-box shp" x="96.0" y="336.0" width="376.3" height="46.0" rx="8"/>
<text class="t" x="284.2" y="364.0" text-anchor="middle">הלינקר מוצא את printf בכתובת 0x401050</text>
</g>
</svg>
