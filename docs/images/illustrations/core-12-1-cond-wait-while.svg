<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 714 303" width="714" role="img" aria-label="המתנה על משתנה תנאי בתוך לולאת while: אחרי כל התעוררות בודקים את התנאי מחדש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-lock{0.00%{stroke:var(--pink);stroke-width:2.5;}10.11%{stroke:var(--pink);stroke-width:2.5;}12.08%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lock .shp{animation-name:k-lock;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}8.15%{stroke-width:1.5;}10.11%{stroke:var(--pink);stroke-width:2.5;}20.22%{stroke:var(--pink);stroke-width:2.5;}22.19%{stroke-width:1.5;}38.48%{stroke-width:1.5;}40.45%{stroke:var(--pink);stroke-width:2.5;}50.56%{stroke:var(--pink);stroke-width:2.5;}52.53%{stroke-width:1.5;}68.82%{stroke-width:1.5;}70.79%{stroke:var(--pink);stroke-width:2.5;}80.90%{stroke:var(--pink);stroke-width:2.5;}82.87%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-wait{0.00%{stroke-width:1.5;}18.26%{stroke-width:1.5;}20.22%{stroke:var(--pink);stroke-width:2.5;}30.34%{stroke:var(--pink);stroke-width:2.5;}32.30%{stroke-width:1.5;}48.60%{stroke-width:1.5;}50.56%{stroke:var(--pink);stroke-width:2.5;}60.67%{stroke:var(--pink);stroke-width:2.5;}62.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-wait .shp{animation-name:k-wait;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-take{0.00%{stroke-width:1.5;}78.93%{stroke-width:1.5;}80.90%{stroke:var(--pink);stroke-width:2.5;}91.01%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-take .shp{animation-name:k-take;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.15%{stroke-width:1.6;}10.11%{stroke:var(--pink);stroke-width:2.4;}20.22%{stroke:var(--pink);stroke-width:2.4;}22.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}18.26%{stroke-width:1.6;}20.22%{stroke:var(--pink);stroke-width:2.4;}30.34%{stroke:var(--pink);stroke-width:2.4;}32.30%{stroke-width:1.6;}48.60%{stroke-width:1.6;}50.56%{stroke:var(--pink);stroke-width:2.4;}60.67%{stroke:var(--pink);stroke-width:2.4;}62.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}28.37%{stroke-width:1.6;}30.34%{stroke:var(--pink);stroke-width:2.4;}40.45%{stroke:var(--pink);stroke-width:2.4;}42.42%{stroke-width:1.6;}58.71%{stroke-width:1.6;}60.67%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke:var(--pink);stroke-width:2.4;}72.75%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}78.93%{stroke-width:1.6;}80.90%{stroke:var(--pink);stroke-width:2.4;}91.01%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}10.11%{opacity:1;}12.08%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:0;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}8.15%{opacity:0;}10.11%{opacity:1;}40.45%{opacity:1;}42.42%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-2{opacity:0;}
@keyframes k-dyn-cond-2{0.00%{opacity:0;}38.48%{opacity:0;}40.45%{opacity:1;}70.79%{opacity:1;}72.75%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-2{animation-name:k-dyn-cond-2;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-3{opacity:1;}
@keyframes k-dyn-cond-3{0.00%{opacity:0;}68.82%{opacity:0;}70.79%{opacity:1;}91.01%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-3{animation-name:k-dyn-cond-3;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="275.4,62.0 275.4,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="275.4,201.3 275.4,241.3" marker-end="url(#arr)"/>
<text class="lbl" x="289.4" y="225.3" text-anchor="end">כן</text>
<polyline id="edge-2" class="edge" points="96.6,264.3 16.6,264.3 16.6,151.6 176.1,151.6" marker-end="url(#arr)"/>
<text class="small" x="96.4" y="139.6" text-anchor="middle">התעוררנו ובודקים שוב</text>
<polyline id="edge-3" class="edge" points="374.7,151.6 440.7,151.6" marker-end="url(#arr)"/>
<text class="lbl" x="407.7" y="139.6" text-anchor="middle">לא</text>
<g id="el-lock">
