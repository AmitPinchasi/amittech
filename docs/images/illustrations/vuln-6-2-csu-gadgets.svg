<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 619 336" width="619" role="img" aria-label="שני הגאדג'טים של ret2csu - גאדג'ט ה-pop טוען שישה אוגרים מהמחסנית, וגאדג'ט ה-mov/call מעביר שלושה מהם לאוגרי הארגומנטים rdi, rsi, rdx וקורא לפונקציה דרך מצביע בזיכרון">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="309.5,62.0 309.5,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="323.5" y="86.0" text-anchor="end">טוען שישה אוגרים</text>
<polyline id="edge-1" class="edge" points="309.5,148.0 309.5,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="323.5" y="172.0" text-anchor="end">ה-ret קופץ לגאדג'ט השני</text>
<polyline id="edge-2" class="edge" points="309.5,234.0 309.5,274.0" marker-end="url(#arr)"/>
<text class="lbl" x="323.5" y="258.0" text-anchor="end">מבצע את הקריאה - call [r12]</text>
<g id="el-g1">
<rect class="n-box shp" x="39.2" y="16.0" width="540.6" height="46.0" rx="8"/>
<text class="t" x="309.5" y="44.0" text-anchor="middle">גאדג'ט 1 - pop rbx;pop rbp;pop r12;pop r13;pop r14;pop r15;ret</text>
</g>
<g id="el-vals">
<rect class="n-box shp" x="58.7" y="102.0" width="501.6" height="46.0" rx="8"/>
<text class="t" x="309.5" y="130.0" text-anchor="middle" style="direction:ltr">rbx=0, rbp=1, r12=&amp;func_ptr, r13=arg1, r14=arg2, r15=arg3</text>
</g>
<g id="el-g2">
<rect class="n-box shp" x="16.0" y="188.0" width="587.0" height="46.0" rx="8"/>
<text class="t" x="309.5" y="216.0" text-anchor="middle">גאדג'ט 2 - mov rdx,r15 ; mov rsi,r14 ; mov edi,r13d ; call [r12+rbx*8]</text>
</g>
<g id="el-call">
<rect class="n-box shp" x="94.3" y="274.0" width="430.4" height="46.0" rx="8"/>
<text class="t" x="309.5" y="302.0" text-anchor="middle">התוצאה - func(arg1, arg2, arg3) דרך edi, rsi, rdx</text>
</g>
</svg>
