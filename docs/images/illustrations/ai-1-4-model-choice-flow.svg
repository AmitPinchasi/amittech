<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 621 569" width="621" role="img" aria-label="עץ החלטה לבחירת מודל - פשוט ובנפח גבוה ל-Haiku מורכב ל-Opus אחרת Sonnet">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="183.8,62.0 183.8,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="351.6,185.9 417.6,185.9" marker-end="url(#arr)"/>
<text class="lbl" x="384.6" y="173.9" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="183.8,269.8 183.8,309.8" marker-end="url(#arr)"/>
<text class="lbl" x="197.8" y="293.8" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="340.9,388.3 406.9,388.3" marker-end="url(#arr)"/>
<text class="lbl" x="373.9" y="376.3" text-anchor="middle">כן</text>
<polyline id="edge-4" class="edge" points="183.8,466.9 183.8,506.9" marker-end="url(#arr)"/>
<text class="lbl" x="197.8" y="490.9" text-anchor="end">לא</text>
<g id="el-start">
<rect class="n-box shp" x="115.4" y="16.0" width="136.7" height="46.0" rx="8"/>
<text class="t" x="183.8" y="44.0" text-anchor="middle">משימה חדשה</text>
</g>
<g id="el-d1">
<polygon class="n-dia shp" points="183.8,102.0 351.6,185.9 183.8,269.8 16.0,185.9"/>
<text class="t" x="183.8" y="190.9" text-anchor="middle">פשוטה ובנפח גבוה?</text>
</g>
<g id="el-haiku">
<rect class="n-box shp" x="417.6" y="162.9" width="187.1" height="46.0" rx="8"/>
<text class="t" x="511.2" y="190.9" text-anchor="middle">מהיר וזול - Haiku</text>
</g>
<g id="el-d2">
<polygon class="n-dia shp" points="183.8,309.8 340.9,388.3 183.8,466.9 26.7,388.3"/>
<text class="t" x="183.8" y="393.3" text-anchor="middle">צריך תכנון עמוק?</text>
</g>
<g id="el-opus">
<rect class="n-box shp" x="406.9" y="365.3" width="188.5" height="46.0" rx="8"/>
<text class="t" x="501.1" y="393.3" text-anchor="middle">החזק ביותר - Opus</text>
</g>
<g id="el-sonnet">
<rect class="n-box shp" x="76.3" y="506.9" width="215.0" height="46.0" rx="8"/>
<text class="t" x="183.8" y="534.9" text-anchor="middle">ברירת המחדל - Sonnet</text>
</g>
</svg>
