<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 310" width="360" role="img" aria-label="הפרמטר args אוסף את כל הארגומנטים שהועברו לפונקציה לתוך טאפל אחד">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}14.15%{stroke:var(--pink);stroke-width:2.5;}17.45%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-def{0.00%{stroke-width:1.5;}10.85%{stroke-width:1.5;}14.15%{stroke:var(--pink);stroke-width:2.5;}28.30%{stroke:var(--pink);stroke-width:2.5;}31.60%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-def .shp{animation-name:k-def;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tup-0{0.00%{stroke-width:1.5;}25.00%{stroke-width:1.5;}28.30%{stroke:var(--pink);stroke-width:2.5;}42.45%{stroke:var(--pink);stroke-width:2.5;}45.75%{stroke-width:1.5;}67.45%{stroke-width:1.5;}70.75%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-tup-c0{animation-name:k-tup-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tup-1{0.00%{stroke-width:1.5;}39.15%{stroke-width:1.5;}42.45%{stroke:var(--pink);stroke-width:2.5;}56.60%{stroke:var(--pink);stroke-width:2.5;}59.91%{stroke-width:1.5;}67.45%{stroke-width:1.5;}70.75%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-tup-c1{animation-name:k-tup-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tup-2{0.00%{stroke-width:1.5;}53.30%{stroke-width:1.5;}56.60%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-tup-c2{animation-name:k-tup-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.85%{stroke-width:1.6;}14.15%{stroke:var(--pink);stroke-width:2.4;}28.30%{stroke:var(--pink);stroke-width:2.4;}31.60%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.00%{stroke-width:1.6;}28.30%{stroke:var(--pink);stroke-width:2.4;}70.75%{stroke:var(--pink);stroke-width:2.4;}74.06%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="180.0,54.0 180.0,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="192.0" y="78.0" text-anchor="end">שלושה ארגומנטים</text>
<polyline id="edge-1" class="edge" points="180.0,132.0 180.0,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="192.0" y="156.0" text-anchor="end">נארזים לתוך args</text>
<g id="el-call">
<rect class="n-code-bg shp" x="49.2" y="16.0" width="261.7" height="38.0" rx="7"/>
<text class="code" x="180.0" y="43.0" text-anchor="middle">print_args(1, 2, "three")</text>
</g>
<g id="el-def">
<rect class="n-code-bg shp" x="62.7" y="94.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="180.0" y="121.0" text-anchor="middle">def print_args(*args):</text>
</g>
<g id="el-tup">
<rect id="el-tup-c0" class="n-cell shp" x="248.0" y="190.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="296.0" y="184.0" text-anchor="middle" style="direction:ltr">0</text>
<text class="t" x="296.0" y="218.0" text-anchor="middle" style="direction:ltr">1</text>
<rect id="el-tup-c1" class="n-cell shp" x="132.0" y="190.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="180.0" y="184.0" text-anchor="middle" style="direction:ltr">1</text>
<text class="t" x="180.0" y="218.0" text-anchor="middle" style="direction:ltr">2</text>
<rect id="el-tup-c2" class="n-cell shp" x="16.0" y="190.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="64.0" y="184.0" text-anchor="middle" style="direction:ltr">2</text>
<text class="t" x="64.0" y="218.0" text-anchor="middle" style="direction:ltr">"three"</text>
</g>
<g id="el-note">
<text class="small" x="180.0" y="289.0" text-anchor="middle">כל הארגומנטים נאספים לטאפל בשם args</text>
</g>
</svg>
