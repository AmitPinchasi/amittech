<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 563 741" width="563" role="img" aria-label="זרימת עבודה לכתיבת פיצ'ר עם agent: מטרה, תכנון שחושף שאלות פתוחות לענות עליהן, יישום בצעדים, וסקירת diff שאם מצאה בעיה חוזרת ליישום ורק אחריה מריצים בדיקות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
