<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 703 411" width="703" role="img" aria-label="תרשים זרימה המראה כיצד המעבד בודק תחילה את ה-TLB בעת תרגום כתובת, מחזיר את הכתובת הפיזית מיד ב-hit, ומבצע page table walk ארוך רק ב-miss">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-va{0.00%{stroke:var(--pink);stroke-width:2.5;}12.75%{stroke:var(--pink);stroke-width:2.5;}15.10%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-va .shp{animation-name:k-va;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tlb{0.00%{stroke-width:1.5;}10.40%{stroke-width:1.5;}12.75%{stroke:var(--pink);stroke-width:2.5;}38.26%{stroke:var(--pink);stroke-width:2.5;}40.60%{stroke-width:1.5;}48.66%{stroke-width:1.5;}51.01%{stroke:var(--pink);stroke-width:2.5;}63.76%{stroke:var(--pink);stroke-width:2.5;}66.11%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-tlb .shp{animation-name:k-tlb;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fast{0.00%{stroke-width:1.5;}35.91%{stroke-width:1.5;}38.26%{stroke:var(--pink);stroke-width:2.5;}51.01%{stroke:var(--pink);stroke-width:2.5;}53.36%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fast .shp{animation-name:k-fast;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-walk{0.00%{stroke-width:1.5;}61.41%{stroke-width:1.5;}63.76%{stroke:var(--pink);stroke-width:2.5;}76.51%{stroke:var(--pink);stroke-width:2.5;}78.86%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-walk .shp{animation-name:k-walk;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-update{0.00%{stroke-width:1.5;}74.16%{stroke-width:1.5;}76.51%{stroke:var(--pink);stroke-width:2.5;}89.26%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-update .shp{animation-name:k-update;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.40%{stroke-width:1.6;}12.75%{stroke:var(--pink);stroke-width:2.4;}25.50%{stroke:var(--pink);stroke-width:2.4;}27.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}23.15%{stroke-width:1.6;}25.50%{stroke:var(--pink);stroke-width:2.4;}38.26%{stroke:var(--pink);stroke-width:2.4;}40.60%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}48.66%{stroke-width:1.6;}51.01%{stroke:var(--pink);stroke-width:2.4;}63.76%{stroke:var(--pink);stroke-width:2.4;}66.11%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}74.16%{stroke-width:1.6;}76.51%{stroke:var(--pink);stroke-width:2.4;}89.26%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-tlb-0{opacity:0;}
@keyframes k-dyn-tlb-0{0.00%{opacity:1;}25.50%{opacity:1;}27.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-tlb-0{animation-name:k-dyn-tlb-0;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-tlb-1{opacity:0;}
@keyframes k-dyn-tlb-1{0.00%{opacity:0;}23.15%{opacity:0;}25.50%{opacity:1;}51.01%{opacity:1;}53.36%{opacity:0;}100.00%{opacity:0;}}
.dyn-tlb-1{animation-name:k-dyn-tlb-1;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-tlb-2{opacity:1;}
@keyframes k-dyn-tlb-2{0.00%{opacity:0;}48.66%{opacity:0;}51.01%{opacity:1;}89.26%{opacity:1;}100.00%{opacity:1;}}
.dyn-tlb-2{animation-name:k-dyn-tlb-2;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="301.1,54.0 301.1,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="430.2,158.5 496.2,158.5" marker-end="url(#arr)"/>
<text class="lbl" x="463.2" y="146.5" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="301.1,223.1 301.1,263.1" marker-end="url(#arr)"/>
<text class="lbl" x="315.1" y="247.1" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="301.1,309.1 301.1,349.1" marker-end="url(#arr)"/>
<g id="el-va">
<rect class="n-code-bg shp" x="215.4" y="16.0" width="171.4" height="38.0" rx="7"/>
<text class="code" x="301.1" y="43.0" text-anchor="middle">virtual address</text>
</g>
<g id="el-tlb">
<polygon class="n-dia shp" points="301.1,94.0 430.2,158.5 301.1,223.1 172.0,158.5"/>
<text class="code dyn-tlb-0" x="301.1" y="163.5" text-anchor="middle">TLB hit ?</text>
<text class="code dyn-tlb-1" x="301.1" y="163.5" text-anchor="middle">TLB hit = yes</text>
<text class="code dyn-tlb-2" x="301.1" y="163.5" text-anchor="middle">TLB hit = no</text>
</g>
<g id="el-fast">
<rect class="n-box shp" x="496.2" y="135.5" width="190.5" height="46.0" rx="8"/>
<text class="t" x="591.4" y="163.5" text-anchor="middle">הכתובת מוכנה מיד</text>
</g>
<g id="el-walk">
<rect class="n-box shp" x="16.0" y="263.1" width="570.2" height="46.0" rx="8"/>
<text class="t" x="301.1" y="291.1" text-anchor="middle">המעבד מבצע page table walk של ארבע גישות לזכרון, כמאה מחזורים</text>
</g>
<g id="el-update">
<rect class="n-box shp" x="34.5" y="349.1" width="533.2" height="46.0" rx="8"/>
<text class="t" x="301.1" y="377.1" text-anchor="middle">התרגום נשמר ב-TLB, כך שהגישה הבאה לאותו דף תהיה hit מהיר</text>
</g>
</svg>
