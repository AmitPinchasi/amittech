<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 497 428" width="497" role="img" aria-label="איור המראה מה עובר בכל אחד משלושת ערוצי ה-bus בעת פקודת out: הכתובת, הנתונים ואות הפיקוד שמגיעים להתקן">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}17.24%{stroke:var(--pink);stroke-width:2.5;}20.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-buses-0{0.00%{stroke-width:1.5;}14.22%{stroke-width:1.5;}17.24%{stroke:var(--pink);stroke-width:2.5;}34.48%{stroke:var(--pink);stroke-width:2.5;}37.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-buses-c0{animation-name:k-buses-0;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-buses-1{0.00%{stroke-width:1.5;}31.47%{stroke-width:1.5;}34.48%{stroke:var(--pink);stroke-width:2.5;}51.72%{stroke:var(--pink);stroke-width:2.5;}54.74%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-buses-c1{animation-name:k-buses-1;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-buses-2{0.00%{stroke-width:1.5;}48.71%{stroke-width:1.5;}51.72%{stroke:var(--pink);stroke-width:2.5;}68.97%{stroke:var(--pink);stroke-width:2.5;}71.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-buses-c2{animation-name:k-buses-2;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-note{0.00%{stroke-width:1.5;}65.95%{stroke-width:1.5;}68.97%{stroke:var(--pink);stroke-width:2.5;}86.21%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-note .shp{animation-name:k-note;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-carry-0{opacity:0;}
@keyframes k-dyn-carry-0{0.00%{opacity:1;}34.48%{opacity:1;}37.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-carry-0{animation-name:k-dyn-carry-0;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-carry-1{opacity:0;}
@keyframes k-dyn-carry-1{0.00%{opacity:0;}31.47%{opacity:0;}34.48%{opacity:1;}51.72%{opacity:1;}54.74%{opacity:0;}100.00%{opacity:0;}}
.dyn-carry-1{animation-name:k-dyn-carry-1;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-carry-2{opacity:1;}
@keyframes k-dyn-carry-2{0.00%{opacity:0;}48.71%{opacity:0;}51.72%{opacity:1;}86.21%{opacity:1;}100.00%{opacity:1;}}
.dyn-carry-2{animation-name:k-dyn-carry-2;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}34.48%{opacity:1;}37.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}31.47%{opacity:0;}34.48%{opacity:1;}51.72%{opacity:1;}54.74%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:0;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}48.71%{opacity:0;}51.72%{opacity:1;}68.97%{opacity:1;}71.98%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-3{opacity:1;}
@keyframes k-dyn-note-3{0.00%{opacity:0;}65.95%{opacity:0;}68.97%{opacity:1;}86.21%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-3{animation-name:k-dyn-note-3;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="149.5" y="16.0" width="198.5" height="82.0" rx="7"/>
<text class="code" x="248.7" y="43.0" text-anchor="middle">mov dx, 0x300</text>
<text class="code" x="248.7" y="65.0" text-anchor="middle">mov al, 0b10101010</text>
<text class="code" x="248.7" y="87.0" text-anchor="middle">out dx, al</text>
</g>
<g id="el-buses">
<rect id="el-buses-c0" class="n-cell shp" x="329.3" y="138.0" width="121.1" height="46.0" rx="6"/>
<text class="t" x="389.8" y="166.0" text-anchor="middle" style="direction:ltr">Address Bus</text>
<rect id="el-buses-c1" class="n-cell shp" x="188.2" y="138.0" width="121.1" height="46.0" rx="6"/>
<text class="t" x="248.7" y="166.0" text-anchor="middle" style="direction:ltr">Data Bus</text>
<rect id="el-buses-c2" class="n-cell shp" x="47.1" y="138.0" width="121.1" height="46.0" rx="6"/>
<text class="t" x="107.7" y="166.0" text-anchor="middle" style="direction:ltr">Control Bus</text>
</g>
<g id="el-carry">
<rect class="n-box shp" x="177.8" y="224.0" width="141.8" height="44.0" rx="8"/>
<text class="t-b dyn-carry-0" x="248.7" y="251.0" text-anchor="middle" style="direction:ltr">0x300</text>
<text class="t-b dyn-carry-1" x="248.7" y="251.0" text-anchor="middle" style="direction:ltr">10101010b</text>
<text class="t-b dyn-carry-2" x="248.7" y="251.0" text-anchor="middle" style="direction:ltr">IO Write</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="82.6" y="308.0" width="332.3" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="248.7" y="336.0" text-anchor="middle">ערוץ הכתובות נושא את מספר הפורט</text>
<text class="t dyn-note-1" x="248.7" y="336.0" text-anchor="middle">ערוץ הנתונים נושא את הערך שנשלח</text>
<text class="t dyn-note-2" x="248.7" y="336.0" text-anchor="middle">ערוץ הפיקוד מסמן שזו כתיבה להתקן</text>
<text class="t dyn-note-3" x="248.7" y="336.0" text-anchor="middle">ההתקן מזהה את הפורט שלו ומגיב</text>
</g>
<g id="el-cap">
<text class="small" x="248.7" y="407.0" text-anchor="middle">אות הפיקוד הוא שמבדיל בין כתיבה לזיכרון לבין כתיבה להתקן קלט פלט</text>
</g>
</svg>
