<polyline id="edge-2" class="edge" points="350.9,177.0 416.9,177.0" marker-end="url(#arr)"/>
<text class="lbl" x="383.9" y="165.0" text-anchor="middle">לא</text>
<polyline id="edge-3" class="edge" points="200.8,476.9 200.8,516.9" marker-end="url(#arr)"/>
<text class="lbl" x="214.8" y="500.9" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="385.6,384.5 451.6,384.5" marker-end="url(#arr)"/>
<text class="lbl" x="418.6" y="372.5" text-anchor="middle">כן</text>
<g id="el-sub">
