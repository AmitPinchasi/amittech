<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-app">
<rect class="n-code-bg shp" x="117.3" y="16.0" width="451.3" height="38.0" rx="7"/>
<text class="code dyn-app-0" x="343.0" y="43.0" text-anchor="middle">sqe = io_uring_get_sqe(&amp;ring);</text>
<text class="code dyn-app-1" x="343.0" y="43.0" text-anchor="middle">io_uring_prep_read(sqe, fd, buf, 1024, 0);</text>
<text class="code dyn-app-2" x="343.0" y="43.0" text-anchor="middle">io_uring_submit(&amp;ring);</text>
<text class="code dyn-app-3" x="343.0" y="43.0" text-anchor="middle">io_uring_wait_cqe(&amp;ring, &amp;cqe);</text>
<text class="code dyn-app-4" x="343.0" y="43.0" text-anchor="middle">cqe-&gt;res = 512; io_uring_cqe_seen(&amp;ring, cqe);</text>
</g>
<g id="el-sq">
<rect class="n-box shp" x="214.9" y="94.0" width="256.2" height="44.0" rx="8"/>
<text class="t-b dyn-sq-0" x="343.0" y="121.0" text-anchor="middle" style="direction:ltr">SQ = []</text>
<text class="t-b dyn-sq-1" x="343.0" y="121.0" text-anchor="middle" style="direction:ltr">SQ = [read fd=7 len=1024]</text>
<text class="t-b dyn-sq-2" x="343.0" y="121.0" text-anchor="middle" style="direction:ltr">SQ = []</text>
</g>
<g id="el-cq">
<rect class="n-box shp" x="203.0" y="178.0" width="279.8" height="44.0" rx="8"/>
<text class="t-b dyn-cq-0" x="343.0" y="205.0" text-anchor="middle" style="direction:ltr">CQ = []</text>
<text class="t-b dyn-cq-1" x="343.0" y="205.0" text-anchor="middle" style="direction:ltr">CQ = [res=512 user_data=ctx]</text>
<text class="t-b dyn-cq-2" x="343.0" y="205.0" text-anchor="middle" style="direction:ltr">CQ = []</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="49.8" y="262.0" width="586.3" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="343.0" y="290.0" text-anchor="middle">התוכנה לוקחת רשומת הגשה פנויה מטבעת ההגשה המשותפת</text>
<text class="t dyn-note-1" x="343.0" y="290.0" text-anchor="middle">פרטי הפעולה נכתבים לרשומה: סוג הפעולה, המתאר, הבאפר, והאורך</text>
<text class="t dyn-note-2" x="343.0" y="290.0" text-anchor="middle">ההגשה מודיעה לקרנל שיש בקשות חדשות, ובמצב SQPOLL גם זה מיותר</text>
<text class="t dyn-note-3" x="343.0" y="290.0" text-anchor="middle">הקרנל מבצע את הפעולה וכותב את התוצאה לטבעת ההשלמה</text>
<text class="t dyn-note-4" x="343.0" y="290.0" text-anchor="middle">התוכנה קוראת את התוצאה מהזיכרון המשותף בלי קריאת מערכת נוספת</text>
</g>
<g id="el-cap">
<text class="small" x="343.0" y="361.0" text-anchor="middle">שתי הטבעות ממופות בזיכרון בין התוכנה לקרנל, ולכן העברת הבקשות והתוצאות לא עולה קריאת מערכת</text>
</g>
</svg>
