<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 582 413" width="582" role="img" aria-label="איור הקריאה fork שחוזרת פעמיים: התהליך האב מקבל את מזהה הבן והתהליך הבן מקבל אפס, ולכן אותו תנאי מוביל לשני מסלולי קוד שונים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-two{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-two .shp{animation-name:k-two;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-child{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-child .shp{animation-name:k-child;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-parent{0.00%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-parent .shp{animation-name:k-parent;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}40.73%{stroke-width:1.6;}43.55%{stroke:var(--pink);stroke-width:2.4;}58.06%{stroke:var(--pink);stroke-width:2.4;}60.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-two-0{opacity:0;}
@keyframes k-dyn-two-0{0.00%{opacity:1;}14.52%{opacity:1;}17.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-two-0{animation-name:k-dyn-two-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-two-1{opacity:1;}
@keyframes k-dyn-two-1{0.00%{opacity:0;}11.69%{opacity:0;}14.52%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-two-1{animation-name:k-dyn-two-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}29.03%{opacity:1;}31.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:0;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}26.21%{opacity:0;}29.03%{opacity:1;}58.06%{opacity:1;}60.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-2{opacity:1;}
@keyframes k-dyn-cond-2{0.00%{opacity:0;}55.24%{opacity:0;}58.06%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-2{animation-name:k-dyn-cond-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="196.3,54.0 196.3,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="196.3,140.0 196.3,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="327.1,245.4 393.1,245.4" marker-end="url(#arr)"/>
<text class="lbl" x="360.1" y="233.4" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="196.3,310.8 196.3,350.8" marker-end="url(#arr)"/>
<text class="lbl" x="210.3" y="334.8" text-anchor="end">לא</text>
<g id="el-call">
<rect class="n-code-bg shp" x="92.5" y="16.0" width="207.5" height="38.0" rx="7"/>
<text class="code" x="196.3" y="43.0" text-anchor="middle">pid_t pid = fork();</text>
</g>
<g id="el-two">
<rect class="n-box shp" x="16.0" y="94.0" width="360.5" height="46.0" rx="8"/>
<text class="t dyn-two-0" x="196.3" y="122.0" text-anchor="middle">הקרנל מייצר תהליך בן זהה לאב</text>
<text class="t dyn-two-1" x="196.3" y="122.0" text-anchor="middle">האב מקבל pid = 12346 והבן מקבל pid = 0</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="196.3,180.0 327.1,245.4 196.3,310.8 65.4,245.4"/>
<text class="code dyn-cond-0" x="196.3" y="250.4" text-anchor="middle">pid == 0</text>
<text class="t dyn-cond-1" x="196.3" y="250.4" text-anchor="middle">בבן 0 == 0</text>
<text class="t dyn-cond-2" x="196.3" y="250.4" text-anchor="middle">באב 12346 == 0</text>
</g>
<g id="el-child">
<rect class="n-box shp" x="393.1" y="222.4" width="172.7" height="46.0" rx="8"/>
<text class="t" x="479.4" y="250.4" text-anchor="middle">הבן מריץ execve</text>
</g>
<g id="el-parent">
<rect class="n-box shp" x="46.9" y="350.8" width="298.7" height="46.0" rx="8"/>
<text class="t" x="196.3" y="378.8" text-anchor="middle">התהליך האב ממשיך וקורא ל-wait</text>
</g>
</svg>
