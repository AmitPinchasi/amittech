<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 624 509" width="624" role="img" aria-label="דלגציית אירועים: לחיצה על פריט מבעבעת ל-handler היחיד שרשום על הרשימה, והוא בודק את event.target">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-click{0.00%{stroke:var(--pink);stroke-width:2.5;}9.09%{stroke:var(--pink);stroke-width:2.5;}11.08%{stroke-width:1.5;}43.47%{stroke-width:1.5;}45.45%{stroke:var(--pink);stroke-width:2.5;}54.55%{stroke:var(--pink);stroke-width:2.5;}56.53%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-click .shp{animation-name:k-click;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-bubble{0.00%{stroke-width:1.5;}7.10%{stroke-width:1.5;}9.09%{stroke:var(--pink);stroke-width:2.5;}18.18%{stroke:var(--pink);stroke-width:2.5;}20.17%{stroke-width:1.5;}52.56%{stroke-width:1.5;}54.55%{stroke:var(--pink);stroke-width:2.5;}63.64%{stroke:var(--pink);stroke-width:2.5;}65.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-bubble .shp{animation-name:k-bubble;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-handler{0.00%{stroke-width:1.5;}16.19%{stroke-width:1.5;}18.18%{stroke:var(--pink);stroke-width:2.5;}27.27%{stroke:var(--pink);stroke-width:2.5;}29.26%{stroke-width:1.5;}61.65%{stroke-width:1.5;}63.64%{stroke:var(--pink);stroke-width:2.5;}72.73%{stroke:var(--pink);stroke-width:2.5;}74.72%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-handler .shp{animation-name:k-handler;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-check{0.00%{stroke-width:1.5;}25.28%{stroke-width:1.5;}27.27%{stroke:var(--pink);stroke-width:2.5;}36.36%{stroke:var(--pink);stroke-width:2.5;}38.35%{stroke-width:1.5;}70.74%{stroke-width:1.5;}72.73%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}83.81%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-check .shp{animation-name:k-check;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-act{0.00%{stroke-width:1.5;}34.38%{stroke-width:1.5;}36.36%{stroke:var(--pink);stroke-width:2.5;}45.45%{stroke:var(--pink);stroke-width:2.5;}47.44%{stroke-width:1.5;}79.83%{stroke-width:1.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}90.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-act .shp{animation-name:k-act;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}7.10%{stroke-width:1.6;}9.09%{stroke:var(--pink);stroke-width:2.4;}18.18%{stroke:var(--pink);stroke-width:2.4;}20.17%{stroke-width:1.6;}52.56%{stroke-width:1.6;}54.55%{stroke:var(--pink);stroke-width:2.4;}63.64%{stroke:var(--pink);stroke-width:2.4;}65.62%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}16.19%{stroke-width:1.6;}18.18%{stroke:var(--pink);stroke-width:2.4;}27.27%{stroke:var(--pink);stroke-width:2.4;}29.26%{stroke-width:1.6;}61.65%{stroke-width:1.6;}63.64%{stroke:var(--pink);stroke-width:2.4;}72.73%{stroke:var(--pink);stroke-width:2.4;}74.72%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}25.28%{stroke-width:1.6;}27.27%{stroke:var(--pink);stroke-width:2.4;}36.36%{stroke:var(--pink);stroke-width:2.4;}38.35%{stroke-width:1.6;}70.74%{stroke-width:1.6;}72.73%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}83.81%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}34.38%{stroke-width:1.6;}36.36%{stroke:var(--pink);stroke-width:2.4;}45.45%{stroke:var(--pink);stroke-width:2.4;}47.44%{stroke-width:1.6;}79.83%{stroke-width:1.6;}81.82%{stroke:var(--pink);stroke-width:2.4;}90.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-click-0{opacity:0;}
@keyframes k-dyn-click-0{0.00%{opacity:1;}45.45%{opacity:1;}47.44%{opacity:0;}100.00%{opacity:0;}}
.dyn-click-0{animation-name:k-dyn-click-0;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-click-1{opacity:1;}
@keyframes k-dyn-click-1{0.00%{opacity:0;}43.47%{opacity:0;}45.45%{opacity:1;}90.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-click-1{animation-name:k-dyn-click-1;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="201.0,62.0 201.0,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="201.0,148.0 201.0,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="215.0" y="172.0" text-anchor="end">handler אחד לכל הפריטים</text>
<polyline id="edge-2" class="edge" points="201.0,226.0 201.0,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="215.0" y="250.0" text-anchor="end">בודקים את event.target</text>
<polyline id="edge-3" class="edge" points="201.0,414.9 201.0,454.9" marker-end="url(#arr)"/>
<text class="lbl" x="215.0" y="438.9" text-anchor="end">נמצא li</text>
<polyline id="edge-4" class="edge" points="350.0,340.5 416.0,340.5" marker-end="url(#arr)"/>
<text class="lbl" x="383.0" y="328.5" text-anchor="middle" style="direction:ltr">null</text>
<g id="el-click">
<rect class="n-box shp" x="60.6" y="16.0" width="280.9" height="46.0" rx="8"/>
<text class="t dyn-click-0" x="201.0" y="44.0" text-anchor="middle">לחיצה על li ברשימה</text>
<text class="t dyn-click-1" x="201.0" y="44.0" text-anchor="middle">לחיצה על li חדש שנוסף עכשיו</text>
</g>
<g id="el-bubble">
<rect class="n-box shp" x="64.9" y="102.0" width="272.1" height="46.0" rx="8"/>
<text class="t" x="201.0" y="130.0" text-anchor="middle">האירוע מבעבע למעלה אל ה-ul</text>
</g>
<g id="el-handler">
<rect class="n-code-bg shp" x="16.0" y="188.0" width="370.0" height="38.0" rx="7"/>
<text class="code" x="201.0" y="215.0" text-anchor="middle">ul.addEventListener("click", handler)</text>
</g>
<g id="el-check">
<polygon class="n-dia shp" points="201.0,266.0 350.0,340.5 201.0,414.9 52.1,340.5"/>
<text class="code" x="201.0" y="345.5" text-anchor="middle">closest("li") ?</text>
</g>
<g id="el-act">
<rect class="n-code-bg shp" x="61.1" y="454.9" width="279.7" height="38.0" rx="7"/>
<text class="code" x="201.0" y="481.9" text-anchor="middle">li.classList.toggle("done")</text>
</g>
<g id="el-miss">
<rect class="n-box shp" x="416.0" y="317.5" width="191.8" height="46.0" rx="8"/>
<text class="t" x="511.9" y="345.5" text-anchor="middle">לא פריט - מתעלמים</text>
</g>
</svg>
