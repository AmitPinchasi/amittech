<rect class="n-box shp" x="207.0" y="180.0" width="192.4" height="44.0" rx="8"/>
<text class="t-b dyn-reg-0" x="303.2" y="207.0" text-anchor="middle" style="direction:ltr">EAX = 12345678h</text>
<text class="t-b dyn-reg-1" x="303.2" y="207.0" text-anchor="middle" style="direction:ltr">AX = 5678h</text>
<text class="t-b dyn-reg-2" x="303.2" y="207.0" text-anchor="middle" style="direction:ltr">AH = 56h</text>
<text class="t-b dyn-reg-3" x="303.2" y="207.0" text-anchor="middle" style="direction:ltr">AL = 78h</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="118.1" y="264.0" width="370.3" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="303.2" y="292.0" text-anchor="middle">השם eax קורא את כל ארבעת הבתים, 32 ביט</text>
<text class="t dyn-note-1" x="303.2" y="292.0" text-anchor="middle">השם ax קורא רק את שני הבתים הנמוכים</text>
<text class="t dyn-note-2" x="303.2" y="292.0" text-anchor="middle">השם ah קורא את הבית השני מלמטה</text>
<text class="t dyn-note-3" x="303.2" y="292.0" text-anchor="middle">השם al קורא את הבית הנמוך ביותר</text>
</g>
<g id="el-cap">
<text class="small" x="303.2" y="363.0" text-anchor="middle">הבית הנמוך נמצא מימין, ולכן השמות הישנים של 16 ביט ממשיכים לעבוד גם במעבד 32 ביט</text>
