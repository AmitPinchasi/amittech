<text class="t dyn-note-3" x="326.4" y="602.0" text-anchor="middle">גם W3 מונפק - הצינורות לא מתבטלים אף מחזור</text>
<text class="t dyn-note-4" x="326.4" y="602.0" text-anchor="middle">ה-warp W0 עדיין תקוע, אך המתזמן ממשיך - ה-latency הוסתר</text>
</g>
<g id="el-cap">
<text class="small" x="326.4" y="673.0" text-anchor="middle">החלפת warp עולה מחזור אחד, ולכן המתזמן מסתיר את המתנת הזיכרון מאחורי warps מוכנים אחרים</text>
</g>
</svg>
