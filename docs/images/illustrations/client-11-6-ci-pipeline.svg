<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 636 592" width="636" role="img" aria-label="תרשים זרימה של pipeline ב-CI: מדחיפת קוד דרך בדיקות איכות, טסטים ובנייה ועד פריסה לפרודקשן או התראה על כשל">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-push{0.00%{stroke:var(--pink);stroke-width:2.5;}11.03%{stroke:var(--pink);stroke-width:2.5;}13.60%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-push .shp{animation-name:k-push;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-quality{0.00%{stroke-width:1.5;}8.46%{stroke-width:1.5;}11.03%{stroke:var(--pink);stroke-width:2.5;}22.06%{stroke:var(--pink);stroke-width:2.5;}24.63%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-quality .shp{animation-name:k-quality;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-test{0.00%{stroke-width:1.5;}19.49%{stroke-width:1.5;}22.06%{stroke:var(--pink);stroke-width:2.5;}33.09%{stroke:var(--pink);stroke-width:2.5;}35.66%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-test .shp{animation-name:k-test;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-build{0.00%{stroke-width:1.5;}30.51%{stroke-width:1.5;}33.09%{stroke:var(--pink);stroke-width:2.5;}44.12%{stroke:var(--pink);stroke-width:2.5;}46.69%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-build .shp{animation-name:k-build;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}41.54%{stroke-width:1.5;}44.12%{stroke:var(--pink);stroke-width:2.5;}55.15%{stroke:var(--pink);stroke-width:2.5;}57.72%{stroke-width:1.5;}63.60%{stroke-width:1.5;}66.18%{stroke:var(--pink);stroke-width:2.5;}77.21%{stroke:var(--pink);stroke-width:2.5;}79.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fail{0.00%{stroke-width:1.5;}52.57%{stroke-width:1.5;}55.15%{stroke:var(--pink);stroke-width:2.5;}66.18%{stroke:var(--pink);stroke-width:2.5;}68.75%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fail .shp{animation-name:k-fail;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-deploy{0.00%{stroke-width:1.5;}74.63%{stroke-width:1.5;}77.21%{stroke:var(--pink);stroke-width:2.5;}88.24%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-deploy .shp{animation-name:k-deploy;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.46%{stroke-width:1.6;}11.03%{stroke:var(--pink);stroke-width:2.4;}22.06%{stroke:var(--pink);stroke-width:2.4;}24.63%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}19.49%{stroke-width:1.6;}22.06%{stroke:var(--pink);stroke-width:2.4;}33.09%{stroke:var(--pink);stroke-width:2.4;}35.66%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.51%{stroke-width:1.6;}33.09%{stroke:var(--pink);stroke-width:2.4;}44.12%{stroke:var(--pink);stroke-width:2.4;}46.69%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}41.54%{stroke-width:1.6;}44.12%{stroke:var(--pink);stroke-width:2.4;}55.15%{stroke:var(--pink);stroke-width:2.4;}57.72%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}52.57%{stroke-width:1.6;}55.15%{stroke:var(--pink);stroke-width:2.4;}66.18%{stroke:var(--pink);stroke-width:2.4;}68.75%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-5{animation-name:k-edge-5;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}74.63%{stroke-width:1.6;}77.21%{stroke:var(--pink);stroke-width:2.4;}88.24%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="162.4,62.0 162.4,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="162.4,148.0 162.4,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="176.4" y="172.0" text-anchor="end" style="direction:ltr">needs</text>
<polyline id="edge-2" class="edge" points="162.4,226.0 162.4,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="176.4" y="250.0" text-anchor="end" style="direction:ltr">needs</text>
<polyline id="edge-3" class="edge" points="162.4,304.0 162.4,344.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="162.4,490.4 162.4,530.4" marker-end="url(#arr)"/>
<text class="lbl" x="176.4" y="514.4" text-anchor="end">כן</text>
<polyline id="edge-5" class="edge" points="308.7,417.2 374.7,417.2" marker-end="url(#arr)"/>
<text class="lbl" x="341.7" y="405.2" text-anchor="middle">לא</text>
<g id="el-push">
<rect class="n-box shp" x="46.8" y="16.0" width="231.2" height="46.0" rx="8"/>
<text class="t" x="162.4" y="44.0" text-anchor="middle">דחיפת קוד או פתיחת PR</text>
</g>
<g id="el-quality">
<rect class="n-box shp" x="41.2" y="102.0" width="242.2" height="46.0" rx="8"/>
<text class="t" x="162.4" y="130.0" text-anchor="middle">בדיקות איכות - lint, tsc</text>
</g>
<g id="el-test">
<rect class="n-code-bg shp" x="108.3" y="188.0" width="108.2" height="38.0" rx="7"/>
<text class="code" x="162.4" y="215.0" text-anchor="middle">npm test</text>
</g>
<g id="el-build">
<rect class="n-code-bg shp" x="85.7" y="266.0" width="153.4" height="38.0" rx="7"/>
<text class="code" x="162.4" y="293.0" text-anchor="middle">npm run build</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="162.4,344.0 308.7,417.2 162.4,490.4 16.0,417.2"/>
<text class="t" x="162.4" y="422.2" text-anchor="middle">כל השלבים עברו?</text>
</g>
<g id="el-deploy">
<rect class="n-box shp" x="74.5" y="530.4" width="175.7" height="46.0" rx="8"/>
<text class="t" x="162.4" y="558.4" text-anchor="middle">פריסה לפרודקשן</text>
</g>
<g id="el-fail">
<rect class="n-box shp" x="374.7" y="394.2" width="245.6" height="46.0" rx="8"/>
<text class="t" x="497.5" y="422.2" text-anchor="middle">התראה נשלחת - אין פריסה</text>
</g>
</svg>
