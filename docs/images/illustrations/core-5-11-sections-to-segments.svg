<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 298" width="740" role="img" aria-label="איור הקשר בין סקשנים לסגמנטים בקובץ ELF: כל סקשן נכנס לסגמנט טעינה עם ההרשאות שלו, וסקשני הsymbols כלל לא נטענים לזכרון">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cmd{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmd .shp{animation-name:k-cmd;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sec-0{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sec-c0{animation-name:k-sec-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sec-1{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sec-c1{animation-name:k-sec-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sec-2{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sec-c2{animation-name:k-sec-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sec-3{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sec-c3{animation-name:k-sec-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sec-4{0.00%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-sec-c4{animation-name:k-sec-4;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}11.69%{transform:translateX(0.0px);}14.52%{transform:translateX(0.0px);}26.21%{transform:translateX(0.0px);}29.03%{transform:translateX(-116.0px);}40.73%{transform:translateX(-116.0px);}43.55%{transform:translateX(-232.0px);}55.24%{transform:translateX(-232.0px);}58.06%{transform:translateX(-348.0px);}69.76%{transform:translateX(-348.0px);}72.58%{transform:translateX(-464.0px);}84.27%{transform:translateX(-464.0px);}100.00%{transform:translateX(-464.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seg-0{opacity:0;}
@keyframes k-dyn-seg-0{0.00%{opacity:1;}29.03%{opacity:1;}31.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-seg-0{animation-name:k-dyn-seg-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seg-1{opacity:0;}
@keyframes k-dyn-seg-1{0.00%{opacity:0;}26.21%{opacity:0;}29.03%{opacity:1;}43.55%{opacity:1;}46.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-seg-1{animation-name:k-dyn-seg-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seg-2{opacity:0;}
@keyframes k-dyn-seg-2{0.00%{opacity:0;}40.73%{opacity:0;}43.55%{opacity:1;}58.06%{opacity:1;}60.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-seg-2{animation-name:k-dyn-seg-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seg-3{opacity:0;}
@keyframes k-dyn-seg-3{0.00%{opacity:0;}55.24%{opacity:0;}58.06%{opacity:1;}72.58%{opacity:1;}75.40%{opacity:0;}100.00%{opacity:0;}}
.dyn-seg-3{animation-name:k-dyn-seg-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seg-4{opacity:1;}
@keyframes k-dyn-seg-4{0.00%{opacity:0;}69.76%{opacity:0;}72.58%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-seg-4{animation-name:k-dyn-seg-4;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-cmd">
<rect class="n-code-bg shp" x="208.0" y="16.0" width="243.6" height="38.0" rx="7"/>
<text class="code" x="329.8" y="43.0" text-anchor="middle">readelf -l ./my_program</text>
</g>
<g id="el-sec">
<rect id="el-sec-c0" class="n-cell shp" x="513.8" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="561.8" y="122.0" text-anchor="middle" style="direction:ltr">.text</text>
<rect id="el-sec-c1" class="n-cell shp" x="397.8" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="445.8" y="122.0" text-anchor="middle" style="direction:ltr">.rodata</text>
<rect id="el-sec-c2" class="n-cell shp" x="281.8" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="329.8" y="122.0" text-anchor="middle" style="direction:ltr">.data</text>
<rect id="el-sec-c3" class="n-cell shp" x="165.8" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="213.8" y="122.0" text-anchor="middle" style="direction:ltr">.bss</text>
<rect id="el-sec-c4" class="n-cell shp" x="49.8" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="97.8" y="122.0" text-anchor="middle" style="direction:ltr">.symtab</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="561.8,140.0 561.8,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="573.8" y="164.0" text-anchor="end">הסקשן הנבדק</text>
<g id="el-seg">
<rect class="n-box shp" x="399.7" y="180.0" width="324.3" height="44.0" rx="8"/>
<text class="t-b dyn-seg-0" x="561.8" y="207.0" text-anchor="middle">סגמנט PT_LOAD עם R-X</text>
<text class="t-b dyn-seg-1" x="561.8" y="207.0" text-anchor="middle">סגמנט PT_LOAD עם R--</text>
<text class="t-b dyn-seg-2" x="561.8" y="207.0" text-anchor="middle">סגמנט PT_LOAD עם RW-</text>
<text class="t-b dyn-seg-3" x="561.8" y="207.0" text-anchor="middle">אותו סגמנט RW-, בלי מקום בקובץ</text>
<text class="t-b dyn-seg-4" x="561.8" y="207.0" text-anchor="middle">לא נטען לזכרון כלל</text>
</g>
</g>
<g id="el-note">
<text class="small" x="329.8" y="277.0" text-anchor="middle">הלינקר עובד עם סקשנים, והקרנל טוען סגמנטים, ולכן מספר סקשנים יכולים לשבת בתוך סגמנט אחד</text>
</g>
</svg>
