@keyframes k-prn{0.00%{stroke-width:1.5;}59.77%{stroke-width:1.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}87.50%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-prn .shp{animation-name:k-prn;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.77%{stroke-width:1.6;}12.50%{stroke:var(--pink);stroke-width:2.4;}25.00%{stroke:var(--pink);stroke-width:2.4;}27.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
