@keyframes k-edge-1{0.00%{stroke-width:1.6;}34.77%{stroke-width:1.6;}37.50%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}52.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
