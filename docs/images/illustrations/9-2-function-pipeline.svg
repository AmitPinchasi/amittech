</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="237.1,54.0 237.1,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="251.1" y="78.0" text-anchor="end">הרשימה נכנסת</text>
<polyline id="edge-1" class="edge" points="237.1,132.0 237.1,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="251.1" y="156.0" text-anchor="end">רק המספרים</text>
<polyline id="edge-2" class="edge" points="237.1,210.0 237.1,250.0" marker-end="url(#arr)"/>
<text class="lbl" x="251.1" y="234.0" text-anchor="end">הממוצע</text>
<g id="el-inp">
<rect class="n-code-bg shp" x="56.6" y="16.0" width="361.0" height="38.0" rx="7"/>
<text class="code" x="237.1" y="43.0" text-anchor="middle">data = [10, 20, 30, "hello", 40, 50]</text>
</g>
<g id="el-ext">
<rect class="n-code-bg shp" x="16.0" y="94.0" width="442.2" height="38.0" rx="7"/>
<text class="code dyn-ext-0" x="237.1" y="121.0" text-anchor="middle">extract_valid_numbers(data)</text>
<text class="code dyn-ext-1" x="237.1" y="121.0" text-anchor="middle">extract_valid_numbers -&gt; [10, 20, 30, 40, 50]</text>
</g>
<g id="el-avg">
<rect class="n-code-bg shp" x="74.7" y="172.0" width="324.9" height="38.0" rx="7"/>
<text class="code dyn-avg-0" x="237.1" y="199.0" text-anchor="middle">calculate_average(valid_numbers)</text>
<text class="code dyn-avg-1" x="237.1" y="199.0" text-anchor="middle">calculate_average -&gt; 30.0</text>
</g>
<g id="el-prn">
