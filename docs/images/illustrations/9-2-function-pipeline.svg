@keyframes k-avg{0.00%{stroke-width:1.5;}34.77%{stroke-width:1.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}65.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
