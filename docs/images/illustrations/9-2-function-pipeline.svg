.dyn-avg-0{opacity:0;}
@keyframes k-dyn-avg-0{0.00%{opacity:1;}50.00%{opacity:1;}52.73%{opacity:0;}100.00%{opacity:0;}}
.dyn-avg-0{animation-name:k-dyn-avg-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-avg-1{opacity:1;}
@keyframes k-dyn-avg-1{0.00%{opacity:0;}47.27%{opacity:0;}50.00%{opacity:1;}87.50%{opacity:1;}100.00%{opacity:1;}}
.dyn-avg-1{animation-name:k-dyn-avg-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
