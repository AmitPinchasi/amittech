<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 324 334" width="324" role="img" aria-label="פתרון דומיין לכתובת IP: הדפדפן שולח את הדומיין www.google.com לשרת DNS, מקבל בחזרה את הכתובת 142.250.75.36 ופונה לשרת שמחזיר את הדף">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
