<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 521 378" width="521" role="img" aria-label="אובייקט COM כגשר: PowerShell יוצר אובייקט COM שמייצג את Word, וכל קריאת מתודה על האובייקט מתורגמת לפעולה שמתבצעת בתוך התוכנה Word עצמה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-create{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-create .shp{animation-name:k-create;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-com{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-com .shp{animation-name:k-com;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-call{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-word{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-word .shp{animation-name:k-word;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}40.91%{stroke:var(--pink);stroke-width:2.4;}44.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.93%{stroke-width:1.6;}40.91%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="260.4,54.0 260.4,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="274.4" y="78.0" text-anchor="end">מחזיר אובייקט COM</text>
<polyline id="edge-1" class="edge" points="260.4,140.0 260.4,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="274.4" y="164.0" text-anchor="end">קוראים למתודה על האובייקט</text>
<polyline id="edge-2" class="edge" points="260.4,218.0 260.4,258.0" marker-end="url(#arr)"/>
<text class="lbl" x="274.4" y="242.0" text-anchor="end">הקריאה עוברת ל-Word</text>
<g id="el-create">
<rect class="n-code-bg shp" x="70.9" y="16.0" width="379.0" height="38.0" rx="7"/>
<text class="code" x="260.4" y="43.0" text-anchor="middle">New-Object -ComObject Word.Application</text>
</g>
<g id="el-com">
<rect class="n-box shp" x="94.3" y="94.0" width="332.3" height="46.0" rx="8"/>
<text class="t" x="260.4" y="122.0" text-anchor="middle">אובייקט COM - הגשר שמייצג את Word</text>
</g>
<g id="el-call">
<rect class="n-code-bg shp" x="138.6" y="180.0" width="243.6" height="38.0" rx="7"/>
<text class="code" x="260.4" y="207.0" text-anchor="middle">$MSWord.Documents.Add()</text>
</g>
<g id="el-word">
<rect class="n-box shp" x="91.1" y="258.0" width="338.7" height="46.0" rx="8"/>
<text class="t" x="260.4" y="286.0" text-anchor="middle">התוכנה Word מבצעת את הפעולה בפועל</text>
</g>
<g id="el-note">
<text class="small" x="260.4" y="357.0" text-anchor="middle">הקוד לא מפעיל את Word ישירות אלא דרך אובייקט ה-COM שמעביר את הקריאות</text>
</g>
</svg>
