<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="64.4" y="16.0" width="523.5" height="38.0" rx="7"/>
<text class="code dyn-code-0" x="326.2" y="43.0" text-anchor="middle">int fd = open("output.txt", O_WRONLY | O_CREAT, 0644);</text>
<text class="code dyn-code-1" x="326.2" y="43.0" text-anchor="middle">dup2(fd, 1);</text>
<text class="code dyn-code-2" x="326.2" y="43.0" text-anchor="middle">close(fd);</text>
<text class="code dyn-code-3" x="326.2" y="43.0" text-anchor="middle">printf("hello\n");</text>
</g>
<g id="el-tbl">
<rect id="el-tbl-c0" class="n-cell shp" x="481.3" y="94.0" width="125.1" height="46.0" rx="6"/>
<text class="t" x="543.8" y="122.0" text-anchor="middle" style="direction:ltr">0 stdin</text>
<rect id="el-tbl-c1" class="n-cell shp" x="336.2" y="94.0" width="125.1" height="46.0" rx="6"/>
<text class="t" x="398.7" y="122.0" text-anchor="middle" style="direction:ltr">1 stdout</text>
<rect id="el-tbl-c2" class="n-cell shp" x="191.1" y="94.0" width="125.1" height="46.0" rx="6"/>
<text class="t" x="253.6" y="122.0" text-anchor="middle" style="direction:ltr">2 stderr</text>
<rect id="el-tbl-c3" class="n-cell shp" x="46.0" y="94.0" width="125.1" height="46.0" rx="6"/>
<text class="t" x="108.5" y="122.0" text-anchor="middle" style="direction:ltr">3 output.txt</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="398.7,140.0 398.7,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="410.7" y="164.0" text-anchor="end">המתאר שהשתנה</text>
<g id="el-state">
<rect class="n-box shp" x="174.6" y="180.0" width="448.3" height="44.0" rx="8"/>
<text class="t-b dyn-state-0" x="398.7" y="207.0" text-anchor="middle">המתאר 1 מצביע על המסך</text>
<text class="t-b dyn-state-1" x="398.7" y="207.0" text-anchor="middle">המתאר 3 החדש מצביע על הקובץ output.txt</text>
<text class="t-b dyn-state-2" x="398.7" y="207.0" text-anchor="middle">המתאר 1 מצביע עכשיו על אותו קובץ בדיוק</text>
<text class="t-b dyn-state-3" x="398.7" y="207.0" text-anchor="middle">המתאר 3 נסגר, והמתאר 1 עדיין מצביע על הקובץ</text>
<text class="t-b dyn-state-4" x="398.7" y="207.0" text-anchor="middle">הפלט של printf נכתב אל output.txt ולא למסך</text>
</g>
</g>
<g id="el-note">
<text class="small" x="326.2" y="277.0" text-anchor="middle">הקריאה dup2 סוגרת את המתאר היעד אם הוא פתוח, ואז מכוונת אותו לאותו משאב של המתאר המקורי</text>
</g>
