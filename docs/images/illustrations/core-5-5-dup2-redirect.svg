#el-tbl-c3{animation-name:k-tbl-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}13.68%{transform:translateX(0.0px);}16.98%{transform:translateX(-290.2px);}30.66%{transform:translateX(-290.2px);}33.96%{transform:translateX(0.0px);}47.64%{transform:translateX(0.0px);}50.94%{transform:translateX(0.0px);}64.62%{transform:translateX(0.0px);}67.92%{transform:translateX(0.0px);}81.60%{transform:translateX(0.0px);}100.00%{transform:translateX(0.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-code-0{opacity:0;}
