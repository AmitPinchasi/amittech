<polyline id="edge-2" class="edge" points="214.6,365.0 214.6,405.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="391.6,190.5 457.6,190.5" marker-end="url(#arr)"/>
<text class="lbl" x="424.6" y="178.5" text-anchor="middle">כן</text>
<g id="el-input">
