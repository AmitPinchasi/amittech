</g>
<g id="el-leak">
<rect class="n-box shp" x="29.6" y="405.0" width="369.9" height="46.0" rx="8"/>
<text class="t" x="214.6" y="433.0" text-anchor="middle">metadata פנימי מחזיר credentials לתוקף</text>
</g>
<g id="el-deny">
<rect class="n-box shp" x="457.6" y="167.5" width="355.8" height="46.0" rx="8"/>
<text class="t" x="635.5" y="195.5" text-anchor="middle">אינה ברשימה / IP פנימי - הבקשה נחסמת</text>
</g>
</svg>
