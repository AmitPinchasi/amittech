<text class="t" x="214.6" y="195.5" text-anchor="middle">הכתובת ב-allowlist?</text>
</g>
<g id="el-fetch">
<rect class="n-box shp" x="16.0" y="319.0" width="397.1" height="46.0" rx="8"/>
