<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 665 478" width="665" role="img" aria-label="אנימציה המבחינה בין מקבילות למקביליות ב-SM: 2048 threads תושבים בו-זמנית, אך בכל מחזור שעון רק 128 מהם מתקדמים בפועל">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-res{0.00%{stroke:var(--pink);stroke-width:2.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}24.46%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-res .shp{animation-name:k-res;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cyc{0.00%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-cyc .shp{animation-name:k-cyc;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-adv{0.00%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-adv .shp{animation-name:k-adv;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cyc-0{opacity:0;}
@keyframes k-dyn-cyc-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-cyc-0{animation-name:k-dyn-cyc-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cyc-1{opacity:0;}
@keyframes k-dyn-cyc-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-cyc-1{animation-name:k-dyn-cyc-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cyc-2{opacity:0;}
@keyframes k-dyn-cyc-2{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-cyc-2{animation-name:k-dyn-cyc-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cyc-3{opacity:1;}
@keyframes k-dyn-cyc-3{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-cyc-3{animation-name:k-dyn-cyc-3;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-adv-0{opacity:0;}
@keyframes k-dyn-adv-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-adv-0{animation-name:k-dyn-adv-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-adv-1{opacity:0;}
@keyframes k-dyn-adv-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-adv-1{animation-name:k-dyn-adv-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-adv-2{opacity:0;}
@keyframes k-dyn-adv-2{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-adv-2{animation-name:k-dyn-adv-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-adv-3{opacity:1;}
@keyframes k-dyn-adv-3{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-adv-3{animation-name:k-dyn-adv-3;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:0;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-3{opacity:1;}
@keyframes k-dyn-note-3{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-3{animation-name:k-dyn-note-3;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-res">
<rect class="n-box shp" x="180.6" y="16.0" width="304.1" height="46.0" rx="8"/>
<text class="t" x="332.6" y="44.0" text-anchor="middle">תושבים: 2048 threads (64 warps)</text>
</g>
<g id="el-cyc">
<rect class="n-box shp" x="276.4" y="102.0" width="112.5" height="44.0" rx="8"/>
<text class="t-b dyn-cyc-0" x="332.6" y="129.0" text-anchor="middle">מחזור 1</text>
<text class="t-b dyn-cyc-1" x="332.6" y="129.0" text-anchor="middle">מחזור 2</text>
<text class="t-b dyn-cyc-2" x="332.6" y="129.0" text-anchor="middle">מחזור 3</text>
<text class="t-b dyn-cyc-3" x="332.6" y="129.0" text-anchor="middle">מחזור 4</text>
</g>
<g id="el-adv">
<rect class="n-box shp" x="143.8" y="186.0" width="377.6" height="46.0" rx="8"/>
<text class="t dyn-adv-0" x="332.6" y="214.0" text-anchor="middle">מתקדמים: 4 warps = 128 threads (W0-W3)</text>
<text class="t dyn-adv-1" x="332.6" y="214.0" text-anchor="middle">מתקדמים: 4 warps = 128 threads (W4-W7)</text>
<text class="t dyn-adv-2" x="332.6" y="214.0" text-anchor="middle">מתקדמים: 4 warps = 128 threads (W8-W11)</text>
<text class="t dyn-adv-3" x="332.6" y="214.0" text-anchor="middle">מתקדמים: 4 warps = 128 threads (W12-W15)</text>
</g>
<g id="el-ratio">
<rect class="n-box shp" x="112.9" y="272.0" width="439.5" height="46.0" rx="8"/>
<text class="t" x="332.6" y="300.0" text-anchor="middle">יחס 16:1 - רק 128 מתוך 2048 מתקדמים בכל מחזור</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="24.0" y="358.0" width="617.2" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="332.6" y="386.0" text-anchor="middle">כל 2048 ה-threads תושבים על ה-SM בו-זמנית - זו מקבילות (concurrency)</text>
<text class="t dyn-note-1" x="332.6" y="386.0" text-anchor="middle">אך בכל מחזור רק 4 warps, אחד לכל מחיצה, מתקדמים - 128 threads</text>
<text class="t dyn-note-2" x="332.6" y="386.0" text-anchor="middle">המתזמן דוגם מהמאגר warps אחרים בכל מחזור</text>
<text class="t dyn-note-3" x="332.6" y="386.0" text-anchor="middle">1920 ה-threads הממתינים הם מאגר הסתרת ה-latency</text>
</g>
<g id="el-cap">
<text class="small" x="332.6" y="457.0" text-anchor="middle">המאגר הגדול של threads תושבים מתורגם לתפוקה: בכל מחזור מתקדמים 128, והשאר ממתינים מוכנים</text>
</g>
</svg>
