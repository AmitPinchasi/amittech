<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 426 316" width="426" role="img" aria-label="הארגומנטים שמועברים לתוכנה בטרמינל נשמרים ברשימה sys.argv, כשהאיבר הראשון הוא תמיד שם הקובץ">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cmd{0.00%{stroke:var(--pink);stroke-width:2.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}20.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmd .shp{animation-name:k-cmd;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-argv-0{0.00%{stroke-width:1.5;}13.02%{stroke-width:1.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}53.65%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-argv-c0{animation-name:k-argv-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-argv-1{0.00%{stroke-width:1.5;}13.02%{stroke-width:1.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}36.98%{stroke-width:1.5;}46.35%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}70.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-argv-c1{animation-name:k-argv-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-argv-2{0.00%{stroke-width:1.5;}13.02%{stroke-width:1.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}36.98%{stroke-width:1.5;}63.02%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-argv-c2{animation-name:k-argv-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.02%{stroke-width:1.6;}16.67%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}36.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.69%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}53.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-1{0.00%{transform:translateX(0.0px);}13.02%{transform:translateX(0.0px);}16.67%{transform:translateX(0.0px);}29.69%{transform:translateX(0.0px);}33.33%{transform:translateX(0.0px);}46.35%{transform:translateX(0.0px);}50.00%{transform:translateX(-116.0px);}63.02%{transform:translateX(-116.0px);}66.67%{transform:translateX(-232.0px);}79.69%{transform:translateX(-232.0px);}100.00%{transform:translateX(-232.0px);}}
#eg-1{animation-name:k-mv-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:1;}33.33%{opacity:1;}36.98%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:0;}
@keyframes k-dyn-val-1{0.00%{opacity:0;}29.69%{opacity:0;}33.33%{opacity:1;}50.00%{opacity:1;}53.65%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-2{opacity:0;}
@keyframes k-dyn-val-2{0.00%{opacity:0;}46.35%{opacity:0;}50.00%{opacity:1;}66.67%{opacity:1;}70.31%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-2{animation-name:k-dyn-val-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-3{opacity:1;}
@keyframes k-dyn-val-3{0.00%{opacity:0;}63.02%{opacity:0;}66.67%{opacity:1;}83.33%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-3{animation-name:k-dyn-val-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="180.0,54.0 180.0,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="192.0" y="78.0" text-anchor="end">נשמרים ברשימה</text>
<g id="el-cmd">
<rect class="n-code-bg shp" x="58.2" y="16.0" width="243.6" height="38.0" rx="7"/>
<text class="code" x="180.0" y="43.0" text-anchor="middle">python main.py hello 42</text>
</g>
<g id="el-argv">
<rect id="el-argv-c0" class="n-cell shp" x="248.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="296.0" y="106.0" text-anchor="middle" style="direction:ltr">0</text>
<text class="t" x="296.0" y="140.0" text-anchor="middle" style="direction:ltr">main.py</text>
<rect id="el-argv-c1" class="n-cell shp" x="132.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="180.0" y="106.0" text-anchor="middle" style="direction:ltr">1</text>
<text class="t" x="180.0" y="140.0" text-anchor="middle" style="direction:ltr">hello</text>
<rect id="el-argv-c2" class="n-cell shp" x="16.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="64.0" y="106.0" text-anchor="middle" style="direction:ltr">2</text>
<text class="t" x="64.0" y="140.0" text-anchor="middle" style="direction:ltr">42</text>
</g>
<g id="eg-1">
<polyline id="edge-1" class="edge" points="296.0,158.0 296.0,198.0" marker-end="url(#arr)"/>
<g id="el-val">
<rect class="n-box shp" x="182.2" y="198.0" width="227.5" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="296.0" y="225.0" text-anchor="middle" style="direction:ltr">sys.argv</text>
<text class="t-b dyn-val-1" x="296.0" y="225.0" text-anchor="middle" style="direction:ltr">sys.argv[0] = 'main.py'</text>
<text class="t-b dyn-val-2" x="296.0" y="225.0" text-anchor="middle" style="direction:ltr">sys.argv[1] = 'hello'</text>
<text class="t-b dyn-val-3" x="296.0" y="225.0" text-anchor="middle" style="direction:ltr">sys.argv[2] = '42'</text>
</g>
</g>
<g id="el-note">
<text class="small" x="180.0" y="295.0" text-anchor="middle">האיבר במקום 0 הוא תמיד שם הקובץ שהורץ</text>
</g>
</svg>
