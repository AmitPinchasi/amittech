.dyn-count-1{opacity:0;}
@keyframes k-dyn-count-1{0.00%{opacity:0;}16.07%{opacity:0;}20.24%{opacity:1;}40.48%{opacity:1;}44.64%{opacity:0;}100.00%{opacity:0;}}
.dyn-count-1{animation-name:k-dyn-count-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-count-2{opacity:0;}
@keyframes k-dyn-count-2{0.00%{opacity:0;}36.31%{opacity:0;}40.48%{opacity:1;}60.71%{opacity:1;}64.88%{opacity:0;}100.00%{opacity:0;}}
.dyn-count-2{animation-name:k-dyn-count-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-count-3{opacity:1;}
