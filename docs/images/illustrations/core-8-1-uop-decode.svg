.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:0;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-3{opacity:0;}
@keyframes k-dyn-note-3{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-3{animation-name:k-dyn-note-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-4{opacity:1;}
@keyframes k-dyn-note-4{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-4{animation-name:k-dyn-note-4;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-src">
<rect class="n-code-bg shp" x="207.6" y="16.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="324.9" y="43.0" text-anchor="middle">add eax, [ebx+ecx*4+8]</text>
</g>
<g id="el-u1">
<rect class="n-code-bg shp" x="185.1" y="94.0" width="279.7" height="38.0" rx="7"/>
<text class="code dyn-u1-0" x="324.9" y="121.0" text-anchor="middle">uop 1: ?</text>
<text class="code dyn-u1-1" x="324.9" y="121.0" text-anchor="middle">uop 1: lea tmp, ebx+ecx*4+8</text>
</g>
<g id="el-u2">
<rect class="n-code-bg shp" x="207.6" y="172.0" width="234.6" height="38.0" rx="7"/>
<text class="code dyn-u2-0" x="324.9" y="199.0" text-anchor="middle">uop 2: ?</text>
<text class="code dyn-u2-1" x="324.9" y="199.0" text-anchor="middle">uop 2: load val, [tmp]</text>
</g>
<g id="el-u3">
<rect class="n-code-bg shp" x="221.2" y="250.0" width="207.5" height="38.0" rx="7"/>
<text class="code dyn-u3-0" x="324.9" y="277.0" text-anchor="middle">uop 3: ?</text>
<text class="code dyn-u3-1" x="324.9" y="277.0" text-anchor="middle">uop 3: add eax, val</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="328.0" width="617.9" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="324.9" y="356.0" text-anchor="middle">הוראת x86 אחת מבצעת חישוב כתובת, קריאה מהזכרון וחיבור</text>
<text class="t dyn-note-1" x="324.9" y="356.0" text-anchor="middle">שלב הפענוח מייצר מיקרו-פעולה שמחשבת את הכתובת</text>
<text class="t dyn-note-2" x="324.9" y="356.0" text-anchor="middle">מיקרו-פעולה שנייה קוראת את הערך מהזכרון</text>
<text class="t dyn-note-3" x="324.9" y="356.0" text-anchor="middle">מיקרו-פעולה שלישית מבצעת את החיבור אל eax</text>
<text class="t dyn-note-4" x="324.9" y="356.0" text-anchor="middle">שלוש המיקרו-פעולות פשוטות ובאורך קבוע, ולכן קל לתזמן אותן בצינור</text>
</g>
<g id="el-cap">
<text class="small" x="324.9" y="427.0" text-anchor="middle">מעבדי x86 שומרים על תאימות לאחור כלפי חוץ, אך פנימה הם מריצים ליבה בסגנון RISC</text>
</g>
</svg>
