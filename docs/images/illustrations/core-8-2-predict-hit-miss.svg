<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 810 557" width="810" role="img" aria-label="תרשים זרימה המראה כיצד המעבד מנחש לאן הסתעפות תלך וממשיך לטעון הוראות ספקולטיבית, וכיצד ניחוש שגוי מחייב שטיפת צינור ותחילה מחדש מהכתובת הנכונה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-br{0.00%{stroke:var(--pink);stroke-width:2.5;}12.75%{stroke:var(--pink);stroke-width:2.5;}15.10%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-br .shp{animation-name:k-br;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-guess{0.00%{stroke-width:1.5;}10.40%{stroke-width:1.5;}12.75%{stroke:var(--pink);stroke-width:2.5;}25.50%{stroke:var(--pink);stroke-width:2.5;}27.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-guess .shp{animation-name:k-guess;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}23.15%{stroke-width:1.5;}25.50%{stroke:var(--pink);stroke-width:2.5;}38.26%{stroke:var(--pink);stroke-width:2.5;}40.60%{stroke-width:1.5;}48.66%{stroke-width:1.5;}51.01%{stroke:var(--pink);stroke-width:2.5;}63.76%{stroke:var(--pink);stroke-width:2.5;}66.11%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ok{0.00%{stroke-width:1.5;}35.91%{stroke-width:1.5;}38.26%{stroke:var(--pink);stroke-width:2.5;}51.01%{stroke:var(--pink);stroke-width:2.5;}53.36%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ok .shp{animation-name:k-ok;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-flush{0.00%{stroke-width:1.5;}61.41%{stroke-width:1.5;}63.76%{stroke:var(--pink);stroke-width:2.5;}76.51%{stroke:var(--pink);stroke-width:2.5;}78.86%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-flush .shp{animation-name:k-flush;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-restart{0.00%{stroke-width:1.5;}74.16%{stroke-width:1.5;}76.51%{stroke:var(--pink);stroke-width:2.5;}89.26%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-restart .shp{animation-name:k-restart;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.40%{stroke-width:1.6;}12.75%{stroke:var(--pink);stroke-width:2.4;}25.50%{stroke:var(--pink);stroke-width:2.4;}27.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}10.40%{stroke-width:1.6;}12.75%{stroke:var(--pink);stroke-width:2.4;}25.50%{stroke:var(--pink);stroke-width:2.4;}27.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}23.15%{stroke-width:1.6;}25.50%{stroke:var(--pink);stroke-width:2.4;}38.26%{stroke:var(--pink);stroke-width:2.4;}40.60%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}48.66%{stroke-width:1.6;}51.01%{stroke:var(--pink);stroke-width:2.4;}63.76%{stroke:var(--pink);stroke-width:2.4;}66.11%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}74.16%{stroke-width:1.6;}76.51%{stroke:var(--pink);stroke-width:2.4;}89.26%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}25.50%{opacity:1;}27.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:0;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}23.15%{opacity:0;}25.50%{opacity:1;}51.01%{opacity:1;}53.36%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-2{opacity:1;}
@keyframes k-dyn-cond-2{0.00%{opacity:0;}48.66%{opacity:0;}51.01%{opacity:1;}89.26%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-2{animation-name:k-dyn-cond-2;animation-duration:14.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="405.1,54.0 405.1,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="405.1,140.0 405.1,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="593.7,274.3 659.7,274.3" marker-end="url(#arr)"/>
<text class="lbl" x="626.7" y="262.3" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="405.1,368.7 405.1,408.7" marker-end="url(#arr)"/>
<text class="lbl" x="419.1" y="392.7" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="405.1,454.7 405.1,494.7" marker-end="url(#arr)"/>
<g id="el-br">
<rect class="n-code-bg shp" x="351.0" y="16.0" width="108.2" height="38.0" rx="7"/>
<text class="code" x="405.1" y="43.0" text-anchor="middle">jz label</text>
</g>
<g id="el-guess">
<rect class="n-box shp" x="114.4" y="94.0" width="581.3" height="46.0" rx="8"/>
<text class="t" x="405.1" y="122.0" text-anchor="middle">המעבד מנחש את כיוון ההסתעפות וממשיך לטעון הוראות ספקולטיבית</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="405.1,180.0 593.7,274.3 405.1,368.7 216.4,274.3"/>
<text class="code dyn-cond-0" x="405.1" y="279.3" text-anchor="middle">guess correct ?</text>
<text class="code dyn-cond-1" x="405.1" y="279.3" text-anchor="middle">guess correct = yes</text>
<text class="code dyn-cond-2" x="405.1" y="279.3" text-anchor="middle">guess correct = no</text>
</g>
<g id="el-ok">
<rect class="n-box shp" x="659.7" y="251.3" width="127.0" height="46.0" rx="8"/>
<text class="t" x="723.2" y="279.3" text-anchor="middle">אין עיכוב</text>
</g>
<g id="el-flush">
<rect class="n-box shp" x="77.2" y="408.7" width="655.9" height="46.0" rx="8"/>
<text class="t" x="405.1" y="436.7" text-anchor="middle">המעבד שוטף את ההוראות השגויות מהצינור, וכל העבודה עליהן הולכת לאיבוד</text>
</g>
<g id="el-restart">
<rect class="n-box shp" x="16.0" y="494.7" width="778.2" height="46.0" rx="8"/>
<text class="t" x="405.1" y="522.7" text-anchor="middle">הטעינה מתחילה מחדש מהכתובת הנכונה, במחיר של חמישה עשר עד עשרים מחזורים בצינור עמוק</text>
</g>
</svg>
