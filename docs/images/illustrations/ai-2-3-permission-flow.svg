<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 738 555" width="738" role="img" aria-label="זרימת ההרשאות: פעולה שמכוסה במצב או ברשימת ההיתר רצה מיד, אחרת הagent מבקש אישור מהמשתמש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="363.6,62.0 363.6,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="504.4,172.4 570.4,172.4" marker-end="url(#arr)"/>
<text class="lbl" x="537.4" y="160.4" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="363.6,242.8 363.6,282.8" marker-end="url(#arr)"/>
<text class="lbl" x="377.6" y="266.8" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="363.6,328.8 363.6,368.8" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="283.6,410.8 217.6,410.8" marker-end="url(#arr)"/>
<text class="lbl" x="250.6" y="398.8" text-anchor="middle">לא</text>
<polyline id="edge-5" class="edge" points="363.6,452.8 363.6,492.8" marker-end="url(#arr)"/>
<text class="lbl" x="377.6" y="476.8" text-anchor="end">כן</text>
<g id="el-want">
<rect class="n-box shp" x="276.6" y="16.0" width="174.0" height="46.0" rx="8"/>
<text class="t" x="363.6" y="44.0" text-anchor="middle">פעולה של הagent</text>
</g>
<g id="el-auto">
<polygon class="n-dia shp" points="363.6,102.0 504.4,172.4 363.6,242.8 222.8,172.4"/>
<text class="t" x="363.6" y="177.4" text-anchor="middle">מותר אוטומטית?</text>
</g>
<g id="el-run">
<rect class="n-box shp" x="570.4" y="149.4" width="151.5" height="46.0" rx="8"/>
<text class="t" x="646.2" y="177.4" text-anchor="middle">רץ בלי לשאול</text>
</g>
<g id="el-ask">
<rect class="n-box shp" x="295.2" y="282.8" width="136.7" height="46.0" rx="8"/>
<text class="t" x="363.6" y="310.8" text-anchor="middle">בקשת אישור</text>
</g>
<g id="el-decide">
<polygon class="n-dia shp" points="363.6,368.8 443.6,410.8 363.6,452.8 283.6,410.8"/>
<text class="t" x="363.6" y="415.8" text-anchor="middle">מאשרים?</text>
</g>
<g id="el-redirect">
<rect class="n-box shp" x="16.0" y="387.8" width="201.6" height="46.0" rx="8"/>
<text class="t" x="116.8" y="415.8" text-anchor="middle">דחייה + כיוון מחדש</text>
</g>
<g id="el-approved">
<rect class="n-box shp" x="283.0" y="492.8" width="161.3" height="46.0" rx="8"/>
<text class="t" x="363.6" y="520.8" text-anchor="middle">רץ אחרי אישור</text>
</g>
</svg>
