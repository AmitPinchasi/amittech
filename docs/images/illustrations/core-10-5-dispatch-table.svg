<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 488 402" width="488" role="img" aria-label="טבלת ניתוב של מצביעי פונקציות: הopcode משמש אינדקס ישיר לתא בטבלה, והקריאה מגיעה לhandler הנכון">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}24.46%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tbl-0{0.00%{stroke-width:1.5;}16.85%{stroke-width:1.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}45.11%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-tbl-c0{animation-name:k-tbl-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}16.85%{stroke-width:1.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}45.11%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-out .shp{animation-name:k-out;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tbl-2{0.00%{stroke-width:1.5;}37.50%{stroke-width:1.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}65.76%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-tbl-c2{animation-name:k-tbl-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tbl-3{0.00%{stroke-width:1.5;}58.15%{stroke-width:1.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-tbl-c3{animation-name:k-tbl-3;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}16.85%{transform:translateX(0.0px);}20.65%{transform:translateX(0.0px);}37.50%{transform:translateX(0.0px);}41.30%{transform:translateX(-232.0px);}58.15%{transform:translateX(-232.0px);}61.96%{transform:translateX(-348.0px);}78.80%{transform:translateX(-348.0px);}100.00%{transform:translateX(-348.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-0{opacity:0;}
@keyframes k-dyn-op-0{0.00%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-op-0{animation-name:k-dyn-op-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-1{opacity:0;}
@keyframes k-dyn-op-1{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-op-1{animation-name:k-dyn-op-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-2{opacity:1;}
@keyframes k-dyn-op-2{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-op-2{animation-name:k-dyn-op-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-0{opacity:0;}
@keyframes k-dyn-out-0{0.00%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-0{animation-name:k-dyn-out-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-1{opacity:0;}
@keyframes k-dyn-out-1{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-1{animation-name:k-dyn-out-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-2{opacity:1;}
@keyframes k-dyn-out-2{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-out-2{animation-name:k-dyn-out-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="134.2" y="16.0" width="207.5" height="38.0" rx="7"/>
<text class="code" x="238.0" y="43.0" text-anchor="middle">handlers[opcode]();</text>
</g>
<g id="el-tbl">
<rect id="el-tbl-c0" class="n-cell shp" x="364.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="412.0" y="106.0" text-anchor="middle" style="direction:ltr">0</text>
<text class="t" x="412.0" y="140.0" text-anchor="middle" style="direction:ltr">add</text>
<rect id="el-tbl-c1" class="n-cell shp" x="248.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="296.0" y="106.0" text-anchor="middle" style="direction:ltr">1</text>
<text class="t" x="296.0" y="140.0" text-anchor="middle" style="direction:ltr">sub</text>
<rect id="el-tbl-c2" class="n-cell shp" x="132.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="180.0" y="106.0" text-anchor="middle" style="direction:ltr">2</text>
<text class="t" x="180.0" y="140.0" text-anchor="middle" style="direction:ltr">mul</text>
<rect id="el-tbl-c3" class="n-cell shp" x="16.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="64.0" y="106.0" text-anchor="middle" style="direction:ltr">3</text>
<text class="t" x="64.0" y="140.0" text-anchor="middle" style="direction:ltr">div</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="412.0,158.0 412.0,198.0" marker-end="url(#arr)"/>
<g id="el-op">
<rect class="n-box shp" x="351.5" y="198.0" width="120.9" height="46.0" rx="8"/>
<text class="t dyn-op-0" x="412.0" y="226.0" text-anchor="middle" style="direction:ltr">opcode = 0</text>
<text class="t dyn-op-1" x="412.0" y="226.0" text-anchor="middle" style="direction:ltr">opcode = 2</text>
<text class="t dyn-op-2" x="412.0" y="226.0" text-anchor="middle" style="direction:ltr">opcode = 3</text>
</g>
</g>
<g id="el-out">
<rect class="n-box shp" x="137.5" y="284.0" width="201.0" height="44.0" rx="8"/>
<text class="t-b dyn-out-0" x="238.0" y="311.0" text-anchor="middle" style="direction:ltr">handle_add() -&gt; ADD</text>
<text class="t-b dyn-out-1" x="238.0" y="311.0" text-anchor="middle" style="direction:ltr">handle_mul() -&gt; MUL</text>
<text class="t-b dyn-out-2" x="238.0" y="311.0" text-anchor="middle" style="direction:ltr">handle_div() -&gt; DIV</text>
</g>
<g id="el-note">
<text class="small" x="238.0" y="381.0" text-anchor="middle">קפיצה ישירה לפי אינדקס מחליפה שרשרת של השוואות if ו-switch</text>
</g>
</svg>
