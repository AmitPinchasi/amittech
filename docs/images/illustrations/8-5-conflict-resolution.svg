<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 689 471" width="689" role="img" aria-label="פתרון קונפליקט בגיט: אם המיזוג נתקל בקונפליקט עורכים את הקבצים המסומנים, ממשיכים עם git merge --continue ועושים קומיט">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-merge{0.00%{stroke:var(--pink);stroke-width:2.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}20.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-merge .shp{animation-name:k-merge;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}13.02%{stroke-width:1.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}36.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edit{0.00%{stroke-width:1.5;}29.69%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}53.65%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-edit .shp{animation-name:k-edit;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cont{0.00%{stroke-width:1.5;}46.35%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}70.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cont .shp{animation-name:k-cont;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-commit{0.00%{stroke-width:1.5;}63.02%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-commit .shp{animation-name:k-commit;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.02%{stroke-width:1.6;}16.67%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}36.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.69%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}53.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}46.35%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}66.67%{stroke:var(--pink);stroke-width:2.4;}70.31%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}63.02%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}83.33%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="228.5,54.0 228.5,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="228.5,213.4 228.5,253.4" marker-end="url(#arr)"/>
<text class="lbl" x="242.5" y="237.4" text-anchor="end">כן</text>
<polyline id="edge-2" class="edge" points="347.9,153.7 413.9,153.7" marker-end="url(#arr)"/>
<text class="lbl" x="380.9" y="141.7" text-anchor="middle">לא</text>
<polyline id="edge-3" class="edge" points="228.5,299.4 228.5,339.4" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="228.5,377.4 228.5,417.4" marker-end="url(#arr)"/>
<text class="lbl" x="242.5" y="401.4" text-anchor="end">המיזוג הצליח</text>
<g id="el-merge">
<rect class="n-code-bg shp" x="147.3" y="16.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="228.5" y="43.0" text-anchor="middle">git merge main</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="228.5,94.0 347.9,153.7 228.5,213.4 109.1,153.7"/>
<text class="t" x="228.5" y="158.7" text-anchor="middle">יש קונפליקט?</text>
</g>
<g id="el-auto">
<rect class="n-box shp" x="413.9" y="130.7" width="258.7" height="46.0" rx="8"/>
<text class="t" x="543.2" y="158.7" text-anchor="middle">הענפים מתמזגים אוטומטית</text>
</g>
<g id="el-edit">
<rect class="n-box shp" x="16.0" y="253.4" width="425.0" height="46.0" rx="8"/>
<text class="t" x="228.5" y="281.4" text-anchor="middle">עורכים את הקבצים המסומנים ובוחרים מה יישאר</text>
</g>
<g id="el-cont">
<rect class="n-code-bg shp" x="120.2" y="339.4" width="216.5" height="38.0" rx="7"/>
<text class="code" x="228.5" y="366.4" text-anchor="middle">git merge --continue</text>
</g>
<g id="el-commit">
<rect class="n-code-bg shp" x="111.2" y="417.4" width="234.6" height="38.0" rx="7"/>
<text class="code" x="228.5" y="444.4" text-anchor="middle">git commit -m "merged"</text>
</g>
</svg>
