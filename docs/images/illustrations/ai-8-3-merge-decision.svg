<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 478" width="540" role="img" aria-label="שני שערי החלטה לפני מיזוג קוד שהagent כתב: בלי הבנה של כל שורה עוצרים ומבקשים הסבר, בלי אימות בהרצה עוצרים ובודקים קצוות, ורק כששני השערים עוברים ממזגים באחריות מלאה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="140.9,62.0 140.9,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="265.8,164.5 331.8,164.5" marker-end="url(#arr)"/>
<text class="lbl" x="298.8" y="152.5" text-anchor="middle">לא</text>
<polyline id="edge-2" class="edge" points="140.9,226.9 140.9,266.9" marker-end="url(#arr)"/>
<text class="lbl" x="154.9" y="250.9" text-anchor="end">כן</text>
<polyline id="edge-3" class="edge" points="249.6,321.3 315.6,321.3" marker-end="url(#arr)"/>
<text class="lbl" x="282.6" y="309.3" text-anchor="middle">לא</text>
<polyline id="edge-4" class="edge" points="140.9,375.6 140.9,415.6" marker-end="url(#arr)"/>
<text class="lbl" x="154.9" y="399.6" text-anchor="end">כן</text>
<g id="el-propose">
<rect class="n-box shp" x="53.9" y="16.0" width="174.0" height="46.0" rx="8"/>
<text class="t" x="140.9" y="44.0" text-anchor="middle">הagent מציע קוד</text>
</g>
<g id="el-understand">
<polygon class="n-dia shp" points="140.9,102.0 265.8,164.5 140.9,226.9 16.0,164.5"/>
<text class="t" x="140.9" y="169.5" text-anchor="middle">מבין כל שורה?</text>
</g>
<g id="el-explain">
<rect class="n-box shp" x="331.8" y="141.5" width="191.8" height="46.0" rx="8"/>
<text class="t" x="427.8" y="169.5" text-anchor="middle">עצירה - בקשת הסבר</text>
</g>
<g id="el-verify">
<polygon class="n-dia shp" points="140.9,266.9 249.6,321.3 140.9,375.6 32.3,321.3"/>
<text class="t" x="140.9" y="326.3" text-anchor="middle">אומת בהרצה?</text>
</g>
<g id="el-run">
<rect class="n-box shp" x="315.6" y="298.3" width="201.6" height="46.0" rx="8"/>
<text class="t" x="416.4" y="326.3" text-anchor="middle">עצירה - הרצת קצוות</text>
</g>
<g id="el-merge">
<rect class="n-box shp" x="30.4" y="415.6" width="221.1" height="46.0" rx="8"/>
<text class="t" x="140.9" y="443.6" text-anchor="middle">מיזוג - האחריות שלכם</text>
</g>
</svg>
