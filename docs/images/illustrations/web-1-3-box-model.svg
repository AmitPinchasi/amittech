<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 617 220" width="617" role="img" aria-label="מודל הקופסה של CSS: כל אלמנט עטוף בארבע שכבות מבחוץ פנימה - margin, border, padding ו-content">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-lst-0{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c0{animation-name:k-lst-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-1{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c1{animation-name:k-lst-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-2{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c2{animation-name:k-lst-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-3{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-lst-c3{animation-name:k-lst-3;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}16.48%{transform:translateX(0.0px);}20.45%{transform:translateX(-116.0px);}36.93%{transform:translateX(-116.0px);}40.91%{transform:translateX(-232.0px);}57.39%{transform:translateX(-232.0px);}61.36%{transform:translateX(-348.0px);}77.84%{transform:translateX(-348.0px);}100.00%{transform:translateX(-348.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-role-0{opacity:0;}
@keyframes k-dyn-role-0{0.00%{opacity:1;}20.45%{opacity:1;}24.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-role-0{animation-name:k-dyn-role-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-role-1{opacity:0;}
@keyframes k-dyn-role-1{0.00%{opacity:0;}16.48%{opacity:0;}20.45%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-role-1{animation-name:k-dyn-role-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-role-2{opacity:0;}
@keyframes k-dyn-role-2{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-role-2{animation-name:k-dyn-role-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-role-3{opacity:1;}
@keyframes k-dyn-role-3{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-role-3{animation-name:k-dyn-role-3;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-lst">
<rect id="el-lst-c0" class="n-cell shp" x="364.0" y="16.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="412.0" y="44.0" text-anchor="middle" style="direction:ltr">margin</text>
<rect id="el-lst-c1" class="n-cell shp" x="248.0" y="16.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="296.0" y="44.0" text-anchor="middle" style="direction:ltr">border</text>
<rect id="el-lst-c2" class="n-cell shp" x="132.0" y="16.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.0" y="44.0" text-anchor="middle" style="direction:ltr">padding</text>
<rect id="el-lst-c3" class="n-cell shp" x="16.0" y="16.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="64.0" y="44.0" text-anchor="middle" style="direction:ltr">content</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="412.0,62.0 412.0,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="424.0" y="86.0" text-anchor="end">השכבה</text>
<g id="el-role">
<rect class="n-box shp" x="222.6" y="102.0" width="378.7" height="44.0" rx="8"/>
<text class="t-b dyn-role-0" x="412.0" y="129.0" text-anchor="middle">מרווח חיצוני - מפריד מאלמנטים אחרים</text>
<text class="t-b dyn-role-1" x="412.0" y="129.0" text-anchor="middle">מסגרת האלמנט</text>
<text class="t-b dyn-role-2" x="412.0" y="129.0" text-anchor="middle">מרווח פנימי - בין הגבול לתוכן</text>
<text class="t-b dyn-role-3" x="412.0" y="129.0" text-anchor="middle">התוכן עצמו - טקסט או תמונה</text>
</g>
</g>
<g id="el-note">
<text class="small" x="238.0" y="199.0" text-anchor="middle">כל אלמנט הוא קופסה עם ארבע שכבות, מבחוץ פנימה</text>
</g>
</svg>
