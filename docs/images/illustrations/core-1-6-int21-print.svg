<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 466 382" width="466" role="img" aria-label="אנימציה של הדפסת מחרוזת עם הפסיקה 21h: הרגיסטר dx מקבל את כתובת המחרוזת, ah בוחר את השירות, והפסיקה מדפיסה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-regs{0.00%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-regs .shp{animation-name:k-regs;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-instr{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-instr .shp{animation-name:k-instr;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-screen{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-screen .shp{animation-name:k-screen;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-instr-0{opacity:0;}
@keyframes k-dyn-instr-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-instr-0{animation-name:k-dyn-instr-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-instr-1{opacity:0;}
@keyframes k-dyn-instr-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-instr-1{animation-name:k-dyn-instr-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-instr-2{opacity:1;}
@keyframes k-dyn-instr-2{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-instr-2{animation-name:k-dyn-instr-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-regs-0{opacity:0;}
@keyframes k-dyn-regs-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-regs-0{animation-name:k-dyn-regs-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-regs-1{opacity:0;}
@keyframes k-dyn-regs-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-regs-1{animation-name:k-dyn-regs-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-regs-2{opacity:1;}
@keyframes k-dyn-regs-2{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-regs-2{animation-name:k-dyn-regs-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:1;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-screen-0{opacity:0;}
@keyframes k-dyn-screen-0{0.00%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-screen-0{animation-name:k-dyn-screen-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-screen-1{opacity:1;}
@keyframes k-dyn-screen-1{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-screen-1{animation-name:k-dyn-screen-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-instr">
<rect class="n-code-bg shp" x="133.8" y="16.0" width="198.5" height="38.0" rx="7"/>
<text class="code dyn-instr-0" x="233.0" y="43.0" text-anchor="middle">mov dx, offset msg</text>
<text class="code dyn-instr-1" x="233.0" y="43.0" text-anchor="middle">mov ah, 09h</text>
<text class="code dyn-instr-2" x="233.0" y="43.0" text-anchor="middle">int 21h</text>
</g>
<g id="el-regs">
<rect class="n-box shp" x="107.1" y="94.0" width="251.9" height="44.0" rx="8"/>
<text class="t-b dyn-regs-0" x="233.0" y="121.0" text-anchor="middle" style="direction:ltr">AH = ?, DX = ?</text>
<text class="t-b dyn-regs-1" x="233.0" y="121.0" text-anchor="middle" style="direction:ltr">DX = offset msg</text>
<text class="t-b dyn-regs-2" x="233.0" y="121.0" text-anchor="middle" style="direction:ltr">AH = 09h, DX = offset msg</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="40.0" y="178.0" width="386.0" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="233.0" y="206.0" text-anchor="middle">טוענים ל-dx את הכתובת של המחרוזת</text>
<text class="t dyn-note-1" x="233.0" y="206.0" text-anchor="middle">הערך ב-ah בוחר את השירות הרצוי</text>
<text class="t dyn-note-2" x="233.0" y="206.0" text-anchor="middle">הפסיקה מריצה את השירות של מערכת ההפעלה</text>
</g>
<g id="el-screen">
<rect class="n-box shp" x="158.2" y="264.0" width="149.7" height="44.0" rx="8"/>
<text class="t-b dyn-screen-0" x="233.0" y="291.0" text-anchor="middle">המסך ריק</text>
<text class="t-b dyn-screen-1" x="233.0" y="291.0" text-anchor="middle" style="direction:ltr">Hello World!</text>
</g>
<g id="el-cap">
<text class="small" x="233.0" y="361.0" text-anchor="middle">המחרוזת חייבת להסתיים בסימן דולר כדי שהשירות ידע היכן לעצור</text>
</g>
</svg>
