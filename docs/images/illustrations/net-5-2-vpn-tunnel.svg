<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 344 420" width="344" role="img" aria-label="אנימציה של מנהרת VPN: תעבורת העובד המרוחק הופכת ממוצפנת, עוברת דרך האינטרנט אל שרת ה-VPN שמאמת אותו, ואז ניתנת גישה למשאבים הפנימיים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-worker{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-worker .shp{animation-name:k-worker;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-enc{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-enc .shp{animation-name:k-enc;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-net{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-net .shp{animation-name:k-net;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-srv{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-srv .shp{animation-name:k-srv;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-res{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-res .shp{animation-name:k-res;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-enc-0{opacity:0;}
@keyframes k-dyn-enc-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-enc-0{animation-name:k-dyn-enc-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-enc-1{opacity:1;}
@keyframes k-dyn-enc-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-enc-1{animation-name:k-dyn-enc-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="172.2,62.0 172.2,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="172.2,146.0 172.2,186.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="172.2,232.0 172.2,272.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="172.2,318.0 172.2,358.0" marker-end="url(#arr)"/>
<g id="el-worker">
<rect class="n-box shp" x="39.9" y="16.0" width="264.8" height="46.0" rx="8"/>
<text class="t" x="172.2" y="44.0" text-anchor="middle">עובד מרוחק ב-Wi-Fi ציבורי</text>
</g>
<g id="el-enc">
<rect class="n-box shp" x="26.8" y="102.0" width="290.9" height="44.0" rx="8"/>
<text class="t-b dyn-enc-0" x="172.2" y="129.0" text-anchor="middle">התעבורה עדיין גלויה</text>
<text class="t-b dyn-enc-1" x="172.2" y="129.0" text-anchor="middle">התעבורה מוצפנת במנהרת VPN</text>
</g>
<g id="el-net">
<rect class="n-box shp" x="23.2" y="186.0" width="298.0" height="46.0" rx="8"/>
<text class="t" x="172.2" y="214.0" text-anchor="middle">מעבר דרך האינטרנט הלא מאובטח</text>
</g>
<g id="el-srv">
<rect class="n-box shp" x="24.6" y="272.0" width="295.3" height="46.0" rx="8"/>
<text class="t" x="172.2" y="300.0" text-anchor="middle">שרת VPN מפענח ומאמת את העובד</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="16.0" y="358.0" width="312.5" height="46.0" rx="8"/>
<text class="t" x="172.2" y="386.0" text-anchor="middle">גישה מאובטחת למשאבים הפנימיים</text>
</g>
</svg>
