@keyframes k-c2{0.00%{stroke-width:1.5;}42.81%{stroke-width:1.5;}45.00%{stroke:var(--pink);stroke-width:2.5;}56.25%{stroke:var(--pink);stroke-width:2.5;}58.44%{stroke-width:1.5;}65.31%{stroke-width:1.5;}67.50%{stroke:var(--pink);stroke-width:2.5;}78.75%{stroke:var(--pink);stroke-width:2.5;}80.94%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
