<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 414 480" width="414" role="img" aria-label="סדר טעינת דף בדפדפן: בניית עץ ה-DOM, אירוע DOMContentLoaded, טעינת משאבים ואירוע load">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-start{0.00%{stroke:var(--pink);stroke-width:2.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}20.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-start .shp{animation-name:k-start;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dom{0.00%{stroke-width:1.5;}13.02%{stroke-width:1.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}36.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-dom .shp{animation-name:k-dom;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dcl{0.00%{stroke-width:1.5;}29.69%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}53.65%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-dcl .shp{animation-name:k-dcl;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-res{0.00%{stroke-width:1.5;}46.35%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}70.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-res .shp{animation-name:k-res;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-load{0.00%{stroke-width:1.5;}63.02%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-load .shp{animation-name:k-load;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.02%{stroke-width:1.6;}16.67%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}36.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.69%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}53.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}46.35%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}66.67%{stroke:var(--pink);stroke-width:2.4;}70.31%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}63.02%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}83.33%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="170.1,62.0 170.1,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="170.1,148.0 170.1,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="184.1" y="172.0" text-anchor="end">סקריפטים עם defer רצים עכשיו</text>
<polyline id="edge-2" class="edge" points="170.1,234.0 170.1,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="170.1,320.0 170.1,360.0" marker-end="url(#arr)"/>
<g id="el-start">
<rect class="n-box shp" x="21.6" y="16.0" width="297.0" height="46.0" rx="8"/>
<text class="t" x="170.1" y="44.0" text-anchor="middle">הדפדפן מתחיל לקרוא את ה-HTML</text>
</g>
<g id="el-dom">
<rect class="n-box shp" x="58.6" y="102.0" width="223.1" height="46.0" rx="8"/>
<text class="t" x="170.1" y="130.0" text-anchor="middle">עץ ה-DOM נבנה במלואו</text>
</g>
<g id="el-dcl">
<rect class="n-box shp" x="27.0" y="188.0" width="286.3" height="46.0" rx="8"/>
<text class="t" x="170.1" y="216.0" text-anchor="middle">אירוע DOMContentLoaded נורה</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="29.3" y="274.0" width="281.6" height="46.0" rx="8"/>
<text class="t" x="170.1" y="302.0" text-anchor="middle">תמונות, CSS ופונטים נטענים</text>
</g>
<g id="el-load">
<rect class="n-box shp" x="82.4" y="360.0" width="175.4" height="46.0" rx="8"/>
<text class="t" x="170.1" y="388.0" text-anchor="middle">אירוע load נורה</text>
</g>
<g id="el-note">
<text class="small" x="170.1" y="459.0" text-anchor="middle">ברוב המקרים מספיק לחכות ל-DOMContentLoaded</text>
</g>
</svg>
