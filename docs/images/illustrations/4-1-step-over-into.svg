<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 259 332" width="259" role="img" aria-label="ההבדל בין step over לבין step into: מעל מדלג על גוף הפונקציה, אל נכנס פנימה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-mode{0.00%{stroke:var(--pink);stroke-width:2.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}15.23%{stroke-width:1.5;}34.77%{stroke-width:1.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}52.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-mode .shp{animation-name:k-mode;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-call{0.00%{stroke-width:1.5;}9.77%{stroke-width:1.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}27.73%{stroke-width:1.5;}47.27%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}65.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-after{0.00%{stroke-width:1.5;}22.27%{stroke-width:1.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}40.23%{stroke-width:1.5;}72.27%{stroke-width:1.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}87.50%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-after .shp{animation-name:k-after;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-body{0.00%{stroke-width:1.5;}59.77%{stroke-width:1.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}77.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-body .shp{animation-name:k-body;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-mode-0{opacity:0;}
@keyframes k-dyn-mode-0{0.00%{opacity:1;}37.50%{opacity:1;}40.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-mode-0{animation-name:k-dyn-mode-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-mode-1{opacity:1;}
@keyframes k-dyn-mode-1{0.00%{opacity:0;}34.77%{opacity:0;}37.50%{opacity:1;}87.50%{opacity:1;}100.00%{opacity:1;}}
.dyn-mode-1{animation-name:k-dyn-mode-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-mode">
<rect class="n-box shp" x="16.0" y="16.0" width="226.8" height="44.0" rx="8"/>
<text class="t-b dyn-mode-0" x="129.4" y="43.0" text-anchor="middle">לדרוך מעל - step over</text>
<text class="t-b dyn-mode-1" x="129.4" y="43.0" text-anchor="middle">להיכנס אל - step into</text>
</g>
<g id="el-body">
<rect class="n-code-bg shp" x="39.2" y="100.0" width="180.4" height="60.0" rx="7"/>
<text class="code" x="129.4" y="127.0" text-anchor="middle">def add(a, b):</text>
<text class="code" x="129.4" y="149.0" text-anchor="middle">    return a + b</text>
</g>
<g id="el-call">
<rect class="n-code-bg shp" x="30.1" y="200.0" width="198.5" height="38.0" rx="7"/>
<text class="code" x="129.4" y="227.0" text-anchor="middle">result = add(2, 3)</text>
</g>
<g id="el-after">
<rect class="n-code-bg shp" x="52.7" y="278.0" width="153.4" height="38.0" rx="7"/>
<text class="code" x="129.4" y="305.0" text-anchor="middle">print(result)</text>
</g>
</svg>
