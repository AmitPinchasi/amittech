<text class="code dyn-out-2" x="270.7" y="285.0" text-anchor="middle">0 | 10000001 | M</text>
<text class="code dyn-out-3" x="270.7" y="285.0" text-anchor="middle">0 | 10000001 | 10100000000000000000000</text>
</g>
<g id="el-note">
<text class="small" x="270.7" y="349.0" text-anchor="middle">ביט הסימן תופס ביט אחד, המעריך שמונה ביטים והמנטיסה עשרים ושלושה ביטים</text>
</g>
