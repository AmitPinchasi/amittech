<text class="code dyn-val-0" x="270.7" y="207.0" text-anchor="middle">110.1</text>
<text class="code dyn-val-1" x="270.7" y="207.0" text-anchor="middle">1.101 x 2^2</text>
<text class="code dyn-val-2" x="270.7" y="207.0" text-anchor="middle">S = 0</text>
<text class="code dyn-val-3" x="270.7" y="207.0" text-anchor="middle">E = 2 + 127 = 129 = 10000001</text>
<text class="code dyn-val-4" x="270.7" y="207.0" text-anchor="middle">M = 10100000000000000000000</text>
</g>
