</g>
<g id="el-stage">
<rect class="n-box shp" x="127.9" y="94.0" width="285.6" height="46.0" rx="8"/>
<text class="t dyn-stage-0" x="270.7" y="122.0" text-anchor="middle">המרה לבינארי</text>
<text class="t dyn-stage-1" x="270.7" y="122.0" text-anchor="middle">נרמול לצורה מדעית בבסיס 2</text>
