<text class="t-b dyn-mask-0" x="193.0" y="121.0" text-anchor="middle" style="direction:ltr">FLAG_READ | FLAG_WRITE = 0011</text>
<text class="t-b dyn-mask-1" x="193.0" y="121.0" text-anchor="middle" style="direction:ltr">FLAG_EXEC = 0100</text>
<text class="t-b dyn-mask-2" x="193.0" y="121.0" text-anchor="middle" style="direction:ltr">~FLAG_WRITE = 1101</text>
<text class="t-b dyn-mask-3" x="193.0" y="121.0" text-anchor="middle" style="direction:ltr">FLAG_READ = 0001</text>
</g>
