<text class="t dyn-res-0" x="193.0" y="290.0" text-anchor="middle">דגלי קריאה וכתיבה דלוקים</text>
<text class="t dyn-res-1" x="193.0" y="290.0" text-anchor="middle">נדלק גם דגל ההרצה</text>
