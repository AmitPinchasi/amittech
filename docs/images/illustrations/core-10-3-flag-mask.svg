<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="35.1" y="16.0" width="315.8" height="38.0" rx="7"/>
<text class="code dyn-code-0" x="193.0" y="43.0" text-anchor="middle">perms = FLAG_READ | FLAG_WRITE;</text>
<text class="code dyn-code-1" x="193.0" y="43.0" text-anchor="middle">perms |= FLAG_EXEC;</text>
<text class="code dyn-code-2" x="193.0" y="43.0" text-anchor="middle">perms &amp;= ~FLAG_WRITE;</text>
<text class="code dyn-code-3" x="193.0" y="43.0" text-anchor="middle">if (perms &amp; FLAG_READ)</text>
</g>
<g id="el-mask">
