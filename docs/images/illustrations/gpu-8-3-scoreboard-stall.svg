<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 632 290" width="632" role="img" aria-label="עצירת long scoreboard: ה-LDG מסמן את scoreboard 2, וה-IMAD חסום עליו עד שה-load חוזר מהזיכרון הגלובלי">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-ldg{0.00%{stroke:var(--pink);stroke-width:2.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}24.46%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ldg .shp{animation-name:k-ldg;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-imad{0.00%{stroke-width:1.5;}16.85%{stroke-width:1.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}45.11%{stroke-width:1.5;}58.15%{stroke-width:1.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-imad .shp{animation-name:k-imad;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sb-0{opacity:0;}
@keyframes k-dyn-sb-0{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-sb-0{animation-name:k-dyn-sb-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sb-1{opacity:0;}
@keyframes k-dyn-sb-1{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-sb-1{animation-name:k-dyn-sb-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sb-2{opacity:0;}
@keyframes k-dyn-sb-2{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-sb-2{animation-name:k-dyn-sb-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sb-3{opacity:0;}
@keyframes k-dyn-sb-3{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-sb-3{animation-name:k-dyn-sb-3;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sb-4{opacity:1;}
@keyframes k-dyn-sb-4{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-sb-4{animation-name:k-dyn-sb-4;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-ldg">
<rect class="n-code-bg shp" x="198.5" y="16.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="315.8" y="43.0" text-anchor="middle">LDG R0, [R2]      ; W2</text>
</g>
<g id="el-imad">
<rect class="n-code-bg shp" x="189.5" y="94.0" width="252.7" height="38.0" rx="7"/>
<text class="code" x="315.8" y="121.0" text-anchor="middle">IMAD R0, R0, R5   ; B--2</text>
</g>
<g id="el-sb">
<rect class="n-box shp" x="114.8" y="172.0" width="402.0" height="44.0" rx="8"/>
<text class="t-b dyn-sb-0" x="315.8" y="199.0" text-anchor="middle">scoreboard 2: פנוי</text>
<text class="t-b dyn-sb-1" x="315.8" y="199.0" text-anchor="middle">ה-LDG הונפק -&gt; scoreboard 2 תפוס (W2)</text>
<text class="t-b dyn-sb-2" x="315.8" y="199.0" text-anchor="middle">ה-IMAD חסום על scoreboard 2 (B--2) - תקוע</text>
<text class="t-b dyn-sb-3" x="315.8" y="199.0" text-anchor="middle">ה-load חזר מ-HBM -&gt; scoreboard 2 התנקה</text>
<text class="t-b dyn-sb-4" x="315.8" y="199.0" text-anchor="middle">ה-IMAD מונפק - ה-warp התקדם</text>
</g>
<g id="el-note">
<text class="small" x="315.8" y="269.0" text-anchor="middle">בזמן שה-IMAD ממתין, ה-warp אינו כשיר; warps אחרים ממלאים את החור ומסתירים את ה-latency</text>
</g>
</svg>
