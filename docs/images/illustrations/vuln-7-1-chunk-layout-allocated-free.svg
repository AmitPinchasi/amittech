.dyn-field2-1{opacity:1;}
@keyframes k-dyn-field2-1{0.00%{opacity:0;}29.46%{opacity:0;}35.71%{opacity:1;}71.43%{opacity:1;}100.00%{opacity:1;}}
.dyn-field2-1{animation-name:k-dyn-field2-1;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rest-0{opacity:0;}
@keyframes k-dyn-rest-0{0.00%{opacity:1;}35.71%{opacity:1;}41.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-rest-0{animation-name:k-dyn-rest-0;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rest-1{opacity:1;}
@keyframes k-dyn-rest-1{0.00%{opacity:0;}29.46%{opacity:0;}35.71%{opacity:1;}71.43%{opacity:1;}100.00%{opacity:1;}}
.dyn-rest-1{animation-name:k-dyn-rest-1;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
