<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 429 368" width="429" role="img" aria-label="פרמטר עם ערך דיפולטי: כשלא מעבירים ארגומנט, הפרמטר מקבל את ערך ברירת המחדל">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-def{0.00%{stroke:var(--pink);stroke-width:2.5;}24.59%{stroke:var(--pink);stroke-width:2.5;}30.33%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-def .shp{animation-name:k-def;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-explicit{0.00%{stroke-width:1.5;}18.85%{stroke-width:1.5;}24.59%{stroke:var(--pink);stroke-width:2.5;}49.18%{stroke:var(--pink);stroke-width:2.5;}54.92%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-explicit .shp{animation-name:k-explicit;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-val{0.00%{stroke-width:1.5;}18.85%{stroke-width:1.5;}24.59%{stroke:var(--pink);stroke-width:2.5;}73.77%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-val .shp{animation-name:k-val;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-implicit{0.00%{stroke-width:1.5;}43.44%{stroke-width:1.5;}49.18%{stroke:var(--pink);stroke-width:2.5;}73.77%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-implicit .shp{animation-name:k-implicit;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:1;}49.18%{opacity:1;}54.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:1;}
@keyframes k-dyn-val-1{0.00%{opacity:0;}43.44%{opacity:0;}49.18%{opacity:1;}73.77%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-def">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="397.1" height="38.0" rx="7"/>
<text class="code" x="214.5" y="43.0" text-anchor="middle">def send_message(message, author="You"):</text>
</g>
<g id="el-explicit">
<rect class="n-code-bg shp" x="61.1" y="94.0" width="306.8" height="38.0" rx="7"/>
<text class="code" x="214.5" y="121.0" text-anchor="middle">send_message("Hello!", "User")</text>
</g>
<g id="el-implicit">
<rect class="n-code-bg shp" x="97.2" y="172.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="214.5" y="199.0" text-anchor="middle">send_message("Hello!")</text>
</g>
<g id="el-val">
<rect class="n-box shp" x="138.1" y="250.0" width="153.0" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="214.5" y="277.0" text-anchor="middle" style="direction:ltr">author = User</text>
<text class="t-b dyn-val-1" x="214.5" y="277.0" text-anchor="middle" style="direction:ltr">author = You</text>
</g>
<g id="el-note">
<text class="small" x="214.5" y="347.0" text-anchor="middle">בלי ארגומנט שני author מקבל את ערך ברירת המחדל</text>
</g>
</svg>
