@keyframes k-takeover{0.00%{stroke-width:1.5;}75.35%{stroke-width:1.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}88.89%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-takeover .shp{animation-name:k-takeover;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.68%{stroke-width:1.6;}11.11%{stroke:var(--pink);stroke-width:2.4;}22.22%{stroke:var(--pink);stroke-width:2.4;}24.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
