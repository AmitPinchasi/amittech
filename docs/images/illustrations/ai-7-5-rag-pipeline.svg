<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 537 422" width="537" role="img" aria-label="צינור RAG: שאלת המשתמש הופכת לוקטור, מאחזרים מבסיס הנתונים הווקטורי את הקטעים הדומים לה, מזריקים אותם לתוך ה-context של ה-prompt, והמודל עונה על סמך הקטעים שאוחזרו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-q{0.00%{stroke:var(--pink);stroke-width:2.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}20.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-q .shp{animation-name:k-q;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-embed{0.00%{stroke-width:1.5;}13.37%{stroke-width:1.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}37.13%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-embed .shp{animation-name:k-embed;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-retrieve{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-retrieve .shp{animation-name:k-retrieve;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-store{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-store .shp{animation-name:k-store;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-augment{0.00%{stroke-width:1.5;}47.03%{stroke-width:1.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}70.79%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-augment .shp{animation-name:k-augment;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-generate{0.00%{stroke-width:1.5;}63.86%{stroke-width:1.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-generate .shp{animation-name:k-generate;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.37%{stroke-width:1.6;}16.83%{stroke:var(--pink);stroke-width:2.4;}33.66%{stroke:var(--pink);stroke-width:2.4;}37.13%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.20%{stroke-width:1.6;}33.66%{stroke:var(--pink);stroke-width:2.4;}50.50%{stroke:var(--pink);stroke-width:2.4;}53.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.20%{stroke-width:1.6;}33.66%{stroke:var(--pink);stroke-width:2.4;}50.50%{stroke:var(--pink);stroke-width:2.4;}53.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}47.03%{stroke-width:1.6;}50.50%{stroke:var(--pink);stroke-width:2.4;}67.33%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}63.86%{stroke-width:1.6;}67.33%{stroke:var(--pink);stroke-width:2.4;}84.16%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="135.1,62.0 135.1,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="135.1,148.0 135.1,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="149.1" y="172.0" text-anchor="end">וקטור שאלה</text>
<polyline id="edge-2" class="edge" points="245.0,211.0 311.0,211.0" marker-end="url(#arr)"/>
<text class="lbl" x="278.0" y="199.0" text-anchor="middle">חיפוש דמיון</text>
<polyline id="edge-3" class="edge" points="135.1,234.0 135.1,274.0" marker-end="url(#arr)"/>
<text class="lbl" x="149.1" y="258.0" text-anchor="end">קטעים רלוונטיים</text>
<polyline id="edge-4" class="edge" points="135.1,320.0 135.1,360.0" marker-end="url(#arr)"/>
<text class="lbl" x="149.1" y="344.0" text-anchor="end">context + שאלה</text>
<g id="el-q">
<rect class="n-box shp" x="61.9" y="16.0" width="146.5" height="46.0" rx="8"/>
<text class="t" x="135.1" y="44.0" text-anchor="middle">שאלת המשתמש</text>
</g>
<g id="el-embed">
<rect class="n-box shp" x="16.0" y="102.0" width="238.2" height="46.0" rx="8"/>
<text class="t" x="135.1" y="130.0" text-anchor="middle">המרה לוקטור - embedding</text>
</g>
<g id="el-retrieve">
<rect class="n-box shp" x="25.2" y="188.0" width="219.7" height="46.0" rx="8"/>
<text class="t" x="135.1" y="216.0" text-anchor="middle">אחזור הקטעים הדומים</text>
</g>
<g id="el-store">
<rect class="n-box shp" x="311.0" y="188.0" width="210.0" height="46.0" rx="8"/>
<text class="t" x="416.0" y="216.0" text-anchor="middle">בסיס נתונים וקטורי</text>
</g>
<g id="el-augment">
<rect class="n-box shp" x="21.4" y="274.0" width="227.5" height="46.0" rx="8"/>
<text class="t" x="135.1" y="302.0" text-anchor="middle">הזרקת הקטעים ל-prompt</text>
</g>
<g id="el-generate">
<rect class="n-box shp" x="30.1" y="360.0" width="210.0" height="46.0" rx="8"/>
<text class="t" x="135.1" y="388.0" text-anchor="middle">המודל עונה מהקטעים</text>
</g>
</svg>
