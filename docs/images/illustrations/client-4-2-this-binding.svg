<text class="code dyn-out-0" x="160.4" y="207.0" text-anchor="middle">Hello, I'm Alice</text>
<text class="code dyn-out-1" x="160.4" y="207.0" text-anchor="middle">Hello, I'm undefined</text>
<text class="code dyn-out-2" x="160.4" y="207.0" text-anchor="middle">Hello, I'm Alice</text>
</g>
