<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="160.4,54.0 160.4,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="174.4" y="78.0" text-anchor="end">מי קרא לפונקציה?</text>
<polyline id="edge-1" class="edge" points="160.4,140.0 160.4,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="174.4" y="164.0" text-anchor="end">הפלט</text>
<g id="el-call">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="288.8" height="38.0" rx="7"/>
<text class="code dyn-call-0" x="160.4" y="43.0" text-anchor="middle">alice.greet()</text>
<text class="code dyn-call-1" x="160.4" y="43.0" text-anchor="middle">const g = alice.greet; g()</text>
<text class="code dyn-call-2" x="160.4" y="43.0" text-anchor="middle">const b = g.bind(alice); b()</text>
</g>
<g id="el-th">
<rect class="n-box shp" x="75.7" y="94.0" width="169.3" height="46.0" rx="8"/>
<text class="t dyn-th-0" x="160.4" y="122.0" text-anchor="middle" style="direction:ltr">this = alice</text>
<text class="t dyn-th-1" x="160.4" y="122.0" text-anchor="middle" style="direction:ltr">this = undefined</text>
<text class="t dyn-th-2" x="160.4" y="122.0" text-anchor="middle" style="direction:ltr">this = alice</text>
</g>
