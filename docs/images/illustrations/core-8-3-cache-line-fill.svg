<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="238.5" y="16.0" width="144.3" height="38.0" rx="7"/>
<text class="code dyn-code-0" x="310.7" y="43.0" text-anchor="middle">read arr[0]</text>
<text class="code dyn-code-1" x="310.7" y="43.0" text-anchor="middle">read arr[1]</text>
<text class="code dyn-code-2" x="310.7" y="43.0" text-anchor="middle">read arr[2]</text>
<text class="code dyn-code-3" x="310.7" y="43.0" text-anchor="middle">read arr[16]</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="199.8" y="94.0" width="221.8" height="44.0" rx="8"/>
<text class="t-b dyn-res-0" x="310.7" y="121.0" text-anchor="middle" style="direction:ltr">miss</text>
<text class="t-b dyn-res-1" x="310.7" y="121.0" text-anchor="middle" style="direction:ltr">miss -&gt; load line</text>
<text class="t-b dyn-res-2" x="310.7" y="121.0" text-anchor="middle" style="direction:ltr">hit</text>
<text class="t-b dyn-res-3" x="310.7" y="121.0" text-anchor="middle" style="direction:ltr">hit</text>
<text class="t-b dyn-res-4" x="310.7" y="121.0" text-anchor="middle" style="direction:ltr">miss -&gt; load next line</text>
</g>
<g id="el-line">
<rect id="el-line-c0" class="n-hl shp" x="436.7" y="178.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="484.7" y="206.0" text-anchor="middle" style="direction:ltr">arr[0]</text>
<rect id="el-line-c1" class="n-cell shp" x="320.7" y="178.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="368.7" y="206.0" text-anchor="middle" style="direction:ltr">arr[1]</text>
<rect id="el-line-c2" class="n-cell shp" x="204.7" y="178.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="252.7" y="206.0" text-anchor="middle" style="direction:ltr">arr[2]</text>
<rect id="el-line-c3" class="n-cell shp" x="88.7" y="178.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="136.7" y="206.0" text-anchor="middle" style="direction:ltr">...</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="264.0" width="589.3" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="310.7" y="292.0" text-anchor="middle">הגישה הראשונה ל-arr[0] היא miss: השורה עדיין לא נמצאת ב-cache</text>
<text class="t dyn-note-1" x="310.7" y="292.0" text-anchor="middle">המעבד טוען שורה שלמה של 64 בתים, כלומר שישה עשר איברים בבת אחת</text>
<text class="t dyn-note-2" x="310.7" y="292.0" text-anchor="middle">הגישה ל-arr[1] היא כבר hit, כי הוא הובא יחד עם arr[0]</text>
<text class="t dyn-note-3" x="310.7" y="292.0" text-anchor="middle">גם arr[2] הוא hit, וכך כל האיברים שנטענו יחד</text>
<text class="t dyn-note-4" x="310.7" y="292.0" text-anchor="middle">רק בגישה ל-arr[16] נדרשת שורה חדשה, ושוב מתרחש miss יחיד</text>
</g>
<g id="el-cap">
<text class="small" x="310.7" y="363.0" text-anchor="middle">בזכות מקומיות מרחבית גישה רציפה למערך משלמת miss אחד לכל שישה עשר איברים בלבד</text>
</g>
</svg>
