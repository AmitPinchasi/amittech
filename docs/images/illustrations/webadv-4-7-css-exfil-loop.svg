<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 519 382" width="519" role="img" aria-label="אקספילטרציה סדרתית ב-CSS: בכל סבב סלקטור תואם קידומת ארוכה יותר של הטוקן, הדפדפן טוען URL לשרת התוקף, והמחרוזת שנחשפה גדלה תו אחר תו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-target{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-target .shp{animation-name:k-target;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sel{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-sel .shp{animation-name:k-sel;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-req{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-req .shp{animation-name:k-req;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sel-0{opacity:0;}
@keyframes k-dyn-sel-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-sel-0{animation-name:k-dyn-sel-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sel-1{opacity:0;}
@keyframes k-dyn-sel-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-sel-1{animation-name:k-dyn-sel-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sel-2{opacity:0;}
@keyframes k-dyn-sel-2{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-sel-2{animation-name:k-dyn-sel-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sel-3{opacity:1;}
@keyframes k-dyn-sel-3{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-sel-3{animation-name:k-dyn-sel-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-0{opacity:0;}
@keyframes k-dyn-req-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-req-0{animation-name:k-dyn-req-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-1{opacity:0;}
@keyframes k-dyn-req-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-req-1{animation-name:k-dyn-req-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-2{opacity:0;}
@keyframes k-dyn-req-2{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-req-2{animation-name:k-dyn-req-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-3{opacity:1;}
@keyframes k-dyn-req-3{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-req-3{animation-name:k-dyn-req-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="251.3,138.0 251.3,178.0" marker-end="url(#arr)"/>
<text class="lbl" x="263.3" y="162.0" text-anchor="end">הקידומת תואמת - הדפדפן טוען URL</text>
<polyline id="edge-1" class="edge" points="251.3,222.0 251.3,262.0" marker-end="url(#arr)"/>
<g id="el-target">
<rect class="n-code-bg shp" x="125.0" y="16.0" width="252.7" height="38.0" rx="7"/>
<text class="code" x="251.3" y="43.0" text-anchor="middle">hidden csrf value = a7f3</text>
</g>
<g id="el-sel">
<rect class="n-box shp" x="151.5" y="94.0" width="199.5" height="44.0" rx="8"/>
<text class="t-b dyn-sel-0" x="251.3" y="121.0" text-anchor="middle" style="direction:ltr">input[value^=a]</text>
<text class="t-b dyn-sel-1" x="251.3" y="121.0" text-anchor="middle" style="direction:ltr">input[value^=a7]</text>
<text class="t-b dyn-sel-2" x="251.3" y="121.0" text-anchor="middle" style="direction:ltr">input[value^=a7f]</text>
<text class="t-b dyn-sel-3" x="251.3" y="121.0" text-anchor="middle" style="direction:ltr">input[value^=a7f3]</text>
</g>
<g id="el-req">
<rect class="n-box shp" x="157.3" y="178.0" width="188.1" height="44.0" rx="8"/>
<text class="t-b dyn-req-0" x="251.3" y="205.0" text-anchor="middle" style="direction:ltr">url(/leak?p=a)</text>
<text class="t-b dyn-req-1" x="251.3" y="205.0" text-anchor="middle" style="direction:ltr">url(/leak?p=a7)</text>
<text class="t-b dyn-req-2" x="251.3" y="205.0" text-anchor="middle" style="direction:ltr">url(/leak?p=a7f)</text>
<text class="t-b dyn-req-3" x="251.3" y="205.0" text-anchor="middle" style="direction:ltr">url(/leak?p=a7f3)</text>
</g>
<g id="el-server">
<rect class="n-box shp" x="98.9" y="262.0" width="304.7" height="46.0" rx="8"/>
<text class="t" x="251.3" y="290.0" text-anchor="middle">שרת התוקף מחזיר import לתו הבא</text>
</g>
<g id="el-note">
<text class="small" x="251.3" y="361.0" text-anchor="middle">כל סבב חושף תו נוסף, והשרת מחזיר חוקים לתו הבא עד שהטוקן כולו דולף</text>
</g>
</svg>
