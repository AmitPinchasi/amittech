<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 371 632" width="371" role="img" aria-label="זרימת עבודה עם git מול agent: פותחים branch ייעודי, עובדים, בוחרים אילו קבצים נכנסים לstaging, סוקרים diff ומחפשים secrets, ורק אחרי אישור מפורש עושים commit ודוחפים לPR">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-branch{0.00%{stroke:var(--pink);stroke-width:2.5;}9.09%{stroke:var(--pink);stroke-width:2.5;}11.08%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-branch .shp{animation-name:k-branch;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-work{0.00%{stroke-width:1.5;}7.10%{stroke-width:1.5;}9.09%{stroke:var(--pink);stroke-width:2.5;}18.18%{stroke:var(--pink);stroke-width:2.5;}20.17%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-work .shp{animation-name:k-work;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-stage{0.00%{stroke-width:1.5;}16.19%{stroke-width:1.5;}18.18%{stroke:var(--pink);stroke-width:2.5;}27.27%{stroke:var(--pink);stroke-width:2.5;}29.26%{stroke-width:1.5;}43.47%{stroke-width:1.5;}45.45%{stroke:var(--pink);stroke-width:2.5;}54.55%{stroke:var(--pink);stroke-width:2.5;}56.53%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-stage .shp{animation-name:k-stage;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-diff{0.00%{stroke-width:1.5;}25.28%{stroke-width:1.5;}27.27%{stroke:var(--pink);stroke-width:2.5;}36.36%{stroke:var(--pink);stroke-width:2.5;}38.35%{stroke-width:1.5;}52.56%{stroke-width:1.5;}54.55%{stroke:var(--pink);stroke-width:2.5;}63.64%{stroke:var(--pink);stroke-width:2.5;}65.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-diff .shp{animation-name:k-diff;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-gate{0.00%{stroke-width:1.5;}34.38%{stroke-width:1.5;}36.36%{stroke:var(--pink);stroke-width:2.5;}45.45%{stroke:var(--pink);stroke-width:2.5;}47.44%{stroke-width:1.5;}61.65%{stroke-width:1.5;}63.64%{stroke:var(--pink);stroke-width:2.5;}72.73%{stroke:var(--pink);stroke-width:2.5;}74.72%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-gate .shp{animation-name:k-gate;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-commit{0.00%{stroke-width:1.5;}70.74%{stroke-width:1.5;}72.73%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}83.81%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-commit .shp{animation-name:k-commit;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-push{0.00%{stroke-width:1.5;}79.83%{stroke-width:1.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}90.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-push .shp{animation-name:k-push;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}7.10%{stroke-width:1.6;}9.09%{stroke:var(--pink);stroke-width:2.4;}18.18%{stroke:var(--pink);stroke-width:2.4;}20.17%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}16.19%{stroke-width:1.6;}18.18%{stroke:var(--pink);stroke-width:2.4;}27.27%{stroke:var(--pink);stroke-width:2.4;}29.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}25.28%{stroke-width:1.6;}27.27%{stroke:var(--pink);stroke-width:2.4;}36.36%{stroke:var(--pink);stroke-width:2.4;}38.35%{stroke-width:1.6;}52.56%{stroke-width:1.6;}54.55%{stroke:var(--pink);stroke-width:2.4;}63.64%{stroke:var(--pink);stroke-width:2.4;}65.62%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}34.38%{stroke-width:1.6;}36.36%{stroke:var(--pink);stroke-width:2.4;}45.45%{stroke:var(--pink);stroke-width:2.4;}47.44%{stroke-width:1.6;}61.65%{stroke-width:1.6;}63.64%{stroke:var(--pink);stroke-width:2.4;}72.73%{stroke:var(--pink);stroke-width:2.4;}74.72%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}43.47%{stroke-width:1.6;}45.45%{stroke:var(--pink);stroke-width:2.4;}54.55%{stroke:var(--pink);stroke-width:2.4;}56.53%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}70.74%{stroke-width:1.6;}72.73%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}83.81%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-5{animation-name:k-edge-5;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-6{0.00%{stroke-width:1.6;}79.83%{stroke-width:1.6;}81.82%{stroke:var(--pink);stroke-width:2.4;}90.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-6{animation-name:k-edge-6;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="225.4,62.0 225.4,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="225.4,148.0 225.4,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="225.4,234.0 225.4,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="225.4,320.0 225.4,360.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="145.4,402.0 16.0,402.0 16.0,211.0 115.3,211.0" marker-end="url(#arr)"/>
<text class="small" x="65.7" y="199.0" text-anchor="middle">לא - עדיין לא</text>
<polyline id="edge-5" class="edge" points="225.4,444.0 225.4,484.0" marker-end="url(#arr)"/>
<text class="lbl" x="239.4" y="468.0" text-anchor="end">כן</text>
<polyline id="edge-6" class="edge" points="225.4,530.0 225.4,570.0" marker-end="url(#arr)"/>
<g id="el-branch">
<rect class="n-box shp" x="119.5" y="16.0" width="211.7" height="46.0" rx="8"/>
<text class="t" x="225.4" y="44.0" text-anchor="middle">פתיחת branch ייעודי</text>
</g>
<g id="el-work">
<rect class="n-box shp" x="136.8" y="102.0" width="177.1" height="46.0" rx="8"/>
<text class="t" x="225.4" y="130.0" text-anchor="middle">עבודה על הפיצ'ר</text>
</g>
<g id="el-stage">
<rect class="n-box shp" x="115.3" y="188.0" width="220.1" height="46.0" rx="8"/>
<text class="t" x="225.4" y="216.0" text-anchor="middle">בחירת קבצים לstaging</text>
</g>
<g id="el-diff">
<rect class="n-box shp" x="96.0" y="274.0" width="258.7" height="46.0" rx="8"/>
<text class="t" x="225.4" y="302.0" text-anchor="middle">סקירת diff וחיפוש secrets</text>
</g>
<g id="el-gate">
<polygon class="n-dia shp" points="225.4,360.0 305.4,402.0 225.4,444.0 145.4,402.0"/>
<text class="t" x="225.4" y="407.0" text-anchor="middle">אישרתם?</text>
</g>
<g id="el-commit">
<rect class="n-box shp" x="101.7" y="484.0" width="247.3" height="46.0" rx="8"/>
<text class="t" x="225.4" y="512.0" text-anchor="middle">הודעת commit - למה השתנה</text>
</g>
<g id="el-push">
<rect class="n-box shp" x="134.3" y="570.0" width="182.1" height="46.0" rx="8"/>
<text class="t" x="225.4" y="598.0" text-anchor="middle">דחיפה ופתיחת PR</text>
</g>
</svg>
