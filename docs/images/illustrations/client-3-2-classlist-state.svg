<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 214" width="400" role="img" aria-label="קריאות classList משנות את רשימת המחלקות של אלמנט: add מוסיף, toggle מוסיף ומסיר לסירוגין">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-op{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-op .shp{animation-name:k-op;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-el{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-el .shp{animation-name:k-el;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}40.73%{stroke-width:1.6;}43.55%{stroke:var(--pink);stroke-width:2.4;}58.06%{stroke:var(--pink);stroke-width:2.4;}60.89%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-0{opacity:0;}
@keyframes k-dyn-op-0{0.00%{opacity:1;}29.03%{opacity:1;}31.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-op-0{animation-name:k-dyn-op-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-1{opacity:0;}
@keyframes k-dyn-op-1{0.00%{opacity:0;}26.21%{opacity:0;}29.03%{opacity:1;}58.06%{opacity:1;}60.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-op-1{animation-name:k-dyn-op-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-2{opacity:1;}
@keyframes k-dyn-op-2{0.00%{opacity:0;}55.24%{opacity:0;}58.06%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-op-2{animation-name:k-dyn-op-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-el-0{opacity:0;}
@keyframes k-dyn-el-0{0.00%{opacity:1;}14.52%{opacity:1;}17.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-el-0{animation-name:k-dyn-el-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-el-1{opacity:0;}
@keyframes k-dyn-el-1{0.00%{opacity:0;}11.69%{opacity:0;}14.52%{opacity:1;}43.55%{opacity:1;}46.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-el-1{animation-name:k-dyn-el-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-el-2{opacity:0;}
@keyframes k-dyn-el-2{0.00%{opacity:0;}40.73%{opacity:0;}43.55%{opacity:1;}72.58%{opacity:1;}75.40%{opacity:0;}100.00%{opacity:0;}}
.dyn-el-2{animation-name:k-dyn-el-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-el-3{opacity:1;}
@keyframes k-dyn-el-3{0.00%{opacity:0;}69.76%{opacity:0;}72.58%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-el-3{animation-name:k-dyn-el-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="200.1,54.0 200.1,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="214.1" y="78.0" text-anchor="end">משנה את האלמנט</text>
<g id="el-op">
<rect class="n-code-bg shp" x="46.7" y="16.0" width="306.8" height="38.0" rx="7"/>
<text class="code dyn-op-0" x="200.1" y="43.0" text-anchor="middle">box.classList.add("active")</text>
<text class="code dyn-op-1" x="200.1" y="43.0" text-anchor="middle">box.classList.toggle("active")</text>
<text class="code dyn-op-2" x="200.1" y="43.0" text-anchor="middle">box.classList.toggle("active")</text>
</g>
<g id="el-el">
<rect class="n-box shp" x="82.3" y="94.0" width="235.5" height="46.0" rx="8"/>
<text class="t dyn-el-0" x="200.1" y="122.0" text-anchor="middle" style="direction:ltr">&lt;div class="card"&gt;</text>
<text class="t dyn-el-1" x="200.1" y="122.0" text-anchor="middle" style="direction:ltr">&lt;div class="card active"&gt;</text>
<text class="t dyn-el-2" x="200.1" y="122.0" text-anchor="middle" style="direction:ltr">&lt;div class="card"&gt;</text>
<text class="t dyn-el-3" x="200.1" y="122.0" text-anchor="middle" style="direction:ltr">&lt;div class="card active"&gt;</text>
</g>
<g id="el-note">
<text class="small" x="200.1" y="193.0" text-anchor="middle">העיצוב מוגדר ב-CSS, ומ-JavaScript רק מחליפים מחלקות</text>
</g>
</svg>
