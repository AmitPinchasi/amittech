<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 631 276" width="631" role="img" aria-label="אנימציה של שלבי יצירת ה-hash בפרוטוקול LM: הסיסמה הופכת לאותיות גדולות, מושלמת ל-14 תווים, מחולקת לשני חצאים ומוצפנת ב-DES עד לקבלת hash של 16 בתים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-step{0.00%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-step .shp{animation-name:k-step;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-val{0.00%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-val .shp{animation-name:k-val;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-step-0{opacity:0;}
@keyframes k-dyn-step-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-step-0{animation-name:k-dyn-step-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-step-1{opacity:0;}
@keyframes k-dyn-step-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-step-1{animation-name:k-dyn-step-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-step-2{opacity:0;}
@keyframes k-dyn-step-2{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-step-2{animation-name:k-dyn-step-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-step-3{opacity:0;}
@keyframes k-dyn-step-3{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-step-3{animation-name:k-dyn-step-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-step-4{opacity:1;}
@keyframes k-dyn-step-4{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-step-4{animation-name:k-dyn-step-4;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:0;}
@keyframes k-dyn-val-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-2{opacity:0;}
@keyframes k-dyn-val-2{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-2{animation-name:k-dyn-val-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-3{opacity:0;}
@keyframes k-dyn-val-3{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-3{animation-name:k-dyn-val-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-4{opacity:1;}
@keyframes k-dyn-val-4{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-4{animation-name:k-dyn-val-4;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-cap">
<text class="small" x="315.4" y="29.0" text-anchor="middle">פרוטוקול LM מעבד את הסיסמה בכמה שלבים קבועים לפני שהוא שולח אותה כ-hash</text>
</g>
<g id="el-step">
<rect class="n-box shp" x="79.6" y="74.0" width="471.6" height="44.0" rx="8"/>
<text class="t-b dyn-step-0" x="315.4" y="101.0" text-anchor="middle">הסיסמה המקורית שהוזנה</text>
<text class="t-b dyn-step-1" x="315.4" y="101.0" text-anchor="middle">שלב 1 - הפיכת כל התווים לאותיות גדולות</text>
<text class="t-b dyn-step-2" x="315.4" y="101.0" text-anchor="middle">שלב 2 - השלמה או חיתוך ל-14 תווים</text>
<text class="t-b dyn-step-3" x="315.4" y="101.0" text-anchor="middle">שלב 3 - חלוקה לשני חצאים של 7 תווים והצפנת DES</text>
<text class="t-b dyn-step-4" x="315.4" y="101.0" text-anchor="middle">שלב 4 - hash סופי באורך 16 בתים</text>
</g>
<g id="el-val">
<rect class="n-box shp" x="115.6" y="158.0" width="399.5" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="315.4" y="185.0" text-anchor="middle" style="direction:ltr">Pa$$w0rd</text>
<text class="t-b dyn-val-1" x="315.4" y="185.0" text-anchor="middle" style="direction:ltr">PA$$W0RD</text>
<text class="t-b dyn-val-2" x="315.4" y="185.0" text-anchor="middle" style="direction:ltr">PA$$W0RD______</text>
<text class="t-b dyn-val-3" x="315.4" y="185.0" text-anchor="middle" style="direction:ltr">PA$$W0R + D______</text>
<text class="t-b dyn-val-4" x="315.4" y="185.0" text-anchor="middle" style="direction:ltr">E52CAC67419A9A224A3B108F3FA6CB6D</text>
</g>
<g id="el-note">
<text class="small" x="315.4" y="255.0" text-anchor="middle">אותיות גדולות בלבד, אורך קבוע והצפנת DES חלשה הופכים את ה-hash של LM לקל מאוד לפיצוח</text>
</g>
</svg>
