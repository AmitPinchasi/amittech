<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 510 419" width="510" role="img" aria-label="המילה השמורה global: הפונקציה משנה משתנה גלובלי והשינוי נשאר גם אחרי שהיא מסתיימת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-g{0.00%{stroke:var(--pink);stroke-width:2.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}17.41%{stroke-width:1.5;}39.73%{stroke-width:1.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}60.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-g .shp{animation-name:k-g;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-call{0.00%{stroke-width:1.5;}11.16%{stroke-width:1.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}31.70%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-body{0.00%{stroke-width:1.5;}25.45%{stroke-width:1.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}45.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-body .shp{animation-name:k-body;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}54.02%{stroke-width:1.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}74.55%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-out .shp{animation-name:k-out;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-res{0.00%{stroke-width:1.5;}68.30%{stroke-width:1.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}85.71%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-res .shp{animation-name:k-res;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.16%{stroke-width:1.6;}14.29%{stroke:var(--pink);stroke-width:2.4;}28.57%{stroke:var(--pink);stroke-width:2.4;}31.70%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.45%{stroke-width:1.6;}28.57%{stroke:var(--pink);stroke-width:2.4;}42.86%{stroke:var(--pink);stroke-width:2.4;}45.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}39.73%{stroke-width:1.6;}42.86%{stroke:var(--pink);stroke-width:2.4;}57.14%{stroke:var(--pink);stroke-width:2.4;}60.27%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}54.02%{stroke-width:1.6;}57.14%{stroke:var(--pink);stroke-width:2.4;}71.43%{stroke:var(--pink);stroke-width:2.4;}74.55%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}68.30%{stroke-width:1.6;}71.43%{stroke:var(--pink);stroke-width:2.4;}85.71%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-g-0{opacity:0;}
@keyframes k-dyn-g-0{0.00%{opacity:1;}42.86%{opacity:1;}45.98%{opacity:0;}100.00%{opacity:0;}}
.dyn-g-0{animation-name:k-dyn-g-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-g-1{opacity:1;}
@keyframes k-dyn-g-1{0.00%{opacity:0;}39.73%{opacity:0;}42.86%{opacity:1;}85.71%{opacity:1;}100.00%{opacity:1;}}
.dyn-g-1{animation-name:k-dyn-g-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="295.2,61.0 295.2,101.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="295.2,139.0 295.2,179.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="200.5,209.0 16.0,209.0 16.0,42.0 209.5,42.0" marker-end="url(#arr)"/>
<text class="small" x="112.8" y="30.0" text-anchor="middle">משנה את הגלובלי</text>
<polyline id="edge-3" class="edge" points="295.2,239.0 295.2,279.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="295.2,317.0 295.2,357.0" marker-end="url(#arr)"/>
<g id="el-g">
<rect class="n-code-bg shp" x="209.5" y="23.0" width="171.4" height="38.0" rx="7"/>
<text class="code dyn-g-0" x="295.2" y="50.0" text-anchor="middle">global_var = 10</text>
<text class="code dyn-g-1" x="295.2" y="50.0" text-anchor="middle">global_var = 12</text>
</g>
<g id="el-call">
<rect class="n-code-bg shp" x="196.0" y="101.0" width="198.5" height="38.0" rx="7"/>
<text class="code" x="295.2" y="128.0" text-anchor="middle">example_function()</text>
</g>
<g id="el-body">
<rect class="n-code-bg shp" x="200.5" y="179.0" width="189.5" height="60.0" rx="7"/>
<text class="code" x="295.2" y="206.0" text-anchor="middle">global global_var</text>
<text class="code" x="295.2" y="228.0" text-anchor="middle">global_var += 2</text>
</g>
<g id="el-out">
<rect class="n-code-bg shp" x="200.5" y="279.0" width="189.5" height="38.0" rx="7"/>
<text class="code" x="295.2" y="306.0" text-anchor="middle">print(global_var)</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="96.0" y="357.0" width="398.5" height="46.0" rx="8"/>
<text class="t" x="295.2" y="385.0" text-anchor="middle">מדפיס 12 - הפונקציה שינתה משתנה שמחוץ לה</text>
</g>
</svg>
