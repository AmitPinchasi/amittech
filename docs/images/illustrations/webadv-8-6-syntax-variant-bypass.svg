<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 736 567" width="736" role="img" aria-label="עקיפה בתחביר חלופי: ה-regex של ה-WAF מחפש דפוס מדויק ולא מתאים לגרסה עם הערות וערבוב אותיות, בעוד מנוע ה-SQL מפרסר את הגמישות התחבירית ומריץ את ההזרקה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-inp{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inp .shp{animation-name:k-inp;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-wafq{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-wafq .shp{animation-name:k-wafq;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-db{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-db .shp{animation-name:k-db;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-exec{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-exec .shp{animation-name:k-exec;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}40.91%{stroke:var(--pink);stroke-width:2.4;}44.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}36.93%{stroke-width:1.6;}40.91%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="286.8,54.0 286.8,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="514.1,207.7 580.1,207.7" marker-end="url(#arr)"/>
<text class="lbl" x="547.1" y="195.7" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="286.8,321.3 286.8,361.3" marker-end="url(#arr)"/>
<text class="lbl" x="300.8" y="345.3" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="286.8,407.3 286.8,447.3" marker-end="url(#arr)"/>
<g id="el-inp">
<rect class="n-code-bg shp" x="160.5" y="16.0" width="252.7" height="38.0" rx="7"/>
<text class="code" x="286.8" y="43.0" text-anchor="middle">1' uNiOn/**/SeLeCt pwd--</text>
</g>
<g id="el-wafq">
<polygon class="n-dia shp" points="286.8,94.0 514.1,207.7 286.8,321.3 59.5,207.7"/>
<text class="t" x="286.8" y="212.7" text-anchor="middle">תואם regex 'union select'?</text>
</g>
<g id="el-block">
<rect class="n-box shp" x="580.1" y="184.7" width="140.1" height="46.0" rx="8"/>
<text class="t" x="650.1" y="212.7" text-anchor="middle">חסימה - 403</text>
</g>
<g id="el-db">
<rect class="n-box shp" x="156.3" y="361.3" width="261.1" height="46.0" rx="8"/>
<text class="t" x="286.8" y="389.3" text-anchor="middle">מנוע SQL מנרמל את התחביר</text>
</g>
<g id="el-exec">
<rect class="n-box shp" x="118.8" y="447.3" width="336.0" height="46.0" rx="8"/>
<text class="t" x="286.8" y="475.3" text-anchor="middle">מריץ UNION SELECT - הזרקה מצליחה</text>
</g>
<g id="el-note">
<text class="small" x="286.8" y="546.3" text-anchor="middle">הלקח ההגנתי: מודל חיובי מתיר רק תחביר מוכר, במקום לחסום רשימת דפוסים ידועים</text>
</g>
</svg>
