<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 371 498" width="371" role="img" aria-label="כיצד ASP.NET מגיש דף: הדפדפן מבקש קובץ ASPX, השרת מריץ את Page_Load בקוד ה-C# שמעדכן את טקסט הרכיב, ורק ה-HTML הסופי חוזר ללקוח">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-proc{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}27.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-proc .shp{animation-name:k-proc;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-load{0.00%{stroke-width:1.5;}22.89%{stroke-width:1.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-load .shp{animation-name:k-load;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-label{0.00%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-label .shp{animation-name:k-label;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-html{0.00%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-html .shp{animation-name:k-html;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-browser{0.00%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-browser .shp{animation-name:k-browser;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.21%{stroke-width:1.6;}12.68%{stroke:var(--pink);stroke-width:2.4;}25.35%{stroke:var(--pink);stroke-width:2.4;}27.82%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.89%{stroke-width:1.6;}25.35%{stroke:var(--pink);stroke-width:2.4;}38.03%{stroke:var(--pink);stroke-width:2.4;}40.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}35.56%{stroke-width:1.6;}38.03%{stroke:var(--pink);stroke-width:2.4;}50.70%{stroke:var(--pink);stroke-width:2.4;}53.17%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}60.92%{stroke-width:1.6;}63.38%{stroke:var(--pink);stroke-width:2.4;}76.06%{stroke:var(--pink);stroke-width:2.4;}78.52%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-label-0{opacity:0;}
@keyframes k-dyn-label-0{0.00%{opacity:1;}50.70%{opacity:1;}53.17%{opacity:0;}100.00%{opacity:0;}}
.dyn-label-0{animation-name:k-dyn-label-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-label-1{opacity:1;}
@keyframes k-dyn-label-1{0.00%{opacity:0;}48.24%{opacity:0;}50.70%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-label-1{animation-name:k-dyn-label-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="185.5,54.0 185.5,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="199.5" y="78.0" text-anchor="end">בקשה מהדפדפן</text>
<polyline id="edge-1" class="edge" points="185.5,140.0 185.5,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="185.5,226.0 185.5,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="199.5" y="250.0" text-anchor="end">הקוד מעדכן טקסט</text>
<polyline id="edge-3" class="edge" points="185.5,310.0 185.5,350.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="185.5,396.0 185.5,436.0" marker-end="url(#arr)"/>
<g id="el-req">
<rect class="n-code-bg shp" x="90.8" y="16.0" width="189.5" height="38.0" rx="7"/>
<text class="code" x="185.5" y="43.0" text-anchor="middle">GET /Default.aspx</text>
</g>
<g id="el-proc">
<rect class="n-box shp" x="66.2" y="94.0" width="238.5" height="46.0" rx="8"/>
<text class="t" x="185.5" y="122.0" text-anchor="middle">השרת מעבד את דף ה-ASPX</text>
</g>
<g id="el-load">
<rect class="n-box shp" x="73.4" y="180.0" width="224.1" height="46.0" rx="8"/>
<text class="t" x="185.5" y="208.0" text-anchor="middle">Page_Load רץ בצד השרת</text>
</g>
<g id="el-label">
<rect class="n-box shp" x="16.0" y="266.0" width="339.0" height="44.0" rx="8"/>
<text class="t-b dyn-label-0" x="185.5" y="293.0" text-anchor="middle" style="direction:ltr">lblMessage = 'Hello World!'</text>
<text class="t-b dyn-label-1" x="185.5" y="293.0" text-anchor="middle" style="direction:ltr">lblMessage = 'Welcome to ASP.NET!'</text>
</g>
<g id="el-html">
<rect class="n-box shp" x="66.4" y="350.0" width="238.2" height="46.0" rx="8"/>
<text class="t" x="185.5" y="378.0" text-anchor="middle">הרכיבים הופכים ל-HTML</text>
</g>
<g id="el-browser">
<rect class="n-box shp" x="82.8" y="436.0" width="205.3" height="46.0" rx="8"/>
<text class="t" x="185.5" y="464.0" text-anchor="middle">הדפדפן מציג את הדף</text>
</g>
</svg>
