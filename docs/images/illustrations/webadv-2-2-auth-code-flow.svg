<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 399 608" width="399" role="img" aria-label="זרימת Authorization Code ב-OAuth 2.0: המשתמש מאשר אצל שרת ההרשאה, האפליקציה מקבלת code ומחליפה אותו בטוקן בבקשת צד-שרת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
