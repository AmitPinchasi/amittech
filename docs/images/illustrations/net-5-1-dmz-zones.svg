<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 351 480" width="351" role="img" aria-label="תרשים שכבות אמון: האינטרנט הלא מהימן מגיע דרך Firewall חיצוני ל-DMZ שמארח שרתי Web ו-Mail, ורק דרך Firewall פנימי אפשר להגיע לרשת הפנימית">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="175.4,62.0 175.4,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="175.4,148.0 175.4,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="175.4,234.0 175.4,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="175.4,320.0 175.4,360.0" marker-end="url(#arr)"/>
<g id="el-inet">
<rect class="n-box shp" x="74.6" y="16.0" width="201.6" height="46.0" rx="8"/>
<text class="t" x="175.4" y="44.0" text-anchor="middle">אינטרנט - לא מהימן</text>
</g>
<g id="el-fw1">
<rect class="n-box shp" x="87.1" y="102.0" width="176.7" height="46.0" rx="8"/>
<text class="t" x="175.4" y="130.0" text-anchor="middle">Firewall חיצוני</text>
</g>
<g id="el-dmz">
<rect class="n-box shp" x="65.9" y="188.0" width="219.1" height="46.0" rx="8"/>
<text class="t" x="175.4" y="216.0" text-anchor="middle">DMZ - שרתי Web ו-Mail</text>
</g>
<g id="el-fw2">
<rect class="n-box shp" x="91.9" y="274.0" width="167.0" height="46.0" rx="8"/>
<text class="t" x="175.4" y="302.0" text-anchor="middle">Firewall פנימי</text>
</g>
<g id="el-lan">
<rect class="n-box shp" x="16.0" y="360.0" width="318.8" height="46.0" rx="8"/>
<text class="t" x="175.4" y="388.0" text-anchor="middle">רשת פנימית - מסדי נתונים וקבצים</text>
</g>
<g id="el-note">
<text class="small" x="175.4" y="459.0" text-anchor="middle">גם אם ה-DMZ נפרץ, הרשת הפנימית נשארת מוגנת</text>
</g>
</svg>
