<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 597 507" width="597" role="img" aria-label="בדיקת גבולות חסרה בבלאקגק: הימור שלילי עובר את התנאי ומגדיל את היתרה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-bet{0.00%{stroke:var(--pink);stroke-width:2.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}20.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-bet .shp{animation-name:k-bet;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-chk{0.00%{stroke-width:1.5;}13.37%{stroke-width:1.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}37.13%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-chk .shp{animation-name:k-chk;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-accept{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-accept .shp{animation-name:k-accept;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-calc{0.00%{stroke-width:1.5;}47.03%{stroke-width:1.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}70.79%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-calc .shp{animation-name:k-calc;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-result{0.00%{stroke-width:1.5;}63.86%{stroke-width:1.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-result .shp{animation-name:k-result;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.37%{stroke-width:1.6;}16.83%{stroke:var(--pink);stroke-width:2.4;}33.66%{stroke:var(--pink);stroke-width:2.4;}37.13%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.20%{stroke-width:1.6;}33.66%{stroke:var(--pink);stroke-width:2.4;}50.50%{stroke:var(--pink);stroke-width:2.4;}53.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}47.03%{stroke-width:1.6;}50.50%{stroke:var(--pink);stroke-width:2.4;}67.33%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}63.86%{stroke-width:1.6;}67.33%{stroke:var(--pink);stroke-width:2.4;}84.16%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-chk-0{opacity:0;}
@keyframes k-dyn-chk-0{0.00%{opacity:1;}16.83%{opacity:1;}20.30%{opacity:0;}100.00%{opacity:0;}}
.dyn-chk-0{animation-name:k-dyn-chk-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-chk-1{opacity:1;}
@keyframes k-dyn-chk-1{0.00%{opacity:0;}13.37%{opacity:0;}16.83%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-chk-1{animation-name:k-dyn-chk-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-calc-0{opacity:0;}
@keyframes k-dyn-calc-0{0.00%{opacity:1;}50.50%{opacity:1;}53.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-calc-0{animation-name:k-dyn-calc-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-calc-1{opacity:1;}
@keyframes k-dyn-calc-1{0.00%{opacity:0;}47.03%{opacity:0;}50.50%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-calc-1{animation-name:k-dyn-calc-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="155.0,62.0 155.0,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="294.0,171.5 360.0,171.5" marker-end="url(#arr)"/>
<text class="lbl" x="327.0" y="159.5" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="155.0,241.0 155.0,281.0" marker-end="url(#arr)"/>
<text class="lbl" x="169.0" y="265.0" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="155.0,327.0 155.0,367.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="155.0,405.0 155.0,445.0" marker-end="url(#arr)"/>
<g id="el-bet">
<rect class="n-box shp" x="72.9" y="16.0" width="164.3" height="46.0" rx="8"/>
<text class="t" x="155.0" y="44.0" text-anchor="middle" style="direction:ltr">bet = -1000000</text>
</g>
<g id="el-chk">
<polygon class="n-dia shp" points="155.0,102.0 294.0,171.5 155.0,241.0 16.0,171.5"/>
<text class="code dyn-chk-0" x="155.0" y="176.5" text-anchor="middle">bet &gt; cash</text>
<text class="code dyn-chk-1" x="155.0" y="176.5" text-anchor="middle">-1000000 &gt; 500</text>
</g>
<g id="el-reject">
<rect class="n-box shp" x="360.0" y="148.5" width="221.1" height="46.0" rx="8"/>
<text class="t" x="470.6" y="176.5" text-anchor="middle">נדחה: הימור גדול מדי</text>
</g>
<g id="el-accept">
<rect class="n-box shp" x="45.2" y="281.0" width="219.7" height="46.0" rx="8"/>
<text class="t" x="155.0" y="309.0" text-anchor="middle">ההימור השלילי מתקבל</text>
</g>
<g id="el-calc">
<rect class="n-code-bg shp" x="33.2" y="367.0" width="243.6" height="38.0" rx="7"/>
<text class="code dyn-calc-0" x="155.0" y="394.0" text-anchor="middle">cash = cash - bet</text>
<text class="code dyn-calc-1" x="155.0" y="394.0" text-anchor="middle">cash = 500 - (-1000000)</text>
</g>
<g id="el-result">
<rect class="n-box shp" x="34.9" y="445.0" width="240.2" height="46.0" rx="8"/>
<text class="t" x="155.0" y="473.0" text-anchor="middle">היתרה קופצת ל-1000500</text>
</g>
</svg>
