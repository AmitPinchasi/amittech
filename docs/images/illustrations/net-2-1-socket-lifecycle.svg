<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 312 576" width="312" role="img" aria-label="מחזור החיים של סוקט TCP: השרת מאזין, הלקוח מתחבר, והם מחליפים ping request ו-ping reply">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-srv{0.00%{stroke:var(--pink);stroke-width:2.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}15.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-srv .shp{animation-name:k-srv;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-accept{0.00%{stroke-width:1.5;}9.77%{stroke-width:1.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}27.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-accept .shp{animation-name:k-accept;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-client{0.00%{stroke-width:1.5;}22.27%{stroke-width:1.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}40.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-client .shp{animation-name:k-client;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-conn{0.00%{stroke-width:1.5;}34.77%{stroke-width:1.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}52.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-conn .shp{animation-name:k-conn;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-req{0.00%{stroke-width:1.5;}47.27%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}65.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-rep{0.00%{stroke-width:1.5;}59.77%{stroke-width:1.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}77.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-rep .shp{animation-name:k-rep;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}72.27%{stroke-width:1.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}87.50%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.77%{stroke-width:1.6;}12.50%{stroke:var(--pink);stroke-width:2.4;}25.00%{stroke:var(--pink);stroke-width:2.4;}27.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.27%{stroke-width:1.6;}25.00%{stroke:var(--pink);stroke-width:2.4;}37.50%{stroke:var(--pink);stroke-width:2.4;}40.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}34.77%{stroke-width:1.6;}37.50%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}52.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}47.27%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}62.50%{stroke:var(--pink);stroke-width:2.4;}65.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}59.77%{stroke-width:1.6;}62.50%{stroke:var(--pink);stroke-width:2.4;}75.00%{stroke:var(--pink);stroke-width:2.4;}77.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}72.27%{stroke-width:1.6;}75.00%{stroke:var(--pink);stroke-width:2.4;}87.50%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-0{opacity:0;}
@keyframes k-dyn-out-0{0.00%{opacity:1;}75.00%{opacity:1;}77.73%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-0{animation-name:k-dyn-out-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-1{opacity:1;}
@keyframes k-dyn-out-1{0.00%{opacity:0;}72.27%{opacity:0;}75.00%{opacity:1;}87.50%{opacity:1;}100.00%{opacity:1;}}
.dyn-out-1{animation-name:k-dyn-out-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="155.9,62.0 155.9,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="155.9,148.0 155.9,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="155.9,234.0 155.9,274.0" marker-end="url(#arr)"/>
<text class="lbl" x="169.9" y="258.0" text-anchor="end" style="direction:ltr">connect</text>
<polyline id="edge-3" class="edge" points="155.9,320.0 155.9,360.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="155.9,398.0 155.9,438.0" marker-end="url(#arr)"/>
<text class="lbl" x="169.9" y="422.0" text-anchor="end">השרת מקבל ומשיב</text>
<polyline id="edge-5" class="edge" points="155.9,476.0 155.9,516.0" marker-end="url(#arr)"/>
<g id="el-srv">
<rect class="n-box shp" x="30.5" y="16.0" width="250.6" height="46.0" rx="8"/>
<text class="t" x="155.9" y="44.0" text-anchor="middle">השרת: socket, bind, listen</text>
</g>
<g id="el-accept">
<rect class="n-box shp" x="19.5" y="102.0" width="272.8" height="46.0" rx="8"/>
<text class="t" x="155.9" y="130.0" text-anchor="middle">השרת: accept - ממתין לחיבור</text>
</g>
<g id="el-client">
<rect class="n-box shp" x="43.8" y="188.0" width="224.1" height="46.0" rx="8"/>
<text class="t" x="155.9" y="216.0" text-anchor="middle">הלקוח: socket, connect</text>
</g>
<g id="el-conn">
<rect class="n-box shp" x="58.4" y="274.0" width="194.9" height="46.0" rx="8"/>
<text class="t" x="155.9" y="302.0" text-anchor="middle">החיבור נוצר (TCP)</text>
</g>
<g id="el-req">
<rect class="n-code-bg shp" x="29.5" y="360.0" width="252.7" height="38.0" rx="7"/>
<text class="code" x="155.9" y="387.0" text-anchor="middle">sendall(b'ping request')</text>
</g>
<g id="el-rep">
<rect class="n-code-bg shp" x="16.0" y="438.0" width="279.7" height="38.0" rx="7"/>
<text class="code" x="155.9" y="465.0" text-anchor="middle">conn.sendall(b'ping reply')</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="48.0" y="516.0" width="215.7" height="44.0" rx="8"/>
<text class="t-b dyn-out-0" x="155.9" y="543.0" text-anchor="middle">recv(1024) ממתין</text>
<text class="t-b dyn-out-1" x="155.9" y="543.0" text-anchor="middle" style="direction:ltr">Received: ping reply</text>
</g>
</svg>
