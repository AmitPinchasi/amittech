@keyframes k-impl{0.00%{stroke-width:1.5;}25.45%{stroke-width:1.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}45.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
