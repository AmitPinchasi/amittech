@keyframes k-green{0.00%{stroke-width:1.5;}39.73%{stroke-width:1.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}60.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-green .shp{animation-name:k-green;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-refactor{0.00%{stroke-width:1.5;}54.02%{stroke-width:1.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}74.55%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-refactor .shp{animation-name:k-refactor;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
