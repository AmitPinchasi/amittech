<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 424 278" width="424" role="img" aria-label="שינוי קונטקסט: מעבד עם ליבה אחת עובר במהירות בין שני threads ומריץ שורה מכל אחד לסירוגין, כך שנראה כאילו הם רצים במקביל">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-threads-0{0.00%{stroke:var(--pink);stroke-width:2.5;}19.74%{stroke:var(--pink);stroke-width:2.5;}24.34%{stroke-width:1.5;}34.87%{stroke-width:1.5;}39.47%{stroke:var(--pink);stroke-width:2.5;}59.21%{stroke:var(--pink);stroke-width:2.5;}63.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-threads-c0{animation-name:k-threads-0;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-threads-1{0.00%{stroke-width:1.5;}15.13%{stroke-width:1.5;}19.74%{stroke:var(--pink);stroke-width:2.5;}39.47%{stroke:var(--pink);stroke-width:2.5;}44.08%{stroke-width:1.5;}54.61%{stroke-width:1.5;}59.21%{stroke:var(--pink);stroke-width:2.5;}78.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-threads-c1{animation-name:k-threads-1;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-core-0{opacity:0;}
@keyframes k-dyn-core-0{0.00%{opacity:1;}19.74%{opacity:1;}24.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-core-0{animation-name:k-dyn-core-0;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-core-1{opacity:0;}
@keyframes k-dyn-core-1{0.00%{opacity:0;}15.13%{opacity:0;}19.74%{opacity:1;}39.47%{opacity:1;}44.08%{opacity:0;}100.00%{opacity:0;}}
.dyn-core-1{animation-name:k-dyn-core-1;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-core-2{opacity:0;}
@keyframes k-dyn-core-2{0.00%{opacity:0;}34.87%{opacity:0;}39.47%{opacity:1;}59.21%{opacity:1;}63.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-core-2{animation-name:k-dyn-core-2;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-core-3{opacity:1;}
@keyframes k-dyn-core-3{0.00%{opacity:0;}54.61%{opacity:0;}59.21%{opacity:1;}78.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-core-3{animation-name:k-dyn-core-3;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="212.2,120.0 212.2,160.0" marker-end="url(#arr)"/>
<g id="el-caption">
<text class="small" x="212.2" y="29.0" text-anchor="middle">מעבד עם ליבה אחת מריץ שני threads</text>
</g>
<g id="el-threads">
<rect id="el-threads-c0" class="n-cell shp" x="222.2" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="270.2" y="102.0" text-anchor="middle" style="direction:ltr">Thread A</text>
<rect id="el-threads-c1" class="n-cell shp" x="106.2" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="154.2" y="102.0" text-anchor="middle" style="direction:ltr">Thread B</text>
</g>
<g id="el-core">
<rect class="n-box shp" x="85.0" y="160.0" width="254.4" height="44.0" rx="8"/>
<text class="t-b dyn-core-0" x="212.2" y="187.0" text-anchor="middle">רץ כעת - Thread A שורה 1</text>
<text class="t-b dyn-core-1" x="212.2" y="187.0" text-anchor="middle">רץ כעת - Thread B שורה 1</text>
<text class="t-b dyn-core-2" x="212.2" y="187.0" text-anchor="middle">רץ כעת - Thread A שורה 2</text>
<text class="t-b dyn-core-3" x="212.2" y="187.0" text-anchor="middle">רץ כעת - Thread B שורה 2</text>
</g>
<g id="el-note">
<text class="small" x="212.2" y="257.0" text-anchor="middle">המעבד עובר מהר בין ה-threads כך שנראה כאילו רצים במקביל</text>
</g>
</svg>
