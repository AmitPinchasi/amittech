<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 544 491" width="544" role="img" aria-label="עץ החלטה לעקיפת חסימת אינטרוספקציה: אם __type נחסם עוברים ל-GET ואז לרמזי שדות משגיאות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
