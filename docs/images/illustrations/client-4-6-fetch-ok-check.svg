<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 659 479" width="659" role="img" aria-label="fetch לא זורק שגיאה על תשובת 404, ולכן חובה לבדוק את response.ok לפני פענוח גוף התשובה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-fetch{0.00%{stroke:var(--pink);stroke-width:2.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}20.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fetch .shp{animation-name:k-fetch;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-got{0.00%{stroke-width:1.5;}13.37%{stroke-width:1.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}37.13%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-got .shp{animation-name:k-got;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-throw{0.00%{stroke-width:1.5;}47.03%{stroke-width:1.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}70.79%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-throw .shp{animation-name:k-throw;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-catch{0.00%{stroke-width:1.5;}63.86%{stroke-width:1.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-catch .shp{animation-name:k-catch;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.37%{stroke-width:1.6;}16.83%{stroke:var(--pink);stroke-width:2.4;}33.66%{stroke:var(--pink);stroke-width:2.4;}37.13%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.20%{stroke-width:1.6;}33.66%{stroke:var(--pink);stroke-width:2.4;}50.50%{stroke:var(--pink);stroke-width:2.4;}53.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}47.03%{stroke-width:1.6;}50.50%{stroke:var(--pink);stroke-width:2.4;}67.33%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}63.86%{stroke-width:1.6;}67.33%{stroke:var(--pink);stroke-width:2.4;}84.16%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-got-0{opacity:0;}
@keyframes k-dyn-got-0{0.00%{opacity:1;}16.83%{opacity:1;}20.30%{opacity:0;}100.00%{opacity:0;}}
.dyn-got-0{animation-name:k-dyn-got-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-got-1{opacity:1;}
@keyframes k-dyn-got-1{0.00%{opacity:0;}13.37%{opacity:0;}16.83%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-got-1{animation-name:k-dyn-got-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="172.4,54.0 172.4,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="172.4,140.0 172.4,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="291.6,239.6 357.6,239.6" marker-end="url(#arr)"/>
<text class="lbl" x="324.6" y="227.6" text-anchor="middle">כן - 200 עד 299</text>
<polyline id="edge-3" class="edge" points="172.4,299.2 172.4,339.2" marker-end="url(#arr)"/>
<text class="lbl" x="186.4" y="323.2" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="172.4,377.2 172.4,417.2" marker-end="url(#arr)"/>
<g id="el-fetch">
<rect class="n-code-bg shp" x="82.2" y="16.0" width="180.4" height="38.0" rx="7"/>
<text class="code" x="172.4" y="43.0" text-anchor="middle">await fetch(url)</text>
</g>
<g id="el-got">
<rect class="n-box shp" x="16.0" y="94.0" width="312.8" height="46.0" rx="8"/>
<text class="t dyn-got-0" x="172.4" y="122.0" text-anchor="middle">התקבלה תשובה מהשרת - status 200</text>
<text class="t dyn-got-1" x="172.4" y="122.0" text-anchor="middle">התקבלה תשובה מהשרת - status 404</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="172.4,180.0 291.6,239.6 172.4,299.2 53.2,239.6"/>
<text class="code" x="172.4" y="244.6" text-anchor="middle">response.ok?</text>
</g>
<g id="el-parse">
<rect class="n-box shp" x="357.6" y="216.6" width="285.9" height="46.0" rx="8"/>
<text class="t" x="500.5" y="244.6" text-anchor="middle">מפענחים JSON ומחזירים מידע</text>
</g>
<g id="el-throw">
<rect class="n-code-bg shp" x="50.6" y="339.2" width="243.6" height="38.0" rx="7"/>
<text class="code" x="172.4" y="366.2" text-anchor="middle">throw new Error(status)</text>
</g>
<g id="el-catch">
<rect class="n-box shp" x="55.5" y="417.2" width="233.8" height="46.0" rx="8"/>
<text class="t" x="172.4" y="445.2" text-anchor="middle">ה-catch תופס את השגיאה</text>
</g>
</svg>
