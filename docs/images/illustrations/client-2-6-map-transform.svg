<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 400" width="460" role="img" aria-label="המתודה map מריצה את הפונקציה על כל איבר ובונה מערך חדש מהתוצאות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}15.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-0{0.00%{stroke-width:1.5;}10.00%{stroke-width:1.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}27.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c0{animation-name:k-lst-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cb{0.00%{stroke-width:1.5;}10.00%{stroke-width:1.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}27.78%{stroke-width:1.5;}35.19%{stroke-width:1.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}52.96%{stroke-width:1.5;}60.37%{stroke-width:1.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}78.15%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cb .shp{animation-name:k-cb;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-res{0.00%{stroke-width:1.5;}22.59%{stroke-width:1.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}40.37%{stroke-width:1.5;}47.78%{stroke-width:1.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}65.56%{stroke-width:1.5;}72.96%{stroke-width:1.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}88.15%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-res .shp{animation-name:k-res;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-1{0.00%{stroke-width:1.5;}35.19%{stroke-width:1.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}52.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c1{animation-name:k-lst-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-2{0.00%{stroke-width:1.5;}60.37%{stroke-width:1.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}78.15%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c2{animation-name:k-lst-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}10.00%{transform:translateX(0.0px);}12.59%{transform:translateX(0.0px);}22.59%{transform:translateX(0.0px);}25.19%{transform:translateX(0.0px);}35.19%{transform:translateX(0.0px);}37.78%{transform:translateX(-116.0px);}47.78%{transform:translateX(-116.0px);}50.37%{transform:translateX(-116.0px);}60.37%{transform:translateX(-116.0px);}62.96%{transform:translateX(-232.0px);}72.96%{transform:translateX(-232.0px);}75.56%{transform:translateX(-232.0px);}85.56%{transform:translateX(-232.0px);}100.00%{transform:translateX(-232.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cb-0{opacity:0;}
@keyframes k-dyn-cb-0{0.00%{opacity:1;}12.59%{opacity:1;}15.19%{opacity:0;}100.00%{opacity:0;}}
.dyn-cb-0{animation-name:k-dyn-cb-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cb-1{opacity:0;}
@keyframes k-dyn-cb-1{0.00%{opacity:0;}10.00%{opacity:0;}12.59%{opacity:1;}37.78%{opacity:1;}40.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-cb-1{animation-name:k-dyn-cb-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cb-2{opacity:0;}
@keyframes k-dyn-cb-2{0.00%{opacity:0;}35.19%{opacity:0;}37.78%{opacity:1;}62.96%{opacity:1;}65.56%{opacity:0;}100.00%{opacity:0;}}
.dyn-cb-2{animation-name:k-dyn-cb-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cb-3{opacity:1;}
@keyframes k-dyn-cb-3{0.00%{opacity:0;}60.37%{opacity:0;}62.96%{opacity:1;}88.15%{opacity:1;}100.00%{opacity:1;}}
.dyn-cb-3{animation-name:k-dyn-cb-3;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}25.19%{opacity:1;}27.78%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-1{opacity:0;}
@keyframes k-dyn-res-1{0.00%{opacity:0;}22.59%{opacity:0;}25.19%{opacity:1;}50.37%{opacity:1;}52.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-2{opacity:0;}
@keyframes k-dyn-res-2{0.00%{opacity:0;}47.78%{opacity:0;}50.37%{opacity:1;}75.56%{opacity:1;}78.15%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-2{animation-name:k-dyn-res-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-3{opacity:1;}
@keyframes k-dyn-res-3{0.00%{opacity:0;}72.96%{opacity:0;}75.56%{opacity:1;}88.15%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-3{animation-name:k-dyn-res-3;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="406.1" height="38.0" rx="7"/>
<text class="code" x="219.1" y="43.0" text-anchor="middle">const doubled = numbers.map((n) =&gt; n * 2)</text>
</g>
<g id="el-lst">
<rect id="el-lst-c0" class="n-cell shp" x="287.1" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="335.1" y="106.0" text-anchor="middle" style="direction:ltr">0</text>
<text class="t" x="335.1" y="140.0" text-anchor="middle" style="direction:ltr">1</text>
<rect id="el-lst-c1" class="n-cell shp" x="171.1" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="219.1" y="106.0" text-anchor="middle" style="direction:ltr">1</text>
<text class="t" x="219.1" y="140.0" text-anchor="middle" style="direction:ltr">2</text>
<rect id="el-lst-c2" class="n-cell shp" x="55.1" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="103.1" y="106.0" text-anchor="middle" style="direction:ltr">2</text>
<text class="t" x="103.1" y="140.0" text-anchor="middle" style="direction:ltr">3</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="335.1,158.0 335.1,198.0" marker-end="url(#arr)"/>
<text class="lbl" x="347.1" y="182.0" text-anchor="end">האיבר הנוכחי</text>
<g id="el-cb">
<rect class="n-box shp" x="279.2" y="198.0" width="111.7" height="44.0" rx="8"/>
<text class="t-b dyn-cb-0" x="335.1" y="225.0" text-anchor="middle" style="direction:ltr">n * 2</text>
<text class="t-b dyn-cb-1" x="335.1" y="225.0" text-anchor="middle" style="direction:ltr">1 * 2 = 2</text>
<text class="t-b dyn-cb-2" x="335.1" y="225.0" text-anchor="middle" style="direction:ltr">2 * 2 = 4</text>
<text class="t-b dyn-cb-3" x="335.1" y="225.0" text-anchor="middle" style="direction:ltr">3 * 2 = 6</text>
</g>
</g>
<g id="el-res">
<rect class="n-box shp" x="122.2" y="282.0" width="193.8" height="44.0" rx="8"/>
<text class="t-b dyn-res-0" x="219.1" y="309.0" text-anchor="middle" style="direction:ltr">doubled = []</text>
<text class="t-b dyn-res-1" x="219.1" y="309.0" text-anchor="middle" style="direction:ltr">doubled = [2]</text>
<text class="t-b dyn-res-2" x="219.1" y="309.0" text-anchor="middle" style="direction:ltr">doubled = [2, 4]</text>
<text class="t-b dyn-res-3" x="219.1" y="309.0" text-anchor="middle" style="direction:ltr">doubled = [2, 4, 6]</text>
</g>
<g id="el-note">
<text class="small" x="219.1" y="379.0" text-anchor="middle">המערך המקורי לא משתנה, התוצאות נאספות למערך חדש</text>
</g>
</svg>
