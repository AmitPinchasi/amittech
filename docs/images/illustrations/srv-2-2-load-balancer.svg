<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 242" width="360" role="img" aria-label="Load Balancer בסקיילינג אופקי: אותה בקשה חוזרת מתחלקת בתורנות בין כמה instances זהים של EC2 כדי לפזר את העומס">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}15.23%{stroke-width:1.5;}34.77%{stroke-width:1.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}52.73%{stroke-width:1.5;}59.77%{stroke-width:1.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}77.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lb{0.00%{stroke-width:1.5;}9.77%{stroke-width:1.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}27.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lb .shp{animation-name:k-lb;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-inst-0{0.00%{stroke-width:1.5;}22.27%{stroke-width:1.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}40.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inst-c0{animation-name:k-inst-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-inst-1{0.00%{stroke-width:1.5;}47.27%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}65.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inst-c1{animation-name:k-inst-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-inst-2{0.00%{stroke-width:1.5;}72.27%{stroke-width:1.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}87.50%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-inst-c2{animation-name:k-inst-2;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.77%{stroke-width:1.6;}12.50%{stroke:var(--pink);stroke-width:2.4;}25.00%{stroke:var(--pink);stroke-width:2.4;}27.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.27%{stroke-width:1.6;}25.00%{stroke:var(--pink);stroke-width:2.4;}37.50%{stroke:var(--pink);stroke-width:2.4;}40.23%{stroke-width:1.6;}47.27%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}62.50%{stroke:var(--pink);stroke-width:2.4;}65.23%{stroke-width:1.6;}72.27%{stroke-width:1.6;}75.00%{stroke:var(--pink);stroke-width:2.4;}87.50%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-0{opacity:0;}
@keyframes k-dyn-req-0{0.00%{opacity:1;}37.50%{opacity:1;}40.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-req-0{animation-name:k-dyn-req-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-1{opacity:0;}
@keyframes k-dyn-req-1{0.00%{opacity:0;}34.77%{opacity:0;}37.50%{opacity:1;}62.50%{opacity:1;}65.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-req-1{animation-name:k-dyn-req-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-2{opacity:1;}
@keyframes k-dyn-req-2{0.00%{opacity:0;}59.77%{opacity:0;}62.50%{opacity:1;}87.50%{opacity:1;}100.00%{opacity:1;}}
.dyn-req-2{animation-name:k-dyn-req-2;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="180.0,54.0 180.0,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="180.0,140.0 180.0,180.0" marker-end="url(#arr)"/>
<g id="el-req">
<rect class="n-code-bg shp" x="116.9" y="16.0" width="126.3" height="38.0" rx="7"/>
<text class="code dyn-req-0" x="180.0" y="43.0" text-anchor="middle">request #1</text>
<text class="code dyn-req-1" x="180.0" y="43.0" text-anchor="middle">request #2</text>
<text class="code dyn-req-2" x="180.0" y="43.0" text-anchor="middle">request #3</text>
</g>
<g id="el-lb">
<rect class="n-box shp" x="59.0" y="94.0" width="241.9" height="46.0" rx="8"/>
<text class="t" x="180.0" y="122.0" text-anchor="middle">Load Balancer מפזר עומס</text>
</g>
<g id="el-inst">
<rect id="el-inst-c0" class="n-cell shp" x="248.0" y="180.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="296.0" y="208.0" text-anchor="middle" style="direction:ltr">EC2 #1</text>
<rect id="el-inst-c1" class="n-cell shp" x="132.0" y="180.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.0" y="208.0" text-anchor="middle" style="direction:ltr">EC2 #2</text>
<rect id="el-inst-c2" class="n-cell shp" x="16.0" y="180.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="64.0" y="208.0" text-anchor="middle" style="direction:ltr">EC2 #3</text>
</g>
</svg>
