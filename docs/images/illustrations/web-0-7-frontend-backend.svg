@keyframes k-done{0.00%{stroke-width:1.5;}72.27%{stroke-width:1.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}87.50%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-done .shp{animation-name:k-done;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.77%{stroke-width:1.6;}12.50%{stroke:var(--pink);stroke-width:2.4;}25.00%{stroke:var(--pink);stroke-width:2.4;}27.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.27%{stroke-width:1.6;}25.00%{stroke:var(--pink);stroke-width:2.4;}37.50%{stroke:var(--pink);stroke-width:2.4;}40.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}34.77%{stroke-width:1.6;}37.50%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}52.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}47.27%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}62.50%{stroke:var(--pink);stroke-width:2.4;}65.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}59.77%{stroke-width:1.6;}62.50%{stroke:var(--pink);stroke-width:2.4;}75.00%{stroke:var(--pink);stroke-width:2.4;}77.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}72.27%{stroke-width:1.6;}75.00%{stroke:var(--pink);stroke-width:2.4;}87.50%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="156.4,62.0 156.4,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="170.4" y="86.0" text-anchor="end">בקשת הדף</text>
<polyline id="edge-1" class="edge" points="156.4,148.0 156.4,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="156.4,234.0 156.4,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="156.4,320.0 156.4,360.0" marker-end="url(#arr)"/>
