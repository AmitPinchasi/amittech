<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 495 657" width="495" role="img" aria-label="מעקב אחר בקשת HTTP בארכיטקטורה שכבתית: הבקשה עוברת מרouter לcontroller לservice, ואז פעולה כבדה נדחפת לתור worker אסינכרוני בזמן שהמסלול הרגיל ממשיך לPrisma ולPostgreSQL">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
