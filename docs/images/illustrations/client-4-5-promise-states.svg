<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 539 643" width="539" role="img" aria-label="שלושת המצבים של Promise: מתחיל ב-pending ועובר פעם אחת בלבד ל-fulfilled או ל-rejected">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-new{0.00%{stroke:var(--pink);stroke-width:2.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}20.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-new .shp{animation-name:k-new;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pending{0.00%{stroke-width:1.5;}13.02%{stroke-width:1.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}36.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pending .shp{animation-name:k-pending;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}29.69%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}53.65%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ful{0.00%{stroke-width:1.5;}46.35%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}70.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ful .shp{animation-name:k-ful;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-then{0.00%{stroke-width:1.5;}63.02%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-then .shp{animation-name:k-then;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.02%{stroke-width:1.6;}16.67%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}36.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.69%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}53.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}46.35%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}66.67%{stroke:var(--pink);stroke-width:2.4;}70.31%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}63.02%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}83.33%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="175.3,54.0 175.3,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="175.3,140.0 175.3,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="175.3,339.3 175.3,425.3" marker-end="url(#arr)"/>
<text class="lbl" x="189.3" y="386.3" text-anchor="end" style="direction:ltr">resolve</text>
<polyline id="edge-3" class="edge" points="334.6,259.6 422.6,259.6 422.6,339.3" marker-end="url(#arr)"/>
<text class="lbl" x="378.6" y="247.6" text-anchor="middle" style="direction:ltr">reject</text>
<polyline id="edge-4" class="edge" points="175.3,471.3 175.3,511.3" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="422.6,385.3 422.6,608.3 242.9,608.3" marker-end="url(#arr)"/>
<g id="el-new">
<rect class="n-code-bg shp" x="85.1" y="16.0" width="180.4" height="38.0" rx="7"/>
<text class="code" x="175.3" y="43.0" text-anchor="middle">new Promise(...)</text>
</g>
<g id="el-pending">
<rect class="n-box shp" x="91.5" y="94.0" width="167.6" height="46.0" rx="8"/>
<text class="t" x="175.3" y="122.0" text-anchor="middle">pending - ממתין</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="175.3,180.0 334.6,259.6 175.3,339.3 16.0,259.6"/>
<text class="t" x="175.3" y="264.6" text-anchor="middle">resolve או reject?</text>
</g>
<g id="el-ful">
<rect class="n-box shp" x="70.8" y="425.3" width="209.0" height="46.0" rx="8"/>
<text class="t" x="175.3" y="453.3" text-anchor="middle">fulfilled - יש תוצאה</text>
</g>
<g id="el-rej">
<rect class="n-box shp" x="322.3" y="339.3" width="200.6" height="46.0" rx="8"/>
<text class="t" x="422.6" y="367.3" text-anchor="middle">rejected - יש שגיאה</text>
</g>
<g id="el-then">
<rect class="n-code-bg shp" x="112.2" y="511.3" width="126.3" height="38.0" rx="7"/>
<text class="code" x="175.3" y="538.3" text-anchor="middle">.then() רץ</text>
</g>
<g id="el-catch">
<rect class="n-code-bg shp" x="107.6" y="589.3" width="135.3" height="38.0" rx="7"/>
<text class="code" x="175.3" y="616.3" text-anchor="middle">.catch() רץ</text>
</g>
</svg>
