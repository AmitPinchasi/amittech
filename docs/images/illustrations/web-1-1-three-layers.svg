<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 525 220" width="525" role="img" aria-label="שלושת המרכיבים של אתר: HTML הוא השלד, CSS הוא העיצוב ו-JavaScript הוא ההתנהגות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-lst-0{0.00%{stroke:var(--pink);stroke-width:2.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}30.71%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c0{animation-name:k-lst-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-1{0.00%{stroke-width:1.5;}20.71%{stroke-width:1.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}56.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c1{animation-name:k-lst-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-2{0.00%{stroke-width:1.5;}46.43%{stroke-width:1.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-lst-c2{animation-name:k-lst-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}20.71%{transform:translateX(0.0px);}25.71%{transform:translateX(-136.0px);}46.43%{transform:translateX(-136.0px);}51.43%{transform:translateX(-272.1px);}72.14%{transform:translateX(-272.1px);}100.00%{transform:translateX(-272.1px);}}
#eg-0{animation-name:k-mv-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-role-0{opacity:0;}
@keyframes k-dyn-role-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-role-0{animation-name:k-dyn-role-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-role-1{opacity:0;}
@keyframes k-dyn-role-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-role-1{animation-name:k-dyn-role-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-role-2{opacity:1;}
@keyframes k-dyn-role-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-role-2{animation-name:k-dyn-role-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-lst">
<rect id="el-lst-c0" class="n-cell shp" x="288.1" y="16.0" width="116.0" height="46.0" rx="6"/>
<text class="t" x="346.1" y="44.0" text-anchor="middle" style="direction:ltr">HTML</text>
<rect id="el-lst-c1" class="n-cell shp" x="152.0" y="16.0" width="116.0" height="46.0" rx="6"/>
<text class="t" x="210.0" y="44.0" text-anchor="middle" style="direction:ltr">CSS</text>
<rect id="el-lst-c2" class="n-cell shp" x="16.0" y="16.0" width="116.0" height="46.0" rx="6"/>
<text class="t" x="74.0" y="44.0" text-anchor="middle" style="direction:ltr">JavaScript</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="346.1,62.0 346.1,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="358.1" y="86.0" text-anchor="end">התפקיד</text>
<g id="el-role">
<rect class="n-box shp" x="182.9" y="102.0" width="326.4" height="44.0" rx="8"/>
<text class="t-b dyn-role-0" x="346.1" y="129.0" text-anchor="middle">השלד - מבנה הדף והתוכן</text>
<text class="t-b dyn-role-1" x="346.1" y="129.0" text-anchor="middle">העור - צבעים, גופנים ופריסה</text>
<text class="t-b dyn-role-2" x="346.1" y="129.0" text-anchor="middle">השרירים - התנהגות ואינטראקציה</text>
</g>
</g>
<g id="el-note">
<text class="small" x="210.0" y="199.0" text-anchor="middle">כל אתר בנוי משלושת המרכיבים יחד</text>
</g>
</svg>
