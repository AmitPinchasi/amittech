<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="278.9,62.0 278.9,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="278.9,148.0 278.9,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="278.9,234.0 278.9,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="278.9,356.0 278.9,396.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="278.9,442.0 278.9,482.0" marker-end="url(#arr)"/>
