<polyline id="edge-7" class="edge" points="278.9,728.0 278.9,768.0" marker-end="url(#arr)"/>
<g id="el-bios">
<rect class="n-box shp" x="64.7" y="16.0" width="428.4" height="46.0" rx="8"/>
<text class="t" x="278.9" y="44.0" text-anchor="middle">המחשב נדלק והמעבד מריץ את ה-BIOS ב-Real Mode</text>
</g>
<g id="el-mbr">
<rect class="n-box shp" x="16.0" y="102.0" width="525.8" height="46.0" rx="8"/>
<text class="t" x="278.9" y="130.0" text-anchor="middle">ה-BIOS טוען 512 בתים מהדיסק לכתובת 0x7C00 וקופץ אליהם</text>
</g>
<g id="el-loader">
<rect class="n-box shp" x="77.5" y="188.0" width="402.8" height="46.0" rx="8"/>
<text class="t" x="278.9" y="216.0" text-anchor="middle">ה-bootloader טוען את הקרנל מהדיסק לזיכרון</text>
</g>
<g id="el-pm">
<rect class="n-code-bg shp" x="197.7" y="274.0" width="162.4" height="82.0" rx="7"/>
<text class="code" x="278.9" y="301.0" text-anchor="middle">lgdt [gdt_ptr]</text>
<text class="code" x="278.9" y="323.0" text-anchor="middle">or eax, 1</text>
<text class="code" x="278.9" y="345.0" text-anchor="middle">mov cr0, eax</text>
</g>
<g id="el-init">
<rect class="n-box shp" x="41.5" y="396.0" width="474.8" height="46.0" rx="8"/>
<text class="t" x="278.9" y="424.0" text-anchor="middle">הקרנל מאתחל את ה-IDT, את ה-TSS ואת טבלאות ה-paging</text>
</g>
<g id="el-pg">
<rect class="n-code-bg shp" x="179.7" y="482.0" width="198.5" height="82.0" rx="7"/>
<text class="code" x="278.9" y="509.0" text-anchor="middle">mov cr3, eax</text>
<text class="code" x="278.9" y="531.0" text-anchor="middle">or eax, 0x80000000</text>
<text class="code" x="278.9" y="553.0" text-anchor="middle">mov cr0, eax</text>
</g>
<g id="el-sched">
<rect class="n-box shp" x="58.5" y="604.0" width="440.8" height="46.0" rx="8"/>
<text class="t" x="278.9" y="632.0" text-anchor="middle">הקרנל יוצר process ראשון ומפעיל את ה-Scheduler</text>
</g>
<g id="el-jump">
<rect class="n-code-bg shp" x="175.2" y="690.0" width="207.5" height="38.0" rx="7"/>
<text class="code" x="278.9" y="717.0" text-anchor="middle">jmp 0x23:user_entry</text>
</g>
<g id="el-user">
<rect class="n-box shp" x="54.0" y="768.0" width="449.9" height="46.0" rx="8"/>
<text class="t" x="278.9" y="796.0" text-anchor="middle">התוכנה רצה ב-Ring 3 ופונה לקרנל רק דרך int 0x80</text>
</g>
<g id="el-state">
<rect class="n-box shp" x="116.2" y="854.0" width="325.3" height="44.0" rx="8"/>
<text class="t-b dyn-state-0" x="278.9" y="881.0" text-anchor="middle" style="direction:ltr">Real Mode, no paging</text>
<text class="t-b dyn-state-1" x="278.9" y="881.0" text-anchor="middle" style="direction:ltr">Protected Mode, no paging</text>
<text class="t-b dyn-state-2" x="278.9" y="881.0" text-anchor="middle" style="direction:ltr">Protected Mode, paging on</text>
<text class="t-b dyn-state-3" x="278.9" y="881.0" text-anchor="middle" style="direction:ltr">Protected Mode, paging on, Ring 3</text>
</g>
</svg>
