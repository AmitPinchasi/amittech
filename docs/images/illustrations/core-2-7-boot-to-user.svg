#edge-6{animation-name:k-edge-6;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-7{0.00%{stroke-width:1.6;}78.93%{stroke-width:1.6;}80.90%{stroke:var(--pink);stroke-width:2.4;}91.01%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-7{animation-name:k-edge-7;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-0{opacity:0;}
@keyframes k-dyn-state-0{0.00%{opacity:1;}30.34%{opacity:1;}32.30%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-0{animation-name:k-dyn-state-0;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-1{opacity:0;}
@keyframes k-dyn-state-1{0.00%{opacity:0;}28.37%{opacity:0;}30.34%{opacity:1;}50.56%{opacity:1;}52.53%{opacity:0;}100.00%{opacity:0;}}
