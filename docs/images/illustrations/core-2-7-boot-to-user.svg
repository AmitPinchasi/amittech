@keyframes k-edge-5{0.00%{stroke-width:1.6;}58.71%{stroke-width:1.6;}60.67%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke:var(--pink);stroke-width:2.4;}72.75%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
