<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 447 380" width="447" role="img" aria-label="קריאה לפונקציה גנרית: טייפסקריפט מסיקה את T מהארגומנט וקובעת את טיפוס ההחזרה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-sig{0.00%{stroke:var(--pink);stroke-width:2.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}15.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sig .shp{animation-name:k-sig;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-call{0.00%{stroke-width:1.5;}10.00%{stroke-width:1.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}27.78%{stroke-width:1.5;}47.78%{stroke-width:1.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}65.56%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-bind{0.00%{stroke-width:1.5;}22.59%{stroke-width:1.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}40.37%{stroke-width:1.5;}60.37%{stroke-width:1.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}78.15%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-bind .shp{animation-name:k-bind;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ret{0.00%{stroke-width:1.5;}35.19%{stroke-width:1.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}52.96%{stroke-width:1.5;}72.96%{stroke-width:1.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}88.15%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-ret .shp{animation-name:k-ret;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}22.59%{stroke-width:1.6;}25.19%{stroke:var(--pink);stroke-width:2.4;}37.78%{stroke:var(--pink);stroke-width:2.4;}40.37%{stroke-width:1.6;}60.37%{stroke-width:1.6;}62.96%{stroke:var(--pink);stroke-width:2.4;}75.56%{stroke:var(--pink);stroke-width:2.4;}78.15%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}35.19%{stroke-width:1.6;}37.78%{stroke:var(--pink);stroke-width:2.4;}50.37%{stroke:var(--pink);stroke-width:2.4;}52.96%{stroke-width:1.6;}72.96%{stroke-width:1.6;}75.56%{stroke:var(--pink);stroke-width:2.4;}88.15%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-0{opacity:0;}
@keyframes k-dyn-call-0{0.00%{opacity:1;}50.37%{opacity:1;}52.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-call-0{animation-name:k-dyn-call-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-1{opacity:1;}
@keyframes k-dyn-call-1{0.00%{opacity:0;}47.78%{opacity:0;}50.37%{opacity:1;}88.15%{opacity:1;}100.00%{opacity:1;}}
.dyn-call-1{animation-name:k-dyn-call-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bind-0{opacity:0;}
@keyframes k-dyn-bind-0{0.00%{opacity:1;}25.19%{opacity:1;}27.78%{opacity:0;}100.00%{opacity:0;}}
.dyn-bind-0{animation-name:k-dyn-bind-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bind-1{opacity:0;}
@keyframes k-dyn-bind-1{0.00%{opacity:0;}22.59%{opacity:0;}25.19%{opacity:1;}62.96%{opacity:1;}65.56%{opacity:0;}100.00%{opacity:0;}}
.dyn-bind-1{animation-name:k-dyn-bind-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bind-2{opacity:1;}
@keyframes k-dyn-bind-2{0.00%{opacity:0;}60.37%{opacity:0;}62.96%{opacity:1;}88.15%{opacity:1;}100.00%{opacity:1;}}
.dyn-bind-2{animation-name:k-dyn-bind-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ret-0{opacity:0;}
@keyframes k-dyn-ret-0{0.00%{opacity:1;}37.78%{opacity:1;}40.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-ret-0{animation-name:k-dyn-ret-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ret-1{opacity:0;}
@keyframes k-dyn-ret-1{0.00%{opacity:0;}35.19%{opacity:0;}37.78%{opacity:1;}75.56%{opacity:1;}78.15%{opacity:0;}100.00%{opacity:0;}}
.dyn-ret-1{animation-name:k-dyn-ret-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ret-2{opacity:1;}
@keyframes k-dyn-ret-2{0.00%{opacity:0;}72.96%{opacity:0;}75.56%{opacity:1;}88.15%{opacity:1;}100.00%{opacity:1;}}
.dyn-ret-2{animation-name:k-dyn-ret-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="223.6,138.0 223.6,178.0" marker-end="url(#arr)"/>
<text class="lbl" x="235.6" y="162.0" text-anchor="end">הסקה מהארגומנט</text>
<polyline id="edge-1" class="edge" points="223.6,222.0 223.6,262.0" marker-end="url(#arr)"/>
<text class="lbl" x="235.6" y="246.0" text-anchor="end">טיפוס ההחזרה</text>
<g id="el-sig">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="415.1" height="38.0" rx="7"/>
<text class="code" x="223.6" y="43.0" text-anchor="middle">function first&lt;T&gt;(arr: T[]): T | undefined</text>
</g>
<g id="el-call">
<rect class="n-box shp" x="121.6" y="94.0" width="203.8" height="44.0" rx="8"/>
<text class="t-b dyn-call-0" x="223.6" y="121.0" text-anchor="middle" style="direction:ltr">first([1, 2, 3])</text>
<text class="t-b dyn-call-1" x="223.6" y="121.0" text-anchor="middle" style="direction:ltr">first(["a", "b", "c"])</text>
</g>
<g id="el-bind">
<rect class="n-box shp" x="160.5" y="178.0" width="126.1" height="44.0" rx="8"/>
<text class="t-b dyn-bind-0" x="223.6" y="205.0" text-anchor="middle" style="direction:ltr">T = ?</text>
<text class="t-b dyn-bind-1" x="223.6" y="205.0" text-anchor="middle" style="direction:ltr">T = number</text>
<text class="t-b dyn-bind-2" x="223.6" y="205.0" text-anchor="middle" style="direction:ltr">T = string</text>
</g>
<g id="el-ret">
<rect class="n-box shp" x="125.8" y="262.0" width="195.6" height="44.0" rx="8"/>
<text class="t-b dyn-ret-0" x="223.6" y="289.0" text-anchor="middle" style="direction:ltr">T | undefined</text>
<text class="t-b dyn-ret-1" x="223.6" y="289.0" text-anchor="middle" style="direction:ltr">number | undefined</text>
<text class="t-b dyn-ret-2" x="223.6" y="289.0" text-anchor="middle" style="direction:ltr">string | undefined</text>
</g>
<g id="el-note">
<text class="small" x="223.6" y="359.0" text-anchor="middle">אותה פונקציה - הטיפוס נקבע מחדש בכל קריאה</text>
</g>
