<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 535" width="450" role="img" aria-label="דפוס Cache-Aside עם Redis: בקשה ראשונה לא נמצאת במטמון ולכן נשלפת מה-DB ונשמרת ב-Redis, ובקשה חוזרת מוחזרת ישירות מהזיכרון">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}10.06%{stroke:var(--pink);stroke-width:2.5;}12.13%{stroke-width:1.5;}48.22%{stroke-width:1.5;}50.30%{stroke:var(--pink);stroke-width:2.5;}60.36%{stroke:var(--pink);stroke-width:2.5;}62.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cache{0.00%{stroke-width:1.5;}7.99%{stroke-width:1.5;}10.06%{stroke:var(--pink);stroke-width:2.5;}20.12%{stroke:var(--pink);stroke-width:2.5;}22.19%{stroke-width:1.5;}58.28%{stroke-width:1.5;}60.36%{stroke:var(--pink);stroke-width:2.5;}70.41%{stroke:var(--pink);stroke-width:2.5;}72.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cache .shp{animation-name:k-cache;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-db{0.00%{stroke-width:1.5;}18.05%{stroke-width:1.5;}20.12%{stroke:var(--pink);stroke-width:2.5;}30.18%{stroke:var(--pink);stroke-width:2.5;}32.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-db .shp{animation-name:k-db;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-store{0.00%{stroke-width:1.5;}28.11%{stroke-width:1.5;}30.18%{stroke:var(--pink);stroke-width:2.5;}40.24%{stroke:var(--pink);stroke-width:2.5;}42.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-store .shp{animation-name:k-store;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-resp{0.00%{stroke-width:1.5;}38.17%{stroke-width:1.5;}40.24%{stroke:var(--pink);stroke-width:2.5;}50.30%{stroke:var(--pink);stroke-width:2.5;}52.37%{stroke-width:1.5;}78.40%{stroke-width:1.5;}80.47%{stroke:var(--pink);stroke-width:2.5;}90.53%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-resp .shp{animation-name:k-resp;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-hit{0.00%{stroke-width:1.5;}68.34%{stroke-width:1.5;}70.41%{stroke:var(--pink);stroke-width:2.5;}80.47%{stroke:var(--pink);stroke-width:2.5;}82.54%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-hit .shp{animation-name:k-hit;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}7.99%{stroke-width:1.6;}10.06%{stroke:var(--pink);stroke-width:2.4;}20.12%{stroke:var(--pink);stroke-width:2.4;}22.19%{stroke-width:1.6;}58.28%{stroke-width:1.6;}60.36%{stroke:var(--pink);stroke-width:2.4;}70.41%{stroke:var(--pink);stroke-width:2.4;}72.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}18.05%{stroke-width:1.6;}20.12%{stroke:var(--pink);stroke-width:2.4;}30.18%{stroke:var(--pink);stroke-width:2.4;}32.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}28.11%{stroke-width:1.6;}30.18%{stroke:var(--pink);stroke-width:2.4;}40.24%{stroke:var(--pink);stroke-width:2.4;}42.31%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}38.17%{stroke-width:1.6;}40.24%{stroke:var(--pink);stroke-width:2.4;}50.30%{stroke:var(--pink);stroke-width:2.4;}52.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}68.34%{stroke-width:1.6;}70.41%{stroke:var(--pink);stroke-width:2.4;}80.47%{stroke:var(--pink);stroke-width:2.4;}82.54%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}78.40%{stroke-width:1.6;}80.47%{stroke:var(--pink);stroke-width:2.4;}90.53%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="136.9,54.0 136.9,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="136.9,214.9 136.9,300.9" marker-end="url(#arr)"/>
<text class="lbl" x="150.9" y="261.9" text-anchor="end">לא - miss</text>
<polyline id="edge-2" class="edge" points="136.9,346.9 136.9,386.9" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="136.9,432.9 136.9,472.9" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="257.7,154.4 345.7,154.4 345.7,214.9" marker-end="url(#arr)"/>
<text class="lbl" x="301.7" y="142.4" text-anchor="middle">כן - hit</text>
<polyline id="edge-5" class="edge" points="345.7,260.9 345.7,495.9 224.7,495.9" marker-end="url(#arr)"/>
<g id="el-req">
<rect class="n-code-bg shp" x="55.7" y="16.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="136.9" y="43.0" text-anchor="middle">GET /trips/123</text>
</g>
<g id="el-cache">
<polygon class="n-dia shp" points="136.9,94.0 257.7,154.4 136.9,214.9 16.0,154.4"/>
<text class="t" x="136.9" y="159.4" text-anchor="middle">קיים ב-Redis?</text>
</g>
<g id="el-db">
<rect class="n-box shp" x="31.9" y="300.9" width="210.0" height="46.0" rx="8"/>
<text class="t" x="136.9" y="328.9" text-anchor="middle">שליפה ממסד הנתונים</text>
</g>
<g id="el-store">
<rect class="n-box shp" x="27.7" y="386.9" width="218.4" height="46.0" rx="8"/>
<text class="t" x="136.9" y="414.9" text-anchor="middle">שמירה ב-Redis עם TTL</text>
</g>
<g id="el-resp">
<rect class="n-box shp" x="49.0" y="472.9" width="175.7" height="46.0" rx="8"/>
<text class="t" x="136.9" y="500.9" text-anchor="middle">מחזירים למשתמש</text>
</g>
<g id="el-hit">
