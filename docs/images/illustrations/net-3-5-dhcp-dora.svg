<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 322 500" width="322" role="img" aria-label="תהליך DHCP בו המחשב מקבל כתובת IP: שליחת Discover, קבלת Offer, שליחת Request ולבסוף Ack שמעניק את הכתובת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-start{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-start .shp{animation-name:k-start;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-discover{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-discover .shp{animation-name:k-discover;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-offer{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-offer .shp{animation-name:k-offer;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-request{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-request .shp{animation-name:k-request;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ack{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ack .shp{animation-name:k-ack;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-done{0.00%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-done .shp{animation-name:k-done;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}40.73%{stroke-width:1.6;}43.55%{stroke:var(--pink);stroke-width:2.4;}58.06%{stroke:var(--pink);stroke-width:2.4;}60.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}55.24%{stroke-width:1.6;}58.06%{stroke:var(--pink);stroke-width:2.4;}72.58%{stroke:var(--pink);stroke-width:2.4;}75.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-discover-0{opacity:1;}
@keyframes k-dyn-discover-0{0.00%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-discover-0{animation-name:k-dyn-discover-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-offer-0{opacity:1;}
@keyframes k-dyn-offer-0{0.00%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-offer-0{animation-name:k-dyn-offer-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-request-0{opacity:1;}
@keyframes k-dyn-request-0{0.00%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-request-0{animation-name:k-dyn-request-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ack-0{opacity:1;}
@keyframes k-dyn-ack-0{0.00%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-ack-0{animation-name:k-dyn-ack-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-done-0{opacity:0;}
@keyframes k-dyn-done-0{0.00%{opacity:1;}72.58%{opacity:1;}75.40%{opacity:0;}100.00%{opacity:0;}}
.dyn-done-0{animation-name:k-dyn-done-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-done-1{opacity:1;}
@keyframes k-dyn-done-1{0.00%{opacity:0;}69.76%{opacity:0;}72.58%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-done-1{animation-name:k-dyn-done-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="160.9,62.0 160.9,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="160.9,146.0 160.9,186.0" marker-end="url(#arr)"/>
<text class="lbl" x="174.9" y="170.0" text-anchor="end">השרת מציע</text>
<polyline id="edge-2" class="edge" points="160.9,230.0 160.9,270.0" marker-end="url(#arr)"/>
<text class="lbl" x="174.9" y="254.0" text-anchor="end">המחשב מבקש</text>
<polyline id="edge-3" class="edge" points="160.9,314.0 160.9,354.0" marker-end="url(#arr)"/>
<text class="lbl" x="174.9" y="338.0" text-anchor="end">השרת מאשר</text>
<polyline id="edge-4" class="edge" points="160.9,398.0 160.9,438.0" marker-end="url(#arr)"/>
<g id="el-start">
<rect class="n-box shp" x="35.6" y="16.0" width="250.6" height="46.0" rx="8"/>
<text class="t" x="160.9" y="44.0" text-anchor="middle">המחשב עולה ללא כתובת IP</text>
</g>
<g id="el-discover">
<rect class="n-box shp" x="27.6" y="102.0" width="266.6" height="44.0" rx="8"/>
<text class="t-b dyn-discover-0" x="160.9" y="129.0" text-anchor="middle" style="direction:ltr">DHCP Discover (broadcast)</text>
</g>
<g id="el-offer">
<rect class="n-box shp" x="25.0" y="186.0" width="271.9" height="44.0" rx="8"/>
<text class="t-b dyn-offer-0" x="160.9" y="213.0" text-anchor="middle" style="direction:ltr">DHCP Offer: 192.168.1.10</text>
</g>
<g id="el-request">
<rect class="n-box shp" x="16.0" y="270.0" width="289.9" height="44.0" rx="8"/>
<text class="t-b dyn-request-0" x="160.9" y="297.0" text-anchor="middle" style="direction:ltr">DHCP Request: 192.168.1.10</text>
</g>
<g id="el-ack">
<rect class="n-box shp" x="37.1" y="354.0" width="247.6" height="44.0" rx="8"/>
<text class="t-b dyn-ack-0" x="160.9" y="381.0" text-anchor="middle" style="direction:ltr">DHCP Ack: lease granted</text>
</g>
<g id="el-done">
<rect class="n-box shp" x="40.1" y="438.0" width="241.6" height="46.0" rx="8"/>
<text class="t dyn-done-0" x="160.9" y="466.0" text-anchor="middle">אין עדיין כתובת IP</text>
<text class="t dyn-done-1" x="160.9" y="466.0" text-anchor="middle">כתובת IP: 192.168.1.10</text>
</g>
</svg>
