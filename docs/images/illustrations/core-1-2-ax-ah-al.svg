<text class="t-b dyn-ax-1" x="187.1" y="121.0" text-anchor="middle" style="direction:ltr">AX = 1234h</text>
</g>
<g id="el-halves">
<rect id="el-halves-c0" class="n-cell shp" x="197.1" y="178.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="245.1" y="206.0" text-anchor="middle" style="direction:ltr">AL = 34h</text>
<rect id="el-halves-c1" class="n-cell shp" x="81.1" y="178.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="129.1" y="206.0" text-anchor="middle" style="direction:ltr">AH = 12h</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="44.3" y="264.0" width="285.6" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="187.1" y="292.0" text-anchor="middle">הרגיסטר ax מחזיק 16 ביט</text>
<text class="t dyn-note-1" x="187.1" y="292.0" text-anchor="middle">החצי העליון נשמר ברגיסטר ah</text>
<text class="t dyn-note-2" x="187.1" y="292.0" text-anchor="middle">החצי התחתון נשמר ברגיסטר al</text>
</g>
<g id="el-cap">
<text class="small" x="187.1" y="363.0" text-anchor="middle">אפשר לגשת לכל חצי בנפרד, וכל חצי הוא בגודל 8 ביט</text>
</g>
