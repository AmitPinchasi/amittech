<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 639 624" width="639" role="img" aria-label="מסגרת sigcontext מזויפת שהתוקף שותל על המחסנית ב-SROP - שדה אחד לכל אוגר, כולל rax שקובע את מספר קריאת המערכת ו-rip שקובע לאן קופצים אחרי השחזור, וכולם נטענים בבת אחת עם rt_sigreturn">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-title">
<text class="small" x="319.6" y="29.0" text-anchor="middle">מסגרת sigcontext מזויפת - הערכים שהתוקף קובע</text>
</g>
<g id="el-rax">
<rect class="n-box shp" x="165.9" y="74.0" width="307.4" height="46.0" rx="8"/>
<text class="t" x="319.6" y="102.0" text-anchor="middle">ה-rax = 59 - מספר syscall - execve</text>
</g>
<g id="el-rdi">
<rect class="n-box shp" x="209.0" y="160.0" width="221.1" height="46.0" rx="8"/>
<text class="t" x="319.6" y="188.0" text-anchor="middle">ה-rdi = כתובת "/bin/sh"</text>
</g>
<g id="el-rsi">
<rect class="n-box shp" x="271.6" y="246.0" width="96.0" height="46.0" rx="8"/>
<text class="t" x="319.6" y="274.0" text-anchor="middle" style="direction:ltr">rsi = 0</text>
</g>
<g id="el-rdx">
<rect class="n-box shp" x="271.6" y="332.0" width="96.0" height="46.0" rx="8"/>
<text class="t" x="319.6" y="360.0" text-anchor="middle" style="direction:ltr">rdx = 0</text>
</g>
<g id="el-rip">
<rect class="n-box shp" x="121.7" y="418.0" width="395.8" height="46.0" rx="8"/>
<text class="t" x="319.6" y="446.0" text-anchor="middle">ה-rip = כתובת syscall - הקפיצה אחרי השחזור</text>
</g>
<g id="el-rsp">
<rect class="n-box shp" x="181.2" y="504.0" width="276.8" height="46.0" rx="8"/>
<text class="t" x="319.6" y="532.0" text-anchor="middle">ה-rsp = המחסנית שנמשיך איתה</text>
</g>
<g id="el-note">
<text class="small" x="319.6" y="603.0" text-anchor="middle">קריאה אחת ל-rt_sigreturn (syscall 15) משחזרת את כל האוגרים האלה בבת אחת מהמסגרת המזויפת</text>
</g>
</svg>
