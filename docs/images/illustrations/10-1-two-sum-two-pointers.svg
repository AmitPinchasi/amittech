.dyn-sum-2{opacity:1;}
@keyframes k-dyn-sum-2{0.00%{opacity:0;}49.39%{opacity:0;}53.66%{opacity:1;}80.49%{opacity:1;}100.00%{opacity:1;}}
.dyn-sum-2{animation-name:k-dyn-sum-2;animation-duration:8.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-verdict-0{opacity:0;}
@keyframes k-dyn-verdict-0{0.00%{opacity:1;}26.83%{opacity:1;}31.10%{opacity:0;}100.00%{opacity:0;}}
.dyn-verdict-0{animation-name:k-dyn-verdict-0;animation-duration:8.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-verdict-1{opacity:0;}
@keyframes k-dyn-verdict-1{0.00%{opacity:0;}22.56%{opacity:0;}26.83%{opacity:1;}53.66%{opacity:1;}57.93%{opacity:0;}100.00%{opacity:0;}}
