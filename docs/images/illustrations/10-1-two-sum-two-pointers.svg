.dyn-verdict-2{opacity:1;}
@keyframes k-dyn-verdict-2{0.00%{opacity:0;}49.39%{opacity:0;}53.66%{opacity:1;}80.49%{opacity:1;}100.00%{opacity:1;}}
.dyn-verdict-2{animation-name:k-dyn-verdict-2;animation-duration:8.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
