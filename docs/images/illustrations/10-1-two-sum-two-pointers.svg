#el-lst-c1{animation-name:k-lst-1;animation-duration:8.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-verdict{0.00%{stroke-width:1.5;}49.39%{stroke-width:1.5;}53.66%{stroke:var(--pink);stroke-width:2.5;}80.49%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-verdict .shp{animation-name:k-verdict;animation-duration:8.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}22.56%{transform:translateX(0.0px);}26.83%{transform:translateX(0.0px);}49.39%{transform:translateX(0.0px);}53.66%{transform:translateX(-116.0px);}76.22%{transform:translateX(-116.0px);}100.00%{transform:translateX(-116.0px);}}
