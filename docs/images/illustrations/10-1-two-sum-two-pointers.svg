#eg-1{animation-name:k-mv-1;animation-duration:8.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sum-0{opacity:0;}
@keyframes k-dyn-sum-0{0.00%{opacity:1;}26.83%{opacity:1;}31.10%{opacity:0;}100.00%{opacity:0;}}
