<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" role="img" aria-label="מחלקה אחת משמשת כתבנית שממנה נוצרים כמה אובייקטים, לכל אחד ערכים משלו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-calls{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-calls .shp{animation-name:k-calls;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cls{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cls .shp{animation-name:k-cls;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-obj1{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-obj1 .shp{animation-name:k-obj1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-obj2{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-obj2 .shp{animation-name:k-obj2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}40.91%{stroke:var(--pink);stroke-width:2.4;}44.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.93%{stroke-width:1.6;}40.91%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj1-0{opacity:0;}
@keyframes k-dyn-obj1-0{0.00%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-obj1-0{animation-name:k-dyn-obj1-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj1-1{opacity:1;}
@keyframes k-dyn-obj1-1{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-obj1-1{animation-name:k-dyn-obj1-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj2-0{opacity:0;}
@keyframes k-dyn-obj2-0{0.00%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-obj2-0{animation-name:k-dyn-obj2-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj2-1{opacity:1;}
@keyframes k-dyn-obj2-1{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-obj2-1{animation-name:k-dyn-obj2-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="219.9,76.0 219.9,116.0" marker-end="url(#arr)"/>
<text class="lbl" x="233.9" y="100.0" text-anchor="end">יצירת אובייקטים</text>
<polyline id="edge-1" class="edge" points="219.9,162.0 219.9,202.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="325.7,139.0 391.7,139.0" marker-end="url(#arr)"/>
<g id="el-calls">
<rect class="n-code-bg shp" x="48.4" y="16.0" width="342.9" height="60.0" rx="7"/>
<text class="code" x="219.9" y="43.0" text-anchor="middle">my_dog_1 = Dog(name="max", age=3)</text>
<text class="code" x="219.9" y="65.0" text-anchor="middle">my_dog_2 = Dog(name="maxi", age=5)</text>
</g>
<g id="el-cls">
<rect class="n-box shp" x="114.0" y="116.0" width="211.7" height="46.0" rx="8"/>
<text class="t" x="219.9" y="144.0" text-anchor="middle">מחלקה - Dog (התבנית)</text>
</g>
<g id="el-obj1">
<rect class="n-box shp" x="88.4" y="202.0" width="263.0" height="44.0" rx="8"/>
<text class="t-b dyn-obj1-0" x="219.9" y="229.0" text-anchor="middle" style="direction:ltr">my_dog_1</text>
<text class="t-b dyn-obj1-1" x="219.9" y="229.0" text-anchor="middle" style="direction:ltr">my_dog_1: name="max", age=3</text>
</g>
<g id="el-obj2">
<rect class="n-box shp" x="391.7" y="117.0" width="271.9" height="44.0" rx="8"/>
<text class="t-b dyn-obj2-0" x="527.7" y="144.0" text-anchor="middle" style="direction:ltr">my_dog_2</text>
<text class="t-b dyn-obj2-1" x="527.7" y="144.0" text-anchor="middle" style="direction:ltr">my_dog_2: name="maxi", age=5</text>
</g>
<g id="el-note">
<text class="small" x="219.9" y="299.0" text-anchor="middle">כל האובייקטים נוצרים מאותה תבנית, אבל לכל אחד ערכים משלו</text>
</g>
