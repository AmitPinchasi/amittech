<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 594 394" width="594" role="img" aria-label="עקיפת מכונת מצבים: המסלול החוקי של הזמנה עובר ממתין לאושר למשלוח למסירה, אך ללא בדיקת מעבר חוקי התוקף קופץ ישירות ממתין להחזר ומקבל זיכוי על הזמנה שלא שולמה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-pending{0.00%{stroke:var(--pink);stroke-width:2.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}17.37%{stroke-width:1.5;}54.66%{stroke-width:1.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pending .shp{animation-name:k-pending;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-approved{0.00%{stroke-width:1.5;}11.44%{stroke-width:1.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}31.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-approved .shp{animation-name:k-approved;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-shipped{0.00%{stroke-width:1.5;}25.85%{stroke-width:1.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}46.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-shipped .shp{animation-name:k-shipped;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-delivered{0.00%{stroke-width:1.5;}40.25%{stroke-width:1.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}60.59%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-delivered .shp{animation-name:k-delivered;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-refunded{0.00%{stroke-width:1.5;}69.07%{stroke-width:1.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}86.44%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-refunded .shp{animation-name:k-refunded;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.44%{stroke-width:1.6;}14.41%{stroke:var(--pink);stroke-width:2.4;}28.81%{stroke:var(--pink);stroke-width:2.4;}31.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.85%{stroke-width:1.6;}28.81%{stroke:var(--pink);stroke-width:2.4;}43.22%{stroke:var(--pink);stroke-width:2.4;}46.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}40.25%{stroke-width:1.6;}43.22%{stroke:var(--pink);stroke-width:2.4;}57.63%{stroke:var(--pink);stroke-width:2.4;}60.59%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}69.07%{stroke-width:1.6;}72.03%{stroke:var(--pink);stroke-width:2.4;}86.44%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="227.2,62.0 227.2,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="227.2,148.0 227.2,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="227.2,234.0 227.2,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="285.7,39.0 351.7,39.0" marker-end="url(#arr)"/>
<g id="el-pending">
<rect class="n-box shp" x="168.8" y="16.0" width="116.9" height="46.0" rx="8"/>
<text class="t" x="227.2" y="44.0" text-anchor="middle" style="direction:ltr">PENDING</text>
</g>
<g id="el-refunded">
<rect class="n-box shp" x="351.7" y="16.0" width="226.4" height="46.0" rx="8"/>
<text class="t" x="464.9" y="44.0" text-anchor="middle">REFUNDED - החזר כספי</text>
</g>
<g id="el-approved">
<rect class="n-box shp" x="163.6" y="102.0" width="127.3" height="46.0" rx="8"/>
<text class="t" x="227.2" y="130.0" text-anchor="middle" style="direction:ltr">APPROVED</text>
</g>
<g id="el-shipped">
<rect class="n-box shp" x="168.8" y="188.0" width="116.9" height="46.0" rx="8"/>
<text class="t" x="227.2" y="216.0" text-anchor="middle" style="direction:ltr">SHIPPED</text>
</g>
<g id="el-delivered">
<rect class="n-box shp" x="158.4" y="274.0" width="137.7" height="46.0" rx="8"/>
<text class="t" x="227.2" y="302.0" text-anchor="middle" style="direction:ltr">DELIVERED</text>
</g>
<g id="el-note">
<text class="small" x="227.2" y="373.0" text-anchor="middle">ללא בדיקת מעבר חוקי אפשר לדלג ישירות למצב שמפעיל החזר כספי</text>
</g>
</svg>
