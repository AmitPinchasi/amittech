@keyframes k-edge-3{0.00%{stroke-width:1.6;}35.19%{stroke-width:1.6;}37.78%{stroke:var(--pink);stroke-width:2.4;}50.37%{stroke:var(--pink);stroke-width:2.4;}52.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}47.78%{stroke-width:1.6;}50.37%{stroke:var(--pink);stroke-width:2.4;}62.96%{stroke:var(--pink);stroke-width:2.4;}65.56%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}72.96%{stroke-width:1.6;}75.56%{stroke:var(--pink);stroke-width:2.4;}88.15%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="194.5,62.0 194.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="194.5,148.0 194.5,188.0" marker-end="url(#arr)"/>
