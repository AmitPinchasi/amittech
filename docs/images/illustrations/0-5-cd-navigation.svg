@keyframes k-edge-3{0.00%{stroke-width:1.6;}43.44%{stroke-width:1.6;}49.18%{stroke:var(--pink);stroke-width:2.4;}73.77%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
