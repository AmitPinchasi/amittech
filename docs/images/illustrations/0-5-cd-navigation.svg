<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 398 446" width="398" role="img" aria-label="מעבר בין תיקיות בטרמינל: cd dev נכנס לתיקייה, cd .. חוזר אחורה, והנתיב משתנה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
