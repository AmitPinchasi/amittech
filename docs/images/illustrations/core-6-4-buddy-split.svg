<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 609 448" width="609" role="img" aria-label="תרשים המראה כיצד מקצה החבר מפצל בלוק של ארבעה pages לשני בלוקים של שניים ואז ל-pages בודדים, כדי לספק בקשה ל-page אחד">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}20.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-l0{0.00%{stroke:var(--pink);stroke-width:2.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}20.27%{stroke-width:1.5;}48.20%{stroke-width:1.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-l0 .shp{animation-name:k-l0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-l1{0.00%{stroke-width:1.5;}13.96%{stroke-width:1.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}71.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-l1 .shp{animation-name:k-l1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-l2{0.00%{stroke-width:1.5;}31.08%{stroke-width:1.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}54.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-l2 .shp{animation-name:k-l2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-l0-0{opacity:0;}
@keyframes k-dyn-l0-0{0.00%{opacity:1;}51.35%{opacity:1;}54.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-l0-0{animation-name:k-dyn-l0-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-l0-1{opacity:0;}
