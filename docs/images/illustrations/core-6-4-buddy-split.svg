.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}13.96%{opacity:0;}17.12%{opacity:1;}34.23%{opacity:1;}37.39%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:0;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}31.08%{opacity:0;}34.23%{opacity:1;}51.35%{opacity:1;}54.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-3{opacity:0;}
@keyframes k-dyn-note-3{0.00%{opacity:0;}48.20%{opacity:0;}51.35%{opacity:1;}68.47%{opacity:1;}71.62%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-3{animation-name:k-dyn-note-3;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-4{opacity:1;}
@keyframes k-dyn-note-4{0.00%{opacity:0;}65.32%{opacity:0;}68.47%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-4{animation-name:k-dyn-note-4;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-req">
<rect class="n-code-bg shp" x="169.0" y="16.0" width="270.7" height="38.0" rx="7"/>
<text class="code" x="304.4" y="43.0" text-anchor="middle">alloc_pages(GFP_KERNEL, 0)</text>
</g>
<g id="el-l0">
<rect class="n-code-bg shp" x="209.7" y="94.0" width="189.5" height="38.0" rx="7"/>
<text class="code dyn-l0-0" x="304.4" y="121.0" text-anchor="middle">order 0: empty</text>
<text class="code dyn-l0-1" x="304.4" y="121.0" text-anchor="middle">order 0: 2 blocks</text>
<text class="code dyn-l0-2" x="304.4" y="121.0" text-anchor="middle">order 0: 1 block</text>
</g>
<g id="el-l1">
<rect class="n-code-bg shp" x="209.7" y="172.0" width="189.5" height="38.0" rx="7"/>
<text class="code dyn-l1-0" x="304.4" y="199.0" text-anchor="middle">order 1: empty</text>
<text class="code dyn-l1-1" x="304.4" y="199.0" text-anchor="middle">order 1: 2 blocks</text>
<text class="code dyn-l1-2" x="304.4" y="199.0" text-anchor="middle">order 1: 1 block</text>
</g>
<g id="el-l2">
<rect class="n-code-bg shp" x="214.2" y="250.0" width="180.4" height="38.0" rx="7"/>
<text class="code dyn-l2-0" x="304.4" y="277.0" text-anchor="middle">order 2: 1 block</text>
<text class="code dyn-l2-1" x="304.4" y="277.0" text-anchor="middle">order 2: empty</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="55.3" y="328.0" width="498.3" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="304.4" y="356.0" text-anchor="middle">הבקשה היא ל-page אחד, אבל הרשימה של order 0 ריקה</text>
<text class="t dyn-note-1" x="304.4" y="356.0" text-anchor="middle">גם הרשימה של order 1 ריקה, ולכן המקצה עולה רמה נוספת</text>
<text class="t dyn-note-2" x="304.4" y="356.0" text-anchor="middle">הבלוק של ארבעה pages מתפצל לשני בלוקים של שני pages</text>
<text class="t dyn-note-3" x="304.4" y="356.0" text-anchor="middle">בלוק אחד של שני pages מתפצל לשני pages בודדים</text>
<text class="t dyn-note-4" x="304.4" y="356.0" text-anchor="middle">page אחד נמסר למבקש, והחבר שלו נשאר ברשימה של order 0</text>
</g>
<g id="el-cap">
<text class="small" x="304.4" y="427.0" text-anchor="middle">בשחרור התהליך מתהפך: אם גם החבר הסמוך חופשי, השניים מתמזגים חזרה לבלוק גדול יותר</text>
</g>
</svg>
