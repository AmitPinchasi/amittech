.dyn-l0-2{animation-name:k-dyn-l0-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-l1-0{opacity:0;}
@keyframes k-dyn-l1-0{0.00%{opacity:1;}34.23%{opacity:1;}37.39%{opacity:0;}100.00%{opacity:0;}}
.dyn-l1-0{animation-name:k-dyn-l1-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-l1-1{opacity:0;}
@keyframes k-dyn-l1-1{0.00%{opacity:0;}31.08%{opacity:0;}34.23%{opacity:1;}51.35%{opacity:1;}54.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-l1-1{animation-name:k-dyn-l1-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-l1-2{opacity:1;}
@keyframes k-dyn-l1-2{0.00%{opacity:0;}48.20%{opacity:0;}51.35%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-l1-2{animation-name:k-dyn-l1-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-l2-0{opacity:0;}
@keyframes k-dyn-l2-0{0.00%{opacity:1;}34.23%{opacity:1;}37.39%{opacity:0;}100.00%{opacity:0;}}
.dyn-l2-0{animation-name:k-dyn-l2-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-l2-1{opacity:1;}
