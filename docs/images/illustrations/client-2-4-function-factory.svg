<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 406" width="420" role="img" aria-label="פונקציה שמחזירה פונקציה: createMultiplier יוצרת את double שזוכרת את factor">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-factory{0.00%{stroke:var(--pink);stroke-width:2.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}20.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-factory .shp{animation-name:k-factory;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-call{0.00%{stroke-width:1.5;}13.37%{stroke-width:1.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}37.13%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-made{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-made .shp{animation-name:k-made;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-use{0.00%{stroke-width:1.5;}47.03%{stroke-width:1.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-use .shp{animation-name:k-use;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}30.20%{stroke-width:1.6;}33.66%{stroke:var(--pink);stroke-width:2.4;}50.50%{stroke:var(--pink);stroke-width:2.4;}53.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}47.03%{stroke-width:1.6;}50.50%{stroke:var(--pink);stroke-width:2.4;}67.33%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-use-0{opacity:0;}
@keyframes k-dyn-use-0{0.00%{opacity:1;}50.50%{opacity:1;}53.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-use-0{animation-name:k-dyn-use-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-use-1{opacity:0;}
@keyframes k-dyn-use-1{0.00%{opacity:0;}47.03%{opacity:0;}50.50%{opacity:1;}67.33%{opacity:1;}70.79%{opacity:0;}100.00%{opacity:0;}}
.dyn-use-1{animation-name:k-dyn-use-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-use-2{opacity:1;}
@keyframes k-dyn-use-2{0.00%{opacity:0;}63.86%{opacity:0;}67.33%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-use-2{animation-name:k-dyn-use-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="210.0,176.0 210.0,216.0" marker-end="url(#arr)"/>
<text class="lbl" x="222.0" y="200.0" text-anchor="end" style="direction:ltr">factor = 2</text>
<polyline id="edge-1" class="edge" points="210.0,254.0 210.0,294.0" marker-end="url(#arr)"/>
<g id="el-factory">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="388.1" height="82.0" rx="7"/>
<text class="code" x="210.0" y="43.0" text-anchor="middle">function createMultiplier(factor) {</text>
<text class="code" x="210.0" y="65.0" text-anchor="middle">    return (number) =&gt; number * factor;</text>
<text class="code" x="210.0" y="87.0" text-anchor="middle">}</text>
</g>
<g id="el-call">
<rect class="n-code-bg shp" x="38.6" y="138.0" width="342.9" height="38.0" rx="7"/>
<text class="code" x="210.0" y="165.0" text-anchor="middle">const double = createMultiplier(2)</text>
</g>
<g id="el-made">
<rect class="n-code-bg shp" x="52.1" y="216.0" width="315.8" height="38.0" rx="7"/>
<text class="code" x="210.0" y="243.0" text-anchor="middle">double = (number) =&gt; number * 2</text>
</g>
<g id="el-use">
<rect class="n-code-bg shp" x="151.4" y="294.0" width="117.2" height="38.0" rx="7"/>
<text class="code dyn-use-0" x="210.0" y="321.0" text-anchor="middle">double(5)</text>
<text class="code dyn-use-1" x="210.0" y="321.0" text-anchor="middle">5 * 2</text>
<text class="code dyn-use-2" x="210.0" y="321.0" text-anchor="middle">10</text>
</g>
<g id="el-note">
<text class="small" x="210.0" y="385.0" text-anchor="middle">הפונקציה שנוצרה זוכרת את הערך של factor לתמיד</text>
</g>
</svg>
