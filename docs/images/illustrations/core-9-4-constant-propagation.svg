<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 652 342" width="652" role="img" aria-label="איור הפצת קבועים: הקומפיילר עוקב אחרי הערך של כל משתנה ומחליף את החישובים בקבוע מוכן">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-src{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-src .shp{animation-name:k-src;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-vars-0{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-vars-c0{animation-name:k-vars-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-vars-1{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-vars-c1{animation-name:k-vars-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-vars-2{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-vars-c2{animation-name:k-vars-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}16.48%{transform:translateX(0.0px);}20.45%{transform:translateX(0.0px);}36.93%{transform:translateX(0.0px);}40.91%{transform:translateX(-116.0px);}57.39%{transform:translateX(-116.0px);}61.36%{transform:translateX(-232.0px);}77.84%{transform:translateX(-232.0px);}100.00%{transform:translateX(-232.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:0;}
@keyframes k-dyn-val-1{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-2{opacity:1;}
@keyframes k-dyn-val-2{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-2{animation-name:k-dyn-val-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-src">
<rect class="n-code-bg shp" x="202.4" y="16.0" width="162.4" height="82.0" rx="7"/>
<text class="code" x="283.6" y="43.0" text-anchor="middle">int x = 5;</text>
<text class="code" x="283.6" y="65.0" text-anchor="middle">int y = x * 3;</text>
<text class="code" x="283.6" y="87.0" text-anchor="middle">int z = y + x;</text>
</g>
<g id="el-vars">
<rect id="el-vars-c0" class="n-cell shp" x="351.6" y="138.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="399.6" y="166.0" text-anchor="middle" style="direction:ltr">x</text>
<rect id="el-vars-c1" class="n-cell shp" x="235.6" y="138.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="283.6" y="166.0" text-anchor="middle" style="direction:ltr">y</text>
<rect id="el-vars-c2" class="n-cell shp" x="119.6" y="138.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="167.6" y="166.0" text-anchor="middle" style="direction:ltr">z</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="399.6,184.0 399.6,224.0" marker-end="url(#arr)"/>
<text class="lbl" x="411.6" y="208.0" text-anchor="end">המשתנה שהקומפיילר עוקב אחריו</text>
<g id="el-val">
<rect class="n-box shp" x="319.5" y="224.0" width="160.1" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="399.6" y="251.0" text-anchor="middle" style="direction:ltr">x = 5</text>
<text class="t-b dyn-val-1" x="399.6" y="251.0" text-anchor="middle" style="direction:ltr">y = 5 * 3 = 15</text>
<text class="t-b dyn-val-2" x="399.6" y="251.0" text-anchor="middle" style="direction:ltr">z = 15 + 5 = 20</text>
</g>
</g>
<g id="el-note">
<text class="small" x="283.6" y="321.0" text-anchor="middle">באסמבלי של O2 לא נשארים חישובים, אלא רק הקבוע 20 שחושב כבר בזמן הקומפילציה</text>
</g>
</svg>
