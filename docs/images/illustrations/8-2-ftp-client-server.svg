<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 285 328" width="285" role="img" aria-label="תקשורת בין לקוח FTP לשרת: הלקוח שולח פקודות כמו LIST, GET ו-PUT והשרת מגיב בהתאם">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-client{0.00%{stroke:var(--pink);stroke-width:2.5;}9.04%{stroke:var(--pink);stroke-width:2.5;}11.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-client .shp{animation-name:k-client;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cmd{0.00%{stroke-width:1.5;}6.93%{stroke-width:1.5;}9.04%{stroke:var(--pink);stroke-width:2.5;}18.07%{stroke:var(--pink);stroke-width:2.5;}20.18%{stroke-width:1.5;}34.04%{stroke-width:1.5;}36.14%{stroke:var(--pink);stroke-width:2.5;}45.18%{stroke:var(--pink);stroke-width:2.5;}47.29%{stroke-width:1.5;}61.14%{stroke-width:1.5;}63.25%{stroke:var(--pink);stroke-width:2.5;}72.29%{stroke:var(--pink);stroke-width:2.5;}74.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmd .shp{animation-name:k-cmd;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-server{0.00%{stroke-width:1.5;}15.96%{stroke-width:1.5;}18.07%{stroke:var(--pink);stroke-width:2.5;}27.11%{stroke:var(--pink);stroke-width:2.5;}29.22%{stroke-width:1.5;}43.07%{stroke-width:1.5;}45.18%{stroke:var(--pink);stroke-width:2.5;}54.22%{stroke:var(--pink);stroke-width:2.5;}56.33%{stroke-width:1.5;}70.18%{stroke-width:1.5;}72.29%{stroke:var(--pink);stroke-width:2.5;}81.33%{stroke:var(--pink);stroke-width:2.5;}83.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-server .shp{animation-name:k-server;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-resp{0.00%{stroke-width:1.5;}25.00%{stroke-width:1.5;}27.11%{stroke:var(--pink);stroke-width:2.5;}36.14%{stroke:var(--pink);stroke-width:2.5;}38.25%{stroke-width:1.5;}52.11%{stroke-width:1.5;}54.22%{stroke:var(--pink);stroke-width:2.5;}63.25%{stroke:var(--pink);stroke-width:2.5;}65.36%{stroke-width:1.5;}79.22%{stroke-width:1.5;}81.33%{stroke:var(--pink);stroke-width:2.5;}90.36%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-resp .shp{animation-name:k-resp;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}6.93%{stroke-width:1.6;}9.04%{stroke:var(--pink);stroke-width:2.4;}18.07%{stroke:var(--pink);stroke-width:2.4;}20.18%{stroke-width:1.6;}34.04%{stroke-width:1.6;}36.14%{stroke:var(--pink);stroke-width:2.4;}45.18%{stroke:var(--pink);stroke-width:2.4;}47.29%{stroke-width:1.6;}61.14%{stroke-width:1.6;}63.25%{stroke:var(--pink);stroke-width:2.4;}72.29%{stroke:var(--pink);stroke-width:2.4;}74.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}15.96%{stroke-width:1.6;}18.07%{stroke:var(--pink);stroke-width:2.4;}27.11%{stroke:var(--pink);stroke-width:2.4;}29.22%{stroke-width:1.6;}43.07%{stroke-width:1.6;}45.18%{stroke:var(--pink);stroke-width:2.4;}54.22%{stroke:var(--pink);stroke-width:2.4;}56.33%{stroke-width:1.6;}70.18%{stroke-width:1.6;}72.29%{stroke:var(--pink);stroke-width:2.4;}81.33%{stroke:var(--pink);stroke-width:2.4;}83.43%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}25.00%{stroke-width:1.6;}27.11%{stroke:var(--pink);stroke-width:2.4;}36.14%{stroke:var(--pink);stroke-width:2.4;}38.25%{stroke-width:1.6;}52.11%{stroke-width:1.6;}54.22%{stroke:var(--pink);stroke-width:2.4;}63.25%{stroke:var(--pink);stroke-width:2.4;}65.36%{stroke-width:1.6;}79.22%{stroke-width:1.6;}81.33%{stroke:var(--pink);stroke-width:2.4;}90.36%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmd-0{opacity:0;}
@keyframes k-dyn-cmd-0{0.00%{opacity:1;}36.14%{opacity:1;}38.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-cmd-0{animation-name:k-dyn-cmd-0;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmd-1{opacity:0;}
@keyframes k-dyn-cmd-1{0.00%{opacity:0;}34.04%{opacity:0;}36.14%{opacity:1;}63.25%{opacity:1;}65.36%{opacity:0;}100.00%{opacity:0;}}
.dyn-cmd-1{animation-name:k-dyn-cmd-1;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmd-2{opacity:1;}
@keyframes k-dyn-cmd-2{0.00%{opacity:0;}61.14%{opacity:0;}63.25%{opacity:1;}90.36%{opacity:1;}100.00%{opacity:1;}}
.dyn-cmd-2{animation-name:k-dyn-cmd-2;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-resp-0{opacity:0;}
@keyframes k-dyn-resp-0{0.00%{opacity:1;}54.22%{opacity:1;}56.33%{opacity:0;}100.00%{opacity:0;}}
.dyn-resp-0{animation-name:k-dyn-resp-0;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-resp-1{opacity:0;}
@keyframes k-dyn-resp-1{0.00%{opacity:0;}52.11%{opacity:0;}54.22%{opacity:1;}81.33%{opacity:1;}83.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-resp-1{animation-name:k-dyn-resp-1;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-resp-2{opacity:1;}
@keyframes k-dyn-resp-2{0.00%{opacity:0;}79.22%{opacity:0;}81.33%{opacity:1;}90.36%{opacity:1;}100.00%{opacity:1;}}
.dyn-resp-2{animation-name:k-dyn-resp-2;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="142.3,62.0 142.3,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="156.3" y="86.0" text-anchor="end">שולח פקודה</text>
<polyline id="edge-1" class="edge" points="142.3,140.0 142.3,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="142.3,226.0 142.3,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="156.3" y="250.0" text-anchor="end">השרת מגיב</text>
<g id="el-client">
<rect class="n-box shp" x="33.1" y="16.0" width="218.4" height="46.0" rx="8"/>
<text class="t" x="142.3" y="44.0" text-anchor="middle">לקוח FTP - הקוד שלנו</text>
</g>
<g id="el-cmd">
<rect class="n-code-bg shp" x="56.6" y="102.0" width="171.4" height="38.0" rx="7"/>
<text class="code dyn-cmd-0" x="142.3" y="129.0" text-anchor="middle">LIST</text>
<text class="code dyn-cmd-1" x="142.3" y="129.0" text-anchor="middle">GET example.txt</text>
<text class="code dyn-cmd-2" x="142.3" y="129.0" text-anchor="middle">PUT report.txt</text>
</g>
<g id="el-server">
<rect class="n-box shp" x="16.0" y="180.0" width="252.7" height="46.0" rx="8"/>
<text class="t" x="142.3" y="208.0" text-anchor="middle">שרת FTP - שומר את הקבצים</text>
</g>
<g id="el-resp">
<rect class="n-box shp" x="25.1" y="266.0" width="234.5" height="46.0" rx="8"/>
<text class="t dyn-resp-0" x="142.3" y="294.0" text-anchor="middle">רשימת הקבצים בתקייה</text>
<text class="t dyn-resp-1" x="142.3" y="294.0" text-anchor="middle">הקובץ יורד למחשב שלנו</text>
<text class="t dyn-resp-2" x="142.3" y="294.0" text-anchor="middle">הקובץ עולה לשרת</text>
</g>
</svg>
