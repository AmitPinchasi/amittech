<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 604 376" width="604" role="img" aria-label="כל ספרה הקסדצימלית מייצגת ארבעה ביטים, ולכן המספר 0x3A שווה בבינארית ל-0011 1010">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-src{0.00%{stroke:var(--pink);stroke-width:2.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}30.71%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-src .shp{animation-name:k-src;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-digits-0{0.00%{stroke-width:1.5;}20.71%{stroke-width:1.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}56.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-digits-c0{animation-name:k-digits-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-digits-1{0.00%{stroke-width:1.5;}46.43%{stroke-width:1.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-digits-c1{animation-name:k-digits-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}20.71%{transform:translateX(0.0px);}25.71%{transform:translateX(0.0px);}46.43%{transform:translateX(0.0px);}51.43%{transform:translateX(-116.0px);}72.14%{transform:translateX(-116.0px);}100.00%{transform:translateX(-116.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-nib-0{opacity:0;}
@keyframes k-dyn-nib-0{0.00%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-nib-0{animation-name:k-dyn-nib-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-nib-1{opacity:1;}
@keyframes k-dyn-nib-1{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-nib-1{animation-name:k-dyn-nib-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-1{opacity:0;}
@keyframes k-dyn-res-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-2{opacity:1;}
@keyframes k-dyn-res-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-2{animation-name:k-dyn-res-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-src">
<rect class="n-code-bg shp" x="253.8" y="16.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="301.8" y="43.0" text-anchor="middle">0x3A</text>
</g>
<g id="el-digits">
<rect id="el-digits-c0" class="n-cell shp" x="311.8" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="359.8" y="122.0" text-anchor="middle" style="direction:ltr">A</text>
<rect id="el-digits-c1" class="n-cell shp" x="195.8" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="243.8" y="122.0" text-anchor="middle" style="direction:ltr">3</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="359.8,140.0 359.8,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="371.8" y="164.0" text-anchor="end">הספרה הנוכחית</text>
<g id="el-nib">
<rect class="n-box shp" x="301.5" y="180.0" width="116.8" height="44.0" rx="8"/>
<text class="t-b dyn-nib-0" x="359.8" y="207.0" text-anchor="middle" style="direction:ltr">A = 1010</text>
<text class="t-b dyn-nib-1" x="359.8" y="207.0" text-anchor="middle" style="direction:ltr">3 = 0011</text>
</g>
</g>
<g id="el-res">
<rect class="n-code-bg shp" x="202.6" y="264.0" width="198.5" height="38.0" rx="7"/>
<text class="code dyn-res-0" x="301.8" y="291.0" text-anchor="middle">result = ???? ????</text>
<text class="code dyn-res-1" x="301.8" y="291.0" text-anchor="middle">result = ???? 1010</text>
<text class="code dyn-res-2" x="301.8" y="291.0" text-anchor="middle">result = 0011 1010</text>
</g>
<g id="el-note">
<text class="small" x="301.8" y="355.0" text-anchor="middle">הספרה הימנית היא ארבעת הביטים הנמוכים, והספרה השמאלית היא ארבעת הביטים הגבוהים</text>
</g>
</svg>
