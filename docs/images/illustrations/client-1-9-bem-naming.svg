<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 510 212" width="510" role="img" aria-label="פירוק שם מחלקה בשיטת BEM: בלוק, אלמנט ווריאציה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-name{0.00%{stroke:var(--pink);stroke-width:2.5;}78.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-name .shp{animation-name:k-name;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-part{0.00%{stroke:var(--pink);stroke-width:2.5;}78.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-part .shp{animation-name:k-part;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-name-0{opacity:0;}
@keyframes k-dyn-name-0{0.00%{opacity:1;}26.32%{opacity:1;}30.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-name-0{animation-name:k-dyn-name-0;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-name-1{opacity:0;}
@keyframes k-dyn-name-1{0.00%{opacity:0;}21.71%{opacity:0;}26.32%{opacity:1;}52.63%{opacity:1;}57.24%{opacity:0;}100.00%{opacity:0;}}
.dyn-name-1{animation-name:k-dyn-name-1;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-name-2{opacity:1;}
@keyframes k-dyn-name-2{0.00%{opacity:0;}48.03%{opacity:0;}52.63%{opacity:1;}78.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-name-2{animation-name:k-dyn-name-2;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-part-0{opacity:0;}
@keyframes k-dyn-part-0{0.00%{opacity:1;}26.32%{opacity:1;}30.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-part-0{animation-name:k-dyn-part-0;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-part-1{opacity:0;}
@keyframes k-dyn-part-1{0.00%{opacity:0;}21.71%{opacity:0;}26.32%{opacity:1;}52.63%{opacity:1;}57.24%{opacity:0;}100.00%{opacity:0;}}
.dyn-part-1{animation-name:k-dyn-part-1;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-part-2{opacity:1;}
@keyframes k-dyn-part-2{0.00%{opacity:0;}48.03%{opacity:0;}52.63%{opacity:1;}78.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-part-2{animation-name:k-dyn-part-2;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-name">
<rect class="n-code-bg shp" x="142.4" y="16.0" width="225.6" height="38.0" rx="7"/>
<text class="code dyn-name-0" x="255.2" y="43.0" text-anchor="middle">card</text>
<text class="code dyn-name-1" x="255.2" y="43.0" text-anchor="middle">card__button</text>
<text class="code dyn-name-2" x="255.2" y="43.0" text-anchor="middle">card__button--primary</text>
</g>
<g id="el-part">
<rect class="n-box shp" x="130.9" y="94.0" width="248.6" height="44.0" rx="8"/>
<text class="t-b dyn-part-0" x="255.2" y="121.0" text-anchor="middle">בלוק - רכיב עצמאי</text>
<text class="t-b dyn-part-1" x="255.2" y="121.0" text-anchor="middle">אלמנט - חלק בתוך הבלוק</text>
<text class="t-b dyn-part-2" x="255.2" y="121.0" text-anchor="middle">וריאציה של האלמנט</text>
</g>
<g id="el-note">
<text class="small" x="255.2" y="191.0" text-anchor="middle">קו תחתון כפול מסמן אלמנט בתוך בלוק, מקף כפול מסמן וריאציה - modifier</text>
</g>
</svg>
