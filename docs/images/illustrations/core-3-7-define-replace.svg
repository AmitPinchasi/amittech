<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 499 400" width="499" role="img" aria-label="הוראת define היא החלפת טקסט: הפרה-פרוססור מחליף את השם בערך עוד לפני שהקומפיילר רואה את הקוד">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-before{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-before .shp{animation-name:k-before;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pp{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pp .shp{animation-name:k-pp;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-after{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-after .shp{animation-name:k-after;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cc{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-cc .shp{animation-name:k-cc;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}40.91%{stroke:var(--pink);stroke-width:2.4;}44.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.93%{stroke-width:1.6;}40.91%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="249.3,76.0 249.3,116.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="249.3,162.0 249.3,202.0" marker-end="url(#arr)"/>
<text class="lbl" x="263.3" y="186.0" text-anchor="end">החלפת טקסט</text>
<polyline id="edge-2" class="edge" points="249.3,240.0 249.3,280.0" marker-end="url(#arr)"/>
<g id="el-before">
<rect class="n-code-bg shp" x="150.0" y="16.0" width="198.5" height="60.0" rx="7"/>
<text class="code" x="249.3" y="43.0" text-anchor="middle">#define PI 3.14159</text>
<text class="code" x="249.3" y="65.0" text-anchor="middle">float r = PI * 2;</text>
</g>
<g id="el-pp">
<rect class="n-box shp" x="58.1" y="116.0" width="382.4" height="46.0" rx="8"/>
<text class="t" x="249.3" y="144.0" text-anchor="middle">הפרה-פרוססור מחליף כל מופע של השם בערך</text>
</g>
<g id="el-after">
<rect class="n-code-bg shp" x="132.0" y="202.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="249.3" y="229.0" text-anchor="middle">float r = 3.14159 * 2;</text>
</g>
<g id="el-cc">
<rect class="n-box shp" x="68.5" y="280.0" width="361.5" height="46.0" rx="8"/>
<text class="t" x="249.3" y="308.0" text-anchor="middle">רק עכשיו הקומפיילר מתרגם לשפת מכונה</text>
</g>
<g id="el-note">
<text class="small" x="249.3" y="379.0" text-anchor="middle">זהו אינו משתנה ואין לו טיפוס או כתובת בזיכרון, זו החלפת טקסט בלבד</text>
</g>
</svg>
