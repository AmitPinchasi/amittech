<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 733 664" width="733" role="img" aria-label="איך מנטין מחשבת את ערכת הצבעים בפועל מהערך שנבחר, מהעדפת המערכת ומהשמירה ב-localStorage">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-pick{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pick .shp{animation-name:k-pick;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-store{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-store .shp{animation-name:k-store;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sys{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sys .shp{animation-name:k-sys;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-comp{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-comp .shp{animation-name:k-comp;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-paint{0.00%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-paint .shp{animation-name:k-paint;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}40.73%{stroke-width:1.6;}43.55%{stroke:var(--pink);stroke-width:2.4;}58.06%{stroke:var(--pink);stroke-width:2.4;}60.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}55.24%{stroke-width:1.6;}58.06%{stroke:var(--pink);stroke-width:2.4;}72.58%{stroke:var(--pink);stroke-width:2.4;}75.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="234.5,54.0 234.5,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="234.5,140.0 234.5,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="452.9,289.2 518.9,289.2" marker-end="url(#arr)"/>
<text class="lbl" x="485.9" y="277.2" text-anchor="middle">לא</text>
<polyline id="edge-3" class="edge" points="234.5,398.5 234.5,438.5" marker-end="url(#arr)"/>
<text class="lbl" x="248.5" y="422.5" text-anchor="end">כן</text>
<polyline id="edge-4" class="edge" points="234.5,484.5 234.5,524.5" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="234.5,562.5 234.5,602.5" marker-end="url(#arr)"/>
<g id="el-pick">
<rect class="n-code-bg shp" x="117.2" y="16.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="234.5" y="43.0" text-anchor="middle">setColorScheme("auto")</text>
</g>
<g id="el-store">
<rect class="n-box shp" x="94.5" y="94.0" width="279.9" height="46.0" rx="8"/>
<text class="t" x="234.5" y="122.0" text-anchor="middle">הבחירה נשמרת ב-localStorage</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="234.5,180.0 452.9,289.2 234.5,398.5 16.0,289.2"/>
<text class="code" x="234.5" y="294.2" text-anchor="middle">colorScheme === "auto"</text>
</g>
<g id="el-same">
<rect class="n-code-bg shp" x="518.9" y="270.2" width="198.5" height="38.0" rx="7"/>
<text class="code" x="618.2" y="297.2" text-anchor="middle">computed = "light"</text>
</g>
<g id="el-sys">
<rect class="n-box shp" x="55.0" y="438.5" width="358.8" height="46.0" rx="8"/>
<text class="t" x="234.5" y="466.5" text-anchor="middle">בודקים prefers-color-scheme של המערכת</text>
</g>
<g id="el-comp">
<rect class="n-code-bg shp" x="139.7" y="524.5" width="189.5" height="38.0" rx="7"/>
<text class="code" x="234.5" y="551.5" text-anchor="middle">computed = "dark"</text>
</g>
<g id="el-paint">
<rect class="n-box shp" x="36.6" y="602.5" width="395.8" height="46.0" rx="8"/>
<text class="t" x="234.5" y="630.5" text-anchor="middle">כל הקומפוננטות מקבלות את צבעי המצב הכהה</text>
</g>
</svg>
