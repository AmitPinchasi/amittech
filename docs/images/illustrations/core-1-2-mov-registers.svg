<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 354 426" width="354" role="img" aria-label="אנימציה של פקודות mov ו-add: הערכים ברגיסטרים ax ו-bx משתנים הוראה אחרי הוראה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-ax{0.00%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-ax .shp{animation-name:k-ax;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-bx{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-bx .shp{animation-name:k-bx;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-step-0{opacity:0;}
@keyframes k-dyn-step-0{0.00%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-step-0{animation-name:k-dyn-step-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-step-1{opacity:0;}
@keyframes k-dyn-step-1{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-step-1{animation-name:k-dyn-step-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-step-2{opacity:1;}
@keyframes k-dyn-step-2{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-step-2{animation-name:k-dyn-step-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ax-0{opacity:0;}
@keyframes k-dyn-ax-0{0.00%{opacity:1;}20.45%{opacity:1;}24.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-ax-0{animation-name:k-dyn-ax-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ax-1{opacity:0;}
@keyframes k-dyn-ax-1{0.00%{opacity:0;}16.48%{opacity:0;}20.45%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-ax-1{animation-name:k-dyn-ax-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ax-2{opacity:1;}
@keyframes k-dyn-ax-2{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-ax-2{animation-name:k-dyn-ax-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bx-0{opacity:0;}
@keyframes k-dyn-bx-0{0.00%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-bx-0{animation-name:k-dyn-bx-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bx-1{opacity:1;}
@keyframes k-dyn-bx-1{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-bx-1{animation-name:k-dyn-bx-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="114.0" y="16.0" width="126.3" height="82.0" rx="7"/>
<text class="code" x="177.1" y="43.0" text-anchor="middle">mov ax, 5</text>
<text class="code" x="177.1" y="65.0" text-anchor="middle">mov bx, ax</text>
<text class="code" x="177.1" y="87.0" text-anchor="middle">add ax, 10</text>
</g>
<g id="el-step">
<rect class="n-box shp" x="16.0" y="138.0" width="322.2" height="46.0" rx="8"/>
<text class="t dyn-step-0" x="177.1" y="166.0" text-anchor="middle">מכניסים את המספר 5 לרגיסטר ax</text>
<text class="t dyn-step-1" x="177.1" y="166.0" text-anchor="middle">מעתיקים את הערך של ax לרגיסטר bx</text>
<text class="t dyn-step-2" x="177.1" y="166.0" text-anchor="middle">מוסיפים 10 לערך שנמצא ב-ax</text>
</g>
<g id="el-ax">
<rect class="n-box shp" x="124.3" y="224.0" width="105.6" height="44.0" rx="8"/>
<text class="t-b dyn-ax-0" x="177.1" y="251.0" text-anchor="middle" style="direction:ltr">AX = 0</text>
<text class="t-b dyn-ax-1" x="177.1" y="251.0" text-anchor="middle" style="direction:ltr">AX = 5</text>
<text class="t-b dyn-ax-2" x="177.1" y="251.0" text-anchor="middle" style="direction:ltr">AX = 15</text>
</g>
<g id="el-bx">
<rect class="n-box shp" x="129.1" y="308.0" width="96.0" height="44.0" rx="8"/>
<text class="t-b dyn-bx-0" x="177.1" y="335.0" text-anchor="middle" style="direction:ltr">BX = 0</text>
<text class="t-b dyn-bx-1" x="177.1" y="335.0" text-anchor="middle" style="direction:ltr">BX = 5</text>
</g>
<g id="el-note">
<text class="small" x="177.1" y="405.0" text-anchor="middle">הפקודה mov מעתיקה ערך ולא מוחקת את המקור</text>
</g>
</svg>
