<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 493 299" width="493" role="img" aria-label="תרשים זרימה של לולאת while: הבדיקה חוזרת עד שהתנאי נכשל">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-init{0.00%{stroke-width:1.5;}0.00%{stroke:var(--pink);stroke-width:2.5;}12.82%{stroke:var(--pink);stroke-width:2.5;}12.83%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-init .shp{animation-name:k-init;animation-duration:7.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}12.81%{stroke-width:1.5;}12.82%{stroke:var(--pink);stroke-width:2.5;}25.64%{stroke:var(--pink);stroke-width:2.5;}25.65%{stroke-width:1.5;}38.45%{stroke-width:1.5;}38.46%{stroke:var(--pink);stroke-width:2.5;}51.28%{stroke:var(--pink);stroke-width:2.5;}51.29%{stroke-width:1.5;}64.09%{stroke-width:1.5;}64.10%{stroke:var(--pink);stroke-width:2.5;}76.92%{stroke:var(--pink);stroke-width:2.5;}76.93%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:7.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-body{0.00%{stroke-width:1.5;}25.63%{stroke-width:1.5;}25.64%{stroke:var(--pink);stroke-width:2.5;}38.46%{stroke:var(--pink);stroke-width:2.5;}38.47%{stroke-width:1.5;}51.27%{stroke-width:1.5;}51.28%{stroke:var(--pink);stroke-width:2.5;}64.10%{stroke:var(--pink);stroke-width:2.5;}64.11%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-body .shp{animation-name:k-body;animation-duration:7.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-end{0.00%{stroke-width:1.5;}76.91%{stroke-width:1.5;}76.92%{stroke:var(--pink);stroke-width:2.5;}89.74%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-end .shp{animation-name:k-end;animation-duration:7.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.63%{stroke-width:1.6;}25.64%{stroke:var(--pink);stroke-width:2.4;}38.46%{stroke:var(--pink);stroke-width:2.4;}38.47%{stroke-width:1.6;}51.27%{stroke-width:1.6;}51.28%{stroke:var(--pink);stroke-width:2.4;}64.10%{stroke:var(--pink);stroke-width:2.4;}64.11%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:7.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}38.45%{stroke-width:1.6;}38.46%{stroke:var(--pink);stroke-width:2.4;}51.28%{stroke:var(--pink);stroke-width:2.4;}51.29%{stroke-width:1.6;}64.09%{stroke-width:1.6;}64.10%{stroke:var(--pink);stroke-width:2.4;}76.92%{stroke:var(--pink);stroke-width:2.4;}76.93%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:7.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}76.91%{stroke-width:1.6;}76.92%{stroke:var(--pink);stroke-width:2.4;}89.74%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:7.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="274.7,138.7 340.7,138.7" marker-end="url(#arr)"/>
<text class="lbl" x="307.7" y="126.7" text-anchor="middle">לא</text>
<polyline id="edge-1" class="edge" points="185.4,54.0 185.4,94.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="185.4,183.4 185.4,223.4" marker-end="url(#arr)"/>
<text class="lbl" x="199.4" y="207.4" text-anchor="end">כן</text>
<polyline id="edge-3" class="edge" points="113.2,253.4 16.0,253.4 16.0,138.7 96.0,138.7" marker-end="url(#arr)"/>
<text class="small" x="56.0" y="126.7" text-anchor="middle">חוזרים לבדיקה</text>
<g id="el-init">
<rect class="n-code-bg shp" x="126.7" y="16.0" width="117.2" height="38.0" rx="7"/>
<text class="code" x="185.4" y="43.0" text-anchor="middle">count = 0</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="185.4,94.0 274.7,138.7 185.4,183.4 96.0,138.7"/>
<text class="code" x="185.4" y="143.7" text-anchor="middle">count &lt; 5</text>
</g>
<g id="el-body">
<rect class="n-code-bg shp" x="113.2" y="223.4" width="144.3" height="60.0" rx="7"/>
<text class="code" x="185.4" y="250.4" text-anchor="middle">print(count)</text>
<text class="code" x="185.4" y="272.4" text-anchor="middle">count += 1</text>
</g>
<g id="el-end">
<rect class="n-box shp" x="340.7" y="115.7" width="136.7" height="46.0" rx="8"/>
<text class="t" x="409.1" y="143.7" text-anchor="middle">סוף הלולאה</text>
</g>
</svg>
