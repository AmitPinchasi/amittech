<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 373 312" width="373" role="img" aria-label="זרימת קריאה לפונקציה: הארגומנטים נכנסים, הפונקציה מחשבת, והערך חוזר אל המשתנה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}24.59%{stroke:var(--pink);stroke-width:2.5;}30.33%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-func{0.00%{stroke-width:1.5;}18.85%{stroke-width:1.5;}24.59%{stroke:var(--pink);stroke-width:2.5;}49.18%{stroke:var(--pink);stroke-width:2.5;}54.92%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-func .shp{animation-name:k-func;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-res{0.00%{stroke-width:1.5;}43.44%{stroke-width:1.5;}49.18%{stroke:var(--pink);stroke-width:2.5;}73.77%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-res .shp{animation-name:k-res;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}18.85%{stroke-width:1.6;}24.59%{stroke:var(--pink);stroke-width:2.4;}49.18%{stroke:var(--pink);stroke-width:2.4;}54.92%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}43.44%{stroke-width:1.6;}49.18%{stroke:var(--pink);stroke-width:2.4;}73.77%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}49.18%{opacity:1;}54.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-1{opacity:1;}
@keyframes k-dyn-res-1{0.00%{opacity:0;}43.44%{opacity:0;}49.18%{opacity:1;}73.77%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="163.3,54.0 163.3,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="177.3" y="78.0" text-anchor="end">הארגומנטים 5 ו-4 נכנסים</text>
<polyline id="edge-1" class="edge" points="163.3,154.0 163.3,194.0" marker-end="url(#arr)"/>
<text class="lbl" x="177.3" y="178.0" text-anchor="end">הפונקציה מחזירה 9</text>
<g id="el-call">
<rect class="n-code-bg shp" x="64.0" y="16.0" width="198.5" height="38.0" rx="7"/>
<text class="code" x="163.3" y="43.0" text-anchor="middle">result = add(5, 4)</text>
</g>
<g id="el-func">
<rect class="n-code-bg shp" x="73.1" y="94.0" width="180.4" height="60.0" rx="7"/>
<text class="code" x="163.3" y="121.0" text-anchor="middle">def add(a, b):</text>
<text class="code" x="163.3" y="143.0" text-anchor="middle">    return a + b</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="100.2" y="194.0" width="126.1" height="44.0" rx="8"/>
<text class="t-b dyn-res-0" x="163.3" y="221.0" text-anchor="middle" style="direction:ltr">?</text>
<text class="t-b dyn-res-1" x="163.3" y="221.0" text-anchor="middle" style="direction:ltr">result = 9</text>
</g>
<g id="el-note">
<text class="small" x="163.3" y="291.0" text-anchor="middle">הערך שהפונקציה מחזירה נשמר במשתנה result</text>
</g>
</svg>
