.dyn-env-1{opacity:1;}
@keyframes k-dyn-env-1{0.00%{opacity:0;}35.56%{opacity:0;}38.03%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-env-1{animation-name:k-dyn-env-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}12.68%{opacity:1;}15.14%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:0;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}10.21%{opacity:0;}12.68%{opacity:1;}50.70%{opacity:1;}53.17%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-2{opacity:1;}
@keyframes k-dyn-cond-2{0.00%{opacity:0;}48.24%{opacity:0;}50.70%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-2{animation-name:k-dyn-cond-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="258.1,54.0 258.1,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="258.1,336.1 258.1,376.1" marker-end="url(#arr)"/>
<text class="lbl" x="272.1" y="360.1" text-anchor="end">כן</text>
<polyline id="edge-2" class="edge" points="258.1,422.1 258.1,462.1" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="500.2,215.0 566.2,215.0" marker-end="url(#arr)"/>
<text class="lbl" x="533.2" y="203.0" text-anchor="middle">לא</text>
<g id="el-env">
<rect class="n-code-bg shp" x="46.0" y="16.0" width="424.2" height="38.0" rx="7"/>
<text class="code dyn-env-0" x="258.1" y="43.0" text-anchor="middle">API_KEY=secret</text>
<text class="code dyn-env-1" x="258.1" y="43.0" text-anchor="middle">NEXT_PUBLIC_API_URL=https://api.example.com</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="258.1,94.0 500.2,215.0 258.1,336.1 16.0,215.0"/>
<text class="t dyn-cond-0" x="258.1" y="220.0" text-anchor="middle">השם מתחיל ב-NEXT_PUBLIC?</text>
<text class="t dyn-cond-1" x="258.1" y="220.0" text-anchor="middle">לא - משתנה שרת</text>
<text class="t dyn-cond-2" x="258.1" y="220.0" text-anchor="middle">כן - משתנה ציבורי</text>
</g>
<g id="el-srv">
<rect class="n-box shp" x="566.2" y="192.0" width="171.0" height="46.0" rx="8"/>
<text class="t" x="651.7" y="220.0" text-anchor="middle">נשאר בשרת בלבד</text>
</g>
<g id="el-cli">
