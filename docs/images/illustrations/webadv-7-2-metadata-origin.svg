<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 431 394" width="431" role="img" aria-label="תקיפת ענן דרך SSRF: מקור הבקשה עובר מהתוקף אל השרת הפגיע, שממנו הבקשה מגיעה לשירות המטא-דאטה הפנימי ומחזירה את הרשאות ה-IAM">
<style>
