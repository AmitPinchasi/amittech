<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 469 940" width="469" role="img" aria-label="מפת המקורות שמהם printf שולפת כל המרה ב-64 ביט - חמש ההמרות הראשונות מגיעות מהאוגרים rsi עד r9, ומההמרה השישית ואילך printf שולפת מהמחסנית, ושם בדיוק יושב הbuffer של התוקף">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-title">
<text class="small" x="234.6" y="29.0" text-anchor="middle">מאיפה printf שולפת כל המרה - 64 ביט</text>
</g>
<g id="el-rdi">
<rect class="n-box shp" x="81.3" y="74.0" width="306.8" height="46.0" rx="8"/>
<text class="t" x="234.6" y="102.0" text-anchor="middle">מצביע מחרוזת הformat עצמה - rdi</text>
</g>
<g id="el-c1">
<rect class="n-box shp" x="164.8" y="160.0" width="139.8" height="46.0" rx="8"/>
<text class="t" x="234.6" y="188.0" text-anchor="middle">המרה 1 - rsi</text>
</g>
<g id="el-c2">
<rect class="n-box shp" x="164.8" y="246.0" width="139.8" height="46.0" rx="8"/>
<text class="t" x="234.6" y="274.0" text-anchor="middle">המרה 2 - rdx</text>
</g>
<g id="el-c3">
<rect class="n-box shp" x="164.8" y="332.0" width="139.8" height="46.0" rx="8"/>
<text class="t" x="234.6" y="360.0" text-anchor="middle">המרה 3 - rcx</text>
</g>
<g id="el-c4">
<rect class="n-box shp" x="167.9" y="418.0" width="133.4" height="46.0" rx="8"/>
<text class="t" x="234.6" y="446.0" text-anchor="middle">המרה 4 - r8</text>
</g>
<g id="el-c5">
<rect class="n-box shp" x="167.9" y="504.0" width="133.4" height="46.0" rx="8"/>
<text class="t" x="234.6" y="532.0" text-anchor="middle">המרה 5 - r9</text>
</g>
<g id="el-div">
<text class="small" x="234.6" y="603.0" text-anchor="middle">האוגרים נגמרו - מכאן ואילך מהמחסנית</text>
</g>
<g id="el-c6">
<rect class="n-box shp" x="112.3" y="648.0" width="244.6" height="46.0" rx="8"/>
<text class="t" x="234.6" y="676.0" text-anchor="middle">המרה 6 - [rsp+0x00] - %6$p</text>
</g>
<g id="el-c7">
<rect class="n-box shp" x="112.3" y="734.0" width="244.6" height="46.0" rx="8"/>
<text class="t" x="234.6" y="762.0" text-anchor="middle">המרה 7 - [rsp+0x08] - %7$p</text>
</g>
<g id="el-c8">
<rect class="n-box shp" x="112.3" y="820.0" width="244.6" height="46.0" rx="8"/>
<text class="t" x="234.6" y="848.0" text-anchor="middle">המרה 8 - [rsp+0x10] - %8$p</text>
</g>
<g id="el-note">
<text class="small" x="234.6" y="919.0" text-anchor="middle">הbuffer שלנו יושב על המחסנית - לכן ההיסט שלו כמעט תמיד 6 ומעלה</text>
</g>
</svg>
