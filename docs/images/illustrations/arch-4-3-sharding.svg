<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 392 300" width="392" role="img" aria-label="פיצול נתונים ב-Hash Sharding: ה-owner_id עובר חישוב modulo לפי מספר ה-shards, והתוצאה קובעת לאיזה shard הנתון נשמר">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
