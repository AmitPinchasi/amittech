.dyn-typ-1{opacity:0;}
@keyframes k-dyn-typ-1{0.00%{opacity:0;}37.81%{opacity:0;}40.00%{opacity:1;}70.00%{opacity:1;}72.19%{opacity:0;}100.00%{opacity:0;}}
