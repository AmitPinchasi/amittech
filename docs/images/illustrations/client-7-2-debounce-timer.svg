#el-tmr .shp{animation-name:k-tmr;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}27.81%{stroke-width:1.5;}30.00%{stroke:var(--pink);stroke-width:2.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}42.19%{stroke-width:1.5;}67.81%{stroke-width:1.5;}70.00%{stroke:var(--pink);stroke-width:2.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}82.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
