@keyframes k-edge-2{0.00%{stroke-width:1.6;}27.81%{stroke-width:1.6;}30.00%{stroke:var(--pink);stroke-width:2.4;}40.00%{stroke:var(--pink);stroke-width:2.4;}42.19%{stroke-width:1.6;}67.81%{stroke-width:1.6;}70.00%{stroke:var(--pink);stroke-width:2.4;}80.00%{stroke:var(--pink);stroke-width:2.4;}82.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
