@keyframes k-edge-3{0.00%{stroke-width:1.6;}77.81%{stroke-width:1.6;}80.00%{stroke:var(--pink);stroke-width:2.4;}90.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
