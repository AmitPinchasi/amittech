<text class="t" x="164.3" y="364.2" text-anchor="middle">ניתוח - נתיבים, מפתחות, הערות</text>
</g>
<g id="el-target">
<rect class="n-box shp" x="59.3" y="422.2" width="210.0" height="46.0" rx="8"/>
<text class="t" x="164.3" y="450.2" text-anchor="middle">מטרות חדשות לבדיקה</text>
</g>
</svg>
