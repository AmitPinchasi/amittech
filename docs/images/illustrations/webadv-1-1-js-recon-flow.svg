<polyline id="edge-2" class="edge" points="400.5,296.2 400.5,359.2 312.7,359.2" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="164.3,250.2 164.3,336.2" marker-end="url(#arr)"/>
<text class="lbl" x="178.3" y="297.2" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="164.3,382.2 164.3,422.2" marker-end="url(#arr)"/>
