<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 456 458" width="456" role="img" aria-label="הפקודה rdtsc מפצלת את מונה הזמן של המעבד לשני רגיסטרים, והקוד מרכיב מהם ערך של 64 ביט">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edx{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-edx .shp{animation-name:k-edx;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-eax{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-eax .shp{animation-name:k-eax;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-comb{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-comb .shp{animation-name:k-comb;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-res{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-res .shp{animation-name:k-res;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-edx-0{opacity:0;}
@keyframes k-dyn-edx-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-edx-0{animation-name:k-dyn-edx-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-edx-1{opacity:1;}
@keyframes k-dyn-edx-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-edx-1{animation-name:k-dyn-edx-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-eax-0{opacity:0;}
@keyframes k-dyn-eax-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-eax-0{animation-name:k-dyn-eax-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-eax-1{opacity:1;}
@keyframes k-dyn-eax-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-eax-1{animation-name:k-dyn-eax-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-1{opacity:1;}
@keyframes k-dyn-res-1{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="424.2" height="38.0" rx="7"/>
<text class="code" x="228.1" y="43.0" text-anchor="middle">asm volatile("rdtsc" : "=a"(lo), "=d"(hi));</text>
</g>
<g id="el-edx">
<rect class="n-box shp" x="112.0" y="94.0" width="232.2" height="44.0" rx="8"/>
<text class="t-b dyn-edx-0" x="228.1" y="121.0" text-anchor="middle" style="direction:ltr">edx = hi = ?</text>
<text class="t-b dyn-edx-1" x="228.1" y="121.0" text-anchor="middle" style="direction:ltr">edx = hi = 0x0000001A</text>
</g>
<g id="el-eax">
<rect class="n-box shp" x="112.0" y="178.0" width="232.2" height="44.0" rx="8"/>
<text class="t-b dyn-eax-0" x="228.1" y="205.0" text-anchor="middle" style="direction:ltr">eax = lo = ?</text>
<text class="t-b dyn-eax-1" x="228.1" y="205.0" text-anchor="middle" style="direction:ltr">eax = lo = 0xB3F20C41</text>
</g>
<g id="el-comb">
<rect class="n-code-bg shp" x="97.2" y="262.0" width="261.7" height="38.0" rx="7"/>
<text class="code" x="228.1" y="289.0" text-anchor="middle">((uint64_t)hi &lt;&lt; 32) | lo</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="85.1" y="340.0" width="285.9" height="44.0" rx="8"/>
<text class="t-b dyn-res-0" x="228.1" y="367.0" text-anchor="middle" style="direction:ltr">tsc = ?</text>
<text class="t-b dyn-res-1" x="228.1" y="367.0" text-anchor="middle" style="direction:ltr">tsc = 0x0000001AB3F20C41</text>
</g>
<g id="el-note">
<text class="small" x="228.1" y="437.0" text-anchor="middle">המונה סופר מחזורי שעון מאז הפעלת המעבד, ולכן חובה volatile</text>
</g>
</svg>
