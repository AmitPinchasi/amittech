<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 936 1111" width="936" role="img" aria-label="סדר החיפוש של malloc אחרי chunk מתאים: קודם tcache, אחר כך fastbin או small bin בגודל מדויק, אחר כך unsorted ו-large bin, ולבסוף חיתוך מה-top chunk או בקשת זיכרון נוסף מהkernel">
<style>
