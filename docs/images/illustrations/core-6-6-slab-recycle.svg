<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-op">
<rect class="n-code-bg shp" x="163.3" y="16.0" width="370.0" height="38.0" rx="7"/>
<text class="code dyn-op-0" x="348.3" y="43.0" text-anchor="middle">kmem_cache_create("task_struct", ...)</text>
<text class="code dyn-op-1" x="348.3" y="43.0" text-anchor="middle">kmem_cache_alloc(cache, GFP_KERNEL)</text>
<text class="code dyn-op-2" x="348.3" y="43.0" text-anchor="middle">kmem_cache_alloc(cache, GFP_KERNEL)</text>
<text class="code dyn-op-3" x="348.3" y="43.0" text-anchor="middle">kmem_cache_free(cache, task)</text>
</g>
<g id="el-pool">
<rect class="n-code-bg shp" x="253.6" y="94.0" width="189.5" height="38.0" rx="7"/>
<text class="code dyn-pool-0" x="348.3" y="121.0" text-anchor="middle">free objects = 16</text>
<text class="code dyn-pool-1" x="348.3" y="121.0" text-anchor="middle">free objects = 15</text>
<text class="code dyn-pool-2" x="348.3" y="121.0" text-anchor="middle">free objects = 14</text>
<text class="code dyn-pool-3" x="348.3" y="121.0" text-anchor="middle">free objects = 15</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="172.0" width="664.6" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="348.3" y="200.0" text-anchor="middle">ה-cache מבקש page שלם מ-buddy allocator ומחלק אותו לאובייקטים בגודל קבוע</text>
<text class="t dyn-note-1" x="348.3" y="200.0" text-anchor="middle">ההקצאה מקבלת אובייקט מוכן מהבריכה, בלי פנייה ל-buddy allocator</text>
<text class="t dyn-note-2" x="348.3" y="200.0" text-anchor="middle">גם ההקצאה השנייה מיידית, ולכן יצירת תהליך חדש היא פעולה זולה</text>
<text class="t dyn-note-3" x="348.3" y="200.0" text-anchor="middle">השחרור לא מחזיר זכרון למערכת אלא מחזיר את האובייקט לבריכה לשימוש חוזר</text>
</g>
<g id="el-cap">
<text class="small" x="348.3" y="271.0" text-anchor="middle">אפשר לראות את כל ה-caches ואת מספר האובייקטים בכל אחד מהם בקובץ slabinfo שבתיקיית proc</text>
</g>
</svg>
