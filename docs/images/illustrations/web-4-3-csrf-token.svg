<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 729 622" width="729" role="img" aria-label="תרשים זרימה של הגנת CSRF Token: בקשה מזויפת מאתר זדוני מגיעה ללא אסימון תואם והשרת דוחה אותה, לעומת בקשה מהטופס האמיתי שמצרפת את האסימון הנכון ומתבצעת בהצלחה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-login{0.00%{stroke:var(--pink);stroke-width:2.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}15.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-login .shp{animation-name:k-login;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-evil{0.00%{stroke-width:1.5;}9.77%{stroke-width:1.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}27.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-evil .shp{animation-name:k-evil;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-forged{0.00%{stroke-width:1.5;}22.27%{stroke-width:1.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}40.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-forged .shp{animation-name:k-forged;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-check{0.00%{stroke-width:1.5;}34.77%{stroke-width:1.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}52.73%{stroke-width:1.5;}59.77%{stroke-width:1.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}77.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-check .shp{animation-name:k-check;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-allowed{0.00%{stroke-width:1.5;}47.27%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}65.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-allowed .shp{animation-name:k-allowed;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-reject{0.00%{stroke-width:1.5;}72.27%{stroke-width:1.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}87.50%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-reject .shp{animation-name:k-reject;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.77%{stroke-width:1.6;}12.50%{stroke:var(--pink);stroke-width:2.4;}25.00%{stroke:var(--pink);stroke-width:2.4;}27.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.27%{stroke-width:1.6;}25.00%{stroke:var(--pink);stroke-width:2.4;}37.50%{stroke:var(--pink);stroke-width:2.4;}40.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}34.77%{stroke-width:1.6;}37.50%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}52.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}47.27%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}62.50%{stroke:var(--pink);stroke-width:2.4;}65.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}72.27%{stroke-width:1.6;}75.00%{stroke:var(--pink);stroke-width:2.4;}87.50%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="248.5,62.0 248.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="248.5,148.0 248.5,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="262.5" y="172.0" text-anchor="end">טופס נסתר נשלח אוטומטית</text>
<polyline id="edge-2" class="edge" points="248.5,248.0 248.5,288.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="248.5,520.5 248.5,560.5" marker-end="url(#arr)"/>
<text class="lbl" x="262.5" y="544.5" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="481.0,404.2 547.0,404.2" marker-end="url(#arr)"/>
<text class="lbl" x="514.0" y="392.2" text-anchor="middle">כן</text>
<g id="el-login">
<rect class="n-box shp" x="36.0" y="16.0" width="425.0" height="46.0" rx="8"/>
<text class="t" x="248.5" y="44.0" text-anchor="middle">המשתמש מחובר - בטופס האמיתי מוטבע csrf_token</text>
</g>
<g id="el-evil">
<rect class="n-box shp" x="126.4" y="102.0" width="244.3" height="46.0" rx="8"/>
<text class="t" x="248.5" y="130.0" text-anchor="middle">המשתמש נכנס לאתר זדוני</text>
</g>
<g id="el-forged">
<rect class="n-code-bg shp" x="113.1" y="188.0" width="270.7" height="60.0" rx="7"/>
<text class="code" x="248.5" y="215.0" text-anchor="middle">POST bank.com/change_email</text>
<text class="code" x="248.5" y="237.0" text-anchor="middle">email=hacker@evil.com</text>
</g>
<g id="el-check">
<polygon class="n-dia shp" points="248.5,288.0 481.0,404.2 248.5,520.5 16.0,404.2"/>
<text class="t" x="248.5" y="409.2" text-anchor="middle">csrf_token תואם ל-session?</text>
</g>
<g id="el-reject">
<rect class="n-box shp" x="145.8" y="560.5" width="205.3" height="46.0" rx="8"/>
<text class="t" x="248.5" y="588.5" text-anchor="middle">השרת דוחה את הבקשה</text>
</g>
<g id="el-allowed">
<rect class="n-box shp" x="547.0" y="381.2" width="166.0" height="46.0" rx="8"/>
<text class="t" x="629.9" y="409.2" text-anchor="middle">הפעולה מתבצעת</text>
</g>
</svg>
