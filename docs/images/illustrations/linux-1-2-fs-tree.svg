<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 426 446" width="426" role="img" aria-label="עץ מערכת הקבצים בלינוקס: הפקודה cd משנה את התיקייה הנוכחית והנתיב המוחלט מתעדכן">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-ubuntu{0.00%{stroke:var(--pink);stroke-width:2.5;}25.37%{stroke:var(--pink);stroke-width:2.5;}30.60%{stroke-width:1.5;}45.52%{stroke-width:1.5;}50.75%{stroke:var(--pink);stroke-width:2.5;}76.12%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-ubuntu .shp{animation-name:k-ubuntu;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-downloads{0.00%{stroke-width:1.5;}20.15%{stroke-width:1.5;}25.37%{stroke:var(--pink);stroke-width:2.5;}50.75%{stroke:var(--pink);stroke-width:2.5;}55.97%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-downloads .shp{animation-name:k-downloads;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}20.15%{stroke-width:1.6;}25.37%{stroke:var(--pink);stroke-width:2.4;}50.75%{stroke:var(--pink);stroke-width:2.4;}55.97%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}45.52%{stroke-width:1.6;}50.75%{stroke:var(--pink);stroke-width:2.4;}76.12%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-path-0{opacity:1;}
@keyframes k-dyn-path-0{0.00%{opacity:1;}25.37%{opacity:1;}30.60%{opacity:0;}45.52%{opacity:0;}50.75%{opacity:1;}76.12%{opacity:1;}100.00%{opacity:1;}}
.dyn-path-0{animation-name:k-dyn-path-0;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-path-1{opacity:0;}
@keyframes k-dyn-path-1{0.00%{opacity:0;}20.15%{opacity:0;}25.37%{opacity:1;}50.75%{opacity:1;}55.97%{opacity:0;}100.00%{opacity:0;}}
.dyn-path-1{animation-name:k-dyn-path-1;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="253.1,54.0 253.1,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="253.1,132.0 253.1,172.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="253.1,210.0 253.1,250.0" marker-end="url(#arr)"/>
<text class="lbl" x="267.1" y="234.0" text-anchor="end" style="direction:ltr">cd Downloads</text>
<polyline id="edge-3" class="edge" points="194.5,269.0 16.0,269.0 16.0,191.0 205.1,191.0" marker-end="url(#arr)"/>
<text class="small" x="110.5" y="179.0" text-anchor="middle" style="direction:ltr">cd ..</text>
<g id="el-root">
<rect class="n-code-bg shp" x="205.1" y="16.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="253.1" y="43.0" text-anchor="middle">/</text>
</g>
<g id="el-home">
<rect class="n-code-bg shp" x="205.1" y="94.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="253.1" y="121.0" text-anchor="middle">home</text>
</g>
<g id="el-ubuntu">
<rect class="n-code-bg shp" x="205.1" y="172.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="253.1" y="199.0" text-anchor="middle">ubuntu</text>
</g>
<g id="el-downloads">
<rect class="n-code-bg shp" x="194.5" y="250.0" width="117.2" height="38.0" rx="7"/>
<text class="code" x="253.1" y="277.0" text-anchor="middle">Downloads</text>
</g>
<g id="el-note">
<text class="small" x="253.1" y="341.0" text-anchor="middle">הפקודה cd משנה את התיקייה הנוכחית של ה-shell</text>
</g>
<g id="el-path">
<rect class="n-box shp" x="135.2" y="386.0" width="235.7" height="44.0" rx="8"/>
<text class="t-b dyn-path-0" x="253.1" y="413.0" text-anchor="middle" style="direction:ltr">/home/ubuntu</text>
<text class="t-b dyn-path-1" x="253.1" y="413.0" text-anchor="middle" style="direction:ltr">/home/ubuntu/Downloads</text>
</g>
</svg>
