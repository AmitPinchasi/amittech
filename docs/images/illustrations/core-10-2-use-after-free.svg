<g id="el-note">
<text class="small" x="340.9" y="361.0" text-anchor="middle">אחרי free הזיכרון עשוי להיות מוקצה מחדש, ולכן כל גישה דרך המצביע הישן היא התנהגות לא מוגדרת</text>
