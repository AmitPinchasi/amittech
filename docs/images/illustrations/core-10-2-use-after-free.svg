<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="178.5" y="16.0" width="324.9" height="38.0" rx="7"/>
<text class="code dyn-code-0" x="340.9" y="43.0" text-anchor="middle">p = malloc(sizeof(int));</text>
<text class="code dyn-code-1" x="340.9" y="43.0" text-anchor="middle">*p = 42;</text>
<text class="code dyn-code-2" x="340.9" y="43.0" text-anchor="middle">free(p);</text>
<text class="code dyn-code-3" x="340.9" y="43.0" text-anchor="middle">q = malloc(sizeof(int)); *q = 7;</text>
<text class="code dyn-code-4" x="340.9" y="43.0" text-anchor="middle">printf("%d", *p);</text>
</g>
