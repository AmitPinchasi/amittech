<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 570 528" width="570" role="img" aria-label="איור זכרון משותף עם mmap ו-MAP_SHARED: האב והבן ממופים לאותו דף פיזי, ולכן הערך שהאב כותב נראה מיד גם בבן">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-init{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}27.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-init .shp{animation-name:k-init;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fork{0.00%{stroke-width:1.5;}22.89%{stroke-width:1.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fork .shp{animation-name:k-fork;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-page{0.00%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}53.17%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-page .shp{animation-name:k-page;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-par{0.00%{stroke-width:1.5;}48.24%{stroke-width:1.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-par .shp{animation-name:k-par;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-chi{0.00%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
