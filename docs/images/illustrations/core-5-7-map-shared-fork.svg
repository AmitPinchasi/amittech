#edge-0{animation-name:k-edge-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.89%{stroke-width:1.6;}25.35%{stroke:var(--pink);stroke-width:2.4;}38.03%{stroke:var(--pink);stroke-width:2.4;}40.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}35.56%{stroke-width:1.6;}38.03%{stroke:var(--pink);stroke-width:2.4;}50.70%{stroke:var(--pink);stroke-width:2.4;}53.17%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}48.24%{stroke-width:1.6;}50.70%{stroke:var(--pink);stroke-width:2.4;}63.38%{stroke:var(--pink);stroke-width:2.4;}65.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-page-0{opacity:0;}
@keyframes k-dyn-page-0{0.00%{opacity:1;}63.38%{opacity:1;}65.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-page-0{animation-name:k-dyn-page-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-page-1{opacity:1;}
@keyframes k-dyn-page-1{0.00%{opacity:0;}60.92%{opacity:0;}63.38%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-page-1{animation-name:k-dyn-page-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-chi-0{opacity:0;}
@keyframes k-dyn-chi-0{0.00%{opacity:1;}76.06%{opacity:1;}78.52%{opacity:0;}100.00%{opacity:0;}}
.dyn-chi-0{animation-name:k-dyn-chi-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-chi-1{opacity:1;}
@keyframes k-dyn-chi-1{0.00%{opacity:0;}73.59%{opacity:0;}76.06%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-chi-1{animation-name:k-dyn-chi-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="285.1,98.0 285.1,138.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="285.1,176.0 285.1,216.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="285.1,262.0 285.1,302.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="285.1,348.0 285.1,388.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="285.1,426.0 285.1,466.0" marker-end="url(#arr)"/>
<g id="el-code">
<rect class="n-code-bg shp" x="91.1" y="16.0" width="388.1" height="82.0" rx="7"/>
<text class="code" x="285.1" y="43.0" text-anchor="middle">int *shared = mmap(NULL, 4,</text>
<text class="code" x="285.1" y="65.0" text-anchor="middle">    PROT_READ | PROT_WRITE,</text>
<text class="code" x="285.1" y="87.0" text-anchor="middle">    MAP_SHARED | MAP_ANONYMOUS, -1, 0);</text>
</g>
<g id="el-init">
<rect class="n-code-bg shp" x="213.0" y="138.0" width="144.3" height="38.0" rx="7"/>
<text class="code" x="285.1" y="165.0" text-anchor="middle">*shared = 0;</text>
</g>
<g id="el-fork">
<rect class="n-box shp" x="16.0" y="216.0" width="538.3" height="46.0" rx="8"/>
<text class="t" x="285.1" y="244.0" text-anchor="middle">הקריאה fork יוצרת בן, ושני התהליכים ממופים לאותו דף פיזי</text>
</g>
<g id="el-page">
<rect class="n-box shp" x="115.8" y="302.0" width="338.7" height="46.0" rx="8"/>
<text class="t dyn-page-0" x="285.1" y="330.0" text-anchor="middle">הדף הפיזי המשותף מחזיק את הערך 0</text>
<text class="t dyn-page-1" x="285.1" y="330.0" text-anchor="middle">הדף הפיזי המשותף מחזיק את הערך 42</text>
</g>
<g id="el-par">
<rect class="n-code-bg shp" x="208.5" y="388.0" width="153.4" height="38.0" rx="7"/>
<text class="code" x="285.1" y="415.0" text-anchor="middle">*shared = 42;</text>
</g>
<g id="el-chi">
<rect class="n-box shp" x="146.7" y="466.0" width="276.8" height="46.0" rx="8"/>
<text class="t dyn-chi-0" x="285.1" y="494.0" text-anchor="middle">הבן קורא את shared ורואה 0</text>
<text class="t dyn-chi-1" x="285.1" y="494.0" text-anchor="middle">הבן קורא את shared ורואה 42</text>
</g>
