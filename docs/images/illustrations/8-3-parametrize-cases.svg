<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 459 298" width="459" role="img" aria-label="טסט עם פרמטרים: כל שלשה ברשימה של parametrize מריצה את אותו טסט פעם נוספת עם ערכים אחרים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-0{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c0{animation-name:k-lst-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-1{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c1{animation-name:k-lst-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-2{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-lst-c2{animation-name:k-lst-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}16.48%{transform:translateX(0.0px);}20.45%{transform:translateX(0.0px);}36.93%{transform:translateX(0.0px);}40.91%{transform:translateX(-134.4px);}57.39%{transform:translateX(-134.4px);}61.36%{transform:translateX(-268.7px);}77.84%{transform:translateX(-268.7px);}100.00%{transform:translateX(-268.7px);}}
#eg-0{animation-name:k-mv-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:0;}
@keyframes k-dyn-val-1{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-2{opacity:1;}
@keyframes k-dyn-val-2{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-2{animation-name:k-dyn-val-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="81.2" y="16.0" width="252.7" height="38.0" rx="7"/>
<text class="code" x="207.5" y="43.0" text-anchor="middle">@pytest.mark.parametrize</text>
</g>
<g id="el-lst">
<rect id="el-lst-c0" class="n-cell shp" x="284.7" y="94.0" width="114.4" height="46.0" rx="6"/>
<text class="t" x="341.9" y="122.0" text-anchor="middle" style="direction:ltr">(2, 3, 6)</text>
<rect id="el-lst-c1" class="n-cell shp" x="150.4" y="94.0" width="114.4" height="46.0" rx="6"/>
<text class="t" x="207.5" y="122.0" text-anchor="middle" style="direction:ltr">(-1, 5, -5)</text>
<rect id="el-lst-c2" class="n-cell shp" x="16.0" y="94.0" width="114.4" height="46.0" rx="6"/>
<text class="t" x="73.2" y="122.0" text-anchor="middle" style="direction:ltr">(0, 100, 0)</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="341.9,140.0 341.9,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="353.9" y="164.0" text-anchor="end">הטסט הנוכחי</text>
<g id="el-val">
<rect class="n-box shp" x="242.1" y="180.0" width="199.5" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="341.9" y="207.0" text-anchor="middle" style="direction:ltr">assert 2 * 3 == 6</text>
<text class="t-b dyn-val-1" x="341.9" y="207.0" text-anchor="middle" style="direction:ltr">assert -1 * 5 == -5</text>
<text class="t-b dyn-val-2" x="341.9" y="207.0" text-anchor="middle" style="direction:ltr">assert 0 * 100 == 0</text>
</g>
</g>
<g id="el-note">
<text class="small" x="207.5" y="277.0" text-anchor="middle">שלוש שלשות ברשימה - שלושה טסטים נפרדים</text>
</g>
</svg>
