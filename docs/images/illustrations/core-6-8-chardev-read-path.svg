<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 659 620" width="659" role="img" aria-label="תרשים המסלול של קריאה מקובץ התקן תו: מהקריאה read ביוזר מוד, דרך המספר הראשי שמזהה את הדרייבר, ועד ל-copy_to_user שמחזירה את הבתים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-user{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-user .shp{animation-name:k-user;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-vfs{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}27.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-vfs .shp{animation-name:k-vfs;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-num{0.00%{stroke-width:1.5;}22.89%{stroke-width:1.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-num .shp{animation-name:k-num;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lookup{0.00%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}53.17%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lookup .shp{animation-name:k-lookup;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fop{0.00%{stroke-width:1.5;}48.24%{stroke-width:1.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fop .shp{animation-name:k-fop;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-copy{0.00%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-copy .shp{animation-name:k-copy;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ret{0.00%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-ret .shp{animation-name:k-ret;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.21%{stroke-width:1.6;}12.68%{stroke:var(--pink);stroke-width:2.4;}25.35%{stroke:var(--pink);stroke-width:2.4;}27.82%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.89%{stroke-width:1.6;}25.35%{stroke:var(--pink);stroke-width:2.4;}38.03%{stroke:var(--pink);stroke-width:2.4;}40.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}35.56%{stroke-width:1.6;}38.03%{stroke:var(--pink);stroke-width:2.4;}50.70%{stroke:var(--pink);stroke-width:2.4;}53.17%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}48.24%{stroke-width:1.6;}50.70%{stroke:var(--pink);stroke-width:2.4;}63.38%{stroke:var(--pink);stroke-width:2.4;}65.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}60.92%{stroke-width:1.6;}63.38%{stroke:var(--pink);stroke-width:2.4;}76.06%{stroke:var(--pink);stroke-width:2.4;}78.52%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="329.4,54.0 329.4,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="329.4,140.0 329.4,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="329.4,218.0 329.4,258.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="329.4,304.0 329.4,344.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="329.4,382.0 329.4,422.0" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="329.4,460.0 329.4,500.0" marker-end="url(#arr)"/>
<g id="el-user">
<rect class="n-code-bg shp" x="212.1" y="16.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="329.4" y="43.0" text-anchor="middle">n = read(fd, buf, 16);</text>
</g>
<g id="el-vfs">
<rect class="n-box shp" x="98.4" y="94.0" width="462.0" height="46.0" rx="8"/>
<text class="t" x="329.4" y="122.0" text-anchor="middle">שכבת ה-VFS מוצאת את ה-inode ורואה שזהו קובץ התקן</text>
</g>
<g id="el-num">
<rect class="n-code-bg shp" x="212.1" y="180.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="329.4" y="207.0" text-anchor="middle">major = 240, minor = 0</text>
</g>
<g id="el-lookup">
<rect class="n-box shp" x="104.6" y="258.0" width="449.6" height="46.0" rx="8"/>
<text class="t" x="329.4" y="286.0" text-anchor="middle">הקרנל מוצא בטבלה את הדרייבר שרשום למספר הראשי</text>
</g>
<g id="el-fop">
<rect class="n-code-bg shp" x="207.6" y="344.0" width="243.6" height="38.0" rx="7"/>
<text class="code" x="329.4" y="371.0" text-anchor="middle">fops.read -&gt; dev_read()</text>
</g>
<g id="el-copy">
<rect class="n-code-bg shp" x="144.4" y="422.0" width="370.0" height="38.0" rx="7"/>
<text class="code" x="329.4" y="449.0" text-anchor="middle">copy_to_user(buf, device_buffer, len)</text>
</g>
<g id="el-ret">
<rect class="n-box shp" x="50.9" y="500.0" width="557.1" height="46.0" rx="8"/>
<text class="t" x="329.4" y="528.0" text-anchor="middle">הדרייבר מקדם את המיקום בקובץ ומחזיר את מספר הבתים שהועתקו</text>
</g>
<g id="el-note">
<text class="small" x="329.4" y="599.0" text-anchor="middle">המספר המשני מבדיל בין התקנים שונים שאותו דרייבר מטפל בהם, ולכן אותו קוד משרת כמה התקנים</text>
</g>
</svg>
