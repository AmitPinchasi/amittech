<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 687 419" width="687" role="img" aria-label="סיבוב של לולאת אירועים: המתנה לאירוע, מציאת הcallback לפי המתאר, והרצתו עד לסיבוב הבא">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
