.dyn-x-2{opacity:0;}
@keyframes k-dyn-x-2{0.00%{opacity:0;}47.27%{opacity:0;}50.00%{opacity:1;}75.00%{opacity:1;}77.73%{opacity:0;}100.00%{opacity:0;}}
