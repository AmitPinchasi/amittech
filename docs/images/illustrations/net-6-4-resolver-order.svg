<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 607 648" width="607" role="img" aria-label="סדר החיפוש של ה-resolver בלינוקס: תחילה נבדק הקובץ /etc/hosts, אם השם לא נמצא נבדק ה-DNS cache, ורק אם גם שם אין תשובה נשלחת שאילתה לשרת ה-DNS והתוצאה נשמרת ב-cache">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-q{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-q .shp{animation-name:k-q;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-d1{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-d1 .shp{animation-name:k-d1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-d2{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-d2 .shp{animation-name:k-d2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-srv{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-srv .shp{animation-name:k-srv;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ret{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-ret .shp{animation-name:k-ret;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="175.7,62.0 175.7,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="335.3,181.8 401.3,181.8" marker-end="url(#arr)"/>
<text class="lbl" x="368.3" y="169.8" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="175.7,261.7 175.7,301.7" marker-end="url(#arr)"/>
<text class="lbl" x="189.7" y="285.7" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="334.2,380.9 400.2,380.9" marker-end="url(#arr)"/>
<text class="lbl" x="367.2" y="368.9" text-anchor="middle">כן</text>
<polyline id="edge-4" class="edge" points="175.7,460.2 175.7,500.2" marker-end="url(#arr)"/>
<text class="lbl" x="189.7" y="484.2" text-anchor="end">לא</text>
<polyline id="edge-5" class="edge" points="175.7,546.2 175.7,586.2" marker-end="url(#arr)"/>
<g id="el-q">
<rect class="n-box shp" x="64.0" y="16.0" width="223.4" height="46.0" rx="8"/>
<text class="t" x="175.7" y="44.0" text-anchor="middle">בקשה לתרגם google.com</text>
</g>
<g id="el-d1">
<polygon class="n-dia shp" points="175.7,102.0 335.3,181.8 175.7,261.7 16.0,181.8"/>
<text class="t" x="175.7" y="186.8" text-anchor="middle">נמצא ב-/etc/hosts?</text>
</g>
<g id="el-hosts">
<rect class="n-box shp" x="401.3" y="158.8" width="182.1" height="46.0" rx="8"/>
<text class="t" x="492.4" y="186.8" text-anchor="middle">מחזיר IP מהקובץ</text>
</g>
<g id="el-d2">
<polygon class="n-dia shp" points="175.7,301.7 334.2,380.9 175.7,460.2 17.1,380.9"/>
<text class="t" x="175.7" y="385.9" text-anchor="middle">נמצא ב-DNS cache?</text>
</g>
<g id="el-cache">
<rect class="n-box shp" x="400.2" y="357.9" width="191.2" height="46.0" rx="8"/>
<text class="t" x="495.8" y="385.9" text-anchor="middle">מחזיר IP מה-cache</text>
</g>
<g id="el-srv">
<rect class="n-box shp" x="84.3" y="500.2" width="182.8" height="46.0" rx="8"/>
<text class="t" x="175.7" y="528.2" text-anchor="middle">שאילתה לשרת DNS</text>
</g>
<g id="el-ret">
<rect class="n-box shp" x="62.9" y="586.2" width="225.4" height="46.0" rx="8"/>
<text class="t" x="175.7" y="614.2" text-anchor="middle">מקבל IP ושומר ב-cache</text>
</g>
</svg>
