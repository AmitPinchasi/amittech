<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 531 529" width="531" role="img" aria-label="תרשים זרימה של הערכת חוקי Firewall מלמעלה למטה: פקטה ליעד port 443 לא נחסמת בחוק הראשון, מאושרת בחוק השני, וכך עוברת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-pkt{0.00%{stroke:var(--pink);stroke-width:2.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}24.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pkt .shp{animation-name:k-pkt;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-r1{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-r1 .shp{animation-name:k-r1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-r2{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-r2 .shp{animation-name:k-r2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-allow{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-allow .shp{animation-name:k-allow;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.07%{stroke-width:1.6;}20.24%{stroke:var(--pink);stroke-width:2.4;}40.48%{stroke:var(--pink);stroke-width:2.4;}44.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}36.31%{stroke-width:1.6;}40.48%{stroke:var(--pink);stroke-width:2.4;}60.71%{stroke:var(--pink);stroke-width:2.4;}64.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}56.55%{stroke-width:1.6;}60.71%{stroke:var(--pink);stroke-width:2.4;}80.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="164.2,62.0 164.2,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="301.0,170.4 367.0,170.4" marker-end="url(#arr)"/>
<text class="lbl" x="334.0" y="158.4" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="164.2,238.8 164.2,278.8" marker-end="url(#arr)"/>
<text class="lbl" x="178.2" y="262.8" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="312.4,352.9 378.4,352.9" marker-end="url(#arr)"/>
<text class="lbl" x="345.4" y="340.9" text-anchor="middle">כן</text>
<polyline id="edge-4" class="edge" points="164.2,427.0 164.2,467.0" marker-end="url(#arr)"/>
<text class="lbl" x="178.2" y="451.0" text-anchor="end">לא</text>
<g id="el-pkt">
<rect class="n-box shp" x="63.2" y="16.0" width="201.9" height="46.0" rx="8"/>
<text class="t" x="164.2" y="44.0" text-anchor="middle">פקטה ליעד port 443</text>
</g>
<g id="el-r1">
<polygon class="n-dia shp" points="164.2,102.0 301.0,170.4 164.2,238.8 27.5,170.4"/>
<text class="t" x="164.2" y="175.4" text-anchor="middle">לחסום port 23 ?</text>
</g>
<g id="el-drop1">
<rect class="n-box shp" x="367.0" y="147.4" width="96.0" height="46.0" rx="8"/>
<text class="t" x="415.0" y="175.4" text-anchor="middle">חסימה</text>
</g>
<g id="el-r2">
<polygon class="n-dia shp" points="164.2,278.8 312.4,352.9 164.2,427.0 16.0,352.9"/>
<text class="t" x="164.2" y="357.9" text-anchor="middle">לאפשר port 443 ?</text>
</g>
<g id="el-allow">
<rect class="n-box shp" x="378.4" y="329.9" width="136.7" height="46.0" rx="8"/>
<text class="t" x="446.8" y="357.9" text-anchor="middle">מעבר מאושר</text>
</g>
<g id="el-def">
<rect class="n-box shp" x="63.4" y="467.0" width="201.6" height="46.0" rx="8"/>
<text class="t" x="164.2" y="495.0" text-anchor="middle">ברירת מחדל - חסימה</text>
</g>
</svg>
