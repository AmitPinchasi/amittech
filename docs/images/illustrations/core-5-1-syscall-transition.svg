.dyn-lookup-1{opacity:1;}
@keyframes k-dyn-lookup-1{0.00%{opacity:0;}48.24%{opacity:0;}50.70%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-lookup-1{animation-name:k-dyn-lookup-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
