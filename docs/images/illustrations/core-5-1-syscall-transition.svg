<text class="t dyn-lookup-1" x="250.4" y="394.0" text-anchor="middle">הערך rax שווה 1 ולכן נבחר sys_write</text>
</g>
<g id="el-run">
<rect class="n-box shp" x="47.6" y="452.0" width="405.5" height="46.0" rx="8"/>
<text class="t" x="250.4" y="480.0" text-anchor="middle">הפונקציה sys_write כותבת את הבתים לטרמינל</text>
</g>
<g id="el-back">
<rect class="n-box shp" x="88.2" y="538.0" width="324.2" height="46.0" rx="8"/>
<text class="t dyn-back-0" x="250.4" y="566.0" text-anchor="middle">החזרה ל-user mode</text>
<text class="t dyn-back-1" x="250.4" y="566.0" text-anchor="middle">החזרה ל-user mode עם ערך החזרה 20</text>
</g>
