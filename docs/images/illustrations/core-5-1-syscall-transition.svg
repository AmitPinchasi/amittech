<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="250.4,54.0 250.4,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="250.4,140.0 250.4,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="250.4,240.0 250.4,280.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="250.4,326.0 250.4,366.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="250.4,412.0 250.4,452.0" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="250.4,498.0 250.4,538.0" marker-end="url(#arr)"/>
<g id="el-call">
<rect class="n-code-bg shp" x="151.1" y="16.0" width="198.5" height="38.0" rx="7"/>
<text class="code" x="250.4" y="43.0" text-anchor="middle">write(1, msg, 20);</text>
</g>
<g id="el-wrap">
<rect class="n-box shp" x="16.0" y="94.0" width="468.7" height="46.0" rx="8"/>
<text class="t" x="250.4" y="122.0" text-anchor="middle">העטיפה של libc מכינה את הפרמטרים ואת מספר הקריאה</text>
</g>
<g id="el-asm">
<rect class="n-code-bg shp" x="187.2" y="180.0" width="126.3" height="60.0" rx="7"/>
<text class="code" x="250.4" y="207.0" text-anchor="middle">mov rax, 1</text>
<text class="code" x="250.4" y="229.0" text-anchor="middle">syscall</text>
</g>
<g id="el-switch">
<rect class="n-box shp" x="80.5" y="280.0" width="339.7" height="46.0" rx="8"/>
<text class="t" x="250.4" y="308.0" text-anchor="middle">המעבד עובר מ-user mode ל-kernel mode</text>
</g>
<g id="el-lookup">
