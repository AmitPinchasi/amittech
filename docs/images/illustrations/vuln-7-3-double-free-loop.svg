<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 162" width="860" role="img" aria-label="שחרור כפול של אותו chunk גורם לו להופיע ברשימת הפח פעמיים וליצור הפניה מעגלית לעצמו, בניגוד לכלל שכל chunk חופשי מופיע ברשימה פעם אחת בלבד">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-bin{0.00%{stroke:var(--pink);stroke-width:2.5;}78.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-bin .shp{animation-name:k-bin;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-note{0.00%{stroke:var(--pink);stroke-width:2.5;}78.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-note .shp{animation-name:k-note;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bin-0{opacity:0;}
@keyframes k-dyn-bin-0{0.00%{opacity:1;}26.32%{opacity:1;}30.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-bin-0{animation-name:k-dyn-bin-0;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bin-1{opacity:0;}
@keyframes k-dyn-bin-1{0.00%{opacity:0;}21.71%{opacity:0;}26.32%{opacity:1;}52.63%{opacity:1;}57.24%{opacity:0;}100.00%{opacity:0;}}
.dyn-bin-1{animation-name:k-dyn-bin-1;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bin-2{opacity:1;}
@keyframes k-dyn-bin-2{0.00%{opacity:0;}48.03%{opacity:0;}52.63%{opacity:1;}78.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-bin-2{animation-name:k-dyn-bin-2;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}26.32%{opacity:1;}30.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}21.71%{opacity:0;}26.32%{opacity:1;}52.63%{opacity:1;}57.24%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:1;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}48.03%{opacity:0;}52.63%{opacity:1;}78.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-bin">
<rect class="n-box shp" x="202.1" y="16.0" width="455.6" height="46.0" rx="8"/>
<text class="t dyn-bin-0" x="429.9" y="44.0" text-anchor="middle">tcache[0x50]: ריק  (count = 0)</text>
<text class="t dyn-bin-1" x="429.9" y="44.0" text-anchor="middle" style="direction:ltr">tcache[0x50]: a -&gt; NULL  (count = 1)</text>
<text class="t dyn-bin-2" x="429.9" y="44.0" text-anchor="middle">tcache[0x50]: a -&gt; a -&gt; ...  הפניה מעגלית!  (count = 2)</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="102.0" width="827.8" height="44.0" rx="8"/>
<text class="t-b dyn-note-0" x="429.9" y="129.0" text-anchor="middle">התחלה: אין chunks בפח</text>
<text class="t-b dyn-note-1" x="429.9" y="129.0" text-anchor="middle">free(a) ראשון: a נכנס לפח כרגיל</text>
<text class="t-b dyn-note-2" x="429.9" y="129.0" text-anchor="middle">free(a) שני - שחרור כפול: a נכנס שוב, ושדה ה-fd שלו מצביע על עצמו - a נמצא ברשימה פעמיים</text>
</g>
</svg>
