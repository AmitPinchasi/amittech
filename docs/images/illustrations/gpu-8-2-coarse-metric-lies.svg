<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 698 300" width="698" role="img" aria-label="kernel של block יחיד מראה ניצולת GPU של 100% ב-nvidia-smi אך ניצולת SM אמיתית של 0.76% בלבד">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}30.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-smi{0.00%{stroke-width:1.5;}21.23%{stroke-width:1.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}56.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-smi .shp{animation-name:k-smi;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sm{0.00%{stroke-width:1.5;}47.26%{stroke-width:1.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}78.08%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-sm .shp{animation-name:k-sm;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="218.3" y="16.0" width="261.7" height="38.0" rx="7"/>
<text class="code" x="349.1" y="43.0" text-anchor="middle">myKernel&lt;&lt;&lt;1, 256&gt;&gt;&gt;(...)</text>
</g>
<g id="el-smi">
<rect class="n-box shp" x="206.7" y="94.0" width="284.9" height="46.0" rx="8"/>
<text class="t" x="349.1" y="122.0" text-anchor="middle">nvidia-smi: ניצולת GPU = 100%</text>
</g>
<g id="el-sm">
<rect class="n-box shp" x="154.1" y="180.0" width="390.1" height="46.0" rx="8"/>
<text class="t" x="349.1" y="208.0" text-anchor="middle">ניצולת SM אמיתית = 0.76%  (1 SM מתוך 132)</text>
</g>
<g id="el-note">
<text class="small" x="349.1" y="279.0" text-anchor="middle">המדד הגס משקר: block יחיד רץ על SM אחד, ו-131 ה-SM האחרים בטלים - פער פי 130 שהמדד הגס אינו רואה</text>
</g>
</svg>
