<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 457 624" width="457" role="img" aria-label="מודל OSI מחולק לחמש שכבות, וכל שכבה פותרת בעיה אחת בתקשורת בין מחשבים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-app{0.00%{stroke:var(--pink);stroke-width:2.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}20.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-app .shp{animation-name:k-app;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-trans{0.00%{stroke-width:1.5;}13.96%{stroke-width:1.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}37.39%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-trans .shp{animation-name:k-trans;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-net{0.00%{stroke-width:1.5;}31.08%{stroke-width:1.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}54.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-net .shp{animation-name:k-net;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-link{0.00%{stroke-width:1.5;}48.20%{stroke-width:1.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}71.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-link .shp{animation-name:k-link;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-phys{0.00%{stroke-width:1.5;}65.32%{stroke-width:1.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-phys .shp{animation-name:k-phys;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-problem-0{opacity:0;}
@keyframes k-dyn-problem-0{0.00%{opacity:1;}17.12%{opacity:1;}20.27%{opacity:0;}100.00%{opacity:0;}}
.dyn-problem-0{animation-name:k-dyn-problem-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-problem-1{opacity:0;}
@keyframes k-dyn-problem-1{0.00%{opacity:0;}13.96%{opacity:0;}17.12%{opacity:1;}34.23%{opacity:1;}37.39%{opacity:0;}100.00%{opacity:0;}}
.dyn-problem-1{animation-name:k-dyn-problem-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-problem-2{opacity:0;}
@keyframes k-dyn-problem-2{0.00%{opacity:0;}31.08%{opacity:0;}34.23%{opacity:1;}51.35%{opacity:1;}54.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-problem-2{animation-name:k-dyn-problem-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-problem-3{opacity:0;}
@keyframes k-dyn-problem-3{0.00%{opacity:0;}48.20%{opacity:0;}51.35%{opacity:1;}68.47%{opacity:1;}71.62%{opacity:0;}100.00%{opacity:0;}}
.dyn-problem-3{animation-name:k-dyn-problem-3;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-problem-4{opacity:1;}
@keyframes k-dyn-problem-4{0.00%{opacity:0;}65.32%{opacity:0;}68.47%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-problem-4{animation-name:k-dyn-problem-4;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-cap">
<text class="small" x="228.6" y="29.0" text-anchor="middle">מודל OSI מפרק את התקשורת לחמש שכבות, כל שכבה פותרת בעיה אחת</text>
</g>
<g id="el-app">
<rect class="n-box shp" x="140.7" y="74.0" width="175.7" height="46.0" rx="8"/>
<text class="t" x="228.6" y="102.0" text-anchor="middle">שכבת האפליקציה</text>
</g>
<g id="el-trans">
<rect class="n-box shp" x="150.5" y="160.0" width="156.2" height="46.0" rx="8"/>
<text class="t" x="228.6" y="188.0" text-anchor="middle">שכבת התעבורה</text>
</g>
<g id="el-net">
<rect class="n-box shp" x="165.1" y="246.0" width="127.0" height="46.0" rx="8"/>
<text class="t" x="228.6" y="274.0" text-anchor="middle">שכבת הרשת</text>
</g>
<g id="el-link">
<rect class="n-box shp" x="170.0" y="332.0" width="117.2" height="46.0" rx="8"/>
<text class="t" x="228.6" y="360.0" text-anchor="middle">שכבת הקו</text>
</g>
<g id="el-phys">
<rect class="n-box shp" x="150.5" y="418.0" width="156.2" height="46.0" rx="8"/>
<text class="t" x="228.6" y="446.0" text-anchor="middle">השכבה הפיזית</text>
</g>
<g id="el-lbl">
<text class="small" x="228.6" y="517.0" text-anchor="middle">הבעיה שהשכבה המודגשת פותרת -</text>
</g>
<g id="el-problem">
<rect class="n-box shp" x="128.5" y="562.0" width="200.2" height="46.0" rx="8"/>
<text class="t dyn-problem-0" x="228.6" y="590.0" text-anchor="middle">המידע של התוכנות</text>
<text class="t dyn-problem-1" x="228.6" y="590.0" text-anchor="middle">הפרדה בין תוכנות</text>
<text class="t dyn-problem-2" x="228.6" y="590.0" text-anchor="middle">ניתוב בין רשתות</text>
<text class="t dyn-problem-3" x="228.6" y="590.0" text-anchor="middle">זהות וכתובת לרכיב</text>
<text class="t dyn-problem-4" x="228.6" y="590.0" text-anchor="middle">העברת ביטים בכבל</text>
</g>
</svg>
