<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 442 306" width="442" role="img" aria-label="ASLR מזיז בכל הרצה רק את כתובת הבסיס שבה libc נטענת, אבל ההיסטים של הפונקציות בתוך הקובץ נשארים קבועים תמיד, ולכן דליפת כתובת אחת מספיקה כדי לחשב את שאר הכתובות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-base{0.00%{stroke:var(--pink);stroke-width:2.5;}12.82%{stroke:var(--pink);stroke-width:2.5;}15.06%{stroke-width:1.5;}36.22%{stroke-width:1.5;}38.46%{stroke:var(--pink);stroke-width:2.5;}51.28%{stroke:var(--pink);stroke-width:2.5;}53.53%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-base .shp{animation-name:k-base;animation-duration:15.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-system_off{0.00%{stroke-width:1.5;}10.58%{stroke-width:1.5;}12.82%{stroke:var(--pink);stroke-width:2.5;}25.64%{stroke:var(--pink);stroke-width:2.5;}27.88%{stroke-width:1.5;}49.04%{stroke-width:1.5;}51.28%{stroke:var(--pink);stroke-width:2.5;}64.10%{stroke:var(--pink);stroke-width:2.5;}66.35%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-system_off .shp{animation-name:k-system_off;animation-duration:15.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-binsh_off{0.00%{stroke-width:1.5;}23.40%{stroke-width:1.5;}25.64%{stroke:var(--pink);stroke-width:2.5;}38.46%{stroke:var(--pink);stroke-width:2.5;}40.71%{stroke-width:1.5;}61.86%{stroke-width:1.5;}64.10%{stroke:var(--pink);stroke-width:2.5;}76.92%{stroke:var(--pink);stroke-width:2.5;}79.17%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-binsh_off .shp{animation-name:k-binsh_off;animation-duration:15.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-note{0.00%{stroke-width:1.5;}74.68%{stroke-width:1.5;}76.92%{stroke:var(--pink);stroke-width:2.5;}89.74%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-note .shp{animation-name:k-note;animation-duration:15.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.58%{stroke-width:1.6;}12.82%{stroke:var(--pink);stroke-width:2.4;}25.64%{stroke:var(--pink);stroke-width:2.4;}27.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:15.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}23.40%{stroke-width:1.6;}25.64%{stroke:var(--pink);stroke-width:2.4;}38.46%{stroke:var(--pink);stroke-width:2.4;}40.71%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:15.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-base-0{opacity:0;}
@keyframes k-dyn-base-0{0.00%{opacity:1;}38.46%{opacity:1;}40.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-base-0{animation-name:k-dyn-base-0;animation-duration:15.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-base-1{opacity:1;}
@keyframes k-dyn-base-1{0.00%{opacity:0;}36.22%{opacity:0;}38.46%{opacity:1;}89.74%{opacity:1;}100.00%{opacity:1;}}
.dyn-base-1{animation-name:k-dyn-base-1;animation-duration:15.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="220.8,60.0 220.8,100.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="220.8,146.0 220.8,186.0" marker-end="url(#arr)"/>
<g id="el-base">
<rect class="n-box shp" x="40.4" y="16.0" width="360.8" height="44.0" rx="8"/>
<text class="t-b dyn-base-0" x="220.8" y="43.0" text-anchor="middle">libc base (הרצה א) = 0x7f3a1c400000</text>
<text class="t-b dyn-base-1" x="220.8" y="43.0" text-anchor="middle">libc base (הרצה ב) = 0x7f8e9d200000</text>
</g>
<g id="el-system_off">
<rect class="n-box shp" x="29.1" y="100.0" width="383.4" height="46.0" rx="8"/>
<text class="t" x="220.8" y="128.0" text-anchor="middle">system תמיד ב-offset קבוע: base + 0x50d70</text>
</g>
<g id="el-binsh_off">
<rect class="n-box shp" x="16.0" y="186.0" width="409.6" height="46.0" rx="8"/>
<text class="t" x="220.8" y="214.0" text-anchor="middle">"/bin/sh" תמיד ב-offset קבוע: base + 0x1d8678</text>
</g>
<g id="el-note">
<text class="small" x="220.8" y="285.0" text-anchor="middle">ASLR מזיז רק את הבסיס - ההיסטים בתוך libc קבועים בכל הרצה</text>
</g>
</svg>
