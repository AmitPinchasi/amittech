<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 479 290" width="479" role="img" aria-label="צינור pipe מחבר שתי פקודות: הפלט של tasklist עובר כקלט אל find שמסננת ומדפיסה רק את השורה התואמת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-t1{0.00%{stroke:var(--pink);stroke-width:2.5;}25.37%{stroke:var(--pink);stroke-width:2.5;}30.60%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-t1 .shp{animation-name:k-t1;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-t2{0.00%{stroke-width:1.5;}20.15%{stroke-width:1.5;}25.37%{stroke:var(--pink);stroke-width:2.5;}50.75%{stroke:var(--pink);stroke-width:2.5;}55.97%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-t2 .shp{animation-name:k-t2;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}45.52%{stroke-width:1.5;}50.75%{stroke:var(--pink);stroke-width:2.5;}76.12%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}20.15%{stroke-width:1.6;}25.37%{stroke:var(--pink);stroke-width:2.4;}50.75%{stroke:var(--pink);stroke-width:2.4;}55.97%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}45.52%{stroke-width:1.6;}50.75%{stroke:var(--pink);stroke-width:2.4;}76.12%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-0{opacity:0;}
@keyframes k-dyn-out-0{0.00%{opacity:1;}50.75%{opacity:1;}55.97%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-0{animation-name:k-dyn-out-0;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-1{opacity:1;}
@keyframes k-dyn-out-1{0.00%{opacity:0;}45.52%{opacity:0;}50.75%{opacity:1;}76.12%{opacity:1;}100.00%{opacity:1;}}
.dyn-out-1{animation-name:k-dyn-out-1;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="239.5,54.0 239.5,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="253.5" y="78.0" text-anchor="end">הפלט עובר כקלט</text>
<polyline id="edge-1" class="edge" points="239.5,132.0 239.5,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="253.5" y="156.0" text-anchor="end">מסננת ומדפיסה</text>
<g id="el-t1">
<rect class="n-code-bg shp" x="185.4" y="16.0" width="108.2" height="38.0" rx="7"/>
<text class="code" x="239.5" y="43.0" text-anchor="middle">tasklist</text>
</g>
<g id="el-t2">
<rect class="n-code-bg shp" x="158.3" y="94.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="239.5" y="121.0" text-anchor="middle">find "Notepad"</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="127.0" y="172.0" width="225.0" height="44.0" rx="8"/>
<text class="t-b dyn-out-0" x="239.5" y="199.0" text-anchor="middle">רשימת כל ה-processes</text>
<text class="t-b dyn-out-1" x="239.5" y="199.0" text-anchor="middle" style="direction:ltr">Notepad.exe   5820</text>
</g>
<g id="el-note">
<text class="small" x="239.5" y="269.0" text-anchor="middle">הסימן | לוקח את הפלט של הפקודה הראשונה ומעביר אותו כקלט לשנייה</text>
</g>
</svg>
