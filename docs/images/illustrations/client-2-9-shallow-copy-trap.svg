<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 519 368" width="519" role="img" aria-label="מלכודת ההעתקה הרדודה: שינוי באובייקט המקונן של ההעתק משנה גם את המקור">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-c1{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-c1 .shp{animation-name:k-c1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-c2{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-c2 .shp{animation-name:k-c2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-c3{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-c3 .shp{animation-name:k-c3;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-val{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-val .shp{animation-name:k-val;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:1;}
@keyframes k-dyn-val-1{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="259.7,210.0 259.7,250.0" marker-end="url(#arr)"/>
<text class="lbl" x="271.7" y="234.0" text-anchor="end">משנה גם את המקור</text>
<g id="el-c1">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="487.4" height="38.0" rx="7"/>
<text class="code" x="259.7" y="43.0" text-anchor="middle">const original = { address: { city: "Tel Aviv" } }</text>
</g>
<g id="el-c2">
<rect class="n-code-bg shp" x="115.3" y="94.0" width="288.8" height="38.0" rx="7"/>
<text class="code" x="259.7" y="121.0" text-anchor="middle">const copy = { ...original }</text>
</g>
<g id="el-c3">
<rect class="n-code-bg shp" x="119.8" y="172.0" width="279.7" height="38.0" rx="7"/>
<text class="code" x="259.7" y="199.0" text-anchor="middle">copy.address.city = "Haifa"</text>
</g>
<g id="el-val">
<rect class="n-box shp" x="94.9" y="250.0" width="329.6" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="259.7" y="277.0" text-anchor="middle" style="direction:ltr">original.address.city = "Tel Aviv"</text>
<text class="t-b dyn-val-1" x="259.7" y="277.0" text-anchor="middle" style="direction:ltr">original.address.city = "Haifa"</text>
</g>
<g id="el-note">
<text class="small" x="259.7" y="347.0" text-anchor="middle">ההעתקה הרדודה העתיקה רק את ההפניה, שניהם מצביעים על אותו address</text>
</g>
</svg>
