<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 664 465" width="664" role="img" aria-label="תרשים המראה כיצד המעבד משווה את רמת ההרשאה הנוכחית מול שדה ה-DPL שבטבלת ה-GDT ומחליט אם לאפשר את הגישה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
