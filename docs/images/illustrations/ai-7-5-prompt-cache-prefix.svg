<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 615 278" width="615" role="img" aria-label="מטמון prompts לפי קידומת: החלק היציב של הבקשה - ה-system והמסמכים - נכתב למטמון בבקשה הראשונה ונקרא ממנו בזול בבקשות הבאות, בעוד שרק שאלת המשתמש המשתנה מעובדת מחדש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req-0{0.00%{stroke:var(--pink);stroke-width:2.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}30.71%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req-c0{animation-name:k-req-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-req-1{0.00%{stroke-width:1.5;}20.71%{stroke-width:1.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-req-c1{animation-name:k-req-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-status-0{opacity:0;}
@keyframes k-dyn-status-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-status-0{animation-name:k-dyn-status-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-status-1{opacity:0;}
@keyframes k-dyn-status-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-status-1{animation-name:k-dyn-status-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-status-2{opacity:1;}
@keyframes k-dyn-status-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-status-2{animation-name:k-dyn-status-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-intro">
<text class="small" x="307.3" y="29.0" text-anchor="middle">המטמון עובד לפי קידומת - יציב בהתחלה, משתנה בסוף</text>
</g>
<g id="el-req">
<rect id="el-req-c0" class="n-hl shp" x="317.3" y="74.0" width="281.3" height="46.0" rx="6"/>
<text class="t" x="458.0" y="102.0" text-anchor="middle">קידומת יציבה - system + מסמכים</text>
<rect id="el-req-c1" class="n-cell shp" x="16.0" y="74.0" width="281.3" height="46.0" rx="6"/>
<text class="t" x="156.7" y="102.0" text-anchor="middle">משתנה - שאלת המשתמש</text>
</g>
<g id="el-status">
<rect class="n-box shp" x="120.5" y="160.0" width="373.7" height="44.0" rx="8"/>
<text class="t-b dyn-status-0" x="307.3" y="187.0" text-anchor="middle">בקשה 1: כתיבה למטמון - cache_creation</text>
<text class="t-b dyn-status-1" x="307.3" y="187.0" text-anchor="middle">בקשה 2: קריאה מהמטמון - cache_read</text>
<text class="t-b dyn-status-2" x="307.3" y="187.0" text-anchor="middle">בקשה 3: קריאה מהמטמון - cache_read</text>
</g>
<g id="el-note">
<text class="small" x="307.3" y="257.0" text-anchor="middle">כל שינוי בקידומת מבטל את המטמון - לכן היציב בהתחלה</text>
</g>
</svg>
