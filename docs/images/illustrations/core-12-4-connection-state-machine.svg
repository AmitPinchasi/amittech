@keyframes k-edge-0{0.00%{stroke-width:1.6;}18.26%{stroke-width:1.6;}20.22%{stroke:var(--pink);stroke-width:2.4;}30.34%{stroke:var(--pink);stroke-width:2.4;}32.30%{stroke-width:1.6;}48.60%{stroke-width:1.6;}50.56%{stroke:var(--pink);stroke-width:2.4;}60.67%{stroke:var(--pink);stroke-width:2.4;}62.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}28.37%{stroke-width:1.6;}30.34%{stroke:var(--pink);stroke-width:2.4;}40.45%{stroke:var(--pink);stroke-width:2.4;}42.42%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
