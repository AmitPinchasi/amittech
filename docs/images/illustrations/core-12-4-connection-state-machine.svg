@keyframes k-edge-2{0.00%{stroke-width:1.6;}58.71%{stroke-width:1.6;}60.67%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke:var(--pink);stroke-width:2.4;}72.75%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}68.82%{stroke-width:1.6;}70.79%{stroke:var(--pink);stroke-width:2.4;}80.90%{stroke:var(--pink);stroke-width:2.4;}82.87%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}78.93%{stroke-width:1.6;}80.90%{stroke:var(--pink);stroke-width:2.4;}91.01%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rd-0{opacity:1;}
@keyframes k-dyn-rd-0{0.00%{opacity:1;}10.11%{opacity:1;}12.08%{opacity:0;}78.93%{opacity:0;}80.90%{opacity:1;}91.01%{opacity:1;}100.00%{opacity:1;}}
.dyn-rd-0{animation-name:k-dyn-rd-0;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rd-1{opacity:0;}
@keyframes k-dyn-rd-1{0.00%{opacity:0;}8.15%{opacity:0;}10.11%{opacity:1;}40.45%{opacity:1;}42.42%{opacity:0;}100.00%{opacity:0;}}
.dyn-rd-1{animation-name:k-dyn-rd-1;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rd-2{opacity:0;}
@keyframes k-dyn-rd-2{0.00%{opacity:0;}38.48%{opacity:0;}40.45%{opacity:1;}80.90%{opacity:1;}82.87%{opacity:0;}100.00%{opacity:0;}}
.dyn-rd-2{animation-name:k-dyn-rd-2;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="278.6,65.0 278.6,105.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="461.2,196.3 527.2,196.3" marker-end="url(#arr)"/>
