<polyline id="edge-4" class="edge" points="156.0,436.6 16.0,436.6 16.0,42.0 160.8,42.0" marker-end="url(#arr)"/>
<text class="small" x="88.4" y="30.0" text-anchor="middle">הבקשה הבאה</text>
<g id="el-rd">
