<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 773 476" width="773" role="img" aria-label="מכונת מצבים של חיבור בלולאת אירועים: קריאה, עיבוד, כתיבה, וחזרה לקריאת הבקשה הבאה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-rd{0.00%{stroke:var(--pink);stroke-width:2.5;}20.22%{stroke:var(--pink);stroke-width:2.5;}22.19%{stroke-width:1.5;}38.48%{stroke-width:1.5;}40.45%{stroke:var(--pink);stroke-width:2.5;}50.56%{stroke:var(--pink);stroke-width:2.5;}52.53%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-rd .shp{animation-name:k-rd;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-q{0.00%{stroke-width:1.5;}18.26%{stroke-width:1.5;}20.22%{stroke:var(--pink);stroke-width:2.5;}30.34%{stroke:var(--pink);stroke-width:2.5;}32.30%{stroke-width:1.5;}48.60%{stroke-width:1.5;}50.56%{stroke:var(--pink);stroke-width:2.5;}60.67%{stroke:var(--pink);stroke-width:2.5;}62.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-q .shp{animation-name:k-q;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-more{0.00%{stroke-width:1.5;}28.37%{stroke-width:1.5;}30.34%{stroke:var(--pink);stroke-width:2.5;}40.45%{stroke:var(--pink);stroke-width:2.5;}42.42%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-more .shp{animation-name:k-more;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pr{0.00%{stroke-width:1.5;}58.71%{stroke-width:1.5;}60.67%{stroke:var(--pink);stroke-width:2.5;}70.79%{stroke:var(--pink);stroke-width:2.5;}72.75%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pr .shp{animation-name:k-pr;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-wr{0.00%{stroke-width:1.5;}68.82%{stroke-width:1.5;}70.79%{stroke:var(--pink);stroke-width:2.5;}80.90%{stroke:var(--pink);stroke-width:2.5;}82.87%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
