<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 269 398" width="269" role="img" aria-label="בקשה אחת מהמשתמש הופכת לרצף הפעלות tools: Glob, Read, Read, ואז תשובה מסוכמת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-q{0.00%{stroke:var(--pink);stroke-width:2.5;}16.48%{stroke:var(--pink);stroke-width:2.5;}20.33%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-q .shp{animation-name:k-q;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-glob{0.00%{stroke-width:1.5;}12.64%{stroke-width:1.5;}16.48%{stroke:var(--pink);stroke-width:2.5;}32.97%{stroke:var(--pink);stroke-width:2.5;}36.81%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-glob .shp{animation-name:k-glob;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-read1{0.00%{stroke-width:1.5;}29.12%{stroke-width:1.5;}32.97%{stroke:var(--pink);stroke-width:2.5;}49.45%{stroke:var(--pink);stroke-width:2.5;}53.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-read1 .shp{animation-name:k-read1;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-read2{0.00%{stroke-width:1.5;}45.60%{stroke-width:1.5;}49.45%{stroke:var(--pink);stroke-width:2.5;}65.93%{stroke:var(--pink);stroke-width:2.5;}69.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-read2 .shp{animation-name:k-read2;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-answer{0.00%{stroke-width:1.5;}62.09%{stroke-width:1.5;}65.93%{stroke:var(--pink);stroke-width:2.5;}82.42%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-answer .shp{animation-name:k-answer;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}12.64%{stroke-width:1.6;}16.48%{stroke:var(--pink);stroke-width:2.4;}32.97%{stroke:var(--pink);stroke-width:2.4;}36.81%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.12%{stroke-width:1.6;}32.97%{stroke:var(--pink);stroke-width:2.4;}49.45%{stroke:var(--pink);stroke-width:2.4;}53.30%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}45.60%{stroke-width:1.6;}49.45%{stroke:var(--pink);stroke-width:2.4;}65.93%{stroke:var(--pink);stroke-width:2.4;}69.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}62.09%{stroke-width:1.6;}65.93%{stroke:var(--pink);stroke-width:2.4;}82.42%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="134.4,62.0 134.4,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="134.4,140.0 134.4,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="134.4,218.0 134.4,258.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="134.4,296.0 134.4,336.0" marker-end="url(#arr)"/>
<g id="el-q">
<rect class="n-box shp" x="16.0" y="16.0" width="236.9" height="46.0" rx="8"/>
<text class="t" x="134.4" y="44.0" text-anchor="middle">שאלה: מה נקודת הכניסה?</text>
</g>
<g id="el-glob">
<rect class="n-code-bg shp" x="48.7" y="102.0" width="171.4" height="38.0" rx="7"/>
<text class="code" x="134.4" y="129.0" text-anchor="middle">Glob  **/app.py</text>
</g>
<g id="el-read1">
<rect class="n-code-bg shp" x="44.2" y="180.0" width="180.4" height="38.0" rx="7"/>
<text class="code" x="134.4" y="207.0" text-anchor="middle">Read  src/app.py</text>
</g>
<g id="el-read2">
<rect class="n-code-bg shp" x="30.7" y="258.0" width="207.5" height="38.0" rx="7"/>
<text class="code" x="134.4" y="285.0" text-anchor="middle">Read  src/config.py</text>
</g>
<g id="el-answer">
<rect class="n-box shp" x="56.3" y="336.0" width="156.2" height="46.0" rx="8"/>
<text class="t" x="134.4" y="364.0" text-anchor="middle">תשובה מסוכמת</text>
</g>
</svg>
