<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 566 220" width="566" role="img" aria-label="שכבות HTTPS: תחילה נפתח חיבור TCP, מעליו נבנה ערוץ TLS מוצפן, ומעל ה-TLS רצה תעבורת HTTP, כך שהתעבורה שנראית ברשת היא מוצפנת בלבד">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-frame{0.00%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-frame .shp{animation-name:k-frame;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-desc{0.00%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-desc .shp{animation-name:k-desc;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-frame-0{opacity:0;}
@keyframes k-dyn-frame-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-frame-0{animation-name:k-dyn-frame-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-frame-1{opacity:0;}
@keyframes k-dyn-frame-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-frame-1{animation-name:k-dyn-frame-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-frame-2{opacity:1;}
@keyframes k-dyn-frame-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-frame-2{animation-name:k-dyn-frame-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-desc-0{opacity:0;}
@keyframes k-dyn-desc-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-desc-0{animation-name:k-dyn-desc-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-desc-1{opacity:0;}
@keyframes k-dyn-desc-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-desc-1{animation-name:k-dyn-desc-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-desc-2{opacity:1;}
@keyframes k-dyn-desc-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-desc-2{animation-name:k-dyn-desc-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-frame">
<rect class="n-box shp" x="192.7" y="16.0" width="180.4" height="46.0" rx="8"/>
<text class="t dyn-frame-0" x="282.9" y="44.0" text-anchor="middle" style="direction:ltr">TCP</text>
<text class="t dyn-frame-1" x="282.9" y="44.0" text-anchor="middle" style="direction:ltr">TCP | TLS</text>
<text class="t dyn-frame-2" x="282.9" y="44.0" text-anchor="middle" style="direction:ltr">TCP | TLS | HTTP</text>
</g>
<g id="el-desc">
<rect class="n-box shp" x="90.1" y="102.0" width="385.6" height="44.0" rx="8"/>
<text class="t-b dyn-desc-0" x="282.9" y="129.0" text-anchor="middle">שלב 1 - נפתח חיבור TCP</text>
<text class="t-b dyn-desc-1" x="282.9" y="129.0" text-anchor="middle">שלב 2 - מעל ה-TCP נבנה ערוץ TLS מוצפן</text>
<text class="t-b dyn-desc-2" x="282.9" y="129.0" text-anchor="middle">שלב 3 - מעל ה-TLS רצה תעבורת HTTP</text>
</g>
<g id="el-note">
<text class="small" x="282.9" y="199.0" text-anchor="middle">תעבורת ה-HTTP רצה בתוך ערוץ TLS מוצפן מעל TCP, לכן ב-Wireshark רואים רק TLS</text>
</g>
</svg>
