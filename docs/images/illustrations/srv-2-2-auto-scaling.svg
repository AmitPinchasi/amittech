<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 626 296" width="626" role="img" aria-label="Auto Scaling ב-AWS: CloudWatch מודד את עומס ה-CPU, וכשהעומס עובר את הסף קבוצת ה-Auto Scaling מוסיפה instance, ואם העומס נמוך אין שינוי">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-metric{0.00%{stroke:var(--pink);stroke-width:2.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}15.19%{stroke-width:1.5;}35.19%{stroke-width:1.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}52.96%{stroke-width:1.5;}72.96%{stroke-width:1.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}88.15%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-metric .shp{animation-name:k-metric;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}10.00%{stroke-width:1.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}27.78%{stroke-width:1.5;}47.78%{stroke-width:1.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}65.56%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ok{0.00%{stroke-width:1.5;}22.59%{stroke-width:1.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}40.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ok .shp{animation-name:k-ok;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-scaleup{0.00%{stroke-width:1.5;}60.37%{stroke-width:1.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}78.15%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-scaleup .shp{animation-name:k-scaleup;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.00%{stroke-width:1.6;}12.59%{stroke:var(--pink);stroke-width:2.4;}25.19%{stroke:var(--pink);stroke-width:2.4;}27.78%{stroke-width:1.6;}47.78%{stroke-width:1.6;}50.37%{stroke:var(--pink);stroke-width:2.4;}62.96%{stroke:var(--pink);stroke-width:2.4;}65.56%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}22.59%{stroke-width:1.6;}25.19%{stroke:var(--pink);stroke-width:2.4;}37.78%{stroke:var(--pink);stroke-width:2.4;}40.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}60.37%{stroke-width:1.6;}62.96%{stroke:var(--pink);stroke-width:2.4;}75.56%{stroke:var(--pink);stroke-width:2.4;}78.15%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}72.96%{stroke-width:1.6;}75.56%{stroke:var(--pink);stroke-width:2.4;}88.15%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-metric-0{opacity:0;}
@keyframes k-dyn-metric-0{0.00%{opacity:1;}37.78%{opacity:1;}40.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-metric-0{animation-name:k-dyn-metric-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-metric-1{opacity:1;}
@keyframes k-dyn-metric-1{0.00%{opacity:0;}35.19%{opacity:0;}37.78%{opacity:1;}88.15%{opacity:1;}100.00%{opacity:1;}}
.dyn-metric-1{animation-name:k-dyn-metric-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}37.78%{opacity:1;}40.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:1;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}35.19%{opacity:0;}37.78%{opacity:1;}88.15%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="218.6,65.0 218.6,105.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="218.6,194.4 218.6,234.4" marker-end="url(#arr)"/>
<text class="lbl" x="232.6" y="218.4" text-anchor="end">כן</text>
<polyline id="edge-2" class="edge" points="308.0,149.7 374.0,149.7" marker-end="url(#arr)"/>
<text class="lbl" x="341.0" y="137.7" text-anchor="middle">לא</text>
<polyline id="edge-3" class="edge" points="96.0,257.4 16.0,257.4 16.0,42.0 162.0,42.0" marker-end="url(#arr)"/>
<text class="small" x="89.0" y="30.0" text-anchor="middle">ניטור מחדש</text>
<g id="el-metric">
<rect class="n-box shp" x="162.0" y="19.0" width="113.2" height="46.0" rx="8"/>
<text class="t dyn-metric-0" x="218.6" y="47.0" text-anchor="middle" style="direction:ltr">CPU: 45%</text>
<text class="t dyn-metric-1" x="218.6" y="47.0" text-anchor="middle" style="direction:ltr">CPU: 88%</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="218.6,105.0 308.0,149.7 218.6,194.4 129.3,149.7"/>
<text class="code dyn-cond-0" x="218.6" y="154.7" text-anchor="middle">45 &gt; 70 ?</text>
<text class="code dyn-cond-1" x="218.6" y="154.7" text-anchor="middle">88 &gt; 70 ?</text>
</g>
<g id="el-scaleup">
<rect class="n-box shp" x="96.0" y="234.4" width="245.3" height="46.0" rx="8"/>
<text class="t" x="218.6" y="262.4" text-anchor="middle">מוסיפים instance עם ASG</text>
</g>
<g id="el-ok">
<rect class="n-box shp" x="374.0" y="126.7" width="235.9" height="46.0" rx="8"/>
<text class="t" x="491.9" y="154.7" text-anchor="middle">אין שינוי - העומס נמוך</text>
</g>
</svg>
