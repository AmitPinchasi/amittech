<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 337 422" width="337" role="img" aria-label="ציר הזמן של טעינת דף: TTFB, FCP ולבסוף LCP">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-nav{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-nav .shp{animation-name:k-nav;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ttfb{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ttfb .shp{animation-name:k-ttfb;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fcp{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fcp .shp{animation-name:k-fcp;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lcp{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lcp .shp{animation-name:k-lcp;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-good{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-good .shp{animation-name:k-good;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ttfb-0{opacity:0;}
@keyframes k-dyn-ttfb-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-ttfb-0{animation-name:k-dyn-ttfb-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ttfb-1{opacity:1;}
@keyframes k-dyn-ttfb-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-ttfb-1{animation-name:k-dyn-ttfb-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-fcp-0{opacity:0;}
@keyframes k-dyn-fcp-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-fcp-0{animation-name:k-dyn-fcp-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-fcp-1{opacity:1;}
@keyframes k-dyn-fcp-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-fcp-1{animation-name:k-dyn-fcp-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-lcp-0{opacity:0;}
@keyframes k-dyn-lcp-0{0.00%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-lcp-0{animation-name:k-dyn-lcp-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-lcp-1{opacity:1;}
@keyframes k-dyn-lcp-1{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-lcp-1{animation-name:k-dyn-lcp-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="168.5,62.0 168.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="168.5,148.0 168.5,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="168.5,234.0 168.5,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="168.5,320.0 168.5,360.0" marker-end="url(#arr)"/>
<g id="el-nav">
<rect class="n-box shp" x="78.2" y="16.0" width="180.8" height="46.0" rx="8"/>
<text class="t" x="168.5" y="44.0" text-anchor="middle">המשתמש נכנס לדף</text>
</g>
<g id="el-ttfb">
<rect class="n-box shp" x="34.1" y="102.0" width="268.8" height="46.0" rx="8"/>
<text class="t dyn-ttfb-0" x="168.5" y="130.0" text-anchor="middle">הבייט הראשון מהשרת (TTFB)</text>
<text class="t dyn-ttfb-1" x="168.5" y="130.0" text-anchor="middle">הבייט הראשון הגיע ב-0.4s</text>
</g>
<g id="el-fcp">
<rect class="n-box shp" x="40.4" y="188.0" width="256.4" height="46.0" rx="8"/>
<text class="t dyn-fcp-0" x="168.5" y="216.0" text-anchor="middle">הטקסט הראשון מוצג (FCP)</text>
<text class="t dyn-fcp-1" x="168.5" y="216.0" text-anchor="middle">הטקסט הראשון הוצג ב-0.9s</text>
</g>
<g id="el-lcp">
<rect class="n-box shp" x="17.3" y="274.0" width="302.4" height="46.0" rx="8"/>
<text class="t dyn-lcp-0" x="168.5" y="302.0" text-anchor="middle">האלמנט הגדול ביותר מוצג (LCP)</text>
<text class="t dyn-lcp-1" x="168.5" y="302.0" text-anchor="middle">תמונת הגיבור הוצגה ב-2.1s</text>
</g>
<g id="el-good">
<rect class="n-box shp" x="16.0" y="360.0" width="305.1" height="46.0" rx="8"/>
<text class="t" x="168.5" y="388.0" text-anchor="middle">ציון טוב: LCP מתחת ל-2.5 שניות</text>
</g>
</svg>
