<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 567 608" width="567" role="img" aria-label="ההבדל בין Capture Filter המסנן פאקטות עוד לפני הלכידה לבין Display Filter המסתיר פאקטות שכבר נלכדו רק מהתצוגה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="155.0,62.0 155.0,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="294.0,171.5 360.0,171.5" marker-end="url(#arr)"/>
<text class="lbl" x="327.0" y="159.5" text-anchor="middle">לא תואם</text>
<polyline id="edge-2" class="edge" points="155.0,241.0 155.0,281.0" marker-end="url(#arr)"/>
<text class="lbl" x="169.0" y="265.0" text-anchor="end">תואם</text>
<polyline id="edge-3" class="edge" points="155.0,327.0 155.0,367.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="294.0,436.5 360.0,436.5" marker-end="url(#arr)"/>
<text class="lbl" x="327.0" y="424.5" text-anchor="middle">לא תואם</text>
<polyline id="edge-5" class="edge" points="155.0,506.0 155.0,546.0" marker-end="url(#arr)"/>
<text class="lbl" x="169.0" y="530.0" text-anchor="end">תואם</text>
<g id="el-wire">
<rect class="n-box shp" x="50.0" y="16.0" width="210.0" height="46.0" rx="8"/>
<text class="t" x="155.0" y="44.0" text-anchor="middle">תעבורה בכרטיס הרשת</text>
</g>
<g id="el-capf">
<polygon class="n-dia shp" points="155.0,102.0 294.0,171.5 155.0,241.0 16.0,171.5"/>
<text class="code" x="155.0" y="176.5" text-anchor="middle">Capture Filter</text>
</g>
<g id="el-dropped">
<rect class="n-box shp" x="360.0" y="148.5" width="190.5" height="46.0" rx="8"/>
<text class="t" x="455.3" y="176.5" text-anchor="middle">נזרקת לפני לכידה</text>
</g>
<g id="el-stored">
<rect class="n-box shp" x="72.0" y="281.0" width="166.0" height="46.0" rx="8"/>
<text class="t" x="155.0" y="309.0" text-anchor="middle">פאקטות שנלכדו</text>
</g>
<g id="el-dispf">
<polygon class="n-dia shp" points="155.0,367.0 294.0,436.5 155.0,506.0 16.0,436.5"/>
<text class="code" x="155.0" y="441.5" text-anchor="middle">Display Filter</text>
</g>
<g id="el-hidden">
<rect class="n-box shp" x="360.0" y="413.5" width="175.7" height="46.0" rx="8"/>
<text class="t" x="447.9" y="441.5" text-anchor="middle">מוסתרת מהתצוגה</text>
</g>
<g id="el-shown">
<rect class="n-box shp" x="76.9" y="546.0" width="156.2" height="46.0" rx="8"/>
<text class="t" x="155.0" y="574.0" text-anchor="middle">מוצגת לניתוח</text>
</g>
</svg>
