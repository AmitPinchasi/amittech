.dyn-phase-0{opacity:0;}
@keyframes k-dyn-phase-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-phase-0{animation-name:k-dyn-phase-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-phase-1{opacity:0;}
@keyframes k-dyn-phase-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-phase-1{animation-name:k-dyn-phase-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-phase-2{opacity:0;}
@keyframes k-dyn-phase-2{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-phase-2{animation-name:k-dyn-phase-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-phase-3{opacity:1;}
@keyframes k-dyn-phase-3{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-phase-3{animation-name:k-dyn-phase-3;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
