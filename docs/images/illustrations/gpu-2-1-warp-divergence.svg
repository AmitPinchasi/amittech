@keyframes k-lane-5{0.00%{stroke:var(--pink);stroke-width:2.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}24.46%{stroke-width:1.5;}37.50%{stroke-width:1.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
