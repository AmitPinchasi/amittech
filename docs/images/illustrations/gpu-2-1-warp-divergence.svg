</g>
<g id="el-phase">
<rect class="n-box shp" x="204.1" y="180.0" width="531.8" height="44.0" rx="8"/>
<text class="t-b dyn-phase-0" x="470.0" y="207.0" text-anchor="middle">כל ה-warp מגיע לתנאי יחד</text>
<text class="t-b dyn-phase-1" x="470.0" y="207.0" text-anchor="middle">ענף if רץ: הלנים הזוגיים פעילים, האי-זוגיים מכובים</text>
<text class="t-b dyn-phase-2" x="470.0" y="207.0" text-anchor="middle">ענף else רץ: הלנים האי-זוגיים פעילים, הזוגיים מכובים</text>
