@keyframes k-lane-3{0.00%{stroke:var(--pink);stroke-width:2.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}24.46%{stroke-width:1.5;}37.50%{stroke-width:1.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-lane-c3{animation-name:k-lane-3;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lane-4{0.00%{stroke:var(--pink);stroke-width:2.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}45.11%{stroke-width:1.5;}58.15%{stroke-width:1.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
