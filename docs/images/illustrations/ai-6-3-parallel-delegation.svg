<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 574 213" width="574" role="img" aria-label="מתזמר מאציל שתי חקירות עצמאיות לשני סוכני משנה שרצים במקביל כל אחד בcontext טרי, וכל אחד מחזיר סיכום קצר שהמתזמר מסנתז">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-orch{0.00%{stroke:var(--pink);stroke-width:2.5;}25.37%{stroke:var(--pink);stroke-width:2.5;}30.60%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-orch .shp{animation-name:k-orch;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-wa{0.00%{stroke-width:1.5;}20.15%{stroke-width:1.5;}25.37%{stroke:var(--pink);stroke-width:2.5;}50.75%{stroke:var(--pink);stroke-width:2.5;}55.97%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-wa .shp{animation-name:k-wa;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-wb{0.00%{stroke-width:1.5;}20.15%{stroke-width:1.5;}25.37%{stroke:var(--pink);stroke-width:2.5;}50.75%{stroke:var(--pink);stroke-width:2.5;}55.97%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-wb .shp{animation-name:k-wb;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-synth{0.00%{stroke-width:1.5;}45.52%{stroke-width:1.5;}50.75%{stroke:var(--pink);stroke-width:2.5;}76.12%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-synth .shp{animation-name:k-synth;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}20.15%{stroke-width:1.6;}25.37%{stroke:var(--pink);stroke-width:2.4;}50.75%{stroke:var(--pink);stroke-width:2.4;}55.97%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}20.15%{stroke-width:1.6;}25.37%{stroke:var(--pink);stroke-width:2.4;}50.75%{stroke:var(--pink);stroke-width:2.4;}55.97%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}45.52%{stroke-width:1.6;}50.75%{stroke:var(--pink);stroke-width:2.4;}76.12%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}45.52%{stroke-width:1.6;}50.75%{stroke:var(--pink);stroke-width:2.4;}76.12%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="194.7,42.0 106.7,42.0 106.7,65.0" marker-end="url(#arr)"/>
<text class="lbl" x="150.7" y="30.0" text-anchor="middle">במקביל</text>
<polyline id="edge-1" class="edge" points="385.2,42.0 473.2,42.0 473.2,65.0" marker-end="url(#arr)"/>
<text class="lbl" x="429.2" y="30.0" text-anchor="middle">במקביל</text>
<polyline id="edge-2" class="edge" points="106.7,111.0 106.7,174.0 189.8,174.0" marker-end="url(#arr)"/>
<text class="lbl" x="120.7" y="142.5" text-anchor="end">סיכום</text>
<polyline id="edge-3" class="edge" points="473.2,111.0 473.2,174.0 390.1,174.0" marker-end="url(#arr)"/>
<text class="lbl" x="487.2" y="142.5" text-anchor="end">סיכום</text>
<g id="el-orch">
<rect class="n-box shp" x="194.7" y="19.0" width="190.5" height="46.0" rx="8"/>
<text class="t" x="290.0" y="47.0" text-anchor="middle">מתזמר מחלק עבודה</text>
</g>
<g id="el-wa">
<rect class="n-box shp" x="16.0" y="65.0" width="181.4" height="46.0" rx="8"/>
<text class="t" x="106.7" y="93.0" text-anchor="middle">סוכן: מודול auth</text>
</g>
<g id="el-wb">
<rect class="n-box shp" x="388.9" y="65.0" width="168.7" height="46.0" rx="8"/>
<text class="t" x="473.2" y="93.0" text-anchor="middle">סוכן: מודול DB</text>
</g>
<g id="el-synth">
<rect class="n-box shp" x="189.8" y="151.0" width="200.2" height="46.0" rx="8"/>
<text class="t" x="290.0" y="179.0" text-anchor="middle">מסנתז את הסיכומים</text>
</g>
</svg>
