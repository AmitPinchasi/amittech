<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="235.7" y="16.0" width="180.4" height="104.0" rx="7"/>
<text class="code" x="326.0" y="43.0" text-anchor="middle">mov eax, [addr1]</text>
<text class="code" x="326.0" y="65.0" text-anchor="middle">add eax, 1</text>
<text class="code" x="326.0" y="87.0" text-anchor="middle">mov eax, [addr2]</text>
<text class="code" x="326.0" y="109.0" text-anchor="middle">add eax, 2</text>
</g>
<g id="el-r1">
<rect class="n-code-bg shp" x="240.2" y="160.0" width="171.4" height="38.0" rx="7"/>
<text class="code dyn-r1-0" x="326.0" y="187.0" text-anchor="middle">eax -&gt; ?</text>
<text class="code dyn-r1-1" x="326.0" y="187.0" text-anchor="middle">mov P1, [addr1]</text>
</g>
<g id="el-r2">
<rect class="n-code-bg shp" x="249.3" y="238.0" width="153.4" height="38.0" rx="7"/>
<text class="code dyn-r2-0" x="326.0" y="265.0" text-anchor="middle">eax -&gt; ?</text>
<text class="code dyn-r2-1" x="326.0" y="265.0" text-anchor="middle">add P2, P1, 1</text>
</g>
<g id="el-r3">
<rect class="n-code-bg shp" x="240.2" y="316.0" width="171.4" height="38.0" rx="7"/>
<text class="code dyn-r3-0" x="326.0" y="343.0" text-anchor="middle">eax -&gt; ?</text>
<text class="code dyn-r3-1" x="326.0" y="343.0" text-anchor="middle">mov P3, [addr2]</text>
</g>
<g id="el-r4">
<rect class="n-code-bg shp" x="249.3" y="394.0" width="153.4" height="38.0" rx="7"/>
<text class="code dyn-r4-0" x="326.0" y="421.0" text-anchor="middle">eax -&gt; ?</text>
<text class="code dyn-r4-1" x="326.0" y="421.0" text-anchor="middle">add P4, P3, 2</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="472.0" width="619.9" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="326.0" y="500.0" text-anchor="middle">כל ארבע ההוראות כותבות ל-eax, ולכן נראה שהן תלויות זו בזו</text>
<text class="t dyn-note-1" x="326.0" y="500.0" text-anchor="middle">כל כתיבה מקבלת אוגר פיזי חדש: P1 ואז P2 עבור שתי ההוראות הראשונות</text>
<text class="t dyn-note-2" x="326.0" y="500.0" text-anchor="middle">ההוראה השלישית כותבת ל-P3, שאינו תלוי כלל ב-P1 או ב-P2</text>
<text class="t dyn-note-3" x="326.0" y="500.0" text-anchor="middle">עכשיו ברור שהזוג P1 P2 והזוג P3 P4 עצמאיים ויכולים לרוץ במקביל</text>
</g>
<g id="el-cap">
<text class="small" x="326.0" y="571.0" text-anchor="middle">התלות בין ההוראות הייתה כוזבת: היא נבעה רק משם האוגר eax ולא מתלות אמיתית בנתונים</text>
</g>
</svg>
