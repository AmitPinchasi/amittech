<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 465 311" width="465" role="img" aria-label="תקיפת שידור חוזר: מכיוון שהטוקן אינו מבוטל לאחר השימוש, אותה בקשת אישור עם אותו טוקן חוזרת שוב ושוב ומבצעת העברה נוספת בכל פעם, כאשר מספר ההעברות עולה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}10.06%{stroke:var(--pink);stroke-width:2.5;}12.13%{stroke-width:1.5;}28.11%{stroke-width:1.5;}30.18%{stroke:var(--pink);stroke-width:2.5;}40.24%{stroke:var(--pink);stroke-width:2.5;}42.31%{stroke-width:1.5;}58.28%{stroke-width:1.5;}60.36%{stroke:var(--pink);stroke-width:2.5;}70.41%{stroke:var(--pink);stroke-width:2.5;}72.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-exec{0.00%{stroke-width:1.5;}7.99%{stroke-width:1.5;}10.06%{stroke:var(--pink);stroke-width:2.5;}20.12%{stroke:var(--pink);stroke-width:2.5;}22.19%{stroke-width:1.5;}38.17%{stroke-width:1.5;}40.24%{stroke:var(--pink);stroke-width:2.5;}50.30%{stroke:var(--pink);stroke-width:2.5;}52.37%{stroke-width:1.5;}68.34%{stroke-width:1.5;}70.41%{stroke:var(--pink);stroke-width:2.5;}80.47%{stroke:var(--pink);stroke-width:2.5;}82.54%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-exec .shp{animation-name:k-exec;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-reuse{0.00%{stroke-width:1.5;}18.05%{stroke-width:1.5;}20.12%{stroke:var(--pink);stroke-width:2.5;}30.18%{stroke:var(--pink);stroke-width:2.5;}32.25%{stroke-width:1.5;}48.22%{stroke-width:1.5;}50.30%{stroke:var(--pink);stroke-width:2.5;}60.36%{stroke:var(--pink);stroke-width:2.5;}62.43%{stroke-width:1.5;}78.40%{stroke-width:1.5;}80.47%{stroke:var(--pink);stroke-width:2.5;}90.53%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-reuse .shp{animation-name:k-reuse;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}7.99%{stroke-width:1.6;}10.06%{stroke:var(--pink);stroke-width:2.4;}20.12%{stroke:var(--pink);stroke-width:2.4;}22.19%{stroke-width:1.6;}38.17%{stroke-width:1.6;}40.24%{stroke:var(--pink);stroke-width:2.4;}50.30%{stroke:var(--pink);stroke-width:2.4;}52.37%{stroke-width:1.6;}68.34%{stroke-width:1.6;}70.41%{stroke:var(--pink);stroke-width:2.4;}80.47%{stroke:var(--pink);stroke-width:2.4;}82.54%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}18.05%{stroke-width:1.6;}20.12%{stroke:var(--pink);stroke-width:2.4;}30.18%{stroke:var(--pink);stroke-width:2.4;}32.25%{stroke-width:1.6;}48.22%{stroke-width:1.6;}50.30%{stroke:var(--pink);stroke-width:2.4;}60.36%{stroke:var(--pink);stroke-width:2.4;}62.43%{stroke-width:1.6;}78.40%{stroke-width:1.6;}80.47%{stroke:var(--pink);stroke-width:2.4;}90.53%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}28.11%{stroke-width:1.6;}30.18%{stroke:var(--pink);stroke-width:2.4;}40.24%{stroke:var(--pink);stroke-width:2.4;}42.31%{stroke-width:1.6;}58.28%{stroke-width:1.6;}60.36%{stroke:var(--pink);stroke-width:2.4;}70.41%{stroke:var(--pink);stroke-width:2.4;}72.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-exec-0{opacity:0;}
@keyframes k-dyn-exec-0{0.00%{opacity:1;}40.24%{opacity:1;}42.31%{opacity:0;}100.00%{opacity:0;}}
.dyn-exec-0{animation-name:k-dyn-exec-0;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-exec-1{opacity:0;}
@keyframes k-dyn-exec-1{0.00%{opacity:0;}38.17%{opacity:0;}40.24%{opacity:1;}70.41%{opacity:1;}72.49%{opacity:0;}100.00%{opacity:0;}}
.dyn-exec-1{animation-name:k-dyn-exec-1;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-exec-2{opacity:1;}
@keyframes k-dyn-exec-2{0.00%{opacity:0;}68.34%{opacity:0;}70.41%{opacity:1;}90.53%{opacity:1;}100.00%{opacity:1;}}
.dyn-exec-2{animation-name:k-dyn-exec-2;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="272.4,65.0 272.4,105.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="272.4,151.0 272.4,191.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="147.8,214.0 16.0,214.0 16.0,42.0 163.9,42.0" marker-end="url(#arr)"/>
<text class="small" x="90.0" y="30.0" text-anchor="middle">שידור חוזר</text>
<g id="el-req">
<rect class="n-box shp" x="163.9" y="19.0" width="217.0" height="46.0" rx="8"/>
<text class="t" x="272.4" y="47.0" text-anchor="middle">בקשה עם token=abc123</text>
</g>
<g id="el-exec">
<rect class="n-box shp" x="172.3" y="105.0" width="200.2" height="46.0" rx="8"/>
<text class="t dyn-exec-0" x="272.4" y="133.0" text-anchor="middle">בוצעה העברה אחת</text>
<text class="t dyn-exec-1" x="272.4" y="133.0" text-anchor="middle">בוצעו שתי העברות</text>
<text class="t dyn-exec-2" x="272.4" y="133.0" text-anchor="middle">בוצעו שלוש העברות</text>
</g>
<g id="el-reuse">
<rect class="n-box shp" x="147.8" y="191.0" width="249.3" height="46.0" rx="8"/>
<text class="t" x="272.4" y="219.0" text-anchor="middle">הטוקן לא בוטל ונשאר תקף</text>
</g>
<g id="el-note">
<text class="small" x="272.4" y="290.0" text-anchor="middle">הגנה: מחיקת הטוקן בשימוש הראשון חוסמת שידור חוזר</text>
</g>
</svg>
