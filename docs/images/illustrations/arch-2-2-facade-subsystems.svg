<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 649 300" width="649" role="img" aria-label="תבנית Facade: הקוד הקורא מפעיל פונקציה אחת פשוטה שמאחוריה ארבע תתי-מערכות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="324.4,62.0 324.4,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="338.4" y="86.0" text-anchor="end">קריאה אחת</text>
<polyline id="edge-1" class="edge" points="324.4,140.0 324.4,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="338.4" y="164.0" text-anchor="end">מפעיל תתי-מערכות</text>
<g id="el-client">
<rect class="n-box shp" x="265.8" y="16.0" width="117.2" height="46.0" rx="8"/>
<text class="t" x="324.4" y="44.0" text-anchor="middle">קוד קורא</text>
</g>
<g id="el-facade">
<rect class="n-code-bg shp" x="162.0" y="102.0" width="324.9" height="38.0" rx="7"/>
<text class="code" x="324.4" y="129.0" text-anchor="middle">DashboardFacade.load_dashboard()</text>
</g>
<g id="el-subs">
<rect id="el-subs-c0" class="n-cell shp" x="493.6" y="180.0" width="139.2" height="46.0" rx="6"/>
<text class="t" x="563.3" y="208.0" text-anchor="middle" style="direction:ltr">Auth</text>
<rect id="el-subs-c1" class="n-cell shp" x="334.4" y="180.0" width="139.2" height="46.0" rx="6"/>
<text class="t" x="404.0" y="208.0" text-anchor="middle" style="direction:ltr">Tasks</text>
<rect id="el-subs-c2" class="n-cell shp" x="175.2" y="180.0" width="139.2" height="46.0" rx="6"/>
<text class="t" x="244.8" y="208.0" text-anchor="middle" style="direction:ltr">Projects</text>
<rect id="el-subs-c3" class="n-cell shp" x="16.0" y="180.0" width="139.2" height="46.0" rx="6"/>
<text class="t" x="85.6" y="208.0" text-anchor="middle" style="direction:ltr">Notifications</text>
</g>
<g id="el-note">
<text class="small" x="324.4" y="279.0" text-anchor="middle">הקוד הקורא רואה רק פונקציה אחת</text>
</g>
</svg>
