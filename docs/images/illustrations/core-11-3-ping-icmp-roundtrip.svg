<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 596 298" width="596" role="img" aria-label="מחזור חיים של בקשת ping: שליחת ICMP Echo Request דרך סוקט גולמי וקבלת Echo Reply עם מדידת זמן">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-pkt{0.00%{stroke:var(--pink);stroke-width:2.5;}29.23%{stroke:var(--pink);stroke-width:2.5;}31.92%{stroke-width:1.5;}55.77%{stroke-width:1.5;}58.46%{stroke:var(--pink);stroke-width:2.5;}73.08%{stroke:var(--pink);stroke-width:2.5;}75.77%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pkt .shp{animation-name:k-pkt;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-state{0.00%{stroke-width:1.5;}11.92%{stroke-width:1.5;}14.62%{stroke:var(--pink);stroke-width:2.5;}58.46%{stroke:var(--pink);stroke-width:2.5;}61.15%{stroke-width:1.5;}70.38%{stroke-width:1.5;}73.08%{stroke:var(--pink);stroke-width:2.5;}87.69%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-state .shp{animation-name:k-state;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-note{0.00%{stroke-width:1.5;}41.15%{stroke-width:1.5;}43.85%{stroke:var(--pink);stroke-width:2.5;}58.46%{stroke:var(--pink);stroke-width:2.5;}61.15%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-note .shp{animation-name:k-note;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pkt-0{opacity:0;}
@keyframes k-dyn-pkt-0{0.00%{opacity:1;}29.23%{opacity:1;}31.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-pkt-0{animation-name:k-dyn-pkt-0;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pkt-1{opacity:0;}
@keyframes k-dyn-pkt-1{0.00%{opacity:0;}26.54%{opacity:0;}29.23%{opacity:1;}58.46%{opacity:1;}61.15%{opacity:0;}100.00%{opacity:0;}}
.dyn-pkt-1{animation-name:k-dyn-pkt-1;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pkt-2{opacity:0;}
@keyframes k-dyn-pkt-2{0.00%{opacity:0;}55.77%{opacity:0;}58.46%{opacity:1;}73.08%{opacity:1;}75.77%{opacity:0;}100.00%{opacity:0;}}
.dyn-pkt-2{animation-name:k-dyn-pkt-2;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pkt-3{opacity:1;}
@keyframes k-dyn-pkt-3{0.00%{opacity:0;}70.38%{opacity:0;}73.08%{opacity:1;}87.69%{opacity:1;}100.00%{opacity:1;}}
.dyn-pkt-3{animation-name:k-dyn-pkt-3;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-0{opacity:0;}
@keyframes k-dyn-state-0{0.00%{opacity:1;}29.23%{opacity:1;}31.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-0{animation-name:k-dyn-state-0;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-1{opacity:0;}
@keyframes k-dyn-state-1{0.00%{opacity:0;}26.54%{opacity:0;}29.23%{opacity:1;}58.46%{opacity:1;}61.15%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-1{animation-name:k-dyn-state-1;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-2{opacity:0;}
@keyframes k-dyn-state-2{0.00%{opacity:0;}55.77%{opacity:0;}58.46%{opacity:1;}73.08%{opacity:1;}75.77%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-2{animation-name:k-dyn-state-2;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-3{opacity:1;}
@keyframes k-dyn-state-3{0.00%{opacity:0;}70.38%{opacity:0;}73.08%{opacity:1;}87.69%{opacity:1;}100.00%{opacity:1;}}
.dyn-state-3{animation-name:k-dyn-state-3;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}14.62%{opacity:1;}17.31%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}11.92%{opacity:0;}14.62%{opacity:1;}29.23%{opacity:1;}31.92%{opacity:0;}55.77%{opacity:0;}58.46%{opacity:1;}73.08%{opacity:1;}75.77%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:0;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}26.54%{opacity:0;}29.23%{opacity:1;}43.85%{opacity:1;}46.54%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-3{opacity:1;}
@keyframes k-dyn-note-3{0.00%{opacity:0;}41.15%{opacity:0;}43.85%{opacity:1;}58.46%{opacity:1;}61.15%{opacity:0;}70.38%{opacity:0;}73.08%{opacity:1;}87.69%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-3{animation-name:k-dyn-note-3;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-pkt">
<rect class="n-code-bg shp" x="90.5" y="16.0" width="415.1" height="38.0" rx="7"/>
<text class="code dyn-pkt-0" x="298.1" y="43.0" text-anchor="middle">icmp-&gt;type = 8, seq = 0, checksum = 0xF7FD</text>
<text class="code dyn-pkt-1" x="298.1" y="43.0" text-anchor="middle">icmp-&gt;type = 0, seq = 0</text>
<text class="code dyn-pkt-2" x="298.1" y="43.0" text-anchor="middle">icmp-&gt;type = 8, seq = 1, checksum = 0xF7FC</text>
<text class="code dyn-pkt-3" x="298.1" y="43.0" text-anchor="middle">icmp-&gt;type = 0, seq = 1</text>
</g>
<g id="el-state">
<rect class="n-box shp" x="159.4" y="94.0" width="277.3" height="44.0" rx="8"/>
<text class="t-b dyn-state-0" x="298.1" y="121.0" text-anchor="middle" style="direction:ltr">seq = 0 sent, waiting</text>
<text class="t-b dyn-state-1" x="298.1" y="121.0" text-anchor="middle" style="direction:ltr">seq = 0 reply, time = 12.3 ms</text>
<text class="t-b dyn-state-2" x="298.1" y="121.0" text-anchor="middle" style="direction:ltr">seq = 1 sent, waiting</text>
<text class="t-b dyn-state-3" x="298.1" y="121.0" text-anchor="middle" style="direction:ltr">seq = 1 reply, time = 11.8 ms</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="31.5" y="178.0" width="533.2" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="298.1" y="206.0" text-anchor="middle">בונים חבילת ICMP מסוג Echo Request ומחשבים עליה checksum</text>
<text class="t dyn-note-1" x="298.1" y="206.0" text-anchor="middle">החבילה נשלחת עם sendto, והקרנל מוסיף לה את כותרת הIP</text>
<text class="t dyn-note-2" x="298.1" y="206.0" text-anchor="middle">התשובה מגיעה מהיעד כEcho Reply עם אותו מספר סידורי</text>
<text class="t dyn-note-3" x="298.1" y="206.0" text-anchor="middle">ההפרש בין זמן השליחה לזמן הקבלה הוא זמן הלוך ושוב - RTT</text>
</g>
<g id="el-cap">
<text class="small" x="298.1" y="277.0" text-anchor="middle">בכל סיבוב המספר הסידורי עולה באחד, ולכן אפשר לזהות איזו תשובה שייכת לאיזו בקשה</text>
</g>
</svg>
