.dyn-val-2{opacity:1;}
@keyframes k-dyn-val-2{0.00%{opacity:0;}54.61%{opacity:0;}59.21%{opacity:1;}78.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-2{animation-name:k-dyn-val-2;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
