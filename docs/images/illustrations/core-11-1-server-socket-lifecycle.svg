<text class="t" x="353.3" y="474.0" text-anchor="middle">סגירת סוקט הלקוח - close</text>
</g>
<g id="el-cap">
<text class="small" x="353.3" y="545.0" text-anchor="middle">הסוקט המאזין נשאר פתוח כל הזמן, וכל קריאה לaccept מחזירה סוקט נפרד ללקוח</text>
</g>
</svg>
