<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 627 566" width="627" role="img" aria-label="מחזור החיים של סוקט שרת: יצירה, קשירה, האזנה, וקבלת חיבורים בלולאה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-sock{0.00%{stroke:var(--pink);stroke-width:2.5;}9.14%{stroke:var(--pink);stroke-width:2.5;}11.02%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sock .shp{animation-name:k-sock;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-bind{0.00%{stroke-width:1.5;}7.26%{stroke-width:1.5;}9.14%{stroke:var(--pink);stroke-width:2.5;}18.28%{stroke:var(--pink);stroke-width:2.5;}20.16%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-bind .shp{animation-name:k-bind;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lis{0.00%{stroke-width:1.5;}16.40%{stroke-width:1.5;}18.28%{stroke:var(--pink);stroke-width:2.5;}27.42%{stroke:var(--pink);stroke-width:2.5;}29.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lis .shp{animation-name:k-lis;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-acc{0.00%{stroke-width:1.5;}25.54%{stroke-width:1.5;}27.42%{stroke:var(--pink);stroke-width:2.5;}36.56%{stroke:var(--pink);stroke-width:2.5;}38.44%{stroke-width:1.5;}62.10%{stroke-width:1.5;}63.98%{stroke:var(--pink);stroke-width:2.5;}73.12%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-acc .shp{animation-name:k-acc;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-io{0.00%{stroke-width:1.5;}34.68%{stroke-width:1.5;}36.56%{stroke:var(--pink);stroke-width:2.5;}45.70%{stroke:var(--pink);stroke-width:2.5;}47.58%{stroke-width:1.5;}71.24%{stroke-width:1.5;}73.12%{stroke:var(--pink);stroke-width:2.5;}82.26%{stroke:var(--pink);stroke-width:2.5;}84.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-io .shp{animation-name:k-io;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cl{0.00%{stroke-width:1.5;}43.82%{stroke-width:1.5;}45.70%{stroke:var(--pink);stroke-width:2.5;}54.84%{stroke:var(--pink);stroke-width:2.5;}56.72%{stroke-width:1.5;}80.38%{stroke-width:1.5;}82.26%{stroke:var(--pink);stroke-width:2.5;}91.40%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-cl .shp{animation-name:k-cl;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}7.26%{stroke-width:1.6;}9.14%{stroke:var(--pink);stroke-width:2.4;}18.28%{stroke:var(--pink);stroke-width:2.4;}20.16%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}16.40%{stroke-width:1.6;}18.28%{stroke:var(--pink);stroke-width:2.4;}27.42%{stroke:var(--pink);stroke-width:2.4;}29.30%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}25.54%{stroke-width:1.6;}27.42%{stroke:var(--pink);stroke-width:2.4;}36.56%{stroke:var(--pink);stroke-width:2.4;}38.44%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}34.68%{stroke-width:1.6;}36.56%{stroke:var(--pink);stroke-width:2.4;}45.70%{stroke:var(--pink);stroke-width:2.4;}47.58%{stroke-width:1.6;}71.24%{stroke-width:1.6;}73.12%{stroke:var(--pink);stroke-width:2.4;}82.26%{stroke:var(--pink);stroke-width:2.4;}84.14%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}43.82%{stroke-width:1.6;}45.70%{stroke:var(--pink);stroke-width:2.4;}54.84%{stroke:var(--pink);stroke-width:2.4;}56.72%{stroke-width:1.6;}80.38%{stroke-width:1.6;}82.26%{stroke:var(--pink);stroke-width:2.4;}91.40%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}52.96%{stroke-width:1.6;}54.84%{stroke:var(--pink);stroke-width:2.4;}63.98%{stroke:var(--pink);stroke-width:2.4;}65.86%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-5{animation-name:k-edge-5;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-acc-0{opacity:0;}
@keyframes k-dyn-acc-0{0.00%{opacity:1;}27.42%{opacity:1;}29.30%{opacity:0;}100.00%{opacity:0;}}
.dyn-acc-0{animation-name:k-dyn-acc-0;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-acc-1{opacity:0;}
@keyframes k-dyn-acc-1{0.00%{opacity:0;}25.54%{opacity:0;}27.42%{opacity:1;}63.98%{opacity:1;}65.86%{opacity:0;}100.00%{opacity:0;}}
.dyn-acc-1{animation-name:k-dyn-acc-1;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-acc-2{opacity:1;}
@keyframes k-dyn-acc-2{0.00%{opacity:0;}62.10%{opacity:0;}63.98%{opacity:1;}91.40%{opacity:1;}100.00%{opacity:1;}}
.dyn-acc-2{animation-name:k-dyn-acc-2;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="353.3,62.0 353.3,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="353.3,148.0 353.3,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="353.3,234.0 353.3,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="353.3,320.0 353.3,360.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="353.3,406.0 353.3,446.0" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="229.0,469.0 16.0,469.0 16.0,297.0 219.3,297.0" marker-end="url(#arr)"/>
<text class="small" x="117.6" y="285.0" text-anchor="middle">הלקוח הבא</text>
<g id="el-sock">
<rect class="n-box shp" x="251.7" y="16.0" width="203.3" height="46.0" rx="8"/>
<text class="t" x="353.3" y="44.0" text-anchor="middle">יצירת סוקט - socket</text>
</g>
<g id="el-bind">
<rect class="n-box shp" x="255.2" y="102.0" width="196.2" height="46.0" rx="8"/>
<text class="t" x="353.3" y="130.0" text-anchor="middle">קשירה לפורט - bind</text>
</g>
<g id="el-lis">
<rect class="n-box shp" x="246.8" y="188.0" width="213.0" height="46.0" rx="8"/>
<text class="t" x="353.3" y="216.0" text-anchor="middle">התחלת האזנה - listen</text>
</g>
<g id="el-acc">
<rect class="n-box shp" x="219.3" y="274.0" width="268.1" height="46.0" rx="8"/>
<text class="t dyn-acc-0" x="353.3" y="302.0" text-anchor="middle">המתנה ללקוח - accept</text>
<text class="t dyn-acc-1" x="353.3" y="302.0" text-anchor="middle">לקוח ראשון התחבר, fd חדש 4</text>
<text class="t dyn-acc-2" x="353.3" y="302.0" text-anchor="middle">לקוח שני התחבר, fd חדש 5</text>
</g>
<g id="el-io">
