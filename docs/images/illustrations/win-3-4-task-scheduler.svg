<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 582 550" width="582" role="img" aria-label="כיצד ה-Task Scheduler מפעיל משימה: הטריגר מגדיר זמן, השירות ממתין ובודק, וכשמגיע הזמן הוא מריץ את ה-Action תחת המשתמש SYSTEM">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-trig{0.00%{stroke:var(--pink);stroke-width:2.5;}10.06%{stroke:var(--pink);stroke-width:2.5;}12.13%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-trig .shp{animation-name:k-trig;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sched{0.00%{stroke-width:1.5;}7.99%{stroke-width:1.5;}10.06%{stroke:var(--pink);stroke-width:2.5;}20.12%{stroke:var(--pink);stroke-width:2.5;}22.19%{stroke-width:1.5;}38.17%{stroke-width:1.5;}40.24%{stroke:var(--pink);stroke-width:2.5;}50.30%{stroke:var(--pink);stroke-width:2.5;}52.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sched .shp{animation-name:k-sched;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}18.05%{stroke-width:1.5;}20.12%{stroke:var(--pink);stroke-width:2.5;}30.18%{stroke:var(--pink);stroke-width:2.5;}32.25%{stroke-width:1.5;}48.22%{stroke-width:1.5;}50.30%{stroke:var(--pink);stroke-width:2.5;}60.36%{stroke:var(--pink);stroke-width:2.5;}62.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-wait{0.00%{stroke-width:1.5;}28.11%{stroke-width:1.5;}30.18%{stroke:var(--pink);stroke-width:2.5;}40.24%{stroke:var(--pink);stroke-width:2.5;}42.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-wait .shp{animation-name:k-wait;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-action{0.00%{stroke-width:1.5;}58.28%{stroke-width:1.5;}60.36%{stroke:var(--pink);stroke-width:2.5;}70.41%{stroke:var(--pink);stroke-width:2.5;}72.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-action .shp{animation-name:k-action;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-script{0.00%{stroke-width:1.5;}68.34%{stroke-width:1.5;}70.41%{stroke:var(--pink);stroke-width:2.5;}80.47%{stroke:var(--pink);stroke-width:2.5;}82.54%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-script .shp{animation-name:k-script;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-princ{0.00%{stroke-width:1.5;}78.40%{stroke-width:1.5;}80.47%{stroke:var(--pink);stroke-width:2.5;}90.53%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-princ .shp{animation-name:k-princ;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}7.99%{stroke-width:1.6;}10.06%{stroke:var(--pink);stroke-width:2.4;}20.12%{stroke:var(--pink);stroke-width:2.4;}22.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}18.05%{stroke-width:1.6;}20.12%{stroke:var(--pink);stroke-width:2.4;}30.18%{stroke:var(--pink);stroke-width:2.4;}32.25%{stroke-width:1.6;}48.22%{stroke-width:1.6;}50.30%{stroke:var(--pink);stroke-width:2.4;}60.36%{stroke:var(--pink);stroke-width:2.4;}62.43%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}28.11%{stroke-width:1.6;}30.18%{stroke:var(--pink);stroke-width:2.4;}40.24%{stroke:var(--pink);stroke-width:2.4;}42.31%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}38.17%{stroke-width:1.6;}40.24%{stroke:var(--pink);stroke-width:2.4;}50.30%{stroke:var(--pink);stroke-width:2.4;}52.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}58.28%{stroke-width:1.6;}60.36%{stroke:var(--pink);stroke-width:2.4;}70.41%{stroke:var(--pink);stroke-width:2.4;}72.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}68.34%{stroke-width:1.6;}70.41%{stroke:var(--pink);stroke-width:2.4;}80.47%{stroke:var(--pink);stroke-width:2.4;}82.54%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-5{animation-name:k-edge-5;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-6{0.00%{stroke-width:1.6;}78.40%{stroke-width:1.6;}80.47%{stroke:var(--pink);stroke-width:2.4;}90.53%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-6{animation-name:k-edge-6;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="267.5,62.0 267.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="267.5,148.0 267.5,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="363.6,236.0 429.6,236.0" marker-end="url(#arr)"/>
<text class="lbl" x="396.6" y="224.0" text-anchor="middle">לא</text>
<polyline id="edge-3" class="edge" points="429.6,236.0 16.0,236.0 16.0,125.0 164.3,125.0" marker-end="url(#arr)"/>
<text class="small" x="90.2" y="113.0" text-anchor="middle">בדיקה חוזרת</text>
<polyline id="edge-4" class="edge" points="267.5,284.1 267.5,324.1" marker-end="url(#arr)"/>
<text class="lbl" x="281.5" y="308.1" text-anchor="end">כן</text>
<polyline id="edge-5" class="edge" points="267.5,370.1 267.5,410.1" marker-end="url(#arr)"/>
<polyline id="edge-6" class="edge" points="267.5,448.1 267.5,488.1" marker-end="url(#arr)"/>
<g id="el-trig">
<rect class="n-box shp" x="150.4" y="16.0" width="234.2" height="46.0" rx="8"/>
<text class="t" x="267.5" y="44.0" text-anchor="middle">טריגר - יומי בשעה 8:00</text>
</g>
<g id="el-sched">
<rect class="n-box shp" x="164.3" y="102.0" width="206.3" height="46.0" rx="8"/>
<text class="t" x="267.5" y="130.0" text-anchor="middle">Task Scheduler פעיל</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="267.5,188.0 363.6,236.0 267.5,284.1 171.4,236.0"/>
<text class="t" x="267.5" y="241.0" text-anchor="middle">הגיע 8:00?</text>
</g>
<g id="el-wait">
<rect class="n-box shp" x="429.6" y="213.0" width="136.7" height="46.0" rx="8"/>
<text class="t" x="497.9" y="241.0" text-anchor="middle">ממתין לזמן</text>
</g>
<g id="el-action">
<rect class="n-box shp" x="177.1" y="324.1" width="180.8" height="46.0" rx="8"/>
<text class="t" x="267.5" y="352.1" text-anchor="middle">מריץ את ה-Action</text>
</g>
<g id="el-script">
<rect class="n-code-bg shp" x="96.0" y="410.1" width="342.9" height="38.0" rx="7"/>
<text class="code" x="267.5" y="437.1" text-anchor="middle">powershell.exe -File wallpaper.ps1</text>
</g>
<g id="el-princ">
<rect class="n-box shp" x="122.0" y="488.1" width="291.0" height="46.0" rx="8"/>
<text class="t" x="267.5" y="516.1" text-anchor="middle">רץ תחת NT AUTHORITY\SYSTEM</text>
</g>
</svg>
