<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 484" width="490" role="img" aria-label="איור מסלול קוד היציאה מהתהליך הבן אל התהליך האב: הבן מסיים עם קוד 0, הקרנל שומר אותו, והקריאה wait מעבירה אותו למשתנה status">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-fork{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fork .shp{animation-name:k-fork;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-wait{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}27.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-wait .shp{animation-name:k-wait;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-child{0.00%{stroke-width:1.5;}22.89%{stroke-width:1.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-child .shp{animation-name:k-child;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-kern{0.00%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-kern .shp{animation-name:k-kern;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-status{0.00%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-status .shp{animation-name:k-status;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cont{0.00%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-cont .shp{animation-name:k-cont;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.21%{stroke-width:1.6;}12.68%{stroke:var(--pink);stroke-width:2.4;}25.35%{stroke:var(--pink);stroke-width:2.4;}27.82%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.89%{stroke-width:1.6;}25.35%{stroke:var(--pink);stroke-width:2.4;}38.03%{stroke:var(--pink);stroke-width:2.4;}40.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}35.56%{stroke-width:1.6;}38.03%{stroke:var(--pink);stroke-width:2.4;}50.70%{stroke:var(--pink);stroke-width:2.4;}53.17%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}60.92%{stroke-width:1.6;}63.38%{stroke:var(--pink);stroke-width:2.4;}76.06%{stroke:var(--pink);stroke-width:2.4;}78.52%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-kern-0{opacity:0;}
@keyframes k-dyn-kern-0{0.00%{opacity:1;}50.70%{opacity:1;}53.17%{opacity:0;}100.00%{opacity:0;}}
.dyn-kern-0{animation-name:k-dyn-kern-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-kern-1{opacity:1;}
@keyframes k-dyn-kern-1{0.00%{opacity:0;}48.24%{opacity:0;}50.70%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-kern-1{animation-name:k-dyn-kern-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-status-0{opacity:0;}
@keyframes k-dyn-status-0{0.00%{opacity:1;}63.38%{opacity:1;}65.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-status-0{animation-name:k-dyn-status-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-status-1{opacity:1;}
@keyframes k-dyn-status-1{0.00%{opacity:0;}60.92%{opacity:0;}63.38%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-status-1{animation-name:k-dyn-status-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="245.1,54.0 245.1,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="245.1,140.0 245.1,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="245.1,218.0 245.1,258.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="245.1,304.0 245.1,344.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="245.1,382.0 245.1,422.0" marker-end="url(#arr)"/>
<g id="el-fork">
<rect class="n-code-bg shp" x="141.4" y="16.0" width="207.5" height="38.0" rx="7"/>
<text class="code" x="245.1" y="43.0" text-anchor="middle">pid_t pid = fork();</text>
</g>
<g id="el-wait">
<rect class="n-box shp" x="66.4" y="94.0" width="357.5" height="46.0" rx="8"/>
<text class="t" x="245.1" y="122.0" text-anchor="middle">האב קורא ל-wait ונעצר עד שהבן יסתיים</text>
</g>
<g id="el-child">
<rect class="n-code-bg shp" x="186.5" y="180.0" width="117.2" height="38.0" rx="7"/>
<text class="code" x="245.1" y="207.0" text-anchor="middle">_exit(0);</text>
</g>
<g id="el-kern">
<rect class="n-box shp" x="16.0" y="258.0" width="458.3" height="46.0" rx="8"/>
<text class="t dyn-kern-0" x="245.1" y="286.0" text-anchor="middle">הקרנל מסמן את הבן כ-zombie ושומר את קוד היציאה 0</text>
<text class="t dyn-kern-1" x="245.1" y="286.0" text-anchor="middle">הקרנל מוסר את קוד היציאה לאב ומוחק את הבן</text>
</g>
<g id="el-status">
<rect class="n-code-bg shp" x="182.0" y="344.0" width="126.3" height="38.0" rx="7"/>
<text class="code dyn-status-0" x="245.1" y="371.0" text-anchor="middle">status = ?</text>
<text class="code dyn-status-1" x="245.1" y="371.0" text-anchor="middle">status = 0</text>
</g>
<g id="el-cont">
<rect class="n-box shp" x="83.9" y="422.0" width="322.5" height="46.0" rx="8"/>
<text class="t" x="245.1" y="450.0" text-anchor="middle">האב ממשיך לרוץ ויודע שהבן הצליח</text>
</g>
</svg>
