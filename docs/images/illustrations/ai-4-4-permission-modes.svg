<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 389 253" width="389" role="img" aria-label="מחזור מצבי ההרשאה עם Shift Tab: ממצב Manual ששואל תמיד, למצב Accept edits שעורך בלי לשאול, למצב Plan שחוקר ומציע תוכנית, וחזרה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-manual{0.00%{stroke:var(--pink);stroke-width:2.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}24.38%{stroke-width:1.5;}55.62%{stroke-width:1.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-manual .shp{animation-name:k-manual;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-accept{0.00%{stroke-width:1.5;}15.62%{stroke-width:1.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}44.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-accept .shp{animation-name:k-accept;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-plan{0.00%{stroke-width:1.5;}35.62%{stroke-width:1.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}64.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-plan .shp{animation-name:k-plan;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}15.62%{stroke-width:1.6;}20.00%{stroke:var(--pink);stroke-width:2.4;}40.00%{stroke:var(--pink);stroke-width:2.4;}44.38%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}35.62%{stroke-width:1.6;}40.00%{stroke:var(--pink);stroke-width:2.4;}60.00%{stroke:var(--pink);stroke-width:2.4;}64.38%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}55.62%{stroke-width:1.6;}60.00%{stroke:var(--pink);stroke-width:2.4;}80.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="234.4,65.0 234.4,105.0" marker-end="url(#arr)"/>
<text class="lbl" x="248.4" y="89.0" text-anchor="end" style="direction:ltr">Shift+Tab</text>
<polyline id="edge-1" class="edge" points="234.4,151.0 234.4,191.0" marker-end="url(#arr)"/>
<text class="lbl" x="248.4" y="175.0" text-anchor="end" style="direction:ltr">Shift+Tab</text>
<polyline id="edge-2" class="edge" points="123.0,214.0 16.0,214.0 16.0,42.0 119.5,42.0" marker-end="url(#arr)"/>
<text class="small" x="67.8" y="30.0" text-anchor="middle" style="direction:ltr">Shift+Tab</text>
<g id="el-manual">
<rect class="n-box shp" x="119.5" y="19.0" width="229.8" height="46.0" rx="8"/>
<text class="t" x="234.4" y="47.0" text-anchor="middle">מצב Manual - שואל תמיד</text>
</g>
<g id="el-accept">
<rect class="n-box shp" x="96.0" y="105.0" width="276.8" height="46.0" rx="8"/>
<text class="t" x="234.4" y="133.0" text-anchor="middle">מצב Accept edits - בלי לשאול</text>
</g>
<g id="el-plan">
<rect class="n-box shp" x="123.0" y="191.0" width="222.8" height="46.0" rx="8"/>
<text class="t" x="234.4" y="219.0" text-anchor="middle">מצב Plan - חוקר ומציע</text>
</g>
</svg>
