<text class="code" x="324.4" y="153.6" text-anchor="middle">exit == 0 ?</text>
</g>
<g id="el-yes">
<rect class="n-box shp" x="410.5" y="203.2" width="222.4" height="46.0" rx="8"/>
<text class="t" x="521.7" y="231.2" text-anchor="middle">מריצה את השנייה עם &amp;&amp;</text>
</g>
<g id="el-no">
<rect class="n-box shp" x="16.0" y="203.2" width="222.4" height="46.0" rx="8"/>
<text class="t" x="127.2" y="231.2" text-anchor="middle">מריצה את השנייה עם ||</text>
</g>
<g id="el-end">
<rect class="n-box shp" x="276.4" y="289.2" width="96.0" height="46.0" rx="8"/>
<text class="t" x="324.4" y="317.2" text-anchor="middle">המשך</text>
</g>
</svg>
