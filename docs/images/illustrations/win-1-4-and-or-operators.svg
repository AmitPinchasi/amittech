<text class="lbl" x="171.2" y="136.6" text-anchor="middle">נכשלה</text>
<polyline id="edge-3" class="edge" points="521.7,249.2 521.7,312.2 372.4,312.2" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="127.2,249.2 127.2,312.2 276.4,312.2" marker-end="url(#arr)"/>
<g id="el-run">
<rect class="n-code-bg shp" x="276.4" y="16.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="324.4" y="43.0" text-anchor="middle">cmd1</text>
</g>
<g id="el-cond">
