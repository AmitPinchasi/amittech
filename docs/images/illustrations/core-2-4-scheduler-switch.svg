<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 534 800" width="534" role="img" aria-label="תרשים המראה כיצד פסיקת הטיימר עוצרת את התוכנה הרצה, שומרת את האוגרים שלה ב-PCB, ומחזירה שליטה לתוכנה אחרת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-timer{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-timer .shp{animation-name:k-timer;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-save{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}27.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-save .shp{animation-name:k-save;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pcb{0.00%{stroke-width:1.5;}22.89%{stroke-width:1.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pcb .shp{animation-name:k-pcb;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pick{0.00%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}53.17%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pick .shp{animation-name:k-pick;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cr3{0.00%{stroke-width:1.5;}48.24%{stroke-width:1.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cr3 .shp{animation-name:k-cr3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-restore{0.00%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-restore .shp{animation-name:k-restore;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-resume{0.00%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-resume .shp{animation-name:k-resume;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.21%{stroke-width:1.6;}12.68%{stroke:var(--pink);stroke-width:2.4;}25.35%{stroke:var(--pink);stroke-width:2.4;}27.82%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.89%{stroke-width:1.6;}25.35%{stroke:var(--pink);stroke-width:2.4;}38.03%{stroke:var(--pink);stroke-width:2.4;}40.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}35.56%{stroke-width:1.6;}38.03%{stroke:var(--pink);stroke-width:2.4;}50.70%{stroke:var(--pink);stroke-width:2.4;}53.17%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}48.24%{stroke-width:1.6;}50.70%{stroke:var(--pink);stroke-width:2.4;}63.38%{stroke:var(--pink);stroke-width:2.4;}65.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}60.92%{stroke-width:1.6;}63.38%{stroke:var(--pink);stroke-width:2.4;}76.06%{stroke:var(--pink);stroke-width:2.4;}78.52%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-0{opacity:0;}
@keyframes k-dyn-cur-0{0.00%{opacity:1;}12.68%{opacity:1;}15.14%{opacity:0;}100.00%{opacity:0;}}
.dyn-cur-0{animation-name:k-dyn-cur-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-1{opacity:0;}
@keyframes k-dyn-cur-1{0.00%{opacity:0;}10.21%{opacity:0;}12.68%{opacity:1;}76.06%{opacity:1;}78.52%{opacity:0;}100.00%{opacity:0;}}
.dyn-cur-1{animation-name:k-dyn-cur-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-2{opacity:1;}
@keyframes k-dyn-cur-2{0.00%{opacity:0;}73.59%{opacity:0;}76.06%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-cur-2{animation-name:k-dyn-cur-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="266.8,62.0 266.8,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="266.8,184.0 266.8,224.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="266.8,270.0 266.8,310.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="266.8,370.0 266.8,410.0" marker-end="url(#arr)"/>
<text class="lbl" x="280.8" y="394.0" text-anchor="end">הזיכרון של B</text>
<polyline id="edge-4" class="edge" points="266.8,470.0 266.8,510.0" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="266.8,614.0 266.8,654.0" marker-end="url(#arr)"/>
<g id="el-timer">
<rect class="n-box shp" x="44.4" y="16.0" width="444.8" height="46.0" rx="8"/>
<text class="t" x="266.8" y="44.0" text-anchor="middle">טיימר החומרה עוצר את התוכנה כל עשר מילי שניות</text>
</g>
<g id="el-save">
<rect class="n-code-bg shp" x="163.1" y="102.0" width="207.5" height="82.0" rx="7"/>
<text class="code" x="266.8" y="129.0" text-anchor="middle">cli</text>
<text class="code" x="266.8" y="151.0" text-anchor="middle">pushad</text>
<text class="code" x="266.8" y="173.0" text-anchor="middle">mov [eax].regs, esp</text>
</g>
<g id="el-pcb">
<rect class="n-box shp" x="16.0" y="224.0" width="501.6" height="46.0" rx="8"/>
<text class="t" x="266.8" y="252.0" text-anchor="middle">כל האוגרים של התוכנה הנוכחית נשמרים במבנה ה-PCB שלה</text>
</g>
<g id="el-pick">
<rect class="n-code-bg shp" x="140.5" y="310.0" width="252.7" height="60.0" rx="7"/>
<text class="code" x="266.8" y="337.0" text-anchor="middle">call scheduler_pick_next</text>
<text class="code" x="266.8" y="359.0" text-anchor="middle">mov [current_pcb], eax</text>
</g>
<g id="el-cr3">
<rect class="n-code-bg shp" x="167.6" y="410.0" width="198.5" height="60.0" rx="7"/>
<text class="code" x="266.8" y="437.0" text-anchor="middle">mov ebx, [eax].cr3</text>
<text class="code" x="266.8" y="459.0" text-anchor="middle">mov cr3, ebx</text>
</g>
<g id="el-restore">
<rect class="n-code-bg shp" x="163.1" y="510.0" width="207.5" height="104.0" rx="7"/>
<text class="code" x="266.8" y="537.0" text-anchor="middle">mov esp, [eax].regs</text>
<text class="code" x="266.8" y="559.0" text-anchor="middle">popad</text>
<text class="code" x="266.8" y="581.0" text-anchor="middle">sti</text>
<text class="code" x="266.8" y="603.0" text-anchor="middle">iret</text>
</g>
<g id="el-resume">
<rect class="n-box shp" x="54.3" y="654.0" width="425.0" height="46.0" rx="8"/>
<text class="t" x="266.8" y="682.0" text-anchor="middle">התוכנה הבאה ממשיכה בדיוק מהנקודה שבה נעצרה</text>
</g>
<g id="el-cur">
<rect class="n-box shp" x="135.0" y="740.0" width="263.7" height="44.0" rx="8"/>
<text class="t-b dyn-cur-0" x="266.8" y="767.0" text-anchor="middle" style="direction:ltr">running = A</text>
<text class="t-b dyn-cur-1" x="266.8" y="767.0" text-anchor="middle" style="direction:ltr">running = kernel scheduler</text>
<text class="t-b dyn-cur-2" x="266.8" y="767.0" text-anchor="middle" style="direction:ltr">running = B</text>
</g>
</svg>
