<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 557 614" width="557" role="img" aria-label="שרשרת הזרקת פרומפט: הagent קורא תוכן חיצוני עם הוראה מוסתרת ומפרש אותה כפקודה, והרשאה מינימלית חוסמת את הפעולה לפני שסוד דולף לתוקף">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="167.5,62.0 167.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="167.5,148.0 167.5,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="167.5,234.0 167.5,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="319.1,349.8 385.1,349.8" marker-end="url(#arr)"/>
<text class="lbl" x="352.1" y="337.8" text-anchor="middle">כן</text>
<polyline id="edge-4" class="edge" points="167.5,425.5 167.5,465.5" marker-end="url(#arr)"/>
<text class="lbl" x="181.5" y="449.5" text-anchor="end">לא</text>
<polyline id="edge-5" class="edge" points="167.5,511.5 167.5,551.5" marker-end="url(#arr)"/>
<g id="el-read">
<rect class="n-box shp" x="53.6" y="16.0" width="227.8" height="46.0" rx="8"/>
<text class="t" x="167.5" y="44.0" text-anchor="middle">הagent קורא דף חיצוני</text>
</g>
<g id="el-hidden">
<rect class="n-box shp" x="62.5" y="102.0" width="210.0" height="46.0" rx="8"/>
<text class="t" x="167.5" y="130.0" text-anchor="middle">הוראה מוסתרת בטקסט</text>
</g>
<g id="el-interpret">
<rect class="n-box shp" x="67.4" y="188.0" width="200.2" height="46.0" rx="8"/>
<text class="t" x="167.5" y="216.0" text-anchor="middle">המודל מפרש כהוראה</text>
</g>
<g id="el-gate">
<polygon class="n-dia shp" points="167.5,274.0 319.1,349.8 167.5,425.5 16.0,349.8"/>
<text class="t" x="167.5" y="354.8" text-anchor="middle">הרשאה מינימלית?</text>
</g>
<g id="el-blocked">
<rect class="n-box shp" x="385.1" y="326.8" width="156.2" height="46.0" rx="8"/>
<text class="t" x="463.2" y="354.8" text-anchor="middle">הפעולה נחסמת</text>
</g>
<g id="el-exfil">
<rect class="n-box shp" x="77.2" y="465.5" width="180.8" height="46.0" rx="8"/>
<text class="t" x="167.5" y="493.5" text-anchor="middle">שליחת סוד החוצה</text>
</g>
<g id="el-attacker">
<rect class="n-box shp" x="94.3" y="551.5" width="146.5" height="46.0" rx="8"/>
<text class="t" x="167.5" y="579.5" text-anchor="middle">דליפה לתוקף</text>
</g>
</svg>
