<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 459" width="740" role="img" aria-label="מנגנון path traversal מול הגנת realpath: כיצד file=../../../../etc/passwd יוצא מתיקיית uploads, וכיצד בדיקת הנתיב שנפתר חוסמת גישה מחוץ לתיקייה המורשית">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
