<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 467 419" width="467" role="img" aria-label="הפונקציה dispatch שולחת action ל-reducer, ה-reducer בוחר את ה-case המתאים ומחזיר אובייקט state חדש שגורם לרינדור מחדש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cur{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-cur .shp{animation-name:k-cur;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-act{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-act .shp{animation-name:k-act;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sw{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sw .shp{animation-name:k-sw;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-nxt{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-nxt .shp{animation-name:k-nxt;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-rr{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-rr .shp{animation-name:k-rr;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}40.73%{stroke-width:1.6;}43.55%{stroke:var(--pink);stroke-width:2.4;}58.06%{stroke:var(--pink);stroke-width:2.4;}60.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}55.24%{stroke-width:1.6;}58.06%{stroke:var(--pink);stroke-width:2.4;}72.58%{stroke:var(--pink);stroke-width:2.4;}75.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-0{opacity:0;}
@keyframes k-dyn-cur-0{0.00%{opacity:1;}72.58%{opacity:1;}75.40%{opacity:0;}100.00%{opacity:0;}}
.dyn-cur-0{animation-name:k-dyn-cur-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-1{opacity:1;}
@keyframes k-dyn-cur-1{0.00%{opacity:0;}69.76%{opacity:0;}72.58%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-cur-1{animation-name:k-dyn-cur-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="272.0,61.0 272.0,101.0" marker-end="url(#arr)"/>
<text class="lbl" x="286.0" y="85.0" text-anchor="end">לחיצה על הכפתור</text>
<polyline id="edge-1" class="edge" points="272.0,139.0 272.0,179.0" marker-end="url(#arr)"/>
<text class="lbl" x="286.0" y="163.0" text-anchor="end">ה-action מגיע ל-reducer</text>
<polyline id="edge-2" class="edge" points="272.0,239.0 272.0,279.0" marker-end="url(#arr)"/>
<text class="lbl" x="286.0" y="263.0" text-anchor="end">מחזיר אובייקט חדש</text>
<polyline id="edge-3" class="edge" points="272.0,317.0 272.0,357.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="113.2,380.0 16.0,380.0 16.0,42.0 163.7,42.0" marker-end="url(#arr)"/>
<text class="small" x="89.9" y="30.0" text-anchor="middle">הסטייט מתעדכן</text>
<g id="el-cur">
<rect class="n-code-bg shp" x="163.7" y="23.0" width="216.5" height="38.0" rx="7"/>
<text class="code dyn-cur-0" x="272.0" y="50.0" text-anchor="middle">state = { count: 0 }</text>
<text class="code dyn-cur-1" x="272.0" y="50.0" text-anchor="middle">state = { count: 1 }</text>
</g>
<g id="el-act">
<rect class="n-code-bg shp" x="114.1" y="101.0" width="315.8" height="38.0" rx="7"/>
<text class="code" x="272.0" y="128.0" text-anchor="middle">dispatch({ type: "increment" })</text>
</g>
<g id="el-sw">
<rect class="n-code-bg shp" x="96.0" y="179.0" width="352.0" height="60.0" rx="7"/>
<text class="code" x="272.0" y="206.0" text-anchor="middle">case "increment":</text>
<text class="code" x="272.0" y="228.0" text-anchor="middle">  return { count: state.count + 1 }</text>
</g>
<g id="el-nxt">
<rect class="n-code-bg shp" x="199.8" y="279.0" width="144.3" height="38.0" rx="7"/>
<text class="code" x="272.0" y="306.0" text-anchor="middle">{ count: 1 }</text>
</g>
<g id="el-rr">
<rect class="n-box shp" x="113.2" y="357.0" width="317.5" height="46.0" rx="8"/>
<text class="t" x="272.0" y="385.0" text-anchor="middle">ריאקט מרנדר מחדש את הקומפוננטה</text>
</g>
</svg>
