<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 486 374" width="486" role="img" aria-label="הרצת סקריפט Batch שורה אחר שורה: set שומר ערך במשתנה, ו-echo מרחיבה את %message% לערך ומדפיסה אותו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-l1{0.00%{stroke:var(--pink);stroke-width:2.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}24.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-l1 .shp{animation-name:k-l1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-var{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-var .shp{animation-name:k-var;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-l2{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-l2 .shp{animation-name:k-l2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.07%{stroke-width:1.6;}20.24%{stroke:var(--pink);stroke-width:2.4;}40.48%{stroke:var(--pink);stroke-width:2.4;}44.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.31%{stroke-width:1.6;}40.48%{stroke:var(--pink);stroke-width:2.4;}60.71%{stroke:var(--pink);stroke-width:2.4;}64.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}56.55%{stroke-width:1.6;}60.71%{stroke:var(--pink);stroke-width:2.4;}80.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-var-0{opacity:0;}
@keyframes k-dyn-var-0{0.00%{opacity:1;}20.24%{opacity:1;}24.40%{opacity:0;}100.00%{opacity:0;}}
.dyn-var-0{animation-name:k-dyn-var-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-var-1{opacity:1;}
@keyframes k-dyn-var-1{0.00%{opacity:0;}16.07%{opacity:0;}20.24%{opacity:1;}80.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-var-1{animation-name:k-dyn-var-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-0{opacity:0;}
@keyframes k-dyn-out-0{0.00%{opacity:1;}60.71%{opacity:1;}64.88%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-0{animation-name:k-dyn-out-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-1{opacity:1;}
@keyframes k-dyn-out-1{0.00%{opacity:0;}56.55%{opacity:0;}60.71%{opacity:1;}80.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-out-1{animation-name:k-dyn-out-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="243.0,54.0 243.0,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="257.0" y="78.0" text-anchor="end">שומר את הערך</text>
<polyline id="edge-1" class="edge" points="243.0,138.0 243.0,178.0" marker-end="url(#arr)"/>
<text class="lbl" x="257.0" y="162.0" text-anchor="end">%message% מוחלף בערך</text>
<polyline id="edge-2" class="edge" points="243.0,216.0 243.0,256.0" marker-end="url(#arr)"/>
<text class="lbl" x="257.0" y="240.0" text-anchor="end">מדפיס למסך</text>
<g id="el-l1">
<rect class="n-code-bg shp" x="121.2" y="16.0" width="243.6" height="38.0" rx="7"/>
<text class="code" x="243.0" y="43.0" text-anchor="middle">set message=Hello World</text>
</g>
<g id="el-var">
<rect class="n-box shp" x="131.4" y="94.0" width="223.2" height="44.0" rx="8"/>
<text class="t-b dyn-var-0" x="243.0" y="121.0" text-anchor="middle" style="direction:ltr">message = ?</text>
<text class="t-b dyn-var-1" x="243.0" y="121.0" text-anchor="middle" style="direction:ltr">message = Hello World</text>
</g>
<g id="el-l2">
<rect class="n-code-bg shp" x="161.8" y="178.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="243.0" y="205.0" text-anchor="middle">echo %message%</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="152.0" y="256.0" width="182.0" height="44.0" rx="8"/>
<text class="t-b dyn-out-0" x="243.0" y="283.0" text-anchor="middle">(אין פלט עדיין)</text>
<text class="t-b dyn-out-1" x="243.0" y="283.0" text-anchor="middle" style="direction:ltr">Hello World</text>
</g>
<g id="el-note">
<text class="small" x="243.0" y="353.0" text-anchor="middle">ה-Shell מריץ שורה אחר שורה, ומחליף את %message% בערך שנשמר במשתנה</text>
</g>
</svg>
