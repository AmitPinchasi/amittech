@keyframes k-err{0.00%{stroke-width:1.5;}75.99%{stroke-width:1.5;}78.29%{stroke:var(--pink);stroke-width:2.5;}89.47%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
