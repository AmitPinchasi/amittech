@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.88%{stroke-width:1.6;}11.18%{stroke:var(--pink);stroke-width:2.4;}22.37%{stroke:var(--pink);stroke-width:2.4;}24.67%{stroke-width:1.6;}53.62%{stroke-width:1.6;}55.92%{stroke:var(--pink);stroke-width:2.4;}67.11%{stroke:var(--pink);stroke-width:2.4;}69.41%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
