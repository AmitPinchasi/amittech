#el-check .shp{animation-name:k-check;animation-duration:15.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ok{0.00%{stroke-width:1.5;}31.25%{stroke-width:1.5;}33.55%{stroke:var(--pink);stroke-width:2.5;}44.74%{stroke:var(--pink);stroke-width:2.5;}47.04%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
