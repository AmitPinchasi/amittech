@keyframes k-edge-2{0.00%{stroke-width:1.6;}31.25%{stroke-width:1.6;}33.55%{stroke:var(--pink);stroke-width:2.4;}44.74%{stroke:var(--pink);stroke-width:2.4;}47.04%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
