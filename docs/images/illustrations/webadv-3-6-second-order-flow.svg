<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 464" width="480" role="img" aria-label="חולשת סדר שני: קלט זדוני נשמר בבטחה בשלב אחד ומופעל בשאילתה לא בטוחה בשלב מאוחר יותר">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="239.9,54.0 239.9,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="239.9,140.0 239.9,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="239.9,226.0 239.9,266.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="239.9,304.0 239.9,344.0" marker-end="url(#arr)"/>
<g id="el-inj">
<rect class="n-code-bg shp" x="136.1" y="16.0" width="207.5" height="38.0" rx="7"/>
<text class="code" x="239.9" y="43.0" text-anchor="middle">username = admin'--</text>
</g>
<g id="el-stored">
<rect class="n-box shp" x="63.0" y="94.0" width="353.8" height="46.0" rx="8"/>
<text class="t" x="239.9" y="122.0" text-anchor="middle">שלב 1: נשמר בבטחה עם שאילתה פרמטרית</text>
</g>
<g id="el-read">
<rect class="n-box shp" x="63.0" y="180.0" width="353.8" height="46.0" rx="8"/>
<text class="t" x="239.9" y="208.0" text-anchor="middle">שלב 2: השם נקרא מהמסד ומשמש בשאילתה</text>
</g>
<g id="el-build">
<rect class="n-code-bg shp" x="68.4" y="266.0" width="342.9" height="38.0" rx="7"/>
<text class="code" x="239.9" y="293.0" text-anchor="middle">f"UPDATE ... WHERE u='{username}'"</text>
</g>
<g id="el-exec">
<rect class="n-box shp" x="40.5" y="344.0" width="398.8" height="46.0" rx="8"/>
<text class="t" x="239.9" y="372.0" text-anchor="middle">ההערה חותכת את התנאי וסיסמת admin מתחלפת</text>
</g>
<g id="el-note">
<text class="small" x="239.9" y="443.0" text-anchor="middle">הלקח: גם נתון מהמסד אינו מהימן - להשתמש בשאילתות פרמטריות תמיד</text>
</g>
</svg>
