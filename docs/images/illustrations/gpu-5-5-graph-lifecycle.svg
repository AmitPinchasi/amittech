<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 582 306" width="582" role="img" aria-label="מחזור החיים של גרף CUDA: התיאור וה-instantiation היקר נעשים פעם אחת, וה-replay חוזר בזול שוב ושוב">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-def{0.00%{stroke:var(--pink);stroke-width:2.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}17.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-def .shp{animation-name:k-def;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-inst{0.00%{stroke-width:1.5;}11.44%{stroke-width:1.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}31.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inst .shp{animation-name:k-inst;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-replay{0.00%{stroke-width:1.5;}25.85%{stroke-width:1.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}86.44%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-replay .shp{animation-name:k-replay;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.44%{stroke-width:1.6;}14.41%{stroke:var(--pink);stroke-width:2.4;}28.81%{stroke:var(--pink);stroke-width:2.4;}31.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.85%{stroke-width:1.6;}28.81%{stroke:var(--pink);stroke-width:2.4;}43.22%{stroke:var(--pink);stroke-width:2.4;}46.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-replay-0{opacity:0;}
@keyframes k-dyn-replay-0{0.00%{opacity:1;}43.22%{opacity:1;}46.19%{opacity:0;}100.00%{opacity:0;}}
.dyn-replay-0{animation-name:k-dyn-replay-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-replay-1{opacity:0;}
@keyframes k-dyn-replay-1{0.00%{opacity:0;}40.25%{opacity:0;}43.22%{opacity:1;}57.63%{opacity:1;}60.59%{opacity:0;}100.00%{opacity:0;}}
.dyn-replay-1{animation-name:k-dyn-replay-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-replay-2{opacity:0;}
@keyframes k-dyn-replay-2{0.00%{opacity:0;}54.66%{opacity:0;}57.63%{opacity:1;}72.03%{opacity:1;}75.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-replay-2{animation-name:k-dyn-replay-2;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-replay-3{opacity:1;}
@keyframes k-dyn-replay-3{0.00%{opacity:0;}69.07%{opacity:0;}72.03%{opacity:1;}86.44%{opacity:1;}100.00%{opacity:1;}}
.dyn-replay-3{animation-name:k-dyn-replay-3;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="291.2,62.0 291.2,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="291.2,148.0 291.2,188.0" marker-end="url(#arr)"/>
<g id="el-def">
<rect class="n-box shp" x="178.5" y="16.0" width="225.4" height="46.0" rx="8"/>
<text class="t" x="291.2" y="44.0" text-anchor="middle">תיאור ה-DAG (פעם אחת)</text>
</g>
<g id="el-inst">
<rect class="n-box shp" x="124.7" y="102.0" width="333.0" height="46.0" rx="8"/>
<text class="t" x="291.2" y="130.0" text-anchor="middle">הכנה יקרה - instantiation (פעם אחת)</text>
</g>
<g id="el-replay">
<rect class="n-box shp" x="171.4" y="188.0" width="239.7" height="44.0" rx="8"/>
<text class="t-b dyn-replay-0" x="291.2" y="215.0" text-anchor="middle">הרצה זולה חוזרת 1</text>
<text class="t-b dyn-replay-1" x="291.2" y="215.0" text-anchor="middle">הרצה זולה חוזרת 2</text>
<text class="t-b dyn-replay-2" x="291.2" y="215.0" text-anchor="middle">הרצה זולה חוזרת 3</text>
<text class="t-b dyn-replay-3" x="291.2" y="215.0" text-anchor="middle">הרצה זולה חוזרת 1000</text>
</g>
<g id="el-note">
<text class="small" x="291.2" y="285.0" text-anchor="middle">העבודה היקרה נעשית פעם אחת; ה-replay הוא קריאת host בודדת שחוזרת בזול שוב ושוב</text>
</g>
</svg>
