<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 294 390" width="294" role="img" aria-label="תבנית Builder: כל מתודה מחזירה את הבונה עצמו כדי לאפשר שרשור קריאות עד build">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="146.8,54.0 146.8,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="160.8" y="78.0" text-anchor="end">מחזיר self</text>
<polyline id="edge-1" class="edge" points="146.8,132.0 146.8,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="160.8" y="156.0" text-anchor="end">מחזיר self</text>
<polyline id="edge-2" class="edge" points="146.8,210.0 146.8,250.0" marker-end="url(#arr)"/>
<text class="lbl" x="160.8" y="234.0" text-anchor="end">מחזיר self</text>
<polyline id="edge-3" class="edge" points="146.8,288.0 146.8,328.0" marker-end="url(#arr)"/>
<text class="lbl" x="160.8" y="312.0" text-anchor="end">מחזיר dict</text>
<g id="el-b0">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="261.7" height="38.0" rx="7"/>
<text class="code" x="146.8" y="43.0" text-anchor="middle">TaskBuilder('Fix bug', 5)</text>
</g>
<g id="el-b1">
<rect class="n-code-bg shp" x="29.5" y="94.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="146.8" y="121.0" text-anchor="middle">.with_priority('high')</text>
</g>
<g id="el-b2">
<rect class="n-code-bg shp" x="43.1" y="172.0" width="207.5" height="38.0" rx="7"/>
<text class="code" x="146.8" y="199.0" text-anchor="middle">.with_due_date(...)</text>
</g>
<g id="el-b3">
<rect class="n-code-bg shp" x="92.7" y="250.0" width="108.2" height="38.0" rx="7"/>
<text class="code" x="146.8" y="277.0" text-anchor="middle">.build()</text>
</g>
<g id="el-obj">
<rect class="n-box shp" x="48.4" y="328.0" width="196.9" height="46.0" rx="8"/>
<text class="t" x="146.8" y="356.0" text-anchor="middle">אובייקט Task מוכן</text>
</g>
</svg>
