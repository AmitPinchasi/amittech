<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 506 370" width="506" role="img" aria-label="סדר הבעבוע של אירוע: ה-handler של האלמנט הפנימי רץ קודם, ואחריו ההורים כלפי מעלה עד document">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-click{0.00%{stroke:var(--pink);stroke-width:2.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}24.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-click .shp{animation-name:k-click;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-h1{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-h1 .shp{animation-name:k-h1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-h2{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-h2 .shp{animation-name:k-h2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-h3{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-h3 .shp{animation-name:k-h3;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.07%{stroke-width:1.6;}20.24%{stroke:var(--pink);stroke-width:2.4;}40.48%{stroke:var(--pink);stroke-width:2.4;}44.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.31%{stroke-width:1.6;}40.48%{stroke:var(--pink);stroke-width:2.4;}60.71%{stroke:var(--pink);stroke-width:2.4;}64.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}56.55%{stroke-width:1.6;}60.71%{stroke:var(--pink);stroke-width:2.4;}80.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="253.2,62.0 253.2,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="267.2" y="86.0" text-anchor="end">האירוע מופעל על היעד</text>
<polyline id="edge-1" class="edge" points="253.2,140.0 253.2,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="267.2" y="164.0" text-anchor="end">מבעבע להורה</text>
<polyline id="edge-2" class="edge" points="253.2,218.0 253.2,258.0" marker-end="url(#arr)"/>
<text class="lbl" x="267.2" y="242.0" text-anchor="end">מבעבע להורה של ההורה</text>
<g id="el-click">
<rect class="n-box shp" x="131.1" y="16.0" width="244.3" height="46.0" rx="8"/>
<text class="t" x="253.2" y="44.0" text-anchor="middle">לחיצה על הכפתור הפנימי</text>
</g>
<g id="el-h1">
<rect class="n-code-bg shp" x="131.4" y="102.0" width="243.6" height="38.0" rx="7"/>
<text class="code" x="253.2" y="129.0" text-anchor="middle">button: "child clicked"</text>
</g>
<g id="el-h2">
<rect class="n-code-bg shp" x="108.8" y="180.0" width="288.8" height="38.0" rx="7"/>
<text class="code" x="253.2" y="207.0" text-anchor="middle">div#parent: "parent clicked"</text>
</g>
<g id="el-h3">
<rect class="n-code-bg shp" x="63.7" y="258.0" width="379.0" height="38.0" rx="7"/>
<text class="code" x="253.2" y="285.0" text-anchor="middle">div#grandparent: "grandparent clicked"</text>
</g>
<g id="el-note">
<text class="small" x="253.2" y="349.0" text-anchor="middle">הבעבוע נמשך למעלה עד document, אלא אם עוצרים אותו עם stopPropagation</text>
</g>
</svg>
