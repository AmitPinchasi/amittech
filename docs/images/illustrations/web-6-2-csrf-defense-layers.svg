<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 451 508" width="451" role="img" aria-label="שכבות הגנה מצטברות מפני CSRF: הבקשה עוברת בדיקת CSRF Token, SameSite Cookie, Secure Cookie והגבלת CORS - כל שכבה חוסמת דרך תקיפה אחרת - עד שרק בקשה לגיטימית מגיעה לאפליקציה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="225.3,62.0 225.3,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="225.3,148.0 225.3,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="225.3,234.0 225.3,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="225.3,320.0 225.3,360.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="225.3,406.0 225.3,446.0" marker-end="url(#arr)"/>
<g id="el-incoming">
<rect class="n-box shp" x="120.3" y="16.0" width="210.0" height="46.0" rx="8"/>
<text class="t" x="225.3" y="44.0" text-anchor="middle">בקשה נכנסת מהדפדפן</text>
</g>
<g id="el-token">
<rect class="n-box shp" x="87.1" y="102.0" width="276.5" height="46.0" rx="8"/>
<text class="t" x="225.3" y="130.0" text-anchor="middle">בדיקת CSRF Token תואם לסשן</text>
</g>
<g id="el-samesite">
<rect class="n-box shp" x="32.6" y="188.0" width="385.4" height="46.0" rx="8"/>
<text class="t" x="225.3" y="216.0" text-anchor="middle">בדיקת SameSite - הבקשה מגיעה מהאתר עצמו</text>
</g>
<g id="el-secure">
<rect class="n-box shp" x="16.0" y="274.0" width="418.6" height="46.0" rx="8"/>
<text class="t" x="225.3" y="302.0" text-anchor="middle">בדיקת Secure Cookie - החיבור מאובטח ב-HTTPS</text>
</g>
<g id="el-cors">
<rect class="n-box shp" x="59.7" y="360.0" width="331.3" height="46.0" rx="8"/>
<text class="t" x="225.3" y="388.0" text-anchor="middle">בדיקת CORS - הדומיין המבקש מורשה</text>
</g>
<g id="el-app">
<rect class="n-box shp" x="100.8" y="446.0" width="249.0" height="46.0" rx="8"/>
<text class="t" x="225.3" y="474.0" text-anchor="middle">הבקשה מטופלת באפליקציה</text>
</g>
</svg>
