<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 508 294" width="508" role="img" aria-label="תרשים זרימה של לולאת do while: הגוף רץ פעם אחת לפני שהתנאי נבדק בכלל">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-init{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-init .shp{animation-name:k-init;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-body{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-body .shp{animation-name:k-body;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-end{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-end .shp{animation-name:k-end;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}40.91%{stroke:var(--pink);stroke-width:2.4;}44.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.93%{stroke-width:1.6;}40.91%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:1;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="208.8,54.0 208.8,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="208.8,154.0 208.8,194.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="128.8,236.0 16.0,236.0 16.0,124.0 96.0,124.0" marker-end="url(#arr)"/>
<text class="small" x="56.0" y="112.0" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="288.8,236.0 354.8,236.0" marker-end="url(#arr)"/>
<text class="lbl" x="321.8" y="224.0" text-anchor="middle">לא</text>
<g id="el-init">
<rect class="n-code-bg shp" x="141.1" y="16.0" width="135.3" height="38.0" rx="7"/>
<text class="code" x="208.8" y="43.0" text-anchor="middle">let y = 100</text>
</g>
<g id="el-body">
<rect class="n-code-bg shp" x="96.0" y="94.0" width="225.6" height="60.0" rx="7"/>
<text class="code" x="208.8" y="121.0" text-anchor="middle">console.log(y) // 100</text>
<text class="code" x="208.8" y="143.0" text-anchor="middle">y++ // y = 101</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="208.8,194.0 288.8,236.0 208.8,278.0 128.8,236.0"/>
<text class="code dyn-cond-0" x="208.8" y="241.0" text-anchor="middle">y &lt; 10</text>
<text class="code dyn-cond-1" x="208.8" y="241.0" text-anchor="middle">101 &lt; 10</text>
</g>
<g id="el-end">
<rect class="n-box shp" x="354.8" y="213.0" width="136.7" height="46.0" rx="8"/>
<text class="t" x="423.2" y="241.0" text-anchor="middle">סוף הלולאה</text>
</g>
</svg>
