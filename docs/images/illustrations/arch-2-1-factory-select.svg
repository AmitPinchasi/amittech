<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 242" width="360" role="img" aria-label="תבנית Factory: הפונקציה מחפשת את הערוץ במילון ומחזירה את המחלקה המתאימה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}24.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-reg{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-reg .shp{animation-name:k-reg;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-reg-1{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-reg-c1{animation-name:k-reg-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-result{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-result .shp{animation-name:k-result;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.07%{stroke-width:1.6;}20.24%{stroke:var(--pink);stroke-width:2.4;}40.48%{stroke:var(--pink);stroke-width:2.4;}44.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}56.55%{stroke-width:1.6;}60.71%{stroke:var(--pink);stroke-width:2.4;}80.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-result-0{opacity:0;}
@keyframes k-dyn-result-0{0.00%{opacity:1;}60.71%{opacity:1;}64.88%{opacity:0;}100.00%{opacity:0;}}
.dyn-result-0{animation-name:k-dyn-result-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-result-1{opacity:1;}
@keyframes k-dyn-result-1{0.00%{opacity:0;}56.55%{opacity:0;}60.71%{opacity:1;}80.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-result-1{animation-name:k-dyn-result-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="180.0,54.0 180.0,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="194.0" y="78.0" text-anchor="end">מחפש במילון</text>
<polyline id="edge-1" class="edge" points="180.0,140.0 180.0,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="194.0" y="164.0" text-anchor="end">מחזיר מופע</text>
<g id="el-call">
<rect class="n-code-bg shp" x="62.7" y="16.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="180.0" y="43.0" text-anchor="middle">create_notifier('sms')</text>
</g>
<g id="el-reg">
<rect id="el-reg-c0" class="n-cell shp" x="248.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="296.0" y="122.0" text-anchor="middle" style="direction:ltr">email</text>
<rect id="el-reg-c1" class="n-cell shp" x="132.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.0" y="122.0" text-anchor="middle" style="direction:ltr">sms</text>
<rect id="el-reg-c2" class="n-cell shp" x="16.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="64.0" y="122.0" text-anchor="middle" style="direction:ltr">push</text>
</g>
<g id="el-result">
<rect class="n-box shp" x="107.8" y="180.0" width="144.5" height="46.0" rx="8"/>
<text class="t dyn-result-0" x="180.0" y="208.0" text-anchor="middle">התוצאה</text>
<text class="t dyn-result-1" x="180.0" y="208.0" text-anchor="middle" style="direction:ltr">SMSNotifier</text>
</g>
</svg>
