.dyn-ret-0{animation-name:k-dyn-ret-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ret-1{opacity:1;}
@keyframes k-dyn-ret-1{0.00%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-ret-1{animation-name:k-dyn-ret-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ret-2{opacity:0;}
@keyframes k-dyn-ret-2{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-ret-2{animation-name:k-dyn-ret-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-err-0{opacity:0;}
@keyframes k-dyn-err-0{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-err-0{animation-name:k-dyn-err-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-err-1{opacity:1;}
@keyframes k-dyn-err-1{0.00%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-err-1{animation-name:k-dyn-err-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-err-2{opacity:0;}
@keyframes k-dyn-err-2{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-err-2{animation-name:k-dyn-err-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}26.03%{opacity:1;}30.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}21.23%{opacity:0;}26.03%{opacity:1;}52.05%{opacity:1;}56.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:1;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}47.26%{opacity:0;}52.05%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-0{opacity:0;}
@keyframes k-dyn-out-0{0.00%{opacity:1;}52.05%{opacity:1;}56.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-0{animation-name:k-dyn-out-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-1{opacity:0;}
@keyframes k-dyn-out-1{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-1{animation-name:k-dyn-out-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-2{opacity:1;}
@keyframes k-dyn-out-2{0.00%{opacity:0;}47.26%{opacity:0;}52.05%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-out-2{animation-name:k-dyn-out-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="84.2" y="16.0" width="352.0" height="38.0" rx="7"/>
<text class="code dyn-code-0" x="260.2" y="43.0" text-anchor="middle">FILE *f = fopen("nofile.txt", "r");</text>
<text class="code dyn-code-1" x="260.2" y="43.0" text-anchor="middle">if (f == NULL)</text>
<text class="code dyn-code-2" x="260.2" y="43.0" text-anchor="middle">perror("Error opening file");</text>
</g>
<g id="el-ret">
<rect class="n-box shp" x="202.9" y="94.0" width="114.6" height="44.0" rx="8"/>
<text class="t-b dyn-ret-0" x="260.2" y="121.0" text-anchor="middle" style="direction:ltr">f = ?</text>
<text class="t-b dyn-ret-1" x="260.2" y="121.0" text-anchor="middle" style="direction:ltr">f = NULL</text>
<text class="t-b dyn-ret-2" x="260.2" y="121.0" text-anchor="middle" style="direction:ltr">f = NULL</text>
</g>
<g id="el-err">
<rect class="n-box shp" x="201.6" y="178.0" width="117.1" height="44.0" rx="8"/>
<text class="t-b dyn-err-0" x="260.2" y="205.0" text-anchor="middle" style="direction:ltr">errno = 0</text>
<text class="t-b dyn-err-1" x="260.2" y="205.0" text-anchor="middle" style="direction:ltr">errno = 2</text>
<text class="t-b dyn-err-2" x="260.2" y="205.0" text-anchor="middle" style="direction:ltr">errno = 2</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="30.2" y="262.0" width="460.0" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="260.2" y="290.0" text-anchor="middle">הפתיחה נכשלת כי הקובץ אינו קיים</text>
<text class="t dyn-note-1" x="260.2" y="290.0" text-anchor="middle">בודקים קודם את ערך ההחזרה, ורק אז ניגשים ל-errno</text>
<text class="t dyn-note-2" x="260.2" y="290.0" text-anchor="middle">הפונקציה perror מתרגמת את הקוד להודעה קריאה</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="48.2" y="348.0" width="423.9" height="44.0" rx="8"/>
<text class="t-b dyn-out-0" x="260.2" y="375.0" text-anchor="middle">המסך ריק</text>
<text class="t-b dyn-out-1" x="260.2" y="375.0" text-anchor="middle">המסך ריק</text>
<text class="t-b dyn-out-2" x="260.2" y="375.0" text-anchor="middle" style="direction:ltr">Error opening file: No such file or directory</text>
</g>
<g id="el-cap">
<text class="small" x="260.2" y="445.0" text-anchor="middle">המשתנה errno אינו מתאפס לבד, ולכן אין להסתמך עליו אחרי קריאה שהצליחה</text>
</g>
</svg>
