<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 611 731" width="611" role="img" aria-label="פאקטה נבדקת מול חוקי שרשרת INPUT מלמעלה למטה, החוק הראשון שמתאים הוא זה שקובע: פאקטה לפורט 80 חולפת על פני חוקי החסימה ומתקבלת בזכות חוק ה-ACCEPT">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
