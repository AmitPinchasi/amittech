<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 361 746" width="361" role="img" aria-label="מבנה מסגרת המחסנית של פונקציה: הפרמטרים נמצאים מעל המצביע bp, המשתנים הלוקליים מתחתיו, ו-sp מסמן את סוף המסגרת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-p1{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-p1 .shp{animation-name:k-p1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-p2{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-p2 .shp{animation-name:k-p2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-retaddr{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-retaddr .shp{animation-name:k-retaddr;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-oldbp{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-oldbp .shp{animation-name:k-oldbp;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-code{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-code .shp{animation-name:k-code;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-v1{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-v1 .shp{animation-name:k-v1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-v2{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-v2 .shp{animation-name:k-v2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="117.3" y="16.0" width="126.3" height="82.0" rx="7"/>
<text class="code" x="180.5" y="43.0" text-anchor="middle">push bp</text>
<text class="code" x="180.5" y="65.0" text-anchor="middle">mov bp, sp</text>
<text class="code" x="180.5" y="87.0" text-anchor="middle">sub sp, 4</text>
</g>
<g id="el-top">
<text class="small" x="180.5" y="151.0" text-anchor="middle">כתובות גבוהות</text>
</g>
<g id="el-p2">
<rect class="n-box shp" x="86.2" y="196.0" width="188.5" height="46.0" rx="8"/>
<text class="t" x="180.5" y="224.0" text-anchor="middle">פרמטר שני - [bp+6]</text>
</g>
<g id="el-p1">
<rect class="n-box shp" x="76.5" y="282.0" width="208.0" height="46.0" rx="8"/>
<text class="t" x="180.5" y="310.0" text-anchor="middle">פרמטר ראשון - [bp+4]</text>
</g>
<g id="el-retaddr">
<rect class="n-box shp" x="29.3" y="368.0" width="302.4" height="46.0" rx="8"/>
<text class="t" x="180.5" y="396.0" text-anchor="middle">כתובת החזרה שדחפה הפקודה call</text>
</g>
<g id="el-oldbp">
<rect class="n-box shp" x="33.3" y="454.0" width="294.3" height="46.0" rx="8"/>
<text class="t" x="180.5" y="482.0" text-anchor="middle">הערך הישן של bp - כאן מצביע bp</text>
</g>
<g id="el-v1">
<rect class="n-box shp" x="76.5" y="540.0" width="208.0" height="46.0" rx="8"/>
<text class="t" x="180.5" y="568.0" text-anchor="middle">משתנה לוקלי - [bp-2]</text>
</g>
<g id="el-v2">
<rect class="n-box shp" x="16.0" y="626.0" width="328.9" height="46.0" rx="8"/>
<text class="t" x="180.5" y="654.0" text-anchor="middle">משתנה לוקלי - [bp-4] - כאן מצביע sp</text>
</g>
<g id="el-bottom">
<text class="small" x="180.5" y="725.0" text-anchor="middle">כתובות נמוכות</text>
</g>
</svg>
