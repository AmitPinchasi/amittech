<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 372" width="728" role="img" aria-label="כיצד bash מריץ פקודה: פקודה מובנית רצה בתוך bash, פקודה חיצונית נמצאת דרך PATH ומורצת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cmd{0.00%{stroke:var(--pink);stroke-width:2.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}27.78%{stroke-width:1.5;}35.19%{stroke-width:1.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}65.56%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmd .shp{animation-name:k-cmd;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-q{0.00%{stroke-width:1.5;}10.00%{stroke-width:1.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}27.78%{stroke-width:1.5;}47.78%{stroke-width:1.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}65.56%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-q .shp{animation-name:k-q;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-builtin{0.00%{stroke-width:1.5;}22.59%{stroke-width:1.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}40.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-builtin .shp{animation-name:k-builtin;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-search{0.00%{stroke-width:1.5;}60.37%{stroke-width:1.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}78.15%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-search .shp{animation-name:k-search;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-exec{0.00%{stroke-width:1.5;}72.96%{stroke-width:1.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}88.15%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-exec .shp{animation-name:k-exec;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.00%{stroke-width:1.6;}12.59%{stroke:var(--pink);stroke-width:2.4;}25.19%{stroke:var(--pink);stroke-width:2.4;}27.78%{stroke-width:1.6;}47.78%{stroke-width:1.6;}50.37%{stroke:var(--pink);stroke-width:2.4;}62.96%{stroke:var(--pink);stroke-width:2.4;}65.56%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.59%{stroke-width:1.6;}25.19%{stroke:var(--pink);stroke-width:2.4;}37.78%{stroke:var(--pink);stroke-width:2.4;}40.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}60.37%{stroke-width:1.6;}62.96%{stroke:var(--pink);stroke-width:2.4;}75.56%{stroke:var(--pink);stroke-width:2.4;}78.15%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}72.96%{stroke-width:1.6;}75.56%{stroke:var(--pink);stroke-width:2.4;}88.15%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmd-0{opacity:0;}
@keyframes k-dyn-cmd-0{0.00%{opacity:1;}37.78%{opacity:1;}40.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-cmd-0{animation-name:k-dyn-cmd-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmd-1{opacity:1;}
@keyframes k-dyn-cmd-1{0.00%{opacity:0;}35.19%{opacity:0;}37.78%{opacity:1;}88.15%{opacity:1;}100.00%{opacity:1;}}
.dyn-cmd-1{animation-name:k-dyn-cmd-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="340.4,54.0 340.4,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="470.5,159.0 536.5,159.0" marker-end="url(#arr)"/>
<text class="lbl" x="503.5" y="147.0" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="210.3,159.0 122.3,159.0 122.3,224.1" marker-end="url(#arr)"/>
<text class="lbl" x="166.3" y="147.0" text-anchor="middle">לא</text>
<polyline id="edge-3" class="edge" points="122.3,270.1 122.3,333.1 235.4,333.1" marker-end="url(#arr)"/>
<g id="el-cmd">
<rect class="n-code-bg shp" x="292.4" y="16.0" width="96.0" height="38.0" rx="7"/>
<text class="code dyn-cmd-0" x="340.4" y="43.0" text-anchor="middle">cd</text>
<text class="code dyn-cmd-1" x="340.4" y="43.0" text-anchor="middle">ls -la</text>
</g>
<g id="el-q">
<polygon class="n-dia shp" points="340.4,94.0 470.5,159.0 340.4,224.1 210.3,159.0"/>
<text class="t" x="340.4" y="164.0" text-anchor="middle">פקודה מובנית?</text>
</g>
<g id="el-builtin">
<rect class="n-box shp" x="536.5" y="136.0" width="175.4" height="46.0" rx="8"/>
<text class="t" x="624.2" y="164.0" text-anchor="middle">מורצת בתוך bash</text>
</g>
<g id="el-search">
<rect class="n-box shp" x="16.0" y="224.1" width="212.7" height="46.0" rx="8"/>
<text class="t" x="122.3" y="252.1" text-anchor="middle">חיפוש בתיקיות PATH</text>
</g>
<g id="el-exec">
<rect class="n-box shp" x="235.4" y="310.1" width="210.0" height="46.0" rx="8"/>
<text class="t" x="340.4" y="338.1" text-anchor="middle">הרצת התוכנה שנמצאה</text>
</g>
</svg>
