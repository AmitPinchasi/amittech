<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 333 506" width="333" role="img" aria-label="לחיצת יד TLS: הלקוח והשרת מחליפים hello ותעודה, מאמתים מול ה-CA ובונים מפתח סשן משותף">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-hello{0.00%{stroke:var(--pink);stroke-width:2.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}17.41%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-hello .shp{animation-name:k-hello;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-srvhello{0.00%{stroke-width:1.5;}11.16%{stroke-width:1.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}31.70%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-srvhello .shp{animation-name:k-srvhello;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-verify{0.00%{stroke-width:1.5;}25.45%{stroke-width:1.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}45.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-verify .shp{animation-name:k-verify;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-keyexch{0.00%{stroke-width:1.5;}39.73%{stroke-width:1.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}60.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-keyexch .shp{animation-name:k-keyexch;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-key{0.00%{stroke-width:1.5;}54.02%{stroke-width:1.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}74.55%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-key .shp{animation-name:k-key;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-done{0.00%{stroke-width:1.5;}68.30%{stroke-width:1.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}85.71%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-done .shp{animation-name:k-done;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.16%{stroke-width:1.6;}14.29%{stroke:var(--pink);stroke-width:2.4;}28.57%{stroke:var(--pink);stroke-width:2.4;}31.70%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.45%{stroke-width:1.6;}28.57%{stroke:var(--pink);stroke-width:2.4;}42.86%{stroke:var(--pink);stroke-width:2.4;}45.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}39.73%{stroke-width:1.6;}42.86%{stroke:var(--pink);stroke-width:2.4;}57.14%{stroke:var(--pink);stroke-width:2.4;}60.27%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}54.02%{stroke-width:1.6;}57.14%{stroke:var(--pink);stroke-width:2.4;}71.43%{stroke:var(--pink);stroke-width:2.4;}74.55%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}68.30%{stroke-width:1.6;}71.43%{stroke:var(--pink);stroke-width:2.4;}85.71%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-key-0{opacity:0;}
@keyframes k-dyn-key-0{0.00%{opacity:1;}57.14%{opacity:1;}60.27%{opacity:0;}100.00%{opacity:0;}}
.dyn-key-0{animation-name:k-dyn-key-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-key-1{opacity:1;}
@keyframes k-dyn-key-1{0.00%{opacity:0;}54.02%{opacity:0;}57.14%{opacity:1;}85.71%{opacity:1;}100.00%{opacity:1;}}
.dyn-key-1{animation-name:k-dyn-key-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="166.4,62.0 166.4,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="166.4,148.0 166.4,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="166.4,234.0 166.4,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="166.4,320.0 166.4,360.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="166.4,404.0 166.4,444.0" marker-end="url(#arr)"/>
<g id="el-hello">
<rect class="n-box shp" x="93.6" y="16.0" width="145.5" height="46.0" rx="8"/>
<text class="t" x="166.4" y="44.0" text-anchor="middle" style="direction:ltr">Client Hello</text>
</g>
<g id="el-srvhello">
<rect class="n-box shp" x="38.3" y="102.0" width="256.0" height="46.0" rx="8"/>
<text class="t" x="166.4" y="130.0" text-anchor="middle" style="direction:ltr">Server Hello + Certificate</text>
</g>
<g id="el-verify">
<rect class="n-box shp" x="16.0" y="188.0" width="300.7" height="46.0" rx="8"/>
<text class="t" x="166.4" y="216.0" text-anchor="middle">הלקוח מאמת את התעודה מול ה-CA</text>
</g>
<g id="el-keyexch">
<rect class="n-box shp" x="93.6" y="274.0" width="145.5" height="46.0" rx="8"/>
<text class="t" x="166.4" y="302.0" text-anchor="middle" style="direction:ltr">Key Exchange</text>
</g>
<g id="el-key">
<rect class="n-box shp" x="47.9" y="360.0" width="236.8" height="44.0" rx="8"/>
<text class="t-b dyn-key-0" x="166.4" y="387.0" text-anchor="middle">אין עדיין מפתח משותף</text>
<text class="t-b dyn-key-1" x="166.4" y="387.0" text-anchor="middle">מפתח סשן משותף נוצר</text>
</g>
<g id="el-done">
<rect class="n-box shp" x="48.8" y="444.0" width="235.2" height="46.0" rx="8"/>
<text class="t" x="166.4" y="472.0" text-anchor="middle">תקשורת מוצפנת (HTTPS)</text>
</g>
</svg>
