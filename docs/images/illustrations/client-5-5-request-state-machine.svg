@keyframes k-error{0.00%{stroke-width:1.5;}71.24%{stroke-width:1.5;}73.12%{stroke:var(--pink);stroke-width:2.5;}82.26%{stroke:var(--pink);stroke-width:2.5;}84.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
