@keyframes k-success{0.00%{stroke-width:1.5;}25.54%{stroke-width:1.5;}27.42%{stroke:var(--pink);stroke-width:2.5;}36.56%{stroke:var(--pink);stroke-width:2.5;}38.44%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
