<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 699 365" width="699" role="img" aria-label="ולידציה בזמן אמת: על כל הקשה נבדק אורך הערך, והשדה מסומן כשגוי עד שהקלט נעשה תקין">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-typing{0.00%{stroke:var(--pink);stroke-width:2.5;}10.00%{stroke:var(--pink);stroke-width:2.5;}12.19%{stroke-width:1.5;}27.81%{stroke-width:1.5;}30.00%{stroke:var(--pink);stroke-width:2.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}42.19%{stroke-width:1.5;}57.81%{stroke-width:1.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}70.00%{stroke:var(--pink);stroke-width:2.5;}72.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-typing .shp{animation-name:k-typing;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-check{0.00%{stroke-width:1.5;}7.81%{stroke-width:1.5;}10.00%{stroke:var(--pink);stroke-width:2.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}22.19%{stroke-width:1.5;}37.81%{stroke-width:1.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}52.19%{stroke-width:1.5;}67.81%{stroke-width:1.5;}70.00%{stroke:var(--pink);stroke-width:2.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}82.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-check .shp{animation-name:k-check;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-invalid{0.00%{stroke-width:1.5;}17.81%{stroke-width:1.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}30.00%{stroke:var(--pink);stroke-width:2.5;}32.19%{stroke-width:1.5;}47.81%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}62.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-invalid .shp{animation-name:k-invalid;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-valid{0.00%{stroke-width:1.5;}77.81%{stroke-width:1.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}90.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-valid .shp{animation-name:k-valid;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}7.81%{stroke-width:1.6;}10.00%{stroke:var(--pink);stroke-width:2.4;}20.00%{stroke:var(--pink);stroke-width:2.4;}22.19%{stroke-width:1.6;}37.81%{stroke-width:1.6;}40.00%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}52.19%{stroke-width:1.6;}67.81%{stroke-width:1.6;}70.00%{stroke:var(--pink);stroke-width:2.4;}80.00%{stroke:var(--pink);stroke-width:2.4;}82.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}17.81%{stroke-width:1.6;}20.00%{stroke:var(--pink);stroke-width:2.4;}30.00%{stroke:var(--pink);stroke-width:2.4;}32.19%{stroke-width:1.6;}47.81%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}60.00%{stroke:var(--pink);stroke-width:2.4;}62.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}77.81%{stroke-width:1.6;}80.00%{stroke:var(--pink);stroke-width:2.4;}90.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
