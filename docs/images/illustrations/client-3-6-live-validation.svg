.dyn-check-1{opacity:0;}
@keyframes k-dyn-check-1{0.00%{opacity:0;}7.81%{opacity:0;}10.00%{opacity:1;}40.00%{opacity:1;}42.19%{opacity:0;}100.00%{opacity:0;}}
.dyn-check-1{animation-name:k-dyn-check-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-check-2{opacity:0;}
@keyframes k-dyn-check-2{0.00%{opacity:0;}37.81%{opacity:0;}40.00%{opacity:1;}70.00%{opacity:1;}72.19%{opacity:0;}100.00%{opacity:0;}}
.dyn-check-2{animation-name:k-dyn-check-2;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-check-3{opacity:1;}
@keyframes k-dyn-check-3{0.00%{opacity:0;}67.81%{opacity:0;}70.00%{opacity:1;}90.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-check-3{animation-name:k-dyn-check-3;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="184.8,54.0 184.8,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="198.8" y="78.0" text-anchor="end">אירוע input על כל הקשה</text>
<polyline id="edge-1" class="edge" points="184.8,262.8 184.8,302.8" marker-end="url(#arr)"/>
