.dyn-typing-1{opacity:0;}
@keyframes k-dyn-typing-1{0.00%{opacity:0;}27.81%{opacity:0;}30.00%{opacity:1;}60.00%{opacity:1;}62.19%{opacity:0;}100.00%{opacity:0;}}
.dyn-typing-1{animation-name:k-dyn-typing-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-typing-2{opacity:1;}
@keyframes k-dyn-typing-2{0.00%{opacity:0;}57.81%{opacity:0;}60.00%{opacity:1;}90.00%{opacity:1;}100.00%{opacity:1;}}
