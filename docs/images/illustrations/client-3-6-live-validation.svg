<g id="el-typing">
<rect class="n-code-bg shp" x="108.1" y="16.0" width="153.4" height="38.0" rx="7"/>
<text class="code dyn-typing-0" x="184.8" y="43.0" text-anchor="middle">value = "D"</text>
<text class="code dyn-typing-1" x="184.8" y="43.0" text-anchor="middle">value = "Da"</text>
