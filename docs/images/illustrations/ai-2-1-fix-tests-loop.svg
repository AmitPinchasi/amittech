<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 588 374" width="588" role="img" aria-label="הagent מריץ בדיקות, רואה שלוש נכשלות, מתקן, ומריץ שוב עד שכולן עוברות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-run{0.00%{stroke:var(--pink);stroke-width:2.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}13.54%{stroke-width:1.5;}42.01%{stroke-width:1.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}57.99%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-run .shp{animation-name:k-run;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-result{0.00%{stroke-width:1.5;}8.68%{stroke-width:1.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}24.65%{stroke-width:1.5;}53.13%{stroke-width:1.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}69.10%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-result .shp{animation-name:k-result;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pass{0.00%{stroke-width:1.5;}19.79%{stroke-width:1.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}35.76%{stroke-width:1.5;}64.24%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}80.21%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pass .shp{animation-name:k-pass;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fix{0.00%{stroke-width:1.5;}30.90%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}46.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fix .shp{animation-name:k-fix;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-done{0.00%{stroke-width:1.5;}75.35%{stroke-width:1.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}88.89%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-done .shp{animation-name:k-done;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke:var(--pink);stroke-width:2.4;}11.11%{stroke:var(--pink);stroke-width:2.4;}13.54%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}19.79%{stroke-width:1.6;}22.22%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}35.76%{stroke-width:1.6;}64.24%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}77.78%{stroke:var(--pink);stroke-width:2.4;}80.21%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.90%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}44.44%{stroke:var(--pink);stroke-width:2.4;}46.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}42.01%{stroke-width:1.6;}44.44%{stroke:var(--pink);stroke-width:2.4;}55.56%{stroke:var(--pink);stroke-width:2.4;}57.99%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}75.35%{stroke-width:1.6;}77.78%{stroke:var(--pink);stroke-width:2.4;}88.89%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-result-0{opacity:0;}
@keyframes k-dyn-result-0{0.00%{opacity:1;}55.56%{opacity:1;}57.99%{opacity:0;}100.00%{opacity:0;}}
.dyn-result-0{animation-name:k-dyn-result-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-result-1{opacity:1;}
@keyframes k-dyn-result-1{0.00%{opacity:0;}53.13%{opacity:0;}55.56%{opacity:1;}88.89%{opacity:1;}100.00%{opacity:1;}}
.dyn-result-1{animation-name:k-dyn-result-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="196.1,62.0 196.1,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="196.1,148.0 196.1,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="276.1,230.0 342.1,230.0" marker-end="url(#arr)"/>
<text class="lbl" x="309.1" y="218.0" text-anchor="middle">לא</text>
<polyline id="edge-3" class="edge" points="342.1,230.0 16.0,230.0 16.0,39.0 96.0,39.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="196.1,272.0 196.1,312.0" marker-end="url(#arr)"/>
<text class="lbl" x="210.1" y="296.0" text-anchor="end">כן</text>
<g id="el-run">
<rect class="n-box shp" x="96.0" y="16.0" width="200.2" height="46.0" rx="8"/>
<text class="t" x="196.1" y="44.0" text-anchor="middle">מריצים את הבדיקות</text>
</g>
<g id="el-result">
<rect class="n-box shp" x="139.0" y="102.0" width="114.2" height="46.0" rx="8"/>
<text class="t dyn-result-0" x="196.1" y="130.0" text-anchor="middle">נכשלו: 3</text>
<text class="t dyn-result-1" x="196.1" y="130.0" text-anchor="middle">נכשלו: 0</text>
</g>
<g id="el-pass">
<polygon class="n-dia shp" points="196.1,188.0 276.1,230.0 196.1,272.0 116.1,230.0"/>
<text class="t" x="196.1" y="235.0" text-anchor="middle">עוברות?</text>
</g>
<g id="el-fix">
<rect class="n-box shp" x="342.1" y="207.0" width="229.5" height="46.0" rx="8"/>
<text class="t" x="456.9" y="235.0" text-anchor="middle">קוראים שגיאה ומתקנים</text>
</g>
<g id="el-done">
<rect class="n-box shp" x="109.9" y="312.0" width="172.4" height="46.0" rx="8"/>
<text class="t" x="196.1" y="340.0" text-anchor="middle">סיום - הכל עובר</text>
</g>
</svg>
