<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 683 503" width="683" role="img" aria-label="ניתוב לפי Virtual Host: Apache קורא את כותרת ה-Host בבקשה ולפי הדומיין מפנה לתיקיית האתר הנכונה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-apache{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-apache .shp{animation-name:k-apache;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-siteA{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-siteA .shp{animation-name:k-siteA;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-siteB{0.00%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-siteB .shp{animation-name:k-siteB;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}40.73%{stroke-width:1.6;}43.55%{stroke:var(--pink);stroke-width:2.4;}58.06%{stroke:var(--pink);stroke-width:2.4;}60.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="214.6,76.0 214.6,116.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="214.6,162.0 214.6,202.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="214.6,400.6 214.6,440.6" marker-end="url(#arr)"/>
<text class="lbl" x="228.6" y="424.6" text-anchor="end">התאמה</text>
<polyline id="edge-3" class="edge" points="413.2,301.3 479.2,301.3" marker-end="url(#arr)"/>
<text class="lbl" x="446.2" y="289.3" text-anchor="middle">דומיין אחר</text>
<g id="el-req">
<rect class="n-code-bg shp" x="115.4" y="16.0" width="198.5" height="60.0" rx="7"/>
<text class="code" x="214.6" y="43.0" text-anchor="middle">GET / HTTP/1.1</text>
<text class="code" x="214.6" y="65.0" text-anchor="middle">Host: mysite.local</text>
</g>
<g id="el-apache">
<rect class="n-box shp" x="77.0" y="116.0" width="275.2" height="46.0" rx="8"/>
<text class="t" x="214.6" y="144.0" text-anchor="middle">Apache קורא את כותרת ה-Host</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="214.6,202.0 413.2,301.3 214.6,400.6 16.0,301.3"/>
<text class="code" x="214.6" y="306.3" text-anchor="middle">Host == mysite.local</text>
</g>
<g id="el-siteA">
<rect class="n-box shp" x="133.1" y="440.6" width="162.9" height="46.0" rx="8"/>
<text class="t" x="214.6" y="468.6" text-anchor="middle" style="direction:ltr">/var/www/mysite</text>
</g>
<g id="el-siteB">
<rect class="n-box shp" x="479.2" y="278.3" width="188.1" height="46.0" rx="8"/>
<text class="t" x="573.3" y="306.3" text-anchor="middle" style="direction:ltr">/var/www/othersite</text>
</g>
</svg>
