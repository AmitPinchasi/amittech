@keyframes k-edge-4{0.00%{stroke-width:1.6;}43.82%{stroke-width:1.6;}45.70%{stroke:var(--pink);stroke-width:2.4;}54.84%{stroke:var(--pink);stroke-width:2.4;}56.72%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}80.38%{stroke-width:1.6;}82.26%{stroke:var(--pink);stroke-width:2.4;}91.40%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
