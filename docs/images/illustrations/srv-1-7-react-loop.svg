.dyn-act-0{opacity:0;}
@keyframes k-dyn-act-0{0.00%{opacity:1;}54.84%{opacity:1;}56.72%{opacity:0;}100.00%{opacity:0;}}
.dyn-act-0{animation-name:k-dyn-act-0;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-act-1{opacity:1;}
@keyframes k-dyn-act-1{0.00%{opacity:0;}52.96%{opacity:0;}54.84%{opacity:1;}91.40%{opacity:1;}100.00%{opacity:1;}}
.dyn-act-1{animation-name:k-dyn-act-1;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-observe-0{opacity:0;}
@keyframes k-dyn-observe-0{0.00%{opacity:1;}63.98%{opacity:1;}65.86%{opacity:0;}100.00%{opacity:0;}}
.dyn-observe-0{animation-name:k-dyn-observe-0;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-observe-1{opacity:1;}
@keyframes k-dyn-observe-1{0.00%{opacity:0;}62.10%{opacity:0;}63.98%{opacity:1;}91.40%{opacity:1;}100.00%{opacity:1;}}
.dyn-observe-1{animation-name:k-dyn-observe-1;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
