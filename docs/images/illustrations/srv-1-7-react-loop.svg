@keyframes k-done{0.00%{stroke-width:1.5;}34.68%{stroke-width:1.5;}36.56%{stroke:var(--pink);stroke-width:2.5;}45.70%{stroke:var(--pink);stroke-width:2.5;}47.58%{stroke-width:1.5;}71.24%{stroke-width:1.5;}73.12%{stroke:var(--pink);stroke-width:2.5;}82.26%{stroke:var(--pink);stroke-width:2.5;}84.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-done .shp{animation-name:k-done;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
