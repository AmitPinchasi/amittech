@keyframes k-edge-1{0.00%{stroke-width:1.6;}16.40%{stroke-width:1.6;}18.28%{stroke:var(--pink);stroke-width:2.4;}27.42%{stroke:var(--pink);stroke-width:2.4;}29.30%{stroke-width:1.6;}52.96%{stroke-width:1.6;}54.84%{stroke:var(--pink);stroke-width:2.4;}63.98%{stroke:var(--pink);stroke-width:2.4;}65.86%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
