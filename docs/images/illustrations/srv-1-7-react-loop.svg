<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="215.4,62.0 215.4,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="215.4,148.0 215.4,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="215.4,234.0 215.4,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="215.4,320.0 215.4,360.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="96.0,419.7 16.0,419.7 16.0,125.0 109.0,125.0" marker-end="url(#arr)"/>
<text class="small" x="62.5" y="113.0" text-anchor="middle">לא</text>
<polyline id="edge-5" class="edge" points="334.8,419.7 400.8,419.7" marker-end="url(#arr)"/>
