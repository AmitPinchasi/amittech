#el-act .shp{animation-name:k-act;animation-duration:18.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-observe{0.00%{stroke-width:1.5;}25.54%{stroke-width:1.5;}27.42%{stroke:var(--pink);stroke-width:2.5;}36.56%{stroke:var(--pink);stroke-width:2.5;}38.44%{stroke-width:1.5;}62.10%{stroke-width:1.5;}63.98%{stroke:var(--pink);stroke-width:2.5;}73.12%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
