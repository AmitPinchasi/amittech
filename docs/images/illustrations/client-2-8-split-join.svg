<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 472" width="380" role="img" aria-label="המרה בין מחרוזת למערך: split מפצל לפי מפריד ו-join מחבר בחזרה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-src{0.00%{stroke:var(--pink);stroke-width:2.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}20.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-src .shp{animation-name:k-src;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-c1{0.00%{stroke-width:1.5;}13.37%{stroke-width:1.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}37.13%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-c1 .shp{animation-name:k-c1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-0{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c0{animation-name:k-lst-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-1{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c1{animation-name:k-lst-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-2{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c2{animation-name:k-lst-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-c2{0.00%{stroke-width:1.5;}47.03%{stroke-width:1.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}70.79%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-c2 .shp{animation-name:k-c2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-res{0.00%{stroke-width:1.5;}63.86%{stroke-width:1.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-res .shp{animation-name:k-res;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}30.20%{stroke-width:1.6;}33.66%{stroke:var(--pink);stroke-width:2.4;}50.50%{stroke:var(--pink);stroke-width:2.4;}53.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}63.86%{stroke-width:1.6;}67.33%{stroke:var(--pink);stroke-width:2.4;}84.16%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}67.33%{opacity:1;}70.79%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-1{opacity:1;}
@keyframes k-dyn-res-1{0.00%{opacity:0;}63.86%{opacity:0;}67.33%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="190.0,132.0 190.0,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="202.0" y="156.0" text-anchor="end">פיצול לפי פסיק</text>
<polyline id="edge-1" class="edge" points="190.0,314.0 190.0,354.0" marker-end="url(#arr)"/>
<text class="lbl" x="202.0" y="338.0" text-anchor="end">חיבור עם מפריד</text>
<g id="el-src">
<rect class="n-code-bg shp" x="32.1" y="16.0" width="315.8" height="38.0" rx="7"/>
<text class="code" x="190.0" y="43.0" text-anchor="middle">const csv = "Alice,Bob,Charlie"</text>
</g>
<g id="el-c1">
<rect class="n-code-bg shp" x="45.6" y="94.0" width="288.8" height="38.0" rx="7"/>
<text class="code" x="190.0" y="121.0" text-anchor="middle">const names = csv.split(",")</text>
</g>
<g id="el-lst">
<rect id="el-lst-c0" class="n-cell shp" x="258.0" y="190.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="306.0" y="184.0" text-anchor="middle" style="direction:ltr">0</text>
<text class="t" x="306.0" y="218.0" text-anchor="middle" style="direction:ltr">Alice</text>
<rect id="el-lst-c1" class="n-cell shp" x="142.0" y="190.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="190.0" y="184.0" text-anchor="middle" style="direction:ltr">1</text>
<text class="t" x="190.0" y="218.0" text-anchor="middle" style="direction:ltr">Bob</text>
<rect id="el-lst-c2" class="n-cell shp" x="26.0" y="190.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="74.0" y="184.0" text-anchor="middle" style="direction:ltr">2</text>
<text class="t" x="74.0" y="218.0" text-anchor="middle" style="direction:ltr">Charlie</text>
</g>
<g id="el-c2">
<rect class="n-code-bg shp" x="95.3" y="276.0" width="189.5" height="38.0" rx="7"/>
<text class="code" x="190.0" y="303.0" text-anchor="middle">names.join(" - ")</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="73.9" y="354.0" width="232.2" height="44.0" rx="8"/>
<text class="t-b dyn-res-0" x="190.0" y="381.0" text-anchor="middle" style="direction:ltr">?</text>
<text class="t-b dyn-res-1" x="190.0" y="381.0" text-anchor="middle" style="direction:ltr">"Alice - Bob - Charlie"</text>
</g>
<g id="el-note">
<text class="small" x="190.0" y="451.0" text-anchor="middle">המחרוזת הופכת למערך ובחזרה למחרוזת עם מפריד חדש</text>
</g>
</svg>
