<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 556 344" width="556" role="img" aria-label="איך מודל שפה מעבד prompt: הטקסט מפורק לטוקנים, המודל מחשב את הטוקן הבא הכי סביר, מוסיף אותו לטקסט וחוזר על התהליך טוקן אחרי טוקן">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-prompt{0.00%{stroke:var(--pink);stroke-width:2.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}17.41%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-prompt .shp{animation-name:k-prompt;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tokens{0.00%{stroke-width:1.5;}11.16%{stroke-width:1.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}31.70%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-tokens .shp{animation-name:k-tokens;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-model{0.00%{stroke-width:1.5;}25.45%{stroke-width:1.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}45.98%{stroke-width:1.5;}54.02%{stroke-width:1.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}74.55%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-model .shp{animation-name:k-model;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-next{0.00%{stroke-width:1.5;}39.73%{stroke-width:1.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}60.27%{stroke-width:1.5;}68.30%{stroke-width:1.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}85.71%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-next .shp{animation-name:k-next;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.16%{stroke-width:1.6;}14.29%{stroke:var(--pink);stroke-width:2.4;}28.57%{stroke:var(--pink);stroke-width:2.4;}31.70%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.45%{stroke-width:1.6;}28.57%{stroke:var(--pink);stroke-width:2.4;}42.86%{stroke:var(--pink);stroke-width:2.4;}45.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}39.73%{stroke-width:1.6;}42.86%{stroke:var(--pink);stroke-width:2.4;}57.14%{stroke:var(--pink);stroke-width:2.4;}60.27%{stroke-width:1.6;}68.30%{stroke-width:1.6;}71.43%{stroke:var(--pink);stroke-width:2.4;}85.71%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}54.02%{stroke-width:1.6;}57.14%{stroke:var(--pink);stroke-width:2.4;}71.43%{stroke:var(--pink);stroke-width:2.4;}74.55%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-next-0{opacity:0;}
@keyframes k-dyn-next-0{0.00%{opacity:1;}42.86%{opacity:1;}45.98%{opacity:0;}100.00%{opacity:0;}}
.dyn-next-0{animation-name:k-dyn-next-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-next-1{opacity:0;}
@keyframes k-dyn-next-1{0.00%{opacity:0;}39.73%{opacity:0;}42.86%{opacity:1;}71.43%{opacity:1;}74.55%{opacity:0;}100.00%{opacity:0;}}
.dyn-next-1{animation-name:k-dyn-next-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-next-2{opacity:1;}
@keyframes k-dyn-next-2{0.00%{opacity:0;}68.30%{opacity:0;}71.43%{opacity:1;}85.71%{opacity:1;}100.00%{opacity:1;}}
.dyn-next-2{animation-name:k-dyn-next-2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="318.0,54.0 318.0,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="332.0" y="78.0" text-anchor="end">טוקניזציה</text>
<polyline id="edge-1" class="edge" points="318.0,158.0 318.0,198.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="318.0,244.0 318.0,284.0" marker-end="url(#arr)"/>
<text class="lbl" x="332.0" y="268.0" text-anchor="end">חיזוי הטוקן הבא</text>
<polyline id="edge-3" class="edge" points="248.5,306.0 16.0,306.0 16.0,221.0 259.4,221.0" marker-end="url(#arr)"/>
<text class="small" x="137.7" y="209.0" text-anchor="middle">טוקן אחרי טוקן</text>
<g id="el-prompt">
<rect class="n-code-bg shp" x="236.8" y="16.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="318.0" y="43.0" text-anchor="middle">def add(a, b):</text>
</g>
<g id="el-tokens">
<rect id="el-tokens-c0" class="n-cell shp" x="444.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="492.0" y="106.0" text-anchor="middle" style="direction:ltr">0</text>
<text class="t" x="492.0" y="140.0" text-anchor="middle" style="direction:ltr">def</text>
<rect id="el-tokens-c1" class="n-cell shp" x="328.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="376.0" y="106.0" text-anchor="middle" style="direction:ltr">1</text>
<text class="t" x="376.0" y="140.0" text-anchor="middle" style="direction:ltr">add</text>
<rect id="el-tokens-c2" class="n-cell shp" x="212.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="260.0" y="106.0" text-anchor="middle" style="direction:ltr">2</text>
<text class="t" x="260.0" y="140.0" text-anchor="middle" style="direction:ltr">(a, b)</text>
<rect id="el-tokens-c3" class="n-cell shp" x="96.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="144.0" y="106.0" text-anchor="middle" style="direction:ltr">3</text>
<text class="t" x="144.0" y="140.0" text-anchor="middle" style="direction:ltr">:</text>
</g>
<g id="el-model">
<rect class="n-box shp" x="259.4" y="198.0" width="117.2" height="46.0" rx="8"/>
<text class="t" x="318.0" y="226.0" text-anchor="middle">מודל שפה</text>
</g>
<g id="el-next">
<rect class="n-box shp" x="248.5" y="284.0" width="139.0" height="44.0" rx="8"/>
<text class="t-b dyn-next-0" x="318.0" y="311.0" text-anchor="middle">הטוקן הבא?</text>
<text class="t-b dyn-next-1" x="318.0" y="311.0" text-anchor="middle" style="direction:ltr">return</text>
<text class="t-b dyn-next-2" x="318.0" y="311.0" text-anchor="middle" style="direction:ltr">return a + b</text>
</g>
</svg>
