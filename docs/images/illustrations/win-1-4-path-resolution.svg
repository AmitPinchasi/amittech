<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 714 298" width="714" role="img" aria-label="כך ה-Shell מוצא פקודה חיצונית: הוא עובר על התיקיות שרשומות במשתנה PATH עד שמוצא את הקובץ dir.exe">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cmd{0.00%{stroke:var(--pink);stroke-width:2.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}24.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmd .shp{animation-name:k-cmd;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-0{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c0{animation-name:k-lst-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-1{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c1{animation-name:k-lst-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-2{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-lst-c2{animation-name:k-lst-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}16.07%{transform:translateX(0.0px);}20.24%{transform:translateX(0.0px);}36.31%{transform:translateX(0.0px);}40.48%{transform:translateX(-210.6px);}56.55%{transform:translateX(-210.6px);}60.71%{transform:translateX(-421.2px);}76.79%{transform:translateX(-421.2px);}100.00%{transform:translateX(-421.2px);}}
#eg-0{animation-name:k-mv-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}60.71%{opacity:1;}64.88%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-1{opacity:1;}
@keyframes k-dyn-res-1{0.00%{opacity:0;}56.55%{opacity:0;}60.71%{opacity:1;}80.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-cmd">
<rect class="n-code-bg shp" x="273.9" y="16.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="321.9" y="43.0" text-anchor="middle">dir</text>
</g>
<g id="el-lst">
<rect id="el-lst-c0" class="n-cell shp" x="437.2" y="94.0" width="190.6" height="46.0" rx="6"/>
<text class="t" x="532.6" y="122.0" text-anchor="middle" style="direction:ltr">C:\Program Files</text>
<rect id="el-lst-c1" class="n-cell shp" x="226.6" y="94.0" width="190.6" height="46.0" rx="6"/>
<text class="t" x="321.9" y="122.0" text-anchor="middle" style="direction:ltr">C:\Windows</text>
<rect id="el-lst-c2" class="n-cell shp" x="16.0" y="94.0" width="190.6" height="46.0" rx="6"/>
<text class="t" x="111.3" y="122.0" text-anchor="middle" style="direction:ltr">C:\Windows\System32</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="532.6,140.0 532.6,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="544.6" y="164.0" text-anchor="end">התיקייה הנבדקת</text>
<g id="el-res">
<rect class="n-box shp" x="367.0" y="180.0" width="331.1" height="44.0" rx="8"/>
<text class="t-b dyn-res-0" x="532.6" y="207.0" text-anchor="middle">מחפש את dir.exe...</text>
<text class="t-b dyn-res-1" x="532.6" y="207.0" text-anchor="middle">נמצא ב-System32, מריץ את dir.exe</text>
</g>
</g>
<g id="el-note">
<text class="small" x="321.9" y="277.0" text-anchor="middle">משתנה PATH הוא רשימת תיקיות שה-Shell סורק כדי למצוא פקודות חיצוניות</text>
</g>
</svg>
