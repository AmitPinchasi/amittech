@keyframes k-edge-2{0.00%{stroke-width:1.6;}31.56%{stroke-width:1.6;}33.75%{stroke:var(--pink);stroke-width:2.4;}45.00%{stroke:var(--pink);stroke-width:2.4;}47.19%{stroke-width:1.6;}76.56%{stroke-width:1.6;}78.75%{stroke:var(--pink);stroke-width:2.4;}90.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-input-0{opacity:0;}
@keyframes k-dyn-input-0{0.00%{opacity:1;}45.00%{opacity:1;}47.19%{opacity:0;}100.00%{opacity:0;}}
