@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.06%{stroke-width:1.6;}11.25%{stroke:var(--pink);stroke-width:2.4;}22.50%{stroke:var(--pink);stroke-width:2.4;}24.69%{stroke-width:1.6;}54.06%{stroke-width:1.6;}56.25%{stroke:var(--pink);stroke-width:2.4;}67.50%{stroke:var(--pink);stroke-width:2.4;}69.69%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}20.31%{stroke-width:1.6;}22.50%{stroke:var(--pink);stroke-width:2.4;}33.75%{stroke:var(--pink);stroke-width:2.4;}35.94%{stroke-width:1.6;}65.31%{stroke-width:1.6;}67.50%{stroke:var(--pink);stroke-width:2.4;}78.75%{stroke:var(--pink);stroke-width:2.4;}80.94%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
