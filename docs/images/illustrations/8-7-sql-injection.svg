.dyn-cond-1{opacity:1;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}65.31%{opacity:0;}67.50%{opacity:1;}90.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}78.75%{opacity:1;}80.94%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
