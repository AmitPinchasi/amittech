<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 451 484" width="451" role="img" aria-label="הזרקת SQL: קלט תמים מחזיר את המשתמש הנכון בלבד, אבל קלט זדוני הופך את התנאי לאמת תמידית ופותח גישה ללא סיסמה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-input{0.00%{stroke:var(--pink);stroke-width:2.5;}11.25%{stroke:var(--pink);stroke-width:2.5;}13.44%{stroke-width:1.5;}42.81%{stroke-width:1.5;}45.00%{stroke:var(--pink);stroke-width:2.5;}56.25%{stroke:var(--pink);stroke-width:2.5;}58.44%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-input .shp{animation-name:k-input;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-query{0.00%{stroke-width:1.5;}9.06%{stroke-width:1.5;}11.25%{stroke:var(--pink);stroke-width:2.5;}22.50%{stroke:var(--pink);stroke-width:2.5;}24.69%{stroke-width:1.5;}54.06%{stroke-width:1.5;}56.25%{stroke:var(--pink);stroke-width:2.5;}67.50%{stroke:var(--pink);stroke-width:2.5;}69.69%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-query .shp{animation-name:k-query;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}20.31%{stroke-width:1.5;}22.50%{stroke:var(--pink);stroke-width:2.5;}33.75%{stroke:var(--pink);stroke-width:2.5;}35.94%{stroke-width:1.5;}65.31%{stroke-width:1.5;}67.50%{stroke:var(--pink);stroke-width:2.5;}78.75%{stroke:var(--pink);stroke-width:2.5;}80.94%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-res{0.00%{stroke-width:1.5;}31.56%{stroke-width:1.5;}33.75%{stroke:var(--pink);stroke-width:2.5;}45.00%{stroke:var(--pink);stroke-width:2.5;}47.19%{stroke-width:1.5;}76.56%{stroke-width:1.5;}78.75%{stroke:var(--pink);stroke-width:2.5;}90.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
