@keyframes k-dyn-res-1{0.00%{opacity:0;}76.56%{opacity:0;}78.75%{opacity:1;}90.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="225.6,54.0 225.6,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="239.6" y="78.0" text-anchor="end">הקלט נכנס לשאילתה</text>
<polyline id="edge-1" class="edge" points="225.6,132.0 225.6,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="239.6" y="156.0" text-anchor="end">השאילתה רצה</text>
<polyline id="edge-2" class="edge" points="225.6,381.6 225.6,421.6" marker-end="url(#arr)"/>
<g id="el-input">
<rect class="n-code-bg shp" x="112.8" y="16.0" width="225.6" height="38.0" rx="7"/>
<text class="code dyn-input-0" x="225.6" y="43.0" text-anchor="middle">password = "1234"</text>
<text class="code dyn-input-1" x="225.6" y="43.0" text-anchor="middle">password = "' or 1=1"</text>
</g>
<g id="el-query">
<rect class="n-code-bg shp" x="81.2" y="94.0" width="288.8" height="38.0" rx="7"/>
<text class="code dyn-query-0" x="225.6" y="121.0" text-anchor="middle">... WHERE password='1234'</text>
<text class="code dyn-query-1" x="225.6" y="121.0" text-anchor="middle">... WHERE password='' or 1=1</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="225.6,172.0 435.1,276.8 225.6,381.6 16.0,276.8"/>
<text class="t dyn-cond-0" x="225.6" y="281.8" text-anchor="middle">מחזיר שורה תואמת בלבד</text>
<text class="t dyn-cond-1" x="225.6" y="281.8" text-anchor="middle">1=1 תמיד אמת</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="105.8" y="421.6" width="239.6" height="46.0" rx="8"/>
<text class="t dyn-res-0" x="225.6" y="449.6" text-anchor="middle">גישה רק עם סיסמה נכונה</text>
<text class="t dyn-res-1" x="225.6" y="449.6" text-anchor="middle">גישה נפתחת בלי סיסמה</text>
</g>
