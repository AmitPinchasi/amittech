<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-cap">
<text class="small" x="272.9" y="29.0" text-anchor="middle">מד ההספק והתדר של ה-GPU תחת עומס גובר</text>
</g>
<g id="el-power">
<rect class="n-box shp" x="175.7" y="74.0" width="194.5" height="44.0" rx="8"/>
<text class="t-b dyn-power-0" x="272.9" y="101.0" text-anchor="middle" style="direction:ltr">power 79 / 700 W</text>
<text class="t-b dyn-power-1" x="272.9" y="101.0" text-anchor="middle" style="direction:ltr">power 690 / 700 W</text>
<text class="t-b dyn-power-2" x="272.9" y="101.0" text-anchor="middle" style="direction:ltr">power 700 / 700 W</text>
<text class="t-b dyn-power-3" x="272.9" y="101.0" text-anchor="middle" style="direction:ltr">power 700 / 700 W</text>
</g>
<g id="el-clock">
<rect class="n-box shp" x="171.6" y="158.0" width="202.8" height="44.0" rx="8"/>
<text class="t-b dyn-clock-0" x="272.9" y="185.0" text-anchor="middle" style="direction:ltr">SM clock 345 MHz</text>
<text class="t-b dyn-clock-1" x="272.9" y="185.0" text-anchor="middle" style="direction:ltr">SM clock 1980 MHz</text>
<text class="t-b dyn-clock-2" x="272.9" y="185.0" text-anchor="middle" style="direction:ltr">SM clock 1830 MHz</text>
