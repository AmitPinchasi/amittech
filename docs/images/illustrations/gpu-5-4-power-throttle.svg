<text class="t-b dyn-state-0" x="272.9" y="269.0" text-anchor="middle">סרק</text>
<text class="t-b dyn-state-1" x="272.9" y="269.0" text-anchor="middle">בוסט מלא</text>
<text class="t-b dyn-state-2" x="272.9" y="269.0" text-anchor="middle">נגיעה בתקרה - ויסות</text>
