<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 694 298" width="694" role="img" aria-label="איור מכונת המצבים של חזאי דו-ביט רווי, המראה כיצד דרושות שתי טעויות רצופות כדי לעבור ממצב נלקח בחוזקה למצב לא-נלקח, מה שמשפר את הדיוק בלולאות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-st{0.00%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-st .shp{animation-name:k-st;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pred{0.00%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-pred .shp{animation-name:k-pred;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-st-0{opacity:1;}
@keyframes k-dyn-st-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-st-0{animation-name:k-dyn-st-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-st-1{opacity:0;}
@keyframes k-dyn-st-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-st-1{animation-name:k-dyn-st-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-st-2{opacity:0;}
@keyframes k-dyn-st-2{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-st-2{animation-name:k-dyn-st-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-st-3{opacity:0;}
@keyframes k-dyn-st-3{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-st-3{animation-name:k-dyn-st-3;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pred-0{opacity:1;}
@keyframes k-dyn-pred-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-pred-0{animation-name:k-dyn-pred-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pred-1{opacity:0;}
@keyframes k-dyn-pred-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-pred-1{animation-name:k-dyn-pred-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pred-2{opacity:0;}
@keyframes k-dyn-pred-2{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-pred-2{animation-name:k-dyn-pred-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pred-3{opacity:0;}
@keyframes k-dyn-pred-3{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-pred-3{animation-name:k-dyn-pred-3;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:0;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-3{opacity:1;}
@keyframes k-dyn-note-3{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-3{animation-name:k-dyn-note-3;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-st">
<rect class="n-box shp" x="211.0" y="16.0" width="271.9" height="44.0" rx="8"/>
<text class="t-b dyn-st-0" x="347.0" y="43.0" text-anchor="middle" style="direction:ltr">state 11: Strong Taken</text>
<text class="t-b dyn-st-1" x="347.0" y="43.0" text-anchor="middle" style="direction:ltr">state 10: Weak Taken</text>
<text class="t-b dyn-st-2" x="347.0" y="43.0" text-anchor="middle" style="direction:ltr">state 01: Weak Not-Taken</text>
<text class="t-b dyn-st-3" x="347.0" y="43.0" text-anchor="middle" style="direction:ltr">state 00: Strong Not-Taken</text>
</g>
<g id="el-pred">
<rect class="n-code-bg shp" x="247.8" y="100.0" width="198.5" height="38.0" rx="7"/>
<text class="code dyn-pred-0" x="347.0" y="127.0" text-anchor="middle">predict: taken</text>
<text class="code dyn-pred-1" x="347.0" y="127.0" text-anchor="middle">predict: taken</text>
<text class="code dyn-pred-2" x="347.0" y="127.0" text-anchor="middle">predict: not-taken</text>
<text class="code dyn-pred-3" x="347.0" y="127.0" text-anchor="middle">predict: not-taken</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="43.4" y="178.0" width="607.1" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="347.0" y="206.0" text-anchor="middle">החזאי מתחיל במצב נלקח בחוזקה, כי הלולאה קפצה שוב ושוב</text>
<text class="t dyn-note-1" x="347.0" y="206.0" text-anchor="middle">הלולאה מסתיימת ולא נלקחת: החזאי טועה אך רק נחלש לנלקח בחולשה</text>
<text class="t dyn-note-2" x="347.0" y="206.0" text-anchor="middle">הלולאה מתחילה שוב ונלקחת: החזאי עדיין ניחש נלקח וצדק</text>
<text class="t dyn-note-3" x="347.0" y="206.0" text-anchor="middle">אחרי עוד קפיצות החזאי חוזר לנלקח בחוזקה, ומנחש נכון בכל איטרציה</text>
</g>
<g id="el-cap">
<text class="small" x="347.0" y="277.0" text-anchor="middle">בזכות שני הביטים לולאה של עשר איטרציות טועה רק פעם אחת במקום פעמיים, והדיוק עולה לתשעים אחוז</text>
</g>
</svg>
