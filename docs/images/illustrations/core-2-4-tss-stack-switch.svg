<text class="t dyn-note-0" x="302.1" y="392.0" text-anchor="middle">התוכנה רצה על מחסנית היוזר מוד שלה</text>
<text class="t dyn-note-1" x="302.1" y="392.0" text-anchor="middle">המעבד קורא מה-TSS את המחסנית של הקרנל ומחליף אליה</text>
<text class="t dyn-note-2" x="302.1" y="392.0" text-anchor="middle">המעבד דוחף אל המחסנית הקרנלית את כל מצב היוזר מוד</text>
<text class="t dyn-note-3" x="302.1" y="392.0" text-anchor="middle">רק עכשיו המעבד קופץ לקוד ה-handler שבקרנל</text>
</g>
<g id="el-cap">
<text class="small" x="302.1" y="463.0" text-anchor="middle">המעבד עושה את כל זה בעצמו, ולכן התוכנה לא יכולה להטעות את הקרנל לגבי המחסנית שלו</text>
</g>
