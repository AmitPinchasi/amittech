<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 302 424" width="302" role="img" aria-label="שלושה משתנים מקבלים ערכים: המחשב זוכר את הערך של כל אחד מהם">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}16.48%{stroke:var(--pink);stroke-width:2.5;}20.33%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-va{0.00%{stroke-width:1.5;}12.64%{stroke-width:1.5;}16.48%{stroke:var(--pink);stroke-width:2.5;}32.97%{stroke:var(--pink);stroke-width:2.5;}36.81%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-va .shp{animation-name:k-va;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-vb{0.00%{stroke-width:1.5;}29.12%{stroke-width:1.5;}32.97%{stroke:var(--pink);stroke-width:2.5;}49.45%{stroke:var(--pink);stroke-width:2.5;}53.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-vb .shp{animation-name:k-vb;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-vc{0.00%{stroke-width:1.5;}45.60%{stroke-width:1.5;}49.45%{stroke:var(--pink);stroke-width:2.5;}82.42%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-vc .shp{animation-name:k-vc;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-va-0{opacity:0;}
@keyframes k-dyn-va-0{0.00%{opacity:1;}16.48%{opacity:1;}20.33%{opacity:0;}100.00%{opacity:0;}}
.dyn-va-0{animation-name:k-dyn-va-0;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-va-1{opacity:1;}
@keyframes k-dyn-va-1{0.00%{opacity:0;}12.64%{opacity:0;}16.48%{opacity:1;}82.42%{opacity:1;}100.00%{opacity:1;}}
.dyn-va-1{animation-name:k-dyn-va-1;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-vb-0{opacity:0;}
@keyframes k-dyn-vb-0{0.00%{opacity:1;}32.97%{opacity:1;}36.81%{opacity:0;}100.00%{opacity:0;}}
.dyn-vb-0{animation-name:k-dyn-vb-0;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-vb-1{opacity:1;}
@keyframes k-dyn-vb-1{0.00%{opacity:0;}29.12%{opacity:0;}32.97%{opacity:1;}82.42%{opacity:1;}100.00%{opacity:1;}}
.dyn-vb-1{animation-name:k-dyn-vb-1;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-vc-0{opacity:0;}
@keyframes k-dyn-vc-0{0.00%{opacity:1;}49.45%{opacity:1;}53.30%{opacity:0;}100.00%{opacity:0;}}
.dyn-vc-0{animation-name:k-dyn-vc-0;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-vc-1{opacity:0;}
@keyframes k-dyn-vc-1{0.00%{opacity:0;}45.60%{opacity:0;}49.45%{opacity:1;}65.93%{opacity:1;}69.78%{opacity:0;}100.00%{opacity:0;}}
.dyn-vc-1{animation-name:k-dyn-vc-1;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-vc-2{opacity:1;}
@keyframes k-dyn-vc-2{0.00%{opacity:0;}62.09%{opacity:0;}65.93%{opacity:1;}82.42%{opacity:1;}100.00%{opacity:1;}}
.dyn-vc-2{animation-name:k-dyn-vc-2;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="92.4" y="16.0" width="117.2" height="82.0" rx="7"/>
<text class="code" x="151.0" y="43.0" text-anchor="middle">a = 3</text>
<text class="code" x="151.0" y="65.0" text-anchor="middle">b = 5</text>
<text class="code" x="151.0" y="87.0" text-anchor="middle">c = a + b</text>
</g>
<g id="el-va">
<rect class="n-box shp" x="103.0" y="138.0" width="96.0" height="44.0" rx="8"/>
<text class="t-b dyn-va-0" x="151.0" y="165.0" text-anchor="middle" style="direction:ltr">a</text>
<text class="t-b dyn-va-1" x="151.0" y="165.0" text-anchor="middle" style="direction:ltr">a = 3</text>
</g>
<g id="el-vb">
<rect class="n-box shp" x="103.0" y="222.0" width="96.0" height="44.0" rx="8"/>
<text class="t-b dyn-vb-0" x="151.0" y="249.0" text-anchor="middle" style="direction:ltr">b</text>
<text class="t-b dyn-vb-1" x="151.0" y="249.0" text-anchor="middle" style="direction:ltr">b = 5</text>
</g>
<g id="el-vc">
<rect class="n-box shp" x="96.2" y="306.0" width="109.6" height="44.0" rx="8"/>
<text class="t-b dyn-vc-0" x="151.0" y="333.0" text-anchor="middle" style="direction:ltr">c</text>
<text class="t-b dyn-vc-1" x="151.0" y="333.0" text-anchor="middle" style="direction:ltr">c = 3 + 5</text>
<text class="t-b dyn-vc-2" x="151.0" y="333.0" text-anchor="middle" style="direction:ltr">c = 8</text>
</g>
<g id="el-note">
<text class="small" x="151.0" y="403.0" text-anchor="middle">המחשב שומר את הערך העדכני של כל משתנה</text>
</g>
</svg>
