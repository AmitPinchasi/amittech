<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 376 434" width="376" role="img" aria-label="מתודת __init__ של מחלקת הבת קוראת דרך super לאתחול של מחלקת האב, וכך האובייקט מקבל את כל השדות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dinit{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-dinit .shp{animation-name:k-dinit;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-obj{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-obj .shp{animation-name:k-obj;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ainit{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ainit .shp{animation-name:k-ainit;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj-0{opacity:0;}
@keyframes k-dyn-obj-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-obj-0{animation-name:k-dyn-obj-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj-1{opacity:0;}
@keyframes k-dyn-obj-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-obj-1{animation-name:k-dyn-obj-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj-2{opacity:1;}
@keyframes k-dyn-obj-2{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-obj-2{animation-name:k-dyn-obj-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="188.1,54.0 188.1,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="202.1" y="78.0" text-anchor="end">האתחול של מחלקת הבת</text>
<polyline id="edge-1" class="edge" points="188.1,176.0 188.1,216.0" marker-end="url(#arr)"/>
<text class="lbl" x="202.1" y="200.0" text-anchor="end">קריאה לאתחול של האב</text>
<polyline id="edge-2" class="edge" points="188.1,276.0 188.1,316.0" marker-end="url(#arr)"/>
<text class="lbl" x="202.1" y="300.0" text-anchor="end">כל השדות נשמרים</text>
<g id="el-call">
<rect class="n-code-bg shp" x="75.3" y="16.0" width="225.6" height="38.0" rx="7"/>
<text class="code" x="188.1" y="43.0" text-anchor="middle">dog = Dog("Buddy", 5)</text>
</g>
<g id="el-dinit">
<rect class="n-code-bg shp" x="25.7" y="94.0" width="324.9" height="82.0" rx="7"/>
<text class="code" x="188.1" y="121.0" text-anchor="middle">def __init__(self, name, speed):</text>
<text class="code" x="188.1" y="143.0" text-anchor="middle">    self.speed = speed</text>
<text class="code" x="188.1" y="165.0" text-anchor="middle">    super().__init__(name)</text>
</g>
<g id="el-ainit">
<rect class="n-code-bg shp" x="57.3" y="216.0" width="261.7" height="60.0" rx="7"/>
<text class="code" x="188.1" y="243.0" text-anchor="middle">def __init__(self, name):</text>
<text class="code" x="188.1" y="265.0" text-anchor="middle">    self.name = name</text>
</g>
<g id="el-obj">
<rect class="n-box shp" x="67.2" y="316.0" width="241.8" height="44.0" rx="8"/>
<text class="t-b dyn-obj-0" x="188.1" y="343.0" text-anchor="middle">אובייקט חדש וריק</text>
<text class="t-b dyn-obj-1" x="188.1" y="343.0" text-anchor="middle" style="direction:ltr">speed = 5</text>
<text class="t-b dyn-obj-2" x="188.1" y="343.0" text-anchor="middle" style="direction:ltr">speed = 5, name = "Buddy"</text>
</g>
<g id="el-note">
<text class="small" x="188.1" y="413.0" text-anchor="middle">האובייקט מקבל שדות גם ממחלקת הבת וגם ממחלקת האב</text>
</g>
</svg>
