#el-alloc .shp{animation-name:k-alloc;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-copy{0.00%{stroke-width:1.5;}48.24%{stroke-width:1.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-copy .shp{animation-name:k-copy;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
