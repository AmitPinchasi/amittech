<text class="t" x="244.4" y="436.4" text-anchor="middle">המערכת מקצה אזור חדש וגדול יותר</text>
</g>
<g id="el-copy">
<rect class="n-box shp" x="100.3" y="494.4" width="288.3" height="46.0" rx="8"/>
