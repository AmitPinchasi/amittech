<polyline id="edge-6" class="edge" points="244.4,626.4 244.4,666.4" marker-end="url(#arr)"/>
<g id="el-call">
<rect class="n-code-bg shp" x="59.4" y="16.0" width="370.0" height="38.0" rx="7"/>
<text class="code" x="244.4" y="43.0" text-anchor="middle">arr = realloc(arr, 20 * sizeof(int));</text>
</g>
<g id="el-check">
<polygon class="n-dia shp" points="244.4,94.0 472.8,208.2 244.4,322.4 16.0,208.2"/>
<text class="code" x="244.4" y="213.2" text-anchor="middle">free space after block?</text>
</g>
<g id="el-inplace">
<rect class="n-box shp" x="358.0" y="322.4" width="405.5" height="46.0" rx="8"/>
<text class="t" x="560.8" y="350.4" text-anchor="middle">הבלוק גדל במקום והכתובת נשארת אותה כתובת</text>
</g>
