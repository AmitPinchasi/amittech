@keyframes k-edge-6{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-6{animation-name:k-edge-6;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="244.4,54.0 244.4,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="472.8,208.2 560.8,208.2 560.8,322.4" marker-end="url(#arr)"/>
<text class="lbl" x="516.8" y="196.2" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="560.8,368.4 560.8,689.4 381.1,689.4" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="244.4,322.4 244.4,408.4" marker-end="url(#arr)"/>
<text class="lbl" x="258.4" y="369.4" text-anchor="end">לא</text>
