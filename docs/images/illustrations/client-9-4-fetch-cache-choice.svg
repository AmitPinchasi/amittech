<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 751 636" width="751" role="img" aria-label="עץ החלטה לבחירת אסטרטגיית הקאשינג של fetch בקומפוננטת שרת בנקסט">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="232.2,62.0 232.2,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="448.4,210.1 514.4,210.1" marker-end="url(#arr)"/>
<text class="lbl" x="481.4" y="198.1" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="232.2,318.2 232.2,358.2" marker-end="url(#arr)"/>
<text class="lbl" x="246.2" y="342.2" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="416.3,450.2 482.3,450.2" marker-end="url(#arr)"/>
<text class="lbl" x="449.3" y="438.2" text-anchor="middle">כן</text>
<polyline id="edge-4" class="edge" points="232.2,542.3 232.2,582.3" marker-end="url(#arr)"/>
<text class="lbl" x="246.2" y="566.3" text-anchor="end">לא</text>
<g id="el-data">
<rect class="n-box shp" x="84.2" y="16.0" width="296.0" height="46.0" rx="8"/>
<text class="t" x="232.2" y="44.0" text-anchor="middle">fetch לנתונים בקומפוננטת שרת</text>
</g>
<g id="el-c1">
<polygon class="n-dia shp" points="232.2,102.0 448.4,210.1 232.2,318.2 16.0,210.1"/>
<text class="t" x="232.2" y="215.1" text-anchor="middle">הנתונים משתנים כל רגע?</text>
</g>
<g id="el-nostore">
<rect class="n-code-bg shp" x="514.4" y="191.1" width="171.4" height="38.0" rx="7"/>
<text class="code" x="600.1" y="218.1" text-anchor="middle">cache: no-store</text>
</g>
<g id="el-c2">
<polygon class="n-dia shp" points="232.2,358.2 416.3,450.2 232.2,542.3 48.2,450.2"/>
<text class="t" x="232.2" y="455.2" text-anchor="middle">מספיק לרענן כל דקה?</text>
</g>
<g id="el-reval">
<rect class="n-code-bg shp" x="482.3" y="431.2" width="252.7" height="38.0" rx="7"/>
<text class="code" x="608.6" y="458.2" text-anchor="middle">next: { revalidate: 60 }</text>
</g>
<g id="el-force">
<rect class="n-code-bg shp" x="133.0" y="582.3" width="198.5" height="38.0" rx="7"/>
<text class="code" x="232.2" y="609.3" text-anchor="middle">cache: force-cache</text>
</g>
</svg>
