<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 242" width="360" role="img" aria-label="API Gateway כ-reverse proxy: כל בקשה מהלקוח עוברת דרך שער מרכזי שמנתב אותה לפי הנתיב אל המיקרוסרביס המתאים, ומוסיף אימות והגבלת קצב">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}13.54%{stroke-width:1.5;}30.90%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}46.88%{stroke-width:1.5;}64.24%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}80.21%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-gw{0.00%{stroke-width:1.5;}8.68%{stroke-width:1.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}24.65%{stroke-width:1.5;}42.01%{stroke-width:1.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}57.99%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-gw .shp{animation-name:k-gw;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-svc-0{0.00%{stroke-width:1.5;}19.79%{stroke-width:1.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}35.76%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-svc-c0{animation-name:k-svc-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-svc-1{0.00%{stroke-width:1.5;}53.13%{stroke-width:1.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}69.10%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-svc-c1{animation-name:k-svc-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-svc-2{0.00%{stroke-width:1.5;}75.35%{stroke-width:1.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}88.89%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-svc-c2{animation-name:k-svc-2;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.68%{stroke-width:1.6;}11.11%{stroke:var(--pink);stroke-width:2.4;}22.22%{stroke:var(--pink);stroke-width:2.4;}24.65%{stroke-width:1.6;}42.01%{stroke-width:1.6;}44.44%{stroke:var(--pink);stroke-width:2.4;}55.56%{stroke:var(--pink);stroke-width:2.4;}57.99%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}19.79%{stroke-width:1.6;}22.22%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}35.76%{stroke-width:1.6;}53.13%{stroke-width:1.6;}55.56%{stroke:var(--pink);stroke-width:2.4;}66.67%{stroke:var(--pink);stroke-width:2.4;}69.10%{stroke-width:1.6;}75.35%{stroke-width:1.6;}77.78%{stroke:var(--pink);stroke-width:2.4;}88.89%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-0{opacity:0;}
@keyframes k-dyn-req-0{0.00%{opacity:1;}33.33%{opacity:1;}35.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-req-0{animation-name:k-dyn-req-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-1{opacity:0;}
@keyframes k-dyn-req-1{0.00%{opacity:0;}30.90%{opacity:0;}33.33%{opacity:1;}66.67%{opacity:1;}69.10%{opacity:0;}100.00%{opacity:0;}}
.dyn-req-1{animation-name:k-dyn-req-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-2{opacity:1;}
@keyframes k-dyn-req-2{0.00%{opacity:0;}64.24%{opacity:0;}66.67%{opacity:1;}88.89%{opacity:1;}100.00%{opacity:1;}}
.dyn-req-2{animation-name:k-dyn-req-2;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="180.0,54.0 180.0,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="180.0,140.0 180.0,180.0" marker-end="url(#arr)"/>
<g id="el-req">
<rect class="n-code-bg shp" x="112.4" y="16.0" width="135.3" height="38.0" rx="7"/>
<text class="code dyn-req-0" x="180.0" y="43.0" text-anchor="middle">GET /users</text>
<text class="code dyn-req-1" x="180.0" y="43.0" text-anchor="middle">GET /trips</text>
<text class="code dyn-req-2" x="180.0" y="43.0" text-anchor="middle">GET /images</text>
</g>
<g id="el-gw">
<rect class="n-box shp" x="33.0" y="94.0" width="294.0" height="46.0" rx="8"/>
<text class="t" x="180.0" y="122.0" text-anchor="middle">שער API - ניתוב, אימות, הגבלה</text>
</g>
<g id="el-svc">
<rect id="el-svc-c0" class="n-cell shp" x="248.0" y="180.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="296.0" y="208.0" text-anchor="middle" style="direction:ltr">Users</text>
<rect id="el-svc-c1" class="n-cell shp" x="132.0" y="180.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.0" y="208.0" text-anchor="middle" style="direction:ltr">Trips</text>
<rect id="el-svc-c2" class="n-cell shp" x="16.0" y="180.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="64.0" y="208.0" text-anchor="middle" style="direction:ltr">Images</text>
</g>
</svg>
