@keyframes k-mv-0{0.00%{transform:translateX(-232.0px);}21.23%{transform:translateX(-232.0px);}26.03%{transform:translateX(-348.0px);}47.26%{transform:translateX(-348.0px);}52.05%{transform:translateX(-348.0px);}73.29%{transform:translateX(-348.0px);}100.00%{transform:translateX(-348.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-0{opacity:0;}
@keyframes k-dyn-state-0{0.00%{opacity:1;}26.03%{opacity:1;}30.82%{opacity:0;}100.00%{opacity:0;}}
