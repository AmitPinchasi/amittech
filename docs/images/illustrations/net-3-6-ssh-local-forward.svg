@keyframes k-ssh{0.00%{stroke-width:1.5;}31.08%{stroke-width:1.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}54.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ssh .shp{animation-name:k-ssh;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-srv{0.00%{stroke-width:1.5;}48.20%{stroke-width:1.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}71.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-srv .shp{animation-name:k-srv;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dest{0.00%{stroke-width:1.5;}65.32%{stroke-width:1.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-dest .shp{animation-name:k-dest;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.96%{stroke-width:1.6;}17.12%{stroke:var(--pink);stroke-width:2.4;}34.23%{stroke:var(--pink);stroke-width:2.4;}37.39%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
