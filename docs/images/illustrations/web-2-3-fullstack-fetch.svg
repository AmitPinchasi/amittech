<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 277 594" width="277" role="img" aria-label="מסלול בקשת Fullstack: רכיב React קורא ל-fetch ברקע, שרת Express מטפל בבקשה ומחזיר JSON, ו-setUsers מעדכן את הרכיב כדי להציג את רשימת המשתמשים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-effect{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-effect .shp{animation-name:k-effect;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-req{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-express{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-express .shp{animation-name:k-express;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-resp{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-resp .shp{animation-name:k-resp;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-state{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-state .shp{animation-name:k-state;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-render{0.00%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-render .shp{animation-name:k-render;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}40.73%{stroke-width:1.6;}43.55%{stroke:var(--pink);stroke-width:2.4;}58.06%{stroke:var(--pink);stroke-width:2.4;}60.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}55.24%{stroke-width:1.6;}58.06%{stroke:var(--pink);stroke-width:2.4;}72.58%{stroke:var(--pink);stroke-width:2.4;}75.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="138.6,98.0 138.6,138.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="138.6,184.0 138.6,224.0" marker-end="url(#arr)"/>
<text class="lbl" x="152.6" y="208.0" text-anchor="end">בקשת GET</text>
<polyline id="edge-2" class="edge" points="138.6,262.0 138.6,302.0" marker-end="url(#arr)"/>
<text class="lbl" x="152.6" y="286.0" text-anchor="end" style="direction:ltr">res.json</text>
<polyline id="edge-3" class="edge" points="138.6,406.0 138.6,446.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="138.6,492.0 138.6,532.0" marker-end="url(#arr)"/>
<g id="el-effect">
<rect class="n-code-bg shp" x="25.8" y="16.0" width="225.6" height="82.0" rx="7"/>
<text class="code" x="138.6" y="43.0" text-anchor="middle">useEffect(() =&gt; {</text>
<text class="code" x="138.6" y="65.0" text-anchor="middle">  fetch('/api/users')</text>
<text class="code" x="138.6" y="87.0" text-anchor="middle">})</text>
</g>
<g id="el-req">
<rect class="n-box shp" x="30.1" y="138.0" width="217.0" height="46.0" rx="8"/>
<text class="t" x="138.6" y="166.0" text-anchor="middle">בקשת GET נשלחת לשרת</text>
</g>
<g id="el-express">
<rect class="n-code-bg shp" x="25.8" y="224.0" width="225.6" height="38.0" rx="7"/>
<text class="code" x="138.6" y="251.0" text-anchor="middle">app.get('/api/users')</text>
</g>
<g id="el-resp">
<rect class="n-code-bg shp" x="30.4" y="302.0" width="216.5" height="104.0" rx="7"/>
<text class="code" x="138.6" y="329.0" text-anchor="middle">[</text>
<text class="code" x="138.6" y="351.0" text-anchor="middle">  { name: 'Alice' },</text>
<text class="code" x="138.6" y="373.0" text-anchor="middle">  { name: 'Bob' }</text>
<text class="code" x="138.6" y="395.0" text-anchor="middle">]</text>
</g>
<g id="el-state">
<rect class="n-box shp" x="16.0" y="446.0" width="245.3" height="46.0" rx="8"/>
<text class="t" x="138.6" y="474.0" text-anchor="middle">setUsers מעדכן את הרכיב</text>
</g>
<g id="el-render">
<rect class="n-box shp" x="23.9" y="532.0" width="229.5" height="46.0" rx="8"/>
<text class="t" x="138.6" y="560.0" text-anchor="middle">רשימת המשתמשים מוצגת</text>
</g>
