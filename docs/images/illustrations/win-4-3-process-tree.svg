<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 394" width="450" role="img" aria-label="עץ ה-processes בווינדוס: explorer.exe הוא ה-process האב של תוכנות השולחן, וכל process בן יכול בעצמו ליצור processes בנים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="225.0,62.0 225.0,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="239.0" y="86.0" text-anchor="end">בנים (children)</text>
<polyline id="edge-1" class="edge" points="225.0,148.0 225.0,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="239.0" y="172.0" text-anchor="end">בן שיוצר בנים</text>
<polyline id="edge-2" class="edge" points="225.0,234.0 225.0,274.0" marker-end="url(#arr)"/>
<text class="lbl" x="239.0" y="258.0" text-anchor="end">פקודות שרצות</text>
<g id="el-root">
<rect class="n-box shp" x="89.6" y="16.0" width="270.8" height="46.0" rx="8"/>
<text class="t" x="225.0" y="44.0" text-anchor="middle">explorer.exe - שולחן העבודה</text>
</g>
<g id="el-kids">
<rect id="el-kids-c0" class="n-cell shp" x="304.0" y="102.0" width="118.0" height="46.0" rx="6"/>
<text class="t" x="363.0" y="130.0" text-anchor="middle" style="direction:ltr">chrome.exe</text>
<rect id="el-kids-c1" class="n-hl shp" x="165.9" y="102.0" width="118.0" height="46.0" rx="6"/>
<text class="t" x="225.0" y="130.0" text-anchor="middle" style="direction:ltr">cmd.exe</text>
<rect id="el-kids-c2" class="n-cell shp" x="27.9" y="102.0" width="118.0" height="46.0" rx="6"/>
<text class="t" x="86.9" y="130.0" text-anchor="middle" style="direction:ltr">discord.exe</text>
</g>
<g id="el-cmd">
<rect class="n-box shp" x="137.4" y="188.0" width="175.0" height="46.0" rx="8"/>
<text class="t" x="225.0" y="216.0" text-anchor="middle">cmd.exe - טרמינל</text>
</g>
<g id="el-cmdkids">
<rect id="el-cmdkids-c0" class="n-cell shp" x="235.0" y="274.0" width="126.4" height="46.0" rx="6"/>
<text class="t" x="298.2" y="302.0" text-anchor="middle" style="direction:ltr">ping.exe</text>
<rect id="el-cmdkids-c1" class="n-cell shp" x="88.5" y="274.0" width="126.4" height="46.0" rx="6"/>
<text class="t" x="151.7" y="302.0" text-anchor="middle" style="direction:ltr">ipconfig.exe</text>
</g>
<g id="el-note">
<text class="small" x="225.0" y="373.0" text-anchor="middle">לכל process יש PID, וה-PPID מצביע על ה-process האב שיצר אותו</text>
</g>
</svg>
