<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 392 401" width="392" role="img" aria-label="בקומפוננטה מבוקרת כל הקלדה עוברת דרך onChange ו-setState, וריאקט מרנדר מחדש כך שערך השדה תמיד מגיע מהסטייט">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-inp{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-inp .shp{animation-name:k-inp;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-type{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-type .shp{animation-name:k-type;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-onch{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-onch .shp{animation-name:k-onch;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-set{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-set .shp{animation-name:k-set;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-rr{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-rr .shp{animation-name:k-rr;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}40.73%{stroke-width:1.6;}43.55%{stroke:var(--pink);stroke-width:2.4;}58.06%{stroke:var(--pink);stroke-width:2.4;}60.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}55.24%{stroke-width:1.6;}58.06%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-inp-0{opacity:0;}
@keyframes k-dyn-inp-0{0.00%{opacity:1;}72.58%{opacity:1;}75.40%{opacity:0;}100.00%{opacity:0;}}
.dyn-inp-0{animation-name:k-dyn-inp-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-inp-1{opacity:1;}
@keyframes k-dyn-inp-1{0.00%{opacity:0;}69.76%{opacity:0;}72.58%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-inp-1{animation-name:k-dyn-inp-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="226.3,65.0 226.3,105.0" marker-end="url(#arr)"/>
<text class="lbl" x="240.3" y="89.0" text-anchor="end">הקלדת תו</text>
<polyline id="edge-1" class="edge" points="226.3,143.0 226.3,183.0" marker-end="url(#arr)"/>
<text class="lbl" x="240.3" y="167.0" text-anchor="end">הערך החדש</text>
<polyline id="edge-2" class="edge" points="226.3,221.0 226.3,261.0" marker-end="url(#arr)"/>
<text class="lbl" x="240.3" y="245.0" text-anchor="end">עדכון הסטייט</text>
<polyline id="edge-3" class="edge" points="226.3,307.0 226.3,347.0" marker-end="url(#arr)"/>
<text class="lbl" x="240.3" y="331.0" text-anchor="end">הערך מגיע מהסטייט</text>
<polyline id="edge-4" class="edge" points="158.6,366.0 31.0,366.0 31.0,42.0 111.0,42.0" marker-end="url(#arr)"/>
<text class="small" x="71.0" y="30.0" text-anchor="middle">חוזר בכל הקלדה</text>
<g id="el-type">
<rect class="n-box shp" x="111.0" y="19.0" width="230.5" height="46.0" rx="8"/>
<text class="t" x="226.3" y="47.0" text-anchor="middle">המשתמש מקליד את התו A</text>
</g>
<g id="el-onch">
<rect class="n-code-bg shp" x="149.6" y="105.0" width="153.4" height="38.0" rx="7"/>
<text class="code" x="226.3" y="132.0" text-anchor="middle">onChange: "A"</text>
</g>
<g id="el-set">
<rect class="n-code-bg shp" x="154.1" y="183.0" width="144.3" height="38.0" rx="7"/>
<text class="code" x="226.3" y="210.0" text-anchor="middle">setName("A")</text>
</g>
<g id="el-rr">
<rect class="n-box shp" x="131.0" y="261.0" width="190.5" height="46.0" rx="8"/>
<text class="t" x="226.3" y="289.0" text-anchor="middle">ריאקט מרנדר מחדש</text>
</g>
<g id="el-inp">
