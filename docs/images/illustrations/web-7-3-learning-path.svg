<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 451" width="740" role="img" aria-label="מסלול ההמשך אחרי קורס פריצת אתרים: המשך לקורס בדיקת חדירות או לקורס פריצת אתרים מתקדם, ותרגול מתמשך עם CTF">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-start{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-start .shp{animation-name:k-start;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fork{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fork .shp{animation-name:k-fork;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pentest{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pentest .shp{animation-name:k-pentest;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-adv{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-adv .shp{animation-name:k-adv;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ctf{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-ctf .shp{animation-name:k-ctf;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="187.7,62.0 187.7,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="187.7,263.1 187.7,303.1" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="348.8,182.6 414.8,182.6" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="187.7,349.1 187.7,389.1" marker-end="url(#arr)"/>
<g id="el-start">
<rect class="n-box shp" x="60.7" y="16.0" width="254.0" height="46.0" rx="8"/>
<text class="t" x="187.7" y="44.0" text-anchor="middle">סיימתם קורס פריצת אתרים</text>
</g>
<g id="el-fork">
<polygon class="n-dia shp" points="187.7,102.0 348.8,182.6 187.7,263.1 26.5,182.6"/>
<text class="t" x="187.7" y="187.6" text-anchor="middle">לאן ממשיכים מכאן</text>
</g>
<g id="el-pentest">
<rect class="n-box shp" x="414.8" y="159.6" width="309.1" height="46.0" rx="8"/>
<text class="t" x="569.4" y="187.6" text-anchor="middle">בדיקת חדירות - בודק חדירות מלא</text>
</g>
<g id="el-adv">
<rect class="n-box shp" x="16.0" y="303.1" width="343.4" height="46.0" rx="8"/>
<text class="t" x="187.7" y="331.1" text-anchor="middle">פריצת אתרים מתקדם - מחקר ווב מעמיק</text>
</g>
<g id="el-ctf">
<rect class="n-box shp" x="84.0" y="389.1" width="207.3" height="46.0" rx="8"/>
<text class="t" x="187.7" y="417.1" text-anchor="middle">תרגול מתמשך עם CTF</text>
</g>
</svg>
