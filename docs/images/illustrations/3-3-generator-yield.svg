<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="290.2,61.0 290.2,101.0" marker-end="url(#arr)"/>
<text class="lbl" x="304.2" y="85.0" text-anchor="end">מבקשים את הערך הבא</text>
<polyline id="edge-1" class="edge" points="290.2,139.0 290.2,179.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="290.2,223.0 290.2,263.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="213.5,282.0 16.0,282.0 16.0,42.0 172.9,42.0" marker-end="url(#arr)"/>
<text class="small" x="94.4" y="30.0" text-anchor="middle">הסיבוב הבא</text>
<g id="el-cons">
<rect class="n-code-bg shp" x="172.9" y="23.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="290.2" y="50.0" text-anchor="middle">for square in squares:</text>
</g>
<g id="el-gen">
<rect class="n-code-bg shp" x="195.4" y="101.0" width="189.5" height="38.0" rx="7"/>
<text class="code" x="290.2" y="128.0" text-anchor="middle">yield number ** 2</text>
</g>
<g id="el-val">
<rect class="n-box shp" x="242.2" y="179.0" width="96.0" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="290.2" y="206.0" text-anchor="middle" style="direction:ltr">0</text>
<text class="t-b dyn-val-1" x="290.2" y="206.0" text-anchor="middle" style="direction:ltr">1</text>
<text class="t-b dyn-val-2" x="290.2" y="206.0" text-anchor="middle" style="direction:ltr">4</text>
</g>
<g id="el-prn">
