#edge-0{animation-name:k-edge-0;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}13.52%{stroke-width:1.6;}15.31%{stroke:var(--pink);stroke-width:2.4;}22.96%{stroke:var(--pink);stroke-width:2.4;}24.74%{stroke-width:1.6;}44.13%{stroke-width:1.6;}45.92%{stroke:var(--pink);stroke-width:2.4;}53.57%{stroke:var(--pink);stroke-width:2.4;}55.36%{stroke-width:1.6;}74.74%{stroke-width:1.6;}76.53%{stroke:var(--pink);stroke-width:2.4;}84.18%{stroke:var(--pink);stroke-width:2.4;}85.97%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
