.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:1;}45.92%{opacity:1;}47.70%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:0;}
@keyframes k-dyn-val-1{0.00%{opacity:0;}44.13%{opacity:0;}45.92%{opacity:1;}76.53%{opacity:1;}78.32%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-2{opacity:1;}
@keyframes k-dyn-val-2{0.00%{opacity:0;}74.74%{opacity:0;}76.53%{opacity:1;}91.84%{opacity:1;}100.00%{opacity:1;}}
