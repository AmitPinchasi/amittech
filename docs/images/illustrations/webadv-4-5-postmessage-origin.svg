<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 727 473" width="727" role="img" aria-label="זרימת אמון ב-postMessage: אם ה-origin לא נבדק מול רשימת היתר מדויקת, המידע מההודעה מגיע ל-innerHTML או eval וגורם ל-XSS, אחרת ההודעה מטופלת בבטחה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-recv{0.00%{stroke:var(--pink);stroke-width:2.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}17.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-recv .shp{animation-name:k-recv;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-checkq{0.00%{stroke-width:1.5;}11.44%{stroke-width:1.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}31.78%{stroke-width:1.5;}40.25%{stroke-width:1.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}60.59%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-checkq .shp{animation-name:k-checkq;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-safe{0.00%{stroke-width:1.5;}25.85%{stroke-width:1.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}46.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-safe .shp{animation-name:k-safe;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-data{0.00%{stroke-width:1.5;}54.66%{stroke-width:1.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-data .shp{animation-name:k-data;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-xss{0.00%{stroke-width:1.5;}69.07%{stroke-width:1.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}86.44%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-xss .shp{animation-name:k-xss;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.44%{stroke-width:1.6;}14.41%{stroke:var(--pink);stroke-width:2.4;}28.81%{stroke:var(--pink);stroke-width:2.4;}31.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}25.85%{stroke-width:1.6;}28.81%{stroke:var(--pink);stroke-width:2.4;}43.22%{stroke:var(--pink);stroke-width:2.4;}46.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}54.66%{stroke-width:1.6;}57.63%{stroke:var(--pink);stroke-width:2.4;}72.03%{stroke:var(--pink);stroke-width:2.4;}75.00%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}69.07%{stroke-width:1.6;}72.03%{stroke:var(--pink);stroke-width:2.4;}86.44%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="207.1,62.0 207.1,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="207.1,293.1 207.1,333.1" marker-end="url(#arr)"/>
<text class="lbl" x="221.1" y="317.1" text-anchor="end">לא / בדיקה חלקית</text>
<polyline id="edge-2" class="edge" points="207.1,371.1 207.1,411.1" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="398.2,197.5 464.2,197.5" marker-end="url(#arr)"/>
<text class="lbl" x="431.2" y="185.5" text-anchor="middle">כן</text>
<g id="el-recv">
<rect class="n-box shp" x="79.9" y="16.0" width="254.3" height="46.0" rx="8"/>
<text class="t" x="207.1" y="44.0" text-anchor="middle">החלון מקבל הודעת message</text>
</g>
<g id="el-checkq">
<polygon class="n-dia shp" points="207.1,102.0 398.2,197.5 207.1,293.1 16.0,197.5"/>
<text class="t" x="207.1" y="202.5" text-anchor="middle">בדיקת origin מדויקת?</text>
</g>
<g id="el-data">
<rect class="n-code-bg shp" x="76.2" y="333.1" width="261.7" height="38.0" rx="7"/>
<text class="code" x="207.1" y="360.1" text-anchor="middle">el.innerHTML = event.data</text>
</g>
<g id="el-xss">
<rect class="n-box shp" x="115.9" y="411.1" width="182.4" height="46.0" rx="8"/>
<text class="t" x="207.1" y="439.1" text-anchor="middle">הרצת XSS או eval</text>
</g>
<g id="el-safe">
<rect class="n-box shp" x="464.2" y="174.5" width="247.3" height="46.0" rx="8"/>
<text class="t" x="587.8" y="202.5" text-anchor="middle">טיפול בטוח - textContent</text>
</g>
</svg>
