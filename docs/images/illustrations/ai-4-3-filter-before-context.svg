<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 334" width="250" role="img" aria-label="סינון פלט לפני שהוא נכנס לcontext: במקום להזרים לוג של עשרת אלפים שורות, grep משאיר רק את השורות עם ERROR וכך צריכת הטוקנים צונחת מעשרות אלפים למאות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-log{0.00%{stroke:var(--pink);stroke-width:2.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}24.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-log .shp{animation-name:k-log;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-filter{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-filter .shp{animation-name:k-filter;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-result{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-result .shp{animation-name:k-result;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ctx{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-ctx .shp{animation-name:k-ctx;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.07%{stroke-width:1.6;}20.24%{stroke:var(--pink);stroke-width:2.4;}40.48%{stroke:var(--pink);stroke-width:2.4;}44.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.31%{stroke-width:1.6;}40.48%{stroke:var(--pink);stroke-width:2.4;}60.71%{stroke:var(--pink);stroke-width:2.4;}64.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}56.55%{stroke-width:1.6;}60.71%{stroke:var(--pink);stroke-width:2.4;}80.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ctx-0{opacity:0;}
@keyframes k-dyn-ctx-0{0.00%{opacity:1;}60.71%{opacity:1;}64.88%{opacity:0;}100.00%{opacity:0;}}
.dyn-ctx-0{animation-name:k-dyn-ctx-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ctx-1{opacity:1;}
@keyframes k-dyn-ctx-1{0.00%{opacity:0;}56.55%{opacity:0;}60.71%{opacity:1;}80.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-ctx-1{animation-name:k-dyn-ctx-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="122.5,62.0 122.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="122.5,148.0 122.5,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="122.5,234.0 122.5,274.0" marker-end="url(#arr)"/>
<text class="lbl" x="136.5" y="258.0" text-anchor="end">נכנס לcontext</text>
<g id="el-log">
<rect class="n-box shp" x="21.9" y="16.0" width="201.2" height="46.0" rx="8"/>
<text class="t" x="122.5" y="44.0" text-anchor="middle">לוג - 10,000 שורות</text>
</g>
<g id="el-filter">
<rect class="n-box shp" x="16.0" y="102.0" width="213.0" height="46.0" rx="8"/>
<text class="t" x="122.5" y="130.0" text-anchor="middle">סינון עם grep ERROR</text>
</g>
<g id="el-result">
<rect class="n-box shp" x="16.8" y="188.0" width="211.3" height="46.0" rx="8"/>
<text class="t" x="122.5" y="216.0" text-anchor="middle">50 שורות רלוונטיות</text>
</g>
<g id="el-ctx">
<rect class="n-box shp" x="50.0" y="274.0" width="145.1" height="44.0" rx="8"/>
<text class="t-b dyn-ctx-0" x="122.5" y="301.0" text-anchor="middle">40K טוקנים</text>
<text class="t-b dyn-ctx-1" x="122.5" y="301.0" text-anchor="middle">300 טוקנים</text>
</g>
</svg>
