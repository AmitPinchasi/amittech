<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 507 304" width="507" role="img" aria-label="אנימציה של מסע פקטה בין רשתות: כתובת ה-IP של המקור והיעד נשארת קבועה בכל הקפיצות, בעוד כתובת ה-MAC מתחלפת בכל קפיצה בין נתב לנתב">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-link{0.00%{stroke:var(--pink);stroke-width:2.5;}78.08%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-link .shp{animation-name:k-link;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-macf{0.00%{stroke:var(--pink);stroke-width:2.5;}78.08%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-macf .shp{animation-name:k-macf;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-link-0{opacity:0;}
@keyframes k-dyn-link-0{0.00%{opacity:1;}26.03%{opacity:1;}30.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-link-0{animation-name:k-dyn-link-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-link-1{opacity:0;}
@keyframes k-dyn-link-1{0.00%{opacity:0;}21.23%{opacity:0;}26.03%{opacity:1;}52.05%{opacity:1;}56.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-link-1{animation-name:k-dyn-link-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-link-2{opacity:1;}
@keyframes k-dyn-link-2{0.00%{opacity:0;}47.26%{opacity:0;}52.05%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-link-2{animation-name:k-dyn-link-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-macf-0{opacity:0;}
@keyframes k-dyn-macf-0{0.00%{opacity:1;}26.03%{opacity:1;}30.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-macf-0{animation-name:k-dyn-macf-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-macf-1{opacity:0;}
@keyframes k-dyn-macf-1{0.00%{opacity:0;}21.23%{opacity:0;}26.03%{opacity:1;}52.05%{opacity:1;}56.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-macf-1{animation-name:k-dyn-macf-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-macf-2{opacity:1;}
@keyframes k-dyn-macf-2{0.00%{opacity:0;}47.26%{opacity:0;}52.05%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-macf-2{animation-name:k-dyn-macf-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-link">
<rect class="n-box shp" x="136.1" y="16.0" width="234.7" height="44.0" rx="8"/>
<text class="t-b dyn-link-0" x="253.5" y="43.0" text-anchor="middle">קפיצה: PC1 אל נתב 1</text>
<text class="t-b dyn-link-1" x="253.5" y="43.0" text-anchor="middle">קפיצה: נתב 1 אל נתב 2</text>
<text class="t-b dyn-link-2" x="253.5" y="43.0" text-anchor="middle">קפיצה: נתב 2 אל PC2</text>
</g>
<g id="el-ipf">
<rect class="n-box shp" x="61.1" y="100.0" width="384.7" height="46.0" rx="8"/>
<text class="t" x="253.5" y="128.0" text-anchor="middle">כתובת IP קבועה: 10.0.0.4 אל 192.168.0.2</text>
</g>
<g id="el-macf">
<rect class="n-box shp" x="88.1" y="186.0" width="330.7" height="44.0" rx="8"/>
<text class="t-b dyn-macf-0" x="253.5" y="213.0" text-anchor="middle">כתובת MAC משתנה: PC1 אל נתב 1</text>
<text class="t-b dyn-macf-1" x="253.5" y="213.0" text-anchor="middle">כתובת MAC משתנה: נתב 1 אל נתב 2</text>
<text class="t-b dyn-macf-2" x="253.5" y="213.0" text-anchor="middle">כתובת MAC משתנה: נתב 2 אל PC2</text>
</g>
<g id="el-note">
<text class="small" x="253.5" y="283.0" text-anchor="middle">כתובת ה-IP נשארת קבועה לכל אורך הדרך, כתובת ה-MAC מתחלפת בכל קפיצה</text>
</g>
</svg>
