<rect id="el-subs-c2" class="n-cell shp" x="16.0" y="180.0" width="141.2" height="46.0" rx="6"/>
<text class="t" x="86.6" y="208.0" text-anchor="middle" style="direction:ltr">AuditLog</text>
</g>
