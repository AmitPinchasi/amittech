<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 364 296" width="364" role="img" aria-label="אותה רשימה, פונקציות מובנות שונות: כל פונקציה מחזירה ערך אחר">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-inp{0.00%{stroke:var(--pink);stroke-width:2.5;}12.40%{stroke:var(--pink);stroke-width:2.5;}15.29%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inp .shp{animation-name:k-inp;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fn{0.00%{stroke-width:1.5;}9.50%{stroke-width:1.5;}12.40%{stroke:var(--pink);stroke-width:2.5;}24.79%{stroke:var(--pink);stroke-width:2.5;}27.69%{stroke-width:1.5;}34.30%{stroke-width:1.5;}37.19%{stroke:var(--pink);stroke-width:2.5;}49.59%{stroke:var(--pink);stroke-width:2.5;}52.48%{stroke-width:1.5;}59.09%{stroke-width:1.5;}61.98%{stroke:var(--pink);stroke-width:2.5;}74.38%{stroke:var(--pink);stroke-width:2.5;}77.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fn .shp{animation-name:k-fn;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}21.90%{stroke-width:1.5;}24.79%{stroke:var(--pink);stroke-width:2.5;}37.19%{stroke:var(--pink);stroke-width:2.5;}40.08%{stroke-width:1.5;}46.69%{stroke-width:1.5;}49.59%{stroke:var(--pink);stroke-width:2.5;}61.98%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}71.49%{stroke-width:1.5;}74.38%{stroke:var(--pink);stroke-width:2.5;}86.78%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.50%{stroke-width:1.6;}12.40%{stroke:var(--pink);stroke-width:2.4;}24.79%{stroke:var(--pink);stroke-width:2.4;}27.69%{stroke-width:1.6;}34.30%{stroke-width:1.6;}37.19%{stroke:var(--pink);stroke-width:2.4;}49.59%{stroke:var(--pink);stroke-width:2.4;}52.48%{stroke-width:1.6;}59.09%{stroke-width:1.6;}61.98%{stroke:var(--pink);stroke-width:2.4;}74.38%{stroke:var(--pink);stroke-width:2.4;}77.27%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}21.90%{stroke-width:1.6;}24.79%{stroke:var(--pink);stroke-width:2.4;}37.19%{stroke:var(--pink);stroke-width:2.4;}40.08%{stroke-width:1.6;}46.69%{stroke-width:1.6;}49.59%{stroke:var(--pink);stroke-width:2.4;}61.98%{stroke:var(--pink);stroke-width:2.4;}64.88%{stroke-width:1.6;}71.49%{stroke-width:1.6;}74.38%{stroke:var(--pink);stroke-width:2.4;}86.78%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-fn-0{opacity:0;}
@keyframes k-dyn-fn-0{0.00%{opacity:1;}37.19%{opacity:1;}40.08%{opacity:0;}100.00%{opacity:0;}}
.dyn-fn-0{animation-name:k-dyn-fn-0;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-fn-1{opacity:0;}
@keyframes k-dyn-fn-1{0.00%{opacity:0;}34.30%{opacity:0;}37.19%{opacity:1;}61.98%{opacity:1;}64.88%{opacity:0;}100.00%{opacity:0;}}
.dyn-fn-1{animation-name:k-dyn-fn-1;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-fn-2{opacity:1;}
@keyframes k-dyn-fn-2{0.00%{opacity:0;}59.09%{opacity:0;}61.98%{opacity:1;}86.78%{opacity:1;}100.00%{opacity:1;}}
.dyn-fn-2{animation-name:k-dyn-fn-2;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-0{opacity:0;}
@keyframes k-dyn-out-0{0.00%{opacity:1;}49.59%{opacity:1;}52.48%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-0{animation-name:k-dyn-out-0;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-1{opacity:0;}
@keyframes k-dyn-out-1{0.00%{opacity:0;}46.69%{opacity:0;}49.59%{opacity:1;}74.38%{opacity:1;}77.27%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-1{animation-name:k-dyn-out-1;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-2{opacity:1;}
@keyframes k-dyn-out-2{0.00%{opacity:0;}71.49%{opacity:0;}74.38%{opacity:1;}86.78%{opacity:1;}100.00%{opacity:1;}}
.dyn-out-2{animation-name:k-dyn-out-2;animation-duration:12.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="182.2,54.0 182.2,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="194.2" y="78.0" text-anchor="end">קלט</text>
<polyline id="edge-1" class="edge" points="182.2,138.0 182.2,178.0" marker-end="url(#arr)"/>
<text class="lbl" x="194.2" y="162.0" text-anchor="end">ערך מוחזר</text>
<g id="el-inp">
<rect class="n-code-bg shp" x="51.4" y="16.0" width="261.7" height="38.0" rx="7"/>
<text class="code" x="182.2" y="43.0" text-anchor="middle">numbers = [2, 8, 1, 6, 4]</text>
</g>
<g id="el-fn">
<rect class="n-box shp" x="105.7" y="94.0" width="153.0" height="44.0" rx="8"/>
<text class="t-b dyn-fn-0" x="182.2" y="121.0" text-anchor="middle">max(numbers)‎</text>
<text class="t-b dyn-fn-1" x="182.2" y="121.0" text-anchor="middle">sum(numbers)‎</text>
<text class="t-b dyn-fn-2" x="182.2" y="121.0" text-anchor="middle">len(numbers)‎</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="134.2" y="178.0" width="96.0" height="44.0" rx="8"/>
<text class="t-b dyn-out-0" x="182.2" y="205.0" text-anchor="middle" style="direction:ltr">8</text>
<text class="t-b dyn-out-1" x="182.2" y="205.0" text-anchor="middle" style="direction:ltr">21</text>
<text class="t-b dyn-out-2" x="182.2" y="205.0" text-anchor="middle" style="direction:ltr">5</text>
</g>
<g id="el-note">
<text class="small" x="182.2" y="275.0" text-anchor="middle">הפונקציה מקבלת את הרשימה כקלט ומחזירה ערך אחד</text>
</g>
</svg>
