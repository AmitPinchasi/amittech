<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 271 376" width="271" role="img" aria-label="למידה מדוגמאות few-shot - המודל לומד תבנית משתי דוגמאות ומחיל אותה על כל קלט חדש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-shots{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-shots .shp{animation-name:k-shots;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-inp{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-inp .shp{animation-name:k-inp;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-outp{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-outp .shp{animation-name:k-outp;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-inp-0{opacity:0;}
@keyframes k-dyn-inp-0{0.00%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-inp-0{animation-name:k-dyn-inp-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-inp-1{opacity:0;}
@keyframes k-dyn-inp-1{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-inp-1{animation-name:k-dyn-inp-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-inp-2{opacity:1;}
@keyframes k-dyn-inp-2{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-inp-2{animation-name:k-dyn-inp-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-outp-0{opacity:0;}
@keyframes k-dyn-outp-0{0.00%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-outp-0{animation-name:k-dyn-outp-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-outp-1{opacity:0;}
@keyframes k-dyn-outp-1{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-outp-1{animation-name:k-dyn-outp-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-outp-2{opacity:1;}
@keyframes k-dyn-outp-2{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-outp-2{animation-name:k-dyn-outp-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="135.4,218.0 135.4,258.0" marker-end="url(#arr)"/>
<text class="lbl" x="147.4" y="242.0" text-anchor="end">לפי התבנית</text>
<g id="el-shots">
<rect class="n-code-bg shp" x="18.2" y="16.0" width="234.6" height="60.0" rx="7"/>
<text class="code" x="135.4" y="43.0" text-anchor="middle">user_name  -&gt; userName</text>
<text class="code" x="135.4" y="65.0" text-anchor="middle">is_active  -&gt; isActive</text>
</g>
<g id="el-note1">
<text class="small" x="135.4" y="129.0" text-anchor="middle">המודל לומד את התבנית מהדוגמאות</text>
</g>
<g id="el-inp">
<rect class="n-box shp" x="26.4" y="174.0" width="218.2" height="44.0" rx="8"/>
<text class="t-b dyn-inp-0" x="135.4" y="201.0" text-anchor="middle" style="direction:ltr">order_created_at</text>
<text class="t-b dyn-inp-1" x="135.4" y="201.0" text-anchor="middle" style="direction:ltr">max_retry_count</text>
<text class="t-b dyn-inp-2" x="135.4" y="201.0" text-anchor="middle" style="direction:ltr">db_connection_string</text>
</g>
<g id="el-outp">
<rect class="n-box shp" x="30.7" y="258.0" width="209.6" height="44.0" rx="8"/>
<text class="t-b dyn-outp-0" x="135.4" y="285.0" text-anchor="middle" style="direction:ltr">orderCreatedAt</text>
<text class="t-b dyn-outp-1" x="135.4" y="285.0" text-anchor="middle" style="direction:ltr">maxRetryCount</text>
<text class="t-b dyn-outp-2" x="135.4" y="285.0" text-anchor="middle" style="direction:ltr">dbConnectionString</text>
</g>
<g id="el-note2">
<text class="small" x="135.4" y="355.0" text-anchor="middle">ומחיל את אותה תבנית על כל קלט חדש</text>
</g>
</svg>
