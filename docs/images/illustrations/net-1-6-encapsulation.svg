<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-frame">
<rect class="n-box shp" x="142.3" y="16.0" width="264.8" height="46.0" rx="8"/>
<text class="t dyn-frame-0" x="274.7" y="44.0" text-anchor="middle" style="direction:ltr">DATA</text>
<text class="t dyn-frame-1" x="274.7" y="44.0" text-anchor="middle" style="direction:ltr">TCP | DATA</text>
<text class="t dyn-frame-2" x="274.7" y="44.0" text-anchor="middle" style="direction:ltr">IP | TCP | DATA</text>
<text class="t dyn-frame-3" x="274.7" y="44.0" text-anchor="middle" style="direction:ltr">ETH | IP | TCP | DATA | CRC</text>
</g>
<g id="el-desc">
<rect class="n-box shp" x="64.5" y="102.0" width="420.3" height="44.0" rx="8"/>
<text class="t-b dyn-desc-0" x="274.7" y="129.0" text-anchor="middle">שולח - מידע מהאפליקציה</text>
<text class="t-b dyn-desc-1" x="274.7" y="129.0" text-anchor="middle">שולח - תעבורה מוסיפה פורטים (Segment)</text>
<text class="t-b dyn-desc-2" x="274.7" y="129.0" text-anchor="middle">שולח - רשת מוסיפה כתובות IP (Packet)</text>
<text class="t-b dyn-desc-3" x="274.7" y="129.0" text-anchor="middle">שולח - קו מוסיף MAC ובדיקת שגיאות (Frame)</text>
<text class="t-b dyn-desc-4" x="274.7" y="129.0" text-anchor="middle">מקלט - קולט את המסגרת מהכבל</text>
<text class="t-b dyn-desc-5" x="274.7" y="129.0" text-anchor="middle">מקלט - קו מסיר את כותרת ה-MAC</text>
<text class="t-b dyn-desc-6" x="274.7" y="129.0" text-anchor="middle">מקלט - רשת מסירה את כותרת ה-IP</text>
<text class="t-b dyn-desc-7" x="274.7" y="129.0" text-anchor="middle">מקלט - תעבורה מסירה פורטים, נשאר מידע</text>
</g>
<g id="el-note">
<text class="small" x="274.7" y="199.0" text-anchor="middle">בשליחה כל שכבה עוטפת את המידע בכותרת, ובקבלה כל שכבה מסירה את הכותרת שלה</text>
</g>
</svg>
