<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 373 334" width="373" role="img" aria-label="מתודת __init__ רצה בעת יצירת אובייקט חדש ושומרת דרך self את הערכים בשדות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-init{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-init .shp{animation-name:k-init;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-obj{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-obj .shp{animation-name:k-obj;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}40.91%{stroke:var(--pink);stroke-width:2.4;}44.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.93%{stroke-width:1.6;}40.91%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj-0{opacity:0;}
@keyframes k-dyn-obj-0{0.00%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-obj-0{animation-name:k-dyn-obj-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj-1{opacity:0;}
@keyframes k-dyn-obj-1{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-obj-1{animation-name:k-dyn-obj-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj-2{opacity:1;}
@keyframes k-dyn-obj-2{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-obj-2{animation-name:k-dyn-obj-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="173.9,54.0 173.9,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="187.9" y="78.0" text-anchor="end">פייתון קורא ל-__init__</text>
<polyline id="edge-1" class="edge" points="173.9,176.0 173.9,216.0" marker-end="url(#arr)"/>
<text class="lbl" x="187.9" y="200.0" text-anchor="end">דרך self נשמרים הערכים</text>
<g id="el-call">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="315.8" height="38.0" rx="7"/>
<text class="code" x="173.9" y="43.0" text-anchor="middle">my_dog = Dog(name="max", age=3)</text>
</g>
<g id="el-init">
<rect class="n-code-bg shp" x="20.5" y="94.0" width="306.8" height="82.0" rx="7"/>
<text class="code" x="173.9" y="121.0" text-anchor="middle">def __init__(self, name, age):</text>
<text class="code" x="173.9" y="143.0" text-anchor="middle">    self.name = name</text>
<text class="code" x="173.9" y="165.0" text-anchor="middle">    self.age = age</text>
</g>
<g id="el-obj">
<rect class="n-box shp" x="72.0" y="216.0" width="203.8" height="44.0" rx="8"/>
<text class="t-b dyn-obj-0" x="173.9" y="243.0" text-anchor="middle">אובייקט חדש וריק</text>
<text class="t-b dyn-obj-1" x="173.9" y="243.0" text-anchor="middle" style="direction:ltr">name = "max"</text>
<text class="t-b dyn-obj-2" x="173.9" y="243.0" text-anchor="middle" style="direction:ltr">name = "max", age = 3</text>
</g>
<g id="el-note">
<text class="small" x="173.9" y="313.0" text-anchor="middle">הפרמטר self הוא האובייקט החדש שנוצר</text>
</g>
</svg>
