@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.03%{stroke-width:1.6;}50.50%{stroke:var(--pink);stroke-width:2.4;}67.33%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
