@keyframes k-conf{0.00%{stroke-width:1.5;}63.86%{stroke-width:1.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
