<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 521 212" width="521" role="img" aria-label="חישוב ציון ספציפיות של סלקטורים: מאלמנט בודד ועד סלקטור משולב">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-sel{0.00%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-sel .shp{animation-name:k-sel;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-score{0.00%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-score .shp{animation-name:k-score;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sel-0{opacity:0;}
@keyframes k-dyn-sel-0{0.00%{opacity:1;}20.83%{opacity:1;}24.48%{opacity:0;}100.00%{opacity:0;}}
.dyn-sel-0{animation-name:k-dyn-sel-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sel-1{opacity:0;}
@keyframes k-dyn-sel-1{0.00%{opacity:0;}17.19%{opacity:0;}20.83%{opacity:1;}41.67%{opacity:1;}45.31%{opacity:0;}100.00%{opacity:0;}}
.dyn-sel-1{animation-name:k-dyn-sel-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sel-2{opacity:0;}
@keyframes k-dyn-sel-2{0.00%{opacity:0;}38.02%{opacity:0;}41.67%{opacity:1;}62.50%{opacity:1;}66.15%{opacity:0;}100.00%{opacity:0;}}
.dyn-sel-2{animation-name:k-dyn-sel-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sel-3{opacity:1;}
@keyframes k-dyn-sel-3{0.00%{opacity:0;}58.85%{opacity:0;}62.50%{opacity:1;}83.33%{opacity:1;}100.00%{opacity:1;}}
.dyn-sel-3{animation-name:k-dyn-sel-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-score-0{opacity:0;}
@keyframes k-dyn-score-0{0.00%{opacity:1;}20.83%{opacity:1;}24.48%{opacity:0;}100.00%{opacity:0;}}
.dyn-score-0{animation-name:k-dyn-score-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-score-1{opacity:0;}
@keyframes k-dyn-score-1{0.00%{opacity:0;}17.19%{opacity:0;}20.83%{opacity:1;}41.67%{opacity:1;}45.31%{opacity:0;}100.00%{opacity:0;}}
.dyn-score-1{animation-name:k-dyn-score-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-score-2{opacity:0;}
@keyframes k-dyn-score-2{0.00%{opacity:0;}38.02%{opacity:0;}41.67%{opacity:1;}62.50%{opacity:1;}66.15%{opacity:0;}100.00%{opacity:0;}}
.dyn-score-2{animation-name:k-dyn-score-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-score-3{opacity:1;}
@keyframes k-dyn-score-3{0.00%{opacity:0;}58.85%{opacity:0;}62.50%{opacity:1;}83.33%{opacity:1;}100.00%{opacity:1;}}
.dyn-score-3{animation-name:k-dyn-score-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-sel">
<rect class="n-code-bg shp" x="147.8" y="16.0" width="225.6" height="38.0" rx="7"/>
<text class="code dyn-sel-0" x="260.6" y="43.0" text-anchor="middle">p</text>
<text class="code dyn-sel-1" x="260.6" y="43.0" text-anchor="middle">.intro</text>
<text class="code dyn-sel-2" x="260.6" y="43.0" text-anchor="middle">#header</text>
<text class="code dyn-sel-3" x="260.6" y="43.0" text-anchor="middle">#header .nav a.active</text>
</g>
<g id="el-score">
<rect class="n-box shp" x="85.2" y="94.0" width="350.8" height="44.0" rx="8"/>
<text class="t-b dyn-score-0" x="260.6" y="121.0" text-anchor="middle" style="direction:ltr">specificity = 1</text>
<text class="t-b dyn-score-1" x="260.6" y="121.0" text-anchor="middle" style="direction:ltr">specificity = 10</text>
<text class="t-b dyn-score-2" x="260.6" y="121.0" text-anchor="middle" style="direction:ltr">specificity = 100</text>
<text class="t-b dyn-score-3" x="260.6" y="121.0" text-anchor="middle" style="direction:ltr">specificity = 100 + 10 + 10 + 1 = 121</text>
</g>
<g id="el-note">
<text class="small" x="260.6" y="191.0" text-anchor="middle">אלמנט שווה 1, מחלקה שווה 10 ו-id שווה 100 - הציון הגבוה מנצח בהתנגשות</text>
</g>
</svg>
