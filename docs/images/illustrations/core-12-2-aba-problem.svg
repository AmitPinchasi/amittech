<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-t1">
<rect class="n-code-bg shp" x="162.5" y="16.0" width="361.0" height="38.0" rx="7"/>
<text class="code dyn-t1-0" x="343.0" y="43.0" text-anchor="middle">t1: old_top = A, plan CAS(top, A, B)</text>
<text class="code dyn-t1-1" x="343.0" y="43.0" text-anchor="middle">t1: preempted</text>
<text class="code dyn-t1-2" x="343.0" y="43.0" text-anchor="middle">t1: CAS(top, A, B) -&gt; true</text>
</g>
<g id="el-top">
<rect class="n-box shp" x="258.6" y="94.0" width="168.7" height="44.0" rx="8"/>
<text class="t-b dyn-top-0" x="343.0" y="121.0" text-anchor="middle" style="direction:ltr">top = A -&gt; B -&gt; C</text>
<text class="t-b dyn-top-1" x="343.0" y="121.0" text-anchor="middle" style="direction:ltr">top = B -&gt; C</text>
<text class="t-b dyn-top-2" x="343.0" y="121.0" text-anchor="middle" style="direction:ltr">top = C</text>
<text class="t-b dyn-top-3" x="343.0" y="121.0" text-anchor="middle" style="direction:ltr">top = A -&gt; C</text>
<text class="t-b dyn-top-4" x="343.0" y="121.0" text-anchor="middle" style="direction:ltr">top = B (freed)</text>
</g>
<g id="el-t2">
<rect class="n-code-bg shp" x="221.2" y="178.0" width="243.6" height="38.0" rx="7"/>
<text class="code dyn-t2-0" x="343.0" y="205.0" text-anchor="middle">t2: idle</text>
<text class="code dyn-t2-1" x="343.0" y="205.0" text-anchor="middle">t2: pop() -&gt; A</text>
<text class="code dyn-t2-2" x="343.0" y="205.0" text-anchor="middle">t2: pop() -&gt; B, free(B)</text>
<text class="code dyn-t2-3" x="343.0" y="205.0" text-anchor="middle">t2: push(A)</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="55.2" y="256.0" width="575.6" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="343.0" y="284.0" text-anchor="middle">התהליכון הראשון קרא את הראש ותכנן להחליף אותו במצביע הבא</text>
<text class="t dyn-note-1" x="343.0" y="284.0" text-anchor="middle">התהליכון הראשון נעצר לפני שהספיק לבצע את הפעולה האטומית</text>
<text class="t dyn-note-2" x="343.0" y="284.0" text-anchor="middle">התהליכון השני מוציא את A ואחר כך את B, ומשחרר את הזיכרון של B</text>
<text class="t dyn-note-3" x="343.0" y="284.0" text-anchor="middle">התהליכון השני מחזיר את A למחסנית, וכעת A מצביע ל-C</text>
<text class="t dyn-note-4" x="343.0" y="284.0" text-anchor="middle">הפעולה מצליחה כי הערך שוב A, אבל הראש מצביע לזיכרון משוחרר</text>
</g>
<g id="el-cap">
<text class="small" x="343.0" y="355.0" text-anchor="middle">הפעולה האטומית בודקת רק שוויון ערכים, ולכן מוסיפים מונה גרסה למצביע כדי לזהות שהמבנה השתנה</text>
</g>
</svg>
