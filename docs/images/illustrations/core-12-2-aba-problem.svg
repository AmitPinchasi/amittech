#el-top .shp{animation-name:k-top;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-t2{0.00%{stroke-width:1.5;}26.84%{stroke-width:1.5;}29.41%{stroke:var(--pink);stroke-width:2.5;}73.53%{stroke:var(--pink);stroke-width:2.5;}76.10%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
