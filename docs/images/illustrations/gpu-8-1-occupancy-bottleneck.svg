<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 628 298" width="628" role="img" aria-label="התפוסה התיאורטית נקבעת על-ידי המשאב שנגמר ראשון: המינימום מבין ארבע מגבלות המשאבים הוא צוואר-הבקבוק">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cfg{0.00%{stroke:var(--pink);stroke-width:2.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}30.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cfg .shp{animation-name:k-cfg;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-limits-0{0.00%{stroke:var(--pink);stroke-width:2.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}30.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-limits-c0{animation-name:k-limits-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-limits-1{0.00%{stroke:var(--pink);stroke-width:2.5;}78.08%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-limits-c1{animation-name:k-limits-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-limits-2{0.00%{stroke:var(--pink);stroke-width:2.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}30.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-limits-c2{animation-name:k-limits-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-limits-3{0.00%{stroke:var(--pink);stroke-width:2.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}30.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-limits-c3{animation-name:k-limits-3;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-calc-0{opacity:0;}
@keyframes k-dyn-calc-0{0.00%{opacity:1;}26.03%{opacity:1;}30.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-calc-0{animation-name:k-dyn-calc-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-calc-1{opacity:0;}
@keyframes k-dyn-calc-1{0.00%{opacity:0;}21.23%{opacity:0;}26.03%{opacity:1;}52.05%{opacity:1;}56.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-calc-1{animation-name:k-dyn-calc-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-calc-2{opacity:1;}
@keyframes k-dyn-calc-2{0.00%{opacity:0;}47.26%{opacity:0;}52.05%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-calc-2{animation-name:k-dyn-calc-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-cfg">
<rect class="n-code-bg shp" x="88.4" y="16.0" width="451.3" height="38.0" rx="7"/>
<text class="code" x="314.1" y="43.0" text-anchor="middle">launch: 32 thr/block, 8 regs/thread, 12KB smem</text>
</g>
<g id="el-limits">
<rect id="el-limits-c0" class="n-cell shp" x="466.8" y="94.0" width="122.8" height="46.0" rx="6"/>
<text class="t" x="528.2" y="122.0" text-anchor="middle">אוגרים 256</text>
<rect id="el-limits-c1" class="n-cell shp" x="324.1" y="94.0" width="122.8" height="46.0" rx="6"/>
<text class="t" x="385.4" y="122.0" text-anchor="middle" style="direction:ltr">smem 19</text>
<rect id="el-limits-c2" class="n-cell shp" x="181.3" y="94.0" width="122.8" height="46.0" rx="6"/>
<text class="t" x="242.7" y="122.0" text-anchor="middle">חומרה 32</text>
<rect id="el-limits-c3" class="n-cell shp" x="38.6" y="94.0" width="122.8" height="46.0" rx="6"/>
<text class="t" x="99.9" y="122.0" text-anchor="middle" style="direction:ltr">warps 64</text>
</g>
<g id="el-calc">
<rect class="n-box shp" x="114.5" y="180.0" width="399.2" height="44.0" rx="8"/>
<text class="t-b dyn-calc-0" x="314.1" y="207.0" text-anchor="middle" style="direction:ltr">min(256, 19, 32, 64) blocks</text>
<text class="t-b dyn-calc-1" x="314.1" y="207.0" text-anchor="middle">smem הוא הצוואר -&gt; 19 blocks</text>
<text class="t-b dyn-calc-2" x="314.1" y="207.0" text-anchor="middle">19 blocks = 19 warps מתוך 64 -&gt; תפוסה 30%</text>
</g>
<g id="el-note">
<text class="small" x="314.1" y="277.0" text-anchor="middle">המשאב שנגמר ראשון (כאן shared memory) קובע את התפוסה; משחררים רק אותו ולא נוגעים בשאר</text>
</g>
</svg>
