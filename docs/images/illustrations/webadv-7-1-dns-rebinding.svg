<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 578" width="500" role="img" aria-label="DNS Rebinding: בשלב הבדיקה הדומיין נפתר לכתובת חיצונית ועובר, ובשלב השליחה עם TTL אפס הוא נפתר מחדש לכתובת פנימית ומגיע ל-SSRF">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-inp{0.00%{stroke:var(--pink);stroke-width:2.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}20.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inp .shp{animation-name:k-inp;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-chk{0.00%{stroke-width:1.5;}13.96%{stroke-width:1.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}37.39%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-chk .shp{animation-name:k-chk;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dec{0.00%{stroke-width:1.5;}31.08%{stroke-width:1.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}54.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-dec .shp{animation-name:k-dec;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-snd{0.00%{stroke-width:1.5;}48.20%{stroke-width:1.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}71.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-snd .shp{animation-name:k-snd;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}65.32%{stroke-width:1.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}13.96%{stroke-width:1.6;}17.12%{stroke:var(--pink);stroke-width:2.4;}34.23%{stroke:var(--pink);stroke-width:2.4;}37.39%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}31.08%{stroke-width:1.6;}34.23%{stroke:var(--pink);stroke-width:2.4;}51.35%{stroke:var(--pink);stroke-width:2.4;}54.50%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}65.32%{stroke-width:1.6;}68.47%{stroke:var(--pink);stroke-width:2.4;}85.59%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-chk-0{opacity:0;}
@keyframes k-dyn-chk-0{0.00%{opacity:1;}17.12%{opacity:1;}20.27%{opacity:0;}100.00%{opacity:0;}}
.dyn-chk-0{animation-name:k-dyn-chk-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-chk-1{opacity:1;}
@keyframes k-dyn-chk-1{0.00%{opacity:0;}13.96%{opacity:0;}17.12%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-chk-1{animation-name:k-dyn-chk-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-snd-0{opacity:0;}
@keyframes k-dyn-snd-0{0.00%{opacity:1;}51.35%{opacity:1;}54.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-snd-0{animation-name:k-dyn-snd-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-snd-1{opacity:1;}
@keyframes k-dyn-snd-1{0.00%{opacity:0;}48.20%{opacity:0;}51.35%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-snd-1{animation-name:k-dyn-snd-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="192.0,76.0 192.0,116.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="192.0,162.0 192.0,202.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="322.1,267.0 388.1,267.0" marker-end="url(#arr)"/>
<text class="lbl" x="355.1" y="255.0" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="192.0,332.1 192.0,372.1" marker-end="url(#arr)"/>
<text class="lbl" x="206.0" y="356.1" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="192.0,418.1 192.0,458.1" marker-end="url(#arr)"/>
<g id="el-inp">
<rect class="n-code-bg shp" x="61.2" y="16.0" width="261.7" height="60.0" rx="7"/>
<text class="code" x="192.0" y="43.0" text-anchor="middle">url = http://attacker.com</text>
<text class="code" x="192.0" y="65.0" text-anchor="middle">TTL = 0</text>
</g>
<g id="el-chk">
<rect class="n-box shp" x="41.8" y="116.0" width="300.4" height="46.0" rx="8"/>
<text class="t dyn-chk-0" x="192.0" y="144.0" text-anchor="middle">שלב הבדיקה - פותר DNS</text>
<text class="t dyn-chk-1" x="192.0" y="144.0" text-anchor="middle">התשובה: 1.2.3.4 כתובת חיצונית</text>
</g>
<g id="el-dec">
<polygon class="n-dia shp" points="192.0,202.0 322.1,267.0 192.0,332.1 61.9,267.0"/>
<text class="t" x="192.0" y="272.0" text-anchor="middle">כתובת פנימית?</text>
</g>
<g id="el-blocked">
<rect class="n-box shp" x="388.1" y="244.0" width="96.0" height="46.0" rx="8"/>
<text class="t" x="436.1" y="272.0" text-anchor="middle">נחסם</text>
</g>
<g id="el-snd">
<rect class="n-box shp" x="36.3" y="372.1" width="311.5" height="46.0" rx="8"/>
<text class="t dyn-snd-0" x="192.0" y="400.1" text-anchor="middle">שלב השליחה - פותר DNS שוב</text>
<text class="t dyn-snd-1" x="192.0" y="400.1" text-anchor="middle">התשובה: 127.0.0.1 כתובת פנימית</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="39.2" y="458.1" width="305.7" height="46.0" rx="8"/>
<text class="t" x="192.0" y="486.1" text-anchor="middle">הבקשה נשלחת ל-127.0.0.1 - SSRF</text>
</g>
<g id="el-cap">
<text class="small" x="192.0" y="557.1" text-anchor="middle">ההגנה בדקה כתובת אחת אבל הבקשה נשלחה לכתובת אחרת</text>
</g>
</svg>
