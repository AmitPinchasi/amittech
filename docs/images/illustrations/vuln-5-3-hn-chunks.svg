@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
