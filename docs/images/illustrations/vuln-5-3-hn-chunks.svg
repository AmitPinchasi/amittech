@keyframes k-dyn-counter-1{0.00%{opacity:0;}16.48%{opacity:0;}20.45%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-counter-1{animation-name:k-dyn-counter-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-counter-2{opacity:1;}
