@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.68%{stroke-width:1.6;}11.11%{stroke:var(--pink);stroke-width:2.4;}22.22%{stroke:var(--pink);stroke-width:2.4;}24.65%{stroke-width:1.6;}53.13%{stroke-width:1.6;}55.56%{stroke:var(--pink);stroke-width:2.4;}66.67%{stroke:var(--pink);stroke-width:2.4;}69.10%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}19.79%{stroke-width:1.6;}22.22%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}35.76%{stroke-width:1.6;}64.24%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}77.78%{stroke:var(--pink);stroke-width:2.4;}80.21%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.90%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}44.44%{stroke:var(--pink);stroke-width:2.4;}46.88%{stroke-width:1.6;}75.35%{stroke-width:1.6;}77.78%{stroke:var(--pink);stroke-width:2.4;}88.89%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}42.01%{stroke-width:1.6;}44.44%{stroke:var(--pink);stroke-width:2.4;}55.56%{stroke:var(--pink);stroke-width:2.4;}57.99%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-mem-0{opacity:1;}
@keyframes k-dyn-mem-0{0.00%{opacity:1;}11.11%{opacity:1;}13.54%{opacity:0;}30.90%{opacity:0;}33.33%{opacity:1;}55.56%{opacity:1;}57.99%{opacity:0;}75.35%{opacity:0;}77.78%{opacity:1;}88.89%{opacity:1;}100.00%{opacity:1;}}
.dyn-mem-0{animation-name:k-dyn-mem-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-mem-1{opacity:0;}
@keyframes k-dyn-mem-1{0.00%{opacity:0;}8.68%{opacity:0;}11.11%{opacity:1;}33.33%{opacity:1;}35.76%{opacity:0;}53.13%{opacity:0;}55.56%{opacity:1;}77.78%{opacity:1;}80.21%{opacity:0;}100.00%{opacity:0;}}
.dyn-mem-1{animation-name:k-dyn-mem-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="249.9,76.0 249.9,116.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="249.9,162.0 249.9,202.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="249.9,248.0 249.9,288.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="100.9,311.0 16.0,311.0 16.0,46.0 119.0,46.0" marker-end="url(#arr)"/>
<text class="small" x="67.5" y="34.0" text-anchor="middle">החזרה הבאה</text>
<g id="el-loopc">
<rect class="n-code-bg shp" x="119.0" y="16.0" width="261.7" height="60.0" rx="7"/>
<text class="code" x="249.9" y="43.0" text-anchor="middle">for _ in range(1, 10000):</text>
<text class="code" x="249.9" y="65.0" text-anchor="middle">    a = A()</text>
</g>
<g id="el-new">
<rect class="n-box shp" x="96.0" y="116.0" width="307.8" height="46.0" rx="8"/>
<text class="t" x="249.9" y="144.0" text-anchor="middle">נוצר אובייקט חדש, a מצביע עליו</text>
</g>
<g id="el-old">
<rect class="n-box shp" x="96.0" y="202.0" width="307.8" height="46.0" rx="8"/>
<text class="t" x="249.9" y="230.0" text-anchor="middle">האובייקט הקודם נשאר בלי מצביע</text>
</g>
<g id="el-gc">
