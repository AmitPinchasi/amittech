<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 582 487" width="582" role="img" aria-label="השמה לפרופרטי מפעילה את מתודת ה-setter שבודקת את הערך לפני שמירתו בשדה הפרטי">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-assign{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-assign .shp{animation-name:k-assign;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-setter{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-setter .shp{animation-name:k-setter;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-chk{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-chk .shp{animation-name:k-chk;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-field{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-field .shp{animation-name:k-field;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-chk-0{opacity:0;}
@keyframes k-dyn-chk-0{0.00%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-chk-0{animation-name:k-dyn-chk-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-chk-1{opacity:1;}
@keyframes k-dyn-chk-1{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-chk-1{animation-name:k-dyn-chk-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-field-0{opacity:0;}
@keyframes k-dyn-field-0{0.00%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-field-0{animation-name:k-dyn-field-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-field-1{opacity:1;}
@keyframes k-dyn-field-1{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-field-1{animation-name:k-dyn-field-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="164.9,54.0 164.9,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="164.9,140.0 164.9,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="313.9,254.5 379.9,254.5" marker-end="url(#arr)"/>
<text class="lbl" x="346.9" y="242.5" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="164.9,328.9 164.9,368.9" marker-end="url(#arr)"/>
<text class="lbl" x="178.9" y="352.9" text-anchor="end">לא</text>
<g id="el-assign">
<rect class="n-code-bg shp" x="38.6" y="16.0" width="252.7" height="38.0" rx="7"/>
<text class="code" x="164.9" y="43.0" text-anchor="middle">temperature.celsius = 30</text>
</g>
<g id="el-setter">
<rect class="n-box shp" x="56.1" y="94.0" width="217.7" height="46.0" rx="8"/>
<text class="t" x="164.9" y="122.0" text-anchor="middle">מתודת ה-setter נקראת</text>
</g>
<g id="el-chk">
<polygon class="n-dia shp" points="164.9,180.0 313.9,254.5 164.9,328.9 16.0,254.5"/>
<text class="code dyn-chk-0" x="164.9" y="259.5" text-anchor="middle">value &lt; -273.15</text>
<text class="code dyn-chk-1" x="164.9" y="259.5" text-anchor="middle">30 &lt; -273.15</text>
</g>
<g id="el-err">
<rect class="n-box shp" x="379.9" y="231.5" width="185.8" height="46.0" rx="8"/>
<text class="t" x="472.8" y="259.5" text-anchor="middle">נזרקת ValueError</text>
</g>
<g id="el-field">
<rect class="n-box shp" x="88.7" y="368.9" width="152.6" height="44.0" rx="8"/>
<text class="t-b dyn-field-0" x="164.9" y="395.9" text-anchor="middle" style="direction:ltr">_celsius = 25</text>
<text class="t-b dyn-field-1" x="164.9" y="395.9" text-anchor="middle" style="direction:ltr">_celsius = 30</text>
</g>
<g id="el-note">
<text class="small" x="164.9" y="465.9" text-anchor="middle">ערך לא חוקי לעולם לא מגיע לשדה הפרטי</text>
</g>
</svg>
