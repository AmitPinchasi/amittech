<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 807 250" width="807" role="img" aria-label="ארכיטקטורת MCP: המארחים - Claude Code, Claude Desktop וה-Agent SDK - מדברים עם שרת ה-MCP שלנו דרך הפרוטוקול, והשרת חושף שלושה סוגי יכולות: כלים, משאבים ותבניות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="395.0,62.0 395.0,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="409.0" y="86.0" text-anchor="end">פרוטוקול MCP - JSON-RPC</text>
<polyline id="edge-1" class="edge" points="395.0,148.0 395.0,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="528.5,125.0 594.5,125.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="261.4,125.0 195.4,125.0" marker-end="url(#arr)"/>
<g id="el-host">
<rect class="n-box shp" x="207.5" y="16.0" width="375.0" height="46.0" rx="8"/>
<text class="t" x="395.0" y="44.0" text-anchor="middle">מארחים - Claude Code, Desktop, Agent SDK</text>
</g>
<g id="el-server">
<rect class="n-box shp" x="261.4" y="102.0" width="267.1" height="46.0" rx="8"/>
<text class="t" x="395.0" y="130.0" text-anchor="middle">שרת ה-MCP שלנו - weather.py</text>
</g>
<g id="el-tools">
<rect class="n-box shp" x="323.4" y="188.0" width="143.1" height="46.0" rx="8"/>
<text class="t" x="395.0" y="216.0" text-anchor="middle">כלים - Tools</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="594.5" y="102.0" width="196.2" height="46.0" rx="8"/>
<text class="t" x="692.6" y="130.0" text-anchor="middle">משאבים - Resources</text>
</g>
<g id="el-prompts">
<rect class="n-box shp" x="16.0" y="102.0" width="179.4" height="46.0" rx="8"/>
<text class="t" x="105.7" y="130.0" text-anchor="middle">תבניות - Prompts</text>
</g>
</svg>
