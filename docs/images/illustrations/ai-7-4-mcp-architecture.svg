<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 511 452" width="511" role="img" aria-label="ארכיטקטורת MCP: כל המארחים - Claude Code, Claude Desktop וה-Agent SDK - מדברים דרך הפרוטוקול עם שרת ה-MCP שלנו, ושרת אחד חושף שלושה סוגי יכולות: כלים, משאבים ותבניות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-hosts">
<rect id="el-hosts-c0" class="n-cell shp" x="348.5" y="16.0" width="146.3" height="46.0" rx="6"/>
<text class="t" x="421.7" y="44.0" text-anchor="middle" style="direction:ltr">Claude Code</text>
<rect id="el-hosts-c1" class="n-cell shp" x="182.3" y="16.0" width="146.3" height="46.0" rx="6"/>
<text class="t" x="255.4" y="44.0" text-anchor="middle" style="direction:ltr">Claude Desktop</text>
<rect id="el-hosts-c2" class="n-cell shp" x="16.0" y="16.0" width="146.3" height="46.0" rx="6"/>
<text class="t" x="89.1" y="44.0" text-anchor="middle" style="direction:ltr">Agent SDK</text>
</g>
<g id="el-hlbl">
<text class="small" x="255.4" y="115.0" text-anchor="middle">מארחים - כל אחד יכול להתחבר</text>
</g>
<g id="el-proto">
<rect class="n-box shp" x="128.7" y="160.0" width="253.3" height="46.0" rx="8"/>
<text class="t" x="255.4" y="188.0" text-anchor="middle">פרוטוקול MCP - JSON-RPC</text>
</g>
<g id="el-server">
<rect class="n-box shp" x="121.9" y="246.0" width="267.1" height="46.0" rx="8"/>
<text class="t" x="255.4" y="274.0" text-anchor="middle">שרת ה-MCP שלנו - weather.py</text>
</g>
<g id="el-caps">
<rect id="el-caps-c0" class="n-cell shp" x="328.2" y="332.0" width="105.6" height="46.0" rx="6"/>
<text class="t" x="381.0" y="360.0" text-anchor="middle" style="direction:ltr">Tools</text>
<rect id="el-caps-c1" class="n-cell shp" x="202.6" y="332.0" width="105.6" height="46.0" rx="6"/>
<text class="t" x="255.4" y="360.0" text-anchor="middle" style="direction:ltr">Resources</text>
<rect id="el-caps-c2" class="n-cell shp" x="77.0" y="332.0" width="105.6" height="46.0" rx="6"/>
<text class="t" x="129.8" y="360.0" text-anchor="middle" style="direction:ltr">Prompts</text>
</g>
<g id="el-clbl">
<text class="small" x="255.4" y="431.0" text-anchor="middle">שרת אחד חושף שלוש יכולות - ועובד בכל מארח</text>
</g>
</svg>
