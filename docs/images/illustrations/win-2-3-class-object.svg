<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 479 374" width="479" role="img" aria-label="יצירת אובייקט ממחלקה ב-PowerShell: הקונסטרוקטור ממלא את השדות Name ו-Age, והמתודה Greet קוראת מהם ומרכיבה את הודעת הברכה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-ctor{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ctor .shp{animation-name:k-ctor;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-obj{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-obj .shp{animation-name:k-obj;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-greet{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-greet .shp{animation-name:k-greet;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}40.91%{stroke:var(--pink);stroke-width:2.4;}44.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.93%{stroke-width:1.6;}40.91%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj-0{opacity:0;}
@keyframes k-dyn-obj-0{0.00%{opacity:1;}20.45%{opacity:1;}24.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-obj-0{animation-name:k-dyn-obj-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj-1{opacity:1;}
@keyframes k-dyn-obj-1{0.00%{opacity:0;}16.48%{opacity:0;}20.45%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-obj-1{animation-name:k-dyn-obj-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-0{opacity:0;}
@keyframes k-dyn-out-0{0.00%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-0{animation-name:k-dyn-out-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-1{opacity:1;}
@keyframes k-dyn-out-1{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-out-1{animation-name:k-dyn-out-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="239.3,54.0 239.3,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="253.3" y="78.0" text-anchor="end">ממלא את השדות</text>
<polyline id="edge-1" class="edge" points="239.3,138.0 239.3,178.0" marker-end="url(#arr)"/>
<text class="lbl" x="253.3" y="162.0" text-anchor="end">קוראים למתודה</text>
<polyline id="edge-2" class="edge" points="239.3,216.0 239.3,256.0" marker-end="url(#arr)"/>
<text class="lbl" x="253.3" y="240.0" text-anchor="end">קוראת מהשדות</text>
<g id="el-ctor">
<rect class="n-code-bg shp" x="63.4" y="16.0" width="352.0" height="38.0" rx="7"/>
<text class="code" x="239.3" y="43.0" text-anchor="middle">$person = [Person]::new("John", 30)</text>
</g>
<g id="el-obj">
<rect class="n-box shp" x="85.4" y="94.0" width="307.8" height="44.0" rx="8"/>
<text class="t-b dyn-obj-0" x="239.3" y="121.0" text-anchor="middle" style="direction:ltr">Person { Name = ? , Age = ? }</text>
<text class="t-b dyn-obj-1" x="239.3" y="121.0" text-anchor="middle" style="direction:ltr">Person { Name = John , Age = 30 }</text>
</g>
<g id="el-greet">
<rect class="n-code-bg shp" x="153.6" y="178.0" width="171.4" height="38.0" rx="7"/>
<text class="code" x="239.3" y="205.0" text-anchor="middle">$person.Greet()</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="34.0" y="256.0" width="410.6" height="44.0" rx="8"/>
<text class="t-b dyn-out-0" x="239.3" y="283.0" text-anchor="middle">המתודה עדיין לא רצה</text>
<text class="t-b dyn-out-1" x="239.3" y="283.0" text-anchor="middle" style="direction:ltr">Hello, my name is John and I am 30 years old</text>
</g>
<g id="el-note">
<text class="small" x="239.3" y="353.0" text-anchor="middle">האובייקט מחזיק את הנתונים בשדות, והמתודה קוראת אותם בזמן ריצה</text>
</g>
</svg>
