<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 329 368" width="329" role="img" aria-label="צינור בבאש: הפלט של כל פקודה הופך לקלט של הבאה, וכמות השורות מצטמצמת לאורך השרשרת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-c1{0.00%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-c1 .shp{animation-name:k-c1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-c2{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-c2 .shp{animation-name:k-c2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-c3{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-c3 .shp{animation-name:k-c3;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-data{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-data .shp{animation-name:k-data;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.07%{stroke-width:1.6;}20.24%{stroke:var(--pink);stroke-width:2.4;}40.48%{stroke:var(--pink);stroke-width:2.4;}44.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.31%{stroke-width:1.6;}40.48%{stroke:var(--pink);stroke-width:2.4;}60.71%{stroke:var(--pink);stroke-width:2.4;}64.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}56.55%{stroke-width:1.6;}60.71%{stroke:var(--pink);stroke-width:2.4;}80.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-data-0{opacity:0;}
@keyframes k-dyn-data-0{0.00%{opacity:1;}20.24%{opacity:1;}24.40%{opacity:0;}100.00%{opacity:0;}}
.dyn-data-0{animation-name:k-dyn-data-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-data-1{opacity:0;}
@keyframes k-dyn-data-1{0.00%{opacity:0;}16.07%{opacity:0;}20.24%{opacity:1;}40.48%{opacity:1;}44.64%{opacity:0;}100.00%{opacity:0;}}
.dyn-data-1{animation-name:k-dyn-data-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-data-2{opacity:1;}
@keyframes k-dyn-data-2{0.00%{opacity:0;}36.31%{opacity:0;}40.48%{opacity:1;}80.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-data-2{animation-name:k-dyn-data-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="164.7,54.0 164.7,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="178.7" y="78.0" text-anchor="end" style="direction:ltr">|</text>
<polyline id="edge-1" class="edge" points="164.7,132.0 164.7,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="178.7" y="156.0" text-anchor="end" style="direction:ltr">|</text>
<polyline id="edge-2" class="edge" points="164.7,210.0 164.7,250.0" marker-end="url(#arr)"/>
<text class="lbl" x="178.7" y="234.0" text-anchor="end">פלט סופי</text>
<g id="el-c1">
<rect class="n-code-bg shp" x="116.7" y="16.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="164.7" y="43.0" text-anchor="middle">ls -la</text>
</g>
<g id="el-c2">
<rect class="n-code-bg shp" x="106.1" y="94.0" width="117.2" height="38.0" rx="7"/>
<text class="code" x="164.7" y="121.0" text-anchor="middle">head -n 5</text>
</g>
<g id="el-c3">
<rect class="n-code-bg shp" x="106.1" y="172.0" width="117.2" height="38.0" rx="7"/>
<text class="code" x="164.7" y="199.0" text-anchor="middle">tail -n 2</text>
</g>
<g id="el-data">
<rect class="n-box shp" x="103.0" y="250.0" width="123.6" height="44.0" rx="8"/>
<text class="t-b dyn-data-0" x="164.7" y="277.0" text-anchor="middle">12 שורות</text>
<text class="t-b dyn-data-1" x="164.7" y="277.0" text-anchor="middle">5 שורות</text>
<text class="t-b dyn-data-2" x="164.7" y="277.0" text-anchor="middle">2 שורות</text>
</g>
<g id="el-note">
<text class="small" x="164.7" y="347.0" text-anchor="middle">הפלט של כל פקודה הופך לקלט של הפקודה הבאה</text>
</g>
</svg>
