@keyframes k-hijack{0.00%{stroke-width:1.5;}67.81%{stroke-width:1.5;}70.00%{stroke:var(--pink);stroke-width:2.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}82.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
