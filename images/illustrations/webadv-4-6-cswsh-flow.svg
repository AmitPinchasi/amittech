#el-visit .shp{animation-name:k-visit;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-open{0.00%{stroke-width:1.5;}17.81%{stroke-width:1.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}30.00%{stroke:var(--pink);stroke-width:2.5;}32.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-open .shp{animation-name:k-open;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
