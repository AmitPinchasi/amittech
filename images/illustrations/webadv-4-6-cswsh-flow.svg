@keyframes k-originq{0.00%{stroke-width:1.5;}37.81%{stroke-width:1.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}52.19%{stroke-width:1.5;}57.81%{stroke-width:1.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}70.00%{stroke:var(--pink);stroke-width:2.5;}72.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
