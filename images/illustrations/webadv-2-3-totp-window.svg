@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}9.50%{transform:translateX(0.0px);}12.40%{transform:translateX(232.0px);}21.90%{transform:translateX(232.0px);}24.79%{transform:translateX(116.0px);}34.30%{transform:translateX(116.0px);}37.19%{transform:translateX(0.0px);}46.69%{transform:translateX(0.0px);}49.59%{transform:translateX(-116.0px);}59.09%{transform:translateX(-116.0px);}61.98%{transform:translateX(-232.0px);}71.49%{transform:translateX(-232.0px);}74.38%{transform:translateX(0.0px);}83.88%{transform:translateX(0.0px);}100.00%{transform:translateX(0.0px);}}
