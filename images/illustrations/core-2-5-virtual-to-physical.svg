.dyn-walk-2{animation-name:k-dyn-walk-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-walk-3{opacity:1;}
@keyframes k-dyn-walk-3{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-walk-3{animation-name:k-dyn-walk-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-phys-0{opacity:0;}
@keyframes k-dyn-phys-0{0.00%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-phys-0{animation-name:k-dyn-phys-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-phys-1{opacity:1;}
@keyframes k-dyn-phys-1{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-phys-1{animation-name:k-dyn-phys-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:0;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-3{opacity:1;}
@keyframes k-dyn-note-3{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-3{animation-name:k-dyn-note-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="193.1" y="16.0" width="225.6" height="38.0" rx="7"/>
<text class="code" x="305.9" y="43.0" text-anchor="middle">mov eax, [0x00400234]</text>
</g>
<g id="el-parts">
<rect id="el-parts-c0" class="n-cell shp" x="399.2" y="94.0" width="146.6" height="46.0" rx="6"/>
<text class="t" x="472.5" y="122.0" text-anchor="middle" style="direction:ltr">Offset = 0x234</text>
<rect id="el-parts-c1" class="n-cell shp" x="232.6" y="94.0" width="146.6" height="46.0" rx="6"/>
<text class="t" x="305.9" y="122.0" text-anchor="middle" style="direction:ltr">Table = 0</text>
<rect id="el-parts-c2" class="n-cell shp" x="66.0" y="94.0" width="146.6" height="46.0" rx="6"/>
<text class="t" x="139.3" y="122.0" text-anchor="middle" style="direction:ltr">Directory = 1</text>
</g>
<g id="el-walk">
<rect class="n-box shp" x="168.5" y="180.0" width="274.8" height="44.0" rx="8"/>
<text class="t-b dyn-walk-0" x="305.9" y="207.0" text-anchor="middle" style="direction:ltr">CR3 = 0x00009000</text>
<text class="t-b dyn-walk-1" x="305.9" y="207.0" text-anchor="middle" style="direction:ltr">directory[1] = 0x0000A000</text>
<text class="t-b dyn-walk-2" x="305.9" y="207.0" text-anchor="middle" style="direction:ltr">table[0] = 0x00120000</text>
<text class="t-b dyn-walk-3" x="305.9" y="207.0" text-anchor="middle" style="direction:ltr">0x00120000 + 0x234</text>
</g>
<g id="el-phys">
<rect class="n-box shp" x="185.0" y="264.0" width="241.8" height="44.0" rx="8"/>
<text class="t-b dyn-phys-0" x="305.9" y="291.0" text-anchor="middle" style="direction:ltr">physical = ?</text>
<text class="t-b dyn-phys-1" x="305.9" y="291.0" text-anchor="middle" style="direction:ltr">physical = 0x00120234</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="32.0" y="348.0" width="547.7" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="305.9" y="376.0" text-anchor="middle">הרגיסטר cr3 מחזיק את כתובת טבלת ה-Page Directory של התוכנה</text>
<text class="t dyn-note-1" x="305.9" y="376.0" text-anchor="middle">עשרת הביטים העליונים בוחרים שורה בטבלת ה-Page Directory</text>
<text class="t dyn-note-2" x="305.9" y="376.0" text-anchor="middle">עשרת הביטים הבאים בוחרים שורה בטבלת ה-Page Table</text>
<text class="t dyn-note-3" x="305.9" y="376.0" text-anchor="middle">שנים עשר הביטים האחרונים הם ההיסט בתוך המסגרת בת 4KB</text>
</g>
<g id="el-cap">
<text class="small" x="305.9" y="447.0" text-anchor="middle">לכל תוכנה יש טבלאות משלה, ולכן אותה כתובת וירטואלית מובילה למסגרת אחרת בכל תוכנה</text>
</g>
