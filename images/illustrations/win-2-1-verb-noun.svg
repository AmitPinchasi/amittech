<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 456 300" width="456" role="img" aria-label="מבנה שם הפקודה ב-PowerShell: הפקודה Get-Process מתפרקת לשני חלקים סביב המקף, פועל שאומר מה עושים ועצם שאומר על מה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cmd{0.00%{stroke:var(--pink);stroke-width:2.5;}25.37%{stroke:var(--pink);stroke-width:2.5;}30.60%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmd .shp{animation-name:k-cmd;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-verb{0.00%{stroke-width:1.5;}20.15%{stroke-width:1.5;}25.37%{stroke:var(--pink);stroke-width:2.5;}50.75%{stroke:var(--pink);stroke-width:2.5;}55.97%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-verb .shp{animation-name:k-verb;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-noun{0.00%{stroke-width:1.5;}45.52%{stroke-width:1.5;}50.75%{stroke:var(--pink);stroke-width:2.5;}76.12%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-noun .shp{animation-name:k-noun;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}20.15%{stroke-width:1.6;}25.37%{stroke:var(--pink);stroke-width:2.4;}50.75%{stroke:var(--pink);stroke-width:2.4;}55.97%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}45.52%{stroke-width:1.6;}50.75%{stroke:var(--pink);stroke-width:2.4;}76.12%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="227.9,54.0 227.9,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="241.9" y="78.0" text-anchor="end">החלק הראשון</text>
<polyline id="edge-1" class="edge" points="227.9,140.0 227.9,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="241.9" y="164.0" text-anchor="end">החלק השני</text>
<g id="el-cmd">
<rect class="n-code-bg shp" x="160.3" y="16.0" width="135.3" height="38.0" rx="7"/>
<text class="code" x="227.9" y="43.0" text-anchor="middle">Get-Process</text>
</g>
<g id="el-verb">
<rect class="n-box shp" x="73.7" y="94.0" width="308.4" height="46.0" rx="8"/>
<text class="t" x="227.9" y="122.0" text-anchor="middle">לפני המקף - הפועל Get: מה עושים</text>
</g>
<g id="el-noun">
<rect class="n-box shp" x="76.4" y="180.0" width="303.1" height="46.0" rx="8"/>
<text class="t" x="227.9" y="208.0" text-anchor="middle">אחרי המקף - העצם Process: על מה</text>
</g>
<g id="el-note">
<text class="small" x="227.9" y="279.0" text-anchor="middle">כל פקודה בנויה כך: פועל, מקף, עצם. למשל Stop-Process, New-Item</text>
</g>
</svg>
