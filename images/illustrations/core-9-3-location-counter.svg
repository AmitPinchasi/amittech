@keyframes k-secs-1{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-secs-c1{animation-name:k-secs-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-secs-2{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-secs-c2{animation-name:k-secs-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-secs-3{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-secs-c3{animation-name:k-secs-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}13.68%{transform:translateX(0.0px);}16.98%{transform:translateX(0.0px);}30.66%{transform:translateX(0.0px);}33.96%{transform:translateX(-116.0px);}47.64%{transform:translateX(-116.0px);}50.94%{transform:translateX(-232.0px);}64.62%{transform:translateX(-232.0px);}67.92%{transform:translateX(-348.0px);}81.60%{transform:translateX(-348.0px);}100.00%{transform:translateX(-348.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-addr-0{opacity:0;}
@keyframes k-dyn-addr-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-addr-0{animation-name:k-dyn-addr-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-addr-1{opacity:0;}
@keyframes k-dyn-addr-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-addr-1{animation-name:k-dyn-addr-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-addr-2{opacity:0;}
@keyframes k-dyn-addr-2{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-addr-2{animation-name:k-dyn-addr-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-addr-3{opacity:0;}
@keyframes k-dyn-addr-3{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-addr-3{animation-name:k-dyn-addr-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-addr-4{opacity:1;}
@keyframes k-dyn-addr-4{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-addr-4{animation-name:k-dyn-addr-4;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
