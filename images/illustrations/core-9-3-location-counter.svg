<text class="lbl" x="431.8" y="208.0" text-anchor="end">הסקשן שממוקם עכשיו</text>
<g id="el-addr">
<rect class="n-box shp" x="288.7" y="224.0" width="262.3" height="44.0" rx="8"/>
<text class="t-b dyn-addr-0" x="419.8" y="251.0" text-anchor="middle" style="direction:ltr">. = 0x400000</text>
<text class="t-b dyn-addr-1" x="419.8" y="251.0" text-anchor="middle" style="direction:ltr">.text: 0x400000 + 0x120</text>
