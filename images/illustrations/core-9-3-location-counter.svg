<text class="t" x="187.8" y="166.0" text-anchor="middle" style="direction:ltr">.data</text>
<rect id="el-secs-c3" class="n-cell shp" x="23.8" y="138.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="71.8" y="166.0" text-anchor="middle" style="direction:ltr">.bss</text>
</g>
<g id="eg-0">
