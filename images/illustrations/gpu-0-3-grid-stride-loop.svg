@keyframes k-arr-2{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-arr-c2{animation-name:k-arr-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-arr-4{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-arr-c4{animation-name:k-arr-4;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-arr-6{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
