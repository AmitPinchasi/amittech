<text class="t" x="296.0" y="122.0" text-anchor="middle" style="direction:ltr">5</text>
<rect id="el-arr-c6" class="n-cell shp" x="132.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.0" y="122.0" text-anchor="middle" style="direction:ltr">6</text>
