.dyn-cur-1{animation-name:k-dyn-cur-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-2{opacity:0;}
@keyframes k-dyn-cur-2{0.00%{opacity:0;}40.73%{opacity:0;}43.55%{opacity:1;}58.06%{opacity:1;}60.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-cur-2{animation-name:k-dyn-cur-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-3{opacity:0;}
@keyframes k-dyn-cur-3{0.00%{opacity:0;}55.24%{opacity:0;}58.06%{opacity:1;}72.58%{opacity:1;}75.40%{opacity:0;}100.00%{opacity:0;}}
.dyn-cur-3{animation-name:k-dyn-cur-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-4{opacity:1;}
