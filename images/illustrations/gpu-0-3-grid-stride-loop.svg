<rect id="el-arr-c3" class="n-cell shp" x="480.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="528.0" y="122.0" text-anchor="middle" style="direction:ltr">3</text>
<rect id="el-arr-c4" class="n-cell shp" x="364.0" y="94.0" width="96.0" height="46.0" rx="6"/>
