@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}11.69%{transform:translateX(0.0px);}14.52%{transform:translateX(0.0px);}26.21%{transform:translateX(0.0px);}29.03%{transform:translateX(-232.0px);}40.73%{transform:translateX(-232.0px);}43.55%{transform:translateX(-464.0px);}55.24%{transform:translateX(-464.0px);}58.06%{transform:translateX(-696.0px);}69.76%{transform:translateX(-696.0px);}72.58%{transform:translateX(-696.0px);}84.27%{transform:translateX(-696.0px);}100.00%{transform:translateX(-696.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-0{opacity:0;}
@keyframes k-dyn-cur-0{0.00%{opacity:1;}29.03%{opacity:1;}31.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-cur-0{animation-name:k-dyn-cur-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-1{opacity:0;}
