@keyframes k-cmem-2{0.00%{stroke:var(--pink);stroke-width:2.5;}36.67%{stroke:var(--pink);stroke-width:2.5;}42.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmem-c2{animation-name:k-cmem-2;animation-duration:6.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cmem-3{0.00%{stroke:var(--pink);stroke-width:2.5;}36.67%{stroke:var(--pink);stroke-width:2.5;}42.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmem-c3{animation-name:k-cmem-3;animation-duration:6.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke:var(--pink);stroke-width:2.4;}73.33%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-0{animation-name:k-edge-0;animation-duration:6.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cost-0{opacity:1;}
@keyframes k-dyn-cost-0{0.00%{opacity:0;}30.83%{opacity:0;}36.67%{opacity:1;}73.33%{opacity:1;}100.00%{opacity:1;}}
.dyn-cost-0{animation-name:k-dyn-cost-0;animation-duration:6.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cost-1{opacity:0;}
@keyframes k-dyn-cost-1{0.00%{opacity:1;}36.67%{opacity:1;}42.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-cost-1{animation-name:k-dyn-cost-1;animation-duration:6.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
