@keyframes k-warp-2{0.00%{stroke:var(--pink);stroke-width:2.5;}73.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-warp-c2{animation-name:k-warp-2;animation-duration:6.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-warp-3{0.00%{stroke:var(--pink);stroke-width:2.5;}73.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-warp-c3{animation-name:k-warp-3;animation-duration:6.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cmem-0{0.00%{stroke:var(--pink);stroke-width:2.5;}73.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-cmem-c0{animation-name:k-cmem-0;animation-duration:6.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cmem-1{0.00%{stroke:var(--pink);stroke-width:2.5;}36.67%{stroke:var(--pink);stroke-width:2.5;}42.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
