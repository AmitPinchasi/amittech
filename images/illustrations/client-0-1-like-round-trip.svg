<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 464 323" width="464" role="img" aria-label="מסלול לחיצה על לייק: הפרונטאנד שולח בקשה, הבאקאנד שומר במסד הנתונים ומחזיר תשובה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-btn{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-btn .shp{animation-name:k-btn;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-req{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-srv{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-srv .shp{animation-name:k-srv;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-resp{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-resp .shp{animation-name:k-resp;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-btn-0{opacity:0;}
@keyframes k-dyn-btn-0{0.00%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-btn-0{animation-name:k-dyn-btn-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-btn-1{opacity:1;}
@keyframes k-dyn-btn-1{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-btn-1{animation-name:k-dyn-btn-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="271.9,65.0 271.9,105.0" marker-end="url(#arr)"/>
<text class="lbl" x="285.9" y="89.0" text-anchor="end">לחיצה על הכפתור</text>
<polyline id="edge-1" class="edge" points="271.9,143.0 271.9,183.0" marker-end="url(#arr)"/>
<text class="lbl" x="285.9" y="167.0" text-anchor="end">הבקשה מגיעה לשרת</text>
<polyline id="edge-2" class="edge" points="271.9,229.0 271.9,269.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="223.9,288.0 16.0,288.0 16.0,42.0 204.7,42.0" marker-end="url(#arr)"/>
<text class="small" x="110.3" y="30.0" text-anchor="middle">הפרונטאנד מעדכן את המסך</text>
<g id="el-btn">
<rect class="n-box shp" x="204.7" y="19.0" width="134.4" height="46.0" rx="8"/>
<text class="t dyn-btn-0" x="271.9" y="47.0" text-anchor="middle">לייקים: 42</text>
<text class="t dyn-btn-1" x="271.9" y="47.0" text-anchor="middle">לייקים: 43</text>
</g>
<g id="el-req">
<rect class="n-code-bg shp" x="208.8" y="105.0" width="126.3" height="38.0" rx="7"/>
<text class="code" x="271.9" y="132.0" text-anchor="middle">POST /like</text>
</g>
<g id="el-srv">
<rect class="n-box shp" x="96.0" y="183.0" width="351.8" height="46.0" rx="8"/>
<text class="t" x="271.9" y="211.0" text-anchor="middle">הבאקאנד שומר את הלייק במסד הנתונים</text>
</g>
<g id="el-resp">
<rect class="n-code-bg shp" x="223.9" y="269.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="271.9" y="296.0" text-anchor="middle">200 OK</text>
</g>
</svg>
