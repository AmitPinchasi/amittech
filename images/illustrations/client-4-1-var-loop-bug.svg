<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="424.2" height="82.0" rx="7"/>
<text class="code" x="228.1" y="43.0" text-anchor="middle">for (var i = 0; i &lt; 3; i++) {</text>
<text class="code" x="228.1" y="65.0" text-anchor="middle">    setTimeout(() =&gt; console.log(i), 1000);</text>
<text class="code" x="228.1" y="87.0" text-anchor="middle">}</text>
</g>
