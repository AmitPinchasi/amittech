.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-ivar{0.00%{stroke:var(--pink);stroke-width:2.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}15.23%{stroke-width:1.5;}47.27%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}87.50%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
