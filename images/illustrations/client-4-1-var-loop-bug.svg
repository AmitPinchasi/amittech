<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 456 430" width="456" role="img" aria-label="הבאג הקלאסי של var בלולאה: שלושת הקולבקים של setTimeout חולקים את אותו משתנה i, ולכן כולם מדפיסים 3">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
