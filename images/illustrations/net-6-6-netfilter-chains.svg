<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 487 608" width="487" role="img" aria-label="מסע פאקטה דרך שרשראות ה-netfilter בלינוקס: אחרי PREROUTING מתקבלת החלטת ניתוב, פאקטה ליעד מקומי עוברת ל-INPUT ואילו פאקטה שממשיכה הלאה עוברת ל-FORWARD ואז ל-POSTROUTING ביציאה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-in{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-in .shp{animation-name:k-in;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pre{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pre .shp{animation-name:k-pre;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-route{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-route .shp{animation-name:k-route;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fwd{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fwd .shp{animation-name:k-fwd;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-post{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-post .shp{animation-name:k-post;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}40.73%{stroke-width:1.6;}43.55%{stroke:var(--pink);stroke-width:2.4;}58.06%{stroke:var(--pink);stroke-width:2.4;}60.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}55.24%{stroke-width:1.6;}58.06%{stroke:var(--pink);stroke-width:2.4;}72.58%{stroke:var(--pink);stroke-width:2.4;}75.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="162.4,62.0 162.4,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="162.4,148.0 162.4,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="308.7,261.2 374.7,261.2" marker-end="url(#arr)"/>
<text class="lbl" x="341.7" y="249.2" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="162.4,334.4 162.4,374.4" marker-end="url(#arr)"/>
<text class="lbl" x="176.4" y="358.4" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="162.4,420.4 162.4,460.4" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="162.4,506.4 162.4,546.4" marker-end="url(#arr)"/>
<g id="el-in">
<rect class="n-box shp" x="89.1" y="16.0" width="146.5" height="46.0" rx="8"/>
<text class="t" x="162.4" y="44.0" text-anchor="middle">פאקטה נכנסת</text>
</g>
<g id="el-pre">
<rect class="n-box shp" x="88.3" y="102.0" width="148.2" height="46.0" rx="8"/>
<text class="t" x="162.4" y="130.0" text-anchor="middle" style="direction:ltr">PREROUTING</text>
</g>
<g id="el-route">
<polygon class="n-dia shp" points="162.4,188.0 308.7,261.2 162.4,334.4 16.0,261.2"/>
<text class="t" x="162.4" y="266.2" text-anchor="middle">היעד הוא המחשב?</text>
</g>
<g id="el-input">
<rect class="n-box shp" x="374.7" y="238.2" width="96.1" height="46.0" rx="8"/>
<text class="t" x="422.8" y="266.2" text-anchor="middle" style="direction:ltr">INPUT</text>
</g>
<g id="el-fwd">
<rect class="n-box shp" x="103.9" y="374.4" width="116.9" height="46.0" rx="8"/>
<text class="t" x="162.4" y="402.4" text-anchor="middle" style="direction:ltr">FORWARD</text>
</g>
<g id="el-post">
<rect class="n-box shp" x="83.1" y="460.4" width="158.6" height="46.0" rx="8"/>
<text class="t" x="162.4" y="488.4" text-anchor="middle" style="direction:ltr">POSTROUTING</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="89.1" y="546.4" width="146.5" height="46.0" rx="8"/>
<text class="t" x="162.4" y="574.4" text-anchor="middle">פאקטה יוצאת</text>
</g>
</svg>
