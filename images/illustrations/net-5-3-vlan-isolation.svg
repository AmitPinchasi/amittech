<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 596 396" width="596" role="img" aria-label="תרשים זרימה של הפרדת VLAN: מסגרת מ-VLAN 10 ליעד ב-VLAN 20 אינה באותו VLAN, ולכן היא חייבת לעבור דרך Router שבו מדיניות הגישה מחליטה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-frame{0.00%{stroke:var(--pink);stroke-width:2.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}24.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-frame .shp{animation-name:k-frame;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-same{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-same .shp{animation-name:k-same;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-router{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-router .shp{animation-name:k-router;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-policy{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-policy .shp{animation-name:k-policy;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.07%{stroke-width:1.6;}20.24%{stroke:var(--pink);stroke-width:2.4;}40.48%{stroke:var(--pink);stroke-width:2.4;}44.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}36.31%{stroke-width:1.6;}40.48%{stroke:var(--pink);stroke-width:2.4;}60.71%{stroke:var(--pink);stroke-width:2.4;}64.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}56.55%{stroke-width:1.6;}60.71%{stroke:var(--pink);stroke-width:2.4;}80.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="172.7,62.0 172.7,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="279.2,155.2 345.2,155.2" marker-end="url(#arr)"/>
<text class="lbl" x="312.2" y="143.2" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="172.7,208.4 172.7,248.4" marker-end="url(#arr)"/>
<text class="lbl" x="186.7" y="232.4" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="172.7,294.4 172.7,334.4" marker-end="url(#arr)"/>
<g id="el-frame">
<rect class="n-box shp" x="16.0" y="16.0" width="313.5" height="46.0" rx="8"/>
<text class="t" x="172.7" y="44.0" text-anchor="middle">מסגרת מ-VLAN 10 ליעד ב-VLAN 20</text>
</g>
<g id="el-same">
<polygon class="n-dia shp" points="172.7,102.0 279.2,155.2 172.7,208.4 66.3,155.2"/>
<text class="t" x="172.7" y="160.2" text-anchor="middle">אותו VLAN ?</text>
</g>
<g id="el-deliver">
<rect class="n-box shp" x="345.2" y="132.2" width="234.5" height="46.0" rx="8"/>
<text class="t" x="462.4" y="160.2" text-anchor="middle">מעבר ישיר דרך ה-Switch</text>
</g>
<g id="el-router">
<rect class="n-box shp" x="20.7" y="248.4" width="304.1" height="46.0" rx="8"/>
<text class="t" x="172.7" y="276.4" text-anchor="middle">חייב לעבור דרך Router - Layer 3</text>
</g>
<g id="el-policy">
<rect class="n-box shp" x="28.6" y="334.4" width="288.3" height="46.0" rx="8"/>
<text class="t" x="172.7" y="362.4" text-anchor="middle">מדיניות גישה מחליטה אם לאשר</text>
</g>
</svg>
