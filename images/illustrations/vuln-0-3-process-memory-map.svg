<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 682" width="612" role="img" aria-label="מפת הזיכרון הווירטואלי של תהליך מהכתובות הנמוכות לגבוהות: קטע הקוד r-x, הקבועים והנתונים, הערמה שגדלה למעלה, ספריית libc הממופה פנימה, והמחסנית שגדלה למטה, כאשר המחסנית והערמה הן rw בלבד בגלל NX והכתובות אקראיות בגלל ASLR">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-low">
<text class="small" x="306.0" y="29.0" text-anchor="middle">כתובות נמוכות</text>
</g>
<g id="el-text">
<rect class="n-box shp" x="147.4" y="74.0" width="317.2" height="46.0" rx="8"/>
<text class="t" x="306.0" y="102.0" text-anchor="middle">קטע הקוד .text - r-x - 0x5555e000</text>
</g>
<g id="el-rodata">
<rect class="n-box shp" x="169.6" y="160.0" width="272.8" height="46.0" rx="8"/>
<text class="t" x="306.0" y="188.0" text-anchor="middle">קבועים .rodata - קריאה בלבד</text>
</g>
<g id="el-data">
<rect class="n-box shp" x="189.9" y="246.0" width="232.2" height="46.0" rx="8"/>
<text class="t" x="306.0" y="274.0" text-anchor="middle">משתנים .data ו-.bss - rw</text>
</g>
<g id="el-heap">
<rect class="n-box shp" x="168.3" y="332.0" width="275.5" height="46.0" rx="8"/>
<text class="t" x="306.0" y="360.0" text-anchor="middle">ערמה [heap] - rw - גדלה למעלה</text>
</g>
<g id="el-libc">
<rect class="n-box shp" x="109.5" y="418.0" width="393.1" height="46.0" rx="8"/>
<text class="t" x="306.0" y="446.0" text-anchor="middle">ספריית libc - system ו-execve - 0x7f8e8000</text>
</g>
<g id="el-stack">
<rect class="n-box shp" x="104.1" y="504.0" width="403.9" height="46.0" rx="8"/>
<text class="t" x="306.0" y="532.0" text-anchor="middle">מחסנית [stack] - rw - גדלה למטה - 0x7ffed000</text>
</g>
<g id="el-high">
<text class="small" x="306.0" y="603.0" text-anchor="middle">כתובות גבוהות</text>
</g>
<g id="el-note">
<text class="small" x="306.0" y="661.0" text-anchor="middle">המחסנית והערמה הן rw בלבד - זה ה-NX, קוד שנזריק לא ירוץ. הכתובות אקראיות בגלל ASLR</text>
</g>
</svg>
