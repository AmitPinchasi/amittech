<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 378" width="450" role="img" aria-label="פענוח Pickle לא בטוח: בזמן pickle.loads המנגנון קורא למתודה reduce שמחזירה זוג של callable וארגומנטים, ו-Python מריץ אותם ומקבל הרצת קוד">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-bytes{0.00%{stroke:var(--pink);stroke-width:2.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}24.46%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-bytes .shp{animation-name:k-bytes;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-load{0.00%{stroke-width:1.5;}16.85%{stroke-width:1.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}45.11%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-load .shp{animation-name:k-load;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-red{0.00%{stroke-width:1.5;}37.50%{stroke-width:1.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}65.76%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-red .shp{animation-name:k-red;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-exec{0.00%{stroke-width:1.5;}58.15%{stroke-width:1.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-exec .shp{animation-name:k-exec;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.85%{stroke-width:1.6;}20.65%{stroke:var(--pink);stroke-width:2.4;}41.30%{stroke:var(--pink);stroke-width:2.4;}45.11%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}37.50%{stroke-width:1.6;}41.30%{stroke:var(--pink);stroke-width:2.4;}61.96%{stroke:var(--pink);stroke-width:2.4;}65.76%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}58.15%{stroke-width:1.6;}61.96%{stroke:var(--pink);stroke-width:2.4;}82.61%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-red-0{opacity:0;}
@keyframes k-dyn-red-0{0.00%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-red-0{animation-name:k-dyn-red-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-red-1{opacity:1;}
@keyframes k-dyn-red-1{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-red-1{animation-name:k-dyn-red-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-exec-0{opacity:0;}
@keyframes k-dyn-exec-0{0.00%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-exec-0{animation-name:k-dyn-exec-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-exec-1{opacity:1;}
@keyframes k-dyn-exec-1{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-exec-1{animation-name:k-dyn-exec-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="225.0,62.0 225.0,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="225.0,140.0 225.0,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="225.0,218.0 225.0,258.0" marker-end="url(#arr)"/>
<g id="el-bytes">
<rect class="n-box shp" x="98.0" y="16.0" width="254.0" height="46.0" rx="8"/>
<text class="t" x="225.0" y="44.0" text-anchor="middle">בתים לא מהימנים מהמשתמש</text>
</g>
<g id="el-load">
<rect class="n-code-bg shp" x="125.7" y="102.0" width="198.5" height="38.0" rx="7"/>
<text class="code" x="225.0" y="129.0" text-anchor="middle">pickle.loads(data)</text>
</g>
<g id="el-red">
<rect class="n-code-bg shp" x="85.1" y="180.0" width="279.7" height="38.0" rx="7"/>
<text class="code dyn-red-0" x="225.0" y="207.0" text-anchor="middle">__reduce__()</text>
<text class="code dyn-red-1" x="225.0" y="207.0" text-anchor="middle">return (os.system, ('id',))</text>
</g>
<g id="el-exec">
<rect class="n-box shp" x="79.0" y="258.0" width="292.0" height="46.0" rx="8"/>
<text class="t dyn-exec-0" x="225.0" y="286.0" text-anchor="middle">Python בונה מחדש את האובייקט</text>
<text class="t dyn-exec-1" x="225.0" y="286.0" text-anchor="middle">מריץ os.system('id') - RCE</text>
</g>
<g id="el-cap">
<text class="small" x="225.0" y="357.0" text-anchor="middle">המנגנון מריץ בזמן הפענוח את מה ש-reduce מחזיר, גם קוד זדוני</text>
</g>
</svg>
