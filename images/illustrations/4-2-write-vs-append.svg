<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 253 212" width="253" role="img" aria-label="ההבדל בין מצב w למצב a: כתיבה במצב w מוחקת את התוכן הקיים, מצב a מוסיף לסופו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-op{0.00%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-op .shp{animation-name:k-op;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fc{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-fc .shp{animation-name:k-fc;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.07%{stroke-width:1.6;}20.24%{stroke:var(--pink);stroke-width:2.4;}40.48%{stroke:var(--pink);stroke-width:2.4;}44.64%{stroke-width:1.6;}56.55%{stroke-width:1.6;}60.71%{stroke:var(--pink);stroke-width:2.4;}80.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-0{opacity:0;}
@keyframes k-dyn-op-0{0.00%{opacity:1;}20.24%{opacity:1;}24.40%{opacity:0;}100.00%{opacity:0;}}
.dyn-op-0{animation-name:k-dyn-op-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-1{opacity:0;}
@keyframes k-dyn-op-1{0.00%{opacity:0;}16.07%{opacity:0;}20.24%{opacity:1;}40.48%{opacity:1;}44.64%{opacity:0;}100.00%{opacity:0;}}
.dyn-op-1{animation-name:k-dyn-op-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-2{opacity:0;}
@keyframes k-dyn-op-2{0.00%{opacity:0;}36.31%{opacity:0;}40.48%{opacity:1;}60.71%{opacity:1;}64.88%{opacity:0;}100.00%{opacity:0;}}
.dyn-op-2{animation-name:k-dyn-op-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op-3{opacity:1;}
@keyframes k-dyn-op-3{0.00%{opacity:0;}56.55%{opacity:0;}60.71%{opacity:1;}80.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-op-3{animation-name:k-dyn-op-3;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-fc-0{opacity:0;}
@keyframes k-dyn-fc-0{0.00%{opacity:1;}20.24%{opacity:1;}24.40%{opacity:0;}100.00%{opacity:0;}}
.dyn-fc-0{animation-name:k-dyn-fc-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-fc-1{opacity:0;}
@keyframes k-dyn-fc-1{0.00%{opacity:0;}16.07%{opacity:0;}20.24%{opacity:1;}60.71%{opacity:1;}64.88%{opacity:0;}100.00%{opacity:0;}}
.dyn-fc-1{animation-name:k-dyn-fc-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-fc-2{opacity:1;}
@keyframes k-dyn-fc-2{0.00%{opacity:0;}56.55%{opacity:0;}60.71%{opacity:1;}80.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-fc-2{animation-name:k-dyn-fc-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="115.2,54.0 115.2,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="127.2" y="78.0" text-anchor="end">משפיע על הקובץ</text>
<g id="el-op">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="198.5" height="38.0" rx="7"/>
<text class="code dyn-op-0" x="115.2" y="43.0" text-anchor="middle">open("f.txt", "w")</text>
<text class="code dyn-op-1" x="115.2" y="43.0" text-anchor="middle">file.write("xy")</text>
<text class="code dyn-op-2" x="115.2" y="43.0" text-anchor="middle">open("f.txt", "a")</text>
<text class="code dyn-op-3" x="115.2" y="43.0" text-anchor="middle">file.write("!!")</text>
</g>
<g id="el-fc">
<rect class="n-box shp" x="67.2" y="94.0" width="96.0" height="44.0" rx="8"/>
<text class="t-b dyn-fc-0" x="115.2" y="121.0" text-anchor="middle" style="direction:ltr">hello</text>
<text class="t-b dyn-fc-1" x="115.2" y="121.0" text-anchor="middle" style="direction:ltr">xy</text>
<text class="t-b dyn-fc-2" x="115.2" y="121.0" text-anchor="middle" style="direction:ltr">xy!!</text>
</g>
<g id="el-note">
<text class="small" x="115.2" y="191.0" text-anchor="middle">התוכן של הקובץ על הדיסק</text>
</g>
</svg>
