<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 754 532" width="754" role="img" aria-label="השמה המונית: כאשר השרת אינו מסנן שדות הוא כותב את כל שדות הבקשה למודל, כולל שדות רגישים שהתוקף הוסיף, וגורם להסלמת הרשאות, בעוד סינון רשימה לבנה כותב רק שדות מותרים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-body{0.00%{stroke:var(--pink);stroke-width:2.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}17.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-body .shp{animation-name:k-body;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-filter{0.00%{stroke-width:1.5;}11.44%{stroke-width:1.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}31.78%{stroke-width:1.5;}40.25%{stroke-width:1.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}60.59%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-filter .shp{animation-name:k-filter;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-safe{0.00%{stroke-width:1.5;}25.85%{stroke-width:1.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}46.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-safe .shp{animation-name:k-safe;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-bindall{0.00%{stroke-width:1.5;}54.66%{stroke-width:1.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-bindall .shp{animation-name:k-bindall;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-esc{0.00%{stroke-width:1.5;}69.07%{stroke-width:1.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}86.44%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-esc .shp{animation-name:k-esc;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.44%{stroke-width:1.6;}14.41%{stroke:var(--pink);stroke-width:2.4;}28.81%{stroke:var(--pink);stroke-width:2.4;}31.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}25.85%{stroke-width:1.6;}28.81%{stroke:var(--pink);stroke-width:2.4;}43.22%{stroke:var(--pink);stroke-width:2.4;}46.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}54.66%{stroke-width:1.6;}57.63%{stroke:var(--pink);stroke-width:2.4;}72.03%{stroke:var(--pink);stroke-width:2.4;}75.00%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}69.07%{stroke-width:1.6;}72.03%{stroke:var(--pink);stroke-width:2.4;}86.44%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="200.1,120.0 200.1,160.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="200.1,344.1 200.1,384.1" marker-end="url(#arr)"/>
<text class="lbl" x="214.1" y="368.1" text-anchor="end">לא</text>
<polyline id="edge-2" class="edge" points="200.1,430.1 200.1,470.1" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="384.1,252.0 450.1,252.0" marker-end="url(#arr)"/>
<text class="lbl" x="417.1" y="240.0" text-anchor="middle">כן</text>
<g id="el-body">
<rect class="n-code-bg shp" x="105.3" y="16.0" width="189.5" height="104.0" rx="7"/>
<text class="code" x="200.1" y="43.0" text-anchor="middle">username: newuser</text>
<text class="code" x="200.1" y="65.0" text-anchor="middle">password: pass123</text>
<text class="code" x="200.1" y="87.0" text-anchor="middle">role: admin</text>
<text class="code" x="200.1" y="109.0" text-anchor="middle">isVerified: true</text>
</g>
<g id="el-filter">
<polygon class="n-dia shp" points="200.1,160.0 384.1,252.0 200.1,344.1 16.0,252.0"/>
<text class="t" x="200.1" y="257.0" text-anchor="middle">האם השרת מסנן שדות?</text>
</g>
<g id="el-safe">
<rect class="n-box shp" x="450.1" y="229.0" width="288.3" height="46.0" rx="8"/>
<text class="t" x="594.3" y="257.0" text-anchor="middle">רק שדות מותרים נכתבים למודל</text>
</g>
<g id="el-bindall">
<rect class="n-box shp" x="58.3" y="384.1" width="283.6" height="46.0" rx="8"/>
<text class="t" x="200.1" y="412.1" text-anchor="middle">השרת כותב את כל השדות למודל</text>
</g>
<g id="el-esc">
<rect class="n-box shp" x="43.2" y="470.1" width="313.8" height="46.0" rx="8"/>
<text class="t" x="200.1" y="498.1" text-anchor="middle">המשתמש הפך למנהל, הסלמת הרשאות</text>
</g>
</svg>
