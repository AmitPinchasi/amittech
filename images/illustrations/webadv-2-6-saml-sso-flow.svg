<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 352 508" width="352" role="img" aria-label="זרימת SP-Initiated SSO ב-SAML: המשתמש מתאמת מול ה-IdP, מקבל Response חתום ומעביר אותו ל-SP שמאמת את החתימה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-u1{0.00%{stroke:var(--pink);stroke-width:2.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}17.41%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-u1 .shp{animation-name:k-u1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sp1{0.00%{stroke-width:1.5;}11.16%{stroke-width:1.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}31.70%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sp1 .shp{animation-name:k-sp1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-auth{0.00%{stroke-width:1.5;}25.45%{stroke-width:1.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}45.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-auth .shp{animation-name:k-auth;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-resp{0.00%{stroke-width:1.5;}39.73%{stroke-width:1.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}60.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-resp .shp{animation-name:k-resp;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fwd{0.00%{stroke-width:1.5;}54.02%{stroke-width:1.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}74.55%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fwd .shp{animation-name:k-fwd;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-verify{0.00%{stroke-width:1.5;}68.30%{stroke-width:1.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}85.71%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-verify .shp{animation-name:k-verify;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.16%{stroke-width:1.6;}14.29%{stroke:var(--pink);stroke-width:2.4;}28.57%{stroke:var(--pink);stroke-width:2.4;}31.70%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.45%{stroke-width:1.6;}28.57%{stroke:var(--pink);stroke-width:2.4;}42.86%{stroke:var(--pink);stroke-width:2.4;}45.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}39.73%{stroke-width:1.6;}42.86%{stroke:var(--pink);stroke-width:2.4;}57.14%{stroke:var(--pink);stroke-width:2.4;}60.27%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}54.02%{stroke-width:1.6;}57.14%{stroke:var(--pink);stroke-width:2.4;}71.43%{stroke:var(--pink);stroke-width:2.4;}74.55%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}68.30%{stroke-width:1.6;}71.43%{stroke:var(--pink);stroke-width:2.4;}85.71%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="176.1,62.0 176.1,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="176.1,148.0 176.1,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="176.1,234.0 176.1,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="176.1,320.0 176.1,360.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="176.1,406.0 176.1,446.0" marker-end="url(#arr)"/>
<g id="el-u1">
<rect class="n-box shp" x="37.5" y="16.0" width="277.2" height="46.0" rx="8"/>
<text class="t" x="176.1" y="44.0" text-anchor="middle">המשתמש ניגש לאפליקציה (SP)</text>
</g>
<g id="el-sp1">
<rect class="n-box shp" x="20.2" y="102.0" width="311.8" height="46.0" rx="8"/>
<text class="t" x="176.1" y="130.0" text-anchor="middle">ה-SP מפנה ל-IdP עם SAML Request</text>
</g>
<g id="el-auth">
<rect class="n-box shp" x="55.8" y="188.0" width="240.6" height="46.0" rx="8"/>
<text class="t" x="176.1" y="216.0" text-anchor="middle">המשתמש מתאמת מול ה-IdP</text>
</g>
<g id="el-resp">
<rect class="n-box shp" x="22.2" y="274.0" width="307.8" height="46.0" rx="8"/>
<text class="t" x="176.1" y="302.0" text-anchor="middle">ה-IdP מחזיר SAML Response חתום</text>
</g>
<g id="el-fwd">
<rect class="n-box shp" x="19.9" y="360.0" width="312.5" height="46.0" rx="8"/>
<text class="t" x="176.1" y="388.0" text-anchor="middle">המשתמש מעביר את ה-Response ל-SP</text>
</g>
<g id="el-verify">
<rect class="n-box shp" x="16.0" y="446.0" width="320.2" height="46.0" rx="8"/>
<text class="t" x="176.1" y="474.0" text-anchor="middle">ה-SP מאמת חתימה ומזהה את המשתמש</text>
</g>
</svg>
