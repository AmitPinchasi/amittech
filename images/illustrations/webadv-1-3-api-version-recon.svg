<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 337 242" width="337" role="img" aria-label="מיפוי גרסאות API: אותה נקודת קצה בגרסה ישנה חושפת password_hash שגרסה חדשה מסננת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}65.76%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-resp{0.00%{stroke:var(--pink);stroke-width:2.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}65.76%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-resp .shp{animation-name:k-resp;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-note{0.00%{stroke-width:1.5;}58.15%{stroke-width:1.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-note .shp{animation-name:k-note;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke:var(--pink);stroke-width:2.4;}61.96%{stroke:var(--pink);stroke-width:2.4;}65.76%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}58.15%{stroke-width:1.6;}61.96%{stroke:var(--pink);stroke-width:2.4;}82.61%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-0{opacity:1;}
@keyframes k-dyn-req-0{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-req-0{animation-name:k-dyn-req-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-1{opacity:0;}
@keyframes k-dyn-req-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-req-1{animation-name:k-dyn-req-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-2{opacity:0;}
@keyframes k-dyn-req-2{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-req-2{animation-name:k-dyn-req-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-resp-0{opacity:1;}
@keyframes k-dyn-resp-0{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-resp-0{animation-name:k-dyn-resp-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-resp-1{opacity:0;}
@keyframes k-dyn-resp-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-resp-1{animation-name:k-dyn-resp-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-resp-2{opacity:0;}
@keyframes k-dyn-resp-2{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-resp-2{animation-name:k-dyn-resp-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="168.5,54.0 168.5,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="168.5,140.0 168.5,180.0" marker-end="url(#arr)"/>
<g id="el-req">
<rect class="n-code-bg shp" x="73.8" y="16.0" width="189.5" height="38.0" rx="7"/>
<text class="code dyn-req-0" x="168.5" y="43.0" text-anchor="middle">GET /api/v1/users</text>
<text class="code dyn-req-1" x="168.5" y="43.0" text-anchor="middle">GET /api/v2/users</text>
<text class="code dyn-req-2" x="168.5" y="43.0" text-anchor="middle">GET /api/v3/users</text>
</g>
<g id="el-resp">
<rect class="n-box shp" x="71.1" y="94.0" width="194.9" height="46.0" rx="8"/>
<text class="t dyn-resp-0" x="168.5" y="122.0" text-anchor="middle">חושף password_hash</text>
<text class="t dyn-resp-1" x="168.5" y="122.0" text-anchor="middle">מסונן - ללא סיסמה</text>
<text class="t dyn-resp-2" x="168.5" y="122.0" text-anchor="middle">לא קיים - 404</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="180.0" width="305.1" height="46.0" rx="8"/>
<text class="t" x="168.5" y="208.0" text-anchor="middle">גרסת API ישנה חושפת מידע רגיש</text>
</g>
</svg>
