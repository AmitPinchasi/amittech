<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 682 460" width="682" role="img" aria-label="סינכרון acquire release בין יצרן לצרכן: הכתיבה לנתונים קודמת לפרסום הדגל, ולכן הצרכן רואה את הנתונים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cons{0.00%{stroke:var(--pink);stroke-width:2.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}20.27%{stroke-width:1.5;}48.20%{stroke-width:1.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}71.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cons .shp{animation-name:k-cons;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-prod{0.00%{stroke-width:1.5;}13.96%{stroke-width:1.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}54.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-prod .shp{animation-name:k-prod;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-data{0.00%{stroke-width:1.5;}13.96%{stroke-width:1.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}37.39%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-data .shp{animation-name:k-data;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ready{0.00%{stroke-width:1.5;}31.08%{stroke-width:1.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}54.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ready .shp{animation-name:k-ready;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-res{0.00%{stroke-width:1.5;}65.32%{stroke-width:1.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-res .shp{animation-name:k-res;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-prod-0{opacity:0;}
@keyframes k-dyn-prod-0{0.00%{opacity:1;}34.23%{opacity:1;}37.39%{opacity:0;}100.00%{opacity:0;}}
.dyn-prod-0{animation-name:k-dyn-prod-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-prod-1{opacity:1;}
@keyframes k-dyn-prod-1{0.00%{opacity:0;}31.08%{opacity:0;}34.23%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-prod-1{animation-name:k-dyn-prod-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-data-0{opacity:0;}
@keyframes k-dyn-data-0{0.00%{opacity:1;}17.12%{opacity:1;}20.27%{opacity:0;}100.00%{opacity:0;}}
.dyn-data-0{animation-name:k-dyn-data-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-data-1{opacity:1;}
@keyframes k-dyn-data-1{0.00%{opacity:0;}13.96%{opacity:0;}17.12%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-data-1{animation-name:k-dyn-data-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ready-0{opacity:0;}
@keyframes k-dyn-ready-0{0.00%{opacity:1;}34.23%{opacity:1;}37.39%{opacity:0;}100.00%{opacity:0;}}
.dyn-ready-0{animation-name:k-dyn-ready-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ready-1{opacity:1;}
@keyframes k-dyn-ready-1{0.00%{opacity:0;}31.08%{opacity:0;}34.23%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-ready-1{animation-name:k-dyn-ready-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}68.47%{opacity:1;}71.62%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-1{opacity:1;}
@keyframes k-dyn-res-1{0.00%{opacity:0;}65.32%{opacity:0;}68.47%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-prod">
<rect class="n-code-bg shp" x="174.3" y="16.0" width="333.9" height="38.0" rx="7"/>
<text class="code dyn-prod-0" x="341.2" y="43.0" text-anchor="middle">data = 42;</text>
<text class="code dyn-prod-1" x="341.2" y="43.0" text-anchor="middle">atomic_store(&amp;ready, 1, release);</text>
</g>
<g id="el-data">
<rect class="n-box shp" x="281.6" y="94.0" width="119.3" height="44.0" rx="8"/>
<text class="t-b dyn-data-0" x="341.2" y="121.0" text-anchor="middle" style="direction:ltr">data = 0</text>
<text class="t-b dyn-data-1" x="341.2" y="121.0" text-anchor="middle" style="direction:ltr">data = 42</text>
</g>
<g id="el-ready">
<rect class="n-box shp" x="282.7" y="178.0" width="117.1" height="44.0" rx="8"/>
<text class="t-b dyn-ready-0" x="341.2" y="205.0" text-anchor="middle" style="direction:ltr">ready = 0</text>
<text class="t-b dyn-ready-1" x="341.2" y="205.0" text-anchor="middle" style="direction:ltr">ready = 1</text>
</g>
<g id="el-cons">
<rect class="n-code-bg shp" x="129.1" y="262.0" width="424.2" height="38.0" rx="7"/>
<text class="code" x="341.2" y="289.0" text-anchor="middle">while (atomic_load(&amp;ready, acquire) == 0) ;</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="140.3" y="340.0" width="401.8" height="46.0" rx="8"/>
<text class="t dyn-res-0" x="341.2" y="368.0" text-anchor="middle">הצרכן ממתין כי הדגל עדיין אפס</text>
<text class="t dyn-res-1" x="341.2" y="368.0" text-anchor="middle">הצרכן רואה את הדגל דלוק ולכן data שווה 42</text>
</g>
<g id="el-note">
<text class="small" x="341.2" y="439.0" text-anchor="middle">הrelease מבטיח שכל הכתיבות שלפניו נראות לפני הדגל, וacquire מבטיח שהקריאות שאחריו יראו אותן</text>
</g>
</svg>
