<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 329 396" width="329" role="img" aria-label="תזמון השגיאות בשיגור kernel: שגיאת תצורה נתפסת מיד ב-cudaGetLastError, אך שגיאת הרצה צצה רק בסנכרון הבא">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-launch{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-launch .shp{animation-name:k-launch;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-peek{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-peek .shp{animation-name:k-peek;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-run{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-run .shp{animation-name:k-run;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sync{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-sync .shp{animation-name:k-sync;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}40.91%{stroke:var(--pink);stroke-width:2.4;}44.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.93%{stroke-width:1.6;}40.91%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-0{opacity:0;}
@keyframes k-dyn-state-0{0.00%{opacity:1;}20.45%{opacity:1;}24.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-0{animation-name:k-dyn-state-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-1{opacity:0;}
@keyframes k-dyn-state-1{0.00%{opacity:0;}16.48%{opacity:0;}20.45%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-1{animation-name:k-dyn-state-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-2{opacity:0;}
@keyframes k-dyn-state-2{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-2{animation-name:k-dyn-state-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-3{opacity:1;}
@keyframes k-dyn-state-3{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-state-3{animation-name:k-dyn-state-3;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="164.5,54.0 164.5,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="164.5,132.0 164.5,172.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="164.5,218.0 164.5,258.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="164.5,296.0 164.5,336.0" marker-end="url(#arr)"/>
<g id="el-launch">
<rect class="n-code-bg shp" x="24.6" y="16.0" width="279.7" height="38.0" rx="7"/>
<text class="code" x="164.5" y="43.0" text-anchor="middle">myKernel&lt;&lt;&lt;grid, block&gt;&gt;&gt;()</text>
</g>
<g id="el-peek">
<rect class="n-code-bg shp" x="65.3" y="94.0" width="198.5" height="38.0" rx="7"/>
<text class="code" x="164.5" y="121.0" text-anchor="middle">cudaGetLastError()</text>
</g>
<g id="el-run">
<rect class="n-box shp" x="58.9" y="172.0" width="211.3" height="46.0" rx="8"/>
<text class="t" x="164.5" y="200.0" text-anchor="middle">ה-kernel רץ על ה-GPU</text>
</g>
<g id="el-sync">
<rect class="n-code-bg shp" x="42.7" y="258.0" width="243.6" height="38.0" rx="7"/>
<text class="code" x="164.5" y="285.0" text-anchor="middle">cudaDeviceSynchronize()</text>
</g>
<g id="el-state">
<rect class="n-box shp" x="16.0" y="336.0" width="297.0" height="44.0" rx="8"/>
<text class="t-b dyn-state-0" x="164.5" y="363.0" text-anchor="middle">ה-kernel מונפק לזרם</text>
<text class="t-b dyn-state-1" x="164.5" y="363.0" text-anchor="middle">שגיאת תצורה נתפסת מיד</text>
<text class="t-b dyn-state-2" x="164.5" y="363.0" text-anchor="middle">ריצה אסינכרונית על ה-device</text>
<text class="t-b dyn-state-3" x="164.5" y="363.0" text-anchor="middle">שגיאת הרצה צצה רק כאן</text>
</g>
</svg>
