<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 593 394" width="593" role="img" aria-label="פירוק שם DN בפרוטוקול LDAP למיקום בעץ Active Directory: DC=com בשורש, מתחתיו DC=example, מתחתיו OU=Users, ובעלה CN=David שהוא המשתמש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="296.6,62.0 296.6,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="310.6" y="86.0" text-anchor="end">מכיל</text>
<polyline id="edge-1" class="edge" points="296.6,148.0 296.6,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="310.6" y="172.0" text-anchor="end">מכיל</text>
<polyline id="edge-2" class="edge" points="296.6,234.0 296.6,274.0" marker-end="url(#arr)"/>
<text class="lbl" x="310.6" y="258.0" text-anchor="end">מכיל</text>
<g id="el-root">
<rect class="n-box shp" x="248.6" y="16.0" width="96.1" height="46.0" rx="8"/>
<text class="t" x="296.6" y="44.0" text-anchor="middle" style="direction:ltr">DC=com</text>
</g>
<g id="el-ex">
<rect class="n-box shp" x="231.8" y="102.0" width="129.7" height="46.0" rx="8"/>
<text class="t" x="296.6" y="130.0" text-anchor="middle" style="direction:ltr">DC=example</text>
</g>
<g id="el-ou">
<rect class="n-box shp" x="239.1" y="188.0" width="114.9" height="46.0" rx="8"/>
<text class="t" x="296.6" y="216.0" text-anchor="middle" style="direction:ltr">OU=Users</text>
</g>
<g id="el-leaf">
<rect class="n-box shp" x="201.9" y="274.0" width="189.5" height="46.0" rx="8"/>
<text class="t" x="296.6" y="302.0" text-anchor="middle">CN=David - המשתמש</text>
</g>
<g id="el-note">
<text class="small" x="296.6" y="373.0" text-anchor="middle">שם ה-DN המלא CN=David,OU=Users,DC=example,DC=com נקרא מהעלה משמאל אל השורש מימין</text>
</g>
</svg>
