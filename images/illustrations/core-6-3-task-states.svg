<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 928 651" width="928" role="img" aria-label="תרשים מעברי המצבים של תהליך בקרנל: מהיצירה למצב מוכן לריצה, לריצה על המעבד, לשינה בהמתנה לאירוע, ולבסוף למצב זומבי ולשחרור">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-fork{0.00%{stroke:var(--pink);stroke-width:2.5;}9.18%{stroke:var(--pink);stroke-width:2.5;}10.97%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fork .shp{animation-name:k-fork;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ready{0.00%{stroke-width:1.5;}7.40%{stroke-width:1.5;}9.18%{stroke:var(--pink);stroke-width:2.5;}18.37%{stroke:var(--pink);stroke-width:2.5;}20.15%{stroke-width:1.5;}44.13%{stroke-width:1.5;}45.92%{stroke:var(--pink);stroke-width:2.5;}55.10%{stroke:var(--pink);stroke-width:2.5;}56.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ready .shp{animation-name:k-ready;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-run{0.00%{stroke-width:1.5;}16.58%{stroke-width:1.5;}18.37%{stroke:var(--pink);stroke-width:2.5;}27.55%{stroke:var(--pink);stroke-width:2.5;}29.34%{stroke-width:1.5;}53.32%{stroke-width:1.5;}55.10%{stroke:var(--pink);stroke-width:2.5;}64.29%{stroke:var(--pink);stroke-width:2.5;}66.07%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-run .shp{animation-name:k-run;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}25.77%{stroke-width:1.5;}27.55%{stroke:var(--pink);stroke-width:2.5;}36.73%{stroke:var(--pink);stroke-width:2.5;}38.52%{stroke-width:1.5;}62.50%{stroke-width:1.5;}64.29%{stroke:var(--pink);stroke-width:2.5;}73.47%{stroke:var(--pink);stroke-width:2.5;}75.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sleep{0.00%{stroke-width:1.5;}34.95%{stroke-width:1.5;}36.73%{stroke:var(--pink);stroke-width:2.5;}45.92%{stroke:var(--pink);stroke-width:2.5;}47.70%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sleep .shp{animation-name:k-sleep;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-zomb{0.00%{stroke-width:1.5;}71.68%{stroke-width:1.5;}73.47%{stroke:var(--pink);stroke-width:2.5;}82.65%{stroke:var(--pink);stroke-width:2.5;}84.44%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-zomb .shp{animation-name:k-zomb;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-gone{0.00%{stroke-width:1.5;}80.87%{stroke-width:1.5;}82.65%{stroke:var(--pink);stroke-width:2.5;}91.84%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-gone .shp{animation-name:k-gone;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}7.40%{stroke-width:1.6;}9.18%{stroke:var(--pink);stroke-width:2.4;}18.37%{stroke:var(--pink);stroke-width:2.4;}20.15%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}16.58%{stroke-width:1.6;}18.37%{stroke:var(--pink);stroke-width:2.4;}27.55%{stroke:var(--pink);stroke-width:2.4;}29.34%{stroke-width:1.6;}53.32%{stroke-width:1.6;}55.10%{stroke:var(--pink);stroke-width:2.4;}64.29%{stroke:var(--pink);stroke-width:2.4;}66.07%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}25.77%{stroke-width:1.6;}27.55%{stroke:var(--pink);stroke-width:2.4;}36.73%{stroke:var(--pink);stroke-width:2.4;}38.52%{stroke-width:1.6;}62.50%{stroke-width:1.6;}64.29%{stroke:var(--pink);stroke-width:2.4;}73.47%{stroke:var(--pink);stroke-width:2.4;}75.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}34.95%{stroke-width:1.6;}36.73%{stroke:var(--pink);stroke-width:2.4;}45.92%{stroke:var(--pink);stroke-width:2.4;}47.70%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}44.13%{stroke-width:1.6;}45.92%{stroke:var(--pink);stroke-width:2.4;}55.10%{stroke:var(--pink);stroke-width:2.4;}56.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}71.68%{stroke-width:1.6;}73.47%{stroke:var(--pink);stroke-width:2.4;}82.65%{stroke:var(--pink);stroke-width:2.4;}84.44%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-5{animation-name:k-edge-5;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-6{0.00%{stroke-width:1.6;}80.87%{stroke-width:1.6;}82.65%{stroke:var(--pink);stroke-width:2.4;}91.84%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-6{animation-name:k-edge-6;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}27.55%{opacity:1;}29.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:0;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}25.77%{opacity:0;}27.55%{opacity:1;}64.29%{opacity:1;}66.07%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-2{opacity:1;}
@keyframes k-dyn-cond-2{0.00%{opacity:0;}62.50%{opacity:0;}64.29%{opacity:1;}91.84%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-2{animation-name:k-dyn-cond-2;animation-duration:19.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="434.3,54.0 434.3,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="434.3,140.0 434.3,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="434.3,226.0 434.3,266.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="573.3,335.5 639.3,335.5" marker-end="url(#arr)"/>
<text class="lbl" x="606.3" y="323.5" text-anchor="middle">המתנה</text>
<polyline id="edge-4" class="edge" points="639.3,335.5 16.0,335.5 16.0,117.0 297.5,117.0" marker-end="url(#arr)"/>
<text class="small" x="156.8" y="105.0" text-anchor="middle">האירוע קרה</text>
<polyline id="edge-5" class="edge" points="434.3,405.0 434.3,445.0" marker-end="url(#arr)"/>
<text class="lbl" x="448.3" y="429.0" text-anchor="end">סיום</text>
<polyline id="edge-6" class="edge" points="434.3,491.0 434.3,531.0" marker-end="url(#arr)"/>
<text class="lbl" x="448.3" y="515.0" text-anchor="end">האב קרא ל-wait</text>
<g id="el-fork">
<rect class="n-code-bg shp" x="386.3" y="16.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="434.3" y="43.0" text-anchor="middle">fork()</text>
</g>
<g id="el-ready">
<rect class="n-box shp" x="297.5" y="94.0" width="273.5" height="46.0" rx="8"/>
<text class="t" x="434.3" y="122.0" text-anchor="middle">TASK_RUNNING - ממתין בתור</text>
</g>
<g id="el-run">
<rect class="n-box shp" x="295.0" y="180.0" width="278.5" height="46.0" rx="8"/>
<text class="t" x="434.3" y="208.0" text-anchor="middle">TASK_RUNNING - רץ על המעבד</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="434.3,266.0 573.3,335.5 434.3,405.0 295.2,335.5"/>
<text class="code dyn-cond-0" x="434.3" y="340.5" text-anchor="middle">why stop ?</text>
<text class="code dyn-cond-1" x="434.3" y="340.5" text-anchor="middle">waiting for IO</text>
<text class="code dyn-cond-2" x="434.3" y="340.5" text-anchor="middle">exit()</text>
</g>
<g id="el-sleep">
<rect class="n-box shp" x="639.3" y="312.5" width="272.5" height="46.0" rx="8"/>
<text class="t" x="775.5" y="340.5" text-anchor="middle">TASK_INTERRUPTIBLE - ישן</text>
</g>
<g id="el-zomb">
<rect class="n-box shp" x="275.5" y="445.0" width="317.5" height="46.0" rx="8"/>
<text class="t" x="434.3" y="473.0" text-anchor="middle">TASK_ZOMBIE - ממתין ל-wait מהאב</text>
</g>
<g id="el-gone">
<rect class="n-box shp" x="293.3" y="531.0" width="281.9" height="46.0" rx="8"/>
<text class="t" x="434.3" y="559.0" text-anchor="middle">הקרנל משחרר את ה-task_struct</text>
</g>
<g id="el-note">
<text class="small" x="434.3" y="630.0" text-anchor="middle">פסיקת הטיימר מחזירה את התהליך לתור הריצה, ולכן TASK_RUNNING מתאר גם ריצה בפועל וגם המתנה בתור</text>
</g>
</svg>
