<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-prod">
<rect class="n-code-bg shp" x="142.6" y="16.0" width="415.1" height="38.0" rx="7"/>
<text class="code dyn-prod-0" x="350.2" y="43.0" text-anchor="middle">producer: idle</text>
<text class="code dyn-prod-1" x="350.2" y="43.0" text-anchor="middle">queue_push(&amp;q, 10);</text>
<text class="code dyn-prod-2" x="350.2" y="43.0" text-anchor="middle">queue_push(&amp;q, 20);</text>
<text class="code dyn-prod-3" x="350.2" y="43.0" text-anchor="middle">queue_push(&amp;q, 30);</text>
<text class="code dyn-prod-4" x="350.2" y="43.0" text-anchor="middle">queue_push(&amp;q, 40); -&gt; cond_wait(not_full)</text>
<text class="code dyn-prod-5" x="350.2" y="43.0" text-anchor="middle">queue_push(&amp;q, 40); -&gt; done</text>
</g>
<g id="el-q">
<rect class="n-box shp" x="183.2" y="94.0" width="333.9" height="44.0" rx="8"/>
<text class="t-b dyn-q-0" x="350.2" y="121.0" text-anchor="middle" style="direction:ltr">count = 0 of 3, items = []</text>
<text class="t-b dyn-q-1" x="350.2" y="121.0" text-anchor="middle" style="direction:ltr">count = 1 of 3, items = [10]</text>
<text class="t-b dyn-q-2" x="350.2" y="121.0" text-anchor="middle" style="direction:ltr">count = 2 of 3, items = [10, 20]</text>
<text class="t-b dyn-q-3" x="350.2" y="121.0" text-anchor="middle" style="direction:ltr">count = 3 of 3, items = [10, 20, 30]</text>
<text class="t-b dyn-q-4" x="350.2" y="121.0" text-anchor="middle" style="direction:ltr">count = 2 of 3, items = [20, 30]</text>
<text class="t-b dyn-q-5" x="350.2" y="121.0" text-anchor="middle" style="direction:ltr">count = 3 of 3, items = [20, 30, 40]</text>
</g>
<g id="el-cons">
<rect class="n-code-bg shp" x="196.8" y="178.0" width="306.8" height="38.0" rx="7"/>
<text class="code dyn-cons-0" x="350.2" y="205.0" text-anchor="middle">consumer: cond_wait(not_empty)</text>
<text class="code dyn-cons-1" x="350.2" y="205.0" text-anchor="middle">consumer: idle</text>
<text class="code dyn-cons-2" x="350.2" y="205.0" text-anchor="middle">queue_pop(&amp;q); -&gt; 10</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="102.1" y="256.0" width="496.3" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="350.2" y="284.0" text-anchor="middle">התור ריק, ולכן הצרכן ישן על התנאי not_empty</text>
<text class="t dyn-note-1" x="350.2" y="284.0" text-anchor="middle">היצרן מכניס פריטים והתור מתמלא</text>
<text class="t dyn-note-2" x="350.2" y="284.0" text-anchor="middle">התור הגיע לקיבולת, ולכן היצרן נרדם על התנאי not_full</text>
<text class="t dyn-note-3" x="350.2" y="284.0" text-anchor="middle">הצרכן מוציא פריט, מוריד את המונה, ומאותת not_full</text>
<text class="t dyn-note-4" x="350.2" y="284.0" text-anchor="middle">היצרן מתעורר, מגלה שיש מקום, ומכניס את הפריט שחיכה</text>
</g>
<g id="el-cap">
<text class="small" x="350.2" y="355.0" text-anchor="middle">בדיקת התנאי נעשית תמיד בתוך לולאת while, כדי שהתעוררות מדומה לא תגרום לפעולה על תור ריק או מלא</text>
</g>
