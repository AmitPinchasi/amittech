<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 466 374" width="466" role="img" aria-label="המלכודת של sort: בלי פונקציית השוואה המספרים ממוינים כמחרוזות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-c1{0.00%{stroke:var(--pink);stroke-width:2.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}20.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-c1 .shp{animation-name:k-c1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-v1{0.00%{stroke-width:1.5;}13.37%{stroke-width:1.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-v1 .shp{animation-name:k-v1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-c2{0.00%{stroke-width:1.5;}47.03%{stroke-width:1.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}70.79%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-c2 .shp{animation-name:k-c2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-v2{0.00%{stroke-width:1.5;}63.86%{stroke-width:1.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-v2 .shp{animation-name:k-v2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.37%{stroke-width:1.6;}16.83%{stroke:var(--pink);stroke-width:2.4;}33.66%{stroke:var(--pink);stroke-width:2.4;}37.13%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}63.86%{stroke-width:1.6;}67.33%{stroke:var(--pink);stroke-width:2.4;}84.16%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-v1-0{opacity:0;}
@keyframes k-dyn-v1-0{0.00%{opacity:1;}16.83%{opacity:1;}20.30%{opacity:0;}100.00%{opacity:0;}}
.dyn-v1-0{animation-name:k-dyn-v1-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-v1-1{opacity:0;}
@keyframes k-dyn-v1-1{0.00%{opacity:0;}13.37%{opacity:0;}16.83%{opacity:1;}33.66%{opacity:1;}37.13%{opacity:0;}100.00%{opacity:0;}}
.dyn-v1-1{animation-name:k-dyn-v1-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-v1-2{opacity:1;}
@keyframes k-dyn-v1-2{0.00%{opacity:0;}30.20%{opacity:0;}33.66%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-v1-2{animation-name:k-dyn-v1-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-v2-0{opacity:0;}
@keyframes k-dyn-v2-0{0.00%{opacity:1;}67.33%{opacity:1;}70.79%{opacity:0;}100.00%{opacity:0;}}
.dyn-v2-0{animation-name:k-dyn-v2-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-v2-1{opacity:1;}
@keyframes k-dyn-v2-1{0.00%{opacity:0;}63.86%{opacity:0;}67.33%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-v2-1{animation-name:k-dyn-v2-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="233.0,54.0 233.0,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="245.0" y="78.0" text-anchor="end">המרה למחרוזות</text>
<polyline id="edge-1" class="edge" points="233.0,216.0 233.0,256.0" marker-end="url(#arr)"/>
<text class="lbl" x="245.0" y="240.0" text-anchor="end">השוואה מספרית</text>
<g id="el-c1">
<rect class="n-code-bg shp" x="151.8" y="16.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="233.0" y="43.0" text-anchor="middle">numbers.sort()</text>
</g>
<g id="el-v1">
<rect class="n-box shp" x="98.7" y="94.0" width="268.7" height="44.0" rx="8"/>
<text class="t-b dyn-v1-0" x="233.0" y="121.0" text-anchor="middle" style="direction:ltr">[10, 5, 100, 1, 25]</text>
<text class="t-b dyn-v1-1" x="233.0" y="121.0" text-anchor="middle" style="direction:ltr">["10", "5", "100", "1", "25"]</text>
<text class="t-b dyn-v1-2" x="233.0" y="121.0" text-anchor="middle" style="direction:ltr">[1, 10, 100, 25, 5]</text>
</g>
<g id="el-c2">
<rect class="n-code-bg shp" x="84.1" y="178.0" width="297.8" height="38.0" rx="7"/>
<text class="code" x="233.0" y="205.0" text-anchor="middle">numbers.sort((a, b) =&gt; a - b)</text>
</g>
<g id="el-v2">
<rect class="n-box shp" x="130.9" y="256.0" width="204.2" height="44.0" rx="8"/>
<text class="t-b dyn-v2-0" x="233.0" y="283.0" text-anchor="middle" style="direction:ltr">[10, 5, 100, 1, 25]</text>
<text class="t-b dyn-v2-1" x="233.0" y="283.0" text-anchor="middle" style="direction:ltr">[1, 5, 10, 25, 100]</text>
</g>
<g id="el-note">
<text class="small" x="233.0" y="353.0" text-anchor="middle">בלי פונקציית השוואה הכל מומר למחרוזות וממוין לפי סדר מילוני</text>
</g>
</svg>
