<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 451" width="375" role="img" aria-label="איך completion של Copilot עובדת: מתוך הקוד שכבר הוקלד המודל חוזה את ההמשך הסביר ומציג אותו כ-ghost text אפור, לחיצת Tab מכניסה אותו לקוד, והמשך הקלדה דוחה אותו ומתחיל חיזוי חדש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-ctx{0.00%{stroke:var(--pink);stroke-width:2.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}20.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ctx .shp{animation-name:k-ctx;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-predict{0.00%{stroke-width:1.5;}13.37%{stroke-width:1.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}37.13%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-predict .shp{animation-name:k-predict;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ghost{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ghost .shp{animation-name:k-ghost;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-decide{0.00%{stroke-width:1.5;}47.03%{stroke-width:1.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}70.79%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-decide .shp{animation-name:k-decide;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-accept{0.00%{stroke-width:1.5;}63.86%{stroke-width:1.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-accept .shp{animation-name:k-accept;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.37%{stroke-width:1.6;}16.83%{stroke:var(--pink);stroke-width:2.4;}33.66%{stroke:var(--pink);stroke-width:2.4;}37.13%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.20%{stroke-width:1.6;}33.66%{stroke:var(--pink);stroke-width:2.4;}50.50%{stroke:var(--pink);stroke-width:2.4;}53.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.03%{stroke-width:1.6;}50.50%{stroke:var(--pink);stroke-width:2.4;}67.33%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}63.86%{stroke-width:1.6;}67.33%{stroke:var(--pink);stroke-width:2.4;}84.16%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ghost-0{opacity:0;}
@keyframes k-dyn-ghost-0{0.00%{opacity:1;}33.66%{opacity:1;}37.13%{opacity:0;}100.00%{opacity:0;}}
.dyn-ghost-0{animation-name:k-dyn-ghost-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ghost-1{opacity:1;}
@keyframes k-dyn-ghost-1{0.00%{opacity:0;}30.20%{opacity:0;}33.66%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-ghost-1{animation-name:k-dyn-ghost-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="232.6,61.0 232.6,101.0" marker-end="url(#arr)"/>
<text class="lbl" x="246.6" y="85.0" text-anchor="end">הקשר מהקובץ</text>
<polyline id="edge-1" class="edge" points="232.6,147.0 232.6,187.0" marker-end="url(#arr)"/>
<text class="lbl" x="246.6" y="171.0" text-anchor="end" style="direction:ltr">ghost text</text>
<polyline id="edge-2" class="edge" points="232.6,225.0 232.6,265.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="232.6,349.0 232.6,389.0" marker-end="url(#arr)"/>
<text class="lbl" x="246.6" y="373.0" text-anchor="end" style="direction:ltr">Tab</text>
<polyline id="edge-4" class="edge" points="152.6,307.0 26.3,307.0 26.3,42.0 119.8,42.0" marker-end="url(#arr)"/>
<text class="small" x="73.1" y="30.0" text-anchor="middle">ממשיכים להקליד</text>
<g id="el-ctx">
<rect class="n-code-bg shp" x="119.8" y="23.0" width="225.6" height="38.0" rx="7"/>
<text class="code" x="232.6" y="50.0" text-anchor="middle">def find_user(email):</text>
</g>
<g id="el-predict">
<rect class="n-box shp" x="120.2" y="101.0" width="224.8" height="46.0" rx="8"/>
<text class="t" x="232.6" y="129.0" text-anchor="middle">חוזה את ההמשך מההקשר</text>
</g>
<g id="el-ghost">
<rect class="n-code-bg shp" x="106.3" y="187.0" width="252.7" height="38.0" rx="7"/>
<text class="code dyn-ghost-0" x="232.6" y="214.0" text-anchor="middle">...</text>
<text class="code dyn-ghost-1" x="232.6" y="214.0" text-anchor="middle">return db.query(User)...</text>
</g>
<g id="el-decide">
<polygon class="n-dia shp" points="232.6,265.0 312.6,307.0 232.6,349.0 152.6,307.0"/>
<text class="t" x="232.6" y="312.0" text-anchor="middle">לקבל?</text>
</g>
<g id="el-accept">
<rect class="n-box shp" x="169.1" y="389.0" width="127.0" height="46.0" rx="8"/>
<text class="t" x="232.6" y="417.0" text-anchor="middle">נכנס לקוד</text>
</g>
</svg>
