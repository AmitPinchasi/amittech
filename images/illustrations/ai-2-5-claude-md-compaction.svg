<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 602 336" width="602" role="img" aria-label="אחרי דחיסת context, prompt שנאמר רק בצ'אט עלול להיאבד, אבל CLAUDE.md נקרא מחדש מהדיסק וחוזר">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="445.4,62.0 445.4,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="325.6,125.0 259.6,125.0" marker-end="url(#arr)"/>
<text class="lbl" x="292.6" y="113.0" text-anchor="middle">צ'אט בלבד</text>
<polyline id="edge-2" class="edge" points="445.4,148.0 445.4,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="459.4" y="172.0" text-anchor="end">קובץ</text>
<polyline id="edge-3" class="edge" points="445.4,234.0 445.4,274.0" marker-end="url(#arr)"/>
<g id="el-fill">
<rect class="n-box shp" x="312.6" y="16.0" width="265.4" height="46.0" rx="8"/>
<text class="t" x="445.4" y="44.0" text-anchor="middle">שיחה ארוכה - context מתמלא</text>
</g>
<g id="el-compact">
<rect class="n-box shp" x="325.6" y="102.0" width="239.6" height="46.0" rx="8"/>
<text class="t" x="445.4" y="130.0" text-anchor="middle">דחיסת context אוטומטית</text>
</g>
<g id="el-lost">
<rect class="n-box shp" x="16.0" y="102.0" width="243.6" height="46.0" rx="8"/>
<text class="t" x="137.8" y="130.0" text-anchor="middle">prompt מהצ'אט בלבד - אבד</text>
</g>
<g id="el-reload">
<rect class="n-box shp" x="304.9" y="188.0" width="280.9" height="46.0" rx="8"/>
<text class="t" x="445.4" y="216.0" text-anchor="middle">CLAUDE.md נקרא מחדש מהדיסק</text>
</g>
<g id="el-back">
<rect class="n-box shp" x="325.6" y="274.0" width="239.6" height="46.0" rx="8"/>
<text class="t" x="445.4" y="302.0" text-anchor="middle">הכללים חוזרים לcontext</text>
</g>
</svg>
