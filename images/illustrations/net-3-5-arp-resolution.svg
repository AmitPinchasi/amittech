<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 638 521" width="638" role="img" aria-label="פרוטוקול ARP מגלה את כתובת ה-MAC של הראוטר: המחשב בודק את טבלת ה-ARP, שולח בקשת Broadcast, והראוטר עונה עם כתובת ה-MAC שלו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-need{0.00%{stroke:var(--pink);stroke-width:2.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}20.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-need .shp{animation-name:k-need;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cache{0.00%{stroke-width:1.5;}13.96%{stroke-width:1.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}37.39%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cache .shp{animation-name:k-cache;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-req{0.00%{stroke-width:1.5;}31.08%{stroke-width:1.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}54.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-reply{0.00%{stroke-width:1.5;}48.20%{stroke-width:1.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}71.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-reply .shp{animation-name:k-reply;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-done{0.00%{stroke-width:1.5;}65.32%{stroke-width:1.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-done .shp{animation-name:k-done;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.96%{stroke-width:1.6;}17.12%{stroke:var(--pink);stroke-width:2.4;}34.23%{stroke:var(--pink);stroke-width:2.4;}37.39%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}31.08%{stroke-width:1.6;}34.23%{stroke:var(--pink);stroke-width:2.4;}51.35%{stroke:var(--pink);stroke-width:2.4;}54.50%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}48.20%{stroke-width:1.6;}51.35%{stroke:var(--pink);stroke-width:2.4;}68.47%{stroke:var(--pink);stroke-width:2.4;}71.62%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}65.32%{stroke-width:1.6;}68.47%{stroke:var(--pink);stroke-width:2.4;}85.59%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-req-0{opacity:1;}
@keyframes k-dyn-req-0{0.00%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-req-0{animation-name:k-dyn-req-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-reply-0{opacity:0;}
@keyframes k-dyn-reply-0{0.00%{opacity:1;}51.35%{opacity:1;}54.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-reply-0{animation-name:k-dyn-reply-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-reply-1{opacity:1;}
@keyframes k-dyn-reply-1{0.00%{opacity:0;}48.20%{opacity:0;}51.35%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-reply-1{animation-name:k-dyn-reply-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="235.3,62.0 235.3,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="383.9,176.3 449.9,176.3" marker-end="url(#arr)"/>
<text class="lbl" x="416.9" y="164.3" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="235.3,250.6 235.3,290.6" marker-end="url(#arr)"/>
<text class="lbl" x="249.3" y="274.6" text-anchor="end">לא, שולח Broadcast</text>
<polyline id="edge-3" class="edge" points="235.3,334.6 235.3,374.6" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="235.3,418.6 235.3,458.6" marker-end="url(#arr)"/>
<g id="el-need">
<rect class="n-box shp" x="57.7" y="16.0" width="355.1" height="46.0" rx="8"/>
<text class="t" x="235.3" y="44.0" text-anchor="middle">המחשב צריך את כתובת ה-MAC של הראוטר</text>
</g>
<g id="el-cache">
<polygon class="n-dia shp" points="235.3,102.0 383.9,176.3 235.3,250.6 86.7,176.3"/>
<text class="t" x="235.3" y="181.3" text-anchor="middle">נמצא בטבלת ARP?</text>
</g>
<g id="el-hit">
<rect class="n-box shp" x="449.9" y="153.3" width="172.4" height="46.0" rx="8"/>
<text class="t" x="536.1" y="181.3" text-anchor="middle">נמצא - שולח מיד</text>
</g>
<g id="el-req">
<rect class="n-box shp" x="16.0" y="290.6" width="438.6" height="44.0" rx="8"/>
<text class="t-b dyn-req-0" x="235.3" y="317.6" text-anchor="middle" style="direction:ltr">ARP: Who has 192.168.1.1? Tell 192.168.1.10</text>
</g>
<g id="el-reply">
<rect class="n-box shp" x="50.4" y="374.6" width="369.8" height="44.0" rx="8"/>
<text class="t-b dyn-reply-0" x="235.3" y="401.6" text-anchor="middle">הראוטר עונה עם כתובת ה-MAC שלו</text>
<text class="t-b dyn-reply-1" x="235.3" y="401.6" text-anchor="middle" style="direction:ltr">192.168.1.1 is at 00:1A:2B:3C:4D:5E</text>
</g>
<g id="el-done">
<rect class="n-box shp" x="64.3" y="458.6" width="342.0" height="46.0" rx="8"/>
<text class="t" x="235.3" y="486.6" text-anchor="middle">עכשיו אפשר לשלוח את הפאקטה לראוטר</text>
</g>
</svg>
