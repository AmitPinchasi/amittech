<rect class="n-box shp" x="125.9" y="102.0" width="161.3" height="46.0" rx="8"/>
<text class="t" x="206.5" y="130.0" text-anchor="middle">מחפש את הקובץ</text>
</g>
<g id="el-read">
<rect class="n-box shp" x="130.8" y="188.0" width="151.5" height="46.0" rx="8"/>
<text class="t" x="206.5" y="216.0" text-anchor="middle">קורא את הקוד</text>
</g>
<g id="el-fix">
