<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 333 508" width="333" role="img" aria-label="הלולאה של agent CLI על משימה אחת: מחפש את הקובץ, קורא את הקוד, כותב תיקון, מריץ בדיקות, מתקן את עצמו אם נכשל, ולבסוף מדווח מה השתנה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-task{0.00%{stroke:var(--pink);stroke-width:2.5;}11.03%{stroke:var(--pink);stroke-width:2.5;}13.60%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-task .shp{animation-name:k-task;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-search{0.00%{stroke-width:1.5;}8.46%{stroke-width:1.5;}11.03%{stroke:var(--pink);stroke-width:2.5;}22.06%{stroke:var(--pink);stroke-width:2.5;}24.63%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-search .shp{animation-name:k-search;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-read{0.00%{stroke-width:1.5;}19.49%{stroke-width:1.5;}22.06%{stroke:var(--pink);stroke-width:2.5;}33.09%{stroke:var(--pink);stroke-width:2.5;}35.66%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-read .shp{animation-name:k-read;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fix{0.00%{stroke-width:1.5;}30.51%{stroke-width:1.5;}33.09%{stroke:var(--pink);stroke-width:2.5;}44.12%{stroke:var(--pink);stroke-width:2.5;}46.69%{stroke-width:1.5;}52.57%{stroke-width:1.5;}55.15%{stroke:var(--pink);stroke-width:2.5;}66.18%{stroke:var(--pink);stroke-width:2.5;}68.75%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fix .shp{animation-name:k-fix;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-test{0.00%{stroke-width:1.5;}41.54%{stroke-width:1.5;}44.12%{stroke:var(--pink);stroke-width:2.5;}55.15%{stroke:var(--pink);stroke-width:2.5;}57.72%{stroke-width:1.5;}63.60%{stroke-width:1.5;}66.18%{stroke:var(--pink);stroke-width:2.5;}77.21%{stroke:var(--pink);stroke-width:2.5;}79.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-test .shp{animation-name:k-test;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-report{0.00%{stroke-width:1.5;}74.63%{stroke-width:1.5;}77.21%{stroke:var(--pink);stroke-width:2.5;}88.24%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-report .shp{animation-name:k-report;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.46%{stroke-width:1.6;}11.03%{stroke:var(--pink);stroke-width:2.4;}22.06%{stroke:var(--pink);stroke-width:2.4;}24.63%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}19.49%{stroke-width:1.6;}22.06%{stroke:var(--pink);stroke-width:2.4;}33.09%{stroke:var(--pink);stroke-width:2.4;}35.66%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.51%{stroke-width:1.6;}33.09%{stroke:var(--pink);stroke-width:2.4;}44.12%{stroke:var(--pink);stroke-width:2.4;}46.69%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}41.54%{stroke-width:1.6;}44.12%{stroke:var(--pink);stroke-width:2.4;}55.15%{stroke:var(--pink);stroke-width:2.4;}57.72%{stroke-width:1.6;}63.60%{stroke-width:1.6;}66.18%{stroke:var(--pink);stroke-width:2.4;}77.21%{stroke:var(--pink);stroke-width:2.4;}79.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}52.57%{stroke-width:1.6;}55.15%{stroke:var(--pink);stroke-width:2.4;}66.18%{stroke:var(--pink);stroke-width:2.4;}68.75%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}74.63%{stroke-width:1.6;}77.21%{stroke:var(--pink);stroke-width:2.4;}88.24%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:13.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="206.5,62.0 206.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="206.5,148.0 206.5,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="206.5,234.0 206.5,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="206.5,320.0 206.5,360.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="133.3,383.0 16.0,383.0 16.0,297.0 138.2,297.0" marker-end="url(#arr)"/>
<text class="small" x="77.1" y="285.0" text-anchor="middle">אם נכשל</text>
<polyline id="edge-5" class="edge" points="206.5,406.0 206.5,446.0" marker-end="url(#arr)"/>
<text class="lbl" x="220.5" y="430.0" text-anchor="end">עבר</text>
<g id="el-task">
<rect class="n-box shp" x="96.0" y="16.0" width="221.1" height="46.0" rx="8"/>
<text class="t" x="206.5" y="44.0" text-anchor="middle">משימה: תקן באג בטופס</text>
</g>
