<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 334" width="330" role="img" aria-label="זרימת שליחת טופס: המשתמש ממלא שדה, נשלחת בקשת POST, השרת קורא את הערך דרך _POST ומדפיס תשובה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-form{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-form .shp{animation-name:k-form;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-submit{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-submit .shp{animation-name:k-submit;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-val{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-val .shp{animation-name:k-val;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-echo{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-echo .shp{animation-name:k-echo;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:1;}
@keyframes k-dyn-val-1{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="164.8,62.0 164.8,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="164.8,148.0 164.8,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="178.8" y="172.0" text-anchor="end">המידע נשלח לשרת</text>
<polyline id="edge-2" class="edge" points="164.8,232.0 164.8,272.0" marker-end="url(#arr)"/>
<g id="el-form">
<rect class="n-box shp" x="16.0" y="16.0" width="297.7" height="46.0" rx="8"/>
<text class="t" x="164.8" y="44.0" text-anchor="middle">המשתמש ממלא את שדה name בטופס</text>
</g>
<g id="el-submit">
<rect class="n-box shp" x="17.7" y="102.0" width="294.3" height="46.0" rx="8"/>
<text class="t" x="164.8" y="130.0" text-anchor="middle">שליחת בקשת POST ל-process.php</text>
</g>
<g id="el-val">
<rect class="n-box shp" x="53.8" y="188.0" width="222.1" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="164.8" y="215.0" text-anchor="middle" style="direction:ltr">$_POST['name'] = ?</text>
<text class="t-b dyn-val-1" x="164.8" y="215.0" text-anchor="middle" style="direction:ltr">$_POST['name'] = "Dan"</text>
</g>
<g id="el-echo">
<rect class="n-box shp" x="49.8" y="272.0" width="230.1" height="46.0" rx="8"/>
<text class="t" x="164.8" y="300.0" text-anchor="middle">השרת מדפיס: Hello, Dan</text>
</g>
</svg>
