<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 634" width="760" role="img" aria-label="מנגנון מוטציית XSS: הסניטייזר מאשר את הקלט ומסריאלז למחרוזת, וכשהיא נכנסת ל-innerHTML הפרסור השני מבצע מוטציה שמשחררת סקריפט, אלא אם מוחזר DOM fragment">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
