<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 226 434" width="226" role="img" aria-label="שרשרת ROP על המחסנית המזויפת: כל פקודת ret שולפת כתובת של גאדג'ט, מריצה אותו, וה-ret שבסופו שולף את הגאדג'ט הבא, כך שהתוקף משרשר גאדג'טים קיימים בלי להזריק קוד">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-ret{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ret .shp{animation-name:k-ret;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-g1{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-g1 .shp{animation-name:k-g1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-val{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-val .shp{animation-name:k-val;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-g2{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-g2 .shp{animation-name:k-g2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-g3{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-g3 .shp{animation-name:k-g3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="92.7,54.0 92.7,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="106.7" y="78.0" text-anchor="end">שולף גאדג'ט 1</text>
<polyline id="edge-1" class="edge" points="92.7,154.0 92.7,194.0" marker-end="url(#arr)"/>
<text class="lbl" x="106.7" y="178.0" text-anchor="end">טוען ערך ל-rdi</text>
<polyline id="edge-2" class="edge" points="92.7,232.0 92.7,272.0" marker-end="url(#arr)"/>
<text class="lbl" x="106.7" y="256.0" text-anchor="end">ret הבא</text>
<polyline id="edge-3" class="edge" points="92.7,332.0 92.7,372.0" marker-end="url(#arr)"/>
<text class="lbl" x="106.7" y="356.0" text-anchor="end">ret הבא</text>
<g id="el-ret">
<rect class="n-code-bg shp" x="44.7" y="16.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="92.7" y="43.0" text-anchor="middle">ret</text>
</g>
<g id="el-g1">
<rect class="n-code-bg shp" x="43.1" y="94.0" width="99.2" height="60.0" rx="7"/>
<text class="code" x="92.7" y="121.0" text-anchor="middle">pop rdi</text>
<text class="code" x="92.7" y="143.0" text-anchor="middle">ret</text>
</g>
<g id="el-val">
<rect class="n-code-bg shp" x="16.0" y="194.0" width="153.4" height="38.0" rx="7"/>
<text class="code" x="92.7" y="221.0" text-anchor="middle">rdi = /bin/sh</text>
</g>
<g id="el-g2">
<rect class="n-code-bg shp" x="43.1" y="272.0" width="99.2" height="60.0" rx="7"/>
<text class="code" x="92.7" y="299.0" text-anchor="middle">pop rax</text>
<text class="code" x="92.7" y="321.0" text-anchor="middle">ret</text>
</g>
<g id="el-g3">
<rect class="n-box shp" x="26.2" y="372.0" width="133.0" height="46.0" rx="8"/>
<text class="t" x="92.7" y="400.0" text-anchor="middle" style="direction:ltr">call system</text>
</g>
</svg>
