</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="93.4" y="16.0" width="487.4" height="38.0" rx="7"/>
<text class="code dyn-code-0" x="337.0" y="43.0" text-anchor="middle">old = atomic_load(val);</text>
<text class="code dyn-code-1" x="337.0" y="43.0" text-anchor="middle">compare_exchange_weak(val, &amp;old, old + 1) -&gt; false</text>
<text class="code dyn-code-2" x="337.0" y="43.0" text-anchor="middle">compare_exchange_weak(val, &amp;old, old + 1) -&gt; true</text>
</g>
<g id="el-shared">
<rect class="n-box shp" x="269.5" y="94.0" width="135.0" height="44.0" rx="8"/>
<text class="t-b dyn-shared-0" x="337.0" y="121.0" text-anchor="middle" style="direction:ltr">counter = 5</text>
<text class="t-b dyn-shared-1" x="337.0" y="121.0" text-anchor="middle" style="direction:ltr">counter = 6</text>
<text class="t-b dyn-shared-2" x="337.0" y="121.0" text-anchor="middle" style="direction:ltr">counter = 7</text>
</g>
<g id="el-mine">
<rect class="n-box shp" x="236.0" y="178.0" width="202.1" height="44.0" rx="8"/>
<text class="t-b dyn-mine-0" x="337.0" y="205.0" text-anchor="middle" style="direction:ltr">old = 5, desired = 6</text>
<text class="t-b dyn-mine-1" x="337.0" y="205.0" text-anchor="middle" style="direction:ltr">old = 6, desired = 7</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="262.0" width="642.1" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="337.0" y="290.0" text-anchor="middle">התהליכון קורא את הערך הנוכחי ומחשב ממנו את הערך הרצוי</text>
<text class="t dyn-note-1" x="337.0" y="290.0" text-anchor="middle">תהליכון אחר הספיק להעלות את המונה, ולכן הערך במשתנה כבר לא חמש</text>
<text class="t dyn-note-2" x="337.0" y="290.0" text-anchor="middle">הפעולה נכשלת כי הערך בזיכרון שונה מהערך שציפינו לו</text>
<text class="t dyn-note-3" x="337.0" y="290.0" text-anchor="middle">המשתנה old מתעדכן אוטומטית לערך הנוכחי, ולכן הניסיון הבא מחושב מחדש</text>
<text class="t dyn-note-4" x="337.0" y="290.0" text-anchor="middle">הניסיון השני מצליח כי אף אחד לא שינה את המונה בינתיים</text>
</g>
<g id="el-cap">
<text class="small" x="337.0" y="361.0" text-anchor="middle">כישלון של פעולת CAS תמיד אומר שתהליכון אחר התקדם, ולכן המערכת כולה מתקדמת גם בלי נעילות</text>
</g>
</svg>
