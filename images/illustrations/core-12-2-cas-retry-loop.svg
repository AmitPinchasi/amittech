.dyn-mine-0{opacity:0;}
@keyframes k-dyn-mine-0{0.00%{opacity:1;}51.35%{opacity:1;}54.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-mine-0{animation-name:k-dyn-mine-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
