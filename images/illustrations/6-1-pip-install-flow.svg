<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 301 406" width="301" role="img" aria-label="מסלול התקנת חבילה עם pip: הפקודה פונה למנהל החבילות, שמוריד את החבילה מהמאגר באינטרנט ומתקין אותה במחשב">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cmd{0.00%{stroke:var(--pink);stroke-width:2.5;}16.48%{stroke:var(--pink);stroke-width:2.5;}20.33%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmd .shp{animation-name:k-cmd;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pip{0.00%{stroke-width:1.5;}12.64%{stroke-width:1.5;}16.48%{stroke:var(--pink);stroke-width:2.5;}32.97%{stroke:var(--pink);stroke-width:2.5;}36.81%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pip .shp{animation-name:k-pip;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-repo{0.00%{stroke-width:1.5;}29.12%{stroke-width:1.5;}32.97%{stroke:var(--pink);stroke-width:2.5;}49.45%{stroke:var(--pink);stroke-width:2.5;}53.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-repo .shp{animation-name:k-repo;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-inst{0.00%{stroke-width:1.5;}45.60%{stroke-width:1.5;}49.45%{stroke:var(--pink);stroke-width:2.5;}65.93%{stroke:var(--pink);stroke-width:2.5;}69.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inst .shp{animation-name:k-inst;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-imp{0.00%{stroke-width:1.5;}62.09%{stroke-width:1.5;}65.93%{stroke:var(--pink);stroke-width:2.5;}82.42%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-imp .shp{animation-name:k-imp;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}12.64%{stroke-width:1.6;}16.48%{stroke:var(--pink);stroke-width:2.4;}32.97%{stroke:var(--pink);stroke-width:2.4;}36.81%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.12%{stroke-width:1.6;}32.97%{stroke:var(--pink);stroke-width:2.4;}49.45%{stroke:var(--pink);stroke-width:2.4;}53.30%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}45.60%{stroke-width:1.6;}49.45%{stroke:var(--pink);stroke-width:2.4;}65.93%{stroke:var(--pink);stroke-width:2.4;}69.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}62.09%{stroke-width:1.6;}65.93%{stroke:var(--pink);stroke-width:2.4;}82.42%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="135.6,54.0 135.6,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="149.6" y="78.0" text-anchor="end">מבקשים חבילה</text>
<polyline id="edge-1" class="edge" points="135.6,140.0 135.6,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="149.6" y="164.0" text-anchor="end">מחפש את החבילה</text>
<polyline id="edge-2" class="edge" points="135.6,226.0 135.6,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="149.6" y="250.0" text-anchor="end">מוריד ומתקין</text>
<polyline id="edge-3" class="edge" points="135.6,312.0 135.6,352.0" marker-end="url(#arr)"/>
<text class="lbl" x="149.6" y="336.0" text-anchor="end">מוכנה לשימוש בקוד</text>
<g id="el-cmd">
<rect class="n-code-bg shp" x="27.3" y="16.0" width="216.5" height="38.0" rx="7"/>
<text class="code" x="135.6" y="43.0" text-anchor="middle">pip install requests</text>
</g>
<g id="el-pip">
<rect class="n-box shp" x="36.8" y="94.0" width="197.6" height="46.0" rx="8"/>
<text class="t" x="135.6" y="122.0" text-anchor="middle">מנהל החבילות - pip</text>
</g>
<g id="el-repo">
<rect class="n-box shp" x="16.0" y="180.0" width="239.2" height="46.0" rx="8"/>
<text class="t" x="135.6" y="208.0" text-anchor="middle">מאגר החבילות באינטרנט</text>
</g>
<g id="el-inst">
<rect class="n-box shp" x="25.7" y="266.0" width="219.7" height="46.0" rx="8"/>
<text class="t" x="135.6" y="294.0" text-anchor="middle">החבילה מותקנת במחשב</text>
</g>
<g id="el-imp">
<rect class="n-code-bg shp" x="49.9" y="352.0" width="171.4" height="38.0" rx="7"/>
<text class="code" x="135.6" y="379.0" text-anchor="middle">import requests</text>
</g>
</svg>
