<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 649" width="590" role="img" aria-label="תרשים זרימה של התקפת Stored XSS: תגובה זדונית נשמרת בשרת, וכשאין סניטציה הסקריפט רץ אצל הקורבן וגונב את העוגייה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
