<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 676 234" width="676" role="img" aria-label="אנימציה של שני leave;ret ברצף בפיבוט - האפילוג של הפונקציה הפגיעה מעביר את rbp לכתובת הבמה, והגאדג'ט השני מזיז את rsp לשם ובולע 8 בתים עם pop rbp, כך שהchain האמיתית מתחילה ב-stage+8">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-code .shp{animation-name:k-code;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-state{0.00%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-state .shp{animation-name:k-state;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-note{0.00%{stroke-width:1.5;}58.85%{stroke-width:1.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-note .shp{animation-name:k-note;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}17.19%{stroke-width:1.6;}20.83%{stroke:var(--pink);stroke-width:2.4;}83.33%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-0{opacity:0;}
@keyframes k-dyn-state-0{0.00%{opacity:1;}20.83%{opacity:1;}24.48%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-0{animation-name:k-dyn-state-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-1{opacity:0;}
@keyframes k-dyn-state-1{0.00%{opacity:0;}17.19%{opacity:0;}20.83%{opacity:1;}41.67%{opacity:1;}45.31%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-1{animation-name:k-dyn-state-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-2{opacity:0;}
@keyframes k-dyn-state-2{0.00%{opacity:0;}38.02%{opacity:0;}41.67%{opacity:1;}62.50%{opacity:1;}66.15%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-2{animation-name:k-dyn-state-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-3{opacity:1;}
@keyframes k-dyn-state-3{0.00%{opacity:0;}58.85%{opacity:0;}62.50%{opacity:1;}83.33%{opacity:1;}100.00%{opacity:1;}}
.dyn-state-3{animation-name:k-dyn-state-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="338.0,76.0 338.0,116.0" marker-end="url(#arr)"/>
<g id="el-code">
<rect class="n-code-bg shp" x="166.5" y="16.0" width="342.9" height="60.0" rx="7"/>
<text class="code" x="338.0" y="43.0" text-anchor="middle">leave ; ret     ; epilogue of vuln</text>
<text class="code" x="338.0" y="65.0" text-anchor="middle">leave ; ret     ; our gadget</text>
</g>
<g id="el-state">
<rect class="n-box shp" x="16.0" y="116.0" width="644.0" height="44.0" rx="8"/>
<text class="t-b dyn-state-0" x="338.0" y="143.0" text-anchor="middle">ה-leave של vuln: rsp = saved rbp; pop rbp -&gt; rbp = stage</text>
<text class="t-b dyn-state-1" x="338.0" y="143.0" text-anchor="middle">ה-ret של vuln קופץ לגאדג'ט leave;ret ש-rbp מצביע עליו</text>
<text class="t-b dyn-state-2" x="338.0" y="143.0" text-anchor="middle">ה-leave של הגאדג'ט: rsp = rbp = stage; pop rbp -&gt; rbp=[stage], rsp=stage+8</text>
<text class="t-b dyn-state-3" x="338.0" y="143.0" text-anchor="middle">ה-ret קופץ ל-[stage+8] - הגאדג'ט הראשון בchain שלנו</text>
</g>
<g id="el-note">
<text class="small" x="338.0" y="213.0" text-anchor="middle">8 הבתים הראשונים בבמה נבלעים על ידי pop rbp השני - משאירים אותם כריפוד</text>
</g>
</svg>
