@keyframes k-eq{0.00%{stroke-width:1.5;}28.11%{stroke-width:1.5;}30.18%{stroke:var(--pink);stroke-width:2.5;}40.24%{stroke:var(--pink);stroke-width:2.5;}42.31%{stroke-width:1.5;}68.34%{stroke-width:1.5;}70.41%{stroke:var(--pink);stroke-width:2.5;}80.47%{stroke:var(--pink);stroke-width:2.5;}82.54%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
