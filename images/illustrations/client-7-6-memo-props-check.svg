@keyframes k-rr{0.00%{stroke-width:1.5;}78.40%{stroke-width:1.5;}80.47%{stroke:var(--pink);stroke-width:2.5;}90.53%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
