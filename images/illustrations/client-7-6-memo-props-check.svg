@keyframes k-edge-5{0.00%{stroke-width:1.6;}78.40%{stroke-width:1.6;}80.47%{stroke:var(--pink);stroke-width:2.4;}90.53%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pr-0{opacity:0;}
@keyframes k-dyn-pr-0{0.00%{opacity:1;}50.30%{opacity:1;}52.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-pr-0{animation-name:k-dyn-pr-0;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pr-1{opacity:1;}
@keyframes k-dyn-pr-1{0.00%{opacity:0;}48.22%{opacity:0;}50.30%{opacity:1;}90.53%{opacity:1;}100.00%{opacity:1;}}
.dyn-pr-1{animation-name:k-dyn-pr-1;animation-duration:16.90s;animation-iteration-count:infinite;animation-timing-function:linear;}
