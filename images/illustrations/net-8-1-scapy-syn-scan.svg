<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 485 329" width="485" role="img" aria-label="סריקת SYN עם Scapy: שולחים packet עם דגל SYN לפורט, ואם חוזר SYN-ACK הפורט פתוח, ואם חוזר RST הפורט סגור">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-send{0.00%{stroke:var(--pink);stroke-width:2.5;}25.37%{stroke:var(--pink);stroke-width:2.5;}30.60%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-send .shp{animation-name:k-send;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-resp{0.00%{stroke-width:1.5;}20.15%{stroke-width:1.5;}25.37%{stroke:var(--pink);stroke-width:2.5;}50.75%{stroke:var(--pink);stroke-width:2.5;}55.97%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-resp .shp{animation-name:k-resp;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-open{0.00%{stroke-width:1.5;}45.52%{stroke-width:1.5;}50.75%{stroke:var(--pink);stroke-width:2.5;}76.12%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-open .shp{animation-name:k-open;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}20.15%{stroke-width:1.6;}25.37%{stroke:var(--pink);stroke-width:2.4;}50.75%{stroke:var(--pink);stroke-width:2.4;}55.97%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}45.52%{stroke-width:1.6;}50.75%{stroke:var(--pink);stroke-width:2.4;}76.12%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="141.3,62.0 141.3,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="266.6,164.6 332.6,164.6" marker-end="url(#arr)"/>
<text class="lbl" x="299.6" y="152.6" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="141.3,227.3 141.3,267.3" marker-end="url(#arr)"/>
<text class="lbl" x="155.3" y="251.3" text-anchor="end">לא</text>
<g id="el-send">
<rect class="n-box shp" x="17.3" y="16.0" width="248.0" height="46.0" rx="8"/>
<text class="t" x="141.3" y="44.0" text-anchor="middle">Scapy שולח SYN לפורט 80</text>
</g>
<g id="el-resp">
<polygon class="n-dia shp" points="141.3,102.0 266.6,164.6 141.3,227.3 16.0,164.6"/>
<text class="t" x="141.3" y="169.6" text-anchor="middle">חזר SYN-ACK ?</text>
</g>
<g id="el-open">
<rect class="n-box shp" x="332.6" y="141.6" width="136.7" height="46.0" rx="8"/>
<text class="t" x="401.0" y="169.6" text-anchor="middle">הפורט פתוח</text>
</g>
<g id="el-closed">
<rect class="n-box shp" x="32.1" y="267.3" width="218.4" height="46.0" rx="8"/>
<text class="t" x="141.3" y="295.3" text-anchor="middle">הפורט סגור - חזר RST</text>
</g>
</svg>
