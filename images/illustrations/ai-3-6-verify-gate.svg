<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 642 420" width="642" role="img" aria-label="שער אימות לעבודת agent: המשפט סיימתי הוא טענה ולא עובדה, לכן דורשים ראיה של הרצה בפועל וdiff ובדיקות, ואם הראיה לא מוכיחה חוזרים לתיקון, ורק ראיה שמוכיחה מובילה לאישור">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-claim{0.00%{stroke:var(--pink);stroke-width:2.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}15.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-claim .shp{animation-name:k-claim;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-evidence{0.00%{stroke-width:1.5;}9.77%{stroke-width:1.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}27.73%{stroke-width:1.5;}47.27%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}65.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-evidence .shp{animation-name:k-evidence;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-gate{0.00%{stroke-width:1.5;}22.27%{stroke-width:1.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}40.23%{stroke-width:1.5;}59.77%{stroke-width:1.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}77.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-gate .shp{animation-name:k-gate;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fix{0.00%{stroke-width:1.5;}34.77%{stroke-width:1.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}52.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fix .shp{animation-name:k-fix;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-accept{0.00%{stroke-width:1.5;}72.27%{stroke-width:1.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}87.50%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-accept .shp{animation-name:k-accept;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.77%{stroke-width:1.6;}12.50%{stroke:var(--pink);stroke-width:2.4;}25.00%{stroke:var(--pink);stroke-width:2.4;}27.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.27%{stroke-width:1.6;}25.00%{stroke:var(--pink);stroke-width:2.4;}37.50%{stroke:var(--pink);stroke-width:2.4;}40.23%{stroke-width:1.6;}59.77%{stroke-width:1.6;}62.50%{stroke:var(--pink);stroke-width:2.4;}75.00%{stroke:var(--pink);stroke-width:2.4;}77.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}34.77%{stroke-width:1.6;}37.50%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}52.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}47.27%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}62.50%{stroke:var(--pink);stroke-width:2.4;}65.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}72.27%{stroke-width:1.6;}75.00%{stroke:var(--pink);stroke-width:2.4;}87.50%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="254.1,62.0 254.1,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="254.1,148.0 254.1,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="254.1,318.1 254.1,358.1" marker-end="url(#arr)"/>
<text class="lbl" x="268.1" y="342.1" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="152.5,381.1 16.2,381.1 16.2,125.0 96.2,125.0" marker-end="url(#arr)"/>
<text class="small" x="56.2" y="113.0" text-anchor="middle">בודקים שוב</text>
<polyline id="edge-4" class="edge" points="384.2,253.0 450.2,253.0" marker-end="url(#arr)"/>
<text class="lbl" x="417.2" y="241.0" text-anchor="middle">כן</text>
<g id="el-claim">
<rect class="n-box shp" x="143.6" y="16.0" width="221.1" height="46.0" rx="8"/>
<text class="t" x="254.1" y="44.0" text-anchor="middle">טענה - המשימה הושלמה</text>
</g>
<g id="el-evidence">
<rect class="n-box shp" x="96.2" y="102.0" width="315.8" height="46.0" rx="8"/>
<text class="t" x="254.1" y="130.0" text-anchor="middle">דורשים ראיה - הרצה, diff, בדיקות</text>
</g>
<g id="el-gate">
<polygon class="n-dia shp" points="254.1,188.0 384.2,253.0 254.1,318.1 124.0,253.0"/>
<text class="t" x="254.1" y="258.0" text-anchor="middle">הראיה מוכיחה?</text>
</g>
<g id="el-fix">
<rect class="n-box shp" x="152.5" y="358.1" width="203.3" height="46.0" rx="8"/>
<text class="t" x="254.1" y="386.1" text-anchor="middle">חזרה לagent לתיקון</text>
</g>
<g id="el-accept">
<rect class="n-box shp" x="450.2" y="230.0" width="175.7" height="46.0" rx="8"/>
<text class="t" x="538.1" y="258.0" text-anchor="middle">מאשרים בביטחון</text>
</g>
</svg>
