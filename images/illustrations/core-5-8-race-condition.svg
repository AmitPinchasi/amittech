<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 592 446" width="592" role="img" aria-label="איור מרוץ תחרות בין שני תהליכונים: שניהם קוראים את הערך 5, שניהם מחשבים 6, ולכן עדכון אחד אובד והמונה מגיע ל-6 במקום ל-7">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ta{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}27.82%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}53.17%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ta .shp{animation-name:k-ta;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tb{0.00%{stroke-width:1.5;}22.89%{stroke-width:1.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}48.24%{stroke-width:1.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-tb .shp{animation-name:k-tb;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mem{0.00%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-mem .shp{animation-name:k-mem;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ta-0{opacity:0;}
@keyframes k-dyn-ta-0{0.00%{opacity:1;}12.68%{opacity:1;}15.14%{opacity:0;}100.00%{opacity:0;}}
.dyn-ta-0{animation-name:k-dyn-ta-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ta-1{opacity:0;}
@keyframes k-dyn-ta-1{0.00%{opacity:0;}10.21%{opacity:0;}12.68%{opacity:1;}38.03%{opacity:1;}40.49%{opacity:0;}100.00%{opacity:0;}}
.dyn-ta-1{animation-name:k-dyn-ta-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ta-2{opacity:0;}
@keyframes k-dyn-ta-2{0.00%{opacity:0;}35.56%{opacity:0;}38.03%{opacity:1;}63.38%{opacity:1;}65.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-ta-2{animation-name:k-dyn-ta-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ta-3{opacity:1;}
@keyframes k-dyn-ta-3{0.00%{opacity:0;}60.92%{opacity:0;}63.38%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-ta-3{animation-name:k-dyn-ta-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-tb-0{opacity:0;}
@keyframes k-dyn-tb-0{0.00%{opacity:1;}25.35%{opacity:1;}27.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-tb-0{animation-name:k-dyn-tb-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-tb-1{opacity:0;}
@keyframes k-dyn-tb-1{0.00%{opacity:0;}22.89%{opacity:0;}25.35%{opacity:1;}50.70%{opacity:1;}53.17%{opacity:0;}100.00%{opacity:0;}}
.dyn-tb-1{animation-name:k-dyn-tb-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-tb-2{opacity:0;}
@keyframes k-dyn-tb-2{0.00%{opacity:0;}48.24%{opacity:0;}50.70%{opacity:1;}76.06%{opacity:1;}78.52%{opacity:0;}100.00%{opacity:0;}}
.dyn-tb-2{animation-name:k-dyn-tb-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-tb-3{opacity:1;}
@keyframes k-dyn-tb-3{0.00%{opacity:0;}73.59%{opacity:0;}76.06%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-tb-3{animation-name:k-dyn-tb-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-mem-0{opacity:0;}
@keyframes k-dyn-mem-0{0.00%{opacity:1;}63.38%{opacity:1;}65.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-mem-0{animation-name:k-dyn-mem-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-mem-1{opacity:0;}
@keyframes k-dyn-mem-1{0.00%{opacity:0;}60.92%{opacity:0;}63.38%{opacity:1;}76.06%{opacity:1;}78.52%{opacity:0;}100.00%{opacity:0;}}
.dyn-mem-1{animation-name:k-dyn-mem-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-mem-2{opacity:1;}
@keyframes k-dyn-mem-2{0.00%{opacity:0;}73.59%{opacity:0;}76.06%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-mem-2{animation-name:k-dyn-mem-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="129.2" y="16.0" width="333.9" height="104.0" rx="7"/>
<text class="code" x="296.2" y="43.0" text-anchor="middle">counter++  is really three steps:</text>
<text class="code" x="296.2" y="65.0" text-anchor="middle">load counter -&gt; reg</text>
<text class="code" x="296.2" y="87.0" text-anchor="middle">reg = reg + 1</text>
<text class="code" x="296.2" y="109.0" text-anchor="middle">store reg -&gt; counter</text>
</g>
<g id="el-ta">
<rect class="n-box shp" x="124.0" y="160.0" width="344.3" height="44.0" rx="8"/>
<text class="t-b dyn-ta-0" x="296.2" y="187.0" text-anchor="middle">התהליכון A ממתין</text>
<text class="t-b dyn-ta-1" x="296.2" y="187.0" text-anchor="middle">התהליכון A קורא counter ומקבל 5</text>
<text class="t-b dyn-ta-2" x="296.2" y="187.0" text-anchor="middle">התהליכון A מחשב 5 ועוד 1 ומקבל 6</text>
<text class="t-b dyn-ta-3" x="296.2" y="187.0" text-anchor="middle">התהליכון A כותב counter = 6</text>
</g>
<g id="el-tb">
<rect class="n-box shp" x="124.0" y="244.0" width="344.3" height="44.0" rx="8"/>
<text class="t-b dyn-tb-0" x="296.2" y="271.0" text-anchor="middle">התהליכון B ממתין</text>
<text class="t-b dyn-tb-1" x="296.2" y="271.0" text-anchor="middle">התהליכון B קורא counter ומקבל 5</text>
<text class="t-b dyn-tb-2" x="296.2" y="271.0" text-anchor="middle">התהליכון B מחשב 5 ועוד 1 ומקבל 6</text>
<text class="t-b dyn-tb-3" x="296.2" y="271.0" text-anchor="middle">התהליכון B כותב counter = 6</text>
</g>
<g id="el-mem">
<rect class="n-box shp" x="191.8" y="328.0" width="208.9" height="44.0" rx="8"/>
<text class="t-b dyn-mem-0" x="296.2" y="355.0" text-anchor="middle" style="direction:ltr">counter = 5</text>
<text class="t-b dyn-mem-1" x="296.2" y="355.0" text-anchor="middle" style="direction:ltr">counter = 6</text>
<text class="t-b dyn-mem-2" x="296.2" y="355.0" text-anchor="middle">counter = 6 במקום 7</text>
</g>
<g id="el-note">
<text class="small" x="296.2" y="425.0" text-anchor="middle">שני התהליכונים קראו את אותו ערך לפני שאחד מהם הספיק לכתוב, ולכן עדכון שלם נמחק</text>
</g>
</svg>
