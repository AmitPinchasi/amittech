@keyframes k-d3{0.00%{stroke-width:1.5;}29.12%{stroke-width:1.5;}32.97%{stroke:var(--pink);stroke-width:2.5;}49.45%{stroke:var(--pink);stroke-width:2.5;}53.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
