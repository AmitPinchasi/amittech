@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.12%{stroke-width:1.6;}32.97%{stroke:var(--pink);stroke-width:2.4;}49.45%{stroke:var(--pink);stroke-width:2.4;}53.30%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}45.60%{stroke-width:1.6;}49.45%{stroke:var(--pink);stroke-width:2.4;}65.93%{stroke:var(--pink);stroke-width:2.4;}69.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}62.09%{stroke-width:1.6;}65.93%{stroke:var(--pink);stroke-width:2.4;}82.42%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="144.0,62.0 144.0,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="144.0,148.0 144.0,188.0" marker-end="url(#arr)"/>
