@keyframes k-d4{0.00%{stroke-width:1.5;}45.60%{stroke-width:1.5;}49.45%{stroke:var(--pink);stroke-width:2.5;}65.93%{stroke:var(--pink);stroke-width:2.5;}69.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-d4 .shp{animation-name:k-d4;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-d5{0.00%{stroke-width:1.5;}62.09%{stroke-width:1.5;}65.93%{stroke:var(--pink);stroke-width:2.5;}82.42%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-d5 .shp{animation-name:k-d5;animation-duration:9.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}12.64%{stroke-width:1.6;}16.48%{stroke:var(--pink);stroke-width:2.4;}32.97%{stroke:var(--pink);stroke-width:2.4;}36.81%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
