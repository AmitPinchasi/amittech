<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 298 466" width="298" role="img" aria-label="מחזור החיים של תוכנית CUDA: הקצאה, העתקת קלט אל ה-device, הרצת ה-kernel, החזרת התוצאה ושחרור">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-malloc{0.00%{stroke:var(--pink);stroke-width:2.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}20.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-malloc .shp{animation-name:k-malloc;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-h2d{0.00%{stroke-width:1.5;}13.37%{stroke-width:1.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}37.13%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-h2d .shp{animation-name:k-h2d;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-launch{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-launch .shp{animation-name:k-launch;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-d2h{0.00%{stroke-width:1.5;}47.03%{stroke-width:1.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}70.79%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-d2h .shp{animation-name:k-d2h;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-free{0.00%{stroke-width:1.5;}63.86%{stroke-width:1.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-free .shp{animation-name:k-free;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.37%{stroke-width:1.6;}16.83%{stroke:var(--pink);stroke-width:2.4;}33.66%{stroke:var(--pink);stroke-width:2.4;}37.13%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.20%{stroke-width:1.6;}33.66%{stroke:var(--pink);stroke-width:2.4;}50.50%{stroke:var(--pink);stroke-width:2.4;}53.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.03%{stroke-width:1.6;}50.50%{stroke:var(--pink);stroke-width:2.4;}67.33%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}63.86%{stroke-width:1.6;}67.33%{stroke:var(--pink);stroke-width:2.4;}84.16%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}63.86%{stroke-width:1.6;}67.33%{stroke:var(--pink);stroke-width:2.4;}84.16%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-0{opacity:0;}
@keyframes k-dyn-state-0{0.00%{opacity:1;}16.83%{opacity:1;}20.30%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-0{animation-name:k-dyn-state-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-1{opacity:0;}
@keyframes k-dyn-state-1{0.00%{opacity:0;}13.37%{opacity:0;}16.83%{opacity:1;}33.66%{opacity:1;}37.13%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-1{animation-name:k-dyn-state-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-2{opacity:0;}
@keyframes k-dyn-state-2{0.00%{opacity:0;}30.20%{opacity:0;}33.66%{opacity:1;}50.50%{opacity:1;}53.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-2{animation-name:k-dyn-state-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-3{opacity:0;}
@keyframes k-dyn-state-3{0.00%{opacity:0;}47.03%{opacity:0;}50.50%{opacity:1;}67.33%{opacity:1;}70.79%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-3{animation-name:k-dyn-state-3;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-4{opacity:1;}
@keyframes k-dyn-state-4{0.00%{opacity:0;}63.86%{opacity:0;}67.33%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-state-4{animation-name:k-dyn-state-4;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="148.9,54.0 148.9,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="148.9,132.0 148.9,172.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="148.9,210.0 148.9,250.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="148.9,288.0 148.9,328.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="148.9,366.0 148.9,406.0" marker-end="url(#arr)"/>
<g id="el-malloc">
<rect class="n-code-bg shp" x="36.1" y="16.0" width="225.6" height="38.0" rx="7"/>
<text class="code" x="148.9" y="43.0" text-anchor="middle">cudaMalloc(&amp;d, bytes)</text>
</g>
<g id="el-h2d">
<rect class="n-code-bg shp" x="63.2" y="94.0" width="171.4" height="38.0" rx="7"/>
<text class="code" x="148.9" y="121.0" text-anchor="middle">cudaMemcpy(H2D)</text>
</g>
<g id="el-launch">
<rect class="n-code-bg shp" x="54.2" y="172.0" width="189.5" height="38.0" rx="7"/>
<text class="code" x="148.9" y="199.0" text-anchor="middle">vecAdd&lt;&lt;&lt;...&gt;&gt;&gt;()</text>
</g>
<g id="el-d2h">
<rect class="n-code-bg shp" x="63.2" y="250.0" width="171.4" height="38.0" rx="7"/>
<text class="code" x="148.9" y="277.0" text-anchor="middle">cudaMemcpy(D2H)</text>
</g>
<g id="el-free">
<rect class="n-code-bg shp" x="81.3" y="328.0" width="135.3" height="38.0" rx="7"/>
<text class="code" x="148.9" y="355.0" text-anchor="middle">cudaFree(d)</text>
</g>
<g id="el-state">
<rect class="n-box shp" x="16.0" y="406.0" width="265.8" height="44.0" rx="8"/>
<text class="t-b dyn-state-0" x="148.9" y="433.0" text-anchor="middle">הוקצה זיכרון על ה-device</text>
<text class="t-b dyn-state-1" x="148.9" y="433.0" text-anchor="middle">הקלט הועתק אל ה-device</text>
<text class="t-b dyn-state-2" x="148.9" y="433.0" text-anchor="middle">ה-kernel חישב על ה-device</text>
<text class="t-b dyn-state-3" x="148.9" y="433.0" text-anchor="middle">התוצאה חזרה אל ה-host</text>
<text class="t-b dyn-state-4" x="148.9" y="433.0" text-anchor="middle">זיכרון ה-device שוחרר</text>
</g>
