<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 518 398" width="518" role="img" aria-label="מחזור העבודה של Terraform: מגדירים משאבים בקוד ואז מריצים init, plan ו-apply כדי להקים את התשתית בענן, ו-destroy מסיר את הכל">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-write{0.00%{stroke:var(--pink);stroke-width:2.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}20.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-write .shp{animation-name:k-write;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-init{0.00%{stroke-width:1.5;}13.02%{stroke-width:1.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}36.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-init .shp{animation-name:k-init;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-plan{0.00%{stroke-width:1.5;}29.69%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}53.65%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-plan .shp{animation-name:k-plan;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-apply{0.00%{stroke-width:1.5;}46.35%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}70.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-apply .shp{animation-name:k-apply;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cloud{0.00%{stroke-width:1.5;}63.02%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-cloud .shp{animation-name:k-cloud;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.02%{stroke-width:1.6;}16.67%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}36.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.69%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}53.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}46.35%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}66.67%{stroke:var(--pink);stroke-width:2.4;}70.31%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}63.02%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}83.33%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="141.7,62.0 141.7,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="141.7,140.0 141.7,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="155.7" y="164.0" text-anchor="end">מוריד plugins</text>
<polyline id="edge-2" class="edge" points="141.7,218.0 141.7,258.0" marker-end="url(#arr)"/>
<text class="lbl" x="155.7" y="242.0" text-anchor="end">מציג שינויים</text>
<polyline id="edge-3" class="edge" points="141.7,296.0 141.7,336.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="246.6,359.0 312.6,359.0" marker-end="url(#arr)"/>
<text class="lbl" x="279.6" y="347.0" text-anchor="middle">מסיר הכל</text>
<g id="el-write">
<rect class="n-box shp" x="16.0" y="16.0" width="251.3" height="46.0" rx="8"/>
<text class="t" x="141.7" y="44.0" text-anchor="middle">מגדירים משאבים בקבצי tf</text>
</g>
<g id="el-init">
<rect class="n-code-bg shp" x="60.5" y="102.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="141.7" y="129.0" text-anchor="middle">terraform init</text>
</g>
<g id="el-plan">
<rect class="n-code-bg shp" x="60.5" y="180.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="141.7" y="207.0" text-anchor="middle">terraform plan</text>
</g>
<g id="el-apply">
<rect class="n-code-bg shp" x="56.0" y="258.0" width="171.4" height="38.0" rx="7"/>
<text class="code" x="141.7" y="285.0" text-anchor="middle">terraform apply</text>
</g>
<g id="el-cloud">
<rect class="n-box shp" x="36.7" y="336.0" width="210.0" height="46.0" rx="8"/>
<text class="t" x="141.7" y="364.0" text-anchor="middle">המשאבים עולים בענן</text>
</g>
<g id="el-destroy">
<rect class="n-code-bg shp" x="312.6" y="340.0" width="189.5" height="38.0" rx="7"/>
<text class="code" x="407.4" y="367.0" text-anchor="middle">terraform destroy</text>
</g>
</svg>
