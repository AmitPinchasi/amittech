<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 349 500" width="349" role="img" aria-label="צינור הכלים בעבודת ניצול בינארי: מבינארי לא מוכר עוברים לבדיקת הגנות עם checksec, לפירוק סטטי עם Ghidra, לניפוי דינמי עם gdb ו-pwndbg, לכתיבת exploit עם pwntools, ולבסוף לקבלת shell">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="158.5,54.0 158.5,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="172.5" y="78.0" text-anchor="end">אילו הגנות דלוקות</text>
<polyline id="edge-1" class="edge" points="158.5,140.0 158.5,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="172.5" y="164.0" text-anchor="end">איך הקוד בנוי</text>
<polyline id="edge-2" class="edge" points="158.5,226.0 158.5,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="172.5" y="250.0" text-anchor="end">אימות בזמן ריצה</text>
<polyline id="edge-3" class="edge" points="158.5,312.0 158.5,352.0" marker-end="url(#arr)"/>
<text class="lbl" x="172.5" y="336.0" text-anchor="end">בונים מטען</text>
<polyline id="edge-4" class="edge" points="158.5,398.0 158.5,438.0" marker-end="url(#arr)"/>
<text class="lbl" x="172.5" y="422.0" text-anchor="end">שולחים ומקבלים שליטה</text>
<g id="el-bin">
<rect class="n-code-bg shp" x="108.9" y="16.0" width="99.2" height="38.0" rx="7"/>
<text class="code" x="158.5" y="43.0" text-anchor="middle">./chall</text>
</g>
<g id="el-recon">
<rect class="n-box shp" x="43.6" y="94.0" width="229.8" height="46.0" rx="8"/>
<text class="t" x="158.5" y="122.0" text-anchor="middle">בדיקת הגנות - checksec</text>
</g>
<g id="el-static">
<rect class="n-box shp" x="16.0" y="180.0" width="284.9" height="46.0" rx="8"/>
<text class="t" x="158.5" y="208.0" text-anchor="middle">פירוק סטטי - Ghidra ו-objdump</text>
</g>
<g id="el-dyn">
<rect class="n-box shp" x="28.9" y="266.0" width="259.0" height="46.0" rx="8"/>
<text class="t" x="158.5" y="294.0" text-anchor="middle">ניפוי דינמי - gdb ו-pwndbg</text>
</g>
<g id="el-exp">
<rect class="n-box shp" x="38.5" y="352.0" width="239.9" height="46.0" rx="8"/>
<text class="t" x="158.5" y="380.0" text-anchor="middle">כתיבת exploit - pwntools</text>
</g>
<g id="el-shell">
<rect class="n-box shp" x="59.2" y="438.0" width="198.6" height="46.0" rx="8"/>
<text class="t" x="158.5" y="466.0" text-anchor="middle">קבלת shell או הדגל</text>
</g>
</svg>
