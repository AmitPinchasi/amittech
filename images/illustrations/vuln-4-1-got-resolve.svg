<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="258.4,54.0 258.4,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="258.4,140.0 258.4,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="258.4,226.0 258.4,266.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="496.8,385.2 584.8,385.2 584.8,504.4" marker-end="url(#arr)"/>
<text class="lbl" x="540.8" y="373.2" text-anchor="middle">כן</text>
<polyline id="edge-4" class="edge" points="584.8,550.4 584.8,613.4 458.3,613.4" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="258.4,504.4 258.4,590.4" marker-end="url(#arr)"/>
<text class="lbl" x="272.4" y="551.4" text-anchor="end">לא</text>
<polyline id="edge-6" class="edge" points="258.4,636.4 258.4,676.4" marker-end="url(#arr)"/>
<g id="el-call">
<rect class="n-code-bg shp" x="181.7" y="16.0" width="153.4" height="38.0" rx="7"/>
<text class="code" x="258.4" y="43.0" text-anchor="middle">call puts@plt</text>
</g>
<g id="el-plt">
<rect class="n-box shp" x="69.1" y="94.0" width="378.7" height="46.0" rx="8"/>
<text class="t" x="258.4" y="122.0" text-anchor="middle">puts@plt מבצע קפיצה עקיפה jmp *[puts@got]</text>
</g>
<g id="el-got">
<rect class="n-box shp" x="74.1" y="180.0" width="368.6" height="46.0" rx="8"/>
<text class="t dyn-got-0" x="258.4" y="208.0" text-anchor="middle">puts@got מצביע בחזרה ל-puts@plt+6</text>
<text class="t dyn-got-1" x="258.4" y="208.0" text-anchor="middle">puts@got מכיל את הכתובת האמיתית ב-libc</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="258.4,266.0 496.8,385.2 258.4,504.4 20.0,385.2"/>
<text class="t dyn-cond-0" x="258.4" y="390.2" text-anchor="middle">זו הקריאה הראשונה ל-puts?</text>
<text class="t dyn-cond-1" x="258.4" y="390.2" text-anchor="middle">כן - עדיין לא נפתר</text>
<text class="t dyn-cond-2" x="258.4" y="390.2" text-anchor="middle">לא - כבר פתור</text>
</g>
<g id="el-resolve">
<rect class="n-box shp" x="397.5" y="504.4" width="374.6" height="46.0" rx="8"/>
<text class="t" x="584.8" y="532.4" text-anchor="middle">הפותר הדינמי כותב את הכתובת לתא ה-GOT</text>
</g>
<g id="el-jump">
<rect class="n-box shp" x="58.5" y="590.4" width="399.8" height="46.0" rx="8"/>
<text class="t" x="258.4" y="618.4" text-anchor="middle">קפיצה ישירה לקוד האמיתי של puts בתוך libc</text>
</g>
<g id="el-risk">
<text class="small" x="258.4" y="689.4" text-anchor="middle">תא ה-GOT נשאר ניתן לכתיבה - מי שכותב אליו שולט לאן הקריאה הבאה תקפוץ</text>
</g>
</svg>
