#edge-6{animation-name:k-edge-6;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-got-0{opacity:0;}
@keyframes k-dyn-got-0{0.00%{opacity:1;}40.45%{opacity:1;}42.42%{opacity:0;}100.00%{opacity:0;}}
