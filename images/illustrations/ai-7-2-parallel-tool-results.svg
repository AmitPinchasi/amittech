<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 426 424" width="426" role="img" aria-label="שימוש מקבילי בכלים: בתשובה אחת המודל מבקש כמה קריאות tool בבת אחת, אנחנו מריצים את כל הפונקציות, ומחזירים את כל התוצאות יחד בהודעת user אחת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-intro">
<text class="small" x="213.1" y="29.0" text-anchor="middle">המודל יכול לבקש כמה tools בבת אחת - בתשובה אחת</text>
</g>
<g id="el-resp">
<rect id="el-resp-c0" class="n-cell shp" x="292.1" y="74.0" width="118.0" height="46.0" rx="6"/>
<text class="t" x="351.1" y="102.0" text-anchor="middle" style="direction:ltr">get_weather</text>
<rect id="el-resp-c1" class="n-cell shp" x="154.0" y="74.0" width="118.0" height="46.0" rx="6"/>
<text class="t" x="213.1" y="102.0" text-anchor="middle" style="direction:ltr">get_news</text>
<rect id="el-resp-c2" class="n-cell shp" x="16.0" y="74.0" width="118.0" height="46.0" rx="6"/>
<text class="t" x="75.0" y="102.0" text-anchor="middle" style="direction:ltr">get_time</text>
</g>
<g id="el-lbl1">
<text class="small" x="213.1" y="173.0" text-anchor="middle">תגובת assistant אחת עם שלושה בלוקי tool_use</text>
</g>
<g id="el-run">
<rect class="n-box shp" x="59.2" y="218.0" width="307.8" height="46.0" rx="8"/>
<text class="t" x="213.1" y="246.0" text-anchor="middle">מריצים את כל הפונקציות במקביל</text>
</g>
<g id="el-res">
<rect id="el-res-c0" class="n-cell shp" x="284.4" y="304.0" width="102.6" height="46.0" rx="6"/>
<text class="t" x="335.7" y="332.0" text-anchor="middle">26 מעלות</text>
<rect id="el-res-c1" class="n-cell shp" x="161.8" y="304.0" width="102.6" height="46.0" rx="6"/>
<text class="t" x="213.1" y="332.0" text-anchor="middle">3 כותרות</text>
<rect id="el-res-c2" class="n-cell shp" x="39.2" y="304.0" width="102.6" height="46.0" rx="6"/>
<text class="t" x="90.5" y="332.0" text-anchor="middle" style="direction:ltr">10:40</text>
</g>
<g id="el-lbl2">
<text class="small" x="213.1" y="403.0" text-anchor="middle">הודעת user אחת - כל התוצאות יחד</text>
</g>
</svg>
