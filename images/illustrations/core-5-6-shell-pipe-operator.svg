<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="248.3,54.0 248.3,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="248.3,140.0 248.3,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="262.3" y="164.0" text-anchor="end">כתיבה</text>
<polyline id="edge-2" class="edge" points="248.3,226.0 248.3,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="262.3" y="250.0" text-anchor="end">קריאה</text>
<polyline id="edge-3" class="edge" points="248.3,312.0 248.3,352.0" marker-end="url(#arr)"/>
<g id="el-cmd">
<rect class="n-code-bg shp" x="176.2" y="16.0" width="144.3" height="38.0" rx="7"/>
<text class="code" x="248.3" y="43.0" text-anchor="middle">ls | grep .c</text>
</g>
<g id="el-lsp">
<rect class="n-box shp" x="24.4" y="94.0" width="447.9" height="46.0" rx="8"/>
<text class="t dyn-lsp-0" x="248.3" y="122.0" text-anchor="middle">התהליך ls מפנה את המתאר 1 לצד הכתיבה של הצינור</text>
<text class="t dyn-lsp-1" x="248.3" y="122.0" text-anchor="middle">התהליך ls כותב את השורות main.c ו-notes.txt</text>
<text class="t dyn-lsp-2" x="248.3" y="122.0" text-anchor="middle">התהליך ls מסיים והצד הכותב נסגר</text>
</g>
<g id="el-buf">
<rect class="n-box shp" x="80.0" y="180.0" width="336.7" height="46.0" rx="8"/>
<text class="t dyn-buf-0" x="248.3" y="208.0" text-anchor="middle">הבאפר של הצינור בקרנל ריק</text>
<text class="t dyn-buf-1" x="248.3" y="208.0" text-anchor="middle">הבאפר מחזיק את main.c ואת notes.txt</text>
<text class="t dyn-buf-2" x="248.3" y="208.0" text-anchor="middle">הבאפר התרוקן ואין יותר כותבים</text>
</g>
<g id="el-grp">
<rect class="n-box shp" x="16.0" y="266.0" width="464.7" height="46.0" rx="8"/>
<text class="t dyn-grp-0" x="248.3" y="294.0" text-anchor="middle">התהליך grep מפנה את המתאר 0 לצד הקריאה של הצינור</text>
<text class="t dyn-grp-1" x="248.3" y="294.0" text-anchor="middle">התהליך grep קורא את שתי השורות מהצינור</text>
<text class="t dyn-grp-2" x="248.3" y="294.0" text-anchor="middle">התהליך grep מקבל EOF ויוצא מהלולאה</text>
</g>
<g id="el-res">
