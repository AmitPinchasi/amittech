<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 547 430" width="547" role="img" aria-label="מצביע בשפת C: המשתנה x שומר ערך, המצביע p שומר את הכתובת של x, ופעולת הכוכבית מחזירה את הערך שבכתובת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-xbox{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-xbox .shp{animation-name:k-xbox;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pbox{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pbox .shp{animation-name:k-pbox;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-y{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-y .shp{animation-name:k-y;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}40.91%{stroke:var(--pink);stroke-width:2.4;}44.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.93%{stroke-width:1.6;}40.91%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-y-0{opacity:0;}
@keyframes k-dyn-y-0{0.00%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-y-0{animation-name:k-dyn-y-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-y-1{opacity:1;}
@keyframes k-dyn-y-1{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-y-1{animation-name:k-dyn-y-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="273.7,98.0 273.7,138.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="273.7,184.0 273.7,224.0" marker-end="url(#arr)"/>
<text class="lbl" x="287.7" y="208.0" text-anchor="end" style="direction:ltr">&amp;x</text>
<polyline id="edge-2" class="edge" points="273.7,270.0 273.7,310.0" marker-end="url(#arr)"/>
<text class="lbl" x="287.7" y="294.0" text-anchor="end" style="direction:ltr">*p</text>
<g id="el-code">
<rect class="n-code-bg shp" x="201.6" y="16.0" width="144.3" height="82.0" rx="7"/>
<text class="code" x="273.7" y="43.0" text-anchor="middle">int x = 10;</text>
<text class="code" x="273.7" y="65.0" text-anchor="middle">int* p = &amp;x;</text>
<text class="code" x="273.7" y="87.0" text-anchor="middle">int y = *p;</text>
</g>
<g id="el-xbox">
<rect class="n-box shp" x="74.2" y="138.0" width="399.2" height="46.0" rx="8"/>
<text class="t" x="273.7" y="166.0" text-anchor="middle">בכתובת 0x1000 יושב הערך 10, זהו המשתנה x</text>
</g>
<g id="el-pbox">
<rect class="n-box shp" x="117.0" y="224.0" width="313.5" height="46.0" rx="8"/>
<text class="t" x="273.7" y="252.0" text-anchor="middle">המצביע p שומר את הכתובת 0x1000</text>
</g>
<g id="el-y">
<rect class="n-box shp" x="225.7" y="310.0" width="96.0" height="46.0" rx="8"/>
<text class="t dyn-y-0" x="273.7" y="338.0" text-anchor="middle" style="direction:ltr">y = ?</text>
<text class="t dyn-y-1" x="273.7" y="338.0" text-anchor="middle" style="direction:ltr">y = 10</text>
</g>
<g id="el-note">
<text class="small" x="273.7" y="409.0" text-anchor="middle">הסימן &amp; נותן את הכתובת של המשתנה, והסימן * נותן את הערך ששמור באותה כתובת</text>
</g>
</svg>
