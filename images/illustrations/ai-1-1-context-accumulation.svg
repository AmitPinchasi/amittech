<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 476 278" width="476" role="img" aria-label="בכל תור שנוסף לשיחה המודל קורא מחדש את כל היסטוריית ההודעות שהצטברה עד כה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-msgs-0{0.00%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-msgs-c0{animation-name:k-msgs-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-msgs-1{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-msgs-c1{animation-name:k-msgs-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-msgs-2{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-msgs-c2{animation-name:k-msgs-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-msgs-3{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-msgs-c3{animation-name:k-msgs-3;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seen-0{opacity:0;}
@keyframes k-dyn-seen-0{0.00%{opacity:1;}20.45%{opacity:1;}24.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-seen-0{animation-name:k-dyn-seen-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seen-1{opacity:0;}
@keyframes k-dyn-seen-1{0.00%{opacity:0;}16.48%{opacity:0;}20.45%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-seen-1{animation-name:k-dyn-seen-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seen-2{opacity:0;}
@keyframes k-dyn-seen-2{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-seen-2{animation-name:k-dyn-seen-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seen-3{opacity:1;}
@keyframes k-dyn-seen-3{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-seen-3{animation-name:k-dyn-seen-3;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-intro">
<text class="small" x="238.0" y="29.0" text-anchor="middle">כל תור מוסיף הודעה - והמודל קורא את כל ההיסטוריה מחדש</text>
</g>
<g id="el-msgs">
<rect id="el-msgs-c0" class="n-cell shp" x="364.0" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="412.0" y="102.0" text-anchor="middle">שאלה 1</text>
<rect id="el-msgs-c1" class="n-cell shp" x="248.0" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="296.0" y="102.0" text-anchor="middle">תשובה 1</text>
<rect id="el-msgs-c2" class="n-cell shp" x="132.0" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.0" y="102.0" text-anchor="middle">שאלה 2</text>
<rect id="el-msgs-c3" class="n-cell shp" x="16.0" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="64.0" y="102.0" text-anchor="middle">תשובה 2</text>
</g>
<g id="el-seen">
<rect class="n-box shp" x="124.4" y="160.0" width="227.1" height="44.0" rx="8"/>
<text class="t-b dyn-seen-0" x="238.0" y="187.0" text-anchor="middle">המודל רואה הודעה 1</text>
<text class="t-b dyn-seen-1" x="238.0" y="187.0" text-anchor="middle">המודל רואה 2 הודעות</text>
<text class="t-b dyn-seen-2" x="238.0" y="187.0" text-anchor="middle">המודל רואה 3 הודעות</text>
<text class="t-b dyn-seen-3" x="238.0" y="187.0" text-anchor="middle">המודל רואה 4 הודעות</text>
</g>
<g id="el-note">
<text class="small" x="238.0" y="257.0" text-anchor="middle">לכן שיחה ארוכה צוברת הקשר - וגם רעש מנושאים לא רלוונטיים</text>
</g>
</svg>
