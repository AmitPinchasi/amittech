.dyn-note-3{animation-name:k-dyn-note-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-goal">
<text class="small" x="292.7" y="29.0" text-anchor="middle">רוצים לפנות לשורה מספר 4 בטבלת ה-GDT בהרשאת Ring 3</text>
</g>
<g id="el-bits">
<rect id="el-bits-c0" class="n-cell shp" x="360.7" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="408.7" y="102.0" text-anchor="middle" style="direction:ltr">RPL</text>
<rect id="el-bits-c1" class="n-cell shp" x="244.7" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="292.7" y="102.0" text-anchor="middle" style="direction:ltr">TI</text>
<rect id="el-bits-c2" class="n-cell shp" x="128.7" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="176.7" y="102.0" text-anchor="middle" style="direction:ltr">Index</text>
</g>
<g id="el-calc">
<rect class="n-box shp" x="205.6" y="160.0" width="174.1" height="44.0" rx="8"/>
<text class="t-b dyn-calc-0" x="292.7" y="187.0" text-anchor="middle" style="direction:ltr">selector = ?</text>
<text class="t-b dyn-calc-1" x="292.7" y="187.0" text-anchor="middle" style="direction:ltr">index = 4</text>
<text class="t-b dyn-calc-2" x="292.7" y="187.0" text-anchor="middle" style="direction:ltr">4 &lt;&lt; 3 = 0x20</text>
<text class="t-b dyn-calc-3" x="292.7" y="187.0" text-anchor="middle" style="direction:ltr">0x20 | 3 = 0x23</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="65.6" y="244.0" width="454.3" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="292.7" y="272.0" text-anchor="middle">הביטים 15 עד 3 מחזיקים את מספר השורה בטבלה</text>
<text class="t dyn-note-1" x="292.7" y="272.0" text-anchor="middle">לכן מזיזים את מספר השורה שלושה ביטים שמאלה</text>
<text class="t dyn-note-2" x="292.7" y="272.0" text-anchor="middle">הביט TI נשאר אפס כי מדובר בטבלת GDT ולא LDT</text>
<text class="t dyn-note-3" x="292.7" y="272.0" text-anchor="middle">שני הביטים התחתונים מחזיקים את ההרשאה המבוקשת</text>
</g>
<g id="el-use">
<rect class="n-code-bg shp" x="198.0" y="330.0" width="189.5" height="38.0" rx="7"/>
<text class="code" x="292.7" y="357.0" text-anchor="middle">jmp 0x23:pm_entry</text>
</g>
<g id="el-cap">
<text class="small" x="292.7" y="421.0" text-anchor="middle">הסלקטור הוא הכתובת החדשה של הסגמנט, ולכן רגיסטרי הסגמנטים נשארו בגודל 16 ביט</text>
</g>
