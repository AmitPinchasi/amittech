<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 521 452" width="521" role="img" aria-label="פעולת packer בזמן ריצה: קובץ ארוז מכיל unpacker קטן וקוד מקורי דחוס, וכשמריצים אותו ה-unpacker פורש את הקוד המקורי בזיכרון ומעביר אליו את השליטה בנקודת ה-OEP">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-disk{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-disk .shp{animation-name:k-disk;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-unp{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-unp .shp{animation-name:k-unp;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-decomp{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-decomp .shp{animation-name:k-decomp;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-oep{0.00%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-oep .shp{animation-name:k-oep;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-orig{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-orig .shp{animation-name:k-orig;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dump{0.00%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-dump .shp{animation-name:k-dump;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}40.73%{stroke-width:1.6;}43.55%{stroke:var(--pink);stroke-width:2.4;}58.06%{stroke:var(--pink);stroke-width:2.4;}60.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}55.24%{stroke-width:1.6;}58.06%{stroke:var(--pink);stroke-width:2.4;}72.58%{stroke:var(--pink);stroke-width:2.4;}75.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="155.3,62.0 155.3,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="169.3" y="86.0" text-anchor="end">הרצה</text>
<polyline id="edge-1" class="edge" points="155.3,140.0 155.3,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="155.3,226.0 155.3,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="169.3" y="250.0" text-anchor="end">קפיצה ל-OEP</text>
<polyline id="edge-3" class="edge" points="155.3,350.0 155.3,390.0" marker-end="url(#arr)"/>
<text class="lbl" x="169.3" y="374.0" text-anchor="end">breakpoint ב-OEP</text>
<polyline id="edge-4" class="edge" points="240.8,413.0 306.8,413.0" marker-end="url(#arr)"/>
<g id="el-disk">
<rect class="n-box shp" x="52.6" y="16.0" width="205.3" height="46.0" rx="8"/>
<text class="t" x="155.3" y="44.0" text-anchor="middle">קובץ ארוז על הדיסק</text>
</g>
<g id="el-unp">
<rect class="n-code-bg shp" x="60.5" y="102.0" width="189.5" height="38.0" rx="7"/>
<text class="code" x="155.3" y="129.0" text-anchor="middle">unpacker רץ ראשון</text>
</g>
<g id="el-decomp">
<rect class="n-box shp" x="16.0" y="180.0" width="278.5" height="46.0" rx="8"/>
<text class="t" x="155.3" y="208.0" text-anchor="middle">פורש את הקוד הדחוס בזיכרון</text>
</g>
<g id="el-oep">
<polygon class="n-dia shp" points="155.3,266.0 235.3,308.0 155.3,350.0 75.3,308.0"/>
<text class="code" x="155.3" y="313.0" text-anchor="middle">OEP</text>
</g>
<g id="el-orig">
<rect class="n-box shp" x="69.8" y="390.0" width="171.0" height="46.0" rx="8"/>
<text class="t" x="155.3" y="418.0" text-anchor="middle">הקוד המקורי רץ</text>
</g>
<g id="el-dump">
<rect class="n-code-bg shp" x="306.8" y="394.0" width="198.5" height="38.0" rx="7"/>
<text class="code" x="406.0" y="421.0" text-anchor="middle">dump binary memory</text>
</g>
</svg>
