<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 662 414" width="662" role="img" aria-label="זרימה של יוניט טסט: הטסט קורא למתודה, שומר את הערך שחזר ומשווה אותו לערך הצפוי - אם שווה הטסט עובר">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}44.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cmp{0.00%{stroke-width:1.5;}35.62%{stroke-width:1.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}64.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmp .shp{animation-name:k-cmp;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pass{0.00%{stroke-width:1.5;}55.62%{stroke-width:1.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-pass .shp{animation-name:k-pass;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}35.62%{stroke-width:1.6;}40.00%{stroke:var(--pink);stroke-width:2.4;}60.00%{stroke:var(--pink);stroke-width:2.4;}64.38%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}55.62%{stroke-width:1.6;}60.00%{stroke:var(--pink);stroke-width:2.4;}80.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-0{opacity:0;}
@keyframes k-dyn-call-0{0.00%{opacity:1;}20.00%{opacity:1;}24.38%{opacity:0;}100.00%{opacity:0;}}
.dyn-call-0{animation-name:k-dyn-call-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-1{opacity:1;}
@keyframes k-dyn-call-1{0.00%{opacity:0;}15.62%{opacity:0;}20.00%{opacity:1;}80.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-call-1{animation-name:k-dyn-call-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmp-0{opacity:0;}
@keyframes k-dyn-cmp-0{0.00%{opacity:1;}40.00%{opacity:1;}44.38%{opacity:0;}100.00%{opacity:0;}}
.dyn-cmp-0{animation-name:k-dyn-cmp-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmp-1{opacity:1;}
@keyframes k-dyn-cmp-1{0.00%{opacity:0;}35.62%{opacity:0;}40.00%{opacity:1;}80.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-cmp-1{animation-name:k-dyn-cmp-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="234.5,54.0 234.5,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="234.5,312.5 234.5,352.5" marker-end="url(#arr)"/>
<text class="lbl" x="248.5" y="336.5" text-anchor="end">שווה</text>
<polyline id="edge-2" class="edge" points="452.9,203.2 518.9,203.2" marker-end="url(#arr)"/>
<text class="lbl" x="485.9" y="191.2" text-anchor="middle">לא שווה</text>
<g id="el-call">
<rect class="n-code-bg shp" x="108.1" y="16.0" width="252.7" height="38.0" rx="7"/>
<text class="code dyn-call-0" x="234.5" y="43.0" text-anchor="middle">result = obj.my_method()</text>
<text class="code dyn-call-1" x="234.5" y="43.0" text-anchor="middle">result = 5</text>
</g>
<g id="el-cmp">
<polygon class="n-dia shp" points="234.5,94.0 452.9,203.2 234.5,312.5 16.0,203.2"/>
<text class="code dyn-cmp-0" x="234.5" y="208.2" text-anchor="middle">assertEqual(result, 5)</text>
<text class="code dyn-cmp-1" x="234.5" y="208.2" text-anchor="middle">assertEqual(5, 5)</text>
</g>
<g id="el-pass">
<rect class="n-box shp" x="171.0" y="352.5" width="127.0" height="46.0" rx="8"/>
<text class="t" x="234.5" y="380.5" text-anchor="middle">הטסט עובר</text>
</g>
<g id="el-fail">
<rect class="n-box shp" x="518.9" y="180.2" width="127.0" height="46.0" rx="8"/>
<text class="t" x="582.4" y="208.2" text-anchor="middle">הטסט נכשל</text>
</g>
</svg>
