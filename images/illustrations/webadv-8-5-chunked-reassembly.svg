<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 558 388" width="558" role="img" aria-label="עקיפה בפיצול chunks: ה-WAF בודק כל chunk בנפרד ורואה רק שברים תמימים, בעוד השרת מרכיב את כל החלקים לכדי payload זדוני שלם">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}30.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-waf{0.00%{stroke-width:1.5;}21.23%{stroke-width:1.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}56.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-waf .shp{animation-name:k-waf;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-srv{0.00%{stroke-width:1.5;}47.26%{stroke-width:1.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}78.08%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-srv .shp{animation-name:k-srv;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}21.23%{stroke-width:1.6;}26.03%{stroke:var(--pink);stroke-width:2.4;}52.05%{stroke:var(--pink);stroke-width:2.4;}56.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}47.26%{stroke-width:1.6;}52.05%{stroke:var(--pink);stroke-width:2.4;}78.08%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-waf-0{opacity:0;}
@keyframes k-dyn-waf-0{0.00%{opacity:1;}26.03%{opacity:1;}30.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-waf-0{animation-name:k-dyn-waf-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-waf-1{opacity:1;}
@keyframes k-dyn-waf-1{0.00%{opacity:0;}21.23%{opacity:0;}26.03%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-waf-1{animation-name:k-dyn-waf-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-srv-0{opacity:0;}
@keyframes k-dyn-srv-0{0.00%{opacity:1;}52.05%{opacity:1;}56.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-srv-0{animation-name:k-dyn-srv-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-srv-1{opacity:1;}
@keyframes k-dyn-srv-1{0.00%{opacity:0;}47.26%{opacity:0;}52.05%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-srv-1{animation-name:k-dyn-srv-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="279.1,142.0 279.1,182.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="279.1,228.0 279.1,268.0" marker-end="url(#arr)"/>
<g id="el-req">
<rect class="n-code-bg shp" x="143.8" y="16.0" width="270.7" height="126.0" rx="7"/>
<text class="code" x="279.1" y="43.0" text-anchor="middle">Transfer-Encoding: chunked</text>
<text class="code" x="279.1" y="65.0" text-anchor="middle">3   q=&lt;</text>
<text class="code" x="279.1" y="87.0" text-anchor="middle">3   scr</text>
<text class="code" x="279.1" y="109.0" text-anchor="middle">4   ipt&gt;</text>
<text class="code" x="279.1" y="131.0" text-anchor="middle">0</text>
</g>
<g id="el-waf">
<rect class="n-box shp" x="136.7" y="182.0" width="284.9" height="46.0" rx="8"/>
<text class="t dyn-waf-0" x="279.1" y="210.0" text-anchor="middle">בדיקת כל chunk בנפרד ב-WAF</text>
<text class="t dyn-waf-1" x="279.1" y="210.0" text-anchor="middle">כל שבר נראה תמים - אין התאמה</text>
</g>
<g id="el-srv">
<rect class="n-box shp" x="163.2" y="268.0" width="231.8" height="46.0" rx="8"/>
<text class="t dyn-srv-0" x="279.1" y="296.0" text-anchor="middle">הרכבת כל החלקים בשרת</text>
<text class="t dyn-srv-1" x="279.1" y="296.0" text-anchor="middle">התוצאה q=&lt;script&gt; - XSS</text>
</g>
<g id="el-note">
<text class="small" x="279.1" y="367.0" text-anchor="middle">הלקח ההגנתי: להרכיב את גוף הבקשה במלואו לפני הבדיקה, או לדחות chunked חשוד</text>
</g>
</svg>
