<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 318 328" width="318" role="img" aria-label="מדד INP: מהלחיצה של המשתמש ועד עדכון המסך">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-click{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-click .shp{animation-name:k-click;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-thread{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-thread .shp{animation-name:k-thread;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-paint{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-paint .shp{animation-name:k-paint;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-inp{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-inp .shp{animation-name:k-inp;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-thread-0{opacity:0;}
@keyframes k-dyn-thread-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-thread-0{animation-name:k-dyn-thread-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-thread-1{opacity:0;}
@keyframes k-dyn-thread-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-thread-1{animation-name:k-dyn-thread-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-thread-2{opacity:1;}
@keyframes k-dyn-thread-2{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-thread-2{animation-name:k-dyn-thread-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-inp-0{opacity:0;}
@keyframes k-dyn-inp-0{0.00%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-inp-0{animation-name:k-dyn-inp-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-inp-1{opacity:1;}
@keyframes k-dyn-inp-1{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-inp-1{animation-name:k-dyn-inp-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="159.1,62.0 159.1,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="173.1" y="86.0" text-anchor="end">האירוע נכנס לתור</text>
<polyline id="edge-1" class="edge" points="159.1,148.0 159.1,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="159.1,234.0 159.1,274.0" marker-end="url(#arr)"/>
<g id="el-click">
<rect class="n-box shp" x="46.7" y="16.0" width="224.8" height="46.0" rx="8"/>
<text class="t" x="159.1" y="44.0" text-anchor="middle">המשתמש לוחץ על כפתור</text>
</g>
<g id="el-thread">
<rect class="n-box shp" x="16.0" y="102.0" width="286.3" height="46.0" rx="8"/>
<text class="t dyn-thread-0" x="159.1" y="130.0" text-anchor="middle">ה-main thread פנוי</text>
<text class="t dyn-thread-1" x="159.1" y="130.0" text-anchor="middle">משימה כבדה חוסמת את ה-thread</text>
<text class="t dyn-thread-2" x="159.1" y="130.0" text-anchor="middle">המשימה הסתיימה אחרי 350ms</text>
</g>
<g id="el-paint">
<rect class="n-box shp" x="37.0" y="188.0" width="244.3" height="46.0" rx="8"/>
<text class="t" x="159.1" y="216.0" text-anchor="middle">הדפדפן מצייר את העדכון</text>
</g>
<g id="el-inp">
<rect class="n-code-bg shp" x="91.5" y="274.0" width="135.3" height="38.0" rx="7"/>
<text class="code dyn-inp-0" x="159.1" y="301.0" text-anchor="middle">INP = ?</text>
<text class="code dyn-inp-1" x="159.1" y="301.0" text-anchor="middle">INP = 400ms</text>
</g>
</svg>
