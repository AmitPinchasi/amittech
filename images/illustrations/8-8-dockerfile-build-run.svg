<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 395 406" width="395" role="img" aria-label="מחזור החיים של דוקר: כותבים Dockerfile, בונים ממנו image עם docker build, ומריצים ממנו קונטיינרים עם docker run">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-file{0.00%{stroke:var(--pink);stroke-width:2.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}20.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-file .shp{animation-name:k-file;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-build{0.00%{stroke-width:1.5;}13.02%{stroke-width:1.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}36.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-build .shp{animation-name:k-build;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-image{0.00%{stroke-width:1.5;}29.69%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}53.65%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-image .shp{animation-name:k-image;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-run{0.00%{stroke-width:1.5;}46.35%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}70.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-run .shp{animation-name:k-run;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-c1{0.00%{stroke-width:1.5;}63.02%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-c1 .shp{animation-name:k-c1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.02%{stroke-width:1.6;}16.67%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}36.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.69%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}53.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}46.35%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}66.67%{stroke:var(--pink);stroke-width:2.4;}70.31%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}63.02%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}83.33%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="168.0,62.0 168.0,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="182.0" y="86.0" text-anchor="end">מקמפלים</text>
<polyline id="edge-1" class="edge" points="168.0,140.0 168.0,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="168.0,226.0 168.0,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="182.0" y="250.0" text-anchor="end">מריצים</text>
<polyline id="edge-3" class="edge" points="168.0,304.0 168.0,344.0" marker-end="url(#arr)"/>
<text class="lbl" x="182.0" y="328.0" text-anchor="end">אפשר להריץ כמה מאותו image</text>
<g id="el-file">
<rect class="n-box shp" x="38.8" y="16.0" width="258.4" height="46.0" rx="8"/>
<text class="t" x="168.0" y="44.0" text-anchor="middle">Dockerfile - הוראות בנייה</text>
</g>
<g id="el-build">
<rect class="n-code-bg shp" x="95.9" y="102.0" width="144.3" height="38.0" rx="7"/>
<text class="code" x="168.0" y="129.0" text-anchor="middle">docker build</text>
</g>
<g id="el-image">
<rect class="n-box shp" x="38.0" y="180.0" width="260.0" height="46.0" rx="8"/>
<text class="t" x="168.0" y="208.0" text-anchor="middle">docker image - חבילה מוכנה</text>
</g>
<g id="el-run">
<rect class="n-code-bg shp" x="104.9" y="266.0" width="126.3" height="38.0" rx="7"/>
<text class="code" x="168.0" y="293.0" text-anchor="middle">docker run</text>
</g>
<g id="el-c1">
<rect class="n-box shp" x="16.0" y="344.0" width="304.1" height="46.0" rx="8"/>
<text class="t" x="168.0" y="372.0" text-anchor="middle">קונטיינר רץ, מבודד משאר המחשב</text>
</g>
</svg>
