<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 652 422" width="652" role="img" aria-label="אנימציה של זרימת SROP צעד אחר צעד - טוענים rax=15, מריצים syscall שמפעיל rt_sigreturn, הkernel טוען את המסגרת המזויפת על כל אוגריה, והמעבד קופץ ל-rip שקבענו עם rax=59 ומריץ execve">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
