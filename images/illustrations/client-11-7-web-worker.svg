<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 294 406" width="294" role="img" aria-label="תרשים זרימה של Web Worker: החישוב הכבד רץ בthread נפרד, הUI ממשיך להגיב, והתוצאה חוזרת בהודעה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-ui{0.00%{stroke:var(--pink);stroke-width:2.5;}14.15%{stroke:var(--pink);stroke-width:2.5;}17.45%{stroke-width:1.5;}39.15%{stroke-width:1.5;}42.45%{stroke:var(--pink);stroke-width:2.5;}56.60%{stroke:var(--pink);stroke-width:2.5;}59.91%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ui .shp{animation-name:k-ui;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-post{0.00%{stroke-width:1.5;}10.85%{stroke-width:1.5;}14.15%{stroke:var(--pink);stroke-width:2.5;}28.30%{stroke:var(--pink);stroke-width:2.5;}31.60%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-post .shp{animation-name:k-post;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-worker{0.00%{stroke-width:1.5;}25.00%{stroke-width:1.5;}28.30%{stroke:var(--pink);stroke-width:2.5;}56.60%{stroke:var(--pink);stroke-width:2.5;}59.91%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-worker .shp{animation-name:k-worker;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-result{0.00%{stroke-width:1.5;}53.30%{stroke-width:1.5;}56.60%{stroke:var(--pink);stroke-width:2.5;}70.75%{stroke:var(--pink);stroke-width:2.5;}74.06%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-result .shp{animation-name:k-result;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-update{0.00%{stroke-width:1.5;}67.45%{stroke-width:1.5;}70.75%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-update .shp{animation-name:k-update;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.85%{stroke-width:1.6;}14.15%{stroke:var(--pink);stroke-width:2.4;}28.30%{stroke:var(--pink);stroke-width:2.4;}31.60%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.00%{stroke-width:1.6;}28.30%{stroke:var(--pink);stroke-width:2.4;}42.45%{stroke:var(--pink);stroke-width:2.4;}45.75%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}53.30%{stroke-width:1.6;}56.60%{stroke:var(--pink);stroke-width:2.4;}70.75%{stroke:var(--pink);stroke-width:2.4;}74.06%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}67.45%{stroke-width:1.6;}70.75%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ui-0{opacity:0;}
@keyframes k-dyn-ui-0{0.00%{opacity:1;}42.45%{opacity:1;}45.75%{opacity:0;}100.00%{opacity:0;}}
.dyn-ui-0{animation-name:k-dyn-ui-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ui-1{opacity:1;}
@keyframes k-dyn-ui-1{0.00%{opacity:0;}39.15%{opacity:0;}42.45%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-ui-1{animation-name:k-dyn-ui-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="146.9,62.0 146.9,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="146.9,140.0 146.9,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="160.9" y="164.0" text-anchor="end">לthread נפרד</text>
<polyline id="edge-2" class="edge" points="146.9,226.0 146.9,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="160.9" y="250.0" text-anchor="end">בסיום החישוב</text>
<polyline id="edge-3" class="edge" points="146.9,304.0 146.9,344.0" marker-end="url(#arr)"/>
<g id="el-ui">
<rect class="n-box shp" x="16.0" y="16.0" width="261.7" height="46.0" rx="8"/>
<text class="t dyn-ui-0" x="146.9" y="44.0" text-anchor="middle">הthread הראשי (UI)</text>
<text class="t dyn-ui-1" x="146.9" y="44.0" text-anchor="middle">הUI ממשיך להגיב - לא נתקע</text>
</g>
<g id="el-post">
<rect class="n-code-bg shp" x="20.5" y="102.0" width="252.7" height="38.0" rx="7"/>
<text class="code" x="146.9" y="129.0" text-anchor="middle">worker.postMessage(data)</text>
</g>
<g id="el-worker">
<rect class="n-box shp" x="45.9" y="180.0" width="201.9" height="46.0" rx="8"/>
<text class="t" x="146.9" y="208.0" text-anchor="middle">הworker ממיין ברקע</text>
</g>
<g id="el-result">
<rect class="n-code-bg shp" x="43.1" y="266.0" width="207.5" height="38.0" rx="7"/>
<text class="code" x="146.9" y="293.0" text-anchor="middle">postMessage(sorted)</text>
</g>
<g id="el-update">
<rect class="n-box shp" x="30.6" y="344.0" width="232.5" height="46.0" rx="8"/>
<text class="t" x="146.9" y="372.0" text-anchor="middle">עדכון הstate והרינדור</text>
</g>
</svg>
