<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 708 306" width="708" role="img" aria-label="אנימציה של שיטת Parity Bit: סופרים את ביטי ה-1 בבית, ומכיוון שהמספר אי-זוגי מוסיפים ביט זוגיות עם הערך 1 כדי שסך האחדות יהיה זוגי">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
