<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 676" width="780" role="img" aria-label="תרשים זרימה של Error-Based SQLi: קלט זדוני גורם לשגיאת SQL שעלולה לחשוף מידע פנימי, וטיפול נכון בשגיאות מציג הודעה גנרית למשתמש בעוד הפרטים נרשמים רק ביומן השרת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-input{0.00%{stroke:var(--pink);stroke-width:2.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}13.54%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-input .shp{animation-name:k-input;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-query{0.00%{stroke-width:1.5;}8.68%{stroke-width:1.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}24.65%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-query .shp{animation-name:k-query;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dbError{0.00%{stroke-width:1.5;}19.79%{stroke-width:1.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}35.76%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-dbError .shp{animation-name:k-dbError;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-handle{0.00%{stroke-width:1.5;}30.90%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}46.88%{stroke-width:1.5;}53.13%{stroke-width:1.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}69.10%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-handle .shp{animation-name:k-handle;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-generic{0.00%{stroke-width:1.5;}42.01%{stroke-width:1.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}57.99%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-generic .shp{animation-name:k-generic;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-leak{0.00%{stroke-width:1.5;}64.24%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}80.21%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-leak .shp{animation-name:k-leak;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-info{0.00%{stroke-width:1.5;}75.35%{stroke-width:1.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}88.89%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-info .shp{animation-name:k-info;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.68%{stroke-width:1.6;}11.11%{stroke:var(--pink);stroke-width:2.4;}22.22%{stroke:var(--pink);stroke-width:2.4;}24.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}19.79%{stroke-width:1.6;}22.22%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}35.76%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.90%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}44.44%{stroke:var(--pink);stroke-width:2.4;}46.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}42.01%{stroke-width:1.6;}44.44%{stroke:var(--pink);stroke-width:2.4;}55.56%{stroke:var(--pink);stroke-width:2.4;}57.99%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-5{animation-name:k-edge-5;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.24%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}77.78%{stroke:var(--pink);stroke-width:2.4;}80.21%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}75.35%{stroke-width:1.6;}77.78%{stroke:var(--pink);stroke-width:2.4;}88.89%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="216.0,62.0 216.0,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="216.0,162.0 216.0,202.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="216.0,248.0 216.0,288.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="216.0,488.0 216.0,528.0" marker-end="url(#arr)"/>
<text class="lbl" x="230.0" y="512.0" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="216.0,574.0 216.0,614.0" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="415.9,388.0 481.9,388.0" marker-end="url(#arr)"/>
<text class="lbl" x="448.9" y="376.0" text-anchor="middle">כן</text>
<g id="el-input">
<rect class="n-box shp" x="94.5" y="16.0" width="242.9" height="46.0" rx="8"/>
<text class="t" x="216.0" y="44.0" text-anchor="middle">קלט משתמש לא מסונן ב-id</text>
</g>
<g id="el-query">
<rect class="n-code-bg shp" x="80.6" y="102.0" width="270.7" height="60.0" rx="7"/>
<text class="code" x="216.0" y="129.0" text-anchor="middle">SELECT username FROM users</text>
<text class="code" x="216.0" y="151.0" text-anchor="middle">WHERE id = '$id'</text>
</g>
<g id="el-dbError">
<rect class="n-box shp" x="70.8" y="202.0" width="290.3" height="46.0" rx="8"/>
<text class="t" x="216.0" y="230.0" text-anchor="middle">מסד הנתונים מחזיר שגיאת SQL</text>
</g>
<g id="el-handle">
<polygon class="n-dia shp" points="216.0,288.0 415.9,388.0 216.0,488.0 16.0,388.0"/>
<text class="t" x="216.0" y="393.0" text-anchor="middle">השגיאה מטופלת כראוי?</text>
</g>
<g id="el-leak">
<rect class="n-box shp" x="79.2" y="528.0" width="273.5" height="46.0" rx="8"/>
<text class="t" x="216.0" y="556.0" text-anchor="middle">השגיאה המלאה מוצגת למשתמש</text>
</g>
<g id="el-info">
<rect class="n-box shp" x="54.0" y="614.0" width="323.9" height="46.0" rx="8"/>
<text class="t" x="216.0" y="642.0" text-anchor="middle">התוקף לומד גרסת DB ומבנה טבלאות</text>
</g>
<g id="el-generic">
<rect class="n-box shp" x="481.9" y="365.0" width="281.9" height="46.0" rx="8"/>
<text class="t" x="622.9" y="393.0" text-anchor="middle">הודעה גנרית - פרטים רק ב-log</text>
</g>
</svg>
