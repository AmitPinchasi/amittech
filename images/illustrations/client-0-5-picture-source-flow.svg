@keyframes k-medium{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
