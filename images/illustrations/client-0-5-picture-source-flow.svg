.dyn-c1-0{animation-name:k-dyn-c1-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-c1-1{opacity:1;}
@keyframes k-dyn-c1-1{0.00%{opacity:0;}16.48%{opacity:0;}20.45%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-c1-1{animation-name:k-dyn-c1-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-c2-0{opacity:0;}
