@keyframes k-edge-3{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-start-0{opacity:0;}
@keyframes k-dyn-start-0{0.00%{opacity:0;}100.00%{opacity:0;}}
