<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 708 383" width="708" role="img" aria-label="תרשים החלטה של עקיפת אימות ב-NoSQL: אובייקט עם ne מחזיר כל משתמש בעוד מחרוזת נבדקת כרגיל">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="344.9,54.0 344.9,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="485.8,164.4 573.8,164.4 573.8,234.8" marker-end="url(#arr)"/>
<text class="lbl" x="529.8" y="152.4" text-anchor="middle">לא, אובייקט</text>
<polyline id="edge-2" class="edge" points="204.1,164.4 116.1,164.4 116.1,234.8" marker-end="url(#arr)"/>
<text class="lbl" x="160.1" y="152.4" text-anchor="middle">כן, מחרוזת</text>
<polyline id="edge-3" class="edge" points="573.8,280.8 573.8,343.8 497.0,343.8" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="116.1,280.8 116.1,343.8 192.9,343.8" marker-end="url(#arr)"/>
<g id="el-inp">
<rect class="n-code-bg shp" x="232.2" y="16.0" width="225.6" height="38.0" rx="7"/>
<text class="code" x="344.9" y="43.0" text-anchor="middle">password: {"$ne": ""}</text>
</g>
<g id="el-dec">
<polygon class="n-dia shp" points="344.9,94.0 485.8,164.4 344.9,234.8 204.1,164.4"/>
<text class="t" x="344.9" y="169.4" text-anchor="middle">הסיסמה מחרוזת?</text>
</g>
<g id="el-vuln">
<rect class="n-box shp" x="455.8" y="234.8" width="235.9" height="46.0" rx="8"/>
<text class="t" x="573.8" y="262.8" text-anchor="middle">מחזיר כל משתמש - עקיפה</text>
</g>
<g id="el-safe">
<rect class="n-box shp" x="16.0" y="234.8" width="200.2" height="46.0" rx="8"/>
<text class="t" x="116.1" y="262.8" text-anchor="middle">נדרשת סיסמה נכונה</text>
</g>
<g id="el-fix">
<rect class="n-box shp" x="192.9" y="320.8" width="304.1" height="46.0" rx="8"/>
<text class="t" x="344.9" y="348.8" text-anchor="middle">הפתרון: לאמת שהקלט הוא מחרוזת</text>
</g>
</svg>
