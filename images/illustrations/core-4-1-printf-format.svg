<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 471 466" width="471" role="img" aria-label="אנימציה של מחרוזת הפורמט: כל סימן פורמט מוחלף בערך של הפרמטר המתאים לפי הסדר, ורק בסוף הטקסט המוכן מגיע למסך">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-fmt{0.00%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fmt .shp{animation-name:k-fmt;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-vars{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-vars .shp{animation-name:k-vars;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-vars-0{opacity:1;}
@keyframes k-dyn-vars-0{0.00%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-vars-0{animation-name:k-dyn-vars-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-fmt-0{opacity:0;}
@keyframes k-dyn-fmt-0{0.00%{opacity:1;}20.45%{opacity:1;}24.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-fmt-0{animation-name:k-dyn-fmt-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-fmt-1{opacity:0;}
@keyframes k-dyn-fmt-1{0.00%{opacity:0;}16.48%{opacity:0;}20.45%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-fmt-1{animation-name:k-dyn-fmt-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-fmt-2{opacity:1;}
@keyframes k-dyn-fmt-2{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-fmt-2{animation-name:k-dyn-fmt-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}20.45%{opacity:1;}24.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}16.48%{opacity:0;}20.45%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:1;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-0{opacity:0;}
@keyframes k-dyn-out-0{0.00%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-0{animation-name:k-dyn-out-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-1{opacity:0;}
@keyframes k-dyn-out-1{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-1{animation-name:k-dyn-out-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-2{opacity:1;}
@keyframes k-dyn-out-2{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-out-2{animation-name:k-dyn-out-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="28.2" y="16.0" width="415.1" height="38.0" rx="7"/>
<text class="code" x="235.7" y="43.0" text-anchor="middle">printf("%s is %d years old\n", name, age);</text>
</g>
<g id="el-vars">
<rect class="n-box shp" x="133.6" y="94.0" width="204.2" height="44.0" rx="8"/>
<text class="t-b dyn-vars-0" x="235.7" y="121.0" text-anchor="middle" style="direction:ltr">name = Dan, age = 25</text>
</g>
<g id="el-fmt">
<rect class="n-box shp" x="132.6" y="178.0" width="206.4" height="44.0" rx="8"/>
<text class="t-b dyn-fmt-0" x="235.7" y="205.0" text-anchor="middle" style="direction:ltr">%s is %d years old</text>
<text class="t-b dyn-fmt-1" x="235.7" y="205.0" text-anchor="middle" style="direction:ltr">Dan is %d years old</text>
<text class="t-b dyn-fmt-2" x="235.7" y="205.0" text-anchor="middle" style="direction:ltr">Dan is 25 years old</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="262.0" width="439.5" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="235.7" y="290.0" text-anchor="middle">המחרוזת מכילה סימני פורמט שממתינים לערכים</text>
<text class="t dyn-note-1" x="235.7" y="290.0" text-anchor="middle">הסימן %s מוחלף במחרוזת שהועברה כפרמטר הראשון</text>
<text class="t dyn-note-2" x="235.7" y="290.0" text-anchor="middle">הסימן %d מוחלף במספר השלם שהועבר אחריו</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="132.6" y="348.0" width="206.4" height="44.0" rx="8"/>
<text class="t-b dyn-out-0" x="235.7" y="375.0" text-anchor="middle">המסך ריק</text>
<text class="t-b dyn-out-1" x="235.7" y="375.0" text-anchor="middle">המסך ריק</text>
<text class="t-b dyn-out-2" x="235.7" y="375.0" text-anchor="middle" style="direction:ltr">Dan is 25 years old</text>
</g>
<g id="el-cap">
<text class="small" x="235.7" y="445.0" text-anchor="middle">סדר הפרמטרים חייב להתאים לסדר סימני הפורמט ולסוג שלהם</text>
</g>
</svg>
