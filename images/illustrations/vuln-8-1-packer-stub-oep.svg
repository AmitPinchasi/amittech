@keyframes k-original{0.00%{stroke-width:1.5;}72.96%{stroke-width:1.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}88.15%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-original .shp{animation-name:k-original;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.00%{stroke-width:1.6;}12.59%{stroke:var(--pink);stroke-width:2.4;}25.19%{stroke:var(--pink);stroke-width:2.4;}27.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
