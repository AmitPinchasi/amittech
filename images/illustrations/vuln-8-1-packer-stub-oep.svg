@keyframes k-edge-3{0.00%{stroke-width:1.6;}47.78%{stroke-width:1.6;}50.37%{stroke:var(--pink);stroke-width:2.4;}62.96%{stroke:var(--pink);stroke-width:2.4;}65.56%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}60.37%{stroke-width:1.6;}62.96%{stroke:var(--pink);stroke-width:2.4;}75.56%{stroke:var(--pink);stroke-width:2.4;}78.15%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}72.96%{stroke-width:1.6;}75.56%{stroke:var(--pink);stroke-width:2.4;}88.15%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="215.1,62.0 215.1,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="393.8,191.4 459.8,191.4" marker-end="url(#arr)"/>
<text class="lbl" x="426.8" y="179.4" text-anchor="middle">סטטי</text>
<polyline id="edge-2" class="edge" points="215.1,280.7 215.1,320.7" marker-end="url(#arr)"/>
<text class="lbl" x="229.1" y="304.7" text-anchor="end">דינמי</text>
