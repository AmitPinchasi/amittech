<polyline id="edge-4" class="edge" points="215.1,452.7 215.1,492.7" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="215.1,538.7 215.1,578.7" marker-end="url(#arr)"/>
<g id="el-disk">
<rect class="n-box shp" x="16.0" y="16.0" width="398.1" height="46.0" rx="8"/>
<text class="t" x="215.1" y="44.0" text-anchor="middle">הקובץ על הדיסק - stub + גוש דחוס בלתי קריא</text>
</g>
