<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 734 480" width="734" role="img" aria-label="חלוקת העבודה בין הכלים: nsys מוצא איזה kernel איטי ברמת המערכת, ncu מסביר מדוע ברמת ה-kernel, ואז חוזרים על הצוואר החדש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="407.2,62.0 407.2,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="407.2,148.0 407.2,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="407.2,234.0 407.2,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="407.2,320.0 407.2,360.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="284.4,383.0 16.0,383.0 16.0,125.0 226.0,125.0" marker-end="url(#arr)"/>
<text class="small" x="121.0" y="113.0" text-anchor="middle">צוואר חדש</text>
<g id="el-app">
<rect class="n-box shp" x="337.5" y="16.0" width="139.4" height="46.0" rx="8"/>
<text class="t" x="407.2" y="44.0" text-anchor="middle">יישום CUDA</text>
</g>
<g id="el-nsys">
<rect class="n-box shp" x="226.0" y="102.0" width="362.5" height="46.0" rx="8"/>
<text class="t" x="407.2" y="130.0" text-anchor="middle">Nsight Systems: ציר-זמן מערכתי - איפה?</text>
</g>
<g id="el-kern">
<rect class="n-box shp" x="260.6" y="188.0" width="293.3" height="46.0" rx="8"/>
<text class="t" x="407.2" y="216.0" text-anchor="middle">ה-kernel הדומיננטי (חוק אמדל)</text>
</g>
<g id="el-ncu">
<rect class="n-box shp" x="237.9" y="274.0" width="338.7" height="46.0" rx="8"/>
<text class="t" x="407.2" y="302.0" text-anchor="middle">Nsight Compute: ניתוח kernel - מדוע?</text>
</g>
<g id="el-fix">
<rect class="n-box shp" x="284.4" y="360.0" width="245.6" height="46.0" rx="8"/>
<text class="t" x="407.2" y="388.0" text-anchor="middle">תקן את הצוואר, מדוד שוב</text>
</g>
<g id="el-note">
<text class="small" x="407.2" y="459.0" text-anchor="middle">nsys עונה איפה מפסידים זמן, ncu עונה למה ה-kernel איטי; הלולאה חוזרת על הצוואר החדש שנחשף</text>
</g>
</svg>
