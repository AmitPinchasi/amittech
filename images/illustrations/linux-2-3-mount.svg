<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 408 290" width="408" role="img" aria-label="חיבור מערכת קבצים עם mount: לאחר הפקודה קבצי ההתקן sdb1 נגישים בתוך נקודת החיבור mnt/usb">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-dev{0.00%{stroke:var(--pink);stroke-width:2.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}30.71%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-dev .shp{animation-name:k-dev;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cmd{0.00%{stroke-width:1.5;}20.71%{stroke-width:1.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}56.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmd .shp{animation-name:k-cmd;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mp{0.00%{stroke-width:1.5;}46.43%{stroke-width:1.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-mp .shp{animation-name:k-mp;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}20.71%{stroke-width:1.6;}25.71%{stroke:var(--pink);stroke-width:2.4;}51.43%{stroke:var(--pink);stroke-width:2.4;}56.43%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}46.43%{stroke-width:1.6;}51.43%{stroke:var(--pink);stroke-width:2.4;}77.14%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-mp-0{opacity:0;}
@keyframes k-dyn-mp-0{0.00%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-mp-0{animation-name:k-dyn-mp-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-mp-1{opacity:1;}
@keyframes k-dyn-mp-1{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-mp-1{animation-name:k-dyn-mp-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="204.0,54.0 204.0,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="218.0" y="78.0" text-anchor="end">ההתקן</text>
<polyline id="edge-1" class="edge" points="204.0,132.0 204.0,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="218.0" y="156.0" text-anchor="end">נקודת החיבור</text>
<g id="el-dev">
<rect class="n-code-bg shp" x="145.4" y="16.0" width="117.2" height="38.0" rx="7"/>
<text class="code" x="204.0" y="43.0" text-anchor="middle">/dev/sdb1</text>
</g>
<g id="el-cmd">
<rect class="n-code-bg shp" x="77.7" y="94.0" width="252.7" height="38.0" rx="7"/>
<text class="code" x="204.0" y="121.0" text-anchor="middle">mount /dev/sdb1 /mnt/usb</text>
</g>
<g id="el-mp">
<rect class="n-box shp" x="84.9" y="172.0" width="238.3" height="44.0" rx="8"/>
<text class="t-b dyn-mp-0" x="204.0" y="199.0" text-anchor="middle">/mnt/usb (תיקייה ריקה)</text>
<text class="t-b dyn-mp-1" x="204.0" y="199.0" text-anchor="middle">/mnt/usb - קבצי הדיסק</text>
</g>
<g id="el-note">
<text class="small" x="204.0" y="269.0" text-anchor="middle">לחיבור אוטומטי בכל boot מוסיפים שורה לקובץ /etc/fstab</text>
</g>
</svg>
