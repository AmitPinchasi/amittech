<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" role="img" aria-label="תרשים זרימה כללי של XSS: קלט לא מהימן ממקורות שונים - URL, טופס או מסד נתונים - מגיע לנקודת פלט בעמוד, ובקרת Escaping קובעת אם הקוד ירוץ בדפדפן הקורבן או יוצג כטקסט בלבד">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-source{0.00%{stroke:var(--pink);stroke-width:2.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}17.41%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-source .shp{animation-name:k-source;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sink{0.00%{stroke-width:1.5;}11.16%{stroke-width:1.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}31.70%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-sink .shp{animation-name:k-sink;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-escape{0.00%{stroke-width:1.5;}25.45%{stroke-width:1.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}45.98%{stroke-width:1.5;}54.02%{stroke-width:1.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}74.55%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-escape .shp{animation-name:k-escape;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-safe{0.00%{stroke-width:1.5;}39.73%{stroke-width:1.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}60.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-safe .shp{animation-name:k-safe;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-run{0.00%{stroke-width:1.5;}68.30%{stroke-width:1.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}85.71%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-run .shp{animation-name:k-run;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.16%{stroke-width:1.6;}14.29%{stroke:var(--pink);stroke-width:2.4;}28.57%{stroke:var(--pink);stroke-width:2.4;}31.70%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.45%{stroke-width:1.6;}28.57%{stroke:var(--pink);stroke-width:2.4;}42.86%{stroke:var(--pink);stroke-width:2.4;}45.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}39.73%{stroke-width:1.6;}42.86%{stroke:var(--pink);stroke-width:2.4;}57.14%{stroke:var(--pink);stroke-width:2.4;}60.27%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}68.30%{stroke-width:1.6;}71.43%{stroke:var(--pink);stroke-width:2.4;}85.71%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="206.3,62.0 206.3,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="206.3,148.0 206.3,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="206.3,378.3 206.3,418.3" marker-end="url(#arr)"/>
<text class="lbl" x="220.3" y="402.3" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="396.7,283.2 462.7,283.2" marker-end="url(#arr)"/>
<text class="lbl" x="429.7" y="271.2" text-anchor="middle">כן</text>
<g id="el-source">
<rect class="n-box shp" x="63.4" y="16.0" width="285.9" height="46.0" rx="8"/>
<text class="t" x="206.3" y="44.0" text-anchor="middle">קלט לא מהימן: URL / טופס / DB</text>
</g>
<g id="el-sink">
<rect class="n-box shp" x="62.7" y="102.0" width="287.3" height="46.0" rx="8"/>
<text class="t" x="206.3" y="130.0" text-anchor="middle">התוכן מוכנס ל-HTML של העמוד</text>
</g>
<g id="el-escape">
<polygon class="n-dia shp" points="206.3,188.0 396.7,283.2 206.3,378.3 16.0,283.2"/>
<text class="t" x="206.3" y="288.2" text-anchor="middle">מתבצע Escaping לפלט?</text>
</g>
<g id="el-run">
<rect class="n-box shp" x="52.5" y="418.3" width="307.8" height="46.0" rx="8"/>
<text class="t" x="206.3" y="446.3" text-anchor="middle">הקוד רץ כסקריפט בדפדפן הקורבן</text>
</g>
<g id="el-safe">
<rect class="n-box shp" x="462.7" y="260.2" width="240.9" height="46.0" rx="8"/>
<text class="t" x="583.1" y="288.2" text-anchor="middle">מוצג כטקסט בלבד - לא רץ</text>
</g>
</svg>
