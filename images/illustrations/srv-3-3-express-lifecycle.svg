<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 535 660" width="535" role="img" aria-label="מסלול בקשה ב-Express: הבקשה עוברת דרך ה-middleware, נמצא ה-route, נבדק ה-token, ה-controller פונה ל-database ומחזיר JSON">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}11.25%{stroke:var(--pink);stroke-width:2.5;}13.44%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-json{0.00%{stroke-width:1.5;}9.06%{stroke-width:1.5;}11.25%{stroke:var(--pink);stroke-width:2.5;}22.50%{stroke:var(--pink);stroke-width:2.5;}24.69%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-json .shp{animation-name:k-json;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-route{0.00%{stroke-width:1.5;}20.31%{stroke-width:1.5;}22.50%{stroke:var(--pink);stroke-width:2.5;}33.75%{stroke:var(--pink);stroke-width:2.5;}35.94%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-route .shp{animation-name:k-route;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-auth{0.00%{stroke-width:1.5;}31.56%{stroke-width:1.5;}33.75%{stroke:var(--pink);stroke-width:2.5;}45.00%{stroke:var(--pink);stroke-width:2.5;}47.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-auth .shp{animation-name:k-auth;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ctrl{0.00%{stroke-width:1.5;}42.81%{stroke-width:1.5;}45.00%{stroke:var(--pink);stroke-width:2.5;}56.25%{stroke:var(--pink);stroke-width:2.5;}58.44%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ctrl .shp{animation-name:k-ctrl;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-db{0.00%{stroke-width:1.5;}54.06%{stroke-width:1.5;}56.25%{stroke:var(--pink);stroke-width:2.5;}67.50%{stroke:var(--pink);stroke-width:2.5;}69.69%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-db .shp{animation-name:k-db;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-resp{0.00%{stroke-width:1.5;}65.31%{stroke-width:1.5;}67.50%{stroke:var(--pink);stroke-width:2.5;}78.75%{stroke:var(--pink);stroke-width:2.5;}80.94%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-resp .shp{animation-name:k-resp;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-reject{0.00%{stroke-width:1.5;}76.56%{stroke-width:1.5;}78.75%{stroke:var(--pink);stroke-width:2.5;}90.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-reject .shp{animation-name:k-reject;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.06%{stroke-width:1.6;}11.25%{stroke:var(--pink);stroke-width:2.4;}22.50%{stroke:var(--pink);stroke-width:2.4;}24.69%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}20.31%{stroke-width:1.6;}22.50%{stroke:var(--pink);stroke-width:2.4;}33.75%{stroke:var(--pink);stroke-width:2.4;}35.94%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}31.56%{stroke-width:1.6;}33.75%{stroke:var(--pink);stroke-width:2.4;}45.00%{stroke:var(--pink);stroke-width:2.4;}47.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}42.81%{stroke-width:1.6;}45.00%{stroke:var(--pink);stroke-width:2.4;}56.25%{stroke:var(--pink);stroke-width:2.4;}58.44%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}54.06%{stroke-width:1.6;}56.25%{stroke:var(--pink);stroke-width:2.4;}67.50%{stroke:var(--pink);stroke-width:2.4;}69.69%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}65.31%{stroke-width:1.6;}67.50%{stroke:var(--pink);stroke-width:2.4;}78.75%{stroke:var(--pink);stroke-width:2.4;}80.94%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-5{animation-name:k-edge-5;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-6{0.00%{stroke-width:1.6;}76.56%{stroke-width:1.6;}78.75%{stroke:var(--pink);stroke-width:2.4;}90.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-6{animation-name:k-edge-6;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="144.3,54.0 144.3,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="158.3" y="78.0" text-anchor="end">הבקשה נכנסת</text>
<polyline id="edge-1" class="edge" points="144.3,140.0 144.3,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="144.3,226.0 144.3,266.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="144.3,394.3 144.3,434.3" marker-end="url(#arr)"/>
<text class="lbl" x="158.3" y="418.3" text-anchor="end">כן</text>
<polyline id="edge-4" class="edge" points="144.3,480.3 144.3,520.3" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="144.3,566.3 144.3,606.3" marker-end="url(#arr)"/>
<polyline id="edge-6" class="edge" points="272.6,330.1 338.6,330.1" marker-end="url(#arr)"/>
<text class="lbl" x="305.6" y="318.1" text-anchor="middle">לא</text>
<g id="el-req">
<rect class="n-code-bg shp" x="63.2" y="16.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="144.3" y="43.0" text-anchor="middle">GET /api/users</text>
</g>
<g id="el-json">
<rect class="n-box shp" x="16.0" y="94.0" width="256.7" height="46.0" rx="8"/>
<text class="t" x="144.3" y="122.0" text-anchor="middle" style="direction:ltr">express.json() - Middleware</text>
</g>
<g id="el-route">
<rect class="n-box shp" x="33.8" y="180.0" width="221.1" height="46.0" rx="8"/>
<text class="t" x="144.3" y="208.0" text-anchor="middle">מציאת ה-Route המתאים</text>
</g>
<g id="el-auth">
<polygon class="n-dia shp" points="144.3,266.0 272.6,330.1 144.3,394.3 16.1,330.1"/>
<text class="t" x="144.3" y="335.1" text-anchor="middle">יש token תקין?</text>
</g>
<g id="el-ctrl">
<rect class="n-box shp" x="44.6" y="434.3" width="199.6" height="46.0" rx="8"/>
<text class="t" x="144.3" y="462.3" text-anchor="middle">ה-Controller מופעל</text>
</g>
<g id="el-db">
<rect class="n-box shp" x="53.0" y="520.3" width="182.8" height="46.0" rx="8"/>
<text class="t" x="144.3" y="548.3" text-anchor="middle">פנייה ל-Database</text>
</g>
<g id="el-resp">
<rect class="n-code-bg shp" x="67.7" y="606.3" width="153.4" height="38.0" rx="7"/>
<text class="code" x="144.3" y="633.3" text-anchor="middle">200 OK + JSON</text>
</g>
<g id="el-reject">
<rect class="n-code-bg shp" x="338.6" y="311.1" width="180.4" height="38.0" rx="7"/>
<text class="code" x="428.8" y="338.1" text-anchor="middle">401 Unauthorized</text>
</g>
</svg>
