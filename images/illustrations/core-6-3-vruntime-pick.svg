<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 699 370" width="699" role="img" aria-label="תרשים המראה כיצד מתזמן ה-CFS בוחר בכל פעם את התהליך עם ה-vruntime הנמוך ביותר, וכיצד ה-vruntime של התהליך שרץ עולה ומעביר את התור לתהליך אחר">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-a{0.00%{stroke:var(--pink);stroke-width:2.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}45.11%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-a .shp{animation-name:k-a;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-b{0.00%{stroke-width:1.5;}37.50%{stroke-width:1.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-b .shp{animation-name:k-b;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-a-0{opacity:0;}
@keyframes k-dyn-a-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-a-0{animation-name:k-dyn-a-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-a-1{opacity:1;}
@keyframes k-dyn-a-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-a-1{animation-name:k-dyn-a-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-b-0{opacity:0;}
@keyframes k-dyn-b-0{0.00%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-b-0{animation-name:k-dyn-b-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-b-1{opacity:1;}
@keyframes k-dyn-b-1{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-b-1{animation-name:k-dyn-b-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:0;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-3{opacity:1;}
@keyframes k-dyn-note-3{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-3{animation-name:k-dyn-note-3;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-a">
<rect class="n-code-bg shp" x="259.1" y="16.0" width="180.4" height="38.0" rx="7"/>
<text class="code dyn-a-0" x="349.3" y="43.0" text-anchor="middle">A: vruntime = 20</text>
<text class="code dyn-a-1" x="349.3" y="43.0" text-anchor="middle">A: vruntime = 32</text>
</g>
<g id="el-b">
<rect class="n-code-bg shp" x="259.1" y="94.0" width="180.4" height="38.0" rx="7"/>
<text class="code dyn-b-0" x="349.3" y="121.0" text-anchor="middle">B: vruntime = 30</text>
<text class="code dyn-b-1" x="349.3" y="121.0" text-anchor="middle">B: vruntime = 42</text>
</g>
<g id="el-c">
<rect class="n-code-bg shp" x="259.1" y="172.0" width="180.4" height="38.0" rx="7"/>
<text class="code" x="349.3" y="199.0" text-anchor="middle">C: vruntime = 50</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="45.2" y="250.0" width="608.1" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="349.3" y="278.0" text-anchor="middle">המתזמן בוחר את התהליך עם ה-vruntime הנמוך ביותר, ולכן A רץ ראשון</text>
<text class="t dyn-note-1" x="349.3" y="278.0" text-anchor="middle">בזמן ש-A רץ ה-vruntime שלו עולה, ועכשיו הוא כבר לא הנמוך ביותר</text>
<text class="t dyn-note-2" x="349.3" y="278.0" text-anchor="middle">עכשיו B הוא בעל ה-vruntime הנמוך ביותר, ולכן הוא מקבל את המעבד</text>
<text class="t dyn-note-3" x="349.3" y="278.0" text-anchor="middle">גם ה-vruntime של B עולה, וכך זמן המעבד מתחלק בהוגנות בין התהליכים</text>
</g>
<g id="el-cap">
<text class="small" x="349.3" y="349.0" text-anchor="middle">התהליכים שמורים בעץ אדום-שחור לפי ה-vruntime, ולכן מציאת התהליך השמאלי ביותר היא פעולה מיידית</text>
</g>
</svg>
