<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 744 662" width="744" role="img" aria-label="קיבוע סשן: התוקף שותל מזהה סשן ידוע אצל הקורבן, ואם השרת אינו מחדש את הסשן בהתחברות התוקף נכנס עם אותו מזהה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-get{0.00%{stroke:var(--pink);stroke-width:2.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}13.54%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-get .shp{animation-name:k-get;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-plant{0.00%{stroke-width:1.5;}8.68%{stroke-width:1.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}24.65%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-plant .shp{animation-name:k-plant;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-login{0.00%{stroke-width:1.5;}19.79%{stroke-width:1.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}35.76%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-login .shp{animation-name:k-login;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-regen{0.00%{stroke-width:1.5;}30.90%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}46.88%{stroke-width:1.5;}53.13%{stroke-width:1.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}69.10%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-regen .shp{animation-name:k-regen;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-safe{0.00%{stroke-width:1.5;}42.01%{stroke-width:1.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}57.99%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-safe .shp{animation-name:k-safe;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-same{0.00%{stroke-width:1.5;}64.24%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}80.21%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-same .shp{animation-name:k-same;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-hijack{0.00%{stroke-width:1.5;}75.35%{stroke-width:1.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}88.89%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-hijack .shp{animation-name:k-hijack;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.68%{stroke-width:1.6;}11.11%{stroke:var(--pink);stroke-width:2.4;}22.22%{stroke:var(--pink);stroke-width:2.4;}24.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}19.79%{stroke-width:1.6;}22.22%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}35.76%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.90%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}44.44%{stroke:var(--pink);stroke-width:2.4;}46.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}42.01%{stroke-width:1.6;}44.44%{stroke:var(--pink);stroke-width:2.4;}55.56%{stroke:var(--pink);stroke-width:2.4;}57.99%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-5{animation-name:k-edge-5;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.24%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}77.78%{stroke:var(--pink);stroke-width:2.4;}80.21%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}75.35%{stroke-width:1.6;}77.78%{stroke:var(--pink);stroke-width:2.4;}88.89%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="216.0,62.0 216.0,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="216.0,148.0 216.0,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="216.0,234.0 216.0,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="216.0,474.0 216.0,514.0" marker-end="url(#arr)"/>
<text class="lbl" x="230.0" y="498.0" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="216.0,560.0 216.0,600.0" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="415.9,374.0 481.9,374.0" marker-end="url(#arr)"/>
<text class="lbl" x="448.9" y="362.0" text-anchor="middle">כן</text>
<g id="el-get">
<rect class="n-box shp" x="80.7" y="16.0" width="270.5" height="46.0" rx="8"/>
<text class="t" x="216.0" y="44.0" text-anchor="middle">התוקף משיג session ID ידוע</text>
</g>
<g id="el-plant">
<rect class="n-box shp" x="44.9" y="102.0" width="342.0" height="46.0" rx="8"/>
<text class="t" x="216.0" y="130.0" text-anchor="middle">התוקף שותל את המזהה בדפדפן הקורבן</text>
</g>
<g id="el-login">
<rect class="n-box shp" x="81.6" y="188.0" width="268.8" height="46.0" rx="8"/>
<text class="t" x="216.0" y="216.0" text-anchor="middle">הקורבן מתחבר עם שם וסיסמה</text>
</g>
<g id="el-regen">
<polygon class="n-dia shp" points="216.0,274.0 415.9,374.0 216.0,474.0 16.0,374.0"/>
<text class="t" x="216.0" y="379.0" text-anchor="middle">הסשן מתחדש בהתחברות?</text>
</g>
<g id="el-same">
<rect class="n-box shp" x="86.4" y="514.0" width="259.0" height="46.0" rx="8"/>
<text class="t" x="216.0" y="542.0" text-anchor="middle">מזהה הסשן נשאר ללא שינוי</text>
</g>
<g id="el-hijack">
<rect class="n-box shp" x="74.2" y="600.0" width="283.6" height="46.0" rx="8"/>
<text class="t" x="216.0" y="628.0" text-anchor="middle">התוקף נכנס עם אותו מזהה סשן</text>
</g>
<g id="el-safe">
<rect class="n-box shp" x="481.9" y="351.0" width="245.6" height="46.0" rx="8"/>
<text class="t" x="604.7" y="379.0" text-anchor="middle">מזהה חדש - התקיפה נכשלת</text>
</g>
</svg>
