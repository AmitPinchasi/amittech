<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 817 569" width="817" role="img" aria-label="עקיפת אימות עם magic hash: כששני ההאשים מתחילים באפס אי ונקראים כמספר אפס, השוואה רופפת מחזירה אמת ומאמתת את התוקף, בעוד השוואה מחמירה שבודקת גם טיפוס נכשלת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-inp{0.00%{stroke:var(--pink);stroke-width:2.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}15.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inp .shp{animation-name:k-inp;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-hashes{0.00%{stroke-width:1.5;}10.00%{stroke-width:1.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}27.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-hashes .shp{animation-name:k-hashes;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cmp{0.00%{stroke-width:1.5;}22.59%{stroke-width:1.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}40.37%{stroke-width:1.5;}47.78%{stroke-width:1.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}65.56%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmp .shp{animation-name:k-cmp;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-strict{0.00%{stroke-width:1.5;}35.19%{stroke-width:1.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}52.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-strict .shp{animation-name:k-strict;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-coerce{0.00%{stroke-width:1.5;}60.37%{stroke-width:1.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}78.15%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-coerce .shp{animation-name:k-coerce;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pass{0.00%{stroke-width:1.5;}72.96%{stroke-width:1.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}88.15%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-pass .shp{animation-name:k-pass;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.00%{stroke-width:1.6;}12.59%{stroke:var(--pink);stroke-width:2.4;}25.19%{stroke:var(--pink);stroke-width:2.4;}27.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.59%{stroke-width:1.6;}25.19%{stroke:var(--pink);stroke-width:2.4;}37.78%{stroke:var(--pink);stroke-width:2.4;}40.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}35.19%{stroke-width:1.6;}37.78%{stroke:var(--pink);stroke-width:2.4;}50.37%{stroke:var(--pink);stroke-width:2.4;}52.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}60.37%{stroke-width:1.6;}62.96%{stroke:var(--pink);stroke-width:2.4;}75.56%{stroke:var(--pink);stroke-width:2.4;}78.15%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}72.96%{stroke-width:1.6;}75.56%{stroke:var(--pink);stroke-width:2.4;}88.15%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="194.5,62.0 194.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="194.5,162.0 194.5,202.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="194.5,380.5 194.5,420.5" marker-end="url(#arr)"/>
<text class="lbl" x="208.5" y="404.5" text-anchor="end">כן</text>
<polyline id="edge-3" class="edge" points="194.5,466.5 194.5,506.5" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="373.0,291.3 439.0,291.3" marker-end="url(#arr)"/>
<text class="lbl" x="406.0" y="279.3" text-anchor="middle">לא</text>
<g id="el-inp">
<rect class="n-box shp" x="60.3" y="16.0" width="268.4" height="46.0" rx="8"/>
<text class="t" x="194.5" y="44.0" text-anchor="middle">התוקף שולח סיסמה QNKCDZO</text>
</g>
