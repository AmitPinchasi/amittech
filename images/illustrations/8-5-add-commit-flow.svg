<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 406" width="370" role="img" aria-label="זרימת העלאת קוד לגיט: שינוי בקובץ עובר עם git add לאזור הביניים, ורק git commit שומר אותו כגרסה בהיסטוריה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-work{0.00%{stroke:var(--pink);stroke-width:2.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}20.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-work .shp{animation-name:k-work;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-add{0.00%{stroke-width:1.5;}13.02%{stroke-width:1.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}36.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-add .shp{animation-name:k-add;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-stage{0.00%{stroke-width:1.5;}29.69%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}53.65%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-stage .shp{animation-name:k-stage;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-commit{0.00%{stroke-width:1.5;}46.35%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}70.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-commit .shp{animation-name:k-commit;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-repo{0.00%{stroke-width:1.5;}63.02%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-repo .shp{animation-name:k-repo;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.02%{stroke-width:1.6;}16.67%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}36.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.69%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}53.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}46.35%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}66.67%{stroke:var(--pink);stroke-width:2.4;}70.31%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}63.02%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}83.33%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="185.2,62.0 185.2,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="199.2" y="86.0" text-anchor="end">בוחרים את הקובץ</text>
<polyline id="edge-1" class="edge" points="185.2,140.0 185.2,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="185.2,226.0 185.2,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="199.2" y="250.0" text-anchor="end">מאשרים את השינויים</text>
<polyline id="edge-3" class="edge" points="185.2,304.0 185.2,344.0" marker-end="url(#arr)"/>
<g id="el-work">
<rect class="n-box shp" x="81.2" y="16.0" width="208.0" height="46.0" rx="8"/>
<text class="t" x="185.2" y="44.0" text-anchor="middle">שינוי בקובץ main.py</text>
</g>
<g id="el-add">
<rect class="n-code-bg shp" x="99.5" y="102.0" width="171.4" height="38.0" rx="7"/>
<text class="code" x="185.2" y="129.0" text-anchor="middle">git add main.py</text>
</g>
<g id="el-stage">
<rect class="n-box shp" x="16.0" y="180.0" width="338.3" height="46.0" rx="8"/>
<text class="t" x="185.2" y="208.0" text-anchor="middle">אזור הביניים - הקובץ מסומן להעלאה</text>
</g>
<g id="el-commit">
<rect class="n-code-bg shp" x="67.9" y="266.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="185.2" y="293.0" text-anchor="middle">git commit -m "update"</text>
</g>
<g id="el-repo">
<rect class="n-box shp" x="53.3" y="344.0" width="263.7" height="46.0" rx="8"/>
<text class="t" x="185.2" y="372.0" text-anchor="middle">קומיט חדש נשמר בהיסטוריה</text>
</g>
</svg>
