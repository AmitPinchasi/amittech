<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 532 222" width="532" role="img" aria-label="הגירת עמוד בזיכרון מנוהל: אותו עמוד נודד בין ה-RAM של ה-host ל-HBM3 של ה-GPU לפי הגישה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-trig{0.00%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-trig .shp{animation-name:k-trig;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-loc{0.00%{stroke-width:1.5;}17.19%{stroke-width:1.5;}20.83%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-loc .shp{animation-name:k-loc;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}17.19%{stroke-width:1.6;}20.83%{stroke:var(--pink);stroke-width:2.4;}83.33%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-trig-0{opacity:0;}
@keyframes k-dyn-trig-0{0.00%{opacity:1;}20.83%{opacity:1;}24.48%{opacity:0;}100.00%{opacity:0;}}
.dyn-trig-0{animation-name:k-dyn-trig-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-trig-1{opacity:0;}
@keyframes k-dyn-trig-1{0.00%{opacity:0;}17.19%{opacity:0;}20.83%{opacity:1;}41.67%{opacity:1;}45.31%{opacity:0;}100.00%{opacity:0;}}
.dyn-trig-1{animation-name:k-dyn-trig-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-trig-2{opacity:0;}
@keyframes k-dyn-trig-2{0.00%{opacity:0;}38.02%{opacity:0;}41.67%{opacity:1;}62.50%{opacity:1;}66.15%{opacity:0;}100.00%{opacity:0;}}
.dyn-trig-2{animation-name:k-dyn-trig-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-trig-3{opacity:1;}
