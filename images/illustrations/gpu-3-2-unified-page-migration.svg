<text class="t dyn-loc-0" x="265.8" y="130.0" text-anchor="middle">העמוד טרם ממוקם</text>
<text class="t dyn-loc-1" x="265.8" y="130.0" text-anchor="middle">העמוד ב-RAM של ה-host</text>
<text class="t dyn-loc-2" x="265.8" y="130.0" text-anchor="middle">העמוד היגר ל-HBM3</text>
<text class="t dyn-loc-3" x="265.8" y="130.0" text-anchor="middle">העמוד חזר ל-RAM</text>
