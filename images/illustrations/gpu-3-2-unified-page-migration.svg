.dyn-loc-0{animation-name:k-dyn-loc-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-loc-1{opacity:0;}
@keyframes k-dyn-loc-1{0.00%{opacity:0;}17.19%{opacity:0;}20.83%{opacity:1;}41.67%{opacity:1;}45.31%{opacity:0;}100.00%{opacity:0;}}
.dyn-loc-1{animation-name:k-dyn-loc-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-loc-2{opacity:0;}
@keyframes k-dyn-loc-2{0.00%{opacity:0;}38.02%{opacity:0;}41.67%{opacity:1;}62.50%{opacity:1;}66.15%{opacity:0;}100.00%{opacity:0;}}
.dyn-loc-2{animation-name:k-dyn-loc-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-loc-3{opacity:1;}
@keyframes k-dyn-loc-3{0.00%{opacity:0;}58.85%{opacity:0;}62.50%{opacity:1;}83.33%{opacity:1;}100.00%{opacity:1;}}
.dyn-loc-3{animation-name:k-dyn-loc-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="265.8,62.0 265.8,102.0" marker-end="url(#arr)"/>
<g id="el-trig">
<rect class="n-box shp" x="170.4" y="16.0" width="190.8" height="46.0" rx="8"/>
<text class="t dyn-trig-0" x="265.8" y="44.0" text-anchor="middle" style="direction:ltr">cudaMallocManaged</text>
<text class="t dyn-trig-1" x="265.8" y="44.0" text-anchor="middle">ה-host כותב a[i]</text>
<text class="t dyn-trig-2" x="265.8" y="44.0" text-anchor="middle">ה-kernel קורא a[i]</text>
