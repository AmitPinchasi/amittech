<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 708 222" width="708" role="img" aria-label="מציאת ה-offset עם רצף דה-ברוין: הbuffer מתמלא ברצף שבו כל חלון של 4 בתים ייחודי, ולכן ארבעת הבתים saaa שנחתו על RIP בזמן הקריסה מזהים באופן חד-משמעי את המרחק מתחילת הקלט, כלומר offset של 72 בתים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="180.3,120.0 180.3,160.0" marker-end="url(#arr)"/>
<text class="lbl" x="192.3" y="144.0" text-anchor="end" style="direction:ltr">cyclic_find</text>
<g id="el-cap">
<text class="small" x="412.3" y="29.0" text-anchor="middle">buf מלא ברצף דה-ברוין - כל חלון 4 בתים ייחודי</text>
</g>
<g id="el-seq">
<rect id="el-seq-c0" class="n-cell shp" x="596.3" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="644.3" y="102.0" text-anchor="middle" style="direction:ltr">aaaa</text>
<rect id="el-seq-c1" class="n-cell shp" x="480.3" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="528.3" y="102.0" text-anchor="middle" style="direction:ltr">baaa</text>
<rect id="el-seq-c2" class="n-cell shp" x="364.3" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="412.3" y="102.0" text-anchor="middle" style="direction:ltr">caaa</text>
<rect id="el-seq-c3" class="n-cell shp" x="248.3" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="296.3" y="102.0" text-anchor="middle" style="direction:ltr">...</text>
<rect id="el-seq-c4" class="n-hl shp" x="132.3" y="74.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.3" y="102.0" text-anchor="middle" style="direction:ltr">saaa</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="16.0" y="160.0" width="328.6" height="46.0" rx="8"/>
<text class="t" x="180.3" y="188.0" text-anchor="middle">החלון saaa שנחת על RIP = offset 72</text>
</g>
</svg>
