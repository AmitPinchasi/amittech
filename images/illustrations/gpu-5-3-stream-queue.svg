<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 556 238" width="556" role="img" aria-label="זרם הוא תור פעולות: המעבד מנפיק את שלוש הפעולות וחוזר מיד, וה-GPU מבצע אותן לפי הסדר">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-q-0{0.00%{stroke:var(--pink);stroke-width:2.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}30.71%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-q-c0{animation-name:k-q-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-q-1{0.00%{stroke-width:1.5;}20.71%{stroke-width:1.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}56.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-q-c1{animation-name:k-q-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-q-2{0.00%{stroke-width:1.5;}46.43%{stroke-width:1.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-q-c2{animation-name:k-q-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}20.71%{transform:translateX(0.0px);}25.71%{transform:translateX(-116.0px);}46.43%{transform:translateX(-116.0px);}51.43%{transform:translateX(-232.0px);}72.14%{transform:translateX(-232.0px);}100.00%{transform:translateX(-232.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-gpu-0{opacity:0;}
@keyframes k-dyn-gpu-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-gpu-0{animation-name:k-dyn-gpu-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-gpu-1{opacity:0;}
@keyframes k-dyn-gpu-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-gpu-1{animation-name:k-dyn-gpu-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-gpu-2{opacity:1;}
@keyframes k-dyn-gpu-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-gpu-2{animation-name:k-dyn-gpu-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-q">
<rect id="el-q-c0" class="n-cell shp" x="345.9" y="34.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="393.9" y="28.0" text-anchor="middle" style="direction:ltr">0</text>
<text class="t" x="393.9" y="62.0" text-anchor="middle" style="direction:ltr">H2D</text>
<rect id="el-q-c1" class="n-cell shp" x="229.9" y="34.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="277.9" y="28.0" text-anchor="middle" style="direction:ltr">1</text>
<text class="t" x="277.9" y="62.0" text-anchor="middle" style="direction:ltr">kernel</text>
<rect id="el-q-c2" class="n-cell shp" x="113.9" y="34.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="161.9" y="28.0" text-anchor="middle" style="direction:ltr">2</text>
<text class="t" x="161.9" y="62.0" text-anchor="middle" style="direction:ltr">D2H</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="393.9,80.0 393.9,120.0" marker-end="url(#arr)"/>
<text class="lbl" x="405.9" y="104.0" text-anchor="end">לפי הסדר</text>
<g id="el-gpu">
<rect class="n-box shp" x="293.8" y="120.0" width="200.3" height="44.0" rx="8"/>
<text class="t-b dyn-gpu-0" x="393.9" y="147.0" text-anchor="middle">ה-GPU מבצע H2D</text>
<text class="t-b dyn-gpu-1" x="393.9" y="147.0" text-anchor="middle">ה-GPU מבצע kernel</text>
<text class="t-b dyn-gpu-2" x="393.9" y="147.0" text-anchor="middle">ה-GPU מבצע D2H</text>
</g>
</g>
<g id="el-note">
<text class="small" x="277.9" y="217.0" text-anchor="middle">המעבד הנפיק את שלוש הפעולות לזרם וחזר מיד; ה-GPU מבצע אותן לפי סדר ההנפקה</text>
</g>
</svg>
