<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 504 778" width="504" role="img" aria-label="תרשים המראה את המסלול של הפקודה int 0x80 מקוד היוזר מוד אל השער בטבלת ה-IDT, אל קוד הקרנל וחזרה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-user{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-user .shp{animation-name:k-user;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lookup{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}27.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lookup .shp{animation-name:k-lookup;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-gate{0.00%{stroke-width:1.5;}22.89%{stroke-width:1.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-gate .shp{animation-name:k-gate;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-switch{0.00%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}53.17%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-switch .shp{animation-name:k-switch;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-kernel{0.00%{stroke-width:1.5;}48.24%{stroke-width:1.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-kernel .shp{animation-name:k-kernel;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-iret{0.00%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-iret .shp{animation-name:k-iret;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-back{0.00%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-back .shp{animation-name:k-back;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.21%{stroke-width:1.6;}12.68%{stroke:var(--pink);stroke-width:2.4;}25.35%{stroke:var(--pink);stroke-width:2.4;}27.82%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.89%{stroke-width:1.6;}25.35%{stroke:var(--pink);stroke-width:2.4;}38.03%{stroke:var(--pink);stroke-width:2.4;}40.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}35.56%{stroke-width:1.6;}38.03%{stroke:var(--pink);stroke-width:2.4;}50.70%{stroke:var(--pink);stroke-width:2.4;}53.17%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}48.24%{stroke-width:1.6;}50.70%{stroke:var(--pink);stroke-width:2.4;}63.38%{stroke:var(--pink);stroke-width:2.4;}65.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}60.92%{stroke-width:1.6;}63.38%{stroke:var(--pink);stroke-width:2.4;}76.06%{stroke:var(--pink);stroke-width:2.4;}78.52%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ring-0{opacity:0;}
@keyframes k-dyn-ring-0{0.00%{opacity:1;}38.03%{opacity:1;}40.49%{opacity:0;}100.00%{opacity:0;}}
.dyn-ring-0{animation-name:k-dyn-ring-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ring-1{opacity:0;}
@keyframes k-dyn-ring-1{0.00%{opacity:0;}35.56%{opacity:0;}38.03%{opacity:1;}76.06%{opacity:1;}78.52%{opacity:0;}100.00%{opacity:0;}}
.dyn-ring-1{animation-name:k-dyn-ring-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ring-2{opacity:1;}
@keyframes k-dyn-ring-2{0.00%{opacity:0;}73.59%{opacity:0;}76.06%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-ring-2{animation-name:k-dyn-ring-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="252.2,98.0 252.2,138.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="252.2,184.0 252.2,224.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="252.2,306.0 252.2,346.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="252.2,392.0 252.2,432.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="252.2,514.0 252.2,554.0" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="252.2,592.0 252.2,632.0" marker-end="url(#arr)"/>
<g id="el-user">
<rect class="n-code-bg shp" x="180.0" y="16.0" width="144.3" height="82.0" rx="7"/>
<text class="code" x="252.2" y="43.0" text-anchor="middle">mov eax, 4</text>
<text class="code" x="252.2" y="65.0" text-anchor="middle">mov ebx, msg</text>
<text class="code" x="252.2" y="87.0" text-anchor="middle">int 0x80</text>
</g>
<g id="el-lookup">
<rect class="n-box shp" x="59.7" y="138.0" width="385.0" height="46.0" rx="8"/>
<text class="t" x="252.2" y="166.0" text-anchor="middle">המעבד ניגש לשורה מספר 0x80 בטבלת ה-IDT</text>
</g>
<g id="el-gate">
<rect class="n-code-bg shp" x="107.8" y="224.0" width="288.8" height="82.0" rx="7"/>
<text class="code" x="252.2" y="251.0" text-anchor="middle">Offset   = kernel_dispatcher</text>
<text class="code" x="252.2" y="273.0" text-anchor="middle">Selector = 0x08</text>
<text class="code" x="252.2" y="295.0" text-anchor="middle">DPL      = 3</text>
</g>
<g id="el-switch">
<rect class="n-box shp" x="16.0" y="346.0" width="472.4" height="46.0" rx="8"/>
<text class="t" x="252.2" y="374.0" text-anchor="middle">המעבד טוען את cs ואת eip מהשער ועובר להרשאות קרנל</text>
</g>
<g id="el-kernel">
<rect class="n-code-bg shp" x="153.0" y="432.0" width="198.5" height="82.0" rx="7"/>
<text class="code" x="252.2" y="459.0" text-anchor="middle">kernel_dispatcher:</text>
<text class="code" x="252.2" y="481.0" text-anchor="middle">cmp eax, 4</text>
<text class="code" x="252.2" y="503.0" text-anchor="middle">je print_text</text>
</g>
<g id="el-iret">
<rect class="n-code-bg shp" x="204.2" y="554.0" width="96.0" height="38.0" rx="7"/>
<text class="code" x="252.2" y="581.0" text-anchor="middle">iret</text>
</g>
<g id="el-back">
<rect class="n-box shp" x="63.7" y="632.0" width="377.0" height="46.0" rx="8"/>
<text class="t" x="252.2" y="660.0" text-anchor="middle">התוכנה ממשיכה מהשורה שאחרי הפקודה int</text>
</g>
<g id="el-ring">
<rect class="n-box shp" x="198.1" y="718.0" width="108.2" height="44.0" rx="8"/>
<text class="t-b dyn-ring-0" x="252.2" y="745.0" text-anchor="middle" style="direction:ltr">ring = 3</text>
<text class="t-b dyn-ring-1" x="252.2" y="745.0" text-anchor="middle" style="direction:ltr">ring = 0</text>
<text class="t-b dyn-ring-2" x="252.2" y="745.0" text-anchor="middle" style="direction:ltr">ring = 3</text>
</g>
</svg>
