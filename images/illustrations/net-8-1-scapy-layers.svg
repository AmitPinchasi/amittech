<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 447 214" width="447" role="img" aria-label="ב-Scapy האופרטור / מחבר שכבות פרוטוקול זו על גבי זו: מתחילים משכבת IP, מוסיפים מעליה TCP, ואז מטען Raw, וכך נבנית packet שלמה שכבה אחר שכבה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}76.12%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-code .shp{animation-name:k-code;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pkt{0.00%{stroke:var(--pink);stroke-width:2.5;}76.12%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-pkt .shp{animation-name:k-pkt;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-code-0{opacity:0;}
@keyframes k-dyn-code-0{0.00%{opacity:1;}25.37%{opacity:1;}30.60%{opacity:0;}100.00%{opacity:0;}}
.dyn-code-0{animation-name:k-dyn-code-0;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-code-1{opacity:0;}
@keyframes k-dyn-code-1{0.00%{opacity:0;}20.15%{opacity:0;}25.37%{opacity:1;}50.75%{opacity:1;}55.97%{opacity:0;}100.00%{opacity:0;}}
.dyn-code-1{animation-name:k-dyn-code-1;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-code-2{opacity:1;}
@keyframes k-dyn-code-2{0.00%{opacity:0;}45.52%{opacity:0;}50.75%{opacity:1;}76.12%{opacity:1;}100.00%{opacity:1;}}
.dyn-code-2{animation-name:k-dyn-code-2;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pkt-0{opacity:0;}
@keyframes k-dyn-pkt-0{0.00%{opacity:1;}25.37%{opacity:1;}30.60%{opacity:0;}100.00%{opacity:0;}}
.dyn-pkt-0{animation-name:k-dyn-pkt-0;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pkt-1{opacity:0;}
@keyframes k-dyn-pkt-1{0.00%{opacity:0;}20.15%{opacity:0;}25.37%{opacity:1;}50.75%{opacity:1;}55.97%{opacity:0;}100.00%{opacity:0;}}
.dyn-pkt-1{animation-name:k-dyn-pkt-1;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-pkt-2{opacity:1;}
@keyframes k-dyn-pkt-2{0.00%{opacity:0;}45.52%{opacity:0;}50.75%{opacity:1;}76.12%{opacity:1;}100.00%{opacity:1;}}
.dyn-pkt-2{animation-name:k-dyn-pkt-2;animation-duration:6.70s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="415.1" height="38.0" rx="7"/>
<text class="code dyn-code-0" x="223.6" y="43.0" text-anchor="middle">IP(dst='8.8.8.8')</text>
<text class="code dyn-code-1" x="223.6" y="43.0" text-anchor="middle">IP(dst='8.8.8.8')/TCP(dport=80)</text>
<text class="code dyn-code-2" x="223.6" y="43.0" text-anchor="middle">IP(dst='8.8.8.8')/TCP(dport=80)/Raw(b'hi')</text>
</g>
<g id="el-pkt">
<rect class="n-box shp" x="128.7" y="94.0" width="189.8" height="46.0" rx="8"/>
<text class="t dyn-pkt-0" x="223.6" y="122.0" text-anchor="middle" style="direction:ltr">[ IP ]</text>
<text class="t dyn-pkt-1" x="223.6" y="122.0" text-anchor="middle" style="direction:ltr">[ IP ][ TCP ]</text>
<text class="t dyn-pkt-2" x="223.6" y="122.0" text-anchor="middle" style="direction:ltr">[ IP ][ TCP ][ Raw ]</text>
</g>
<g id="el-note">
<text class="small" x="223.6" y="193.0" text-anchor="middle">האופרטור / מחבר שכבות פרוטוקול לכדי packet אחת</text>
</g>
</svg>
