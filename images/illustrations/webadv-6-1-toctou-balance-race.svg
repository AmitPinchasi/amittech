<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 454 392" width="454" role="img" aria-label="תנאי מרוץ TOCTOU: שתי בקשות מקבילות קוראות את אותה יתרה ועוברות את הבדיקה לפני שאחת מהן מעדכנת, ולכן שתיהן מחייבות והיתרה יורדת מתחת לאפס">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
