<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 741 710" width="741" role="img" aria-label="התמדה דרך Service Worker: אם worker-src מתיר את המקור, ה-SW נרשם ומיירט כל בקשת רשת כדי להזריק סקריפט, ונשאר פעיל גם אחרי תיקון ה-XSS">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-xss{0.00%{stroke:var(--pink);stroke-width:2.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}13.54%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-xss .shp{animation-name:k-xss;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-regq{0.00%{stroke-width:1.5;}8.68%{stroke-width:1.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}24.65%{stroke-width:1.5;}30.90%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}46.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-regq .shp{animation-name:k-regq;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-blocked{0.00%{stroke-width:1.5;}19.79%{stroke-width:1.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}35.76%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-blocked .shp{animation-name:k-blocked;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-install{0.00%{stroke-width:1.5;}42.01%{stroke-width:1.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}57.99%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-install .shp{animation-name:k-install;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fetch{0.00%{stroke-width:1.5;}53.13%{stroke-width:1.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}69.10%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fetch .shp{animation-name:k-fetch;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-inject{0.00%{stroke-width:1.5;}64.24%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}80.21%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inject .shp{animation-name:k-inject;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-persist{0.00%{stroke-width:1.5;}75.35%{stroke-width:1.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}88.89%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-persist .shp{animation-name:k-persist;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.68%{stroke-width:1.6;}11.11%{stroke:var(--pink);stroke-width:2.4;}22.22%{stroke:var(--pink);stroke-width:2.4;}24.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}19.79%{stroke-width:1.6;}22.22%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}35.76%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-5{animation-name:k-edge-5;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}42.01%{stroke-width:1.6;}44.44%{stroke:var(--pink);stroke-width:2.4;}55.56%{stroke:var(--pink);stroke-width:2.4;}57.99%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}53.13%{stroke-width:1.6;}55.56%{stroke:var(--pink);stroke-width:2.4;}66.67%{stroke:var(--pink);stroke-width:2.4;}69.10%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.24%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}77.78%{stroke:var(--pink);stroke-width:2.4;}80.21%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}75.35%{stroke-width:1.6;}77.78%{stroke:var(--pink);stroke-width:2.4;}88.89%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="264.4,62.0 264.4,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="264.4,350.4 264.4,390.4" marker-end="url(#arr)"/>
<text class="lbl" x="278.4" y="374.4" text-anchor="end">כן</text>
<polyline id="edge-2" class="edge" points="264.4,436.4 264.4,476.4" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="264.4,522.4 264.4,562.4" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="264.4,608.4 264.4,648.4" marker-end="url(#arr)"/>
<polyline id="edge-5" class="edge" points="512.7,226.2 578.7,226.2" marker-end="url(#arr)"/>
<text class="lbl" x="545.7" y="214.2" text-anchor="middle">לא</text>
<g id="el-xss">
<rect class="n-box shp" x="111.3" y="16.0" width="306.1" height="46.0" rx="8"/>
<text class="t" x="264.4" y="44.0" text-anchor="middle">הזרקת XSS רושמת Service Worker</text>
</g>
<g id="el-regq">
<polygon class="n-dia shp" points="264.4,102.0 512.7,226.2 264.4,350.4 16.0,226.2"/>
<text class="t" x="264.4" y="231.2" text-anchor="middle">ה-worker-src מתיר את המקור?</text>
</g>
