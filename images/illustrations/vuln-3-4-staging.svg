<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 350" width="330" role="img" aria-label="שרשור שלבים כשמקום ההזרקה קטן: הגלישה מריצה stager זעיר בן כמה עשרות בתים שכל תפקידו לקרוא עוד בתים מאותו ערוץ אל אזור ניתן להרצה ולקפוץ אליהם, וכך ה-payload הגדול והאמיתי, כמו reverse shell, נכנס בשלב שני בלי הגבלת מקום">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-ovf{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ovf .shp{animation-name:k-ovf;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-stager{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-stager .shp{animation-name:k-stager;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-load{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-load .shp{animation-name:k-load;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-stage2{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-stage2 .shp{animation-name:k-stage2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.48%{stroke-width:1.6;}20.45%{stroke:var(--pink);stroke-width:2.4;}40.91%{stroke:var(--pink);stroke-width:2.4;}44.89%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.93%{stroke-width:1.6;}40.91%{stroke:var(--pink);stroke-width:2.4;}61.36%{stroke:var(--pink);stroke-width:2.4;}65.34%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}57.39%{stroke-width:1.6;}61.36%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="164.8,62.0 164.8,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="178.8" y="86.0" text-anchor="end">מריץ את ה-stager</text>
<polyline id="edge-1" class="edge" points="164.8,162.0 164.8,202.0" marker-end="url(#arr)"/>
<text class="lbl" x="178.8" y="186.0" text-anchor="end">קורא עוד בתים</text>
<polyline id="edge-2" class="edge" points="164.8,248.0 164.8,288.0" marker-end="url(#arr)"/>
<text class="lbl" x="178.8" y="272.0" text-anchor="end" style="direction:ltr">jmp buf</text>
<g id="el-ovf">
<rect class="n-box shp" x="16.0" y="16.0" width="297.7" height="46.0" rx="8"/>
<text class="t" x="164.8" y="44.0" text-anchor="middle">הגלישה שולטת ב-RIP - מקום קטן</text>
</g>
<g id="el-stager">
<rect class="n-code-bg shp" x="79.1" y="102.0" width="171.4" height="60.0" rx="7"/>
<text class="code" x="164.8" y="129.0" text-anchor="middle">read(0, buf, N)</text>
<text class="code" x="164.8" y="151.0" text-anchor="middle">jmp buf</text>
</g>
<g id="el-load">
<rect class="n-box shp" x="16.3" y="202.0" width="297.0" height="46.0" rx="8"/>
<text class="t" x="164.8" y="230.0" text-anchor="middle">stage 2 נקרא לאזור ניתן להרצה</text>
</g>
<g id="el-stage2">
<rect class="n-box shp" x="23.7" y="288.0" width="282.2" height="46.0" rx="8"/>
<text class="t" x="164.8" y="316.0" text-anchor="middle">stage 2 רץ - reverse shell מלא</text>
</g>
</svg>
