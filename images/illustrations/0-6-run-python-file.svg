<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 301 292" width="301" role="img" aria-label="מה קורה כשמריצים קובץ פייתון: פייתון קורא את הקוד ומדפיס את הפלט">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-src{0.00%{stroke:var(--pink);stroke-width:2.5;}24.59%{stroke:var(--pink);stroke-width:2.5;}30.33%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-src .shp{animation-name:k-src;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-run{0.00%{stroke-width:1.5;}18.85%{stroke-width:1.5;}24.59%{stroke:var(--pink);stroke-width:2.5;}49.18%{stroke:var(--pink);stroke-width:2.5;}54.92%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-run .shp{animation-name:k-run;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}43.44%{stroke-width:1.5;}49.18%{stroke:var(--pink);stroke-width:2.5;}73.77%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}18.85%{stroke-width:1.6;}24.59%{stroke:var(--pink);stroke-width:2.4;}49.18%{stroke:var(--pink);stroke-width:2.4;}54.92%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}43.44%{stroke-width:1.6;}49.18%{stroke:var(--pink);stroke-width:2.4;}73.77%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:6.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="150.4,54.0 150.4,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="164.4" y="78.0" text-anchor="end">הרצה</text>
<polyline id="edge-1" class="edge" points="150.4,140.0 150.4,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="164.4" y="164.0" text-anchor="end">פלט</text>
<g id="el-src">
<rect class="n-code-bg shp" x="37.6" y="16.0" width="225.6" height="38.0" rx="7"/>
<text class="code" x="150.4" y="43.0" text-anchor="middle">print("Hello World!")</text>
</g>
<g id="el-run">
<rect class="n-box shp" x="16.0" y="94.0" width="268.8" height="46.0" rx="8"/>
<text class="t" x="150.4" y="122.0" text-anchor="middle">פייתון קורא ומריץ את הקוד</text>
</g>
<g id="el-out">
<rect class="n-code-bg shp" x="78.2" y="180.0" width="144.3" height="38.0" rx="7"/>
<text class="code" x="150.4" y="207.0" text-anchor="middle">Hello World!</text>
</g>
<g id="el-note">
<text class="small" x="150.4" y="271.0" text-anchor="middle">זה מה שקורה כשלוחצים על כפתור ההרצה</text>
</g>
</svg>
