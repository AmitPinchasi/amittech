@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.77%{stroke-width:1.6;}12.50%{stroke:var(--pink);stroke-width:2.4;}25.00%{stroke:var(--pink);stroke-width:2.4;}27.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.27%{stroke-width:1.6;}25.00%{stroke:var(--pink);stroke-width:2.4;}37.50%{stroke:var(--pink);stroke-width:2.4;}40.23%{stroke-width:1.6;}59.77%{stroke-width:1.6;}62.50%{stroke:var(--pink);stroke-width:2.4;}75.00%{stroke:var(--pink);stroke-width:2.4;}77.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}34.77%{stroke-width:1.6;}37.50%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}52.73%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}47.27%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}62.50%{stroke:var(--pink);stroke-width:2.4;}65.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}72.27%{stroke-width:1.6;}75.00%{stroke:var(--pink);stroke-width:2.4;}87.50%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-tests-0{opacity:0;}
@keyframes k-dyn-tests-0{0.00%{opacity:1;}50.00%{opacity:1;}52.73%{opacity:0;}100.00%{opacity:0;}}
.dyn-tests-0{animation-name:k-dyn-tests-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-tests-1{opacity:1;}
@keyframes k-dyn-tests-1{0.00%{opacity:0;}47.27%{opacity:0;}50.00%{opacity:1;}87.50%{opacity:1;}100.00%{opacity:1;}}
.dyn-tests-1{animation-name:k-dyn-tests-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="196.6,62.0 196.6,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="196.6,148.0 196.6,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="276.6,230.0 342.6,230.0" marker-end="url(#arr)"/>
<text class="lbl" x="309.6" y="218.0" text-anchor="middle">עבר</text>
<polyline id="edge-3" class="edge" points="196.6,272.0 196.6,312.0" marker-end="url(#arr)"/>
<text class="lbl" x="210.6" y="296.0" text-anchor="end">נכשל</text>
<polyline id="edge-4" class="edge" points="96.0,335.0 16.0,335.0 16.0,125.0 113.6,125.0" marker-end="url(#arr)"/>
<text class="small" x="64.8" y="113.0" text-anchor="middle">מריץ שוב</text>
<g id="el-fin">
<rect class="n-box shp" x="99.5" y="16.0" width="194.2" height="46.0" rx="8"/>
<text class="t" x="196.6" y="44.0" text-anchor="middle">Claude מנסה לסיים</text>
</g>
<g id="el-tests">
<rect class="n-box shp" x="113.6" y="102.0" width="166.0" height="46.0" rx="8"/>
<text class="t dyn-tests-0" x="196.6" y="130.0" text-anchor="middle">בדיקות אדומות</text>
<text class="t dyn-tests-1" x="196.6" y="130.0" text-anchor="middle">בדיקות ירוקות</text>
</g>
