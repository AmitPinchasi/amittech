<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 505 374" width="505" role="img" aria-label="הוק Stop מריץ בדיקות כש-Claude מנסה לסיים: אם הבדיקות אדומות ההוק חוסם את העצירה ו-Claude מתקן ומריץ שוב, ורק כשהן ירוקות הסשן מסתיים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-fin{0.00%{stroke:var(--pink);stroke-width:2.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}15.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fin .shp{animation-name:k-fin;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tests{0.00%{stroke-width:1.5;}9.77%{stroke-width:1.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}27.73%{stroke-width:1.5;}47.27%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}65.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-tests .shp{animation-name:k-tests;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-d{0.00%{stroke-width:1.5;}22.27%{stroke-width:1.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}40.23%{stroke-width:1.5;}59.77%{stroke-width:1.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}77.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-d .shp{animation-name:k-d;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fix{0.00%{stroke-width:1.5;}34.77%{stroke-width:1.5;}37.50%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}52.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fix .shp{animation-name:k-fix;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-done{0.00%{stroke-width:1.5;}72.27%{stroke-width:1.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}87.50%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
