@keyframes k-edge-4{0.00%{stroke-width:1.6;}43.47%{stroke-width:1.6;}45.45%{stroke:var(--pink);stroke-width:2.4;}54.55%{stroke:var(--pink);stroke-width:2.4;}56.53%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}79.83%{stroke-width:1.6;}81.82%{stroke:var(--pink);stroke-width:2.4;}90.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="186.4,62.0 186.4,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="186.4,148.0 186.4,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="186.4,234.0 186.4,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="186.4,320.0 186.4,360.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="106.4,402.0 16.0,402.0 16.0,125.0 108.1,125.0" marker-end="url(#arr)"/>
<text class="small" x="62.0" y="113.0" text-anchor="middle">לא</text>
