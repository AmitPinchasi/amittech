#el-act .shp{animation-name:k-act;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-observe{0.00%{stroke-width:1.5;}25.28%{stroke-width:1.5;}27.27%{stroke:var(--pink);stroke-width:2.5;}36.36%{stroke:var(--pink);stroke-width:2.5;}38.35%{stroke-width:1.5;}61.65%{stroke-width:1.5;}63.64%{stroke:var(--pink);stroke-width:2.5;}72.73%{stroke:var(--pink);stroke-width:2.5;}74.72%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
