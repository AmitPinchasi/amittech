@keyframes k-done{0.00%{stroke-width:1.5;}34.38%{stroke-width:1.5;}36.36%{stroke:var(--pink);stroke-width:2.5;}45.45%{stroke:var(--pink);stroke-width:2.5;}47.44%{stroke-width:1.5;}70.74%{stroke-width:1.5;}72.73%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}83.81%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-done .shp{animation-name:k-done;animation-duration:17.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-end{0.00%{stroke-width:1.5;}79.83%{stroke-width:1.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}90.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
