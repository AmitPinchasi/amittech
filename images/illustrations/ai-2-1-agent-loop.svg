@keyframes k-edge-3{0.00%{stroke-width:1.6;}34.38%{stroke-width:1.6;}36.36%{stroke:var(--pink);stroke-width:2.4;}45.45%{stroke:var(--pink);stroke-width:2.4;}47.44%{stroke-width:1.6;}70.74%{stroke-width:1.6;}72.73%{stroke:var(--pink);stroke-width:2.4;}81.82%{stroke:var(--pink);stroke-width:2.4;}83.81%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
