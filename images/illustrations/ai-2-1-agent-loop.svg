@keyframes k-edge-1{0.00%{stroke-width:1.6;}16.19%{stroke-width:1.6;}18.18%{stroke:var(--pink);stroke-width:2.4;}27.27%{stroke:var(--pink);stroke-width:2.4;}29.26%{stroke-width:1.6;}52.56%{stroke-width:1.6;}54.55%{stroke:var(--pink);stroke-width:2.4;}63.64%{stroke:var(--pink);stroke-width:2.4;}65.62%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
