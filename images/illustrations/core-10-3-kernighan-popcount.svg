<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 457 488" width="457" role="img" aria-label="אלגוריתם קרניגהן לספירת ביטים: כל איטרציה מכבה את הביט הדלוק הנמוך ביותר ומעלה את המונה באחד">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
