<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 474" width="816" role="img" aria-label="שתי משפחות ההסלמה מכתיבה שרירותית בקרנל: הפקעה מבוססת קוד שמריצה commit_creds(prepare_kernel_cred(0)) דרך ROP ועוקפת SMEP ו-SMAP, מול הפקעה מבוססת נתונים בלבד שדורסת modprobe_path או core_pattern בלי להריץ קוד בקרנל כלל - שתיהן מסתיימות בהרשאות root">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-bug{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-bug .shp{animation-name:k-bug;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-choice{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-choice .shp{animation-name:k-choice;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-data_path{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-data_path .shp{animation-name:k-data_path;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-code_path{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code_path .shp{animation-name:k-code_path;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-root{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-root .shp{animation-name:k-root;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="615.8,62.0 615.8,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="615.8,286.1 615.8,326.1" marker-end="url(#arr)"/>
<text class="lbl" x="629.8" y="310.1" text-anchor="end" style="direction:ltr">code-based</text>
<polyline id="edge-2" class="edge" points="431.8,194.0 365.8,194.0" marker-end="url(#arr)"/>
<text class="lbl" x="398.8" y="182.0" text-anchor="middle" style="direction:ltr">data-only</text>
<polyline id="edge-3" class="edge" points="615.8,372.1 615.8,412.1" marker-end="url(#arr)"/>
<g id="el-bug">
<rect class="n-box shp" x="464.5" y="16.0" width="302.7" height="46.0" rx="8"/>
<text class="t" x="615.8" y="44.0" text-anchor="middle">כתיבה שרירותית לזיכרון הקרנל</text>
</g>
<g id="el-choice">
<polygon class="n-dia shp" points="615.8,102.0 799.9,194.0 615.8,286.1 431.8,194.0"/>
<text class="t" x="615.8" y="199.0" text-anchor="middle">קוד או נתונים בלבד?</text>
</g>
<g id="el-data_path">
<rect class="n-box shp" x="16.0" y="171.0" width="349.8" height="46.0" rx="8"/>
<text class="t" x="190.9" y="199.0" text-anchor="middle">data-only - דריסת modprobe_path -&gt; root</text>
</g>
<g id="el-code_path">
<rect class="n-box shp" x="460.1" y="326.1" width="311.5" height="46.0" rx="8"/>
<text class="t" x="615.8" y="354.1" text-anchor="middle">code-based - ROP עוקף SMEP/SMAP</text>
</g>
<g id="el-root">
<rect class="n-box shp" x="545.3" y="412.1" width="141.1" height="46.0" rx="8"/>
<text class="t" x="615.8" y="440.1" text-anchor="middle">הרשאות root</text>
</g>
</svg>
