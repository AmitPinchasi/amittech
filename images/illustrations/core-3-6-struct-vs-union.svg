<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 522 452" width="522" role="img" aria-label="ההבדל בין struct ל-union בזיכרון: בסטראקט כל שדה מקבל מקום משלו, ובאיחוד כל השדות חולקים את אותו מקום">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-t1">
<rect class="n-box shp" x="109.5" y="16.0" width="303.1" height="46.0" rx="8"/>
<text class="t" x="261.0" y="44.0" text-anchor="middle">בסטראקט כל שדה מקבל מקום נפרד</text>
</g>
<g id="el-st">
<rect id="el-st-c0" class="n-cell shp" x="329.9" y="102.0" width="97.9" height="46.0" rx="6"/>
<text class="t" x="378.9" y="130.0" text-anchor="middle" style="direction:ltr">int i</text>
<rect id="el-st-c1" class="n-cell shp" x="212.0" y="102.0" width="97.9" height="46.0" rx="6"/>
<text class="t" x="261.0" y="130.0" text-anchor="middle" style="direction:ltr">float f</text>
<rect id="el-st-c2" class="n-cell shp" x="94.1" y="102.0" width="97.9" height="46.0" rx="6"/>
<text class="t" x="143.1" y="130.0" text-anchor="middle" style="direction:ltr">char* str</text>
</g>
<g id="el-n1">
<text class="small" x="261.0" y="201.0" text-anchor="middle">הגודל הכולל הוא סכום הגדלים של כל השדות</text>
</g>
<g id="el-t2">
<rect class="n-box shp" x="82.6" y="246.0" width="356.8" height="46.0" rx="8"/>
<text class="t" x="261.0" y="274.0" text-anchor="middle">באיחוד כל השדות יושבים על אותם בתים</text>
</g>
<g id="el-ut">
<rect id="el-ut-c0" class="n-cell shp" x="148.9" y="332.0" width="224.2" height="46.0" rx="6"/>
<text class="t" x="261.0" y="360.0" text-anchor="middle">אותו מקום עבור i, f, str</text>
</g>
<g id="el-n2">
<text class="small" x="261.0" y="431.0" text-anchor="middle">הגודל הכולל הוא גודל השדה הגדול ביותר, וכתיבה לשדה אחד דורסת את השאר</text>
</g>
</svg>
