@keyframes k-b2{0.00%{stroke-width:1.5;}54.61%{stroke-width:1.5;}59.21%{stroke:var(--pink);stroke-width:2.5;}78.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-b2 .shp{animation-name:k-b2;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}34.87%{stroke-width:1.6;}39.47%{stroke:var(--pink);stroke-width:2.4;}59.21%{stroke:var(--pink);stroke-width:2.4;}63.82%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}54.61%{stroke-width:1.6;}59.21%{stroke:var(--pink);stroke-width:2.4;}78.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
