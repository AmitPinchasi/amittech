<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 429 452" width="429" role="img" aria-label="צינור PowerShell מעביר אובייקטים שלמים בין הפקודות: Get-Process מייצר אובייקטי process, Where-Object מסנן לפי השדה Name, ורק מה שנשאר עובר ל-Stop-Process">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-gp{0.00%{stroke:var(--pink);stroke-width:2.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}17.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-gp .shp{animation-name:k-gp;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-obj1{0.00%{stroke-width:1.5;}11.44%{stroke-width:1.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}31.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-obj1 .shp{animation-name:k-obj1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-wo{0.00%{stroke-width:1.5;}25.85%{stroke-width:1.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}46.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-wo .shp{animation-name:k-wo;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-obj2{0.00%{stroke-width:1.5;}40.25%{stroke-width:1.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-obj2 .shp{animation-name:k-obj2;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sp{0.00%{stroke-width:1.5;}69.07%{stroke-width:1.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}86.44%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-sp .shp{animation-name:k-sp;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.44%{stroke-width:1.6;}14.41%{stroke:var(--pink);stroke-width:2.4;}28.81%{stroke:var(--pink);stroke-width:2.4;}31.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.85%{stroke-width:1.6;}28.81%{stroke:var(--pink);stroke-width:2.4;}43.22%{stroke:var(--pink);stroke-width:2.4;}46.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}40.25%{stroke-width:1.6;}43.22%{stroke:var(--pink);stroke-width:2.4;}57.63%{stroke:var(--pink);stroke-width:2.4;}60.59%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}69.07%{stroke-width:1.6;}72.03%{stroke:var(--pink);stroke-width:2.4;}86.44%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj1-0{opacity:0;}
@keyframes k-dyn-obj1-0{0.00%{opacity:1;}14.41%{opacity:1;}17.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-obj1-0{animation-name:k-dyn-obj1-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj1-1{opacity:1;}
@keyframes k-dyn-obj1-1{0.00%{opacity:0;}11.44%{opacity:0;}14.41%{opacity:1;}86.44%{opacity:1;}100.00%{opacity:1;}}
.dyn-obj1-1{animation-name:k-dyn-obj1-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj2-0{opacity:0;}
@keyframes k-dyn-obj2-0{0.00%{opacity:1;}57.63%{opacity:1;}60.59%{opacity:0;}100.00%{opacity:0;}}
.dyn-obj2-0{animation-name:k-dyn-obj2-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-obj2-1{opacity:1;}
@keyframes k-dyn-obj2-1{0.00%{opacity:0;}54.66%{opacity:0;}57.63%{opacity:1;}86.44%{opacity:1;}100.00%{opacity:1;}}
.dyn-obj2-1{animation-name:k-dyn-obj2-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="214.5,54.0 214.5,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="228.5" y="78.0" text-anchor="end">מייצר אובייקטים</text>
<polyline id="edge-1" class="edge" points="214.5,138.0 214.5,178.0" marker-end="url(#arr)"/>
<text class="lbl" x="228.5" y="162.0" text-anchor="end">הזרם עובר ב-|</text>
<polyline id="edge-2" class="edge" points="214.5,216.0 214.5,256.0" marker-end="url(#arr)"/>
<text class="lbl" x="228.5" y="240.0" text-anchor="end">מסנן את הזרם</text>
<polyline id="edge-3" class="edge" points="214.5,300.0 214.5,340.0" marker-end="url(#arr)"/>
<text class="lbl" x="228.5" y="324.0" text-anchor="end">מעביר את מה שנשאר</text>
<g id="el-gp">
<rect class="n-code-bg shp" x="146.9" y="16.0" width="135.3" height="38.0" rx="7"/>
<text class="code" x="214.5" y="43.0" text-anchor="middle">Get-Process</text>
</g>
<g id="el-obj1">
<rect class="n-box shp" x="20.2" y="94.0" width="388.8" height="44.0" rx="8"/>
<text class="t-b dyn-obj1-0" x="214.5" y="121.0" text-anchor="middle">אובייקטי process עם שדות Name, Id, CPU</text>
<text class="t-b dyn-obj1-1" x="214.5" y="121.0" text-anchor="middle" style="direction:ltr">notepad   chrome   explorer</text>
</g>
<g id="el-wo">
<rect class="n-code-bg shp" x="16.0" y="178.0" width="397.1" height="38.0" rx="7"/>
<text class="code" x="214.5" y="205.0" text-anchor="middle">Where-Object { $_.Name -like "notepad" }</text>
</g>
<g id="el-obj2">
<rect class="n-box shp" x="43.1" y="256.0" width="342.9" height="44.0" rx="8"/>
<text class="t-b dyn-obj2-0" x="214.5" y="283.0" text-anchor="middle">בודקת את השדה Name של כל אובייקט</text>
<text class="t-b dyn-obj2-1" x="214.5" y="283.0" text-anchor="middle">נשאר רק האובייקט notepad</text>
</g>
<g id="el-sp">
<rect class="n-code-bg shp" x="142.4" y="340.0" width="144.3" height="38.0" rx="7"/>
<text class="code" x="214.5" y="367.0" text-anchor="middle">Stop-Process</text>
</g>
<g id="el-note">
<text class="small" x="214.5" y="431.0" text-anchor="middle">ב-| עוברים אובייקטים שלמים עם שדות, לא טקסט כמו ב-Batch</text>
</g>
</svg>
