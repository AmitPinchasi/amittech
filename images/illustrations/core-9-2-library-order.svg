<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 457 562" width="457" role="img" aria-label="איור סדר הספריות בשורת הלינקוג: כשהספריה נקראת לפני הקובץ שמשתמש בה, רשימת החסרים עדיין ריקה והsymbol לא נלקח">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cmd{0.00%{stroke:var(--pink);stroke-width:2.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}15.14%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmd .shp{animation-name:k-cmd;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lib{0.00%{stroke-width:1.5;}10.21%{stroke-width:1.5;}12.68%{stroke:var(--pink);stroke-width:2.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}27.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lib .shp{animation-name:k-lib;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-state{0.00%{stroke-width:1.5;}22.89%{stroke-width:1.5;}25.35%{stroke:var(--pink);stroke-width:2.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}40.49%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-state .shp{animation-name:k-state;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-skip{0.00%{stroke-width:1.5;}35.56%{stroke-width:1.5;}38.03%{stroke:var(--pink);stroke-width:2.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}53.17%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-skip .shp{animation-name:k-skip;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mo{0.00%{stroke-width:1.5;}48.24%{stroke-width:1.5;}50.70%{stroke:var(--pink);stroke-width:2.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}65.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-mo .shp{animation-name:k-mo;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-err{0.00%{stroke-width:1.5;}60.92%{stroke-width:1.5;}63.38%{stroke:var(--pink);stroke-width:2.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}78.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-err .shp{animation-name:k-err;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fix{0.00%{stroke-width:1.5;}73.59%{stroke-width:1.5;}76.06%{stroke:var(--pink);stroke-width:2.5;}88.73%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-fix .shp{animation-name:k-fix;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.21%{stroke-width:1.6;}12.68%{stroke:var(--pink);stroke-width:2.4;}25.35%{stroke:var(--pink);stroke-width:2.4;}27.82%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.89%{stroke-width:1.6;}25.35%{stroke:var(--pink);stroke-width:2.4;}38.03%{stroke:var(--pink);stroke-width:2.4;}40.49%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}35.56%{stroke-width:1.6;}38.03%{stroke:var(--pink);stroke-width:2.4;}50.70%{stroke:var(--pink);stroke-width:2.4;}53.17%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}48.24%{stroke-width:1.6;}50.70%{stroke:var(--pink);stroke-width:2.4;}63.38%{stroke:var(--pink);stroke-width:2.4;}65.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}60.92%{stroke-width:1.6;}63.38%{stroke:var(--pink);stroke-width:2.4;}76.06%{stroke:var(--pink);stroke-width:2.4;}78.52%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}73.59%{stroke-width:1.6;}76.06%{stroke:var(--pink);stroke-width:2.4;}88.73%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-0{opacity:0;}
@keyframes k-dyn-state-0{0.00%{opacity:1;}50.70%{opacity:1;}53.17%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-0{animation-name:k-dyn-state-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-1{opacity:1;}
@keyframes k-dyn-state-1{0.00%{opacity:0;}48.24%{opacity:0;}50.70%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-state-1{animation-name:k-dyn-state-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="215.7,54.0 215.7,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="215.7,140.0 215.7,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="215.7,218.0 215.7,258.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="215.7,304.0 215.7,344.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="215.7,390.0 215.7,430.0" marker-end="url(#arr)"/>
<text class="lbl" x="229.7" y="414.0" text-anchor="end">אין עוד ספריות לחפש בהן</text>
<polyline id="edge-5" class="edge" points="215.7,468.0 215.7,508.0" marker-end="url(#arr)"/>
<text class="lbl" x="229.7" y="492.0" text-anchor="end">הספריה אחרי הקובץ שמשתמש בה</text>
<g id="el-cmd">
<rect class="n-code-bg shp" x="71.4" y="16.0" width="288.8" height="38.0" rx="7"/>
<text class="code" x="215.7" y="43.0" text-anchor="middle">gcc -lmath main.o -o program</text>
</g>
<g id="el-lib">
<rect class="n-box shp" x="69.1" y="94.0" width="293.3" height="46.0" rx="8"/>
<text class="t" x="215.7" y="122.0" text-anchor="middle">הלינקר קורא קודם את libmath.a</text>
</g>
<g id="el-state">
<rect class="n-code-bg shp" x="112.0" y="180.0" width="207.5" height="38.0" rx="7"/>
<text class="code dyn-state-0" x="215.7" y="207.0" text-anchor="middle">undefined = { }</text>
<text class="code dyn-state-1" x="215.7" y="207.0" text-anchor="middle">undefined = { add }</text>
</g>
<g id="el-skip">
<rect class="n-box shp" x="16.0" y="258.0" width="399.5" height="46.0" rx="8"/>
<text class="t" x="215.7" y="286.0" text-anchor="middle">אין symbol חסר, ולכן add.o לא נלקח מהספריה</text>
</g>
<g id="el-mo">
<rect class="n-box shp" x="55.6" y="344.0" width="320.2" height="46.0" rx="8"/>
<text class="t" x="215.7" y="372.0" text-anchor="middle">רק עכשיו נקרא main.o, שקורא ל-add</text>
</g>
<g id="el-err">
<rect class="n-code-bg shp" x="71.4" y="430.0" width="288.8" height="38.0" rx="7"/>
<text class="code" x="215.7" y="457.0" text-anchor="middle">undefined reference to 'add'</text>
</g>
<g id="el-fix">
<rect class="n-code-bg shp" x="71.4" y="508.0" width="288.8" height="38.0" rx="7"/>
<text class="code" x="215.7" y="535.0" text-anchor="middle">gcc main.o -lmath -o program</text>
</g>
</svg>
