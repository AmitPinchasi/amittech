<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 653 316" width="653" role="img" aria-label="המתודה reduce מצטברת: בכל צעד ה-accumulator מתעדכן עם האיבר הנוכחי">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}17.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-0{0.00%{stroke-width:1.5;}11.44%{stroke-width:1.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}31.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c0{animation-name:k-lst-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-acc{0.00%{stroke-width:1.5;}11.44%{stroke-width:1.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}86.44%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-acc .shp{animation-name:k-acc;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-1{0.00%{stroke-width:1.5;}25.85%{stroke-width:1.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}46.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c1{animation-name:k-lst-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-2{0.00%{stroke-width:1.5;}40.25%{stroke-width:1.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}60.59%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c2{animation-name:k-lst-2;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-3{0.00%{stroke-width:1.5;}54.66%{stroke-width:1.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c3{animation-name:k-lst-3;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-4{0.00%{stroke-width:1.5;}69.07%{stroke-width:1.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}86.44%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-lst-c4{animation-name:k-lst-4;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}11.44%{transform:translateX(0.0px);}14.41%{transform:translateX(0.0px);}25.85%{transform:translateX(0.0px);}28.81%{transform:translateX(-116.0px);}40.25%{transform:translateX(-116.0px);}43.22%{transform:translateX(-232.0px);}54.66%{transform:translateX(-232.0px);}57.63%{transform:translateX(-348.0px);}69.07%{transform:translateX(-348.0px);}72.03%{transform:translateX(-464.0px);}83.47%{transform:translateX(-464.0px);}100.00%{transform:translateX(-464.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-acc-0{opacity:0;}
@keyframes k-dyn-acc-0{0.00%{opacity:1;}14.41%{opacity:1;}17.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-acc-0{animation-name:k-dyn-acc-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-acc-1{opacity:0;}
@keyframes k-dyn-acc-1{0.00%{opacity:0;}11.44%{opacity:0;}14.41%{opacity:1;}28.81%{opacity:1;}31.78%{opacity:0;}100.00%{opacity:0;}}
.dyn-acc-1{animation-name:k-dyn-acc-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-acc-2{opacity:0;}
@keyframes k-dyn-acc-2{0.00%{opacity:0;}25.85%{opacity:0;}28.81%{opacity:1;}43.22%{opacity:1;}46.19%{opacity:0;}100.00%{opacity:0;}}
.dyn-acc-2{animation-name:k-dyn-acc-2;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-acc-3{opacity:0;}
@keyframes k-dyn-acc-3{0.00%{opacity:0;}40.25%{opacity:0;}43.22%{opacity:1;}57.63%{opacity:1;}60.59%{opacity:0;}100.00%{opacity:0;}}
.dyn-acc-3{animation-name:k-dyn-acc-3;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-acc-4{opacity:0;}
@keyframes k-dyn-acc-4{0.00%{opacity:0;}54.66%{opacity:0;}57.63%{opacity:1;}72.03%{opacity:1;}75.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-acc-4{animation-name:k-dyn-acc-4;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-acc-5{opacity:1;}
@keyframes k-dyn-acc-5{0.00%{opacity:0;}69.07%{opacity:0;}72.03%{opacity:1;}86.44%{opacity:1;}100.00%{opacity:1;}}
.dyn-acc-5{animation-name:k-dyn-acc-5;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="88.4" y="16.0" width="415.1" height="38.0" rx="7"/>
<text class="code" x="296.0" y="43.0" text-anchor="middle">numbers.reduce((acc, num) =&gt; acc + num, 0)</text>
</g>
<g id="el-lst">
<rect id="el-lst-c0" class="n-cell shp" x="480.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="528.0" y="106.0" text-anchor="middle" style="direction:ltr">0</text>
<text class="t" x="528.0" y="140.0" text-anchor="middle" style="direction:ltr">1</text>
<rect id="el-lst-c1" class="n-cell shp" x="364.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="412.0" y="106.0" text-anchor="middle" style="direction:ltr">1</text>
<text class="t" x="412.0" y="140.0" text-anchor="middle" style="direction:ltr">2</text>
<rect id="el-lst-c2" class="n-cell shp" x="248.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="296.0" y="106.0" text-anchor="middle" style="direction:ltr">2</text>
<text class="t" x="296.0" y="140.0" text-anchor="middle" style="direction:ltr">3</text>
<rect id="el-lst-c3" class="n-cell shp" x="132.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="180.0" y="106.0" text-anchor="middle" style="direction:ltr">3</text>
<text class="t" x="180.0" y="140.0" text-anchor="middle" style="direction:ltr">4</text>
<rect id="el-lst-c4" class="n-cell shp" x="16.0" y="112.0" width="96.0" height="46.0" rx="6"/>
<text class="idx" x="64.0" y="106.0" text-anchor="middle" style="direction:ltr">4</text>
<text class="t" x="64.0" y="140.0" text-anchor="middle" style="direction:ltr">5</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="528.0,158.0 528.0,198.0" marker-end="url(#arr)"/>
<text class="lbl" x="540.0" y="182.0" text-anchor="end">האיבר הנוכחי</text>
<g id="el-acc">
<rect class="n-box shp" x="439.0" y="198.0" width="178.0" height="44.0" rx="8"/>
<text class="t-b dyn-acc-0" x="528.0" y="225.0" text-anchor="middle" style="direction:ltr">acc = 0</text>
<text class="t-b dyn-acc-1" x="528.0" y="225.0" text-anchor="middle" style="direction:ltr">acc = 0 + 1 = 1</text>
<text class="t-b dyn-acc-2" x="528.0" y="225.0" text-anchor="middle" style="direction:ltr">acc = 1 + 2 = 3</text>
<text class="t-b dyn-acc-3" x="528.0" y="225.0" text-anchor="middle" style="direction:ltr">acc = 3 + 3 = 6</text>
<text class="t-b dyn-acc-4" x="528.0" y="225.0" text-anchor="middle" style="direction:ltr">acc = 6 + 4 = 10</text>
<text class="t-b dyn-acc-5" x="528.0" y="225.0" text-anchor="middle" style="direction:ltr">acc = 10 + 5 = 15</text>
</g>
</g>
<g id="el-note">
<text class="small" x="296.0" y="295.0" text-anchor="middle">בסוף המעבר הערך המצטבר הוא התוצאה של reduce</text>
</g>
</svg>
