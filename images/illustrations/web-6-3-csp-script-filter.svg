<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 695 515" width="695" role="img" aria-label="תרשים זרימה: כאשר CSP מוגדר בעמוד, הדפדפן בודק כל ניסיון טעינת סקריפט מול רשימת המקורות המורשית ב-script-src, וחוסם כל מקור שלא נמצא ברשימה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-load{0.00%{stroke:var(--pink);stroke-width:2.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}24.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-load .shp{animation-name:k-load;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-attempt{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-attempt .shp{animation-name:k-attempt;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-check{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-check .shp{animation-name:k-check;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-block{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-block .shp{animation-name:k-block;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.07%{stroke-width:1.6;}20.24%{stroke:var(--pink);stroke-width:2.4;}40.48%{stroke:var(--pink);stroke-width:2.4;}44.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.31%{stroke-width:1.6;}40.48%{stroke:var(--pink);stroke-width:2.4;}60.71%{stroke:var(--pink);stroke-width:2.4;}64.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}56.55%{stroke-width:1.6;}60.71%{stroke:var(--pink);stroke-width:2.4;}80.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-check-0{opacity:0;}
@keyframes k-dyn-check-0{0.00%{opacity:1;}60.71%{opacity:1;}64.88%{opacity:0;}100.00%{opacity:0;}}
.dyn-check-0{animation-name:k-dyn-check-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-check-1{opacity:1;}
@keyframes k-dyn-check-1{0.00%{opacity:0;}56.55%{opacity:0;}60.71%{opacity:1;}80.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-check-1{animation-name:k-dyn-check-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="241.5,62.0 241.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="241.5,148.0 241.5,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="466.9,300.7 532.9,300.7" marker-end="url(#arr)"/>
<text class="lbl" x="499.9" y="288.7" text-anchor="middle">לא</text>
<polyline id="edge-3" class="edge" points="241.5,413.5 241.5,453.5" marker-end="url(#arr)"/>
<text class="lbl" x="255.5" y="437.5" text-anchor="end">כן</text>
<g id="el-load">
<rect class="n-box shp" x="79.2" y="16.0" width="324.6" height="46.0" rx="8"/>
<text class="t" x="241.5" y="44.0" text-anchor="middle">הדפדפן טוען עמוד עם מדיניות CSP</text>
</g>
<g id="el-attempt">
<rect class="n-box shp" x="104.7" y="102.0" width="273.5" height="46.0" rx="8"/>
<text class="t" x="241.5" y="130.0" text-anchor="middle">מתבצע ניסיון לטעון סקריפט</text>
</g>
<g id="el-check">
<polygon class="n-dia shp" points="241.5,188.0 466.9,300.7 241.5,413.5 16.0,300.7"/>
<text class="t dyn-check-0" x="241.5" y="305.7" text-anchor="middle">המקור ברשימת script-src?</text>
<text class="t dyn-check-1" x="241.5" y="305.7" text-anchor="middle">לא - המקור אינו ברשימה</text>
</g>
<g id="el-block">
<rect class="n-box shp" x="532.9" y="277.7" width="146.5" height="46.0" rx="8"/>
<text class="t" x="606.2" y="305.7" text-anchor="middle">הדפדפן חוסם</text>
</g>
<g id="el-allow">
<rect class="n-box shp" x="131.6" y="453.5" width="219.7" height="46.0" rx="8"/>
<text class="t" x="241.5" y="481.5" text-anchor="middle">הסקריפט נטען ומופעל</text>
</g>
</svg>
