<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 658 474" width="658" role="img" aria-label="אנימציה של לחץ האוגרים: ככל שכל thread צורך יותר אוגרים מתוך 65,536 שב-SM, כך פחות warps יכולים לדור בו-זמנית והתפוסה יורדת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
