<text class="t dyn-rbp-1" x="137.7" y="188.0" text-anchor="middle">AAAA - נדרס</text>
<text class="t dyn-rbp-2" x="137.7" y="188.0" text-anchor="middle">AAAA - נדרס</text>
</g>
<g id="el-buf">
