<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 275 366" width="275" role="img" aria-label="גלישת buffer על המחסנית: כתיבה של 80 בתים אל buffer בגודל 64 גולשת מעבר לגבול, דורסת את saved rbp ואת כתובת החזרה, וכך התוקף שולט לאן הפונקציה תקפוץ ב-ret">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-buf{0.00%{stroke:var(--pink);stroke-width:2.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}45.11%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-buf .shp{animation-name:k-buf;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-rbp{0.00%{stroke-width:1.5;}37.50%{stroke-width:1.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}65.76%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-rbp .shp{animation-name:k-rbp;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ret{0.00%{stroke-width:1.5;}58.15%{stroke-width:1.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-ret .shp{animation-name:k-ret;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ret-0{opacity:0;}
@keyframes k-dyn-ret-0{0.00%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-ret-0{animation-name:k-dyn-ret-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ret-1{opacity:0;}
@keyframes k-dyn-ret-1{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-ret-1{animation-name:k-dyn-ret-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ret-2{opacity:1;}
@keyframes k-dyn-ret-2{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-ret-2{animation-name:k-dyn-ret-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rbp-0{opacity:0;}
@keyframes k-dyn-rbp-0{0.00%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-rbp-0{animation-name:k-dyn-rbp-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rbp-1{opacity:1;}
@keyframes k-dyn-rbp-1{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-rbp-1{animation-name:k-dyn-rbp-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rbp-2{opacity:0;}
@keyframes k-dyn-rbp-2{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-rbp-2{animation-name:k-dyn-rbp-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-buf-0{opacity:0;}
@keyframes k-dyn-buf-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-buf-0{animation-name:k-dyn-buf-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-buf-1{opacity:1;}
@keyframes k-dyn-buf-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-buf-1{animation-name:k-dyn-buf-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-buf-2{opacity:0;}
@keyframes k-dyn-buf-2{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-buf-2{animation-name:k-dyn-buf-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
