<text class="t dyn-buf-0" x="137.7" y="274.0" text-anchor="middle">buf[64] - הבאפר</text>
<text class="t dyn-buf-1" x="137.7" y="274.0" text-anchor="middle">AAAA - מלא</text>
<text class="t dyn-buf-2" x="137.7" y="274.0" text-anchor="middle">AAAA - מלא</text>
</g>
<g id="el-bottom">
