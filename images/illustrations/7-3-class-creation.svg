<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 434 412" width="434" role="img" aria-label="מה קורה מאחורי הקלעים כשמגדירים קלאס עם מטה-קלאס">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cls{0.00%{stroke:var(--pink);stroke-width:2.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}15.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cls .shp{animation-name:k-cls;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-prep{0.00%{stroke-width:1.5;}10.00%{stroke-width:1.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}27.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-prep .shp{animation-name:k-prep;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ns{0.00%{stroke-width:1.5;}22.59%{stroke-width:1.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}65.56%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ns .shp{animation-name:k-ns;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-create{0.00%{stroke-width:1.5;}60.37%{stroke-width:1.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}78.15%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-create .shp{animation-name:k-create;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-done{0.00%{stroke-width:1.5;}72.96%{stroke-width:1.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}88.15%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-done .shp{animation-name:k-done;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.00%{stroke-width:1.6;}12.59%{stroke:var(--pink);stroke-width:2.4;}25.19%{stroke:var(--pink);stroke-width:2.4;}27.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.59%{stroke-width:1.6;}25.19%{stroke:var(--pink);stroke-width:2.4;}37.78%{stroke:var(--pink);stroke-width:2.4;}40.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}60.37%{stroke-width:1.6;}62.96%{stroke:var(--pink);stroke-width:2.4;}75.56%{stroke:var(--pink);stroke-width:2.4;}78.15%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}72.96%{stroke-width:1.6;}75.56%{stroke:var(--pink);stroke-width:2.4;}88.15%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ns-0{opacity:0;}
@keyframes k-dyn-ns-0{0.00%{opacity:1;}37.78%{opacity:1;}40.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-ns-0{animation-name:k-dyn-ns-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ns-1{opacity:0;}
@keyframes k-dyn-ns-1{0.00%{opacity:0;}35.19%{opacity:0;}37.78%{opacity:1;}50.37%{opacity:1;}52.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-ns-1{animation-name:k-dyn-ns-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ns-2{opacity:1;}
@keyframes k-dyn-ns-2{0.00%{opacity:0;}47.78%{opacity:0;}50.37%{opacity:1;}88.15%{opacity:1;}100.00%{opacity:1;}}
.dyn-ns-2{animation-name:k-dyn-ns-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="201.0,76.0 201.0,116.0" marker-end="url(#arr)"/>
<text class="lbl" x="215.0" y="100.0" text-anchor="end">פייתון מתרגם את ההגדרה</text>
<polyline id="edge-1" class="edge" points="201.0,154.0 201.0,194.0" marker-end="url(#arr)"/>
<text class="lbl" x="215.0" y="178.0" text-anchor="end">מחזירה את המילון הראשוני</text>
<polyline id="edge-2" class="edge" points="201.0,232.0 201.0,272.0" marker-end="url(#arr)"/>
<text class="lbl" x="215.0" y="256.0" text-anchor="end">הממברים נוספו עם __setitem__</text>
<polyline id="edge-3" class="edge" points="201.0,310.0 201.0,350.0" marker-end="url(#arr)"/>
<g id="el-cls">
<rect class="n-code-bg shp" x="56.6" y="16.0" width="288.8" height="60.0" rx="7"/>
<text class="code" x="201.0" y="43.0" text-anchor="middle">class Dog(Animal, Entity,</text>
<text class="code" x="201.0" y="65.0" text-anchor="middle">          metaclass=MyMeta):</text>
</g>
<g id="el-prep">
<rect class="n-code-bg shp" x="25.0" y="116.0" width="352.0" height="38.0" rx="7"/>
<text class="code" x="201.0" y="143.0" text-anchor="middle">namespace = MyMeta.__prepare__(...)</text>
</g>
<g id="el-ns">
<rect class="n-code-bg shp" x="65.6" y="194.0" width="270.7" height="38.0" rx="7"/>
<text class="code dyn-ns-0" x="201.0" y="221.0" text-anchor="middle">{}</text>
<text class="code dyn-ns-1" x="201.0" y="221.0" text-anchor="middle">{'legs': 4}</text>
<text class="code dyn-ns-2" x="201.0" y="221.0" text-anchor="middle">{'legs': 4, 'member': ...}</text>
</g>
<g id="el-create">
<rect class="n-code-bg shp" x="16.0" y="272.0" width="370.0" height="38.0" rx="7"/>
<text class="code" x="201.0" y="299.0" text-anchor="middle">Dog = MyMeta('Dog', bases, namespace)</text>
</g>
<g id="el-done">
<rect class="n-box shp" x="116.5" y="350.0" width="169.0" height="46.0" rx="8"/>
<text class="t" x="201.0" y="378.0" text-anchor="middle">הקלאס Dog נוצר</text>
</g>
</svg>
