<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 484 336" width="484" role="img" aria-label="הרעלת מטמון: התוקף שולח header שאינה במפתח, השרת משקף אותה בתגובה, המטמון שומר את התגובה המורעלת ומגיש אותה לכל מבקר">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-atk{0.00%{stroke:var(--pink);stroke-width:2.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}20.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-atk .shp{animation-name:k-atk;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-srv{0.00%{stroke-width:1.5;}13.96%{stroke-width:1.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}37.39%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-srv .shp{animation-name:k-srv;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cache{0.00%{stroke-width:1.5;}31.08%{stroke-width:1.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}71.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cache .shp{animation-name:k-cache;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-vic{0.00%{stroke-width:1.5;}65.32%{stroke-width:1.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-vic .shp{animation-name:k-vic;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.96%{stroke-width:1.6;}17.12%{stroke:var(--pink);stroke-width:2.4;}34.23%{stroke:var(--pink);stroke-width:2.4;}37.39%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}31.08%{stroke-width:1.6;}34.23%{stroke:var(--pink);stroke-width:2.4;}51.35%{stroke:var(--pink);stroke-width:2.4;}54.50%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}65.32%{stroke-width:1.6;}68.47%{stroke:var(--pink);stroke-width:2.4;}85.59%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cache-0{opacity:0;}
@keyframes k-dyn-cache-0{0.00%{opacity:1;}34.23%{opacity:1;}37.39%{opacity:0;}100.00%{opacity:0;}}
.dyn-cache-0{animation-name:k-dyn-cache-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cache-1{opacity:0;}
@keyframes k-dyn-cache-1{0.00%{opacity:0;}31.08%{opacity:0;}34.23%{opacity:1;}51.35%{opacity:1;}54.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-cache-1{animation-name:k-dyn-cache-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cache-2{opacity:1;}
@keyframes k-dyn-cache-2{0.00%{opacity:0;}48.20%{opacity:0;}51.35%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-cache-2{animation-name:k-dyn-cache-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="241.8,62.0 241.8,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="241.8,148.0 241.8,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="241.8,234.0 241.8,274.0" marker-end="url(#arr)"/>
<g id="el-atk">
<rect class="n-box shp" x="16.0" y="16.0" width="451.6" height="46.0" rx="8"/>
<text class="t" x="241.8" y="44.0" text-anchor="middle">תוקף: בקשה ל-/en עם X-Forwarded-Host: attacker.com</text>
</g>
<g id="el-srv">
<rect class="n-box shp" x="92.9" y="102.0" width="297.7" height="46.0" rx="8"/>
<text class="t" x="241.8" y="130.0" text-anchor="middle">שרת משקף את הhost בתוך התגובה</text>
</g>
<g id="el-cache">
<rect class="n-box shp" x="63.4" y="188.0" width="356.8" height="46.0" rx="8"/>
<text class="t dyn-cache-0" x="241.8" y="216.0" text-anchor="middle">מטמון: מפתח = /en (הheader אינה במפתח)</text>
<text class="t dyn-cache-1" x="241.8" y="216.0" text-anchor="middle">מטמון: miss - שומר את התגובה המורעלת</text>
<text class="t dyn-cache-2" x="241.8" y="216.0" text-anchor="middle">מטמון: hit - מגיש את התגובה השמורה</text>
</g>
<g id="el-vic">
<rect class="n-box shp" x="35.7" y="274.0" width="412.3" height="46.0" rx="8"/>
<text class="t" x="241.8" y="302.0" text-anchor="middle">כל מבקר ב-/en מקבל תוכן זדוני מ-attacker.com</text>
</g>
</svg>
