<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 596 298" width="596" role="img" aria-label="גודל טיפוסי המשתנים בשפת C: כל טיפוס תופס מספר בתים קבוע בזיכרון">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}20.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-0{0.00%{stroke-width:1.5;}13.02%{stroke-width:1.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}36.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c0{animation-name:k-lst-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-1{0.00%{stroke-width:1.5;}29.69%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}53.65%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c1{animation-name:k-lst-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-2{0.00%{stroke-width:1.5;}46.35%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}70.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c2{animation-name:k-lst-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-3{0.00%{stroke-width:1.5;}63.02%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-lst-c3{animation-name:k-lst-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}13.02%{transform:translateX(0.0px);}16.67%{transform:translateX(0.0px);}29.69%{transform:translateX(0.0px);}33.33%{transform:translateX(-120.2px);}46.35%{transform:translateX(-120.2px);}50.00%{transform:translateX(-240.5px);}63.02%{transform:translateX(-240.5px);}66.67%{transform:translateX(-360.7px);}79.69%{transform:translateX(-360.7px);}100.00%{transform:translateX(-360.7px);}}
#eg-0{animation-name:k-mv-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:1;}33.33%{opacity:1;}36.98%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:0;}
@keyframes k-dyn-val-1{0.00%{opacity:0;}29.69%{opacity:0;}33.33%{opacity:1;}50.00%{opacity:1;}53.65%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-2{opacity:0;}
@keyframes k-dyn-val-2{0.00%{opacity:0;}46.35%{opacity:0;}50.00%{opacity:1;}66.67%{opacity:1;}70.31%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-2{animation-name:k-dyn-val-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-3{opacity:1;}
@keyframes k-dyn-val-3{0.00%{opacity:0;}63.02%{opacity:0;}66.67%{opacity:1;}83.33%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-3{animation-name:k-dyn-val-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="109.8" y="16.0" width="361.0" height="38.0" rx="7"/>
<text class="code" x="290.3" y="43.0" text-anchor="middle">char c; short s; int i; long long l;</text>
</g>
<g id="el-lst">
<rect id="el-lst-c0" class="n-cell shp" x="420.5" y="94.0" width="100.2" height="46.0" rx="6"/>
<text class="t" x="470.6" y="122.0" text-anchor="middle" style="direction:ltr">char</text>
<rect id="el-lst-c1" class="n-cell shp" x="300.3" y="94.0" width="100.2" height="46.0" rx="6"/>
<text class="t" x="350.4" y="122.0" text-anchor="middle" style="direction:ltr">short</text>
<rect id="el-lst-c2" class="n-cell shp" x="180.0" y="94.0" width="100.2" height="46.0" rx="6"/>
<text class="t" x="230.2" y="122.0" text-anchor="middle" style="direction:ltr">int</text>
<rect id="el-lst-c3" class="n-cell shp" x="59.8" y="94.0" width="100.2" height="46.0" rx="6"/>
<text class="t" x="109.9" y="122.0" text-anchor="middle" style="direction:ltr">long long</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="470.6,140.0 470.6,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="482.6" y="164.0" text-anchor="end">גודל בזיכרון</text>
<g id="el-val">
<rect class="n-box shp" x="414.8" y="180.0" width="111.7" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="470.6" y="207.0" text-anchor="middle">בית אחד</text>
<text class="t-b dyn-val-1" x="470.6" y="207.0" text-anchor="middle">2 בתים</text>
<text class="t-b dyn-val-2" x="470.6" y="207.0" text-anchor="middle">4 בתים</text>
<text class="t-b dyn-val-3" x="470.6" y="207.0" text-anchor="middle">8 בתים</text>
</g>
</g>
<g id="el-note">
<text class="small" x="290.3" y="277.0" text-anchor="middle">סוג המשתנה קובע רק כמה מקום הוא תופס בזיכרון, וכמה בתים נקראים כשניגשים אליו</text>
</g>
</svg>
