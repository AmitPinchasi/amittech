<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 648 308" width="648" role="img" aria-label="עקרון הפתוח-סגור: השירות תלוי בממשק NotificationChannel וכל ערוץ הוא מחלקה נפרדת שמממשת אותו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="326.2,62.0 326.2,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="340.2" y="86.0" text-anchor="end">תלוי בממשק</text>
<polyline id="edge-1" class="edge" points="326.2,148.0 326.2,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="340.2" y="172.0" text-anchor="end">ממומש על ידי</text>
<polyline id="edge-2" class="edge" points="430.1,125.0 496.1,125.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="222.4,125.0 156.4,125.0" marker-end="url(#arr)"/>
<g id="el-svc">
<rect class="n-box shp" x="222.4" y="16.0" width="207.6" height="46.0" rx="8"/>
<text class="t" x="326.2" y="44.0" text-anchor="middle" style="direction:ltr">NotificationService</text>
</g>
<g id="el-iface">
<rect class="n-box shp" x="222.4" y="102.0" width="207.6" height="46.0" rx="8"/>
<text class="t" x="326.2" y="130.0" text-anchor="middle" style="direction:ltr">NotificationChannel</text>
</g>
<g id="el-email">
<rect class="n-box shp" x="251.8" y="188.0" width="148.8" height="46.0" rx="8"/>
<text class="t" x="326.2" y="216.0" text-anchor="middle" style="direction:ltr">EmailChannel</text>
</g>
<g id="el-sms">
<rect class="n-box shp" x="496.1" y="102.0" width="136.1" height="46.0" rx="8"/>
<text class="t" x="564.1" y="130.0" text-anchor="middle" style="direction:ltr">SMSChannel</text>
</g>
<g id="el-push">
<rect class="n-box shp" x="16.0" y="102.0" width="140.4" height="46.0" rx="8"/>
<text class="t" x="86.2" y="130.0" text-anchor="middle" style="direction:ltr">PushChannel</text>
</g>
<g id="el-note">
<text class="small" x="326.2" y="287.0" text-anchor="middle">ערוץ חדש - מוסיפים מחלקה, בלי לגעת בקוד הקיים</text>
</g>
</svg>
