<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 672 372" width="672" role="img" aria-label="תרשים החלטה של SSTI: קלט שמשולב במחרוזת התבנית מורץ על ידי המנוע, בעוד קלט שמועבר כפרמטר נשאר טקסט">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="324.5,54.0 324.5,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="454.6,159.0 542.6,159.0 542.6,224.1" marker-end="url(#arr)"/>
<text class="lbl" x="498.6" y="147.0" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="194.4,159.0 106.4,159.0 106.4,224.1" marker-end="url(#arr)"/>
<text class="lbl" x="150.4" y="147.0" text-anchor="middle">לא</text>
<polyline id="edge-3" class="edge" points="542.6,270.1 542.6,333.1 508.3,333.1" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="106.4,270.1 106.4,333.1 140.7,333.1" marker-end="url(#arr)"/>
<g id="el-inp">
<rect class="n-code-bg shp" x="243.3" y="16.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="324.5" y="43.0" text-anchor="middle">name = {{7*7}}</text>
</g>
<g id="el-dec">
<polygon class="n-dia shp" points="324.5,94.0 454.6,159.0 324.5,224.1 194.4,159.0"/>
<text class="t" x="324.5" y="164.0" text-anchor="middle">משולב בתבנית?</text>
</g>
<g id="el-vuln">
<rect class="n-box shp" x="429.5" y="224.1" width="226.1" height="46.0" rx="8"/>
<text class="t" x="542.6" y="252.1" text-anchor="middle">המנוע מריץ ומחזיר 49</text>
</g>
<g id="el-safe">
<rect class="n-box shp" x="16.0" y="224.1" width="180.8" height="46.0" rx="8"/>
<text class="t" x="106.4" y="252.1" text-anchor="middle">נשאר כטקסט רגיל</text>
</g>
<g id="el-fix">
<rect class="n-box shp" x="140.7" y="310.1" width="367.6" height="46.0" rx="8"/>
<text class="t" x="324.5" y="338.1" text-anchor="middle">הפתרון: להעביר את הקלט כפרמטר לתבנית</text>
</g>
</svg>
