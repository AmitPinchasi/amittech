<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 571 391" width="571" role="img" aria-label="בלי useCallback נוצרת בכל רינדור פונקציה עם הפניה חדשה והילד העטוף ב-memo מרונדר מחדש, ועם useCallback ההפניה נשמרת וריאקט מדלג על הרינדור">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
