<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 412" width="310" role="img" aria-label="כיצד השרת מגיש דף PHP: הדפדפן מבקש קובץ, השרת מריץ את הקוד, קוד ה-PHP הופך ל-HTML ורק הוא חוזר ללקוח">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-run{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-run .shp{animation-name:k-run;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-result{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-result .shp{animation-name:k-result;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-resp{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-resp .shp{animation-name:k-resp;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-browser{0.00%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-browser .shp{animation-name:k-browser;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}55.24%{stroke-width:1.6;}58.06%{stroke:var(--pink);stroke-width:2.4;}72.58%{stroke:var(--pink);stroke-width:2.4;}75.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-result-0{opacity:0;}
@keyframes k-dyn-result-0{0.00%{opacity:1;}43.55%{opacity:1;}46.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-result-0{animation-name:k-dyn-result-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-result-1{opacity:1;}
@keyframes k-dyn-result-1{0.00%{opacity:0;}40.73%{opacity:0;}43.55%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-result-1{animation-name:k-dyn-result-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="154.8,54.0 154.8,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="168.8" y="78.0" text-anchor="end">בקשה מהדפדפן</text>
<polyline id="edge-1" class="edge" points="154.8,140.0 154.8,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="168.8" y="164.0" text-anchor="end">הרצת הקוד</text>
<polyline id="edge-2" class="edge" points="154.8,224.0 154.8,264.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="154.8,310.0 154.8,350.0" marker-end="url(#arr)"/>
<g id="el-req">
<rect class="n-code-bg shp" x="73.6" y="16.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="154.8" y="43.0" text-anchor="middle">GET /index.php</text>
</g>
<g id="el-run">
<rect class="n-box shp" x="35.8" y="94.0" width="237.9" height="46.0" rx="8"/>
<text class="t" x="154.8" y="122.0" text-anchor="middle">השרת מריץ את קוד ה-PHP</text>
</g>
<g id="el-result">
<rect class="n-box shp" x="25.4" y="180.0" width="258.7" height="44.0" rx="8"/>
<text class="t-b dyn-result-0" x="154.8" y="207.0" text-anchor="middle" style="direction:ltr">&lt;?php echo date('d/m/Y'); ?&gt;</text>
<text class="t-b dyn-result-1" x="154.8" y="207.0" text-anchor="middle" style="direction:ltr">20/07/2026</text>
</g>
<g id="el-resp">
<rect class="n-box shp" x="16.0" y="264.0" width="277.5" height="46.0" rx="8"/>
<text class="t" x="154.8" y="292.0" text-anchor="middle">רק ה-HTML הסופי חוזר ללקוח</text>
</g>
<g id="el-browser">
<rect class="n-box shp" x="37.5" y="350.0" width="234.5" height="46.0" rx="8"/>
<text class="t" x="154.8" y="378.0" text-anchor="middle">הדפדפן מציג את התוצאה</text>
</g>
</svg>
