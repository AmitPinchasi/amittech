<text class="t" x="528.0" y="122.0" text-anchor="middle" style="direction:ltr">1</text>
<rect id="el-src-c1" class="n-cell shp" x="364.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="412.0" y="122.0" text-anchor="middle" style="direction:ltr">2</text>
