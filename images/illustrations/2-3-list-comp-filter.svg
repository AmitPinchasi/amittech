<text class="t" x="296.0" y="122.0" text-anchor="middle" style="direction:ltr">3</text>
<rect id="el-src-c3" class="n-cell shp" x="132.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.0" y="122.0" text-anchor="middle" style="direction:ltr">4</text>
<rect id="el-src-c4" class="n-cell shp" x="16.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="64.0" y="122.0" text-anchor="middle" style="direction:ltr">5</text>
</g>
<g id="el-val">
<rect class="n-box shp" x="221.1" y="180.0" width="149.7" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="296.0" y="207.0" text-anchor="middle">‪[]‬</text>
<text class="t-b dyn-val-1" x="296.0" y="207.0" text-anchor="middle">‪[1]‬</text>
<text class="t-b dyn-val-2" x="296.0" y="207.0" text-anchor="middle">‪[1, 2]‬</text>
<text class="t-b dyn-val-3" x="296.0" y="207.0" text-anchor="middle">‪[1, 2, 4]‬</text>
<text class="t-b dyn-val-4" x="296.0" y="207.0" text-anchor="middle">‪[1, 2, 4, 5]‬</text>
</g>
<g id="el-note">
<text class="small" x="296.0" y="277.0" text-anchor="middle">האיבר 3 לא עובר את התנאי ולכן מדולג</text>
</g>
