<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 592 298" width="592" role="img" aria-label="ליסט קומפרהנשין עם תנאי: כל איבר שעובר את התנאי נכנס לרשימה החדשה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}14.15%{stroke:var(--pink);stroke-width:2.5;}17.45%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-src-0{0.00%{stroke-width:1.5;}10.85%{stroke-width:1.5;}14.15%{stroke:var(--pink);stroke-width:2.5;}28.30%{stroke:var(--pink);stroke-width:2.5;}31.60%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-src-c0{animation-name:k-src-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-src-1{0.00%{stroke-width:1.5;}25.00%{stroke-width:1.5;}28.30%{stroke:var(--pink);stroke-width:2.5;}42.45%{stroke:var(--pink);stroke-width:2.5;}45.75%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-src-c1{animation-name:k-src-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-src-2{0.00%{stroke-width:1.5;}39.15%{stroke-width:1.5;}42.45%{stroke:var(--pink);stroke-width:2.5;}56.60%{stroke:var(--pink);stroke-width:2.5;}59.91%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-src-c2{animation-name:k-src-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-src-3{0.00%{stroke-width:1.5;}53.30%{stroke-width:1.5;}56.60%{stroke:var(--pink);stroke-width:2.5;}70.75%{stroke:var(--pink);stroke-width:2.5;}74.06%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-src-c3{animation-name:k-src-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-src-4{0.00%{stroke-width:1.5;}67.45%{stroke-width:1.5;}70.75%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-src-c4{animation-name:k-src-4;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:1;}14.15%{opacity:1;}17.45%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:0;}
@keyframes k-dyn-val-1{0.00%{opacity:0;}10.85%{opacity:0;}14.15%{opacity:1;}28.30%{opacity:1;}31.60%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-2{opacity:0;}
@keyframes k-dyn-val-2{0.00%{opacity:0;}25.00%{opacity:0;}28.30%{opacity:1;}56.60%{opacity:1;}59.91%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-2{animation-name:k-dyn-val-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-3{opacity:0;}
@keyframes k-dyn-val-3{0.00%{opacity:0;}53.30%{opacity:0;}56.60%{opacity:1;}70.75%{opacity:1;}74.06%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-3{animation-name:k-dyn-val-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-4{opacity:1;}
@keyframes k-dyn-val-4{0.00%{opacity:0;}67.45%{opacity:0;}70.75%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-4{animation-name:k-dyn-val-4;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="296.0,140.0 296.0,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="308.0" y="164.0" text-anchor="end">הרשימה שנבנית</text>
<g id="el-code">
<rect class="n-code-bg shp" x="106.5" y="16.0" width="379.0" height="38.0" rx="7"/>
<text class="code" x="296.0" y="43.0" text-anchor="middle">l = [x for x in range(1, 6) if x != 3]</text>
</g>
