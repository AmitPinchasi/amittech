@keyframes k-edge-3{0.00%{stroke-width:1.6;}80.94%{stroke-width:1.6;}82.87%{stroke:var(--pink);stroke-width:2.4;}91.16%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
