<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 549 366" width="549" role="img" aria-label="חיבור מחדש עם Exponential Backoff: אחרי כל ניסיון שנכשל זמן ההמתנה מוכפל, עד שהחיבור מצליח והמונה מתאפס">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
