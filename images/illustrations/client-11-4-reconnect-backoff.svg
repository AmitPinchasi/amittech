.dyn-wait-1{opacity:0;}
@keyframes k-dyn-wait-1{0.00%{opacity:0;}31.22%{opacity:0;}33.15%{opacity:1;}58.01%{opacity:1;}59.94%{opacity:0;}100.00%{opacity:0;}}
