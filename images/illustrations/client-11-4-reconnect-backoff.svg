@keyframes k-ok{0.00%{stroke-width:1.5;}80.94%{stroke-width:1.5;}82.87%{stroke:var(--pink);stroke-width:2.5;}91.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
