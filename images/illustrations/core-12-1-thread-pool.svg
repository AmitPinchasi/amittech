<rect class="n-box shp" x="169.8" y="16.0" width="311.4" height="44.0" rx="8"/>
<text class="t-b dyn-tasks-0" x="325.4" y="43.0" text-anchor="middle" style="direction:ltr">tasks = [T1, T2, T3, T4, T5, T6]</text>
