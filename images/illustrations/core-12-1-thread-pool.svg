</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="186.0" width="618.9" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="325.4" y="214.0" text-anchor="middle">כל העובדים ישנים על התנאי task_available עד שמגיעה משימה</text>
<text class="t dyn-note-1" x="325.4" y="214.0" text-anchor="middle">שש משימות הוגשו לתור, ואות signal מעיר עובדים פנויים</text>
<text class="t dyn-note-2" x="325.4" y="214.0" text-anchor="middle">ארבעת העובדים לקחו משימה כל אחד ומריצים אותה בלי להחזיק את הmutex</text>
<text class="t dyn-note-3" x="325.4" y="214.0" text-anchor="middle">שני העובדים שסיימו לקחו את שתי המשימות שנשארו בתור</text>
<text class="t dyn-note-4" x="325.4" y="214.0" text-anchor="middle">התור התרוקן, והעובדים חוזרים לישון בלי שנוצר או נהרס אף thread</text>
</g>
<g id="el-cap">
<text class="small" x="325.4" y="285.0" text-anchor="middle">מספר התהליכונים קבוע, ולכן עלות היצירה משולמת פעם אחת בלבד בתחילת חיי התוכנית</text>
