<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 336" width="580" role="img" aria-label="טריק ה-pc+8 בצינור העיבוד של ARM: כשההוראה בכתובת 0x8000 מבוצעת, המעבד כבר פענח את ההוראה שבכתובת 0x8004 והביא את ההוראה שבכתובת 0x8008, ולכן קריאת האוגר pc מתוך ההוראה המבוצעת מחזירה את כתובת ההוראה הנוכחית ועוד שמונה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-exec{0.00%{stroke:var(--pink);stroke-width:2.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}24.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-exec .shp{animation-name:k-exec;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-decode{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-decode .shp{animation-name:k-decode;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fetch{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fetch .shp{animation-name:k-fetch;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-result{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-result .shp{animation-name:k-result;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.07%{stroke-width:1.6;}20.24%{stroke:var(--pink);stroke-width:2.4;}40.48%{stroke:var(--pink);stroke-width:2.4;}44.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.31%{stroke-width:1.6;}40.48%{stroke:var(--pink);stroke-width:2.4;}60.71%{stroke:var(--pink);stroke-width:2.4;}64.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}56.55%{stroke-width:1.6;}60.71%{stroke:var(--pink);stroke-width:2.4;}80.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="290.2,62.0 290.2,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="304.2" y="86.0" text-anchor="end">הצינור כבר קדימה בשלב אחד</text>
<polyline id="edge-1" class="edge" points="290.2,148.0 290.2,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="304.2" y="172.0" text-anchor="end">וקדימה בשלב נוסף</text>
<polyline id="edge-2" class="edge" points="290.2,234.0 290.2,274.0" marker-end="url(#arr)"/>
<text class="lbl" x="304.2" y="258.0" text-anchor="end">pc קורא כאן</text>
<g id="el-exec">
<rect class="n-box shp" x="116.1" y="16.0" width="348.1" height="46.0" rx="8"/>
<text class="t" x="290.2" y="44.0" text-anchor="middle">0x8000 - mov r3, pc - בביצוע (execute)</text>
</g>
<g id="el-decode">
<rect class="n-box shp" x="129.1" y="102.0" width="322.2" height="46.0" rx="8"/>
<text class="t" x="290.2" y="130.0" text-anchor="middle">0x8004 - nop - כבר בפענוח (decode)</text>
</g>
<g id="el-fetch">
<rect class="n-box shp" x="16.0" y="188.0" width="548.3" height="46.0" rx="8"/>
<text class="t" x="290.2" y="216.0" text-anchor="middle">0x8008 - nop - כבר הובאה (fetch) - זו הכתובת שה-pc מצביע עליה</text>
</g>
<g id="el-result">
<rect class="n-box shp" x="106.4" y="274.0" width="367.6" height="46.0" rx="8"/>
<text class="t" x="290.2" y="302.0" text-anchor="middle">r3 = 0x8008 = כתובת ההוראה הנוכחית + 8</text>
</g>
</svg>
