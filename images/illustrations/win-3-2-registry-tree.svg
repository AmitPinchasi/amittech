<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 393 456" width="393" role="img" aria-label="מבנה העץ של ה-Registry בווינדוס: מהמאגר המרכזי, דרך ההייבים HKLM, HKCU ו-HKU, אל מפתח ואל ערך בודד">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="196.5,62.0 196.5,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="210.5" y="86.0" text-anchor="end">הייבים (Hives)</text>
<polyline id="edge-1" class="edge" points="196.5,148.0 196.5,188.0" marker-end="url(#arr)"/>
<text class="lbl" x="210.5" y="172.0" text-anchor="end">לדוגמה HKCU</text>
<polyline id="edge-2" class="edge" points="196.5,226.0 196.5,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="210.5" y="250.0" text-anchor="end">מפתח - Key</text>
<polyline id="edge-3" class="edge" points="196.5,304.0 196.5,344.0" marker-end="url(#arr)"/>
<text class="lbl" x="210.5" y="328.0" text-anchor="end">ערך - Value</text>
<g id="el-reg">
<rect class="n-box shp" x="77.5" y="16.0" width="237.9" height="46.0" rx="8"/>
<text class="t" x="196.5" y="44.0" text-anchor="middle">ה-Registry - מאגר מרכזי</text>
</g>
<g id="el-hives">
<rect id="el-hives-c0" class="n-cell shp" x="264.5" y="102.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="312.5" y="130.0" text-anchor="middle" style="direction:ltr">HKLM</text>
<rect id="el-hives-c1" class="n-hl shp" x="148.5" y="102.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="196.5" y="130.0" text-anchor="middle" style="direction:ltr">HKCU</text>
<rect id="el-hives-c2" class="n-cell shp" x="32.5" y="102.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="80.5" y="130.0" text-anchor="middle" style="direction:ltr">HKU</text>
</g>
<g id="el-key1">
<rect class="n-code-bg shp" x="119.8" y="188.0" width="153.4" height="38.0" rx="7"/>
<text class="code" x="196.5" y="215.0" text-anchor="middle">Control Panel</text>
</g>
<g id="el-key2">
<rect class="n-code-bg shp" x="146.9" y="266.0" width="99.2" height="38.0" rx="7"/>
<text class="code" x="196.5" y="293.0" text-anchor="middle">Desktop</text>
</g>
<g id="el-val">
<rect class="n-code-bg shp" x="92.7" y="344.0" width="207.5" height="38.0" rx="7"/>
<text class="code" x="196.5" y="371.0" text-anchor="middle">Wallpaper = img.jpg</text>
</g>
<g id="el-note">
<text class="small" x="196.5" y="435.0" text-anchor="middle">כל הייב מכיל מפתחות, וכל מפתח מכיל ערכים עם נתונים</text>
</g>
</svg>
