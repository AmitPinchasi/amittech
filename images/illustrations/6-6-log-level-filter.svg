<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 582 433" width="582" role="img" aria-label="סינון לוגים לפי רמה: כשהסף מוגדר ל-WARNING, לוג ברמת DEBUG נזרק ולוג ברמת ERROR נכתב לקובץ ולמסך">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}17.41%{stroke-width:1.5;}39.73%{stroke-width:1.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}60.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}11.16%{stroke-width:1.5;}14.29%{stroke:var(--pink);stroke-width:2.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}31.70%{stroke-width:1.5;}54.02%{stroke-width:1.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}74.55%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-drop{0.00%{stroke-width:1.5;}25.45%{stroke-width:1.5;}28.57%{stroke:var(--pink);stroke-width:2.5;}42.86%{stroke:var(--pink);stroke-width:2.5;}45.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-drop .shp{animation-name:k-drop;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}68.30%{stroke-width:1.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}85.71%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.16%{stroke-width:1.6;}14.29%{stroke:var(--pink);stroke-width:2.4;}28.57%{stroke:var(--pink);stroke-width:2.4;}31.70%{stroke-width:1.6;}54.02%{stroke-width:1.6;}57.14%{stroke:var(--pink);stroke-width:2.4;}71.43%{stroke:var(--pink);stroke-width:2.4;}74.55%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.45%{stroke-width:1.6;}28.57%{stroke:var(--pink);stroke-width:2.4;}42.86%{stroke:var(--pink);stroke-width:2.4;}45.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}68.30%{stroke-width:1.6;}71.43%{stroke:var(--pink);stroke-width:2.4;}85.71%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-0{opacity:0;}
@keyframes k-dyn-call-0{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-call-0{animation-name:k-dyn-call-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-1{opacity:0;}
@keyframes k-dyn-call-1{0.00%{opacity:1;}42.86%{opacity:1;}45.98%{opacity:0;}100.00%{opacity:0;}}
.dyn-call-1{animation-name:k-dyn-call-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-2{opacity:1;}
@keyframes k-dyn-call-2{0.00%{opacity:0;}39.73%{opacity:0;}42.86%{opacity:1;}85.71%{opacity:1;}100.00%{opacity:1;}}
.dyn-call-2{animation-name:k-dyn-call-2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}14.29%{opacity:1;}17.41%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:0;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}11.16%{opacity:0;}14.29%{opacity:1;}57.14%{opacity:1;}60.27%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-2{opacity:1;}
@keyframes k-dyn-cond-2{0.00%{opacity:0;}54.02%{opacity:0;}57.14%{opacity:1;}85.71%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-2{animation-name:k-dyn-cond-2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="194.7,54.0 194.7,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="373.5,183.4 439.5,183.4" marker-end="url(#arr)"/>
<text class="lbl" x="406.5" y="171.4" text-anchor="middle">לא</text>
<polyline id="edge-2" class="edge" points="194.7,272.7 194.7,312.7" marker-end="url(#arr)"/>
<text class="lbl" x="208.7" y="296.7" text-anchor="end">כן</text>
<g id="el-call">
<rect class="n-code-bg shp" x="68.4" y="16.0" width="252.7" height="38.0" rx="7"/>
<text class="code dyn-call-0" x="194.7" y="43.0" text-anchor="middle">logging.debug('message')</text>
<text class="code dyn-call-1" x="194.7" y="43.0" text-anchor="middle">logging.debug('message')</text>
<text class="code dyn-call-2" x="194.7" y="43.0" text-anchor="middle">logging.error('message')</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="194.7,94.0 373.5,183.4 194.7,272.7 16.0,183.4"/>
<text class="code dyn-cond-0" x="194.7" y="188.4" text-anchor="middle">level &gt;= WARNING ?</text>
<text class="code dyn-cond-1" x="194.7" y="188.4" text-anchor="middle">DEBUG &gt;= WARNING ?</text>
<text class="code dyn-cond-2" x="194.7" y="188.4" text-anchor="middle">ERROR &gt;= WARNING ?</text>
</g>
<g id="el-drop">
<rect class="n-box shp" x="439.5" y="160.4" width="127.0" height="46.0" rx="8"/>
<text class="t" x="503.0" y="188.4" text-anchor="middle">הלוג נזרק</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="99.5" y="312.7" width="190.5" height="46.0" rx="8"/>
<text class="t" x="194.7" y="340.7" text-anchor="middle">נכתב לקובץ ולמסך</text>
</g>
<g id="el-note">
<text class="small" x="194.7" y="411.7" text-anchor="middle">רק לוגים מרמת הסף ומעלה מגיעים לפלט</text>
</g>
</svg>
