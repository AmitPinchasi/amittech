<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 387 364" width="387" role="img" aria-label="סדר ההפעלה של דקורטור כפול: הדקורטור הקרוב לפונקציה עוטף ראשון">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-func{0.00%{stroke:var(--pink);stroke-width:2.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}24.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-func .shp{animation-name:k-func;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-twice{0.00%{stroke-width:1.5;}15.62%{stroke-width:1.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}44.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-twice .shp{animation-name:k-twice;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-log{0.00%{stroke-width:1.5;}35.62%{stroke-width:1.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}64.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-log .shp{animation-name:k-log;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-call{0.00%{stroke-width:1.5;}55.62%{stroke-width:1.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-call .shp{animation-name:k-call;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}15.62%{stroke-width:1.6;}20.00%{stroke:var(--pink);stroke-width:2.4;}40.00%{stroke:var(--pink);stroke-width:2.4;}44.38%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}35.62%{stroke-width:1.6;}40.00%{stroke:var(--pink);stroke-width:2.4;}60.00%{stroke:var(--pink);stroke-width:2.4;}64.38%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}55.62%{stroke-width:1.6;}60.00%{stroke:var(--pink);stroke-width:2.4;}80.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="158.1,98.0 158.1,138.0" marker-end="url(#arr)"/>
<text class="lbl" x="172.1" y="122.0" text-anchor="end">הקרוב לפונקציה פועל ראשון</text>
<polyline id="edge-1" class="edge" points="158.1,184.0 158.1,224.0" marker-end="url(#arr)"/>
<text class="lbl" x="172.1" y="208.0" text-anchor="end">העליון פועל אחרון</text>
<polyline id="edge-2" class="edge" points="158.1,270.0 158.1,310.0" marker-end="url(#arr)"/>
<text class="lbl" x="172.1" y="294.0" text-anchor="end">כך נראית הקריאה בפועל</text>
<g id="el-func">
<rect class="n-code-bg shp" x="67.9" y="16.0" width="180.4" height="82.0" rx="7"/>
<text class="code" x="158.1" y="43.0" text-anchor="middle">@log</text>
<text class="code" x="158.1" y="65.0" text-anchor="middle">@twice</text>
<text class="code" x="158.1" y="87.0" text-anchor="middle">def func(x): ...</text>
</g>
<g id="el-twice">
<rect class="n-box shp" x="20.0" y="138.0" width="276.2" height="46.0" rx="8"/>
<text class="t" x="158.1" y="166.0" text-anchor="middle">הדקורטור twice עוטף את func</text>
</g>
<g id="el-log">
<rect class="n-box shp" x="16.0" y="224.0" width="284.2" height="46.0" rx="8"/>
<text class="t" x="158.1" y="252.0" text-anchor="middle">הדקורטור log עוטף את התוצאה</text>
</g>
<g id="el-call">
<rect class="n-code-bg shp" x="54.4" y="310.0" width="207.5" height="38.0" rx="7"/>
<text class="code" x="158.1" y="337.0" text-anchor="middle">log(twice(func))(5)</text>
</g>
</svg>
