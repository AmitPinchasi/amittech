<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 777 642" width="777" role="img" aria-label="תרשים זרימה: אימות CSRF Token - השרת מטמיע טוקן ייחודי בטופס, והבקשה מתבצעת רק אם הטוקן שחוזר תואם לזה שנשמר בסשן של המשתמש">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}20.30%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-gen{0.00%{stroke-width:1.5;}13.37%{stroke-width:1.5;}16.83%{stroke:var(--pink);stroke-width:2.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}37.13%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-gen .shp{animation-name:k-gen;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-submit{0.00%{stroke-width:1.5;}30.20%{stroke-width:1.5;}33.66%{stroke:var(--pink);stroke-width:2.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}53.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-submit .shp{animation-name:k-submit;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-check{0.00%{stroke-width:1.5;}47.03%{stroke-width:1.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}70.79%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-check .shp{animation-name:k-check;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-accept{0.00%{stroke-width:1.5;}63.86%{stroke-width:1.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-accept .shp{animation-name:k-accept;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.37%{stroke-width:1.6;}16.83%{stroke:var(--pink);stroke-width:2.4;}33.66%{stroke:var(--pink);stroke-width:2.4;}37.13%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.20%{stroke-width:1.6;}33.66%{stroke:var(--pink);stroke-width:2.4;}50.50%{stroke:var(--pink);stroke-width:2.4;}53.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.03%{stroke-width:1.6;}50.50%{stroke:var(--pink);stroke-width:2.4;}67.33%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}63.86%{stroke-width:1.6;}67.33%{stroke:var(--pink);stroke-width:2.4;}84.16%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-check-0{opacity:0;}
@keyframes k-dyn-check-0{0.00%{opacity:1;}67.33%{opacity:1;}70.79%{opacity:0;}100.00%{opacity:0;}}
.dyn-check-0{animation-name:k-dyn-check-0;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-check-1{opacity:1;}
@keyframes k-dyn-check-1{0.00%{opacity:0;}63.86%{opacity:0;}67.33%{opacity:1;}84.16%{opacity:1;}100.00%{opacity:1;}}
.dyn-check-1{animation-name:k-dyn-check-1;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="282.1,62.0 282.1,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="282.1,148.0 282.1,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="282.1,234.0 282.1,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="548.2,407.1 614.2,407.1" marker-end="url(#arr)"/>
<text class="lbl" x="581.2" y="395.1" text-anchor="middle">לא</text>
<polyline id="edge-4" class="edge" points="282.1,540.1 282.1,580.1" marker-end="url(#arr)"/>
<text class="lbl" x="296.1" y="564.1" text-anchor="end">כן</text>
<g id="el-req">
<rect class="n-box shp" x="160.0" y="16.0" width="244.3" height="46.0" rx="8"/>
<text class="t" x="282.1" y="44.0" text-anchor="middle">המשתמש מבקש טופס מהשרת</text>
</g>
<g id="el-gen">
<rect class="n-box shp" x="85.2" y="102.0" width="393.8" height="46.0" rx="8"/>
<text class="t" x="282.1" y="130.0" text-anchor="middle">השרת מייצר CSRF Token ומטמיע אותו בטופס</text>
</g>
<g id="el-submit">
<rect class="n-box shp" x="98.2" y="188.0" width="367.9" height="46.0" rx="8"/>
<text class="t" x="282.1" y="216.0" text-anchor="middle">הדפדפן שולח את הטופס בחזרה עם ה-Token</text>
</g>
<g id="el-check">
<polygon class="n-dia shp" points="282.1,274.0 548.2,407.1 282.1,540.1 16.0,407.1"/>
<text class="t dyn-check-0" x="282.1" y="412.1" text-anchor="middle">ה-Token תואם לזה שנשמר בסשן?</text>
<text class="t dyn-check-1" x="282.1" y="412.1" text-anchor="middle">כן - ה-Token תואם</text>
</g>
<g id="el-reject">
<rect class="n-box shp" x="614.2" y="384.1" width="146.5" height="46.0" rx="8"/>
<text class="t" x="687.5" y="412.1" text-anchor="middle">הבקשה נדחית</text>
</g>
<g id="el-accept">
<rect class="n-box shp" x="167.4" y="580.1" width="229.5" height="46.0" rx="8"/>
<text class="t" x="282.1" y="608.1" text-anchor="middle">הפעולה מתבצעת בהצלחה</text>
</g>
</svg>
