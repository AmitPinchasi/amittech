<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 551 603" width="551" role="img" aria-label="שיבוש DOM ל-XSS: הזרקת אלמנט a עם id דורסת משתנה גלובלי, toString מחזיר את ה-href והוא נטען כסקריפט, אלא אם נבדק שהערך אינו אלמנט">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
