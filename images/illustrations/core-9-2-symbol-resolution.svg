<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 646 298" width="646" role="img" aria-label="איור פתרון symbols: הלינקר עובר על כל symbol ומחפש את הקובץ שמגדיר אותו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-cmd{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cmd .shp{animation-name:k-cmd;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-syms-0{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-syms-c0{animation-name:k-syms-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-syms-1{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-syms-c1{animation-name:k-syms-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-syms-2{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-syms-c2{animation-name:k-syms-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-syms-3{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-syms-c3{animation-name:k-syms-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}13.68%{transform:translateX(0.0px);}16.98%{transform:translateX(0.0px);}30.66%{transform:translateX(0.0px);}33.96%{transform:translateX(-116.0px);}47.64%{transform:translateX(-116.0px);}50.94%{transform:translateX(-232.0px);}64.62%{transform:translateX(-232.0px);}67.92%{transform:translateX(-348.0px);}81.60%{transform:translateX(-348.0px);}100.00%{transform:translateX(-348.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-1{opacity:0;}
@keyframes k-dyn-res-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-2{opacity:0;}
@keyframes k-dyn-res-2{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-2{animation-name:k-dyn-res-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-3{opacity:1;}
@keyframes k-dyn-res-3{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-3{animation-name:k-dyn-res-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-cmd">
<rect class="n-code-bg shp" x="66.5" y="16.0" width="342.9" height="38.0" rx="7"/>
<text class="code" x="238.0" y="43.0" text-anchor="middle">gcc main.o math_utils.o -o program</text>
</g>
<g id="el-syms">
<rect id="el-syms-c0" class="n-cell shp" x="364.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="412.0" y="122.0" text-anchor="middle" style="direction:ltr">main</text>
<rect id="el-syms-c1" class="n-cell shp" x="248.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="296.0" y="122.0" text-anchor="middle" style="direction:ltr">add</text>
<rect id="el-syms-c2" class="n-cell shp" x="132.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="180.0" y="122.0" text-anchor="middle" style="direction:ltr">multiply</text>
<rect id="el-syms-c3" class="n-cell shp" x="16.0" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="64.0" y="122.0" text-anchor="middle" style="direction:ltr">printf</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="412.0,140.0 412.0,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="424.0" y="164.0" text-anchor="end">הsymbol הנבדק</text>
<g id="el-res">
<rect class="n-box shp" x="193.6" y="180.0" width="436.8" height="44.0" rx="8"/>
<text class="t-b dyn-res-0" x="412.0" y="207.0" text-anchor="middle">מוגדר בתוך main.o, בסקשן text</text>
<text class="t-b dyn-res-1" x="412.0" y="207.0" text-anchor="middle">חסר ב-main.o, ההגדרה נמצאת ב-math_utils.o</text>
<text class="t-b dyn-res-2" x="412.0" y="207.0" text-anchor="middle">חסר ב-main.o, ההגדרה נמצאת ב-math_utils.o</text>
<text class="t-b dyn-res-3" x="412.0" y="207.0" text-anchor="middle">חסר בכל קבצי האובייקט, ההגדרה מגיעה מ-libc</text>
</g>
</g>
<g id="el-note">
<text class="small" x="238.0" y="277.0" text-anchor="middle">כל symbol שנשאר בלי הגדרה מסיים בשגיאת undefined reference</text>
</g>
</svg>
