<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 462 309" width="462" role="img" aria-label="מכונת המצבים של שירות ב-systemd: הפקודה start מפעילה את השירות והפקודה stop עוצרת אותו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-stopped{0.00%{stroke:var(--pink);stroke-width:2.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}30.71%{stroke-width:1.5;}46.43%{stroke-width:1.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-stopped .shp{animation-name:k-stopped;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-running{0.00%{stroke-width:1.5;}20.71%{stroke-width:1.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}56.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-running .shp{animation-name:k-running;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}20.71%{stroke-width:1.6;}25.71%{stroke:var(--pink);stroke-width:2.4;}51.43%{stroke:var(--pink);stroke-width:2.4;}56.43%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}46.43%{stroke-width:1.6;}51.43%{stroke:var(--pink);stroke-width:2.4;}77.14%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmd-0{opacity:0;}
@keyframes k-dyn-cmd-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-cmd-0{animation-name:k-dyn-cmd-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmd-1{opacity:0;}
@keyframes k-dyn-cmd-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-cmd-1{animation-name:k-dyn-cmd-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cmd-2{opacity:1;}
@keyframes k-dyn-cmd-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-cmd-2{animation-name:k-dyn-cmd-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="271.0,65.0 271.0,105.0" marker-end="url(#arr)"/>
<text class="lbl" x="285.0" y="89.0" text-anchor="end" style="direction:ltr">systemctl start</text>
<polyline id="edge-1" class="edge" points="158.2,128.0 16.0,128.0 16.0,42.0 162.4,42.0" marker-end="url(#arr)"/>
<text class="small" x="89.2" y="30.0" text-anchor="middle" style="direction:ltr">systemctl stop</text>
<g id="el-stopped">
<rect class="n-box shp" x="162.4" y="19.0" width="217.0" height="46.0" rx="8"/>
<text class="t" x="271.0" y="47.0" text-anchor="middle">עצור - inactive (dead)</text>
</g>
<g id="el-running">
<rect class="n-box shp" x="158.2" y="105.0" width="225.4" height="46.0" rx="8"/>
<text class="t" x="271.0" y="133.0" text-anchor="middle">פעיל - active (running)</text>
</g>
<g id="el-cmd">
<rect class="n-box shp" x="179.1" y="191.0" width="183.8" height="44.0" rx="8"/>
<text class="t-b dyn-cmd-0" x="271.0" y="218.0" text-anchor="middle" style="direction:ltr">systemctl status</text>
<text class="t-b dyn-cmd-1" x="271.0" y="218.0" text-anchor="middle" style="direction:ltr">systemctl start</text>
<text class="t-b dyn-cmd-2" x="271.0" y="218.0" text-anchor="middle" style="direction:ltr">systemctl stop</text>
</g>
<g id="el-note">
<text class="small" x="271.0" y="288.0" text-anchor="middle">הפקודה enable מפעילה את השירות אוטומטית עם ה-boot</text>
</g>
</svg>
