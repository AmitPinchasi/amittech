<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 345 414" width="345" role="img" aria-label="שרשרת הסקופ: חיפוש משתנה מתחיל בסקופ הפנימי ביותר ועולה החוצה עד שהמשתנה נמצא">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}24.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-inner{0.00%{stroke-width:1.5;}15.62%{stroke-width:1.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}44.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inner .shp{animation-name:k-inner;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mid{0.00%{stroke-width:1.5;}35.62%{stroke-width:1.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}64.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-mid .shp{animation-name:k-mid;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-out{0.00%{stroke-width:1.5;}55.62%{stroke-width:1.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-out .shp{animation-name:k-out;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}15.62%{stroke-width:1.6;}20.00%{stroke:var(--pink);stroke-width:2.4;}40.00%{stroke:var(--pink);stroke-width:2.4;}44.38%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}35.62%{stroke-width:1.6;}40.00%{stroke:var(--pink);stroke-width:2.4;}60.00%{stroke:var(--pink);stroke-width:2.4;}64.38%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}55.62%{stroke-width:1.6;}60.00%{stroke:var(--pink);stroke-width:2.4;}80.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-0{opacity:0;}
@keyframes k-dyn-out-0{0.00%{opacity:1;}60.00%{opacity:1;}64.38%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-0{animation-name:k-dyn-out-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-1{opacity:1;}
@keyframes k-dyn-out-1{0.00%{opacity:0;}55.62%{opacity:0;}60.00%{opacity:1;}80.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-out-1{animation-name:k-dyn-out-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="172.4,54.0 172.4,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="186.4" y="78.0" text-anchor="end">מחפשים את b</text>
<polyline id="edge-1" class="edge" points="172.4,140.0 172.4,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="186.4" y="164.0" text-anchor="end">אין כאן b - עולים</text>
<polyline id="edge-2" class="edge" points="172.4,226.0 172.4,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="186.4" y="250.0" text-anchor="end">אין כאן b - עולים</text>
<polyline id="edge-3" class="edge" points="172.4,312.0 172.4,352.0" marker-end="url(#arr)"/>
<text class="lbl" x="186.4" y="336.0" text-anchor="end">רק אם לא נמצא</text>
<g id="el-call">
<rect class="n-code-bg shp" x="91.2" y="16.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="172.4" y="43.0" text-anchor="middle">console.log(b)</text>
</g>
<g id="el-inner">
<rect class="n-box shp" x="43.7" y="94.0" width="257.4" height="46.0" rx="8"/>
<text class="t" x="172.4" y="122.0" text-anchor="middle">הסקופ של inner - מכיל את d</text>
</g>
<g id="el-mid">
<rect class="n-box shp" x="39.5" y="180.0" width="265.8" height="46.0" rx="8"/>
<text class="t" x="172.4" y="208.0" text-anchor="middle">הסקופ של middle - מכיל את c</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="16.0" y="266.0" width="312.8" height="46.0" rx="8"/>
<text class="t dyn-out-0" x="172.4" y="294.0" text-anchor="middle">הסקופ של outer - מכיל את b</text>
<text class="t dyn-out-1" x="172.4" y="294.0" text-anchor="middle">המשתנה b נמצא כאן - החיפוש נעצר</text>
</g>
<g id="el-glob">
<rect class="n-box shp" x="42.9" y="352.0" width="259.0" height="46.0" rx="8"/>
<text class="t" x="172.4" y="380.0" text-anchor="middle">הסקופ הגלובלי - מכיל את a</text>
</g>
</svg>
