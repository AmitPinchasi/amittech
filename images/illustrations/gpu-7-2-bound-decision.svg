<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 676 277" width="676" role="img" aria-label="עצימות אריתמטית מול נקודת הרכס מכריעה אם ה-kernel חסום-חישוב או חסום-זיכרון">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-kern{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}40.73%{stroke-width:1.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-kern .shp{animation-name:k-kern;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mbound{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}43.55%{stroke:var(--pink);stroke-width:2.5;}46.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-mbound .shp{animation-name:k-mbound;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cbound{0.00%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-cbound .shp{animation-name:k-cbound;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}55.24%{stroke-width:1.6;}58.06%{stroke:var(--pink);stroke-width:2.4;}72.58%{stroke:var(--pink);stroke-width:2.4;}75.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-kern-0{opacity:0;}
@keyframes k-dyn-kern-0{0.00%{opacity:1;}43.55%{opacity:1;}46.37%{opacity:0;}100.00%{opacity:0;}}
.dyn-kern-0{animation-name:k-dyn-kern-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-kern-1{opacity:1;}
@keyframes k-dyn-kern-1{0.00%{opacity:0;}40.73%{opacity:0;}43.55%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-kern-1{animation-name:k-dyn-kern-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}14.52%{opacity:1;}17.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:0;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}11.69%{opacity:0;}14.52%{opacity:1;}58.06%{opacity:1;}60.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-2{opacity:1;}
@keyframes k-dyn-cond-2{0.00%{opacity:0;}55.24%{opacity:0;}58.06%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-2{animation-name:k-dyn-cond-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="333.7,54.0 333.7,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="442.9,148.6 508.9,148.6" marker-end="url(#arr)"/>
<text class="lbl" x="475.9" y="136.6" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="224.4,148.6 158.4,148.6" marker-end="url(#arr)"/>
<text class="lbl" x="191.4" y="136.6" text-anchor="middle">לא</text>
<g id="el-kern">
<rect class="n-code-bg shp" x="243.5" y="16.0" width="180.4" height="38.0" rx="7"/>
<text class="code dyn-kern-0" x="333.7" y="43.0" text-anchor="middle">SAXPY  (AI=0.17)</text>
<text class="code dyn-kern-1" x="333.7" y="43.0" text-anchor="middle">SGEMM  (AI=512)</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="333.7,94.0 442.9,148.6 333.7,203.2 224.4,148.6"/>
<text class="code dyn-cond-0" x="333.7" y="153.6" text-anchor="middle">AI &gt;= 295</text>
<text class="code dyn-cond-1" x="333.7" y="153.6" text-anchor="middle">0.17 &gt;= 295</text>
<text class="code dyn-cond-2" x="333.7" y="153.6" text-anchor="middle">512 &gt;= 295</text>
</g>
<g id="el-cbound">
<rect class="n-box shp" x="508.9" y="125.6" width="150.8" height="46.0" rx="8"/>
<text class="t" x="584.3" y="153.6" text-anchor="middle" style="direction:ltr">compute-bound</text>
</g>
<g id="el-mbound">
<rect class="n-box shp" x="16.0" y="125.6" width="142.4" height="46.0" rx="8"/>
<text class="t" x="87.2" y="153.6" text-anchor="middle" style="direction:ltr">memory-bound</text>
</g>
<g id="el-note">
<text class="small" x="333.7" y="256.2" text-anchor="middle">נקודת הרכס של H100 ב-BF16 היא 295 FLOP/byte</text>
</g>
</svg>
