<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 384" width="384" role="img" aria-label="מוסכמת הקריאה של x86-64: שלושת הארגומנטים הראשונים נטענים לאוגרים rdi, rsi ו-rdx לפני הפקודה call, וערך ההחזרה מגיע באוגר rax">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-src{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-src .shp{animation-name:k-src;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-asm{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-asm .shp{animation-name:k-asm;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-regs-0{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-regs-c0{animation-name:k-regs-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-regs-1{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-regs-c1{animation-name:k-regs-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-regs-2{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-regs-c2{animation-name:k-regs-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-rax{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-rax .shp{animation-name:k-rax;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rax-0{opacity:0;}
@keyframes k-dyn-rax-0{0.00%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-rax-0{animation-name:k-dyn-rax-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rax-1{opacity:1;}
@keyframes k-dyn-rax-1{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-rax-1{animation-name:k-dyn-rax-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-src">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="352.0" height="38.0" rx="7"/>
<text class="code" x="192.0" y="43.0" text-anchor="middle">int result = calculate(10, 20, 30);</text>
</g>
<g id="el-asm">
<rect class="n-code-bg shp" x="110.8" y="94.0" width="162.4" height="104.0" rx="7"/>
<text class="code" x="192.0" y="121.0" text-anchor="middle">mov edx, 30</text>
<text class="code" x="192.0" y="143.0" text-anchor="middle">mov esi, 20</text>
<text class="code" x="192.0" y="165.0" text-anchor="middle">mov edi, 10</text>
<text class="code" x="192.0" y="187.0" text-anchor="middle">call calculate</text>
</g>
<g id="el-regs">
<rect id="el-regs-c0" class="n-cell shp" x="260.0" y="238.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="308.0" y="266.0" text-anchor="middle" style="direction:ltr">rdi = 10</text>
<rect id="el-regs-c1" class="n-cell shp" x="144.0" y="238.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="192.0" y="266.0" text-anchor="middle" style="direction:ltr">rsi = 20</text>
<rect id="el-regs-c2" class="n-cell shp" x="28.0" y="238.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="76.0" y="266.0" text-anchor="middle" style="direction:ltr">rdx = 30</text>
</g>
<g id="el-rax">
<rect class="n-box shp" x="136.8" y="324.0" width="110.3" height="44.0" rx="8"/>
<text class="t-b dyn-rax-0" x="192.0" y="351.0" text-anchor="middle" style="direction:ltr">rax = ?</text>
<text class="t-b dyn-rax-1" x="192.0" y="351.0" text-anchor="middle" style="direction:ltr">rax = 60</text>
</g>
</svg>
