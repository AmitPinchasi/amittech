<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 604 214" width="604" role="img" aria-label="השוואה בין סלקטור אח סמוך לסלקטור אח כללי על אותה שורת אלמנטים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-sel{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-sel .shp{animation-name:k-sel;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-els-0{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-els-c0{animation-name:k-els-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-els-1{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-els-c1{animation-name:k-els-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-els-2{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-els-c2{animation-name:k-els-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-els-4{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-els-c4{animation-name:k-els-4;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sel-0{opacity:0;}
@keyframes k-dyn-sel-0{0.00%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-sel-0{animation-name:k-dyn-sel-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sel-1{opacity:1;}
@keyframes k-dyn-sel-1{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-sel-1{animation-name:k-dyn-sel-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-sel">
<rect class="n-code-bg shp" x="254.1" y="16.0" width="96.0" height="38.0" rx="7"/>
<text class="code dyn-sel-0" x="302.1" y="43.0" text-anchor="middle">h1 + p</text>
<text class="code dyn-sel-1" x="302.1" y="43.0" text-anchor="middle">h1 ~ p</text>
</g>
<g id="el-els">
<rect id="el-els-c0" class="n-cell shp" x="486.1" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="534.1" y="122.0" text-anchor="middle" style="direction:ltr">h1</text>
<rect id="el-els-c1" class="n-cell shp" x="370.1" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="418.1" y="122.0" text-anchor="middle" style="direction:ltr">p</text>
<rect id="el-els-c2" class="n-cell shp" x="254.1" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="302.1" y="122.0" text-anchor="middle" style="direction:ltr">p</text>
<rect id="el-els-c3" class="n-cell shp" x="138.1" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="186.1" y="122.0" text-anchor="middle" style="direction:ltr">div</text>
<rect id="el-els-c4" class="n-cell shp" x="22.1" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="70.1" y="122.0" text-anchor="middle" style="direction:ltr">p</text>
</g>
<g id="el-note">
<text class="small" x="302.1" y="193.0" text-anchor="middle">האח הסמוך בוחר רק את הפסקה שמיד אחרי הכותרת, האח הכללי בוחר את כל הפסקאות שאחריה</text>
</g>
</svg>
