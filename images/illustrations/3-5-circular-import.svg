<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 225" width="500" role="img" aria-label="תלות מעגלית: שני מודולים שמייבאים אחד את השני יוצרים מעגל שאין לו התחלה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-a{0.00%{stroke:var(--pink);stroke-width:2.5;}14.15%{stroke:var(--pink);stroke-width:2.5;}17.45%{stroke-width:1.5;}25.00%{stroke-width:1.5;}28.30%{stroke:var(--pink);stroke-width:2.5;}42.45%{stroke:var(--pink);stroke-width:2.5;}45.75%{stroke-width:1.5;}53.30%{stroke-width:1.5;}56.60%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-a .shp{animation-name:k-a;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-b{0.00%{stroke-width:1.5;}10.85%{stroke-width:1.5;}14.15%{stroke:var(--pink);stroke-width:2.5;}28.30%{stroke:var(--pink);stroke-width:2.5;}31.60%{stroke-width:1.5;}39.15%{stroke-width:1.5;}42.45%{stroke:var(--pink);stroke-width:2.5;}56.60%{stroke:var(--pink);stroke-width:2.5;}59.91%{stroke-width:1.5;}67.45%{stroke-width:1.5;}70.75%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-b .shp{animation-name:k-b;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.85%{stroke-width:1.6;}14.15%{stroke:var(--pink);stroke-width:2.4;}28.30%{stroke:var(--pink);stroke-width:2.4;}31.60%{stroke-width:1.6;}39.15%{stroke-width:1.6;}42.45%{stroke:var(--pink);stroke-width:2.4;}56.60%{stroke:var(--pink);stroke-width:2.4;}59.91%{stroke-width:1.6;}67.45%{stroke-width:1.6;}70.75%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.00%{stroke-width:1.6;}28.30%{stroke:var(--pink);stroke-width:2.4;}42.45%{stroke:var(--pink);stroke-width:2.4;}45.75%{stroke-width:1.6;}53.30%{stroke-width:1.6;}56.60%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="290.2,65.0 290.2,105.0" marker-end="url(#arr)"/>
<text class="lbl" x="304.2" y="89.0" text-anchor="end">מייבא את function_b</text>
<polyline id="edge-1" class="edge" points="224.3,128.0 16.0,128.0 16.0,42.0 224.3,42.0" marker-end="url(#arr)"/>
<text class="small" x="120.2" y="30.0" text-anchor="middle">מייבא את function_a</text>
<g id="el-a">
<rect class="n-box shp" x="224.3" y="19.0" width="131.7" height="46.0" rx="8"/>
<text class="t" x="290.2" y="47.0" text-anchor="middle" style="direction:ltr">module_a.py</text>
</g>
<g id="el-b">
<rect class="n-box shp" x="224.3" y="105.0" width="131.7" height="46.0" rx="8"/>
<text class="t" x="290.2" y="133.0" text-anchor="middle" style="direction:ltr">module_b.py</text>
</g>
<g id="el-note">
<text class="small" x="290.2" y="204.0" text-anchor="middle">כל מודול צריך את השני קודם, ולכן הייבוא לעולם לא מצליח</text>
</g>
</svg>
