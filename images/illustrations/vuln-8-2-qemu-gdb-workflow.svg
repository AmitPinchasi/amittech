<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 677 536" width="677" role="img" aria-label="תהליך ניפוי באגים בבינארי ARM זר על מכונת x86: qemu-arm מדמה את המעבד ועוצר לפני ההוראה הראשונה, gdb-multiarch מתחבר אליו כשרת דיבוג מרוחק, ומשם עובדים כרגיל עם break, continue ובדיקת אוגרים">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-bin{0.00%{stroke:var(--pink);stroke-width:2.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}17.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-bin .shp{animation-name:k-bin;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-qemu{0.00%{stroke-width:1.5;}11.44%{stroke-width:1.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}31.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-qemu .shp{animation-name:k-qemu;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-wait{0.00%{stroke-width:1.5;}25.85%{stroke-width:1.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}46.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-wait .shp{animation-name:k-wait;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-gdbm{0.00%{stroke-width:1.5;}40.25%{stroke-width:1.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}60.59%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-gdbm .shp{animation-name:k-gdbm;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-connect{0.00%{stroke-width:1.5;}54.66%{stroke-width:1.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-connect .shp{animation-name:k-connect;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-debug{0.00%{stroke-width:1.5;}69.07%{stroke-width:1.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}86.44%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-debug .shp{animation-name:k-debug;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.44%{stroke-width:1.6;}14.41%{stroke:var(--pink);stroke-width:2.4;}28.81%{stroke:var(--pink);stroke-width:2.4;}31.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.85%{stroke-width:1.6;}28.81%{stroke:var(--pink);stroke-width:2.4;}43.22%{stroke:var(--pink);stroke-width:2.4;}46.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}40.25%{stroke-width:1.6;}43.22%{stroke:var(--pink);stroke-width:2.4;}57.63%{stroke:var(--pink);stroke-width:2.4;}60.59%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}54.66%{stroke-width:1.6;}57.63%{stroke:var(--pink);stroke-width:2.4;}72.03%{stroke:var(--pink);stroke-width:2.4;}75.00%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}69.07%{stroke-width:1.6;}72.03%{stroke:var(--pink);stroke-width:2.4;}86.44%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-4{animation-name:k-edge-4;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="338.6,62.0 338.6,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="338.6,140.0 338.6,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="338.6,226.0 338.6,266.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="338.6,348.0 338.6,388.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="338.6,434.0 338.6,474.0" marker-end="url(#arr)"/>
<g id="el-bin">
<rect class="n-box shp" x="221.6" y="16.0" width="233.8" height="46.0" rx="8"/>
<text class="t" x="338.6" y="44.0" text-anchor="middle">בינארי ARM מהודר - leg</text>
</g>
<g id="el-qemu">
<rect class="n-code-bg shp" x="221.3" y="102.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="338.6" y="129.0" text-anchor="middle">qemu-arm -g 1234 ./leg</text>
</g>
<g id="el-wait">
<rect class="n-box shp" x="100.2" y="180.0" width="476.8" height="46.0" rx="8"/>
<text class="t" x="338.6" y="208.0" text-anchor="middle">qemu מדמה את מעבד ה-ARM ועוצר לפני ההוראה הראשונה</text>
</g>
<g id="el-gdbm">
<rect class="n-code-bg shp" x="194.2" y="266.0" width="288.8" height="82.0" rx="7"/>
<text class="code" x="338.6" y="293.0" text-anchor="middle">gdb-multiarch ./leg</text>
<text class="code" x="338.6" y="315.0" text-anchor="middle">set architecture arm</text>
<text class="code" x="338.6" y="337.0" text-anchor="middle">target remote localhost:1234</text>
</g>
<g id="el-connect">
<rect class="n-box shp" x="150.9" y="388.0" width="375.3" height="46.0" rx="8"/>
<text class="t" x="338.6" y="416.0" text-anchor="middle">gdb-multiarch מתחבר לשרת הדיבוג של qemu</text>
</g>
<g id="el-debug">
<rect class="n-box shp" x="16.0" y="474.0" width="645.1" height="46.0" rx="8"/>
<text class="t" x="338.6" y="502.0" text-anchor="middle">break / continue / info registers / x/20i $pc - ניפוי באגים רגיל על קוד ARM</text>
</g>
</svg>
