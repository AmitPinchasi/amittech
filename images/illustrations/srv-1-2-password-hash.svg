<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 594 518" width="594" role="img" aria-label="אימות סיסמה עם hash: הסיסמה שהוזנה עוברת דרך bcrypt וה-hash שלה מושווה ל-hash השמור, סיסמה נכונה מחזירה token וסיסמה שגויה מוחזרת עם 401">
<style>
