<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 208 508" width="208" role="img" aria-label="ששת השלבים בפיתוח פרויקט חדש: מדרישות ועד הכנה לפרודקשן">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="103.9,62.0 103.9,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="103.9,148.0 103.9,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="103.9,234.0 103.9,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="103.9,320.0 103.9,360.0" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="103.9,406.0 103.9,446.0" marker-end="url(#arr)"/>
<g id="el-req">
<rect class="n-box shp" x="16.0" y="16.0" width="175.7" height="46.0" rx="8"/>
<text class="t" x="103.9" y="44.0" text-anchor="middle">דרישות הפרויקט</text>
</g>
<g id="el-def">
<rect class="n-box shp" x="20.9" y="102.0" width="166.0" height="46.0" rx="8"/>
<text class="t" x="103.9" y="130.0" text-anchor="middle">הגדרת הפרויקט</text>
</g>
<g id="el-design">
<rect class="n-box shp" x="25.7" y="188.0" width="156.2" height="46.0" rx="8"/>
<text class="t" x="103.9" y="216.0" text-anchor="middle">עיצוב החלקים</text>
</g>
<g id="el-code">
<rect class="n-box shp" x="20.9" y="274.0" width="166.0" height="46.0" rx="8"/>
<text class="t" x="103.9" y="302.0" text-anchor="middle">תכנות הפרויקט</text>
</g>
<g id="el-tests">
<rect class="n-box shp" x="55.9" y="360.0" width="96.0" height="46.0" rx="8"/>
<text class="t" x="103.9" y="388.0" text-anchor="middle">טסטים</text>
</g>
<g id="el-prod">
<rect class="n-box shp" x="20.9" y="446.0" width="166.0" height="46.0" rx="8"/>
<text class="t" x="103.9" y="474.0" text-anchor="middle">הכנה לפרודקשן</text>
</g>
</svg>
