#el-write .shp{animation-name:k-write;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-d{0.00%{stroke-width:1.5;}19.79%{stroke-width:1.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}35.76%{stroke-width:1.5;}53.13%{stroke-width:1.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}69.10%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-d .shp{animation-name:k-d;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-revise{0.00%{stroke-width:1.5;}30.90%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}46.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-revise .shp{animation-name:k-revise;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-exec{0.00%{stroke-width:1.5;}64.24%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}80.21%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
