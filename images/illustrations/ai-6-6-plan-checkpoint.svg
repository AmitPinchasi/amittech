@keyframes k-edge-3{0.00%{stroke-width:1.6;}42.01%{stroke-width:1.6;}44.44%{stroke:var(--pink);stroke-width:2.4;}55.56%{stroke:var(--pink);stroke-width:2.4;}57.99%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}64.24%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}77.78%{stroke:var(--pink);stroke-width:2.4;}80.21%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}75.35%{stroke-width:1.6;}77.78%{stroke:var(--pink);stroke-width:2.4;}88.89%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-5{animation-name:k-edge-5;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="442.2,62.0 442.2,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="442.2,148.0 442.2,188.0" marker-end="url(#arr)"/>
