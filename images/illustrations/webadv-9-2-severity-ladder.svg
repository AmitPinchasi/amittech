@keyframes k-s3{0.00%{stroke-width:1.5;}47.03%{stroke-width:1.5;}50.50%{stroke:var(--pink);stroke-width:2.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}70.79%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-s3 .shp{animation-name:k-s3;animation-duration:10.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-score{0.00%{stroke-width:1.5;}63.86%{stroke-width:1.5;}67.33%{stroke:var(--pink);stroke-width:2.5;}84.16%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
