.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:1;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}37.50%{opacity:0;}41.30%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-call">
<rect class="n-code-bg shp" x="118.2" y="16.0" width="352.0" height="38.0" rx="7"/>
<text class="code dyn-call-0" x="294.2" y="43.0" text-anchor="middle">listen(server_fd, 5);</text>
<text class="code dyn-call-1" x="294.2" y="43.0" text-anchor="middle">client_fd = accept(server_fd, ...);</text>
<text class="code dyn-call-2" x="294.2" y="43.0" text-anchor="middle">client_fd = accept(server_fd, ...);</text>
</g>
<g id="el-ret">
<rect class="n-box shp" x="218.8" y="94.0" width="150.8" height="44.0" rx="8"/>
<text class="t-b dyn-ret-0" x="294.2" y="121.0" text-anchor="middle" style="direction:ltr">return = none</text>
<text class="t-b dyn-ret-1" x="294.2" y="121.0" text-anchor="middle" style="direction:ltr">return = 4</text>
<text class="t-b dyn-ret-2" x="294.2" y="121.0" text-anchor="middle" style="direction:ltr">return = 5</text>
</g>
<g id="el-fds">
<rect class="n-box shp" x="85.8" y="178.0" width="416.7" height="44.0" rx="8"/>
<text class="t-b dyn-fds-0" x="294.2" y="205.0" text-anchor="middle" style="direction:ltr">fd 3 = listen</text>
<text class="t-b dyn-fds-1" x="294.2" y="205.0" text-anchor="middle" style="direction:ltr">fd 3 = listen, fd 4 = client A</text>
<text class="t-b dyn-fds-2" x="294.2" y="205.0" text-anchor="middle" style="direction:ltr">fd 3 = listen, fd 4 = client A, fd 5 = client B</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="24.9" y="262.0" width="538.6" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="294.2" y="290.0" text-anchor="middle">הסוקט המאזין מספר 3 ממתין לחיבורים חדשים</text>
<text class="t dyn-note-1" x="294.2" y="290.0" text-anchor="middle">הלקוח הראשון קיבל סוקט משלו, והסוקט המאזין ממשיך להאזין</text>
<text class="t dyn-note-2" x="294.2" y="290.0" text-anchor="middle">גם הלקוח השני קיבל סוקט נפרד, ושלושת המתארים פתוחים יחד</text>
</g>
<g id="el-cap">
<text class="small" x="294.2" y="361.0" text-anchor="middle">סגירת סוקט הלקוח לא סוגרת את הסוקט המאזין, ולכן השרת יכול להמשיך לקבל חיבורים</text>
</g>
</svg>
