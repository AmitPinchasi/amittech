.dyn-call-2{animation-name:k-dyn-call-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ret-0{opacity:0;}
@keyframes k-dyn-ret-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-ret-0{animation-name:k-dyn-ret-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ret-1{opacity:0;}
@keyframes k-dyn-ret-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}41.30%{opacity:1;}45.11%{opacity:0;}100.00%{opacity:0;}}
.dyn-ret-1{animation-name:k-dyn-ret-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ret-2{opacity:1;}
