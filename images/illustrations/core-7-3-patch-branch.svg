<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 441 441" width="441" role="img" aria-label="עקיפת בדיקת סיסמה ב-GDB: שינוי ערך האוגר rax מ-0 ל-1 גורם לפקודה je לא לקפוץ, כך שהתוכנית ממשיכה אל access granted במקום access denied">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}20.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-set{0.00%{stroke-width:1.5;}13.96%{stroke-width:1.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}37.39%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-set .shp{animation-name:k-set;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-test{0.00%{stroke-width:1.5;}31.08%{stroke-width:1.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}54.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-test .shp{animation-name:k-test;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-je{0.00%{stroke-width:1.5;}48.20%{stroke-width:1.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}71.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-je .shp{animation-name:k-je;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-granted{0.00%{stroke-width:1.5;}65.32%{stroke-width:1.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-granted .shp{animation-name:k-granted;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.96%{stroke-width:1.6;}17.12%{stroke:var(--pink);stroke-width:2.4;}34.23%{stroke:var(--pink);stroke-width:2.4;}37.39%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}31.08%{stroke-width:1.6;}34.23%{stroke:var(--pink);stroke-width:2.4;}51.35%{stroke:var(--pink);stroke-width:2.4;}54.50%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}48.20%{stroke-width:1.6;}51.35%{stroke:var(--pink);stroke-width:2.4;}68.47%{stroke:var(--pink);stroke-width:2.4;}71.62%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}65.32%{stroke-width:1.6;}68.47%{stroke:var(--pink);stroke-width:2.4;}85.59%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-test-0{opacity:0;}
@keyframes k-dyn-test-0{0.00%{opacity:1;}34.23%{opacity:1;}37.39%{opacity:0;}100.00%{opacity:0;}}
.dyn-test-0{animation-name:k-dyn-test-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-test-1{opacity:1;}
@keyframes k-dyn-test-1{0.00%{opacity:0;}31.08%{opacity:0;}34.23%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-test-1{animation-name:k-dyn-test-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-je-0{opacity:0;}
@keyframes k-dyn-je-0{0.00%{opacity:1;}51.35%{opacity:1;}54.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-je-0{animation-name:k-dyn-je-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-je-1{opacity:1;}
@keyframes k-dyn-je-1{0.00%{opacity:0;}48.20%{opacity:0;}51.35%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-je-1{animation-name:k-dyn-je-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="119.8,54.0 119.8,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="119.8,132.0 119.8,172.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="119.8,210.0 119.8,250.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="119.8,339.4 119.8,379.4" marker-end="url(#arr)"/>
<text class="lbl" x="133.8" y="363.4" text-anchor="end">לא</text>
<polyline id="edge-4" class="edge" points="209.1,294.7 275.1,294.7" marker-end="url(#arr)"/>
<text class="lbl" x="242.1" y="282.7" text-anchor="middle">כן</text>
<g id="el-call">
<rect class="n-code-bg shp" x="16.0" y="16.0" width="207.5" height="38.0" rx="7"/>
<text class="code" x="119.8" y="43.0" text-anchor="middle">call check_password</text>
</g>
<g id="el-set">
<rect class="n-code-bg shp" x="47.6" y="94.0" width="144.3" height="38.0" rx="7"/>
<text class="code" x="119.8" y="121.0" text-anchor="middle">set $eax = 1</text>
</g>
<g id="el-test">
<rect class="n-code-bg shp" x="34.1" y="172.0" width="171.4" height="38.0" rx="7"/>
<text class="code dyn-test-0" x="119.8" y="199.0" text-anchor="middle">test eax, eax</text>
<text class="code dyn-test-1" x="119.8" y="199.0" text-anchor="middle">eax = 1, ZF = 0</text>
</g>
<g id="el-je">
<polygon class="n-dia shp" points="119.8,250.0 209.1,294.7 119.8,339.4 30.4,294.7"/>
<text class="code dyn-je-0" x="119.8" y="299.7" text-anchor="middle">je denied</text>
<text class="code dyn-je-1" x="119.8" y="299.7" text-anchor="middle">ZF = 1 ?</text>
</g>
<g id="el-granted">
<rect class="n-box shp" x="40.6" y="379.4" width="158.2" height="46.0" rx="8"/>
<text class="t" x="119.8" y="407.4" text-anchor="middle" style="direction:ltr">access granted</text>
</g>
<g id="el-denied">
<rect class="n-box shp" x="275.1" y="271.7" width="149.8" height="46.0" rx="8"/>
<text class="t" x="350.0" y="299.7" text-anchor="middle" style="direction:ltr">access denied</text>
</g>
</svg>
