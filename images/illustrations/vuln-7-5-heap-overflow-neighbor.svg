<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 882 710" width="882" role="img" aria-label="גלישת heap מתוך נתוני המשתמש של chunk A ממשיכה כלפי כתובות גבוהות אל תוך המטא-דאטה של השכן הפיזי chunk B, ודורסת קודם את prev_size ואז את size שהמקצה קורא כדי לקבל החלטות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-a_data{0.00%{stroke:var(--pink);stroke-width:2.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}30.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-a_data .shp{animation-name:k-a_data;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-boundary{0.00%{stroke:var(--pink);stroke-width:2.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}30.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-boundary .shp{animation-name:k-boundary;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-b_prevsize{0.00%{stroke-width:1.5;}21.23%{stroke-width:1.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}56.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-b_prevsize .shp{animation-name:k-b_prevsize;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-b_size{0.00%{stroke-width:1.5;}47.26%{stroke-width:1.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}78.08%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-b_size .shp{animation-name:k-b_size;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-b_prevsize-0{opacity:0;}
@keyframes k-dyn-b_prevsize-0{0.00%{opacity:1;}26.03%{opacity:1;}30.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-b_prevsize-0{animation-name:k-dyn-b_prevsize-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-b_prevsize-1{opacity:1;}
@keyframes k-dyn-b_prevsize-1{0.00%{opacity:0;}21.23%{opacity:0;}26.03%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-b_prevsize-1{animation-name:k-dyn-b_prevsize-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-b_size-0{opacity:0;}
@keyframes k-dyn-b_size-0{0.00%{opacity:1;}52.05%{opacity:1;}56.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-b_size-0{animation-name:k-dyn-b_size-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-b_size-1{opacity:1;}
@keyframes k-dyn-b_size-1{0.00%{opacity:0;}47.26%{opacity:0;}52.05%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-b_size-1{animation-name:k-dyn-b_size-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}26.03%{opacity:1;}30.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}21.23%{opacity:0;}26.03%{opacity:1;}52.05%{opacity:1;}56.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:1;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}47.26%{opacity:0;}52.05%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-lowaddr">
<text class="small" x="441.2" y="29.0" text-anchor="middle">כתובות נמוכות</text>
</g>
<g id="el-a_size">
<rect class="n-box shp" x="334.7" y="74.0" width="213.0" height="46.0" rx="8"/>
<text class="t" x="441.2" y="102.0" text-anchor="middle" style="direction:ltr">size = 0x21  (chunk A)</text>
</g>
<g id="el-a_mem">
<text class="small" x="441.2" y="173.0" text-anchor="middle">mem של A - מכאן הכתיבה מתחילה</text>
</g>
<g id="el-a_data">
<rect class="n-box shp" x="319.6" y="218.0" width="243.2" height="46.0" rx="8"/>
<text class="t" x="441.2" y="246.0" text-anchor="middle">נתוני המשתמש של chunk A</text>
</g>
<g id="el-boundary">
<text class="small" x="441.2" y="317.0" text-anchor="middle">גבול chunk A מול chunk B - השכן הפיזי</text>
</g>
<g id="el-b_prevsize">
<rect class="n-box shp" x="270.9" y="362.0" width="340.7" height="46.0" rx="8"/>
<text class="t dyn-b_prevsize-0" x="441.2" y="390.0" text-anchor="middle">prev_size (B) - תקין</text>
<text class="t dyn-b_prevsize-1" x="441.2" y="390.0" text-anchor="middle">prev_size (B) - נדרס על ידי הoverflow</text>
</g>
<g id="el-b_size">
<rect class="n-box shp" x="258.3" y="448.0" width="365.9" height="46.0" rx="8"/>
<text class="t dyn-b_size-0" x="441.2" y="476.0" text-anchor="middle">size (B) + דגלים - תקין</text>
<text class="t dyn-b_size-1" x="441.2" y="476.0" text-anchor="middle">size (B) + דגלים - נדרס על ידי הoverflow</text>
</g>
<g id="el-b_mem">
<text class="small" x="441.2" y="547.0" text-anchor="middle">mem של B - נתוני B</text>
</g>
<g id="el-highaddr">
<text class="small" x="441.2" y="605.0" text-anchor="middle">כתובות גבוהות</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="650.0" width="850.4" height="44.0" rx="8"/>
<text class="t-b dyn-note-0" x="441.2" y="677.0" text-anchor="middle">כתיבה ל-chunk A מתחילה בנתוני המשתמש ומתקדמת כלפי כתובות גבוהות</text>
<text class="t-b dyn-note-1" x="441.2" y="677.0" text-anchor="middle">כתיבה ארוכה מהמוקצה ממשיכה אל chunk B - קודם נדרס ה-prev_size</text>
<text class="t-b dyn-note-2" x="441.2" y="677.0" text-anchor="middle">ואז נדרס גם ה-size - המקצה קורא שדות אלה כדי לקבל החלטות, ושליטה בהם משפיעה ישירות עליו</text>
</g>
</svg>
