<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 322" width="490" role="img" aria-label="ריצה סדרתית מול מקבילית: שלוש בקשות סדרתיות לוקחות שלוש שניות, ואילו Promise.all מריץ אותן יחד בשנייה אחת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-seqtitle{0.00%{stroke:var(--pink);stroke-width:2.5;}12.50%{stroke:var(--pink);stroke-width:2.5;}15.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-seqtitle .shp{animation-name:k-seqtitle;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-seq{0.00%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}52.73%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-seq .shp{animation-name:k-seq;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-paratitle{0.00%{stroke-width:1.5;}47.27%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}62.50%{stroke:var(--pink);stroke-width:2.5;}65.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-paratitle .shp{animation-name:k-paratitle;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-par{0.00%{stroke-width:1.5;}47.27%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}87.50%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-par .shp{animation-name:k-par;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seq-0{opacity:0;}
@keyframes k-dyn-seq-0{0.00%{opacity:1;}12.50%{opacity:1;}15.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-seq-0{animation-name:k-dyn-seq-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seq-1{opacity:0;}
@keyframes k-dyn-seq-1{0.00%{opacity:0;}9.77%{opacity:0;}12.50%{opacity:1;}25.00%{opacity:1;}27.73%{opacity:0;}100.00%{opacity:0;}}
.dyn-seq-1{animation-name:k-dyn-seq-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seq-2{opacity:0;}
@keyframes k-dyn-seq-2{0.00%{opacity:0;}22.27%{opacity:0;}25.00%{opacity:1;}37.50%{opacity:1;}40.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-seq-2{animation-name:k-dyn-seq-2;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-seq-3{opacity:1;}
@keyframes k-dyn-seq-3{0.00%{opacity:0;}34.77%{opacity:0;}37.50%{opacity:1;}87.50%{opacity:1;}100.00%{opacity:1;}}
.dyn-seq-3{animation-name:k-dyn-seq-3;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-par-0{opacity:0;}
@keyframes k-dyn-par-0{0.00%{opacity:1;}62.50%{opacity:1;}65.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-par-0{animation-name:k-dyn-par-0;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-par-1{opacity:0;}
@keyframes k-dyn-par-1{0.00%{opacity:0;}59.77%{opacity:0;}62.50%{opacity:1;}75.00%{opacity:1;}77.73%{opacity:0;}100.00%{opacity:0;}}
.dyn-par-1{animation-name:k-dyn-par-1;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-par-2{opacity:1;}
@keyframes k-dyn-par-2{0.00%{opacity:0;}72.27%{opacity:0;}75.00%{opacity:1;}87.50%{opacity:1;}100.00%{opacity:1;}}
.dyn-par-2{animation-name:k-dyn-par-2;animation-duration:12.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-seqtitle">
<text class="small" x="245.1" y="29.0" text-anchor="middle">סדרתי - await אחרי await</text>
</g>
<g id="el-seq">
<rect class="n-code-bg shp" x="141.4" y="74.0" width="207.5" height="38.0" rx="7"/>
<text class="code dyn-seq-0" x="245.1" y="101.0" text-anchor="middle">זמן שחלף: 0s</text>
<text class="code dyn-seq-1" x="245.1" y="101.0" text-anchor="middle">בקשה 1 הסתיימה - 1s</text>
<text class="code dyn-seq-2" x="245.1" y="101.0" text-anchor="middle">בקשה 2 הסתיימה - 2s</text>
<text class="code dyn-seq-3" x="245.1" y="101.0" text-anchor="middle">בקשה 3 הסתיימה - 3s</text>
</g>
<g id="el-paratitle">
<text class="small" x="245.1" y="165.0" text-anchor="middle">מקבילי - Promise.all</text>
</g>
<g id="el-par">
<rect class="n-code-bg shp" x="114.3" y="210.0" width="261.7" height="38.0" rx="7"/>
<text class="code dyn-par-0" x="245.1" y="237.0" text-anchor="middle">זמן שחלף: 0s</text>
<text class="code dyn-par-1" x="245.1" y="237.0" text-anchor="middle">שלוש הבקשות רצות יחד - 1s</text>
<text class="code dyn-par-2" x="245.1" y="237.0" text-anchor="middle">כולן הסתיימו - 1s</text>
</g>
<g id="el-note">
<text class="small" x="245.1" y="301.0" text-anchor="middle">כשהבקשות לא תלויות זו בזו, Promise.all חוסך זמן כי הן רצות במקביל</text>
</g>
</svg>
