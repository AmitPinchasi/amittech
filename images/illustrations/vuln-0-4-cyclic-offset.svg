.dyn-gen-1{opacity:1;}
@keyframes k-dyn-gen-1{0.00%{opacity:0;}10.21%{opacity:0;}12.68%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-gen-1{animation-name:k-dyn-gen-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rip-0{opacity:0;}
@keyframes k-dyn-rip-0{0.00%{opacity:1;}38.03%{opacity:1;}40.49%{opacity:0;}100.00%{opacity:0;}}
.dyn-rip-0{animation-name:k-dyn-rip-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-rip-1{opacity:1;}
@keyframes k-dyn-rip-1{0.00%{opacity:0;}35.56%{opacity:0;}38.03%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-rip-1{animation-name:k-dyn-rip-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-find-0{opacity:0;}
@keyframes k-dyn-find-0{0.00%{opacity:1;}50.70%{opacity:1;}53.17%{opacity:0;}100.00%{opacity:0;}}
.dyn-find-0{animation-name:k-dyn-find-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-find-1{opacity:1;}
@keyframes k-dyn-find-1{0.00%{opacity:0;}48.24%{opacity:0;}50.70%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-find-1{animation-name:k-dyn-find-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-0{opacity:0;}
@keyframes k-dyn-res-0{0.00%{opacity:1;}63.38%{opacity:1;}65.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-res-0{animation-name:k-dyn-res-0;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-res-1{opacity:1;}
@keyframes k-dyn-res-1{0.00%{opacity:0;}60.92%{opacity:0;}63.38%{opacity:1;}88.73%{opacity:1;}100.00%{opacity:1;}}
.dyn-res-1{animation-name:k-dyn-res-1;animation-duration:14.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
