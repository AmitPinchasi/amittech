<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 570 242" width="570" role="img" aria-label="תבנית Strategy: החלפת אסטרטגיית המיון בזמן ריצה משנה את סדר המשימות בתוצאה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-strat-0{0.00%{stroke:var(--pink);stroke-width:2.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}30.82%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-strat-c0{animation-name:k-strat-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-strat-1{0.00%{stroke-width:1.5;}21.23%{stroke-width:1.5;}26.03%{stroke:var(--pink);stroke-width:2.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}56.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-strat-c1{animation-name:k-strat-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-strat-2{0.00%{stroke-width:1.5;}47.26%{stroke-width:1.5;}52.05%{stroke:var(--pink);stroke-width:2.5;}78.08%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-strat-c2{animation-name:k-strat-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}21.23%{transform:translateX(0.0px);}26.03%{transform:translateX(-184.8px);}47.26%{transform:translateX(-184.8px);}52.05%{transform:translateX(-369.5px);}73.29%{transform:translateX(-369.5px);}100.00%{transform:translateX(-369.5px);}}
#eg-0{animation-name:k-mv-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-result-0{opacity:0;}
@keyframes k-dyn-result-0{0.00%{opacity:1;}26.03%{opacity:1;}30.82%{opacity:0;}100.00%{opacity:0;}}
.dyn-result-0{animation-name:k-dyn-result-0;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-result-1{opacity:0;}
@keyframes k-dyn-result-1{0.00%{opacity:0;}21.23%{opacity:0;}26.03%{opacity:1;}52.05%{opacity:1;}56.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-result-1{animation-name:k-dyn-result-1;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-result-2{opacity:1;}
@keyframes k-dyn-result-2{0.00%{opacity:0;}47.26%{opacity:0;}52.05%{opacity:1;}78.08%{opacity:1;}100.00%{opacity:1;}}
.dyn-result-2{animation-name:k-dyn-result-2;animation-duration:7.30s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-ctx">
<rect class="n-code-bg shp" x="143.3" y="16.0" width="279.7" height="38.0" rx="7"/>
<text class="code" x="283.1" y="43.0" text-anchor="middle">TaskList.get_sorted_tasks()</text>
</g>
<g id="el-strat">
<rect id="el-strat-c0" class="n-cell shp" x="385.5" y="94.0" width="164.8" height="46.0" rx="6"/>
<text class="t" x="467.9" y="122.0" text-anchor="middle">מיון לפי תאריך</text>
<rect id="el-strat-c1" class="n-cell shp" x="200.8" y="94.0" width="164.8" height="46.0" rx="6"/>
<text class="t" x="283.1" y="122.0" text-anchor="middle">מיון לפי עדיפות</text>
<rect id="el-strat-c2" class="n-cell shp" x="16.0" y="94.0" width="164.8" height="46.0" rx="6"/>
<text class="t" x="98.4" y="122.0" text-anchor="middle">מיון לפי כותרת</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="467.9,140.0 467.9,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="479.9" y="164.0" text-anchor="end">תוצאה</text>
<g id="el-result">
<rect class="n-box shp" x="381.4" y="180.0" width="173.0" height="46.0" rx="8"/>
<text class="t dyn-result-0" x="467.9" y="208.0" text-anchor="middle" style="direction:ltr">Doc, Review, Fix</text>
<text class="t dyn-result-1" x="467.9" y="208.0" text-anchor="middle" style="direction:ltr">Fix, Review, Doc</text>
<text class="t dyn-result-2" x="467.9" y="208.0" text-anchor="middle" style="direction:ltr">Fix, Doc, Review</text>
</g>
</g>
</svg>
