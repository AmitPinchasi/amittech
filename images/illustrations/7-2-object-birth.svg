<text class="code" x="214.6" y="284.3" text-anchor="middle">isinstance(obj, cls)</text>
</g>
<g id="el-init">
<rect class="n-box shp" x="78.2" y="418.6" width="272.8" height="46.0" rx="8"/>
<text class="t" x="214.6" y="446.6" text-anchor="middle">המתודה __init__ מאתחלת שדות</text>
</g>
<g id="el-done">
<rect class="n-box shp" x="116.5" y="504.6" width="196.2" height="46.0" rx="8"/>
<text class="t" x="214.6" y="532.6" text-anchor="middle">האובייקט obj מוכן</text>
</g>
<g id="el-skip">
<rect class="n-box shp" x="479.2" y="256.3" width="190.5" height="46.0" rx="8"/>
