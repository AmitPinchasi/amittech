<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 722 503" width="722" role="img" aria-label="בדיקת הסריאליזציה של props שעוברים מקומפוננטת שרת לקומפוננטת קליינט">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
