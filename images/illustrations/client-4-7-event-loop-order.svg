<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 568 526" width="568" role="img" aria-label="לולאת האירועים מרוקנת קודם את הקוד הסינכרוני, אחר כך את כל המיקרו-משימות, ורק בסוף משימה מהמאקרו-תור">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
