@keyframes k-edge-2{0.00%{stroke-width:1.6;}21.39%{stroke-width:1.6;}23.08%{stroke:var(--pink);stroke-width:2.4;}30.77%{stroke:var(--pink);stroke-width:2.4;}32.45%{stroke-width:1.6;}44.47%{stroke-width:1.6;}46.15%{stroke:var(--pink);stroke-width:2.4;}53.85%{stroke:var(--pink);stroke-width:2.4;}55.53%{stroke-width:1.6;}67.55%{stroke-width:1.6;}69.23%{stroke:var(--pink);stroke-width:2.4;}76.92%{stroke:var(--pink);stroke-width:2.4;}78.61%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
