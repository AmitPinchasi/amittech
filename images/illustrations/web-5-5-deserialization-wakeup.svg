<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 975 509" width="975" role="img" aria-label="מנגנון deserialization מול הגנת whitelist מחלקות: כיצד אובייקט מסודר זדוני מפעיל את wakeup ומריץ פקודת מערכת, וכיצד הגבלת המחלקות המותרות מונעת זאת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-input{0.00%{stroke:var(--pink);stroke-width:2.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}17.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-input .shp{animation-name:k-input;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-check{0.00%{stroke-width:1.5;}11.44%{stroke-width:1.5;}14.41%{stroke:var(--pink);stroke-width:2.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}31.78%{stroke-width:1.5;}40.25%{stroke-width:1.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}60.59%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-check .shp{animation-name:k-check;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-safe{0.00%{stroke-width:1.5;}25.85%{stroke-width:1.5;}28.81%{stroke:var(--pink);stroke-width:2.5;}43.22%{stroke:var(--pink);stroke-width:2.5;}46.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-safe .shp{animation-name:k-safe;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-build{0.00%{stroke-width:1.5;}54.66%{stroke-width:1.5;}57.63%{stroke:var(--pink);stroke-width:2.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-build .shp{animation-name:k-build;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-wakeup{0.00%{stroke-width:1.5;}69.07%{stroke-width:1.5;}72.03%{stroke:var(--pink);stroke-width:2.5;}86.44%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-wakeup .shp{animation-name:k-wakeup;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.44%{stroke-width:1.6;}14.41%{stroke:var(--pink);stroke-width:2.4;}28.81%{stroke:var(--pink);stroke-width:2.4;}31.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}25.85%{stroke-width:1.6;}28.81%{stroke:var(--pink);stroke-width:2.4;}43.22%{stroke:var(--pink);stroke-width:2.4;}46.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}54.66%{stroke-width:1.6;}57.63%{stroke:var(--pink);stroke-width:2.4;}72.03%{stroke:var(--pink);stroke-width:2.4;}75.00%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}69.07%{stroke-width:1.6;}72.03%{stroke:var(--pink);stroke-width:2.4;}86.44%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="235.2,62.0 235.2,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="235.2,321.2 235.2,361.2" marker-end="url(#arr)"/>
<text class="lbl" x="249.2" y="345.2" text-anchor="end">לא</text>
<polyline id="edge-2" class="edge" points="235.2,407.2 235.2,447.2" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="454.3,211.6 520.3,211.6" marker-end="url(#arr)"/>
<text class="lbl" x="487.3" y="199.6" text-anchor="middle">כן</text>
<g id="el-input">
<rect class="n-box shp" x="77.8" y="16.0" width="314.8" height="46.0" rx="8"/>
<text class="t" x="235.2" y="44.0" text-anchor="middle">קלט: אובייקט serialized מהמשתמש</text>
</g>
<g id="el-check">
<polygon class="n-dia shp" points="235.2,102.0 454.3,211.6 235.2,321.2 16.0,211.6"/>
<text class="t" x="235.2" y="216.6" text-anchor="middle">מוגבל ל-allowed_classes?</text>
</g>
<g id="el-build">
<rect class="n-box shp" x="60.6" y="361.2" width="349.1" height="46.0" rx="8"/>
<text class="t" x="235.2" y="389.2" text-anchor="middle">unserialize בונה אובייקט Evil עם cmd</text>
</g>
<g id="el-wakeup">
<rect class="n-box shp" x="104.3" y="447.2" width="261.7" height="46.0" rx="8"/>
<text class="t" x="235.2" y="475.2" text-anchor="middle">wakeup מריץ את cmd על השרת</text>
</g>
<g id="el-safe">
<rect class="n-box shp" x="520.3" y="188.6" width="438.8" height="46.0" rx="8"/>
<text class="t" x="739.7" y="216.6" text-anchor="middle">Evil לא ברשימה - unserialize דוחה, אין הרצת קוד</text>
</g>
</svg>
