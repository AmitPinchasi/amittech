<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 577 298" width="577" role="img" aria-label="מבנה טוקן JWT: שלושה חלקים מופרדים בנקודות - כותרת, מטען וחתימה - וכל חלק מקודד ב-Base64URL">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-token{0.00%{stroke:var(--pink);stroke-width:2.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}24.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-token .shp{animation-name:k-token;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-parts-0{0.00%{stroke-width:1.5;}15.62%{stroke-width:1.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}44.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-parts-c0{animation-name:k-parts-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-parts-1{0.00%{stroke-width:1.5;}35.62%{stroke-width:1.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}64.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-parts-c1{animation-name:k-parts-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-parts-2{0.00%{stroke-width:1.5;}55.62%{stroke-width:1.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-parts-c2{animation-name:k-parts-2;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}15.62%{transform:translateX(0.0px);}20.00%{transform:translateX(0.0px);}35.62%{transform:translateX(0.0px);}40.00%{transform:translateX(-116.0px);}55.62%{transform:translateX(-116.0px);}60.00%{transform:translateX(-232.0px);}75.62%{transform:translateX(-232.0px);}100.00%{transform:translateX(-232.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:1;}40.00%{opacity:1;}44.38%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:0;}
@keyframes k-dyn-val-1{0.00%{opacity:0;}35.62%{opacity:0;}40.00%{opacity:1;}60.00%{opacity:1;}64.38%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-2{opacity:1;}
@keyframes k-dyn-val-2{0.00%{opacity:0;}55.62%{opacity:0;}60.00%{opacity:1;}80.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-2{animation-name:k-dyn-val-2;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-token">
<rect class="n-code-bg shp" x="162.1" y="16.0" width="252.7" height="38.0" rx="7"/>
<text class="code" x="288.4" y="43.0" text-anchor="middle">header.payload.signature</text>
</g>
<g id="el-parts">
<rect id="el-parts-c0" class="n-cell shp" x="356.4" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="404.4" y="122.0" text-anchor="middle">כותרת</text>
<rect id="el-parts-c1" class="n-cell shp" x="240.4" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="288.4" y="122.0" text-anchor="middle">מטען</text>
<rect id="el-parts-c2" class="n-cell shp" x="124.4" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="172.4" y="122.0" text-anchor="middle">חתימה</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="404.4,140.0 404.4,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="416.4" y="164.0" text-anchor="end">תוכן החלק</text>
<g id="el-val">
<rect class="n-box shp" x="321.3" y="180.0" width="166.2" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="404.4" y="207.0" text-anchor="middle" style="direction:ltr">alg + typ</text>
<text class="t-b dyn-val-1" x="404.4" y="207.0" text-anchor="middle" style="direction:ltr">user, role, exp</text>
<text class="t-b dyn-val-2" x="404.4" y="207.0" text-anchor="middle" style="direction:ltr">HMAC(secret)</text>
</g>
</g>
<g id="el-note">
<text class="small" x="288.4" y="277.0" text-anchor="middle">החתימה נוצרת מהכותרת והמטען יחד עם הסוד - שינוי המטען ללא הסוד פוסל את הטוקן</text>
</g>
</svg>
