<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 497 386" width="497" role="img" aria-label="עקיפת WAF בזיהום פרמטרים: ה-WAF בודק את הערך הראשון של הפרמטר הכפול ורואה ערך תקין, בעוד PHP לוקח את הערך האחרון ומקבל את ההזרקה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}24.46%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-waf{0.00%{stroke-width:1.5;}16.85%{stroke-width:1.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}45.11%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-waf .shp{animation-name:k-waf;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-fwd{0.00%{stroke-width:1.5;}37.50%{stroke-width:1.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}65.76%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-fwd .shp{animation-name:k-fwd;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-php{0.00%{stroke-width:1.5;}58.15%{stroke-width:1.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-php .shp{animation-name:k-php;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.85%{stroke-width:1.6;}20.65%{stroke:var(--pink);stroke-width:2.4;}41.30%{stroke:var(--pink);stroke-width:2.4;}45.11%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}37.50%{stroke-width:1.6;}41.30%{stroke:var(--pink);stroke-width:2.4;}61.96%{stroke:var(--pink);stroke-width:2.4;}65.76%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}58.15%{stroke-width:1.6;}61.96%{stroke:var(--pink);stroke-width:2.4;}82.61%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-waf-0{opacity:0;}
@keyframes k-dyn-waf-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-waf-0{animation-name:k-dyn-waf-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-waf-1{opacity:1;}
@keyframes k-dyn-waf-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-waf-1{animation-name:k-dyn-waf-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-php-0{opacity:0;}
@keyframes k-dyn-php-0{0.00%{opacity:1;}61.96%{opacity:1;}65.76%{opacity:0;}100.00%{opacity:0;}}
.dyn-php-0{animation-name:k-dyn-php-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-php-1{opacity:1;}
@keyframes k-dyn-php-1{0.00%{opacity:0;}58.15%{opacity:0;}61.96%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-php-1{animation-name:k-dyn-php-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="248.5,54.0 248.5,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="248.5,140.0 248.5,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="248.5,226.0 248.5,266.0" marker-end="url(#arr)"/>
<g id="el-req">
<rect class="n-code-bg shp" x="104.1" y="16.0" width="288.8" height="38.0" rx="7"/>
<text class="code" x="248.5" y="43.0" text-anchor="middle">?id=1&amp;id=1' UNION SELECT pwd</text>
</g>
<g id="el-waf">
<rect class="n-box shp" x="122.3" y="94.0" width="252.3" height="46.0" rx="8"/>
<text class="t dyn-waf-0" x="248.5" y="122.0" text-anchor="middle">בדיקת הערך הראשון ב-WAF</text>
<text class="t dyn-waf-1" x="248.5" y="122.0" text-anchor="middle">הערך id=1 - נראה תקין</text>
</g>
<g id="el-fwd">
<rect class="n-box shp" x="120.8" y="180.0" width="255.3" height="46.0" rx="8"/>
<text class="t" x="248.5" y="208.0" text-anchor="middle">אין התאמה - הבקשה מועברת</text>
</g>
<g id="el-php">
<rect class="n-box shp" x="74.9" y="266.0" width="347.1" height="46.0" rx="8"/>
<text class="t dyn-php-0" x="248.5" y="294.0" text-anchor="middle">PHP לוקח את הערך האחרון</text>
<text class="t dyn-php-1" x="248.5" y="294.0" text-anchor="middle">הערך id=1' UNION SELECT pwd - הזרקה</text>
</g>
<g id="el-note">
<text class="small" x="248.5" y="365.0" text-anchor="middle">הלקח ההגנתי: לדחות פרמטרים כפולים ולאחד את הפרסור בין ה-WAF לשרת</text>
</g>
</svg>
