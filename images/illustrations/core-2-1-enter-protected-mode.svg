.dyn-mode-0{opacity:0;}
@keyframes k-dyn-mode-0{0.00%{opacity:1;}56.25%{opacity:1;}58.44%{opacity:0;}100.00%{opacity:0;}}
.dyn-mode-0{animation-name:k-dyn-mode-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-mode-1{opacity:0;}
@keyframes k-dyn-mode-1{0.00%{opacity:0;}54.06%{opacity:0;}56.25%{opacity:1;}67.50%{opacity:1;}69.69%{opacity:0;}100.00%{opacity:0;}}
.dyn-mode-1{animation-name:k-dyn-mode-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-mode-2{opacity:1;}
@keyframes k-dyn-mode-2{0.00%{opacity:0;}65.31%{opacity:0;}67.50%{opacity:1;}90.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-mode-2{animation-name:k-dyn-mode-2;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
