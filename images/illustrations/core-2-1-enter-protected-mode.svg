#el-lgdt .shp{animation-name:k-lgdt;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-pe{0.00%{stroke-width:1.5;}42.81%{stroke-width:1.5;}45.00%{stroke:var(--pink);stroke-width:2.5;}56.25%{stroke:var(--pink);stroke-width:2.5;}58.44%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-pe .shp{animation-name:k-pe;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cr0{0.00%{stroke-width:1.5;}54.06%{stroke-width:1.5;}56.25%{stroke:var(--pink);stroke-width:2.5;}67.50%{stroke:var(--pink);stroke-width:2.5;}69.69%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
