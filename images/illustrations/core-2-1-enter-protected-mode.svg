<g id="el-boot">
<rect class="n-box shp" x="72.6" y="16.0" width="351.1" height="46.0" rx="8"/>
<text class="t" x="248.2" y="44.0" text-anchor="middle">המחשב נדלק והמעבד מתחיל ב-Real Mode</text>
</g>
<g id="el-bios">
<rect class="n-box shp" x="47.2" y="102.0" width="401.8" height="46.0" rx="8"/>
<text class="t" x="248.2" y="130.0" text-anchor="middle">ה-BIOS מגדיר את טבלת ה-ivt ומריץ את הקרנל</text>
</g>
<g id="el-gdt">
<rect class="n-box shp" x="31.5" y="188.0" width="433.4" height="46.0" rx="8"/>
<text class="t" x="248.2" y="216.0" text-anchor="middle">הקרנל בונה את טבלת ה-GDT עם הרשאות לכל סגמנט</text>
</g>
<g id="el-lgdt">
<rect class="n-code-bg shp" x="167.0" y="274.0" width="162.4" height="60.0" rx="7"/>
<text class="code" x="248.2" y="301.0" text-anchor="middle">cli</text>
<text class="code" x="248.2" y="323.0" text-anchor="middle">lgdt [gdt_ptr]</text>
</g>
<g id="el-pe">
<rect class="n-box shp" x="95.3" y="374.0" width="305.7" height="46.0" rx="8"/>
<text class="t" x="248.2" y="402.0" text-anchor="middle">הדלקת הביט הראשון ברגיסטר cr0</text>
</g>
<g id="el-cr0">
