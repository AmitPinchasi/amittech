<text class="t-b dyn-mode-0" x="248.2" y="773.0" text-anchor="middle" style="direction:ltr">mode = Real Mode, Ring 0</text>
<text class="t-b dyn-mode-1" x="248.2" y="773.0" text-anchor="middle" style="direction:ltr">mode = Protected Mode, Ring 0</text>
<text class="t-b dyn-mode-2" x="248.2" y="773.0" text-anchor="middle" style="direction:ltr">mode = Protected Mode, Ring 3</text>
</g>
