@keyframes k-edge-6{0.00%{stroke-width:1.6;}76.56%{stroke-width:1.6;}78.75%{stroke:var(--pink);stroke-width:2.4;}90.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
