@keyframes k-edge-2{0.00%{stroke-width:1.6;}31.56%{stroke-width:1.6;}33.75%{stroke:var(--pink);stroke-width:2.4;}45.00%{stroke:var(--pink);stroke-width:2.4;}47.19%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
