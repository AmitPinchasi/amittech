<text class="code" x="248.2" y="487.0" text-anchor="middle">mov eax, cr0</text>
<text class="code" x="248.2" y="509.0" text-anchor="middle">or eax, 1</text>
<text class="code" x="248.2" y="531.0" text-anchor="middle">mov cr0, eax</text>
</g>
<g id="el-jump">
<rect class="n-code-bg shp" x="153.4" y="582.0" width="189.5" height="38.0" rx="7"/>
<text class="code" x="248.2" y="609.0" text-anchor="middle">jmp 0x23:pm_entry</text>
</g>
<g id="el-done">
