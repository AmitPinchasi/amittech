<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 741 380" width="741" role="img" aria-label="אותו קוד בדיוק: גישה מאוחדת עם stride אחד מול גישה מפוזרת עם stride גדול משנה את מספר ה-transactions ואת רוחב הפס פי 18">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-code .shp{animation-name:k-code;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-tx{0.00%{stroke:var(--pink);stroke-width:2.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-tx .shp{animation-name:k-tx;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-sect{0.00%{stroke:var(--pink);stroke-width:2.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-sect .shp{animation-name:k-sect;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-bw{0.00%{stroke:var(--pink);stroke-width:2.5;}71.43%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-bw .shp{animation-name:k-bw;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-code-0{opacity:1;}
@keyframes k-dyn-code-0{0.00%{opacity:0;}29.46%{opacity:0;}35.71%{opacity:1;}71.43%{opacity:1;}100.00%{opacity:1;}}
.dyn-code-0{animation-name:k-dyn-code-0;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-code-1{opacity:0;}
@keyframes k-dyn-code-1{0.00%{opacity:1;}35.71%{opacity:1;}41.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-code-1{animation-name:k-dyn-code-1;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-tx-0{opacity:1;}
@keyframes k-dyn-tx-0{0.00%{opacity:0;}29.46%{opacity:0;}35.71%{opacity:1;}71.43%{opacity:1;}100.00%{opacity:1;}}
.dyn-tx-0{animation-name:k-dyn-tx-0;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-tx-1{opacity:0;}
@keyframes k-dyn-tx-1{0.00%{opacity:1;}35.71%{opacity:1;}41.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-tx-1{animation-name:k-dyn-tx-1;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sect-0{opacity:1;}
@keyframes k-dyn-sect-0{0.00%{opacity:0;}29.46%{opacity:0;}35.71%{opacity:1;}71.43%{opacity:1;}100.00%{opacity:1;}}
.dyn-sect-0{animation-name:k-dyn-sect-0;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-sect-1{opacity:0;}
@keyframes k-dyn-sect-1{0.00%{opacity:1;}35.71%{opacity:1;}41.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-sect-1{animation-name:k-dyn-sect-1;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bw-0{opacity:1;}
@keyframes k-dyn-bw-0{0.00%{opacity:0;}29.46%{opacity:0;}35.71%{opacity:1;}71.43%{opacity:1;}100.00%{opacity:1;}}
.dyn-bw-0{animation-name:k-dyn-bw-0;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-bw-1{opacity:0;}
@keyframes k-dyn-bw-1{0.00%{opacity:1;}35.71%{opacity:1;}41.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-bw-1{animation-name:k-dyn-bw-1;animation-duration:5.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="266.9" y="16.0" width="207.5" height="38.0" rx="7"/>
<text class="code dyn-code-0" x="370.6" y="43.0" text-anchor="middle">in[t * 1]   (רציף)</text>
<text class="code dyn-code-1" x="370.6" y="43.0" text-anchor="middle">in[t * 32]  (מפוזר)</text>
</g>
<g id="el-tx">
<rect class="n-box shp" x="214.1" y="94.0" width="313.2" height="44.0" rx="8"/>
<text class="t-b dyn-tx-0" x="370.6" y="121.0" text-anchor="middle">transaction אחד של 128B ל-warp</text>
<text class="t-b dyn-tx-1" x="370.6" y="121.0" text-anchor="middle">32 transactions נפרדים ל-warp</text>
</g>
<g id="el-sect">
<rect class="n-box shp" x="265.7" y="178.0" width="209.9" height="44.0" rx="8"/>
<text class="t-b dyn-sect-0" x="370.6" y="205.0" text-anchor="middle" style="direction:ltr">sectors/request: 4</text>
<text class="t-b dyn-sect-1" x="370.6" y="205.0" text-anchor="middle" style="direction:ltr">sectors/request: 32</text>
</g>
<g id="el-bw">
<rect class="n-box shp" x="270.7" y="262.0" width="199.9" height="44.0" rx="8"/>
<text class="t-b dyn-bw-0" x="370.6" y="289.0" text-anchor="middle">רוחב פס: 206 GB/s</text>
<text class="t-b dyn-bw-1" x="370.6" y="289.0" text-anchor="middle">רוחב פס: 15 GB/s</text>
</g>
<g id="el-note">
<text class="small" x="370.6" y="359.0" text-anchor="middle">coalescing ממזג 32 קריאות רציפות ל-transaction אחד; ה-index של ה-thread חייב לרוץ על הממד הרציף בזיכרון</text>
</g>
</svg>
