<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 498 380" width="498" role="img" aria-label="מיפוי האופרנדים של extended asm: כל placeholder מקבל רגיסטר, והערכים זורמים מהקלטים אל הפלט">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-op2{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-op2 .shp{animation-name:k-op2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-op1{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-op1 .shp{animation-name:k-op1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-code{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-op0{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-op0 .shp{animation-name:k-op0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-code-0{opacity:0;}
@keyframes k-dyn-code-0{0.00%{opacity:1;}50.94%{opacity:1;}54.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-code-0{animation-name:k-dyn-code-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-code-1{opacity:1;}
@keyframes k-dyn-code-1{0.00%{opacity:0;}47.64%{opacity:0;}50.94%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-code-1{animation-name:k-dyn-code-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op2-0{opacity:1;}
@keyframes k-dyn-op2-0{0.00%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-op2-0{animation-name:k-dyn-op2-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op1-0{opacity:0;}
@keyframes k-dyn-op1-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-op1-0{animation-name:k-dyn-op1-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op1-1{opacity:1;}
@keyframes k-dyn-op1-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-op1-1{animation-name:k-dyn-op1-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op0-0{opacity:0;}
@keyframes k-dyn-op0-0{0.00%{opacity:1;}67.92%{opacity:1;}71.23%{opacity:0;}100.00%{opacity:0;}}
.dyn-op0-0{animation-name:k-dyn-op0-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-op0-1{opacity:1;}
@keyframes k-dyn-op0-1{0.00%{opacity:0;}64.62%{opacity:0;}67.92%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-op0-1{animation-name:k-dyn-op0-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="181.2" y="16.0" width="135.3" height="38.0" rx="7"/>
<text class="code dyn-code-0" x="248.9" y="43.0" text-anchor="middle">addl %2, %1</text>
<text class="code dyn-code-1" x="248.9" y="43.0" text-anchor="middle">movl %1, %0</text>
</g>
<g id="el-op2">
<rect class="n-box shp" x="185.3" y="94.0" width="127.1" height="44.0" rx="8"/>
<text class="t-b dyn-op2-0" x="248.9" y="121.0" text-anchor="middle" style="direction:ltr">%2 = b = 20</text>
</g>
<g id="el-op1">
<rect class="n-box shp" x="159.0" y="178.0" width="179.8" height="44.0" rx="8"/>
<text class="t-b dyn-op1-0" x="248.9" y="205.0" text-anchor="middle" style="direction:ltr">%1 = a = 10</text>
<text class="t-b dyn-op1-1" x="248.9" y="205.0" text-anchor="middle" style="direction:ltr">%1 = 10 + 20 = 30</text>
</g>
<g id="el-op0">
<rect class="n-box shp" x="162.9" y="262.0" width="171.9" height="44.0" rx="8"/>
<text class="t-b dyn-op0-0" x="248.9" y="289.0" text-anchor="middle" style="direction:ltr">%0 = result = ?</text>
<text class="t-b dyn-op0-1" x="248.9" y="289.0" text-anchor="middle" style="direction:ltr">%0 = result = 30</text>
</g>
<g id="el-note">
<text class="small" x="248.9" y="359.0" text-anchor="middle">הקומפיילר בוחר רגיסטר לכל placeholder ומעתיק אליו את ערכי משתני C</text>
</g>
</svg>
