<text class="t" x="243.8" y="502.8" text-anchor="middle">מעבר לשרת</text>
</g>
<g id="el-note">
<text class="small" x="243.8" y="573.8" text-anchor="middle">הלקח ההגנתי: לפענח ולנרמל לפני התאמת החוק, אחרת קידוד פשוט חומק</text>
