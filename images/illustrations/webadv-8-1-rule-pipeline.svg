<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 595" width="620" role="img" aria-label="צינור התאמת חוק ב-WAF: הקלט עובר שלבי טרנספורמציה - פענוח URL ואז המרה לאותיות קטנות - ורק על הצורה הקנונית מורצת התאמת ה-regex שחוסמת את הבקשה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-raw{0.00%{stroke:var(--pink);stroke-width:2.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}20.28%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-raw .shp{animation-name:k-raw;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ud{0.00%{stroke-width:1.5;}13.68%{stroke-width:1.5;}16.98%{stroke:var(--pink);stroke-width:2.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}37.26%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ud .shp{animation-name:k-ud;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lc{0.00%{stroke-width:1.5;}30.66%{stroke-width:1.5;}33.96%{stroke:var(--pink);stroke-width:2.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}54.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lc .shp{animation-name:k-lc;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-rx{0.00%{stroke-width:1.5;}47.64%{stroke-width:1.5;}50.94%{stroke:var(--pink);stroke-width:2.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}71.23%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-rx .shp{animation-name:k-rx;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-deny{0.00%{stroke-width:1.5;}64.62%{stroke-width:1.5;}67.92%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-deny .shp{animation-name:k-deny;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.68%{stroke-width:1.6;}16.98%{stroke:var(--pink);stroke-width:2.4;}33.96%{stroke:var(--pink);stroke-width:2.4;}37.26%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}30.66%{stroke-width:1.6;}33.96%{stroke:var(--pink);stroke-width:2.4;}50.94%{stroke:var(--pink);stroke-width:2.4;}54.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}47.64%{stroke-width:1.6;}50.94%{stroke:var(--pink);stroke-width:2.4;}67.92%{stroke:var(--pink);stroke-width:2.4;}71.23%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}64.62%{stroke-width:1.6;}67.92%{stroke:var(--pink);stroke-width:2.4;}84.91%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ud-0{opacity:0;}
@keyframes k-dyn-ud-0{0.00%{opacity:1;}16.98%{opacity:1;}20.28%{opacity:0;}100.00%{opacity:0;}}
.dyn-ud-0{animation-name:k-dyn-ud-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ud-1{opacity:1;}
@keyframes k-dyn-ud-1{0.00%{opacity:0;}13.68%{opacity:0;}16.98%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-ud-1{animation-name:k-dyn-ud-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-lc-0{opacity:0;}
@keyframes k-dyn-lc-0{0.00%{opacity:1;}33.96%{opacity:1;}37.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-lc-0{animation-name:k-dyn-lc-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-lc-1{opacity:1;}
@keyframes k-dyn-lc-1{0.00%{opacity:0;}30.66%{opacity:0;}33.96%{opacity:1;}84.91%{opacity:1;}100.00%{opacity:1;}}
.dyn-lc-1{animation-name:k-dyn-lc-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="243.8,54.0 243.8,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="243.8,140.0 243.8,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="243.8,226.0 243.8,266.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="412.6,350.4 478.6,350.4" marker-end="url(#arr)"/>
<text class="lbl" x="445.6" y="338.4" text-anchor="middle">התאמה</text>
<polyline id="edge-4" class="edge" points="243.8,434.8 243.8,474.8" marker-end="url(#arr)"/>
<text class="lbl" x="257.8" y="458.8" text-anchor="end">אין התאמה</text>
<g id="el-raw">
<rect class="n-code-bg shp" x="162.6" y="16.0" width="162.4" height="38.0" rx="7"/>
<text class="code" x="243.8" y="43.0" text-anchor="middle">q=%3Cscript%3E</text>
</g>
<g id="el-ud">
<rect class="n-box shp" x="133.4" y="94.0" width="220.7" height="46.0" rx="8"/>
<text class="t dyn-ud-0" x="243.8" y="122.0" text-anchor="middle" style="direction:ltr">t:urlDecode</text>
<text class="t dyn-ud-1" x="243.8" y="122.0" text-anchor="middle" style="direction:ltr">t:urlDecode -&gt; &lt;script&gt;</text>
</g>
<g id="el-lc">
<rect class="n-box shp" x="134.4" y="180.0" width="218.7" height="46.0" rx="8"/>
<text class="t dyn-lc-0" x="243.8" y="208.0" text-anchor="middle" style="direction:ltr">t:lowercase</text>
<text class="t dyn-lc-1" x="243.8" y="208.0" text-anchor="middle" style="direction:ltr">t:lowercase -&gt; &lt;script&gt;</text>
</g>
<g id="el-rx">
<polygon class="n-dia shp" points="243.8,266.0 412.6,350.4 243.8,434.8 75.0,350.4"/>
<text class="code" x="243.8" y="355.4" text-anchor="middle">regex: &lt;script&gt; ?</text>
</g>
<g id="el-deny">
