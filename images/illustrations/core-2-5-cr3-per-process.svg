<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 666 466" width="666" role="img" aria-label="איור המראה כיצד אותה כתובת וירטואלית בשתי תוכנות שונות מובילה לשתי מסגרות שונות ב-RAM, לפי הערך שברגיסטר cr3">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}30.71%{stroke-width:1.5;}46.43%{stroke-width:1.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-code .shp{animation-name:k-code;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-phys{0.00%{stroke:var(--pink);stroke-width:2.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}30.71%{stroke-width:1.5;}46.43%{stroke-width:1.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}77.14%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-phys .shp{animation-name:k-phys;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cr3{0.00%{stroke-width:1.5;}20.71%{stroke-width:1.5;}25.71%{stroke:var(--pink);stroke-width:2.5;}51.43%{stroke:var(--pink);stroke-width:2.5;}56.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cr3 .shp{animation-name:k-cr3;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-0{opacity:0;}
@keyframes k-dyn-cur-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-cur-0{animation-name:k-dyn-cur-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-1{opacity:0;}
@keyframes k-dyn-cur-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-cur-1{animation-name:k-dyn-cur-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cur-2{opacity:1;}
@keyframes k-dyn-cur-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-cur-2{animation-name:k-dyn-cur-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cr3-0{opacity:0;}
@keyframes k-dyn-cr3-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-cr3-0{animation-name:k-dyn-cr3-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cr3-1{opacity:0;}
@keyframes k-dyn-cr3-1{0.00%{opacity:0;}100.00%{opacity:0;}}
.dyn-cr3-1{animation-name:k-dyn-cr3-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cr3-2{opacity:1;}
@keyframes k-dyn-cr3-2{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-cr3-2{animation-name:k-dyn-cr3-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-phys-0{opacity:0;}
@keyframes k-dyn-phys-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-phys-0{animation-name:k-dyn-phys-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-phys-1{opacity:0;}
@keyframes k-dyn-phys-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-phys-1{animation-name:k-dyn-phys-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-phys-2{opacity:1;}
@keyframes k-dyn-phys-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-phys-2{animation-name:k-dyn-phys-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}25.71%{opacity:1;}30.71%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}20.71%{opacity:0;}25.71%{opacity:1;}51.43%{opacity:1;}56.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:1;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}46.43%{opacity:0;}51.43%{opacity:1;}77.14%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:7.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="220.1" y="16.0" width="225.6" height="38.0" rx="7"/>
<text class="code" x="332.9" y="43.0" text-anchor="middle">mov eax, [0x00400000]</text>
</g>
<g id="el-cur">
<rect class="n-box shp" x="201.0" y="94.0" width="263.7" height="44.0" rx="8"/>
<text class="t-b dyn-cur-0" x="332.9" y="121.0" text-anchor="middle" style="direction:ltr">running = A</text>
<text class="t-b dyn-cur-1" x="332.9" y="121.0" text-anchor="middle" style="direction:ltr">running = kernel scheduler</text>
<text class="t-b dyn-cur-2" x="332.9" y="121.0" text-anchor="middle" style="direction:ltr">running = B</text>
</g>
<g id="el-cr3">
<rect class="n-box shp" x="231.1" y="178.0" width="203.5" height="44.0" rx="8"/>
<text class="t-b dyn-cr3-0" x="332.9" y="205.0" text-anchor="middle" style="direction:ltr">CR3 = 0x00009000</text>
<text class="t-b dyn-cr3-1" x="332.9" y="205.0" text-anchor="middle" style="direction:ltr">CR3 = 0x00009000</text>
<text class="t-b dyn-cr3-2" x="332.9" y="205.0" text-anchor="middle" style="direction:ltr">CR3 = 0x0000C000</text>
</g>
<g id="el-phys">
<rect class="n-box shp" x="212.0" y="262.0" width="241.8" height="44.0" rx="8"/>
<text class="t-b dyn-phys-0" x="332.9" y="289.0" text-anchor="middle" style="direction:ltr">physical = 0x00120000</text>
<text class="t-b dyn-phys-1" x="332.9" y="289.0" text-anchor="middle" style="direction:ltr">physical = ?</text>
<text class="t-b dyn-phys-2" x="332.9" y="289.0" text-anchor="middle" style="direction:ltr">physical = 0x0075A000</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="66.3" y="346.0" width="533.2" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="332.9" y="374.0" text-anchor="middle">התוכנה A קוראת מהכתובת הוירטואלית ומקבלת את המסגרת שלה</text>
<text class="t dyn-note-1" x="332.9" y="374.0" text-anchor="middle">בזמן ה-context switch הקרנל מחליף את הערך שברגיסטר cr3</text>
<text class="t dyn-note-2" x="332.9" y="374.0" text-anchor="middle">אותה שורת קוד בתוכנה B מגיעה למסגרת אחרת לגמרי ב-RAM</text>
</g>
<g id="el-cap">
<text class="small" x="332.9" y="445.0" text-anchor="middle">כך שתי תוכנות יכולות להשתמש באותן כתובות בלי שאף אחת מהן תוכל לראות את הזיכרון של השנייה</text>
</g>
</svg>
