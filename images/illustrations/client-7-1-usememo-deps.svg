<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="146.1,62.0 146.1,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="160.1" y="86.0" text-anchor="end">רינדור מחדש</text>
<polyline id="edge-1" class="edge" points="146.1,140.0 146.1,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="276.2,245.0 342.2,245.0" marker-end="url(#arr)"/>
