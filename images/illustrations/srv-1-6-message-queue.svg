<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 282 414" width="282" role="img" aria-label="עבודה אסינכרונית עם תור הודעות: ה-API פולט event לתוך ה-Broker וממשיך מיד, וה-Consumer צורך את ההודעה מאוחר יותר ומטפל בה בקצב שלו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-producer{0.00%{stroke:var(--pink);stroke-width:2.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}17.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-producer .shp{animation-name:k-producer;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-msg{0.00%{stroke-width:1.5;}11.69%{stroke-width:1.5;}14.52%{stroke:var(--pink);stroke-width:2.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}31.85%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-msg .shp{animation-name:k-msg;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-broker{0.00%{stroke-width:1.5;}26.21%{stroke-width:1.5;}29.03%{stroke:var(--pink);stroke-width:2.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}60.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-broker .shp{animation-name:k-broker;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-consumer{0.00%{stroke-width:1.5;}55.24%{stroke-width:1.5;}58.06%{stroke:var(--pink);stroke-width:2.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}75.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-consumer .shp{animation-name:k-consumer;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-action{0.00%{stroke-width:1.5;}69.76%{stroke-width:1.5;}72.58%{stroke:var(--pink);stroke-width:2.5;}87.10%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-action .shp{animation-name:k-action;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.69%{stroke-width:1.6;}14.52%{stroke:var(--pink);stroke-width:2.4;}29.03%{stroke:var(--pink);stroke-width:2.4;}31.85%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}26.21%{stroke-width:1.6;}29.03%{stroke:var(--pink);stroke-width:2.4;}43.55%{stroke:var(--pink);stroke-width:2.4;}46.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}55.24%{stroke-width:1.6;}58.06%{stroke:var(--pink);stroke-width:2.4;}72.58%{stroke:var(--pink);stroke-width:2.4;}75.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}69.76%{stroke-width:1.6;}72.58%{stroke:var(--pink);stroke-width:2.4;}87.10%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-producer-0{opacity:0;}
@keyframes k-dyn-producer-0{0.00%{opacity:1;}29.03%{opacity:1;}31.85%{opacity:0;}100.00%{opacity:0;}}
.dyn-producer-0{animation-name:k-dyn-producer-0;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-producer-1{opacity:1;}
@keyframes k-dyn-producer-1{0.00%{opacity:0;}26.21%{opacity:0;}29.03%{opacity:1;}87.10%{opacity:1;}100.00%{opacity:1;}}
.dyn-producer-1{animation-name:k-dyn-producer-1;animation-duration:12.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="133.3,62.0 133.3,102.0" marker-end="url(#arr)"/>
<text class="lbl" x="147.3" y="86.0" text-anchor="end">פולט event</text>
<polyline id="edge-1" class="edge" points="133.3,140.0 133.3,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="147.3" y="164.0" text-anchor="end">נשמר בתור</text>
<polyline id="edge-2" class="edge" points="133.3,226.0 133.3,266.0" marker-end="url(#arr)"/>
<text class="lbl" x="147.3" y="250.0" text-anchor="end">נצרך מאוחר יותר</text>
<polyline id="edge-3" class="edge" points="133.3,312.0 133.3,352.0" marker-end="url(#arr)"/>
<g id="el-producer">
<rect class="n-box shp" x="16.9" y="16.0" width="232.8" height="46.0" rx="8"/>
<text class="t dyn-producer-0" x="133.3" y="44.0" text-anchor="middle">שירות API - Producer</text>
<text class="t dyn-producer-1" x="133.3" y="44.0" text-anchor="middle">ה-API פנוי וממשיך מיד</text>
</g>
<g id="el-msg">
<rect class="n-code-bg shp" x="16.0" y="102.0" width="234.6" height="38.0" rx="7"/>
<text class="code" x="133.3" y="129.0" text-anchor="middle">event: "order_created"</text>
</g>
<g id="el-broker">
<rect class="n-box shp" x="25.8" y="180.0" width="215.0" height="46.0" rx="8"/>
<text class="t" x="133.3" y="208.0" text-anchor="middle">תור ההודעות - Broker</text>
</g>
<g id="el-consumer">
<rect class="n-box shp" x="22.3" y="266.0" width="222.1" height="46.0" rx="8"/>
<text class="t" x="133.3" y="294.0" text-anchor="middle">שירות מייל - Consumer</text>
</g>
<g id="el-action">
<rect class="n-box shp" x="20.9" y="352.0" width="224.8" height="46.0" rx="8"/>
<text class="t" x="133.3" y="380.0" text-anchor="middle">שולח את המייל למשתמש</text>
</g>
</svg>
