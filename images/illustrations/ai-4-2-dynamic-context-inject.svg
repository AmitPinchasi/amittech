<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 311 350" width="311" role="img" aria-label="הזרקת context דינמי בפקודת סלאש: הפקודה שאחרי סימן הקריאה רצה מראש, והפלט האמיתי מוזרק לתוכן כך שהמודל מקבל את ה-diff ולא את הפקודה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-tmpl{0.00%{stroke:var(--pink);stroke-width:2.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}24.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-tmpl .shp{animation-name:k-tmpl;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-shell{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-shell .shp{animation-name:k-shell;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-model{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-model .shp{animation-name:k-model;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-reply{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-reply .shp{animation-name:k-reply;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.07%{stroke-width:1.6;}20.24%{stroke:var(--pink);stroke-width:2.4;}40.48%{stroke:var(--pink);stroke-width:2.4;}44.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}36.31%{stroke-width:1.6;}40.48%{stroke:var(--pink);stroke-width:2.4;}60.71%{stroke:var(--pink);stroke-width:2.4;}64.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}56.55%{stroke-width:1.6;}60.71%{stroke:var(--pink);stroke-width:2.4;}80.95%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="155.6,76.0 155.6,116.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="155.6,162.0 155.6,202.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="155.6,248.0 155.6,288.0" marker-end="url(#arr)"/>
<g id="el-tmpl">
<rect class="n-code-bg shp" x="65.4" y="16.0" width="180.4" height="60.0" rx="7"/>
<text class="code" x="155.6" y="43.0" text-anchor="middle">## Changes</text>
<text class="code" x="155.6" y="65.0" text-anchor="middle">!`git diff HEAD`</text>
</g>
<g id="el-shell">
<rect class="n-box shp" x="16.7" y="116.0" width="277.9" height="46.0" rx="8"/>
<text class="t" x="155.6" y="144.0" text-anchor="middle">ה-shell מריץ את הפקודה מראש</text>
</g>
<g id="el-model">
<rect class="n-box shp" x="16.0" y="202.0" width="279.2" height="46.0" rx="8"/>
<text class="t" x="155.6" y="230.0" text-anchor="middle">המודל מקבל את ה-diff המשובץ</text>
</g>
<g id="el-reply">
<rect class="n-box shp" x="45.7" y="288.0" width="219.7" height="46.0" rx="8"/>
<text class="t" x="155.6" y="316.0" text-anchor="middle">מחזיר סיכום שינויים</text>
</g>
</svg>
