<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 564 238" width="564" role="img" aria-label="שחזור מצב ב-Event Sourcing: מנגנים את רצף ה-events לפי הסדר, וכל event מיושם על המצב עד שמתקבל המצב הנוכחי של המשימה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-events-0{0.00%{stroke:var(--pink);stroke-width:2.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}24.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-events-c0{animation-name:k-events-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-events-1{0.00%{stroke-width:1.5;}15.62%{stroke-width:1.5;}20.00%{stroke:var(--pink);stroke-width:2.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}44.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-events-c1{animation-name:k-events-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-events-2{0.00%{stroke-width:1.5;}35.62%{stroke-width:1.5;}40.00%{stroke:var(--pink);stroke-width:2.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}64.38%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-events-c2{animation-name:k-events-2;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-events-3{0.00%{stroke-width:1.5;}55.62%{stroke-width:1.5;}60.00%{stroke:var(--pink);stroke-width:2.5;}80.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-events-c3{animation-name:k-events-3;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke:var(--pink);stroke-width:2.4;}80.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-0{animation-name:k-edge-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-0{opacity:0;}
@keyframes k-dyn-state-0{0.00%{opacity:1;}20.00%{opacity:1;}24.38%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-0{animation-name:k-dyn-state-0;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-1{opacity:0;}
@keyframes k-dyn-state-1{0.00%{opacity:0;}15.62%{opacity:0;}20.00%{opacity:1;}40.00%{opacity:1;}44.38%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-1{animation-name:k-dyn-state-1;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-2{opacity:0;}
@keyframes k-dyn-state-2{0.00%{opacity:0;}35.62%{opacity:0;}40.00%{opacity:1;}60.00%{opacity:1;}64.38%{opacity:0;}100.00%{opacity:0;}}
.dyn-state-2{animation-name:k-dyn-state-2;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-state-3{opacity:1;}
@keyframes k-dyn-state-3{0.00%{opacity:0;}55.62%{opacity:0;}60.00%{opacity:1;}80.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-state-3{animation-name:k-dyn-state-3;animation-duration:8.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="282.1,80.0 282.1,120.0" marker-end="url(#arr)"/>
<text class="lbl" x="294.1" y="104.0" text-anchor="end">המצב המשוחזר</text>
<g id="el-events">
<rect id="el-events-c0" class="n-cell shp" x="430.1" y="34.0" width="118.0" height="46.0" rx="6"/>
<text class="idx" x="489.2" y="28.0" text-anchor="middle" style="direction:ltr">0</text>
<text class="t" x="489.2" y="62.0" text-anchor="middle" style="direction:ltr">Created</text>
<rect id="el-events-c1" class="n-cell shp" x="292.1" y="34.0" width="118.0" height="46.0" rx="6"/>
<text class="idx" x="351.1" y="28.0" text-anchor="middle" style="direction:ltr">1</text>
<text class="t" x="351.1" y="62.0" text-anchor="middle" style="direction:ltr">Assigned</text>
<rect id="el-events-c2" class="n-cell shp" x="154.0" y="34.0" width="118.0" height="46.0" rx="6"/>
<text class="idx" x="213.1" y="28.0" text-anchor="middle" style="direction:ltr">2</text>
<text class="t" x="213.1" y="62.0" text-anchor="middle" style="direction:ltr">in_progress</text>
<rect id="el-events-c3" class="n-cell shp" x="16.0" y="34.0" width="118.0" height="46.0" rx="6"/>
<text class="idx" x="75.0" y="28.0" text-anchor="middle" style="direction:ltr">3</text>
<text class="t" x="75.0" y="62.0" text-anchor="middle" style="direction:ltr">done</text>
</g>
<g id="el-state">
<rect class="n-box shp" x="131.4" y="120.0" width="301.3" height="44.0" rx="8"/>
<text class="t-b dyn-state-0" x="282.1" y="147.0" text-anchor="middle" style="direction:ltr">status=todo</text>
<text class="t-b dyn-state-1" x="282.1" y="147.0" text-anchor="middle" style="direction:ltr">status=todo, assignee=7</text>
<text class="t-b dyn-state-2" x="282.1" y="147.0" text-anchor="middle" style="direction:ltr">status=in_progress, assignee=7</text>
<text class="t-b dyn-state-3" x="282.1" y="147.0" text-anchor="middle" style="direction:ltr">status=done, assignee=7</text>
</g>
<g id="el-note">
<text class="small" x="282.1" y="217.0" text-anchor="middle">המצב הנוכחי הוא תוצאה של החלת כל ה-events לפי הסדר</text>
</g>
</svg>
