<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 443 394" width="443" role="img" aria-label="מרוץ תנאים בהעלאת קבצים: הקובץ נכתב לדיסק לפני שהבדיקה רצה, ובחלון הזמן שבין הכתיבה למחיקה התוקף ניגש ל-webshell ומריץ פקודות">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-up{0.00%{stroke:var(--pink);stroke-width:2.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}24.46%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-up .shp{animation-name:k-up;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-race{0.00%{stroke-width:1.5;}16.85%{stroke-width:1.5;}20.65%{stroke:var(--pink);stroke-width:2.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}45.11%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-race .shp{animation-name:k-race;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-chk{0.00%{stroke-width:1.5;}37.50%{stroke-width:1.5;}41.30%{stroke:var(--pink);stroke-width:2.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}65.76%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-chk .shp{animation-name:k-chk;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-del{0.00%{stroke-width:1.5;}58.15%{stroke-width:1.5;}61.96%{stroke:var(--pink);stroke-width:2.5;}82.61%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-del .shp{animation-name:k-del;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}16.85%{stroke-width:1.6;}20.65%{stroke:var(--pink);stroke-width:2.4;}41.30%{stroke:var(--pink);stroke-width:2.4;}45.11%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}37.50%{stroke-width:1.6;}41.30%{stroke:var(--pink);stroke-width:2.4;}61.96%{stroke:var(--pink);stroke-width:2.4;}65.76%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}58.15%{stroke-width:1.6;}61.96%{stroke:var(--pink);stroke-width:2.4;}82.61%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-race-0{opacity:0;}
@keyframes k-dyn-race-0{0.00%{opacity:1;}20.65%{opacity:1;}24.46%{opacity:0;}100.00%{opacity:0;}}
.dyn-race-0{animation-name:k-dyn-race-0;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-race-1{opacity:1;}
@keyframes k-dyn-race-1{0.00%{opacity:0;}16.85%{opacity:0;}20.65%{opacity:1;}82.61%{opacity:1;}100.00%{opacity:1;}}
.dyn-race-1{animation-name:k-dyn-race-1;animation-duration:9.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="221.7,62.0 221.7,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="221.7,148.0 221.7,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="221.7,234.0 221.7,274.0" marker-end="url(#arr)"/>
<g id="el-up">
<rect class="n-box shp" x="84.3" y="16.0" width="274.8" height="46.0" rx="8"/>
<text class="t" x="221.7" y="44.0" text-anchor="middle">העלאה: shell.php נכתב לדיסק</text>
</g>
<g id="el-race">
<rect class="n-box shp" x="35.4" y="102.0" width="372.6" height="46.0" rx="8"/>
<text class="t dyn-race-0" x="221.7" y="130.0" text-anchor="middle">הבדיקה עדיין לא רצה</text>
<text class="t dyn-race-1" x="221.7" y="130.0" text-anchor="middle">חלון מרוץ: shell.php נגיש ומריץ פקודות</text>
</g>
<g id="el-chk">
<rect class="n-box shp" x="82.5" y="188.0" width="278.5" height="46.0" rx="8"/>
<text class="t" x="221.7" y="216.0" text-anchor="middle">הבדיקה רצה ומזהה קובץ אסור</text>
</g>
<g id="el-del">
<rect class="n-box shp" x="80.0" y="274.0" width="283.6" height="46.0" rx="8"/>
<text class="t" x="221.7" y="302.0" text-anchor="middle">shell.php נמחק אבל מאוחר מדי</text>
</g>
<g id="el-cap">
<text class="small" x="221.7" y="373.0" text-anchor="middle">הגנה: לכתוב לתיקייה זמנית ולאמת לפני העברה לתיקייה נגישה</text>
</g>
</svg>
