<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 719 421" width="719" role="img" aria-label="אימות SSH עם keys: ה-key הציבורי מותקן על השרת, הלקוח מתחבר עם ה-key הפרטי והשרת מאשר גישה בהתאמה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-keygen{0.00%{stroke:var(--pink);stroke-width:2.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}20.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-keygen .shp{animation-name:k-keygen;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-copy{0.00%{stroke-width:1.5;}13.02%{stroke-width:1.5;}16.67%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}36.98%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-copy .shp{animation-name:k-copy;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-connect{0.00%{stroke-width:1.5;}29.69%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}53.65%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-connect .shp{animation-name:k-connect;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-verify{0.00%{stroke-width:1.5;}46.35%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}70.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-verify .shp{animation-name:k-verify;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-grant{0.00%{stroke-width:1.5;}63.02%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}83.33%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-grant .shp{animation-name:k-grant;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.02%{stroke-width:1.6;}16.67%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}36.98%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}29.69%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}53.65%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}46.35%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}66.67%{stroke:var(--pink);stroke-width:2.4;}70.31%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}63.02%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}83.33%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:9.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="359.3,62.0 359.3,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="359.3,148.0 359.3,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="359.3,234.0 359.3,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="490.2,339.4 556.2,339.4" marker-end="url(#arr)"/>
<text class="lbl" x="523.2" y="327.4" text-anchor="middle">כן</text>
<polyline id="edge-4" class="edge" points="228.5,339.4 162.5,339.4" marker-end="url(#arr)"/>
<text class="lbl" x="195.5" y="327.4" text-anchor="middle">לא</text>
<g id="el-keygen">
<rect class="n-box shp" x="238.0" y="16.0" width="242.6" height="46.0" rx="8"/>
<text class="t" x="359.3" y="44.0" text-anchor="middle">ssh-keygen יוצר זוג keys</text>
</g>
<g id="el-copy">
<rect class="n-box shp" x="172.7" y="102.0" width="373.3" height="46.0" rx="8"/>
<text class="t" x="359.3" y="130.0" text-anchor="middle">ssh-copy-id מעתיק את ה-key הציבורי לשרת</text>
</g>
<g id="el-connect">
<rect class="n-box shp" x="223.9" y="188.0" width="270.8" height="46.0" rx="8"/>
<text class="t" x="359.3" y="216.0" text-anchor="middle">הלקוח מתחבר עם ה-key הפרטי</text>
</g>
<g id="el-verify">
<polygon class="n-dia shp" points="359.3,274.0 490.2,339.4 359.3,404.8 228.5,339.4"/>
<text class="t" x="359.3" y="344.4" text-anchor="middle">ה-keys תואמים?</text>
</g>
<g id="el-grant">
<rect class="n-box shp" x="556.2" y="316.4" width="146.5" height="46.0" rx="8"/>
<text class="t" x="629.4" y="344.4" text-anchor="middle">הגישה אושרה</text>
</g>
<g id="el-deny">
<rect class="n-box shp" x="16.0" y="316.4" width="146.5" height="46.0" rx="8"/>
<text class="t" x="89.2" y="344.4" text-anchor="middle">הגישה נדחתה</text>
</g>
</svg>
