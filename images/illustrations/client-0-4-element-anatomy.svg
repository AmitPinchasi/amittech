<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 426 298" width="426" role="img" aria-label="מבנה אלמנט HTML: תגית פותחת, תוכן ותגית סוגרת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-2{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}44.89%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c2{animation-name:k-lst-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-1{0.00%{stroke-width:1.5;}36.93%{stroke-width:1.5;}40.91%{stroke:var(--pink);stroke-width:2.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}65.34%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lst-c1{animation-name:k-lst-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lst-0{0.00%{stroke-width:1.5;}57.39%{stroke-width:1.5;}61.36%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-lst-c0{animation-name:k-lst-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mv-0{0.00%{transform:translateX(0.0px);}16.48%{transform:translateX(0.0px);}20.45%{transform:translateX(0.0px);}36.93%{transform:translateX(0.0px);}40.91%{transform:translateX(116.0px);}57.39%{transform:translateX(116.0px);}61.36%{transform:translateX(232.0px);}77.84%{transform:translateX(232.0px);}100.00%{transform:translateX(232.0px);}}
#eg-0{animation-name:k-mv-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-0{opacity:0;}
@keyframes k-dyn-val-0{0.00%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-0{animation-name:k-dyn-val-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-1{opacity:0;}
@keyframes k-dyn-val-1{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-val-1{animation-name:k-dyn-val-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-val-2{opacity:1;}
@keyframes k-dyn-val-2{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-val-2{animation-name:k-dyn-val-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="173.8" y="16.0" width="144.3" height="38.0" rx="7"/>
<text class="code" x="245.9" y="43.0" text-anchor="middle">&lt;p&gt;Hello&lt;/p&gt;</text>
</g>
<g id="el-lst">
<rect id="el-lst-c0" class="n-cell shp" x="313.9" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="361.9" y="122.0" text-anchor="middle" style="direction:ltr">&lt;/p&gt;</text>
<rect id="el-lst-c1" class="n-cell shp" x="197.9" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="245.9" y="122.0" text-anchor="middle" style="direction:ltr">Hello</text>
<rect id="el-lst-c2" class="n-cell shp" x="81.9" y="94.0" width="96.0" height="46.0" rx="6"/>
<text class="t" x="129.9" y="122.0" text-anchor="middle" style="direction:ltr">&lt;p&gt;</text>
</g>
<g id="eg-0">
<polyline id="edge-0" class="edge" points="129.9,140.0 129.9,180.0" marker-end="url(#arr)"/>
<text class="lbl" x="141.9" y="164.0" text-anchor="end">החלק הנוכחי</text>
<g id="el-val">
<rect class="n-box shp" x="16.0" y="180.0" width="227.9" height="44.0" rx="8"/>
<text class="t-b dyn-val-0" x="129.9" y="207.0" text-anchor="middle">תגית פותחת</text>
<text class="t-b dyn-val-1" x="129.9" y="207.0" text-anchor="middle">התוכן של האלמנט</text>
<text class="t-b dyn-val-2" x="129.9" y="207.0" text-anchor="middle">תגית סוגרת - עם סלאש</text>
</g>
</g>
<g id="el-note">
<text class="small" x="245.9" y="277.0" text-anchor="middle">שלושת החלקים יחד נקראים אלמנט</text>
</g>
</svg>
