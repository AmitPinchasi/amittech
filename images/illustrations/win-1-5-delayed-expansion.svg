<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="217.4,120.0 217.4,160.0" marker-end="url(#arr)"/>
<text class="lbl" x="229.4" y="144.0" text-anchor="end">מעדכן את המשתנה</text>
<polyline id="edge-1" class="edge" points="217.4,204.0 217.4,244.0" marker-end="url(#arr)"/>
<text class="lbl" x="229.4" y="228.0" text-anchor="end">מה שהודפס למסך</text>
<g id="el-code">
<rect class="n-code-bg shp" x="82.1" y="16.0" width="270.7" height="104.0" rx="7"/>
<text class="code" x="217.4" y="43.0" text-anchor="middle">FOR /L %%G IN (1,1,5) DO (</text>
<text class="code" x="217.4" y="65.0" text-anchor="middle">  echo !var!</text>
<text class="code" x="217.4" y="87.0" text-anchor="middle">  set /a var+=1</text>
<text class="code" x="217.4" y="109.0" text-anchor="middle">)</text>
</g>
<g id="el-var">
<rect class="n-box shp" x="167.8" y="160.0" width="99.2" height="44.0" rx="8"/>
<text class="t-b dyn-var-0" x="217.4" y="187.0" text-anchor="middle" style="direction:ltr">var = 0</text>
<text class="t-b dyn-var-1" x="217.4" y="187.0" text-anchor="middle" style="direction:ltr">var = 1</text>
<text class="t-b dyn-var-2" x="217.4" y="187.0" text-anchor="middle" style="direction:ltr">var = 2</text>
<text class="t-b dyn-var-3" x="217.4" y="187.0" text-anchor="middle" style="direction:ltr">var = 3</text>
<text class="t-b dyn-var-4" x="217.4" y="187.0" text-anchor="middle" style="direction:ltr">var = 4</text>
<text class="t-b dyn-var-5" x="217.4" y="187.0" text-anchor="middle" style="direction:ltr">var = 5</text>
</g>
<g id="el-printed">
<rect class="n-box shp" x="157.8" y="244.0" width="119.3" height="44.0" rx="8"/>
<text class="t-b dyn-printed-0" x="217.4" y="271.0" text-anchor="middle" style="direction:ltr">0</text>
<text class="t-b dyn-printed-1" x="217.4" y="271.0" text-anchor="middle" style="direction:ltr">1</text>
<text class="t-b dyn-printed-2" x="217.4" y="271.0" text-anchor="middle" style="direction:ltr">2</text>
<text class="t-b dyn-printed-3" x="217.4" y="271.0" text-anchor="middle" style="direction:ltr">3</text>
<text class="t-b dyn-printed-4" x="217.4" y="271.0" text-anchor="middle" style="direction:ltr">4</text>
<text class="t-b dyn-printed-5" x="217.4" y="271.0" text-anchor="middle" style="direction:ltr">Total = 5</text>
</g>
<g id="el-note">
<text class="small" x="217.4" y="341.0" text-anchor="middle">echo !var! מדפיס את הערך הנוכחי, ואז set /a מגדיל אותו באחד</text>
</g>
</svg>
