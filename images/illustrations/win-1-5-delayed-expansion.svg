<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 435 362" width="435" role="img" aria-label="Delayed Expansion בלולאה: הסימון !var! נותן את הערך המעודכן של המשתנה בכל סיבוב, ולכן הפלט עולה מ-0 עד 4">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
