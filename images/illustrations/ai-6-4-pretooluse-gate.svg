<text class="t dyn-inp-0" x="122.2" y="44.0" text-anchor="middle">פקודה: npm test</text>
<text class="t dyn-inp-1" x="122.2" y="44.0" text-anchor="middle">פקודה: rm -rf /</text>
</g>
<g id="el-hook">
<rect class="n-box shp" x="16.0" y="102.0" width="212.3" height="46.0" rx="8"/>
<text class="t" x="122.2" y="130.0" text-anchor="middle">הוק PreToolUse בודק</text>
</g>
<g id="el-d">
