<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 452 394" width="452" role="img" aria-label="הוק PreToolUse בודק כל פקודה לפני הרצה: פקודה בטוחה מקבלת קוד 0 ורצה, ואילו פקודת מחיקה מקבלת קוד 2 ונחסמת">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-inp{0.00%{stroke:var(--pink);stroke-width:2.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}13.54%{stroke-width:1.5;}42.01%{stroke-width:1.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}57.99%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inp .shp{animation-name:k-inp;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-hook{0.00%{stroke-width:1.5;}8.68%{stroke-width:1.5;}11.11%{stroke:var(--pink);stroke-width:2.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}24.65%{stroke-width:1.5;}53.13%{stroke-width:1.5;}55.56%{stroke:var(--pink);stroke-width:2.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}69.10%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-hook .shp{animation-name:k-hook;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-d{0.00%{stroke-width:1.5;}19.79%{stroke-width:1.5;}22.22%{stroke:var(--pink);stroke-width:2.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}35.76%{stroke-width:1.5;}64.24%{stroke-width:1.5;}66.67%{stroke:var(--pink);stroke-width:2.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}80.21%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-d .shp{animation-name:k-d;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-allow{0.00%{stroke-width:1.5;}30.90%{stroke-width:1.5;}33.33%{stroke:var(--pink);stroke-width:2.5;}44.44%{stroke:var(--pink);stroke-width:2.5;}46.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-allow .shp{animation-name:k-allow;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-block{0.00%{stroke-width:1.5;}75.35%{stroke-width:1.5;}77.78%{stroke:var(--pink);stroke-width:2.5;}88.89%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-block .shp{animation-name:k-block;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}8.68%{stroke-width:1.6;}11.11%{stroke:var(--pink);stroke-width:2.4;}22.22%{stroke:var(--pink);stroke-width:2.4;}24.65%{stroke-width:1.6;}53.13%{stroke-width:1.6;}55.56%{stroke:var(--pink);stroke-width:2.4;}66.67%{stroke:var(--pink);stroke-width:2.4;}69.10%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}19.79%{stroke-width:1.6;}22.22%{stroke:var(--pink);stroke-width:2.4;}33.33%{stroke:var(--pink);stroke-width:2.4;}35.76%{stroke-width:1.6;}64.24%{stroke-width:1.6;}66.67%{stroke:var(--pink);stroke-width:2.4;}77.78%{stroke:var(--pink);stroke-width:2.4;}80.21%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}30.90%{stroke-width:1.6;}33.33%{stroke:var(--pink);stroke-width:2.4;}44.44%{stroke:var(--pink);stroke-width:2.4;}46.88%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}75.35%{stroke-width:1.6;}77.78%{stroke:var(--pink);stroke-width:2.4;}88.89%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-inp-0{opacity:0;}
@keyframes k-dyn-inp-0{0.00%{opacity:1;}44.44%{opacity:1;}46.88%{opacity:0;}100.00%{opacity:0;}}
.dyn-inp-0{animation-name:k-dyn-inp-0;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-inp-1{opacity:1;}
@keyframes k-dyn-inp-1{0.00%{opacity:0;}42.01%{opacity:0;}44.44%{opacity:1;}88.89%{opacity:1;}100.00%{opacity:1;}}
.dyn-inp-1{animation-name:k-dyn-inp-1;animation-duration:14.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="122.2,62.0 122.2,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="122.2,148.0 122.2,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="226.4,240.1 292.4,240.1" marker-end="url(#arr)"/>
<text class="lbl" x="259.4" y="228.1" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="122.2,292.2 122.2,332.2" marker-end="url(#arr)"/>
<text class="lbl" x="136.2" y="316.2" text-anchor="end">לא</text>
<g id="el-inp">
