@keyframes k-inCache{0.00%{stroke-width:1.5;}15.96%{stroke-width:1.5;}18.07%{stroke:var(--pink);stroke-width:2.5;}27.11%{stroke:var(--pink);stroke-width:2.5;}29.22%{stroke-width:1.5;}34.04%{stroke-width:1.5;}36.14%{stroke:var(--pink);stroke-width:2.5;}45.18%{stroke:var(--pink);stroke-width:2.5;}47.29%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-inCache .shp{animation-name:k-inCache;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-hit{0.00%{stroke-width:1.5;}25.00%{stroke-width:1.5;}27.11%{stroke:var(--pink);stroke-width:2.5;}36.14%{stroke:var(--pink);stroke-width:2.5;}38.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-hit .shp{animation-name:k-hit;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-net{0.00%{stroke-width:1.5;}43.07%{stroke-width:1.5;}45.18%{stroke:var(--pink);stroke-width:2.5;}54.22%{stroke:var(--pink);stroke-width:2.5;}56.33%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
