@keyframes k-edge-4{0.00%{stroke-width:1.6;}52.11%{stroke-width:1.6;}54.22%{stroke:var(--pink);stroke-width:2.4;}63.25%{stroke:var(--pink);stroke-width:2.4;}65.36%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-5{0.00%{stroke-width:1.6;}61.14%{stroke-width:1.6;}63.25%{stroke:var(--pink);stroke-width:2.4;}72.29%{stroke:var(--pink);stroke-width:2.4;}74.40%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-5{animation-name:k-edge-5;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-6{0.00%{stroke-width:1.6;}79.22%{stroke-width:1.6;}81.33%{stroke:var(--pink);stroke-width:2.4;}90.36%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-6{animation-name:k-edge-6;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="162.2,54.0 162.2,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="162.2,140.0 162.2,180.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="162.2,298.6 162.2,338.6" marker-end="url(#arr)"/>
