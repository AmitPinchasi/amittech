@keyframes k-edge-0{0.00%{stroke-width:1.6;}6.93%{stroke-width:1.6;}9.04%{stroke:var(--pink);stroke-width:2.4;}18.07%{stroke:var(--pink);stroke-width:2.4;}20.18%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}15.96%{stroke-width:1.6;}18.07%{stroke:var(--pink);stroke-width:2.4;}27.11%{stroke:var(--pink);stroke-width:2.4;}29.22%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
