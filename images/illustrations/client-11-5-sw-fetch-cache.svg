#el-online .shp{animation-name:k-online;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-store{0.00%{stroke-width:1.5;}61.14%{stroke-width:1.5;}63.25%{stroke:var(--pink);stroke-width:2.5;}72.29%{stroke:var(--pink);stroke-width:2.5;}74.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-store .shp{animation-name:k-store;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
