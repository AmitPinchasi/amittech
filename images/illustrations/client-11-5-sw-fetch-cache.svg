@keyframes k-edge-3{0.00%{stroke-width:1.6;}25.00%{stroke-width:1.6;}27.11%{stroke:var(--pink);stroke-width:2.4;}36.14%{stroke:var(--pink);stroke-width:2.4;}38.25%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:16.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}43.07%{stroke-width:1.6;}45.18%{stroke:var(--pink);stroke-width:2.4;}54.22%{stroke:var(--pink);stroke-width:2.4;}56.33%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
