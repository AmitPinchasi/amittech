<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 571 421" width="571" role="img" aria-label="שגיאה עולה במעלה שרשרת הקריאות: מהשורה שנכשלה דרך כל הפונקציות שקראו לה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}14.15%{stroke:var(--pink);stroke-width:2.5;}17.45%{stroke-width:1.5;}67.45%{stroke-width:1.5;}70.75%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-call .shp{animation-name:k-call;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-f1{0.00%{stroke-width:1.5;}10.85%{stroke-width:1.5;}14.15%{stroke:var(--pink);stroke-width:2.5;}28.30%{stroke:var(--pink);stroke-width:2.5;}31.60%{stroke-width:1.5;}67.45%{stroke-width:1.5;}70.75%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-f1 .shp{animation-name:k-f1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-f2{0.00%{stroke-width:1.5;}25.00%{stroke-width:1.5;}28.30%{stroke:var(--pink);stroke-width:2.5;}42.45%{stroke:var(--pink);stroke-width:2.5;}45.75%{stroke-width:1.5;}67.45%{stroke-width:1.5;}70.75%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-f2 .shp{animation-name:k-f2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-err{0.00%{stroke-width:1.5;}39.15%{stroke-width:1.5;}42.45%{stroke:var(--pink);stroke-width:2.5;}84.91%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-err .shp{animation-name:k-err;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.85%{stroke-width:1.6;}14.15%{stroke:var(--pink);stroke-width:2.4;}28.30%{stroke:var(--pink);stroke-width:2.4;}31.60%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}25.00%{stroke-width:1.6;}28.30%{stroke:var(--pink);stroke-width:2.4;}42.45%{stroke:var(--pink);stroke-width:2.4;}45.75%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}39.15%{stroke-width:1.6;}42.45%{stroke:var(--pink);stroke-width:2.4;}56.60%{stroke:var(--pink);stroke-width:2.4;}59.91%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}53.30%{stroke-width:1.6;}56.60%{stroke:var(--pink);stroke-width:2.4;}70.75%{stroke:var(--pink);stroke-width:2.4;}74.06%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:10.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="325.4,61.0 325.4,101.0" marker-end="url(#arr)"/>
<text class="lbl" x="339.4" y="85.0" text-anchor="end">קריאה</text>
<polyline id="edge-1" class="edge" points="325.4,161.0 325.4,201.0" marker-end="url(#arr)"/>
<text class="lbl" x="339.4" y="185.0" text-anchor="end">קריאה</text>
<polyline id="edge-2" class="edge" points="325.4,261.0 325.4,301.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="229.0,324.0 16.0,324.0 16.0,42.0 275.8,42.0" marker-end="url(#arr)"/>
<text class="small" x="145.9" y="30.0" text-anchor="middle">השגיאה עולה למעלה</text>
<g id="el-call">
<rect class="n-code-bg shp" x="275.8" y="23.0" width="99.2" height="38.0" rx="7"/>
<text class="code" x="325.4" y="50.0" text-anchor="middle">func1()</text>
</g>
<g id="el-f1">
<rect class="n-code-bg shp" x="253.2" y="101.0" width="144.3" height="60.0" rx="7"/>
<text class="code" x="325.4" y="128.0" text-anchor="middle">def func1():</text>
<text class="code" x="325.4" y="150.0" text-anchor="middle">    func2()</text>
</g>
<g id="el-f2">
<rect class="n-code-bg shp" x="253.2" y="201.0" width="144.3" height="60.0" rx="7"/>
<text class="code" x="325.4" y="228.0" text-anchor="middle">def func2():</text>
<text class="code" x="325.4" y="250.0" text-anchor="middle">    1 / 0</text>
</g>
<g id="el-err">
<rect class="n-box shp" x="229.0" y="301.0" width="192.8" height="46.0" rx="8"/>
<text class="t" x="325.4" y="329.0" text-anchor="middle" style="direction:ltr">ZeroDivisionError</text>
</g>
<g id="el-note">
<text class="small" x="325.4" y="400.0" text-anchor="middle">הסטאק טרייס מציג בדיוק את השרשרת הזו: מי קרא למי עד השורה שנכשלה</text>
</g>
</svg>
