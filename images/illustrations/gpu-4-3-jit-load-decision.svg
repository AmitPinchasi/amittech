<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 797 436" width="797" role="img" aria-label="החלטת הדרייבר בזמן טעינה: אם יש cubin תואם טוענים SASS ישירות, אחרת מבצעים JIT מ-PTX ל-SASS">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="406.5,62.0 406.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="592.0,194.8 680.0,194.8 680.0,287.5" marker-end="url(#arr)"/>
<text class="lbl" x="636.0" y="182.8" text-anchor="middle">כן</text>
<polyline id="edge-2" class="edge" points="220.9,194.8 132.9,194.8 132.9,287.5" marker-end="url(#arr)"/>
<text class="lbl" x="176.9" y="182.8" text-anchor="middle">לא</text>
<polyline id="edge-3" class="edge" points="680.0,333.5 680.0,396.5 506.9,396.5" marker-end="url(#arr)"/>
<polyline id="edge-4" class="edge" points="132.9,333.5 132.9,396.5 306.0,396.5" marker-end="url(#arr)"/>
<g id="el-load">
<rect class="n-box shp" x="288.4" y="16.0" width="236.2" height="46.0" rx="8"/>
<text class="t" x="406.5" y="44.0" text-anchor="middle">טעינת module בזמן ריצה</text>
</g>
<g id="el-q">
<polygon class="n-dia shp" points="406.5,102.0 592.0,194.8 406.5,287.5 220.9,194.8"/>
<text class="t" x="406.5" y="199.8" text-anchor="middle">יש cubin תואם ל-GPU?</text>
</g>
<g id="el-direct">
<rect class="n-box shp" x="578.5" y="287.5" width="202.9" height="46.0" rx="8"/>
<text class="t" x="680.0" y="315.5" text-anchor="middle">טעינת SASS ישירות</text>
</g>
<g id="el-jit">
<rect class="n-box shp" x="16.0" y="287.5" width="233.8" height="46.0" rx="8"/>
<text class="t" x="132.9" y="315.5" text-anchor="middle">המרת PTX ל-SASS ב-JIT</text>
</g>
<g id="el-run">
<rect class="n-box shp" x="306.0" y="373.5" width="200.9" height="46.0" rx="8"/>
<text class="t" x="406.5" y="401.5" text-anchor="middle">ה-kernel רץ על ה-SM</text>
</g>
</svg>
