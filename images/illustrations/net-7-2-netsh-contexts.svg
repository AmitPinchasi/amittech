<text class="t-b dyn-desc-0" x="286.8" y="215.0" text-anchor="middle">interface - כתובות IP ו-network interfaces</text>
<text class="t-b dyn-desc-1" x="286.8" y="215.0" text-anchor="middle">advfirewall - חוקים בחומת האש</text>
<text class="t-b dyn-desc-2" x="286.8" y="215.0" text-anchor="middle">wlan - רשתות ופרופילי Wi-Fi</text>
<text class="t-b dyn-desc-3" x="286.8" y="215.0" text-anchor="middle">winhttp - הגדרות Proxy למערכת</text>
</g>
</svg>
