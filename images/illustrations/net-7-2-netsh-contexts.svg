<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 574 248" width="574" role="img" aria-label="הכלי netsh מחלק את ניהול הרשת להקשרים נפרדים - context - כשכל הקשר אחראי על תחום אחר: network interfaces, חומת אש, Wi-Fi ו-Proxy">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-ctx-0{0.00%{stroke:var(--pink);stroke-width:2.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}24.40%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ctx-c0{animation-name:k-ctx-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ctx-1{0.00%{stroke-width:1.5;}16.07%{stroke-width:1.5;}20.24%{stroke:var(--pink);stroke-width:2.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}44.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ctx-c1{animation-name:k-ctx-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ctx-2{0.00%{stroke-width:1.5;}36.31%{stroke-width:1.5;}40.48%{stroke:var(--pink);stroke-width:2.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}64.88%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-ctx-c2{animation-name:k-ctx-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-ctx-3{0.00%{stroke-width:1.5;}56.55%{stroke-width:1.5;}60.71%{stroke:var(--pink);stroke-width:2.5;}80.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-ctx-c3{animation-name:k-ctx-3;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-desc-0{opacity:0;}
@keyframes k-dyn-desc-0{0.00%{opacity:1;}20.24%{opacity:1;}24.40%{opacity:0;}100.00%{opacity:0;}}
.dyn-desc-0{animation-name:k-dyn-desc-0;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-desc-1{opacity:0;}
@keyframes k-dyn-desc-1{0.00%{opacity:0;}16.07%{opacity:0;}20.24%{opacity:1;}40.48%{opacity:1;}44.64%{opacity:0;}100.00%{opacity:0;}}
.dyn-desc-1{animation-name:k-dyn-desc-1;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-desc-2{opacity:0;}
@keyframes k-dyn-desc-2{0.00%{opacity:0;}36.31%{opacity:0;}40.48%{opacity:1;}60.71%{opacity:1;}64.88%{opacity:0;}100.00%{opacity:0;}}
.dyn-desc-2{animation-name:k-dyn-desc-2;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-desc-3{opacity:1;}
@keyframes k-dyn-desc-3{0.00%{opacity:0;}56.55%{opacity:0;}60.71%{opacity:1;}80.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-desc-3{animation-name:k-dyn-desc-3;animation-duration:8.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-root">
<rect class="n-box shp" x="140.5" y="16.0" width="292.6" height="46.0" rx="8"/>
<text class="t" x="286.8" y="44.0" text-anchor="middle">הכלי netsh - מעטפת ניהול הרשת</text>
</g>
<g id="el-ctx">
<rect id="el-ctx-c0" class="n-cell shp" x="437.2" y="102.0" width="120.4" height="46.0" rx="6"/>
<text class="t" x="497.4" y="130.0" text-anchor="middle" style="direction:ltr">interface</text>
<rect id="el-ctx-c1" class="n-cell shp" x="296.8" y="102.0" width="120.4" height="46.0" rx="6"/>
<text class="t" x="357.0" y="130.0" text-anchor="middle" style="direction:ltr">advfirewall</text>
<rect id="el-ctx-c2" class="n-cell shp" x="156.4" y="102.0" width="120.4" height="46.0" rx="6"/>
<text class="t" x="216.6" y="130.0" text-anchor="middle" style="direction:ltr">wlan</text>
<rect id="el-ctx-c3" class="n-cell shp" x="16.0" y="102.0" width="120.4" height="46.0" rx="6"/>
<text class="t" x="76.2" y="130.0" text-anchor="middle" style="direction:ltr">winhttp</text>
</g>
<g id="el-desc">
