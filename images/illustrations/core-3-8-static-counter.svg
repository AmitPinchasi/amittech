.dyn-x-0{opacity:0;}
@keyframes k-dyn-x-0{0.00%{opacity:1;}20.45%{opacity:1;}24.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-x-0{animation-name:k-dyn-x-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-x-1{opacity:0;}
@keyframes k-dyn-x-1{0.00%{opacity:0;}16.48%{opacity:0;}20.45%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-x-1{animation-name:k-dyn-x-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-x-2{opacity:0;}
@keyframes k-dyn-x-2{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-x-2{animation-name:k-dyn-x-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-x-3{opacity:1;}
@keyframes k-dyn-x-3{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-x-3{animation-name:k-dyn-x-3;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-0{opacity:0;}
@keyframes k-dyn-out-0{0.00%{opacity:1;}20.45%{opacity:1;}24.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-0{animation-name:k-dyn-out-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-1{opacity:0;}
@keyframes k-dyn-out-1{0.00%{opacity:0;}16.48%{opacity:0;}20.45%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-1{animation-name:k-dyn-out-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-2{opacity:0;}
@keyframes k-dyn-out-2{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-out-2{animation-name:k-dyn-out-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-out-3{opacity:1;}
@keyframes k-dyn-out-3{0.00%{opacity:0;}57.39%{opacity:0;}61.36%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-out-3{animation-name:k-dyn-out-3;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="151.6" y="16.0" width="225.6" height="126.0" rx="7"/>
<text class="code" x="264.3" y="43.0" text-anchor="middle">void counter() {</text>
<text class="code" x="264.3" y="65.0" text-anchor="middle">    static int x = 0;</text>
<text class="code" x="264.3" y="87.0" text-anchor="middle">    x++;</text>
<text class="code" x="264.3" y="109.0" text-anchor="middle">    printf("%d", x);</text>
<text class="code" x="264.3" y="131.0" text-anchor="middle">}</text>
</g>
<g id="el-call">
<rect class="n-box shp" x="154.5" y="182.0" width="219.7" height="46.0" rx="8"/>
<text class="t dyn-call-0" x="264.3" y="210.0" text-anchor="middle">לפני הקריאה הראשונה</text>
<text class="t dyn-call-1" x="264.3" y="210.0" text-anchor="middle">קריאה ראשונה</text>
<text class="t dyn-call-2" x="264.3" y="210.0" text-anchor="middle">קריאה שנייה</text>
<text class="t dyn-call-3" x="264.3" y="210.0" text-anchor="middle">קריאה שלישית</text>
</g>
<g id="el-x">
<rect class="n-box shp" x="216.3" y="268.0" width="96.0" height="44.0" rx="8"/>
<text class="t-b dyn-x-0" x="264.3" y="295.0" text-anchor="middle" style="direction:ltr">x = 0</text>
<text class="t-b dyn-x-1" x="264.3" y="295.0" text-anchor="middle" style="direction:ltr">x = 1</text>
<text class="t-b dyn-x-2" x="264.3" y="295.0" text-anchor="middle" style="direction:ltr">x = 2</text>
<text class="t-b dyn-x-3" x="264.3" y="295.0" text-anchor="middle" style="direction:ltr">x = 3</text>
</g>
<g id="el-out">
<rect class="n-box shp" x="174.6" y="352.0" width="179.5" height="44.0" rx="8"/>
<text class="t-b dyn-out-0" x="264.3" y="379.0" text-anchor="middle">הפלט עדיין ריק</text>
<text class="t-b dyn-out-1" x="264.3" y="379.0" text-anchor="middle">הפלט: 1</text>
<text class="t-b dyn-out-2" x="264.3" y="379.0" text-anchor="middle">הפלט: 2</text>
<text class="t-b dyn-out-3" x="264.3" y="379.0" text-anchor="middle">הפלט: 3</text>
</g>
<g id="el-note">
<text class="small" x="264.3" y="449.0" text-anchor="middle">משתנה רגיל היה נמחק מהמחסנית בסוף הפונקציה ומתחיל שוב מאפס בכל קריאה</text>
</g>
