<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 529 470" width="529" role="img" aria-label="משתנה static בתוך פונקציה זוכר את ערכו בין הקריאות במקום להימחק בסוף כל קריאה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke:var(--pink);stroke-width:2.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}24.43%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-call{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-call .shp{animation-name:k-call;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-x{0.00%{stroke-width:1.5;}16.48%{stroke-width:1.5;}20.45%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-x .shp{animation-name:k-x;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-0{opacity:0;}
@keyframes k-dyn-call-0{0.00%{opacity:1;}20.45%{opacity:1;}24.43%{opacity:0;}100.00%{opacity:0;}}
.dyn-call-0{animation-name:k-dyn-call-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-1{opacity:0;}
@keyframes k-dyn-call-1{0.00%{opacity:0;}16.48%{opacity:0;}20.45%{opacity:1;}40.91%{opacity:1;}44.89%{opacity:0;}100.00%{opacity:0;}}
.dyn-call-1{animation-name:k-dyn-call-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-2{opacity:0;}
@keyframes k-dyn-call-2{0.00%{opacity:0;}36.93%{opacity:0;}40.91%{opacity:1;}61.36%{opacity:1;}65.34%{opacity:0;}100.00%{opacity:0;}}
.dyn-call-2{animation-name:k-dyn-call-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-call-3{opacity:1;}
