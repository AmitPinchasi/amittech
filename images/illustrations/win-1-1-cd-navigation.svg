<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 434 446" width="434" role="img" aria-label="מעבר בין תיקיות בטרמינל: הפקודה cd dev נכנסת פנימה, cd .. חוזרת אחורה, והנתיב הנוכחי משתנה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-amitp{0.00%{stroke:var(--pink);stroke-width:2.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}30.47%{stroke-width:1.5;}44.53%{stroke-width:1.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}75.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-amitp .shp{animation-name:k-amitp;animation-duration:6.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dev{0.00%{stroke-width:1.5;}19.53%{stroke-width:1.5;}25.00%{stroke:var(--pink);stroke-width:2.5;}50.00%{stroke:var(--pink);stroke-width:2.5;}55.47%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-dev .shp{animation-name:k-dev;animation-duration:6.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}19.53%{stroke-width:1.6;}25.00%{stroke:var(--pink);stroke-width:2.4;}50.00%{stroke:var(--pink);stroke-width:2.4;}55.47%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:6.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}44.53%{stroke-width:1.6;}50.00%{stroke:var(--pink);stroke-width:2.4;}75.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:6.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-path-0{opacity:1;}
@keyframes k-dyn-path-0{0.00%{opacity:1;}25.00%{opacity:1;}30.47%{opacity:0;}44.53%{opacity:0;}50.00%{opacity:1;}75.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-path-0{animation-name:k-dyn-path-0;animation-duration:6.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-path-1{opacity:0;}
@keyframes k-dyn-path-1{0.00%{opacity:0;}19.53%{opacity:0;}25.00%{opacity:1;}50.00%{opacity:1;}55.47%{opacity:0;}100.00%{opacity:0;}}
.dyn-path-1{animation-name:k-dyn-path-1;animation-duration:6.40s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
