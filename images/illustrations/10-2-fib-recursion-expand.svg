<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 212" width="580" role="img" aria-label="אנימציה של פתיחת רקורסיה: הקריאה fib(3) נפתחת לקריאות קטנות יותר עד תנאי העצירה ומסתכמת ל-2">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-code{0.00%{stroke-width:1.5;}14.22%{stroke-width:1.5;}17.24%{stroke:var(--pink);stroke-width:2.5;}51.72%{stroke:var(--pink);stroke-width:2.5;}54.74%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-code .shp{animation-name:k-code;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-expand{0.00%{stroke-width:1.5;}65.95%{stroke-width:1.5;}68.97%{stroke:var(--pink);stroke-width:2.5;}86.21%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-expand .shp{animation-name:k-expand;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-expand-0{opacity:0;}
@keyframes k-dyn-expand-0{0.00%{opacity:1;}17.24%{opacity:1;}20.26%{opacity:0;}100.00%{opacity:0;}}
.dyn-expand-0{animation-name:k-dyn-expand-0;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-expand-1{opacity:0;}
@keyframes k-dyn-expand-1{0.00%{opacity:0;}14.22%{opacity:0;}17.24%{opacity:1;}34.48%{opacity:1;}37.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-expand-1{animation-name:k-dyn-expand-1;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-expand-2{opacity:0;}
@keyframes k-dyn-expand-2{0.00%{opacity:0;}31.47%{opacity:0;}34.48%{opacity:1;}51.72%{opacity:1;}54.74%{opacity:0;}100.00%{opacity:0;}}
.dyn-expand-2{animation-name:k-dyn-expand-2;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-expand-3{opacity:0;}
@keyframes k-dyn-expand-3{0.00%{opacity:0;}48.71%{opacity:0;}51.72%{opacity:1;}68.97%{opacity:1;}71.98%{opacity:0;}100.00%{opacity:0;}}
.dyn-expand-3{animation-name:k-dyn-expand-3;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-expand-4{opacity:1;}
@keyframes k-dyn-expand-4{0.00%{opacity:0;}65.95%{opacity:0;}68.97%{opacity:1;}86.21%{opacity:1;}100.00%{opacity:1;}}
.dyn-expand-4{animation-name:k-dyn-expand-4;animation-duration:11.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="154.8" y="16.0" width="270.7" height="38.0" rx="7"/>
<text class="code" x="290.1" y="43.0" text-anchor="middle">return fib(n-1) + fib(n-2)</text>
</g>
<g id="el-expand">
<rect class="n-box shp" x="168.2" y="94.0" width="244.0" height="44.0" rx="8"/>
<text class="t-b dyn-expand-0" x="290.1" y="121.0" text-anchor="middle" style="direction:ltr">fib(3)</text>
<text class="t-b dyn-expand-1" x="290.1" y="121.0" text-anchor="middle" style="direction:ltr">fib(2) + fib(1)</text>
<text class="t-b dyn-expand-2" x="290.1" y="121.0" text-anchor="middle" style="direction:ltr">(fib(1) + fib(0)) + fib(1)</text>
<text class="t-b dyn-expand-3" x="290.1" y="121.0" text-anchor="middle" style="direction:ltr">(1 + 0) + 1</text>
<text class="t-b dyn-expand-4" x="290.1" y="121.0" text-anchor="middle" style="direction:ltr">2</text>
</g>
<g id="el-note">
<text class="small" x="290.1" y="191.0" text-anchor="middle">כל קריאה נפתחת לקריאות קטנות יותר, עד שמגיעים לתנאי העצירה והתוצאות מסתכמות</text>
</g>
</svg>
