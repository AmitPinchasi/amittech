<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 386" width="728" role="img" aria-label="ההמתנה האוטומטית של Playwright לפני ביצוע פעולה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}10.11%{stroke:var(--pink);stroke-width:2.5;}12.08%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}8.15%{stroke-width:1.5;}10.11%{stroke:var(--pink);stroke-width:2.5;}20.22%{stroke:var(--pink);stroke-width:2.5;}22.19%{stroke-width:1.5;}38.48%{stroke-width:1.5;}40.45%{stroke:var(--pink);stroke-width:2.5;}50.56%{stroke:var(--pink);stroke-width:2.5;}52.53%{stroke-width:1.5;}68.82%{stroke-width:1.5;}70.79%{stroke:var(--pink);stroke-width:2.5;}80.90%{stroke:var(--pink);stroke-width:2.5;}82.87%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-wait{0.00%{stroke-width:1.5;}18.26%{stroke-width:1.5;}20.22%{stroke:var(--pink);stroke-width:2.5;}30.34%{stroke:var(--pink);stroke-width:2.5;}32.30%{stroke-width:1.5;}48.60%{stroke-width:1.5;}50.56%{stroke:var(--pink);stroke-width:2.5;}60.67%{stroke:var(--pink);stroke-width:2.5;}62.64%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-wait .shp{animation-name:k-wait;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-act{0.00%{stroke-width:1.5;}78.93%{stroke-width:1.5;}80.90%{stroke:var(--pink);stroke-width:2.5;}91.01%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-act .shp{animation-name:k-act;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}18.26%{stroke-width:1.6;}20.22%{stroke:var(--pink);stroke-width:2.4;}30.34%{stroke:var(--pink);stroke-width:2.4;}32.30%{stroke-width:1.6;}48.60%{stroke-width:1.6;}50.56%{stroke:var(--pink);stroke-width:2.4;}60.67%{stroke:var(--pink);stroke-width:2.4;}62.64%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}28.37%{stroke-width:1.6;}30.34%{stroke:var(--pink);stroke-width:2.4;}40.45%{stroke:var(--pink);stroke-width:2.4;}42.42%{stroke-width:1.6;}58.71%{stroke-width:1.6;}60.67%{stroke:var(--pink);stroke-width:2.4;}70.79%{stroke:var(--pink);stroke-width:2.4;}72.75%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}78.93%{stroke-width:1.6;}80.90%{stroke:var(--pink);stroke-width:2.4;}91.01%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}10.11%{opacity:1;}12.08%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:0;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}8.15%{opacity:0;}10.11%{opacity:1;}70.79%{opacity:1;}72.75%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-2{opacity:1;}
@keyframes k-dyn-cond-2{0.00%{opacity:0;}68.82%{opacity:0;}70.79%{opacity:1;}91.01%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-2{animation-name:k-dyn-cond-2;animation-duration:17.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="290.0,54.0 290.0,94.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="290.0,283.6 290.0,323.6" marker-end="url(#arr)"/>
<text class="lbl" x="304.0" y="307.6" text-anchor="end">לא</text>
<polyline id="edge-2" class="edge" points="221.6,346.6 20.4,346.6 20.4,188.8 100.4,188.8" marker-end="url(#arr)"/>
<text class="small" x="60.4" y="176.8" text-anchor="middle">בדיקה חוזרת</text>
<polyline id="edge-3" class="edge" points="479.6,188.8 545.6,188.8" marker-end="url(#arr)"/>
<text class="lbl" x="512.6" y="176.8" text-anchor="middle">כן</text>
<g id="el-call">
<rect class="n-code-bg shp" x="181.7" y="16.0" width="216.5" height="38.0" rx="7"/>
<text class="code" x="290.0" y="43.0" text-anchor="middle">await button.click()</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="290.0,94.0 479.6,188.8 290.0,283.6 100.4,188.8"/>
<text class="t dyn-cond-0" x="290.0" y="193.8" text-anchor="middle">האלמנט גלוי ופעיל?</text>
<text class="t dyn-cond-1" x="290.0" y="193.8" text-anchor="middle">עדיין נטען - לא מוכן</text>
<text class="t dyn-cond-2" x="290.0" y="193.8" text-anchor="middle">האלמנט מוכן</text>
</g>
<g id="el-wait">
<rect class="n-box shp" x="221.6" y="323.6" width="136.7" height="46.0" rx="8"/>
<text class="t" x="290.0" y="351.6" text-anchor="middle">המתנה קצרה</text>
</g>
<g id="el-act">
<rect class="n-box shp" x="545.6" y="165.8" width="166.0" height="46.0" rx="8"/>
<text class="t" x="628.6" y="193.8" text-anchor="middle">הלחיצה מתבצעת</text>
</g>
</svg>
