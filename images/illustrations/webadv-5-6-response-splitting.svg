<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 480" width="448" role="img" aria-label="פיצול תגובות להרעלת מטמון: הזרקת CRLF יוצרת תגובה שנייה מזויפת, ה-proxy משייך אותה לבקשה ל-main.js והמטמון שומר סקריפט זדוני">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-reqs{0.00%{stroke:var(--pink);stroke-width:2.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}20.27%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-reqs .shp{animation-name:k-reqs;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-payload{0.00%{stroke-width:1.5;}13.96%{stroke-width:1.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}37.39%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-payload .shp{animation-name:k-payload;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-split{0.00%{stroke-width:1.5;}31.08%{stroke-width:1.5;}34.23%{stroke:var(--pink);stroke-width:2.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}54.50%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-split .shp{animation-name:k-split;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-match{0.00%{stroke-width:1.5;}48.20%{stroke-width:1.5;}51.35%{stroke:var(--pink);stroke-width:2.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}71.62%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-match .shp{animation-name:k-match;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cache{0.00%{stroke-width:1.5;}65.32%{stroke-width:1.5;}68.47%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-cache .shp{animation-name:k-cache;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}13.96%{stroke-width:1.6;}17.12%{stroke:var(--pink);stroke-width:2.4;}34.23%{stroke:var(--pink);stroke-width:2.4;}37.39%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}31.08%{stroke-width:1.6;}34.23%{stroke:var(--pink);stroke-width:2.4;}51.35%{stroke:var(--pink);stroke-width:2.4;}54.50%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}48.20%{stroke-width:1.6;}51.35%{stroke:var(--pink);stroke-width:2.4;}68.47%{stroke:var(--pink);stroke-width:2.4;}71.62%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}65.32%{stroke-width:1.6;}68.47%{stroke:var(--pink);stroke-width:2.4;}85.59%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="224.0,62.0 224.0,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="224.0,206.0 224.0,246.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="224.0,292.0 224.0,332.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="224.0,378.0 224.0,418.0" marker-end="url(#arr)"/>
<g id="el-reqs">
<rect class="n-box shp" x="77.0" y="16.0" width="294.0" height="46.0" rx="8"/>
<text class="t" x="224.0" y="44.0" text-anchor="middle">תוקף שולח 2 בקשות בחיבור אחד</text>
</g>
<g id="el-payload">
<rect class="n-code-bg shp" x="93.1" y="102.0" width="261.7" height="104.0" rx="7"/>
<text class="code" x="224.0" y="129.0" text-anchor="middle">GET /redirect?url=x</text>
<text class="code" x="224.0" y="151.0" text-anchor="middle">%0d%0a%0d%0a</text>
<text class="code" x="224.0" y="173.0" text-anchor="middle">HTTP/1.1 200 OK</text>
<text class="code" x="224.0" y="195.0" text-anchor="middle">&lt;script&gt;alert(1)&lt;/script&gt;</text>
</g>
<g id="el-split">
<rect class="n-box shp" x="24.9" y="246.0" width="398.1" height="46.0" rx="8"/>
<text class="t" x="224.0" y="274.0" text-anchor="middle">תגובה אחת מתפצלת ל-2: 302 ואז 200 מזויפת</text>
</g>
<g id="el-match">
<rect class="n-box shp" x="23.7" y="332.0" width="400.5" height="46.0" rx="8"/>
<text class="t" x="224.0" y="360.0" text-anchor="middle">proxy משייך /static/main.js לתגובה המזויפת</text>
</g>
<g id="el-cache">
<rect class="n-box shp" x="16.0" y="418.0" width="416.0" height="46.0" rx="8"/>
<text class="t" x="224.0" y="446.0" text-anchor="middle">מטמון שומר: main.js = &lt;script&gt;alert(1)&lt;/script&gt;</text>
</g>
</svg>
