<g id="el-note">
<rect class="n-box shp" x="16.0" y="472.0" width="601.4" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="316.7" y="500.0" text-anchor="middle">ההוראה הראשונה סופגת cache miss וממתינה כמאתיים מחזורים לנתון</text>
<text class="t dyn-note-1" x="316.7" y="500.0" text-anchor="middle">המעבד לא עומד בטל: הוא מריץ את mov ecx ואת mul esi שאינן תלויות בה</text>
<text class="t dyn-note-2" x="316.7" y="500.0" text-anchor="middle">הנתון מגיע מהזכרון, וההוראה הראשונה מסתיימת</text>
<text class="t dyn-note-3" x="316.7" y="500.0" text-anchor="middle">עכשיו ההוראה התלויה add ebx מקבלת את eax ורצה</text>
</g>
<g id="el-cap">
<text class="small" x="316.7" y="571.0" text-anchor="middle">מעבד שמבצע בסדר היה מקפיא את כל ההוראות עד שהנתון מגיע, וכאן הן כבר הסתיימו</text>
</g>
