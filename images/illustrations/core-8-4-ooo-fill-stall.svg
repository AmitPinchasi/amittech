<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="226.5" y="16.0" width="180.4" height="104.0" rx="7"/>
<text class="code" x="316.7" y="43.0" text-anchor="middle">mov eax, [addr1]</text>
<text class="code" x="316.7" y="65.0" text-anchor="middle">add ebx, eax</text>
<text class="code" x="316.7" y="87.0" text-anchor="middle">mov ecx, [addr2]</text>
<text class="code" x="316.7" y="109.0" text-anchor="middle">mul esi, edi</text>
</g>
<g id="el-i1">
