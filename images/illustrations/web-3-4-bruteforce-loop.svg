<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 805 369" width="805" role="img" aria-label="לולאת ניחוש סיסמאות: בחירת סיסמה הבאה מהרשימה, שליחת ניסיון התחברות, ובדיקה האם ההתחברות הצליחה - עד הצלחה או סוף הרשימה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-b1{0.00%{stroke:var(--pink);stroke-width:2.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}15.19%{stroke-width:1.5;}35.19%{stroke-width:1.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}52.96%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-b1 .shp{animation-name:k-b1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-b2{0.00%{stroke-width:1.5;}10.00%{stroke-width:1.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}27.78%{stroke-width:1.5;}47.78%{stroke-width:1.5;}50.37%{stroke:var(--pink);stroke-width:2.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}65.56%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-b2 .shp{animation-name:k-b2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}22.59%{stroke-width:1.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}40.37%{stroke-width:1.5;}60.37%{stroke-width:1.5;}62.96%{stroke:var(--pink);stroke-width:2.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}78.15%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-success{0.00%{stroke-width:1.5;}72.96%{stroke-width:1.5;}75.56%{stroke:var(--pink);stroke-width:2.5;}88.15%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-success .shp{animation-name:k-success;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.00%{stroke-width:1.6;}12.59%{stroke:var(--pink);stroke-width:2.4;}25.19%{stroke:var(--pink);stroke-width:2.4;}27.78%{stroke-width:1.6;}47.78%{stroke-width:1.6;}50.37%{stroke:var(--pink);stroke-width:2.4;}62.96%{stroke:var(--pink);stroke-width:2.4;}65.56%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.59%{stroke-width:1.6;}25.19%{stroke:var(--pink);stroke-width:2.4;}37.78%{stroke:var(--pink);stroke-width:2.4;}40.37%{stroke-width:1.6;}60.37%{stroke-width:1.6;}62.96%{stroke:var(--pink);stroke-width:2.4;}75.56%{stroke:var(--pink);stroke-width:2.4;}78.15%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}35.19%{stroke-width:1.6;}37.78%{stroke:var(--pink);stroke-width:2.4;}50.37%{stroke:var(--pink);stroke-width:2.4;}52.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-3{animation-name:k-edge-3;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}72.96%{stroke-width:1.6;}75.56%{stroke:var(--pink);stroke-width:2.4;}88.15%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-2{animation-name:k-edge-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="276.0,65.0 276.0,105.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="276.0,151.0 276.0,191.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="438.2,272.1 504.2,272.1" marker-end="url(#arr)"/>
<text class="lbl" x="471.2" y="260.1" text-anchor="middle">כן</text>
<polyline id="edge-3" class="edge" points="113.7,272.1 33.7,272.1 33.7,42.0 139.2,42.0" marker-end="url(#arr)"/>
<text class="small" x="86.5" y="30.0" text-anchor="middle">לא - נסה סיסמה הבאה</text>
<g id="el-b1">
<rect class="n-box shp" x="139.2" y="19.0" width="273.5" height="46.0" rx="8"/>
<text class="t" x="276.0" y="47.0" text-anchor="middle">בחירת הסיסמה הבאה מהרשימה</text>
</g>
<g id="el-b2">
<rect class="n-box shp" x="161.2" y="105.0" width="229.5" height="46.0" rx="8"/>
<text class="t" x="276.0" y="133.0" text-anchor="middle">שליחת ניסיון התחברות</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="276.0,191.0 438.2,272.1 276.0,353.3 113.7,272.1"/>
<text class="t" x="276.0" y="277.1" text-anchor="middle">ההתחברות הצליחה?</text>
</g>
<g id="el-success">
<rect class="n-box shp" x="504.2" y="249.1" width="284.6" height="46.0" rx="8"/>
<text class="t" x="646.5" y="277.1" text-anchor="middle">עצירה - נמצאה הסיסמה הנכונה</text>
</g>
</svg>
