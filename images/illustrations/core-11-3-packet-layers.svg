<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 712 384" width="712" role="img" aria-label="פירוק חבילה שהתקבלה בסוקט גולמי לשכבות: Ethernet ואז IP ואז TCP">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-recv{0.00%{stroke:var(--pink);stroke-width:2.5;}14.62%{stroke:var(--pink);stroke-width:2.5;}17.31%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-recv .shp{animation-name:k-recv;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lay-0{0.00%{stroke-width:1.5;}11.92%{stroke-width:1.5;}14.62%{stroke:var(--pink);stroke-width:2.5;}29.23%{stroke:var(--pink);stroke-width:2.5;}31.92%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lay-c0{animation-name:k-lay-0;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lay-1{0.00%{stroke-width:1.5;}26.54%{stroke-width:1.5;}29.23%{stroke:var(--pink);stroke-width:2.5;}58.46%{stroke:var(--pink);stroke-width:2.5;}61.15%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lay-c1{animation-name:k-lay-1;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lay-2{0.00%{stroke-width:1.5;}55.77%{stroke-width:1.5;}58.46%{stroke:var(--pink);stroke-width:2.5;}73.08%{stroke:var(--pink);stroke-width:2.5;}75.77%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-lay-c2{animation-name:k-lay-2;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-lay-3{0.00%{stroke-width:1.5;}70.38%{stroke-width:1.5;}73.08%{stroke:var(--pink);stroke-width:2.5;}87.69%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-lay-c3{animation-name:k-lay-3;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ptr-0{opacity:0;}
@keyframes k-dyn-ptr-0{0.00%{opacity:1;}14.62%{opacity:1;}17.31%{opacity:0;}100.00%{opacity:0;}}
.dyn-ptr-0{animation-name:k-dyn-ptr-0;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ptr-1{opacity:0;}
@keyframes k-dyn-ptr-1{0.00%{opacity:0;}11.92%{opacity:0;}14.62%{opacity:1;}29.23%{opacity:1;}31.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-ptr-1{animation-name:k-dyn-ptr-1;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ptr-2{opacity:0;}
@keyframes k-dyn-ptr-2{0.00%{opacity:0;}26.54%{opacity:0;}29.23%{opacity:1;}58.46%{opacity:1;}61.15%{opacity:0;}100.00%{opacity:0;}}
.dyn-ptr-2{animation-name:k-dyn-ptr-2;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ptr-3{opacity:0;}
@keyframes k-dyn-ptr-3{0.00%{opacity:0;}55.77%{opacity:0;}58.46%{opacity:1;}73.08%{opacity:1;}75.77%{opacity:0;}100.00%{opacity:0;}}
.dyn-ptr-3{animation-name:k-dyn-ptr-3;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-ptr-4{opacity:1;}
@keyframes k-dyn-ptr-4{0.00%{opacity:0;}70.38%{opacity:0;}73.08%{opacity:1;}87.69%{opacity:1;}100.00%{opacity:1;}}
.dyn-ptr-4{animation-name:k-dyn-ptr-4;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}14.62%{opacity:1;}17.31%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}11.92%{opacity:0;}14.62%{opacity:1;}29.23%{opacity:1;}31.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:0;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}26.54%{opacity:0;}29.23%{opacity:1;}43.85%{opacity:1;}46.54%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-3{opacity:0;}
@keyframes k-dyn-note-3{0.00%{opacity:0;}41.15%{opacity:0;}43.85%{opacity:1;}58.46%{opacity:1;}61.15%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-3{animation-name:k-dyn-note-3;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-4{opacity:1;}
@keyframes k-dyn-note-4{0.00%{opacity:0;}55.77%{opacity:0;}58.46%{opacity:1;}87.69%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-4{animation-name:k-dyn-note-4;animation-duration:13.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-recv">
<rect class="n-code-bg shp" x="107.8" y="16.0" width="496.4" height="38.0" rx="7"/>
<text class="code" x="356.0" y="43.0" text-anchor="middle">n = recvfrom(sockfd, buffer, 65536, 0, NULL, NULL);</text>
</g>
<g id="el-lay">
<rect id="el-lay-c0" class="n-cell shp" x="509.1" y="94.0" width="123.1" height="46.0" rx="6"/>
<text class="t" x="570.7" y="122.0" text-anchor="middle" style="direction:ltr">Ethernet 14</text>
<rect id="el-lay-c1" class="n-cell shp" x="366.0" y="94.0" width="123.1" height="46.0" rx="6"/>
<text class="t" x="427.6" y="122.0" text-anchor="middle" style="direction:ltr">IP 20</text>
<rect id="el-lay-c2" class="n-cell shp" x="222.9" y="94.0" width="123.1" height="46.0" rx="6"/>
<text class="t" x="284.5" y="122.0" text-anchor="middle" style="direction:ltr">TCP 20</text>
<rect id="el-lay-c3" class="n-cell shp" x="79.8" y="94.0" width="123.1" height="46.0" rx="6"/>
<text class="t" x="141.4" y="122.0" text-anchor="middle" style="direction:ltr">payload</text>
</g>
<g id="el-ptr">
<rect class="n-box shp" x="213.8" y="180.0" width="284.5" height="44.0" rx="8"/>
<text class="t-b dyn-ptr-0" x="356.0" y="207.0" text-anchor="middle" style="direction:ltr">buffer = 1500 bytes</text>
<text class="t-b dyn-ptr-1" x="356.0" y="207.0" text-anchor="middle" style="direction:ltr">eth = buffer</text>
<text class="t-b dyn-ptr-2" x="356.0" y="207.0" text-anchor="middle" style="direction:ltr">ip = buffer + 14</text>
<text class="t-b dyn-ptr-3" x="356.0" y="207.0" text-anchor="middle" style="direction:ltr">tcp = buffer + 14 + ip-&gt;ihl * 4</text>
<text class="t-b dyn-ptr-4" x="356.0" y="207.0" text-anchor="middle" style="direction:ltr">payload = tcp + tcp-&gt;doff * 4</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="264.0" width="680.0" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="356.0" y="292.0" text-anchor="middle">הסוקט הגולמי מקבל את החבילה השלמה כפי שהיא הגיעה לכרטיס הרשת</text>
<text class="t dyn-note-1" x="356.0" y="292.0" text-anchor="middle">שכבת הקישור נמצאת בתחילת הבאפר ומכילה כתובות MAC וסוג הפרוטוקול הבא</text>
<text class="t dyn-note-2" x="356.0" y="292.0" text-anchor="middle">כותרת הIP מתחילה אחרי ארבעה עשר בתים ומכילה כתובות, TTL, ומספר פרוטוקול</text>
<text class="t dyn-note-3" x="356.0" y="292.0" text-anchor="middle">שדה האורך בכותרת הIP מלמד היכן מתחילה שכבת התחבורה</text>
<text class="t dyn-note-4" x="356.0" y="292.0" text-anchor="middle">מכותרת הTCP קוראים את הפורטים ואת הדגלים של החיבור</text>
</g>
<g id="el-cap">
<text class="small" x="356.0" y="363.0" text-anchor="middle">כל שכבה מגלה היכן מתחילה השכבה הבאה, ולכן הפירוק נעשה תמיד מהשכבה החיצונית אל הפנימית</text>
</g>
</svg>
