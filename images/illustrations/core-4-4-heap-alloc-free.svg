<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 298" width="550" role="img" aria-label="אנימציה של מצב ה-heap לאורך הקצאות ושחרורים: כל קריאה ל-malloc תופסת אזור, הקריאה ל-free מסמנת אותו כפנוי, וההקצאה הבאה יכולה לחזור לתוכו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-heap{0.00%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-heap .shp{animation-name:k-heap;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-code{0.00%{stroke-width:1.5;}13.96%{stroke-width:1.5;}17.12%{stroke:var(--pink);stroke-width:2.5;}85.59%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-code .shp{animation-name:k-code;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-code-0{opacity:0;}
@keyframes k-dyn-code-0{0.00%{opacity:1;}34.23%{opacity:1;}37.39%{opacity:0;}100.00%{opacity:0;}}
.dyn-code-0{animation-name:k-dyn-code-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-code-1{opacity:0;}
@keyframes k-dyn-code-1{0.00%{opacity:0;}31.08%{opacity:0;}34.23%{opacity:1;}51.35%{opacity:1;}54.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-code-1{animation-name:k-dyn-code-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-code-2{opacity:0;}
@keyframes k-dyn-code-2{0.00%{opacity:0;}48.20%{opacity:0;}51.35%{opacity:1;}68.47%{opacity:1;}71.62%{opacity:0;}100.00%{opacity:0;}}
.dyn-code-2{animation-name:k-dyn-code-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-code-3{opacity:1;}
@keyframes k-dyn-code-3{0.00%{opacity:0;}65.32%{opacity:0;}68.47%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-code-3{animation-name:k-dyn-code-3;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-heap-0{opacity:0;}
@keyframes k-dyn-heap-0{0.00%{opacity:1;}17.12%{opacity:1;}20.27%{opacity:0;}100.00%{opacity:0;}}
.dyn-heap-0{animation-name:k-dyn-heap-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-heap-1{opacity:0;}
@keyframes k-dyn-heap-1{0.00%{opacity:0;}13.96%{opacity:0;}17.12%{opacity:1;}34.23%{opacity:1;}37.39%{opacity:0;}100.00%{opacity:0;}}
.dyn-heap-1{animation-name:k-dyn-heap-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-heap-2{opacity:0;}
@keyframes k-dyn-heap-2{0.00%{opacity:0;}31.08%{opacity:0;}34.23%{opacity:1;}51.35%{opacity:1;}54.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-heap-2{animation-name:k-dyn-heap-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-heap-3{opacity:0;}
@keyframes k-dyn-heap-3{0.00%{opacity:0;}48.20%{opacity:0;}51.35%{opacity:1;}68.47%{opacity:1;}71.62%{opacity:0;}100.00%{opacity:0;}}
.dyn-heap-3{animation-name:k-dyn-heap-3;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-heap-4{opacity:1;}
@keyframes k-dyn-heap-4{0.00%{opacity:0;}65.32%{opacity:0;}68.47%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-heap-4{animation-name:k-dyn-heap-4;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}17.12%{opacity:1;}20.27%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}13.96%{opacity:0;}17.12%{opacity:1;}34.23%{opacity:1;}37.39%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:0;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}31.08%{opacity:0;}34.23%{opacity:1;}51.35%{opacity:1;}54.50%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-3{opacity:0;}
@keyframes k-dyn-note-3{0.00%{opacity:0;}48.20%{opacity:0;}51.35%{opacity:1;}68.47%{opacity:1;}71.62%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-3{animation-name:k-dyn-note-3;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-4{opacity:1;}
@keyframes k-dyn-note-4{0.00%{opacity:0;}65.32%{opacity:0;}68.47%{opacity:1;}85.59%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-4{animation-name:k-dyn-note-4;animation-duration:11.10s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-code">
<rect class="n-code-bg shp" x="189.2" y="16.0" width="171.4" height="38.0" rx="7"/>
<text class="code dyn-code-0" x="274.9" y="43.0" text-anchor="middle">a = malloc(16);</text>
<text class="code dyn-code-1" x="274.9" y="43.0" text-anchor="middle">b = malloc(32);</text>
<text class="code dyn-code-2" x="274.9" y="43.0" text-anchor="middle">free(a);</text>
<text class="code dyn-code-3" x="274.9" y="43.0" text-anchor="middle">c = malloc(8);</text>
</g>
<g id="el-heap">
<rect class="n-box shp" x="95.0" y="94.0" width="359.8" height="44.0" rx="8"/>
<text class="t-b dyn-heap-0" x="274.9" y="121.0" text-anchor="middle">ה-heap ריק</text>
<text class="t-b dyn-heap-1" x="274.9" y="121.0" text-anchor="middle">a בגודל 16</text>
<text class="t-b dyn-heap-2" x="274.9" y="121.0" text-anchor="middle">a בגודל 16, b בגודל 32</text>
<text class="t-b dyn-heap-3" x="274.9" y="121.0" text-anchor="middle">פנוי בגודל 16, b בגודל 32</text>
<text class="t-b dyn-heap-4" x="274.9" y="121.0" text-anchor="middle">c בגודל 8, פנוי בגודל 8, b בגודל 32</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="178.0" width="517.8" height="46.0" rx="8"/>
<text class="t dyn-note-0" x="274.9" y="206.0" text-anchor="middle">לפני ההקצאה הראשונה אין בכלל אזורים בשימוש</text>
<text class="t dyn-note-1" x="274.9" y="206.0" text-anchor="middle">ההקצאה הראשונה תופסת את תחילת ה-heap</text>
<text class="t dyn-note-2" x="274.9" y="206.0" text-anchor="middle">ההקצאה השנייה מתווספת אחרי הקודמת</text>
<text class="t dyn-note-3" x="274.9" y="206.0" text-anchor="middle">הקריאה free רק מסמנת את האזור כפנוי ולא מוחקת את התוכן</text>
<text class="t dyn-note-4" x="274.9" y="206.0" text-anchor="middle">הקצאה קטנה יכולה להיכנס לתוך האזור שהתפנה</text>
</g>
<g id="el-cap">
<text class="small" x="274.9" y="277.0" text-anchor="middle">המצביע a עדיין מחזיק את הכתובת הישנה, ולכן מאפסים אותו מיד אחרי השחרור</text>
</g>
</svg>
