<text class="code dyn-formula-0" x="470.0" y="43.0" text-anchor="middle">i = blockIdx.x * blockDim.x + threadIdx.x</text>
<text class="code dyn-formula-1" x="470.0" y="43.0" text-anchor="middle">i = 0*4 + 0 = 0</text>
<text class="code dyn-formula-2" x="470.0" y="43.0" text-anchor="middle">i = 0*4 + 3 = 3</text>
