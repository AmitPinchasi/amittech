.dyn-v1-0{opacity:0;}
@keyframes k-dyn-v1-0{0.00%{opacity:1;}14.29%{opacity:1;}17.41%{opacity:0;}100.00%{opacity:0;}}
.dyn-v1-0{animation-name:k-dyn-v1-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-v1-1{opacity:0;}
@keyframes k-dyn-v1-1{0.00%{opacity:0;}11.16%{opacity:0;}14.29%{opacity:1;}28.57%{opacity:1;}31.70%{opacity:0;}100.00%{opacity:0;}}
.dyn-v1-1{animation-name:k-dyn-v1-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-v1-2{opacity:1;}
@keyframes k-dyn-v1-2{0.00%{opacity:0;}25.45%{opacity:0;}28.57%{opacity:1;}85.71%{opacity:1;}100.00%{opacity:1;}}
.dyn-v1-2{animation-name:k-dyn-v1-2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-v2-0{opacity:0;}
@keyframes k-dyn-v2-0{0.00%{opacity:1;}57.14%{opacity:1;}60.27%{opacity:0;}100.00%{opacity:0;}}
.dyn-v2-0{animation-name:k-dyn-v2-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-v2-1{opacity:0;}
@keyframes k-dyn-v2-1{0.00%{opacity:0;}54.02%{opacity:0;}57.14%{opacity:1;}71.43%{opacity:1;}74.55%{opacity:0;}100.00%{opacity:0;}}
.dyn-v2-1{animation-name:k-dyn-v2-1;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-v2-2{opacity:1;}
@keyframes k-dyn-v2-2{0.00%{opacity:0;}68.30%{opacity:0;}71.43%{opacity:1;}85.71%{opacity:1;}100.00%{opacity:1;}}
.dyn-v2-2{animation-name:k-dyn-v2-2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="256.9,54.0 256.9,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="268.9" y="78.0" text-anchor="end">ממיר את המחרוזת</text>
<polyline id="edge-1" class="edge" points="256.9,216.0 256.9,256.0" marker-end="url(#arr)"/>
<text class="lbl" x="268.9" y="240.0" text-anchor="end">בלי המרה</text>
<g id="el-c1">
<rect class="n-code-bg shp" x="202.8" y="16.0" width="108.2" height="38.0" rx="7"/>
<text class="code" x="256.9" y="43.0" text-anchor="middle">5 == "5"</text>
</g>
<g id="el-v1">
