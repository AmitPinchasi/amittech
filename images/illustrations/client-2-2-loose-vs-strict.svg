<text class="code" x="256.9" y="205.0" text-anchor="middle">5 === "5"</text>
</g>
<g id="el-v2">
<rect class="n-box shp" x="166.1" y="256.0" width="181.6" height="44.0" rx="8"/>
<text class="t-b dyn-v2-0" x="256.9" y="283.0" text-anchor="middle" style="direction:ltr">5 === "5"</text>
<text class="t-b dyn-v2-1" x="256.9" y="283.0" text-anchor="middle" style="direction:ltr">number !== string</text>
<text class="t-b dyn-v2-2" x="256.9" y="283.0" text-anchor="middle" style="direction:ltr">false</text>
</g>
<g id="el-note">
<text class="small" x="256.9" y="353.0" text-anchor="middle">השוואה רופפת ממירה טיפוסים לפני ההשוואה, מחמירה בודקת גם את הטיפוס</text>
