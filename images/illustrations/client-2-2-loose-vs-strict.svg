@keyframes k-v2{0.00%{stroke-width:1.5;}54.02%{stroke-width:1.5;}57.14%{stroke:var(--pink);stroke-width:2.5;}85.71%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-v2 .shp{animation-name:k-v2;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}11.16%{stroke-width:1.6;}14.29%{stroke:var(--pink);stroke-width:2.4;}28.57%{stroke:var(--pink);stroke-width:2.4;}31.70%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:11.20s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}54.02%{stroke-width:1.6;}57.14%{stroke:var(--pink);stroke-width:2.4;}71.43%{stroke:var(--pink);stroke-width:2.4;}74.55%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
