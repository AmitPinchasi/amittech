<text class="t-b dyn-v1-0" x="256.9" y="121.0" text-anchor="middle" style="direction:ltr">5 == "5"</text>
<text class="t-b dyn-v1-1" x="256.9" y="121.0" text-anchor="middle" style="direction:ltr">5 == 5</text>
<text class="t-b dyn-v1-2" x="256.9" y="121.0" text-anchor="middle" style="direction:ltr">true</text>
</g>
<g id="el-c2">
