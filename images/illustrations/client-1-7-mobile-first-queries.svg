<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 557 496" width="557" role="img" aria-label="גישת mobile-first: שאילתות מדיה עם min-width נכנסות לתוקף כשהמסך מתרחב">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-vw{0.00%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-vw .shp{animation-name:k-vw;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-base{0.00%{stroke:var(--pink);stroke-width:2.5;}27.27%{stroke:var(--pink);stroke-width:2.5;}31.25%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-base .shp{animation-name:k-base;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-result{0.00%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-result .shp{animation-name:k-result;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mq1{0.00%{stroke-width:1.5;}23.30%{stroke-width:1.5;}27.27%{stroke:var(--pink);stroke-width:2.5;}54.55%{stroke:var(--pink);stroke-width:2.5;}58.52%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-mq1 .shp{animation-name:k-mq1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-mq2{0.00%{stroke-width:1.5;}50.57%{stroke-width:1.5;}54.55%{stroke:var(--pink);stroke-width:2.5;}81.82%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-mq2 .shp{animation-name:k-mq2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-vw-0{opacity:0;}
@keyframes k-dyn-vw-0{0.00%{opacity:1;}27.27%{opacity:1;}31.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-vw-0{animation-name:k-dyn-vw-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-vw-1{opacity:0;}
@keyframes k-dyn-vw-1{0.00%{opacity:0;}23.30%{opacity:0;}27.27%{opacity:1;}54.55%{opacity:1;}58.52%{opacity:0;}100.00%{opacity:0;}}
.dyn-vw-1{animation-name:k-dyn-vw-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-vw-2{opacity:1;}
@keyframes k-dyn-vw-2{0.00%{opacity:0;}50.57%{opacity:0;}54.55%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-vw-2{animation-name:k-dyn-vw-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-result-0{opacity:0;}
@keyframes k-dyn-result-0{0.00%{opacity:1;}27.27%{opacity:1;}31.25%{opacity:0;}100.00%{opacity:0;}}
.dyn-result-0{animation-name:k-dyn-result-0;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-result-1{opacity:0;}
@keyframes k-dyn-result-1{0.00%{opacity:0;}23.30%{opacity:0;}27.27%{opacity:1;}54.55%{opacity:1;}58.52%{opacity:0;}100.00%{opacity:0;}}
.dyn-result-1{animation-name:k-dyn-result-1;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-result-2{opacity:1;}
@keyframes k-dyn-result-2{0.00%{opacity:0;}50.57%{opacity:0;}54.55%{opacity:1;}81.82%{opacity:1;}100.00%{opacity:1;}}
.dyn-result-2{animation-name:k-dyn-result-2;animation-duration:8.80s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-vw">
<rect class="n-box shp" x="180.8" y="16.0" width="195.2" height="44.0" rx="8"/>
<text class="t-b dyn-vw-0" x="278.5" y="43.0" text-anchor="middle" style="direction:ltr">viewport = 400px</text>
<text class="t-b dyn-vw-1" x="278.5" y="43.0" text-anchor="middle" style="direction:ltr">viewport = 800px</text>
<text class="t-b dyn-vw-2" x="278.5" y="43.0" text-anchor="middle" style="direction:ltr">viewport = 1200px</text>
</g>
<g id="el-base">
<rect class="n-code-bg shp" x="143.1" y="100.0" width="270.7" height="38.0" rx="7"/>
<text class="code" x="278.5" y="127.0" text-anchor="middle">grid-template-columns: 1fr</text>
</g>
<g id="el-mq1">
<rect class="n-code-bg shp" x="93.4" y="178.0" width="370.0" height="60.0" rx="7"/>
<text class="code" x="278.5" y="205.0" text-anchor="middle">@media (min-width: 768px)</text>
<text class="code" x="278.5" y="227.0" text-anchor="middle">grid-template-columns: repeat(2, 1fr)</text>
</g>
<g id="el-mq2">
<rect class="n-code-bg shp" x="93.4" y="278.0" width="370.0" height="60.0" rx="7"/>
<text class="code" x="278.5" y="305.0" text-anchor="middle">@media (min-width: 1024px)</text>
<text class="code" x="278.5" y="327.0" text-anchor="middle">grid-template-columns: repeat(3, 1fr)</text>
</g>
<g id="el-result">
<rect class="n-box shp" x="201.8" y="378.0" width="153.3" height="44.0" rx="8"/>
<text class="t-b dyn-result-0" x="278.5" y="405.0" text-anchor="middle">עמודה אחת</text>
<text class="t-b dyn-result-1" x="278.5" y="405.0" text-anchor="middle">שתי עמודות</text>
<text class="t-b dyn-result-2" x="278.5" y="405.0" text-anchor="middle">שלוש עמודות</text>
</g>
<g id="el-note">
<text class="small" x="278.5" y="475.0" text-anchor="middle">הבסיס מיועד למובייל, וכל שאילתה שהתנאי שלה מתקיים דורסת את הכללים שלפניה</text>
</g>
</svg>
