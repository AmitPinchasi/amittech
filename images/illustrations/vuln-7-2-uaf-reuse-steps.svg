<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" role="img" aria-label="מחזור chunk משוחרר: מצביע תלוי ממשיך להצביע לאותה כתובת, אחרי free הבתים הראשונים הופכים למצביע fd של הפח, והקצאה חדשה באותו גודל מחזירה את אותו הבלוק עם תוכן שהתוקף שולט בו">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-block{0.00%{stroke:var(--pink);stroke-width:2.5;}78.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-block .shp{animation-name:k-block;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-note{0.00%{stroke:var(--pink);stroke-width:2.5;}78.95%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-note .shp{animation-name:k-note;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-block-0{opacity:0;}
@keyframes k-dyn-block-0{0.00%{opacity:1;}26.32%{opacity:1;}30.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-block-0{animation-name:k-dyn-block-0;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-block-1{opacity:0;}
@keyframes k-dyn-block-1{0.00%{opacity:0;}21.71%{opacity:0;}26.32%{opacity:1;}52.63%{opacity:1;}57.24%{opacity:0;}100.00%{opacity:0;}}
.dyn-block-1{animation-name:k-dyn-block-1;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-block-2{opacity:1;}
@keyframes k-dyn-block-2{0.00%{opacity:0;}48.03%{opacity:0;}52.63%{opacity:1;}78.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-block-2{animation-name:k-dyn-block-2;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-0{opacity:0;}
@keyframes k-dyn-note-0{0.00%{opacity:1;}26.32%{opacity:1;}30.92%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-0{animation-name:k-dyn-note-0;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-1{opacity:0;}
@keyframes k-dyn-note-1{0.00%{opacity:0;}21.71%{opacity:0;}26.32%{opacity:1;}52.63%{opacity:1;}57.24%{opacity:0;}100.00%{opacity:0;}}
.dyn-note-1{animation-name:k-dyn-note-1;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-note-2{opacity:1;}
@keyframes k-dyn-note-2{0.00%{opacity:0;}48.03%{opacity:0;}52.63%{opacity:1;}78.95%{opacity:1;}100.00%{opacity:1;}}
.dyn-note-2{animation-name:k-dyn-note-2;animation-duration:7.60s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<g id="el-ptrlabel">
<text class="small" x="399.8" y="29.0" text-anchor="middle">obj - המצביע שהתוכנית מחזיקה</text>
</g>
<g id="el-block">
<rect class="n-box shp" x="213.8" y="74.0" width="371.9" height="46.0" rx="8"/>
<text class="t dyn-block-0" x="399.8" y="102.0" text-anchor="middle">vptr | age | name  (בשימוש)</text>
<text class="t dyn-block-1" x="399.8" y="102.0" text-anchor="middle">fd (נדרס) | age | name  (משוחרר - dangling)</text>
<text class="t dyn-block-2" x="399.8" y="102.0" text-anchor="middle">AAAA... | BBBB... | ...  (תוכן חדש)</text>
</g>
<g id="el-note">
<rect class="n-box shp" x="16.0" y="160.0" width="767.6" height="44.0" rx="8"/>
<text class="t-b dyn-note-0" x="399.8" y="187.0" text-anchor="middle">הבלוק בשימוש, obj מצביע אליו כרגיל</text>
<text class="t-b dyn-note-1" x="399.8" y="187.0" text-anchor="middle">free(obj): הבלוק נכנס לפח, אבל obj עדיין מצביע לאותה כתובת - מצביע תלוי</text>
<text class="t-b dyn-note-2" x="399.8" y="187.0" text-anchor="middle">malloc חדש באותו גודל מחזיר את אותו בלוק; obj התלוי רואה עכשיו נתונים של התוקף</text>
</g>
</svg>
