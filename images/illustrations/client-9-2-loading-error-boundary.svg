<text class="t" x="190.5" y="216.0" text-anchor="middle">loading.tsx מוצג בזמן שליפת הנתונים</text>
</g>
<g id="el-cond">
<polygon class="n-dia shp" points="190.5,274.0 363.9,360.7 190.5,447.3 17.2,360.7"/>
<text class="t dyn-cond-0" x="190.5" y="365.7" text-anchor="middle">הרינדור הצליח?</text>
<text class="t dyn-cond-1" x="190.5" y="365.7" text-anchor="middle">לא - נזרקה שגיאה</text>
<text class="t dyn-cond-2" x="190.5" y="365.7" text-anchor="middle">כן - הנתונים הגיעו</text>
</g>
<g id="el-err">
