<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 695 549" width="695" role="img" aria-label="סדר הרינדור של נתיב בנקסט מהלייאאוט דרך מסך הטעינה ועד הדף או מסך השגיאה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-req{0.00%{stroke:var(--pink);stroke-width:2.5;}11.25%{stroke:var(--pink);stroke-width:2.5;}13.44%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-req .shp{animation-name:k-req;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-layout{0.00%{stroke-width:1.5;}9.06%{stroke-width:1.5;}11.25%{stroke:var(--pink);stroke-width:2.5;}22.50%{stroke:var(--pink);stroke-width:2.5;}24.69%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-layout .shp{animation-name:k-layout;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-loading{0.00%{stroke-width:1.5;}20.31%{stroke-width:1.5;}22.50%{stroke:var(--pink);stroke-width:2.5;}33.75%{stroke:var(--pink);stroke-width:2.5;}35.94%{stroke-width:1.5;}54.06%{stroke-width:1.5;}56.25%{stroke:var(--pink);stroke-width:2.5;}67.50%{stroke:var(--pink);stroke-width:2.5;}69.69%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-loading .shp{animation-name:k-loading;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-cond{0.00%{stroke-width:1.5;}31.56%{stroke-width:1.5;}33.75%{stroke:var(--pink);stroke-width:2.5;}45.00%{stroke:var(--pink);stroke-width:2.5;}47.19%{stroke-width:1.5;}65.31%{stroke-width:1.5;}67.50%{stroke:var(--pink);stroke-width:2.5;}78.75%{stroke:var(--pink);stroke-width:2.5;}80.94%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-cond .shp{animation-name:k-cond;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-err{0.00%{stroke-width:1.5;}42.81%{stroke-width:1.5;}45.00%{stroke:var(--pink);stroke-width:2.5;}56.25%{stroke:var(--pink);stroke-width:2.5;}58.44%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-err .shp{animation-name:k-err;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-page{0.00%{stroke-width:1.5;}76.56%{stroke-width:1.5;}78.75%{stroke:var(--pink);stroke-width:2.5;}90.00%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-page .shp{animation-name:k-page;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}9.06%{stroke-width:1.6;}11.25%{stroke:var(--pink);stroke-width:2.4;}22.50%{stroke:var(--pink);stroke-width:2.4;}24.69%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}20.31%{stroke-width:1.6;}22.50%{stroke:var(--pink);stroke-width:2.4;}33.75%{stroke:var(--pink);stroke-width:2.4;}35.94%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}31.56%{stroke-width:1.6;}33.75%{stroke:var(--pink);stroke-width:2.4;}45.00%{stroke:var(--pink);stroke-width:2.4;}47.19%{stroke-width:1.6;}65.31%{stroke-width:1.6;}67.50%{stroke:var(--pink);stroke-width:2.4;}78.75%{stroke:var(--pink);stroke-width:2.4;}80.94%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-4{0.00%{stroke-width:1.6;}42.81%{stroke-width:1.6;}45.00%{stroke:var(--pink);stroke-width:2.4;}56.25%{stroke:var(--pink);stroke-width:2.4;}58.44%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-4{animation-name:k-edge-4;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-3{0.00%{stroke-width:1.6;}76.56%{stroke-width:1.6;}78.75%{stroke:var(--pink);stroke-width:2.4;}90.00%{stroke:var(--pink);stroke-width:2.4;}100.00%{stroke:var(--pink);stroke-width:2.4;}}
#edge-3{animation-name:k-edge-3;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-0{opacity:0;}
@keyframes k-dyn-cond-0{0.00%{opacity:1;}33.75%{opacity:1;}35.94%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-0{animation-name:k-dyn-cond-0;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-1{opacity:0;}
@keyframes k-dyn-cond-1{0.00%{opacity:0;}31.56%{opacity:0;}33.75%{opacity:1;}67.50%{opacity:1;}69.69%{opacity:0;}100.00%{opacity:0;}}
.dyn-cond-1{animation-name:k-dyn-cond-1;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-cond-2{opacity:1;}
@keyframes k-dyn-cond-2{0.00%{opacity:0;}65.31%{opacity:0;}67.50%{opacity:1;}90.00%{opacity:1;}100.00%{opacity:1;}}
.dyn-cond-2{animation-name:k-dyn-cond-2;animation-duration:16.00s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="190.5,62.0 190.5,102.0" marker-end="url(#arr)"/>
<polyline id="edge-1" class="edge" points="190.5,148.0 190.5,188.0" marker-end="url(#arr)"/>
<polyline id="edge-2" class="edge" points="190.5,234.0 190.5,274.0" marker-end="url(#arr)"/>
<polyline id="edge-3" class="edge" points="190.5,447.3 190.5,487.3" marker-end="url(#arr)"/>
<text class="lbl" x="204.5" y="471.3" text-anchor="end">כן</text>
<polyline id="edge-4" class="edge" points="363.9,360.7 429.9,360.7" marker-end="url(#arr)"/>
<text class="lbl" x="396.9" y="348.7" text-anchor="middle">לא</text>
<g id="el-req">
<rect class="n-box shp" x="102.9" y="16.0" width="175.4" height="46.0" rx="8"/>
<text class="t" x="190.5" y="44.0" text-anchor="middle">בקשה לנתיב blog</text>
</g>
<g id="el-layout">
<rect class="n-box shp" x="69.1" y="102.0" width="242.9" height="46.0" rx="8"/>
<text class="t" x="190.5" y="130.0" text-anchor="middle">layout.tsx מרונדר ראשון</text>
</g>
