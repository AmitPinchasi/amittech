<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 755 776" width="755" role="img" aria-label="תרשים זרימה של בחירת שפה ב-middleware: בדיקת הנתיב, העוגייה וכותרת הדפדפן עד הפניה לשפה המתאימה">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
