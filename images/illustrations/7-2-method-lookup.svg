<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 389 304" width="389" role="img" aria-label="מה פייתון עושה מאחורי הקלעים כשקוראים למתודה של אובייקט">
<style>
svg{--ink:#0a1628;--card:#ffffff;--chip:#eef1f6;--border:#c3cddc;--accent:#4361ee;--accent-tint:#eef1fe;--pink:#e0175d;--edge:#64748b;--muted:#718096;}
@media (prefers-color-scheme: dark){svg{--ink:#edf3fc;--card:#0e1f38;--chip:#152a49;--border:#385582;--accent:#7b90f5;--accent-tint:#1a2c55;--pink:#ff5c93;--edge:#8296b3;--muted:#8296b3;}}
.n-box{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
.n-dia{fill:var(--accent-tint);stroke:var(--accent);stroke-width:1.5;}
.n-hl{fill:var(--card);stroke:var(--pink);stroke-width:2;}
.n-cell{fill:var(--card);stroke:var(--border);stroke-width:1.2;}
.n-code-bg{fill:var(--chip);stroke:var(--border);stroke-width:1.2;}
.t{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:500;fill:var(--ink);direction:rtl;}
.t-b{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:700;fill:var(--ink);direction:rtl;}
.code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;fill:var(--ink);direction:ltr;}
.lbl{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:var(--accent);direction:rtl;}
.small{font-family:'Heebo','Segoe UI',system-ui,sans-serif;font-size:12px;fill:var(--muted);direction:rtl;}
.idx{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;fill:var(--muted);}
.edge{stroke:var(--edge);stroke-width:1.6;fill:none;}
.arrhead{fill:var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
@keyframes k-call{0.00%{stroke:var(--pink);stroke-width:2.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}15.19%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-call .shp{animation-name:k-call;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-dict{0.00%{stroke-width:1.5;}10.00%{stroke-width:1.5;}12.59%{stroke:var(--pink);stroke-width:2.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}27.78%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-dict .shp{animation-name:k-dict;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-get{0.00%{stroke-width:1.5;}22.59%{stroke-width:1.5;}25.19%{stroke:var(--pink);stroke-width:2.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}40.37%{stroke-width:1.5;}100.00%{stroke-width:1.5;}}
#el-get .shp{animation-name:k-get;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-run{0.00%{stroke-width:1.5;}35.19%{stroke-width:1.5;}37.78%{stroke:var(--pink);stroke-width:2.5;}88.15%{stroke:var(--pink);stroke-width:2.5;}100.00%{stroke:var(--pink);stroke-width:2.5;}}
#el-run .shp{animation-name:k-run;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-0{0.00%{stroke-width:1.6;}10.00%{stroke-width:1.6;}12.59%{stroke:var(--pink);stroke-width:2.4;}25.19%{stroke:var(--pink);stroke-width:2.4;}27.78%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-0{animation-name:k-edge-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-1{0.00%{stroke-width:1.6;}22.59%{stroke-width:1.6;}25.19%{stroke:var(--pink);stroke-width:2.4;}37.78%{stroke:var(--pink);stroke-width:2.4;}40.37%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-1{animation-name:k-edge-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
@keyframes k-edge-2{0.00%{stroke-width:1.6;}35.19%{stroke-width:1.6;}37.78%{stroke:var(--pink);stroke-width:2.4;}50.37%{stroke:var(--pink);stroke-width:2.4;}52.96%{stroke-width:1.6;}100.00%{stroke-width:1.6;}}
#edge-2{animation-name:k-edge-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-run-0{opacity:0;}
@keyframes k-dyn-run-0{0.00%{opacity:1;}50.37%{opacity:1;}52.96%{opacity:0;}100.00%{opacity:0;}}
.dyn-run-0{animation-name:k-dyn-run-0;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-run-1{opacity:0;}
@keyframes k-dyn-run-1{0.00%{opacity:0;}47.78%{opacity:0;}50.37%{opacity:1;}62.96%{opacity:1;}65.56%{opacity:0;}100.00%{opacity:0;}}
.dyn-run-1{animation-name:k-dyn-run-1;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-run-2{opacity:0;}
@keyframes k-dyn-run-2{0.00%{opacity:0;}60.37%{opacity:0;}62.96%{opacity:1;}75.56%{opacity:1;}78.15%{opacity:0;}100.00%{opacity:0;}}
.dyn-run-2{animation-name:k-dyn-run-2;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
.dyn-run-3{opacity:1;}
@keyframes k-dyn-run-3{0.00%{opacity:0;}72.96%{opacity:0;}75.56%{opacity:1;}88.15%{opacity:1;}100.00%{opacity:1;}}
.dyn-run-3{animation-name:k-dyn-run-3;animation-duration:13.50s;animation-iteration-count:infinite;animation-timing-function:linear;}
</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="arrhead"/></marker></defs>
<polyline id="edge-0" class="edge" points="151.4,54.0 151.4,94.0" marker-end="url(#arr)"/>
<text class="lbl" x="165.4" y="78.0" text-anchor="end">חיפוש המתודה במילון המחלקה</text>
<polyline id="edge-1" class="edge" points="151.4,132.0 151.4,172.0" marker-end="url(#arr)"/>
<text class="lbl" x="165.4" y="156.0" text-anchor="end">קשירת המתודה לאובייקט</text>
<polyline id="edge-2" class="edge" points="151.4,210.0 151.4,250.0" marker-end="url(#arr)"/>
<text class="lbl" x="165.4" y="234.0" text-anchor="end">קריאה עם הפרמטר</text>
<g id="el-call">
<rect class="n-code-bg shp" x="74.7" y="16.0" width="153.4" height="38.0" rx="7"/>
<text class="code" x="151.4" y="43.0" text-anchor="middle">obj.member(3)</text>
</g>
<g id="el-dict">
<rect class="n-code-bg shp" x="16.0" y="94.0" width="270.7" height="38.0" rx="7"/>
<text class="code" x="151.4" y="121.0" text-anchor="middle">MyClass.__dict__['member']</text>
</g>
<g id="el-get">
<rect class="n-code-bg shp" x="38.6" y="172.0" width="225.6" height="38.0" rx="7"/>
<text class="code" x="151.4" y="199.0" text-anchor="middle">__get__(obj, MyClass)</text>
</g>
<g id="el-run">
<rect class="n-code-bg shp" x="70.2" y="250.0" width="162.4" height="38.0" rx="7"/>
<text class="code dyn-run-0" x="151.4" y="277.0" text-anchor="middle">method(3)</text>
<text class="code dyn-run-1" x="151.4" y="277.0" text-anchor="middle">self.x + param</text>
<text class="code dyn-run-2" x="151.4" y="277.0" text-anchor="middle">5 + 3</text>
<text class="code dyn-run-3" x="151.4" y="277.0" text-anchor="middle">8</text>
</g>
</svg>
