name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install -r requirements.txt
      - name: Prepare docs
        run: |
          cp -r "קורסים" docs/
          cp -r images docs/
      - run: mkdocs gh-deploy --force
