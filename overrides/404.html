{% extends "main.html" %}

{% block tabs %}{% endblock %}
{% block content %}
<style>
  .error-page {
    text-align: center;
    padding: 4rem 1rem;
    position: relative;
    overflow: hidden;
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .error-page-bg {
    font-size: clamp(12rem, 25vw, 22rem);
    font-weight: 900;
    color: #e8ecf1;
    line-height: 1;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    z-index: 0;
    user-select: none;
    pointer-events: none;
  }
  .error-page-content {
    position: relative;
    z-index: 1;
  }
  .error-page-title {
    font-size: 2rem;
    font-weight: 800;
    color: #0a1628;
    margin: 0 0 1rem 0;
  }
  .error-page-text {
    font-size: 1rem;
    color: #718096;
    line-height: 1.7;
    max-width: 500px;
    margin: 0 auto 2rem auto;
  }
  .md-typeset a.error-page-btn,
  a.error-page-btn {
    display: inline-block;
    padding: 0.75rem 2rem;
    background: #FF1B6B;
    color: #ffffff;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s ease;
    box-shadow: 0 2px 8px rgba(255, 27, 107, 0.3);
  }
  a.error-page-btn:hover {
    background: #e0175e;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(255, 27, 107, 0.4);
  }
</style>
<div class="error-page">
  <div class="error-page-bg">404</div>
  <div class="error-page-content">
    <h1 class="error-page-title">אין מה לראות כאן</h1>
    <p class="error-page-text">הדף שאתה מנסה לפתוח אינו קיים. ייתכן שטעית בהקלדת הכתובת, או את הדף הועבר לכתובת אתר אחרת. אם אתה חושב שזו שגיאה, פנה לתמיכה.</p>
    <a class="error-page-btn" href="{{ config.site_url }}">קח אותי חזרה לדף הבית</a>
  </div>
</div>
{% endblock %}
